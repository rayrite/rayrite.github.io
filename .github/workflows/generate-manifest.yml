name: Auto-generate items manifest

# This workflow runs whenever Markdown files in /cvx/advertising/2/items are added,
# removed, or renamed. It regenerates cvx/advertising/2/items/manifest.json and commits it back
# to the repository. Your markdown reader then picks up the updated list on
# its next page load without you ever editing manifest.json by hand.

on:
  push:
    branches:
      - main
    paths:
      # Trigger when any .md file inside /cvx/advertising/2/items changes
      - 'cvx/advertising/2/items/*.md'
      - 'cvx/advertising/2/items/**/*.md'
      # Also trigger when the manifest itself is deleted, so it gets rebuilt
      - 'cvx/advertising/2/items/manifest.json'
  # Allow manual runs from the Actions tab as a safety valve
  workflow_dispatch:

# The workflow needs permission to commit back to the repository
permissions:
  contents: write

jobs:
  build-manifest:
    runs-on: ubuntu-latest

    steps:
      # Pull the repo contents into the runner so we can scan and modify them
      - name: Check out repository
        uses: actions/checkout@v4

      # Scan /cvx/advertising/2/items for .md files and build a sorted JSON array of filenames.
      # We use a small shell + jq script rather than pulling in Node to keep
      # the workflow fast and dependency-free.
      - name: Generate manifest.json
        run: |
          # Create target folder if someone accidentally deletes it, so workflow
          # never fails for a trivially recoverable reason.
          mkdir -p cvx/advertising/2/items

          # Find all .md files directly inside /cvx/advertising/2/items (not recursive), sort
          # them naturally, and emit them as a JSON array.
          # -maxdepth 1 keeps this non-recursive — change to a higher number
          # if you ever want to include subfolders.
          files=$(find cvx/advertising/2/items -maxdepth 1 -type f -name '*.md' -printf '%f\n' | sort)

          # Build the JSON manifest. The format matches what listViaManifest()
          # in your index.html already accepts: a plain array of filenames.
          if [ -z "$files" ]; then
            echo "[]" > cvx/advertising/2/items/manifest.json
          else
            echo "$files" | jq -R -s -c 'split("\n") | map(select(length > 0))' > cvx/advertising/2/items/manifest.json
          fi

          echo "Generated manifest:"
          cat cvx/advertising/2/items/manifest.json

      # Only commit if the manifest actually changed — avoids noisy empty commits
      - name: Commit manifest if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Stage the manifest and check whether there's a real diff
          git add cvx/advertising/2/items/manifest.json
          if git diff --cached --quiet; then
            echo "No manifest changes to commit."
          else
            git commit -m "chore: regenerate cvx/advertising/2/items/manifest.json [skip ci]"
            git push
          fi
