<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS Multi-Exam Glossary</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="data/services.js"></script>
    <script src="data/notes.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        input:checked ~ .dot { transform: translateX(100%); background-color: #4f46e5; }
        input:checked ~ .block { background-color: #c7d2fe; }
        .card-aif { border-left: 4px solid #8b5cf6; background: linear-gradient(90deg, rgba(139,92,246,0.04) 0%, transparent 40%); }
        .card-saa { border-left: 4px solid #14b8a6; background: linear-gradient(90deg, rgba(20,184,166,0.04) 0%, transparent 40%); }
        .card-existing { border-left: 4px solid #e2e8f0; }
        .details-table-wrapper table { width:100%; border-collapse:collapse; margin-top:.75rem; font-size:.8rem; }
        .details-table-wrapper th, .details-table-wrapper td { border:1px solid #e2e8f0; padding:.35rem .5rem; text-align:left; vertical-align:top; }
        .details-table-wrapper th { background:#f1f5f9; }
        .tag-clf { background:#e0e7ff; color:#3730a3; }
        .tag-aif { background:#ede9fe; color:#6d28d9; }
        .tag-saa { background:#ccfbf1; color:#0f766e; }
        .card-detail { max-height:0; overflow:hidden; transition: max-height 0.3s ease-out; }
        .card-detail.open { max-height: 2000px; transition: max-height 0.5s ease-in; }
        .content-auto { content-visibility: auto; contain-intrinsic-size: 0 180px; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen">

    <!-- Sticky Header -->
    <div class="sticky top-0 z-20 bg-white/90 backdrop-blur-lg shadow-sm">
        <div class="px-2 sm:px-4">
            <header class="flex flex-wrap items-center py-2 gap-x-3 gap-y-2">
                <!-- Mode Buttons -->
                <div class="flex gap-1 flex-shrink-0">
                    <button id="browseBtn" class="bg-indigo-600 text-white font-semibold py-1.5 px-3 rounded-lg text-sm transition">Browse</button>
                    <button id="quizModeBtn" class="bg-white text-gray-700 font-semibold py-1.5 px-3 rounded-lg border border-gray-300 text-sm transition">Quiz</button>
                </div>

                <!-- Glossary Controls -->
                <div id="glossaryControls" class="flex flex-wrap flex-grow gap-2 items-center">
                    <!-- Exam Filter -->
                    <select id="examFilter" class="px-2 py-1.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                        <option value="all">All Exams</option>
                        <option value="CLF-C02">CLF-C02</option>
                        <option value="AIF-C01">AIF-C01</option>
                        <option value="SAA-C03">SAA-C03</option>
                    </select>
                    <!-- Category Filter -->
                    <select id="categorySelector" class="px-2 py-1.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none max-w-[200px]">
                        <option value="all">All Categories</option>
                    </select>
                    <!-- Search -->
                    <input type="text" id="searchInput" placeholder="Search..." class="flex-grow min-w-[120px] px-2 py-1.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none" />
                    <!-- Sort Toggle -->
                    <label for="sortToggle" class="flex items-center cursor-pointer flex-shrink-0">
                        <span class="mr-1.5 text-xs text-gray-500 font-medium hidden sm:inline">Core Name</span>
                        <div class="relative">
                            <input type="checkbox" id="sortToggle" class="sr-only" checked>
                            <div class="block bg-gray-200 w-9 h-5 rounded-full"></div>
                            <div class="dot absolute left-0.5 top-0.5 bg-white w-4 h-4 rounded-full transition"></div>
                        </div>
                    </label>
                    <!-- Count -->
                    <span id="countLabel" class="text-xs text-gray-400 flex-shrink-0 hidden sm:inline">0 terms</span>
                </div>
            </header>
        </div>
    </div>

    <!-- Main Content -->
    <div class="px-2 sm:px-4 py-3">

        <!-- Glossary View -->
        <div id="glossaryView">
            <main id="glossaryGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-2"></main>
            <div id="noResults" class="hidden text-center text-gray-500 mt-10">
                <h2 class="text-xl font-bold">No services found</h2>
                <p class="text-sm">Try adjusting your filters or search.</p>
            </div>
        </div>

        <!-- Quiz View -->
        <div id="quizView" class="hidden">
            <!-- Setup -->
            <div id="quizSetup" class="max-w-xl mx-auto bg-white p-6 rounded-lg shadow-md text-center">
                <h2 class="text-2xl font-bold mb-3">AWS Services Quiz</h2>
                <p class="text-gray-600 mb-4 text-sm">Select exam scope and number of questions. You'll provide keywords for each term.</p>
                <div class="flex flex-wrap gap-4 justify-center mb-5">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Exam Scope:</label>
                        <select id="quizExamFilter" class="px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                            <option value="all">All Exams</option>
                            <option value="CLF-C02">CLF-C02</option>
                            <option value="AIF-C01">AIF-C01</option>
                            <option value="SAA-C03">SAA-C03</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Questions:</label>
                        <select id="numQuestions" class="px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                            <option>5</option>
                            <option>10</option>
                            <option selected>20</option>
                            <option id="allQuestionsOption" value="all">All</option>
                        </select>
                    </div>
                </div>
                <p id="quizAvailableCount" class="text-xs text-gray-400 mb-4"></p>
                <button id="startQuizBtn" class="bg-indigo-600 text-white font-semibold py-2 px-6 rounded-lg hover:bg-indigo-700 transition">Start Quiz</button>
            </div>

            <!-- Active -->
            <div id="quizActive" class="hidden max-w-4xl mx-auto">
                <div class="bg-white p-5 rounded-lg shadow-md mb-4">
                    <div class="flex justify-between items-center mb-3">
                        <h3 class="text-sm font-semibold text-gray-500">Term <span id="currentQuestionNum">1</span> / <span id="totalQuestionNum">10</span></h3>
                        <button id="endQuizBtn" class="text-xs bg-red-500 hover:bg-red-600 text-white py-1 px-2 rounded">End</button>
                    </div>
                    <h2 id="quizTerm" class="text-2xl font-bold text-gray-800 mb-1">Service Name</h2>
                    <div id="quizTermTags" class="mb-3"></div>
                    <textarea id="userAnswer" rows="3" class="w-full p-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none" placeholder="Enter keywords..."></textarea>
                    <div class="text-center mt-3">
                        <button id="checkAnswerBtn" class="bg-green-500 text-white font-semibold py-2 px-5 rounded-lg hover:bg-green-600 transition">Check</button>
                        <button id="nextQuestionBtn" class="hidden bg-indigo-600 text-white font-semibold py-2 px-5 rounded-lg hover:bg-indigo-700 transition">Next</button>
                    </div>
                </div>
                <div id="answerResult" class="hidden bg-slate-50 p-5 rounded-lg shadow-inner"></div>
            </div>

            <!-- Results -->
            <div id="quizResults" class="hidden max-w-2xl mx-auto bg-white p-6 rounded-lg shadow-md text-center">
                <h2 class="text-2xl font-bold mb-3">Quiz Complete!</h2>
                <p id="finalScore" class="text-gray-600 mb-4 text-lg"></p>
                <div id="resultsSummary" class="text-left max-h-80 overflow-y-auto pr-2 text-sm"></div>
                <div class="flex justify-center gap-3 mt-6">
                    <button id="restartQuizBtn" class="bg-indigo-600 text-white font-semibold py-2 px-5 rounded-lg hover:bg-indigo-700 transition">New Quiz</button>
                    <button id="backToGlossaryBtn" class="bg-white text-gray-700 font-semibold py-1.5 px-3 rounded-lg border border-gray-300 hover:bg-gray-100 transition">Back to Glossary</button>
                </div>
            </div>
        </div>
    </div>

<script>
// ── Data references (loaded from external JS files) ──
const awsServices = window.awsServices || [];
const notesData   = window.notesData || {};

// ── DOM refs ──
const glossaryGrid   = document.getElementById('glossaryGrid');
const noResultsDiv   = document.getElementById('noResults');
const categorySelect = document.getElementById('categorySelector');
const examFilter     = document.getElementById('examFilter');
const searchInput    = document.getElementById('searchInput');
const sortToggle     = document.getElementById('sortToggle');
const countLabel     = document.getElementById('countLabel');

const browseBtn        = document.getElementById('browseBtn');
const quizModeBtn      = document.getElementById('quizModeBtn');
const glossaryView     = document.getElementById('glossaryView');
const glossaryControls = document.getElementById('glossaryControls');
const quizView         = document.getElementById('quizView');
const quizSetup        = document.getElementById('quizSetup');
const quizActive       = document.getElementById('quizActive');
const quizResults      = document.getElementById('quizResults');

// ── Category colors ──
const categoryColors = {
    'AI/ML Concepts': 'bg-violet-100 text-violet-800',
    'Analytics': 'bg-blue-100 text-blue-800',
    'Application Integration': 'bg-indigo-100 text-indigo-800',
    'Architecture Concepts': 'bg-teal-100 text-teal-800',
    'Blockchain': 'bg-purple-100 text-purple-800',
    'Business Applications': 'bg-pink-100 text-pink-800',
    'Cloud Financial Management': 'bg-red-100 text-red-800',
    'Compute': 'bg-orange-100 text-orange-800',
    'Containers': 'bg-amber-100 text-amber-800',
    'Customer Enablement': 'bg-yellow-100 text-yellow-800',
    'Database': 'bg-lime-100 text-lime-800',
    'Developer Tools': 'bg-green-100 text-green-800',
    'End User Computing': 'bg-emerald-100 text-emerald-800',
    'Frontend Web & Mobile': 'bg-teal-100 text-teal-800',
    'Game Tech': 'bg-cyan-100 text-cyan-800',
    'IoT': 'bg-sky-100 text-sky-800',
    'Machine Learning': 'bg-fuchsia-100 text-fuchsia-800',
    'Management & Governance': 'bg-rose-100 text-rose-800',
    'Media Services': 'bg-slate-200 text-slate-800',
    'Migration & Transfer': 'bg-gray-100 text-gray-800',
    'Networking & Content Delivery': 'bg-zinc-100 text-zinc-800',
    'Quantum Technologies': 'bg-neutral-100 text-neutral-800',
    'Robotics': 'bg-stone-100 text-stone-800',
    'Satellite': 'bg-blue-200 text-blue-900',
    'Security, Identity, & Compliance': 'bg-red-200 text-red-900',
    'Storage': 'bg-green-200 text-green-900',
};

function getInitialColor(ch) {
    const cols = ['bg-red-500','bg-orange-500','bg-amber-500','bg-yellow-500','bg-lime-500',
        'bg-green-500','bg-emerald-500','bg-teal-500','bg-cyan-500','bg-sky-500',
        'bg-blue-500','bg-indigo-500','bg-violet-500','bg-purple-500','bg-fuchsia-500',
        'bg-pink-500','bg-rose-500'];
    return cols[ch.charCodeAt(0) % cols.length];
}

function examTagBadges(tags) {
    return tags.map(t => {
        const cls = t === 'AIF-C01' ? 'tag-aif' : t === 'SAA-C03' ? 'tag-saa' : 'tag-clf';
        return `<span class="text-[10px] font-semibold px-1.5 py-0.5 rounded ${cls}">${t}</span>`;
    }).join(' ');
}

function cardClass(source) {
    if (source === 'aif-c01') return 'card-aif';
    if (source === 'saa-c03') return 'card-saa';
    return 'card-existing';
}

// ── Sorting ──
function sortKey(name) {
    if (name.startsWith('Amazon ')) return name.substring(7);
    if (name.startsWith('AWS '))    return name.substring(4);
    return name;
}

// ── Display ──
function displayServices(list) {
    glossaryGrid.innerHTML = '';
    noResultsDiv.classList.toggle('hidden', list.length > 0);
    countLabel.textContent = list.length + ' terms';

    const frag = document.createDocumentFragment();
    list.forEach((s, idx) => {
        const initial = s.name.charAt(0).toUpperCase();
        const catColor = categoryColors[s.category] || 'bg-gray-100 text-gray-800';
        const note = notesData[s.name];
        const hasDetail = note && (note.detailsHTML || (note.keywords && note.keywords.length));

        const div = document.createElement('div');
        div.className = `content-auto ${cardClass(s.source)} bg-white rounded-lg shadow-sm p-3 flex flex-col hover:shadow-md transition-all duration-200 cursor-pointer`;
        div.innerHTML = `
            <div class="flex items-start mb-2">
                <div class="w-7 h-7 rounded-full ${getInitialColor(initial)} flex items-center justify-center text-white font-bold text-sm mr-2 flex-shrink-0">${initial}</div>
                <div class="flex-grow min-w-0">
                    <h2 class="text-sm font-bold text-gray-800 leading-tight truncate" title="${s.name}">${s.name}</h2>
                    <div class="flex flex-wrap gap-1 mt-0.5">
                        <span class="text-[10px] font-medium px-1.5 py-0.5 rounded-full ${catColor}">${s.category}</span>
                        ${examTagBadges(s.examTags)}
                    </div>
                </div>
            </div>
            <p class="text-gray-600 text-xs flex-grow leading-relaxed">${s.description}</p>
            <div class="mt-2 pt-2 border-t border-gray-100 flex justify-between items-center">
                <a href="${s.url}" target="_blank" rel="noopener noreferrer" class="text-xs font-semibold text-indigo-600 hover:text-indigo-800" onclick="event.stopPropagation()">Learn More &rarr;</a>
                ${hasDetail ? '<span class="text-[10px] text-gray-400">click to expand</span>' : ''}
            </div>
            ${hasDetail ? `<div class="card-detail" id="detail-${idx}">
                <div class="mt-2 pt-2 border-t border-gray-100">
                    ${note.keywords && note.keywords.length ? '<p class="text-[10px] text-gray-500 mb-1"><strong>Keywords:</strong> ' + note.keywords.join(', ') + '</p>' : ''}
                    ${note.detailsHTML ? '<div class="details-table-wrapper">' + note.detailsHTML + '</div>' : ''}
                </div>
            </div>` : ''}`;

        if (hasDetail) {
            div.addEventListener('click', () => {
                const det = div.querySelector('.card-detail');
                det.classList.toggle('open');
            });
        }

        frag.appendChild(div);
    });
    glossaryGrid.appendChild(frag);
}

// ── Filter ──
function filterServices() {
    const search = searchInput.value.toLowerCase();
    const cat    = categorySelect.value;
    const exam   = examFilter.value;

    let list = [...awsServices];

    if (exam !== 'all') {
        list = list.filter(s => s.examTags.includes(exam));
    }
    if (cat !== 'all') {
        list = list.filter(s => s.category === cat);
    }
    if (search) {
        list = list.filter(s =>
            s.name.toLowerCase().includes(search) ||
            s.description.toLowerCase().includes(search)
        );
    }

    if (sortToggle.checked) {
        list.sort((a, b) => sortKey(a.name).localeCompare(sortKey(b.name)));
    } else {
        list.sort((a, b) => a.name.localeCompare(b.name));
    }

    displayServices(list);
}

function populateCategories() {
    const cats = [...new Set(awsServices.map(s => s.category))].sort();
    cats.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c;
        opt.textContent = c;
        categorySelect.appendChild(opt);
    });
}

// ══════════ QUIZ MODE ══════════
let quizData = [];
let currentQuizQuestions = [];
let currentQuestionIndex = 0;
let quizScores = [];

const STOP = new Set(['a','an','the','is','it','for','to','of','in','on','with','and','or','as','that','you','your','service','services','makes','easy','use','can']);

function buildQuizData(examScope) {
    let pool = awsServices;
    if (examScope && examScope !== 'all') {
        pool = pool.filter(s => s.examTags.includes(examScope));
    }

    return pool.map(s => {
        const note = notesData[s.name] || {};
        const nameKw = s.name.toLowerCase().replace(/aws|amazon/g, '').trim().split(' ');
        const descKw = s.description.toLowerCase().split(' ');
        const noteKw = note.keywords || [];
        const all = [...nameKw, ...descKw, ...noteKw];
        const unique = [...new Set(all.map(w => w.toLowerCase().replace(/[(),.]/g, '')).filter(w => w.length > 2 && !STOP.has(w)))];
        return {
            name: s.name,
            description: s.description,
            examTags: s.examTags,
            keywords: unique.sort(),
            detailsHTML: note.detailsHTML || ''
        };
    }).filter(q => q.keywords.length > 5);
}

function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

function updateQuizAvailable() {
    const scope = document.getElementById('quizExamFilter').value;
    const data = buildQuizData(scope);
    document.getElementById('quizAvailableCount').textContent = data.length + ' quizzable terms available';
    document.getElementById('allQuestionsOption').textContent = 'All (' + data.length + ')';
}

function startQuiz() {
    const scope = document.getElementById('quizExamFilter').value;
    quizData = buildQuizData(scope);
    let num = document.getElementById('numQuestions').value;

    const shuffled = shuffle([...quizData]);
    num = num === 'all' ? shuffled.length : Math.min(parseInt(num, 10), shuffled.length);

    currentQuizQuestions = shuffled.slice(0, num);
    currentQuestionIndex = 0;
    quizScores = [];

    quizSetup.classList.add('hidden');
    quizResults.classList.add('hidden');
    quizActive.classList.remove('hidden');
    displayQuestion();
}

function displayQuestion() {
    if (currentQuestionIndex >= currentQuizQuestions.length) { showResults(); return; }
    const q = currentQuizQuestions[currentQuestionIndex];
    document.getElementById('currentQuestionNum').textContent = currentQuestionIndex + 1;
    document.getElementById('totalQuestionNum').textContent = currentQuizQuestions.length;
    document.getElementById('quizTerm').textContent = q.name;
    document.getElementById('quizTermTags').innerHTML = examTagBadges(q.examTags);
    document.getElementById('userAnswer').value = '';
    document.getElementById('userAnswer').disabled = false;
    document.getElementById('answerResult').classList.add('hidden');
    document.getElementById('checkAnswerBtn').classList.remove('hidden');
    document.getElementById('nextQuestionBtn').classList.add('hidden');
}

function checkAnswer() {
    const userText = document.getElementById('userAnswer').value;
    const q = currentQuizQuestions[currentQuestionIndex];
    const userWords = [...new Set(userText.toLowerCase().split(/\s+/).filter(w => w.length > 2 && !STOP.has(w)))];

    let matchCount = 0;
    const matched = new Set();
    userWords.forEach(uw => {
        if (q.keywords.some(kw => kw.includes(uw) || uw.includes(kw))) {
            matchCount++;
            matched.add(uw);
        }
    });

    const pct = userWords.length > 0 ? (matchCount / userWords.length) * 100 : 0;
    quizScores.push({ name: q.name, score: pct, entered: userWords.length, matched: matchCount, examTags: q.examTags });

    document.getElementById('userAnswer').disabled = true;

    const highlighted = q.keywords.map(kw => {
        const hit = Array.from(matched).some(m => kw.includes(m) || m.includes(kw));
        return hit ? `<strong class="text-green-600">${kw}</strong>` : `<span>${kw}</span>`;
    }).join(', ');

    document.getElementById('answerResult').innerHTML = `
        <h3 class="text-lg font-bold mb-2">Result</h3>
        <p class="mb-3">Matched <strong class="text-indigo-600">${matchCount}/${userWords.length}</strong> keywords (${pct.toFixed(0)}%)</p>
        <div class="mb-3"><h4 class="font-semibold text-sm mb-1">Description:</h4><p class="text-xs text-gray-700">${q.description}</p></div>
        <div class="mb-3"><h4 class="font-semibold text-sm mb-1">Keywords:</h4><p class="text-xs text-gray-600 leading-relaxed">${highlighted}</p></div>
        ${q.detailsHTML ? '<div class="details-table-wrapper mt-3"><h4 class="font-semibold text-sm mb-1">Comparison Table:</h4>' + q.detailsHTML + '</div>' : ''}`;

    document.getElementById('answerResult').classList.remove('hidden');
    document.getElementById('checkAnswerBtn').classList.add('hidden');

    const btn = document.getElementById('nextQuestionBtn');
    btn.textContent = currentQuestionIndex < currentQuizQuestions.length - 1 ? 'Next Question' : 'Show Results';
    btn.classList.remove('hidden');
}

function nextQuestion() { currentQuestionIndex++; displayQuestion(); }

function showResults() {
    quizActive.classList.add('hidden');
    quizSetup.classList.add('hidden');
    quizResults.classList.remove('hidden');

    const avg = quizScores.length ? quizScores.reduce((s, i) => s + i.score, 0) / quizScores.length : 0;
    document.getElementById('finalScore').innerHTML = `Average match: <strong class="text-indigo-600">${avg.toFixed(0)}%</strong> across ${quizScores.length} terms.`;

    document.getElementById('resultsSummary').innerHTML = quizScores.map(i => `
        <div class="p-2 border-b flex justify-between items-center">
            <div>
                <span class="font-semibold">${i.name}</span>
                <span class="ml-1">${examTagBadges(i.examTags)}</span>
            </div>
            <span class="font-bold ${i.score > 70 ? 'text-green-600' : i.score > 40 ? 'text-yellow-600' : 'text-red-600'}">${i.score.toFixed(0)}%</span>
        </div>`).join('');
}

// ── Mode switching ──
function switchToBrowse() {
    quizView.classList.add('hidden');
    glossaryView.classList.remove('hidden');
    glossaryControls.classList.remove('hidden');
    browseBtn.className  = 'bg-indigo-600 text-white font-semibold py-1.5 px-3 rounded-lg text-sm transition';
    quizModeBtn.className = 'bg-white text-gray-700 font-semibold py-1.5 px-3 rounded-lg border border-gray-300 text-sm transition';
    filterServices();
}

function switchToQuiz() {
    glossaryView.classList.add('hidden');
    glossaryControls.classList.add('hidden');
    quizView.classList.remove('hidden');
    quizActive.classList.add('hidden');
    quizResults.classList.add('hidden');
    quizSetup.classList.remove('hidden');
    quizModeBtn.className = 'bg-indigo-600 text-white font-semibold py-1.5 px-3 rounded-lg text-sm transition';
    browseBtn.className   = 'bg-white text-gray-700 font-semibold py-1.5 px-3 rounded-lg border border-gray-300 text-sm transition';
    updateQuizAvailable();
}

// ── Init ──
window.addEventListener('DOMContentLoaded', () => {
    populateCategories();
    filterServices();

    // Event listeners – glossary
    examFilter.addEventListener('change', filterServices);
    categorySelect.addEventListener('change', filterServices);
    searchInput.addEventListener('input', filterServices);
    sortToggle.addEventListener('change', filterServices);

    // Mode switches
    browseBtn.addEventListener('click', switchToBrowse);
    quizModeBtn.addEventListener('click', switchToQuiz);

    // Quiz
    document.getElementById('quizExamFilter').addEventListener('change', updateQuizAvailable);
    document.getElementById('startQuizBtn').addEventListener('click', startQuiz);
    document.getElementById('checkAnswerBtn').addEventListener('click', checkAnswer);
    document.getElementById('nextQuestionBtn').addEventListener('click', nextQuestion);
    document.getElementById('endQuizBtn').addEventListener('click', showResults);
    document.getElementById('restartQuizBtn').addEventListener('click', () => {
        quizActive.classList.add('hidden');
        quizResults.classList.add('hidden');
        quizSetup.classList.remove('hidden');
        updateQuizAvailable();
    });
    document.getElementById('backToGlossaryBtn').addEventListener('click', switchToBrowse);
});
</script>
</body>
</html>
