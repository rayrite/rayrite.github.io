l, SMS, push notifications, and voice messages. | A flexible and scalable outbound and inbound marketing communications service. Pinpoint enables you to engage with your customers by sending them email, SMS, push notifications, and voice messages. Supports targeted campaigns, journey orchestration (multi-step customer experiences), and transactional messages. Unlike SNS (which is for application messaging), Pinpoint is designed for customer engagement with analytics, segmentation, and A/B testing capabilities.","category":"Business Applications","url":"https://aws.amazon.com/pinpoint/","exams":["CLF-C02","SAA-C03"],"entryType":"service","domains":["Design Resilient Architectures","Design High-Performing Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Polly","description":"A service that turns text into lifelike speech, letting you create applications that talk, enabling you to build entirely new categories of speech-enabled products. | A service that turns text into lifelike speech using advanced deep learning technologies. Polly supports dozens of languages and offers a wide selection of natural-sounding male and female voices. Features include: Standard voices (concatenative synthesis), Neural voices (higher quality, more natural), Speech Marks (metadata about when words/sentences are spoken), and SSML support for controlling pronunciation, intonation, and timing. Use cases: voice-enabled applications, accessibility features, and automated customer service.","category":"Machine Learning","url":"https://aws.amazon.com/polly/","exams":["AIF-C01","CLF-C02","SAA-C03"],"entryType":"service","domains":["Fundamentals of AI and ML","Applications of Foundation Models","Design Resilient Architectures","Design High-Performing Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Polly Neural Voices","description":"A feature of Amazon Polly that uses deep learning to produce speech that sounds more natural and human-like than standard voices. Neural voices improve pitch, inflection, intonation, and tempo, making synthesized speech more engaging and lifelike. Supports multiple languages and can be used for applications like voice assistants, audiobooks, accessibility features, and language learning tools.","category":"Machine Learning","url":"https://aws.amazon.com/polly/features/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon Q","description":"A generative AI-powered assistant for accelerating software development and leveraging your internal data. It can answer questions, provide summaries, generate content, and securely complete tasks.","category":"Machine Learning","url":"https://aws.amazon.com/q/","exams":["AIF-C01","CLF-C02"],"entryType":"service","domains":["Fundamentals of Generative AI","Applications of Foundation Models"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Q Business","description":"A fully managed, enterprise-focused generative AI assistant that is grounded in your company's own data. You connect it to your business systems (S3, SharePoint, Confluence, Salesforce, etc.) and employees can ask natural language questions and get answers sourced from your internal documents. Unlike general AI assistants, it respects your existing access permissions — users only see answers from documents they are authorized to view.","category":"Machine Learning","url":"https://aws.amazon.com/q/business/","exams":["AIF-C01"],"entryType":"service","domains":["Fundamentals of Generative AI","Applications of Foundation Models"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Q Business Data Connectors","description":"Pre-built integrations in Amazon Q Business that connect to common enterprise data sources. Connectors are available for S3, SharePoint, Confluence, Salesforce, Google Drive, Microsoft 365, and more. They automatically crawl and index content, keeping the knowledge base up-to-date. Each connector respects the source system's access controls, ensuring users only see information they're authorized to access. Makes it easy to ground Amazon Q in your company's data.","category":"Machine Learning","url":"https://aws.amazon.com/q/business/features/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon Q Developer","description":"Assists developers and IT professionals with their tasks—from coding, testing, and upgrading applications, to diagnosing errors, performing security scanning and fixes, and optimizing AWS resources. | A generative AI-powered assistant specifically designed to help developers and IT professionals with AWS-related tasks. It can answer questions about AWS services, help write and debug code, explain error messages, suggest infrastructure improvements, and assist with troubleshooting. Unlike general AI assistants, it's trained on AWS documentation, best practices, and common patterns, providing accurate, contextual help for AWS development.","category":"Machine Learning","url":"https://aws.amazon.com/q/developer/","exams":["AIF-C01","CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Q Developer Agent","description":"An AI-powered agent within Amazon Q Developer that can perform complex software development tasks autonomously. The agent can analyze codebases, implement features, fix bugs, write tests, and upgrade code across multiple files. You describe what you want in natural language, and the agent plans and executes the necessary changes. It integrates with IDEs and can create pull requests with its changes. Represents an advanced application of generative AI for software development.","category":"Machine Learning","url":"https://aws.amazon.com/q/developer/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon QLDB","description":"A fully managed ledger database that provides a transparent, immutable, and cryptographically verifiable transaction log owned by a central trusted authority. Unlike blockchain, which is distributed, QLDB is centralized and uses an append-only journal that tracks every data change over time. All changes are cryptographically chained and verifiable. Ideal for applications requiring complete audit trails: financial transactions, supply chain systems, and healthcare records.","category":"Database","url":"https://aws.amazon.com/qldb/","exams":["SAA-C03"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon Quantum Ledger Database (Amazon QLDB)","description":"A fully managed ledger database that provides a transparent, immutable, and cryptographically verifiable transaction log owned by a central trusted authority.","category":"Database","url":"https://aws.amazon.com/qldb/","exams":["SAA-C03"],"entryType":"service","domains":["Design Resilient Architectures","Design High-Performing Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Quantum Ledger Database (QLDB)","description":"A fully managed ledger database that provides a transparent, immutable, and cryptographically verifiable transaction log owned by a central trusted authority.","category":"Database","url":"https://aws.amazon.com/qldb/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon QuickSight","description":"A fast, cloud-powered business intelligence (BI) service that makes it easy for you to deliver insights to everyone in your organization through interactive dashboards. | A scalable, serverless, machine learning-powered business intelligence (BI) service for the cloud. QuickSight lets you create and publish interactive dashboards that can be accessed from any device and embedded into applications. Unlike traditional BI tools, it requires no infrastructure setup or capacity planning. Features include: SPICE (in-memory calculation engine) for fast performance, ML Insights for anomaly detection and forecasting, and Q for natural language querying.","category":"Analytics","url":"https://aws.amazon.com/quicksight/","exams":["AIF-C01","SAA-C03"],"entryType":"service","domains":["Fundamentals of AI and ML","Security, Compliance, and Governance for AI Solutions","Design Resilient Architectures","Design High-Performing Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon QuickSight for ML Insights","description":"Amazon QuickSight is a business intelligence service that can visualize machine learning insights and predictions. You can create dashboards that show model performance metrics, prediction distributions, and feature importance. QuickSight ML Insights uses AI to automatically discover anomalies and trends in your data. It's commonly used to present ML results to business stakeholders and monitor model predictions in production.","category":"Analytics","url":"https://aws.amazon.com/quicksight/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon RDS","description":"A managed relational database service that makes it easy to set up, operate, and scale databases in the cloud. For the exam, think of it as the umbrella service that includes engines such as MySQL, PostgreSQL, MariaDB, Oracle, SQL Server, and Aurora. | The managed relational database umbrella service on AWS. Architecturally, it matters for Multi-AZ high availability, read replicas, backups, engine choice, storage sizing, and operational offload versus self-managed databases.","category":"Database","url":"https://aws.amazon.com/rds/","exams":["AIF-C01","SAA-C03"],"entryType":"service","domains":["Fundamentals of AI and ML","Applications of Foundation Models","Security, Compliance, and Governance for AI Solutions","Design Resilient Architectures","Design High-Performing Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon RDS (Relational Database Service)","description":"A managed service that makes it easy to set up, operate, and scale relational databases in the cloud. Supports 7 database engines: Amazon Aurora, MySQL, MariaDB, PostgreSQL, Oracle, SQL Server, and IBM Db2. RDS handles routine database tasks: provisioning, patching, backup, recovery, failure detection, and repair. Features include: Multi-AZ for high availability, Read Replicas for scaling read traffic, automated backups (35-day retention), and encryption at rest (KMS) and in transit (SSL/TLS).","category":"Database","url":"https://aws.amazon.com/rds/","exams":["SAA-C03"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon RDS for Db2","description":"Makes it easy to set up, operate, and scale Db2 deployments in the cloud, automating time-consuming database administration tasks like provisioning, backups, and monitoring.","category":"Database","url":"https://aws.amazon.com/rds/db2/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon RDS on VMware","description":"Lets you deploy managed databases in on-premises VMware environments using the Amazon RDS technology, bringing the same benefits to your on-premises deployments.","category":"Database","url":"https://aws.amazon.com/rds/on-vmware/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon RDS Proxy","description":"A fully managed database proxy for Amazon RDS that handles database connections efficiently. RDS Proxy pools and shares database connections, improving application scalability and enabling serverless architectures to connect to databases without exhausting connection limits.","category":"Database","url":"https://docs.aws.amazon.com/AmazonRDS/latest/UserGuide/rds-proxy.html","exams":["SAA-C03"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"Amazon Redshift","description":"The most widely used cloud data warehouse. It makes it fast, simple and cost-effective to analyze all your data using standard SQL and your existing Business Intelligence (BI) tools. | A fully managed, petabyte-scale cloud data warehouse service. Redshift uses columnar storage, massively parallel processing (MPP), and advanced compression to deliver fast query performance on large datasets. Supports both provisioned clusters (RA3 nodes with managed storage) and Serverless (automatic scaling). Integrates with S3 data lakes via Redshift Spectrum for querying exabytes of unstructured data without loading. Ideal for complex analytical queries and business intelligence workloads.","category":"Analytics","url":"https://aws.amazon.com/redshift/","exams":["AIF-C01","CLF-C02","SAA-C03"],"entryType":"service","domains":["Fundamentals of AI and ML","Security, Compliance, and Governance for AI Solutions","Design Resilient Architectures","Design High-Performing Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Redshift for ML Feature Engineering","description":"Amazon Redshift is a data warehouse that can be used for large-scale feature engineering in machine learning. You can run complex SQL queries to aggregate data, calculate features, and create training datasets from terabytes of historical data. Redshift ML allows you to create, train, and deploy ML models using SQL commands directly in the data warehouse, without moving data. It's ideal for ML workloads that require analyzing large structured datasets.","category":"Analytics","url":"https://aws.amazon.com/redshift/features/redshift-ml/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon Redshift Serverless","description":"Makes it easier to run and scale analytics without having to manage your data warehouse infrastructure. It automatically provisions and intelligently scales data warehouse capacity.","category":"Analytics","url":"https://aws.amazon.com/redshift/redshift-serverless/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Rekognition","description":"Makes it easy to add image and video analysis to your applications using proven, highly scalable, deep learning technology that requires no ML expertise to use. | A deep learning-based image and video analysis service that can identify objects, people, text, scenes, and activities in images and videos, as well as detect any inappropriate content. Features include: object and scene detection, facial analysis and comparison, face search in collections, text detection, celebrity recognition, content moderation, and custom labels (train your own models). Common use cases: photo organization, content moderation, facial authentication, and visual search.","category":"Machine Learning","url":"https://aws.amazon.com/rekognition/","exams":["AIF-C01","CLF-C02","SAA-C03"],"entryType":"service","domains":["Fundamentals of AI and ML","Applications of Foundation Models","Design Resilient Architectures","Design High-Performing Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Rekognition Custom Labels","description":"A feature of Amazon Rekognition that allows you to train custom computer vision models to detect objects and scenes specific to your business needs. You provide labeled training images, and Rekognition automatically trains a model — no ML expertise required. Use cases include detecting specific products on shelves, identifying manufacturing defects, or recognizing company logos. Models can be deployed to the cloud or to edge devices.","category":"Machine Learning","url":"https://aws.amazon.com/rekognition/custom-labels/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon Relational Database Service","description":"Makes it easy to set up, operate, and scale a relational database in the cloud. It provides cost-efficient and resizable capacity while automating time-consuming administration tasks.","category":"Database","url":"https://aws.amazon.com/rds/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Route 53","description":"A highly available and scalable cloud Domain Name System (DNS) web service designed to give developers and businesses a reliable way to route end users to Internet applications. | A highly available and scalable cloud Domain Name System (DNS) web service. Route 53 effectively connects user requests to infrastructure running in AWS (EC2, ELB, S3) and can also route users to infrastructure outside of AWS. Features include: Domain Registration, DNS Resolution (public and private hosted zones), Traffic Policies (geolocation, latency-based, weighted, failover routing), and Health Checks (automatic failover). The entry point for users accessing your applications.","category":"Networking & Content Delivery","url":"https://aws.amazon.com/route53/","exams":["CLF-C02","SAA-C03"],"entryType":"service","domains":["Design Secure Architectures","Design Resilient Architectures","Design High-Performing Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon S3","description":"An object storage service that offers industry-leading scalability, data availability, security, and performance. You can store and retrieve any amount of data, at any time, from anywhere on the web.","category":"Storage","url":"https://aws.amazon.com/s3/","exams":["AIF-C01","SAA-C03"],"entryType":"service","domains":["Fundamentals of Generative AI","Applications of Foundation Models","Security, Compliance, and Governance for AI Solutions","Design Resilient Architectures","Design High-Performing Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon S3 (Simple Storage Service)","description":"An object storage service that offers industry-leading scalability, data availability, security, and performance. S3 stores data as objects within buckets. Each object consists of data, metadata, and a unique key. Storage classes: S3 Standard (frequent access), S3 Intelligent-Tiering (automatic cost optimization), S3 Standard-IA (infrequent access), S3 One Zone-IA, S3 Glacier (archive), and S3 Glacier Deep Archive. Features: versioning, lifecycle policies, cross-region replication, event notifications, and server-side encryption.","category":"Storage","url":"https://aws.amazon.com/s3/","exams":["SAA-C03"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon S3 for ML Data Lakes","description":"Amazon S3 is the foundation for machine learning data lakes on AWS, providing virtually unlimited, durable, and cost-effective storage for training datasets, model artifacts, and inference results. S3 integrates seamlessly with SageMaker, Bedrock, and other ML services. Features like S3 Select allow efficient data retrieval, and S3 Lifecycle policies help manage costs by moving older data to cheaper storage classes. S3 is the recommended storage for large-scale ML datasets.","category":"Storage","url":"https://aws.amazon.com/s3/features/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon S3 Glacier","description":"The archival storage family within Amazon S3 for infrequently accessed data that still needs strong durability at low cost. For exam questions, remember Glacier is about colder storage, retention, and lifecycle-based cost optimization rather than low-latency access. | The archival storage family within Amazon S3 for infrequently accessed data that still needs high durability at low cost. In SAA-C03, it commonly shows up in lifecycle, backup, archival, and long-term retention design choices. | A secure, durable, and extremely low-cost Amazon S3 cloud storage class for data archiving and long-term backup. Three archive options: S3 Glacier Instant Retrieval (millisecond access, minimum 90 days), S3 Glacier Flexible Retrieval (minutes to hours retrieval, minimum 90 days), and S3 Glacier Deep Archive (lowest cost, 12-48 hours retrieval, minimum 180 days). All Glacier storage classes store data across multiple Availability Zones with 11 9s durability.","category":"Storage","url":"https://aws.amazon.com/s3/storage-classes/glacier/","exams":["AIF-C01","SAA-C03"],"entryType":"service","domains":["Fundamentals of Generative AI","Applications of Foundation Models","Security, Compliance, and Governance for AI Solutions","Design Resilient Architectures","Design High-Performing Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon S3 Intelligent-Tiering for ML","description":"An S3 storage class that automatically optimizes storage costs for machine learning datasets with unknown or changing access patterns. It automatically moves data between frequent access, infrequent access, and archive tiers based on actual usage. For ML workloads where training datasets may be accessed frequently during model development but rarely after deployment, Intelligent-Tiering can significantly reduce storage costs without performance impact.","category":"Storage","url":"https://aws.amazon.com/s3/storage-classes/intelligent-tiering/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon SageMaker","description":"The flagship AWS service for building, training, and deploying machine learning models and AI workflows. On current AWS product pages it is branded as SageMaker AI, but the AIF-C01 exam guide refers to it as Amazon SageMaker. | AWS's managed service for building, training, and deploying machine learning models. In SAA-C03 scenarios it usually appears as a managed AI/ML building block in larger architectures rather than as a deep data-science exam topic. | A fully managed service that provides every developer and data scientist with the ability to build, train, and deploy machine learning models quickly. SageMaker removes the heavy lifting from each step of the ML process: (1) Prepare — SageMaker Data Wrangler for data preparation; (2) Build — Jupyter notebooks with built-in algorithms; (3) Train — distributed training with managed infrastructure; (4) Deploy — one-click model deployment with auto-scaling endpoints. Supports both custom models and foundation models via JumpStart.","category":"Machine Learning","url":"https://aws.amazon.com/sagemaker/","exams":["AIF-C01","SAA-C03"],"entryType":"service","domains":["Fundamentals of AI and ML","Applications of Foundation Models","Design Resilient Architectures","Design High-Performing Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon SageMaker AI","description":"With Amazon SageMaker AI, you can build, train, and deploy ML models for any use case with fully managed infrastructure, tools, and workflows.","category":"Machine Learning","url":"https://aws.amazon.com/sagemaker/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon SageMaker Asynchronous Inference","description":"A deployment option for large payloads or long-running inference requests that don't require immediate responses. Clients submit requests to an S3 bucket or endpoint, and SageMaker processes them asynchronously, storing results in S3 when complete. Clients can poll for results or use SNS notifications. Ideal for document processing, batch predictions, and scenarios where request sizes exceed real-time endpoint limits (up to 1GB).","category":"Machine Learning","url":"https://docs.aws.amazon.com/sagemaker/latest/dg/async-inference.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon SageMaker Autopilot","description":"An AutoML (Automated Machine Learning) feature that automatically builds, trains, and tunes the best machine learning models based on your data. You just provide a dataset and target column, and Autopilot explores different algorithms, feature engineering approaches, and hyperparameters, generating a leaderboard of candidate models with their performance metrics. You can deploy the best model with one click or review the notebooks showing the approach taken.","category":"Machine Learning","url":"https://aws.amazon.com/sagemaker/autopilot/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon SageMaker Canvas","description":"A no-code visual machine learning workspace for business analysts and non-developers. Using a point-and-click interface, users can import data, automatically build ML models (using AutoML), generate predictions, and create AI-powered analyses without writing a single line of code. It democratizes ML by making it accessible to people without a data science background.","category":"Machine Learning","url":"https://aws.amazon.com/sagemaker/canvas/","exams":["AIF-C01"],"entryType":"service","domains":["Fundamentals of AI and ML"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon SageMaker Clarify","description":"A SageMaker capability for detecting bias and helping explain model predictions. In AIF-C01, it is one of the main AWS tools associated with responsible AI and bias analysis. | A service that helps detect and explain potential bias in machine learning models and provides transparency into model predictions. It can analyze training data for bias, measure bias in model predictions across different demographic groups, and explain individual predictions using SHAP (SHapley Additive exPlanations) values. Essential for building Responsible AI and meeting fairness and explainability requirements.","category":"Machine Learning","url":"https://aws.amazon.com/sagemaker/clarify/","exams":["AIF-C01"],"entryType":"service","domains":["Guidelines for Responsible AI","Security, Compliance, and Governance for AI Solutions"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon SageMaker Data Wrangler","description":"A SageMaker capability for importing, exploring, and transforming data for machine learning. It sits squarely in the data-preparation part of the ML lifecycle. | A visual data preparation tool that makes it faster for data scientists to prepare data for machine learning. It provides a visual interface to import data from multiple sources (S3, Redshift, Athena), explore data with built-in visualizations, transform data using 300+ pre-built transformations, and export the data preparation workflow to SageMaker Pipelines. Reduces the time spent on data preparation from weeks to hours.","category":"Machine Learning","url":"https://aws.amazon.com/sagemaker/data-wrangler/","exams":["AIF-C01"],"entryType":"service","domains":["Fundamentals of AI and ML"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon SageMaker Edge Manager","description":"A service that helps manage machine learning models on edge devices. It provides model management, secure deployment, and monitoring for edge devices like smartphones, IoT devices, and industrial equipment. You can deploy models to fleets of devices, monitor their performance, and push updates over-the-air. Integrates with SageMaker Neo for optimized edge models and AWS IoT Greengrass for deployment.","category":"Machine Learning","url":"https://aws.amazon.com/sagemaker/edge-manager/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon SageMaker Experiments","description":"A capability for tracking and organizing machine learning experiments. You can capture parameters, metrics, artifacts, and lineage for each training run, making it easy to compare different approaches and reproduce results. Experiments helps data scientists manage the iterative nature of ML development, where dozens of experiments might be run before finding the best model. Integrates with SageMaker Studio for visualization.","category":"Machine Learning","url":"https://aws.amazon.com/sagemaker/experiments/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon SageMaker Feature Store","description":"A fully managed repository for machine learning features — the processed, engineered variables used to train and run ML models. It solves a key MLOps problem: if multiple teams each compute the same feature differently, model results are inconsistent. Feature Store provides a single source of truth, with both an Online Store (for low-latency real-time inference) and an Offline Store (for batch training in S3).","category":"Machine Learning","url":"https://aws.amazon.com/sagemaker/feature-store/","exams":["AIF-C01"],"entryType":"service","domains":["Fundamentals of AI and ML"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon SageMaker Ground Truth","description":"A data labeling service that makes it easy to build highly accurate training datasets for machine learning. It provides workflows for labeling images, text, videos, and 3D point clouds. Offers options for using private labelers, Amazon Mechanical Turk, or vendor-managed teams. Includes active learning that uses ML to automatically label easy examples and route only uncertain examples to humans, reducing labeling costs by up to 70%.","category":"Machine Learning","url":"https://aws.amazon.com/sagemaker/groundtruth/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon SageMaker Inference","description":"A managed service for deploying trained machine learning models to production endpoints for real-time or batch predictions. It automatically handles infrastructure provisioning, scaling, high availability, and A/B testing. Supports various deployment options including real-time endpoints, serverless inference, asynchronous inference, and batch transform. Integrates with AWS monitoring tools for production model management.","category":"Machine Learning","url":"https://aws.amazon.com/sagemaker/deploy/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon SageMaker JumpStart","description":"A hub within Amazon SageMaker that provides one-click access to pre-built, pre-trained ML models, solution templates, and example notebooks. Think of it as an 'app store' for ML models. You can find open-source models (Llama, Stable Diffusion), fine-tune them on your data, and deploy them with minimal setup. It dramatically lowers the barrier to getting started with ML.","category":"Machine Learning","url":"https://aws.amazon.com/sagemaker/jumpstart/","exams":["AIF-C01"],"entryType":"service","domains":["Fundamentals of AI and ML","Applications of Foundation Models"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon SageMaker Model Cards","description":"A structured way to document model details such as intended use, training data, evaluation results, and limitations. Model Cards support transparency, governance, and source documentation.","category":"Machine Learning","url":"https://docs.aws.amazon.com/sagemaker/latest/dg/model-cards.html","exams":["AIF-C01"],"entryType":"service","domains":["Guidelines for Responsible AI","Security, Compliance, and Governance for AI Solutions"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon SageMaker Model Monitor","description":"A SageMaker capability for monitoring deployed models and detecting issues such as data drift, quality degradation, and feature distribution changes. It is an MLOps and trustworthiness staple. | A service that continuously monitors the quality of machine learning models in production by analyzing the data the model sees and the predictions it makes. It detects data drift (changes in input data distribution), model quality drift (degradation in prediction accuracy), and bias drift. When issues are detected, it can trigger alerts via Amazon CloudWatch and automatically retrain pipelines via SageMaker Pipelines.","category":"Machine Learning","url":"https://aws.amazon.com/sagemaker/model-monitor/","exams":["AIF-C01"],"entryType":"service","domains":["Fundamentals of AI and ML","Guidelines for Responsible AI","Security, Compliance, and Governance for AI Solutions"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon SageMaker Model Registry","description":"A centralized repository for managing machine learning models throughout their lifecycle. It stores model artifacts, metadata, versioning information, and approval status. Data scientists can register trained models, and ML engineers can review, approve, and deploy them to production. Model Registry integrates with SageMaker Pipelines for CI/CD and provides lineage tracking for compliance. It's essential for production MLOps workflows.","category":"Machine Learning","url":"https://aws.amazon.com/sagemaker/model-registry/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon SageMaker Multi-Model Endpoints","description":"A deployment option that allows you to host thousands of models on a single endpoint, sharing compute resources. SageMaker dynamically loads models as needed and unloads unused models to optimize memory. This significantly reduces hosting costs when you have many models with sporadic traffic patterns. Common use cases include personalized recommendations (one model per user segment) and multi-tenant applications.","category":"Machine Learning","url":"https://docs.aws.amazon.com/sagemaker/latest/dg/multi-model-endpoints.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon SageMaker Neo","description":"A service that compiles machine learning models to optimize them for specific target hardware (CPUs, GPUs, edge devices). It can improve inference performance by up to 25x without any loss in accuracy. Neo supports models trained in TensorFlow, PyTorch, MXNet, and XGBoost. The compiled models can be deployed to SageMaker endpoints or edge devices using AWS IoT Greengrass. Essential for latency-sensitive and edge deployment scenarios.","category":"Machine Learning","url":"https://aws.amazon.com/sagemaker/neo/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon SageMaker Pipelines","description":"A purpose-built CI/CD service for machine learning workflows (MLOps). It lets you define, automate, and manage the end-to-end ML workflow as a series of steps: data processing, model training, evaluation, model registration, and deployment. When new training data arrives, the pipeline can automatically retrain and redeploy the model, keeping it fresh and accurate.","category":"Machine Learning","url":"https://aws.amazon.com/sagemaker/pipelines/","exams":["AIF-C01"],"entryType":"service","domains":["Fundamentals of AI and ML"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon SageMaker Processing","description":"A managed service for running data processing, feature engineering, and model evaluation workloads. You can run custom scripts on fully managed infrastructure without managing servers. Common use cases include data validation, feature transformation, and running model evaluation metrics. Processing jobs can be integrated into SageMaker Pipelines for end-to-end ML workflows. You pay only for the processing time used.","category":"Machine Learning","url":"https://docs.aws.amazon.com/sagemaker/latest/dg/processing-job.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon SageMaker Serverless Inference","description":"A deployment option that automatically provisions and scales compute resources for model inference based on traffic. You don't need to choose instance types or manage scaling policies — SageMaker handles it automatically. You pay only for the compute time used to process inference requests, with no charges when there are no requests. Ideal for infrequent or unpredictable traffic patterns. Cold start latency should be considered for latency-sensitive applications.","category":"Machine Learning","url":"https://aws.amazon.com/sagemaker/serverless/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon SageMaker Studio","description":"A fully integrated development environment (IDE) for machine learning that provides a single web-based interface for all ML development activities. It includes tools for data preparation, model building, training, debugging, deployment, and monitoring. SageMaker Studio notebooks are collaborative, shareable, and come pre-configured with popular ML frameworks (TensorFlow, PyTorch, Hugging Face). It's the central workspace for data scientists and ML engineers on AWS.","category":"Machine Learning","url":"https://aws.amazon.com/sagemaker/studio/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon SageMaker Training","description":"A managed service for training machine learning models at scale. It automatically provisions and manages the compute infrastructure needed for training, distributes training jobs across multiple instances for faster completion, and supports various frameworks including TensorFlow, PyTorch, XGBoost, and Hugging Face. You pay only for the training time used. Supports distributed training, spot training for cost savings, and automatic hyperparameter tuning.","category":"Machine Learning","url":"https://aws.amazon.com/sagemaker/train/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon Security Lake","description":"Automatically centralizes security data from cloud, on-premises, and custom sources into a purpose-built data lake stored in your account.","category":"Security, Identity, & Compliance","url":"https://aws.amazon.com/security-lake/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon SES","description":"A cost-effective, flexible, and scalable email service that enables developers to send mail from within any application. You can configure it to support several email use cases, including transactional, marketing, or mass email communications.","category":"Business Applications","url":"https://aws.amazon.com/ses/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Simple Notification Service","description":"A highly available, durable, secure, fully managed pub/sub messaging service that enables you to decouple microservices, distributed systems, and serverless applications.","category":"Application Integration","url":"https://aws.amazon.com/sns/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Simple Notification Service (Amazon SNS)","description":"A highly available, durable, secure, fully managed pub/sub messaging service that enables you to decouple microservices, distributed systems, and serverless applications.","category":"Application Integration","url":"https://aws.amazon.com/sns/","exams":["SAA-C03"],"entryType":"service","domains":["Design Resilient Architectures","Design High-Performing Architectures"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Simple Queue Service","description":"A fully managed message queuing service that enables you to decouple and scale microservices, distributed systems, and serverless applications.","category":"Application Integration","url":"https://aws.amazon.com/sqs/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Simple Queue Service (Amazon SQS)","description":"A fully managed message queuing service that enables you to decouple and scale microservices, distributed systems, and serverless applications.","category":"Application Integration","url":"https://aws.amazon.com/sqs/","exams":["SAA-C03"],"entryType":"service","domains":["Design Resilient Architectures","Design High-Performing Architectures"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Simple Storage Service","description":"An object storage service that offers industry-leading scalability, data availability, security, and performance. You can store and retrieve any amount of data, at any time, from anywhere on the web.","category":"Storage","url":"https://aws.amazon.com/s3/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Simple Workflow Service","description":"Helps developers build, run, and scale background jobs that have parallel or sequential steps. You can think of it as a fully managed state tracker and task coordinator in the cloud.","category":"Application Integration","url":"https://aws.amazon.com/swf/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon SNS (Simple Notification Service)","description":"A fully managed pub/sub messaging service for both application-to-application (A2A) and application-to-person (A2P) communication. Publishers send messages to topics, and subscribers (HTTP/S endpoints, Lambda functions, SQS queues, email, SMS, mobile push) receive them. Supports fan-out patterns — one message published to a topic can trigger multiple subscribers simultaneously. Unlike SQS (pull-based), SNS is push-based and does not persist messages (except for A2P).","category":"Application Integration","url":"https://aws.amazon.com/sns/","exams":["SAA-C03"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon SQS (Standard Queue)","description":"A fully managed message queuing service that enables decoupling and scaling of microservices, distributed systems, and serverless applications. Standard queues offer maximum throughput, at-least-once delivery, and best-effort ordering. Messages can be up to 256KB and retained for up to 14 days. Visibility timeout controls how long a message is invisible to other consumers while being processed. Unlike SNS (push), SQS is pull-based — consumers poll for messages.","category":"Application Integration","url":"https://aws.amazon.com/sqs/","exams":["SAA-C03"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon Textract","description":"A service that automatically extracts text and data from scanned documents. It goes beyond simple optical character recognition (OCR) to also identify the contents of fields in forms and information stored in tables. | A machine learning service that automatically extracts text, handwriting, and data from scanned documents. Unlike simple OCR, Textract uses machine learning to identify the contents of fields in forms and information stored in tables. Supports: printed text, handwritten text, forms (key-value pairs), tables, and signatures. Use cases: document digitization, automated data entry, compliance auditing, and invoice processing. Integrates with other services like Comprehend for entity extraction.","category":"Machine Learning","url":"https://aws.amazon.com/textract/","exams":["AIF-C01","CLF-C02","SAA-C03"],"entryType":"service","domains":["Fundamentals of AI and ML","Applications of Foundation Models","Design Resilient Architectures","Design High-Performing Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Textract Lending","description":"A specialized solution built on Amazon Textract for mortgage and lending document processing. It automatically extracts information from loan application documents like pay stubs, bank statements, and tax forms. It understands lending-specific document layouts and data fields, reducing the time to process loan applications from days to minutes while improving accuracy and compliance.","category":"Machine Learning","url":"https://aws.amazon.com/textract/lending/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon Textract Queries","description":"A feature of Amazon Textract that allows you to ask specific questions about document content and receive targeted answers. Instead of extracting all text and processing it yourself, you can ask questions like 'What is the invoice date?' or 'Who is the beneficiary?' and Textract returns just that information. This reduces post-processing and improves accuracy for specific data extraction use cases.","category":"Machine Learning","url":"https://aws.amazon.com/textract/features/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon Timestream","description":"A fast, scalable, fully managed time series database service for IoT and operational applications that makes it easy to store and analyze trillions of events per day.","category":"Database","url":"https://aws.amazon.com/timestream/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Titan Image Generator","description":"A Foundation Model on Amazon Bedrock that generates high-quality images from text prompts. It can create realistic images, artistic illustrations, and variations of existing images. The model supports inpainting (editing parts of an image) and outpainting (extending an image beyond its borders). Titan Image Generator includes built-in safety features to prevent generation of harmful content. Generated images can include invisible watermarks for identification.","category":"Machine Learning","url":"https://aws.amazon.com/bedrock/titan/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon Titan Models","description":"A family of Foundation Models built and owned by Amazon, available exclusively through Amazon Bedrock. The family includes: Titan Text (text generation/summarization/Q&A), Titan Embeddings (creating vector embeddings for RAG/search), Titan Image Generator (creating and editing images), and Titan Multimodal Embeddings. They are enterprise-ready with built-in safety and no third-party data sharing.","category":"Machine Learning","url":"https://aws.amazon.com/bedrock/titan/","exams":["AIF-C01"],"entryType":"service","domains":["Fundamentals of Generative AI","Applications of Foundation Models"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Titan Multimodal Embeddings","description":"A Foundation Model on Amazon Bedrock that generates embeddings for both text and images in the same vector space. This enables cross-modal search — you can search for images using text descriptions or find similar images using an image as the query. The model understands the relationship between visual and textual content, making it useful for product search, content recommendation, and multimodal RAG applications.","category":"Machine Learning","url":"https://aws.amazon.com/bedrock/titan/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon Titan Text Embeddings","description":"A family of Foundation Models on Amazon Bedrock that convert text into high-quality vector embeddings. These embeddings capture semantic meaning and are used for semantic search, recommendation systems, and RAG applications. Titan Embeddings models are optimized for retrieval tasks and support long documents. They are multilingual and can generate embeddings for text in over 100 languages. Output embeddings are typically 1024 or 1536 dimensions.","category":"Machine Learning","url":"https://aws.amazon.com/bedrock/titan/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon Transcribe","description":"An automatic speech recognition (ASR) service that makes it easy for customers to automatically convert speech to text. It can transcribe audio files from common formats like WAV and MP3. | An automatic speech recognition (ASR) service that makes it easy for developers to add speech-to-text capability to their applications. Transcribe can analyze audio files stored in S3 and return a text file of the transcribed speech. Features include: speaker identification (diarization), custom vocabulary for domain-specific terms, vocabulary filtering (mask/remove words), and medical transcription (Transcribe Medical). Supports both batch and streaming transcription.","category":"Machine Learning","url":"https://aws.amazon.com/transcribe/","exams":["AIF-C01","CLF-C02","SAA-C03"],"entryType":"service","domains":["Fundamentals of AI and ML","Applications of Foundation Models","Design Resilient Architectures","Design High-Performing Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Transcribe Call Analytics","description":"A feature of Amazon Transcribe that provides AI-powered analysis of customer service calls. It transcribes conversations, identifies speakers, detects sentiment, extracts key phrases, and categorizes calls by issues discussed. It can automatically generate call summaries and identify compliance issues. Integrates with Amazon Connect and contact center solutions to improve agent performance and customer experience.","category":"Machine Learning","url":"https://aws.amazon.com/transcribe/call-analytics/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon Transcribe Medical","description":"A HIPAA-eligible version of Amazon Transcribe specifically designed for medical speech-to-text. It understands medical terminology, anatomy, conditions, procedures, and medications. It can transcribe clinician-patient conversations, medical dictation, and telemedicine calls with high accuracy. The output can be used with Amazon Comprehend Medical to extract structured medical information like diagnoses and medications.","category":"Machine Learning","url":"https://aws.amazon.com/transcribe/medical/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon Translate","description":"A neural machine translation service that delivers fast, high-quality, and affordable language translation using deep learning models. | A neural machine translation service that delivers fast, high-quality, and affordable language translation. Neural machine translation is a form of language translation automation that uses deep learning models to deliver more accurate and natural-sounding translation than traditional statistical and rule-based translation algorithms. Supports real-time and batch translation of text and HTML documents. Use cases: localizing content, real-time chat translation, and analyzing multilingual data.","category":"Machine Learning","url":"https://aws.amazon.com/translate/","exams":["AIF-C01","CLF-C02","SAA-C03"],"entryType":"service","domains":["Fundamentals of AI and ML","Applications of Foundation Models","Design Resilient Architectures","Design High-Performing Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Verified Permissions","description":"A scalable, fine-grained permissions management and authorization service for custom applications you've built. It enables developers to build secure applications faster by externalizing authorization.","category":"Security, Identity, & Compliance","url":"https://aws.amazon.com/verified-permissions/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon VPC","description":"Lets you provision a logically isolated section of the AWS Cloud where you can launch AWS resources in a virtual network that you define. You have complete control over your virtual networking environment.","category":"Networking & Content Delivery","url":"https://aws.amazon.com/vpc/","exams":["AIF-C01","CLF-C02","SAA-C03"],"entryType":"service","domains":["Fundamentals of Generative AI","Applications of Foundation Models","Security, Compliance, and Governance for AI Solutions","Design Secure Architectures","Design Resilient Architectures","Design High-Performing Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon VPC (Virtual Private Cloud)","description":"A service that lets you launch AWS resources in a logically isolated virtual network that you define. You have complete control over your virtual networking environment: IP address range selection, subnet creation, route table configuration, and network gateway setup. Key components: Subnets (public with IGW route, private without), Route Tables, Network ACLs (stateless subnet-level firewall), Security Groups (stateful instance-level firewall), and VPC Peering (connect VPCs). The foundation of AWS networking.","category":"Networking & Content Delivery","url":"https://aws.amazon.com/vpc/","exams":["SAA-C03"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon VPC for ML Security","description":"Amazon Virtual Private Cloud provides network isolation for machine learning workloads, ensuring that sensitive training data and model artifacts are not exposed to the public internet. You can configure VPC endpoints for private connectivity to SageMaker, Bedrock, and other ML services. VPC security groups control network access to training instances and inference endpoints. VPC Flow Logs enable monitoring of network traffic for security auditing.","category":"Networking & Content Delivery","url":"https://aws.amazon.com/vpc/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon VPC Lattice","description":"A fully managed application networking service that you use to connect, secure, and monitor all of your services across multiple accounts and virtual private clouds (VPCs).","category":"Networking & Content Delivery","url":"https://aws.amazon.com/vpc/lattice/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon WorkDocs","description":"A fully managed, secure enterprise storage and sharing service with strong administrative controls and feedback capabilities that improve user productivity. (Note: New sign-ups are no longer available).","category":"Business Applications","url":"https://aws.amazon.com/workdocs/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon WorkMail","description":"A secure, managed business email and calendar service with support for existing desktop and mobile email client applications.","category":"Business Applications","url":"https://aws.amazon.com/workmail/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon WorkSpaces","description":"A fully managed, secure cloud desktop service. You can use WorkSpaces to provision either Windows or Linux desktops in just a few minutes and quickly scale to provide thousands of desktops to workers across the globe.","category":"End User Computing","url":"https://aws.amazon.com/workspaces/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon WorkSpaces Core","description":"Provides cloud-based, fully managed virtual desktop infrastructure (VDI) accessible to third-party VDI management solutions, simplifying VDI migration.","category":"End User Computing","url":"https://aws.amazon.com/workspaces/core/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon WorkSpaces Thin Client","description":"A cost-effective thin client device that is built to work with AWS End User Computing (EUC) virtual desktops to provide users with a complete cloud desktop solution.","category":"End User Computing","url":"https://aws.amazon.com/workspaces/thin-client/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Workspaces Web","description":"A low-cost, fully managed workspace built specifically to facilitate secure access to internal websites and software-as-a-service (SaaS) applications from existing web browsers.","category":"End User Computing","url":"https://aws.amazon.com/workspaces/web/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Anthropic Claude","description":"A family of large language models developed by Anthropic, available through Amazon Bedrock. Claude models are known for being helpful, harmless, and honest, with strong capabilities in reasoning, analysis, and coding. Available in multiple sizes including Claude 3 Haiku, Sonnet, and Opus.","category":"Machine Learning","url":"https://docs.aws.amazon.com/bedrock/latest/userguide/model-parameters-claude.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"Application Load Balancer (ALB)","description":"An Elastic Load Balancer that operates at Layer 7 (the Application layer) of the OSI model. Because it understands HTTP/HTTPS, it can make intelligent routing decisions based on URL path (e.g., /api/* → server A, /images/* → server B), hostname, query strings, and HTTP headers. It natively supports WebSockets, gRPC, and can authenticate users via Cognito or OIDC. The preferred LB for web applications.","category":"Networking & Content Delivery","url":"https://aws.amazon.com/elasticloadbalancing/application-load-balancer/","exams":["SAA-C03"],"entryType":"service","domains":["Design Resilient Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Approximate Nearest Neighbor (ANN)","description":"Algorithms that efficiently find the closest vectors in a large dataset without computing exact distances to every vector. ANN trades a small amount of accuracy for massive speed improvements, making vector search feasible on millions or billions of embeddings. Popular ANN algorithms include HNSW (Hierarchical Navigable Small World), IVF (Inverted File Index), and LSH (Locality Sensitive Hashing). Vector databases like OpenSearch use ANN for fast semantic search.","category":"Generative AI Concepts","url":"https://aws.amazon.com/what-is/vector-databases/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Artificial Intelligence (AI)","description":"A field of computer science dedicated to creating systems capable of performing tasks that typically require human intelligence, such as visual perception, speech recognition, decision-making, and language translation. AI encompasses a broad range of technologies from rule-based systems to advanced machine learning models.","category":"AI/ML Fundamentals","url":"https://aws.amazon.com/what-is/artificial-intelligence/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"Attention Mechanism","description":"A core component of Transformer models that allows the AI to focus on different parts of the input when generating each part of the output. When processing a sentence, the model assigns 'attention weights' to each word, determining which words are most relevant to understanding the current word. For example, when translating 'The cat sat on the mat,' the model learns to pay attention to 'cat' when translating 'sat.' This is what enables Transformers to understand context and relationships in text.","category":"Generative AI Concepts","url":"https://aws.amazon.com/what-is/transformers-in-artificial-intelligence/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"AUC (Area Under the ROC Curve)","description":"A performance metric for binary classification models that measures the model's ability to distinguish between classes across all possible classification thresholds. AUC values range from 0 to 1, with 1 indicating perfect classification and 0.5 indicating random guessing.","category":"AI/ML Fundamentals","url":"https://docs.aws.amazon.com/machine-learning/latest/dg/binary-classification-metrics.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"Aurora Global Database","description":"An Amazon Aurora feature that spans multiple AWS Regions, with one primary region handling writes and up to 5 read-only secondary regions. Replication is done at the storage layer in under 1 second, providing near-zero RPO for global reads and disaster recovery. If the primary region fails, a secondary can be promoted to primary in under 1 minute (low RTO). Ideal for globally distributed, latency-sensitive applications.","category":"Database","url":"https://aws.amazon.com/rds/aurora/global-database/","exams":["SAA-C03"],"entryType":"service","domains":["Design High-Performing Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Aurora Serverless v2","description":"An on-demand, auto-scaling configuration for Amazon Aurora where the database automatically starts up, scales capacity (in fine-grained increments of 0.5 ACU), and shuts down based on actual workload. Unlike provisioned Aurora, you don't choose an instance size — Aurora manages it. Ideal for unpredictable workloads, development environments, and applications with infrequent usage patterns.","category":"Database","url":"https://aws.amazon.com/rds/aurora/serverless/","exams":["SAA-C03"],"entryType":"service","domains":["Design High-Performing Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Auto Scaling Strategies","description":"Different approaches for automatically adjusting compute capacity based on demand. Strategies include: Target Tracking (maintain metric at target value, e.g., 50% CPU), Step Scaling (add/remove capacity based on CloudWatch alarm thresholds), Scheduled Scaling (predictable changes based on time), Predictive Scaling (ML-based forecasting of traffic patterns), and Dynamic Scaling (react to real-time metrics). Best practice: use multiple scaling policies and cooldown periods to prevent flapping.","category":"Architectural Concepts","url":"https://docs.aws.amazon.com/autoscaling/ec2/userguide/as-scaling-simple-step.html","exams":["SAA-C03"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Autoencoder","description":"A type of neural network used for unsupervised learning, particularly dimensionality reduction and anomaly detection. An autoencoder learns to compress (encode) input data into a lower-dimensional representation and then reconstruct (decode) it back to the original form. The network is trained to minimize reconstruction error. When trained on normal data, autoencoders have high reconstruction error on anomalies, making them useful for fraud detection and quality control.","category":"Machine Learning Concepts","url":"https://docs.aws.amazon.com/sagemaker/latest/dg/deep-learning.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"AWS Amplify","description":"Makes it easy to create, configure, and implement scalable mobile and web apps powered by AWS. It seamlessly provisions and manages your backend and provides a simple framework to integrate with your frontend. | A complete solution for building full-stack web and mobile apps on AWS. Amplify consists of: (1) Amplify Libraries — open-source client libraries for iOS, Android, Web (React, Vue, Angular, Next.js), and Flutter; (2) Amplify CLI — toolchain for creating and managing cloud backends with categories like auth (Cognito), API (AppSync), storage (S3), and functions (Lambda); (3) Amplify Hosting — CI/CD and hosting for full-stack web apps with server-side rendering support.","category":"Frontend Web & Mobile","url":"https://aws.amazon.com/amplify/","exams":["CLF-C02","SAA-C03"],"entryType":"service","domains":["Design Resilient Architectures","Design High-Performing Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS App Mesh","description":"A service mesh that provides application-level networking to make it easy for your services to communicate with each other across multiple types of compute infrastructure.","category":"Networking & Content Delivery","url":"https://aws.amazon.com/app-mesh/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS App Runner","description":"A fully managed service that makes it easy for developers to quickly deploy containerized web applications and APIs, at scale and with no prior infrastructure experience required.","category":"Compute","url":"https://aws.amazon.com/apprunner/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS App2Container","description":"A command-line tool for modernizing .NET and Java applications into containerized applications. It analyzes and builds an inventory of applications running in VMs.","category":"Containers","url":"https://aws.amazon.com/app2container/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS AppFabric","description":
