 service family, not a single thing, and the exam expects you to pick the right member for the job. This collection keeps the current-generation balancer types together, while also reminding you that Classic Load Balancer is legacy.","category":"Exam Collections","url":"https://docs.aws.amazon.com/elasticloadbalancing/latest/userguide/what-is-load-balancing.html","exams":["SAA-C03"],"entryType":"collection","domains":["Design Secure Architectures","Design Resilient Architectures","Design High-Performing Architectures"],"is_collection":true,"collection_items":[{"name":"Application Load Balancer (ALB)","description":"An Elastic Load Balancer that operates at Layer 7 (the Application layer) of the OSI model. Because it understands HTTP/HTTPS, it can make intelligent routing decisions based on URL path (e.g., /api/* → server A, /images/* → server B), hostname, query strings, and HTTP headers. It natively suppor..."},{"name":"Network Load Balancer (NLB)","description":"An Elastic Load Balancer that operates at Layer 4 (Transport layer), routing TCP, UDP, and TLS traffic. It is designed for extreme performance — handling millions of requests per second with ultra-low latency (single-digit milliseconds). A key feature is its ability to preserve the client's sourc..."},{"name":"Gateway Load Balancer (GWLB)","description":"A specialized load balancer used to deploy, scale, and manage fleets of third-party virtual network appliances — like firewalls, intrusion detection systems (IDS), and deep packet inspection tools. Traffic is transparently routed through these appliances before reaching your application, allowing..."},{"name":"Classic Load Balancer (CLB)","description":""}],"specialTags":["exam_collection","official_aws_docs"],"sources":["aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"SAA Collection: RDS Availability and Read Scaling Patterns","description":"RDS exam questions often hinge on whether you need high availability, read scaling, or both. This collection keeps the main deployment patterns together so you do not confuse failover-focused Multi-AZ designs with read-scaling replicas.","category":"Exam Collections","url":"https://docs.aws.amazon.com/AmazonRDS/latest/UserGuide/Concepts.MultiAZ.html","exams":["SAA-C03"],"entryType":"collection","domains":["Design Resilient Architectures","Design High-Performing Architectures","Design Cost-Optimized Architectures"],"is_collection":true,"collection_items":[{"name":"Single-AZ DB Instance","description":""},{"name":"Multi-AZ DB Instance Deployment","description":""},{"name":"Multi-AZ DB Cluster Deployment","description":""},{"name":"Read Replicas","description":"Copies of a database instance that can serve read-only traffic, improving performance and availability. Read replicas can be promoted to standalone databases for disaster recovery and can span multiple Availability Zones or Regions."}],"specialTags":["exam_collection","official_aws_docs"],"sources":["aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"SAA Collection: Route 53 Routing Policies","description":"Amazon Route 53 supports several routing policies, and SAA-C03 questions love to hide the answer inside routing intent. This collection groups the policies so you can map use cases like latency routing, failover, and weighted rollout without mixing them up.","category":"Exam Collections","url":"https://docs.aws.amazon.com/Route53/latest/DeveloperGuide/routing-policy.html","exams":["SAA-C03"],"entryType":"collection","domains":["Design Resilient Architectures","Design High-Performing Architectures"],"is_collection":true,"collection_items":[{"name":"Simple Routing","description":""},{"name":"Failover Routing","description":""},{"name":"Geolocation Routing","description":""},{"name":"Geoproximity Routing","description":""},{"name":"Latency-Based Routing","description":""},{"name":"IP-Based Routing","description":""},{"name":"Multivalue Answer Routing","description":""},{"name":"Weighted Routing","description":""}],"specialTags":["exam_collection","official_aws_docs"],"sources":["aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Safety","description":"A principle ensuring AI systems do not cause harm to humans, property, or the environment. Includes preventing harmful outputs, ensuring physical safety in AI-controlled systems, and maintaining appropriate safeguards against misuse.","category":"Generative AI Concepts","url":"https://aws.amazon.com/ai/responsible-ai/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"Savings Plans","description":"A flexible pricing model offering lower prices compared to On-Demand pricing, in exchange for a specific usage commitment (measured in $/hour) for a one or three-year period. | A flexible pricing model that offers significant savings (up to 72% off On-Demand) in exchange for a commitment to a consistent amount of usage (measured in $/hour) for a 1 or 3-year term. Unlike Reserved Instances, Savings Plans automatically apply to any instance family, size, region, or OS. Three types: Compute Savings Plans (most flexible), EC2 Instance Savings Plans (regional, specific instance family), and SageMaker Savings Plans.","category":"Cloud Financial Management","url":"https://aws.amazon.com/savingsplans/","exams":["CLF-C02","SAA-C03"],"entryType":"service","domains":["Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Savings Plans vs. Reserved Instances","description":"Savings Plans generally offer broader flexibility, while Reserved Instances can offer strong discounts and capacity characteristics for more specific commitments. The exam cares less about pricing trivia and more about matching commitment models to workload predictability.","category":"AWS Cost Management","url":"https://aws.amazon.com/savingsplans/","exams":["SAA-C03"],"entryType":"concept","domains":["Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Security Best Practices","description":"Foundational security principles for AWS architectures: Defense in Depth (multiple security layers), Least Privilege (minimum necessary permissions), Encryption at Rest and in Transit (protect data), Network Segmentation (VPCs, subnets, security groups), Logging and Monitoring (CloudTrail, CloudWatch, GuardDuty), Regular Auditing (Config, Security Hub), Secrets Management (Secrets Manager, Parameter Store), and Patch Management (Systems Manager Patch Manager). Apply the Shared Responsibility Model — AWS secures the cloud, you secure in the cloud.","category":"Architectural Concepts","url":"https://docs.aws.amazon.com/wellarchitected/latest/security-pillar/welcome.html","exams":["SAA-C03"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Security Group vs. Network ACL","description":"Security groups are stateful instance- or ENI-level firewalls; network ACLs are stateless subnet-level filters. On SAA-C03, if the question is about instance-specific allow rules, think security groups; if it is about subnet-wide allow/deny rules, think NACLs.","category":"Security, Identity, & Compliance","url":"https://docs.aws.amazon.com/vpc/latest/userguide/infrastructure-security.html","exams":["SAA-C03"],"entryType":"concept","domains":["Design Secure Architectures"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Security Groups","description":"A virtual firewall for EC2 instances that controls inbound and outbound traffic at the instance level. Security groups are stateful, meaning return traffic is automatically allowed, and they support only allow rules (no deny rules).","category":"Security, Identity, & Compliance","url":"https://docs.aws.amazon.com/vpc/latest/userguide/vpc-security-groups.html","exams":["SAA-C03"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"Self-Supervised Learning","description":"A training approach where models learn from unlabeled data by creating supervised learning tasks from the data itself. For language models, this typically means predicting masked words or the next word in a sequence. The 'supervision' comes from the data structure, not human labels. Self-supervised learning enables training on massive amounts of unlabeled text from the internet, which is why LLMs have such broad knowledge. It's the foundation of modern Foundation Model training.","category":"Generative AI Concepts","url":"https://aws.amazon.com/what-is/foundation-models/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Semantic Search","description":"A search technique that understands the meaning and intent behind a query rather than just matching keywords. It uses embeddings to represent both queries and documents as vectors in a high-dimensional space, then finds documents whose vectors are closest (most similar in meaning) to the query vector. For example, a search for 'automobile' would return documents about 'cars' even if they don't contain the word 'automobile.' Amazon Kendra and OpenSearch vector search enable semantic search.","category":"Generative AI Concepts","url":"https://aws.amazon.com/what-is/semantic-search/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Serverless Architecture","description":"An application design style built around managed services where you focus on code and integration rather than server management. Lambda, API Gateway, Fargate, Step Functions, and EventBridge are common serverless building blocks on the exam.","category":"Architecture Patterns","url":"https://aws.amazon.com/serverless/","exams":["SAA-C03"],"entryType":"concept","domains":["Design Resilient Architectures","Design High-Performing Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Serverless Architecture Patterns","description":"Common patterns for building applications without managing servers: API Gateway + Lambda (REST APIs), S3 + Lambda (event-driven file processing), EventBridge + Lambda (event routing), Step Functions (workflow orchestration), DynamoDB Streams + Lambda (reactive data processing), and AppSync (GraphQL APIs). Benefits: no server management, automatic scaling, pay-per-use pricing, and high availability built-in. Trade-offs: execution limits (15 min for Lambda), cold starts, and vendor lock-in considerations.","category":"Architectural Concepts","url":"https://docs.aws.amazon.com/serverless/latest/devguide/serverless-architectures.html","exams":["SAA-C03"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Service Control Policies (SCPs)","description":"A type of AWS Organizations policy that provides central control over permissions for all accounts in an organization. SCPs define the maximum permissions that can be granted, enabling administrators to enforce security guardrails across multiple AWS accounts.","category":"Security, Identity, & Compliance","url":"https://docs.aws.amazon.com/organizations/latest/userguide/orgs_manage_policies_scps.html","exams":["SAA-C03"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"Service Control Policy (SCP)","description":"A policy type used in AWS Organizations to set permission guardrails across accounts or organizational units. SCPs do not grant permissions by themselves; they define the maximum available permissions inside the organization.","category":"Security, Identity, & Compliance","url":"https://docs.aws.amazon.com/organizations/latest/userguide/orgs_manage_policies_scps.html","exams":["SAA-C03"],"entryType":"concept","domains":["Design Secure Architectures"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Shadow Deployment","description":"A deployment pattern where a new model version receives production traffic but its predictions are not returned to users — instead, they're logged and compared against the production model's predictions. This allows you to test a new model on real data without risk. After validating that the new model performs well, you can promote it to production. Shadow deployment is a safe way to test model updates before full rollout.","category":"Machine Learning Concepts","url":"https://docs.aws.amazon.com/sagemaker/latest/dg/model-shadow-tests.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Single-shot Prompting","description":"A prompt engineering technique where the model is given exactly one example of the task before being asked to perform it. This provides the model with context about the expected output format and task type while keeping the prompt concise.","category":"Generative AI Concepts","url":"https://docs.aws.amazon.com/bedrock/latest/userguide/prompt-engineering-guidelines.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"SNS Subscription Types","description":"Amazon SNS supports multiple subscriber types for different delivery channels. Application-to-Application (A2A) subscribers: (1) AWS Lambda - invokes Lambda function with message payload, most common serverless integration pattern, no polling required. (2) Amazon SQS - delivers messages to SQS queue, enables fan-out pattern with reliable queuing, each queue processes independently. (3) HTTP/HTTPS Endpoints - delivers messages as HTTP POST requests to web endpoints, supports webhooks and cross-system integration, includes retry logic with exponential backoff. (4) Amazon Kinesis Data Firehose - delivers messages to Firehose for loading into S3, Redshift, OpenSearch, or third-party destinations. Application-to-Person (A2P) subscribers: (5) Email - sends messages to email addresses as plain text or JSON, limited to 10 messages per second. (6) Email-JSON - sends JSON-formatted messages to email addresses. (7) SMS - sends text messages to mobile phone numbers, supports two-way SMS in some regions. (8) Mobile Push Notifications - delivers push notifications to iOS (APNs), Android (FCM), Amazon devices (ADM), Baidu, and Windows devices (WNS/MPNS). Additional features include message filtering (filter policies to control which messages subscribers receive), message attributes (metadata for application-specific logic), and dead-letter queues (capture failed deliveries for analysis).","category":"Messaging","url":"https://docs.aws.amazon.com/sns/latest/dg/welcome.html","exams":["SAA-C03"],"entryType":"collection","is_collection":true,"collection_items":[{"name":"AWS Lambda","description":"Lets you run code without provisioning or managing servers. You pay only for the compute time you consume—there is no charge when your code is not running."},{"name":"Amazon SQS","description":""},{"name":"HTTP/HTTPS Endpoints","description":""},{"name":"Amazon Kinesis Data Firehose","description":"A fully managed service for automatically loading streaming data into data stores and analytics tools. Captures, transforms, and delivers streaming data to destinations like Amazon S3, Redshift, Elasticsearch/OpenSearch, and Splunk. Unlike Kinesis Data Streams (which requires you to build consume..."},{"name":"Email","description":""},{"name":"Email-JSON","description":""},{"name":"SMS","description":""},{"name":"Mobile Push Notifications (iOS, Android, Amazon)","description":""}],"sources":["aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Source Citation","description":"The practice of showing where an AI response drew its supporting information from. In grounded AI systems such as RAG, citations help users verify facts and reduce blind trust in generated text.","category":"GenAI Security","url":"https://docs.aws.amazon.com/bedrock/latest/userguide/kb-test-retrieve-generate.html","exams":["AIF-C01"],"entryType":"concept","domains":["Security, Compliance, and Governance for AI Solutions"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Spot Fleet","description":"A collection of Spot Instances and optionally On-Demand Instances that works as a group. Spot Fleet automatically requests Spot Instances at the lowest price available, helping maintain target capacity while optimizing costs.","category":"Compute","url":"https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/spot-fleet.html","exams":["SAA-C03"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"SQL Injection Prevention","description":"Security measures to protect applications from SQL injection attacks, where malicious SQL code is inserted into application queries. Prevention includes using parameterized queries, stored procedures, and AWS WAF rules to filter malicious input.","category":"Security, Identity, & Compliance","url":"https://docs.aws.amazon.com/waf/latest/developerguide/web-acl-sql-injection-conditions.html","exams":["SAA-C03"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"SQS FIFO Queue","description":"A type of Amazon SQS queue that guarantees strict ordering — messages are processed in exactly the order they are sent (First In, First Out) — and exactly-once processing, meaning a message is never delivered more than once. Contrast with Standard SQS queues which offer best-effort ordering and at-least-once delivery (meaning duplicates are possible). FIFO queues handle up to 3,000 messages/second. Use when order and deduplication are critical (financial transactions, order management).","category":"Application Integration","url":"https://aws.amazon.com/sqs/features/#FIFO_queues","exams":["SAA-C03"],"entryType":"service","domains":["Design Resilient Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"SQS Queue Types","description":"Amazon SQS offers two types of message queues for different application requirements. (1) Standard Queue - offers maximum throughput, nearly unlimited number of transactions per second, best-effort ordering (messages may be delivered out of order), at-least-once delivery (messages may be delivered more than once), lower cost; use cases include decoupling application components, buffering requests, batch processing, high-throughput message processing, and when order is not critical. (2) FIFO Queue (First-In-First-Out) - guarantees message ordering, exactly-once processing (no duplicate messages within 5-minute deduplication window), limited throughput (300 messages per second per API action, up to 3,000 with batching), higher cost, requires MessageGroupId and MessageDeduplicationId; use cases include order processing systems, financial transactions, inventory updates, command execution, and any scenario where message order and exactly-once processing are critical. Key differences: Standard queues provide higher throughput and lower cost but may deliver messages out of order and with duplicates; FIFO queues guarantee order and exactly-once processing but with lower throughput limits.","category":"Messaging","url":"https://docs.aws.amazon.com/AWSSimpleQueueService/latest/SQSDeveloperGuide/welcome.html","exams":["SAA-C03"],"entryType":"collection","is_collection":true,"collection_items":[{"name":"Standard Queue","description":""},{"name":"FIFO Queue (First-In-First-Out)","description":""}],"sources":["aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Stable Diffusion","description":"An open-source text-to-image generation model available through Amazon Bedrock. Uses diffusion technology to create high-quality images from text descriptions, enabling applications in creative design, marketing, and visual content generation.","category":"Machine Learning","url":"https://docs.aws.amazon.com/bedrock/latest/userguide/model-parameters-stability-diffusion.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"Stateless vs. Stateful Workloads","description":"Stateless workloads keep little or no session state on the compute node and therefore scale out more easily; stateful workloads retain state locally and require more careful placement, persistence, or replication strategies.","category":"Architecture Patterns","url":"https://docs.aws.amazon.com/wellarchitected/latest/framework/rel_prevent_interaction_failure_stateless_services.html","exams":["SAA-C03"],"entryType":"concept","domains":["Design Resilient Architectures","Design High-Performing Architectures"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Stop Sequences","description":"An inference parameter that specifies sequences of tokens where the model should stop generating. When the model encounters a stop sequence, it immediately halts output generation. Common stop sequences include newline characters (\\n), specific punctuation, or custom markers like '[END]'. Stop sequences help control output format and prevent the model from continuing beyond the desired response. Multiple stop sequences can be specified.","category":"Generative AI Concepts","url":"https://docs.aws.amazon.com/bedrock/latest/userguide/inference-parameters.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Storage Gateway Types","description":"AWS Storage Gateway is a hybrid cloud storage service that gives you on-premises access to virtually unlimited cloud storage. (1) File Gateway - provides a file interface (NFS and SMB protocols) into S3, files stored as native S3 objects, local cache for frequently accessed data, integrates with S3 storage classes and lifecycle policies; use cases include file sharing, backup, content repositories, and hybrid cloud workloads requiring file-based access to cloud storage. (2) Volume Gateway (Cached Mode) - provides iSCSI block storage interface, primary data stored in S3 with frequently accessed data cached locally, point-in-time EBS snapshots for backup; use cases for primary data with low-latency local access requirements and cloud backup. (3) Volume Gateway (Stored Mode) - provides iSCSI block storage with entire dataset stored locally, asynchronous replication to S3 for backup and disaster recovery; use cases for on-premises applications requiring local primary storage with cloud backup. (4) Tape Gateway - virtual tape library (VTL) interface using iSCSI, replaces physical tape infrastructure, virtual tapes stored in S3 with archival to S3 Glacier Deep Archive; use cases for long-term archival, compliance, and replacing physical tape backup systems with cloud-based virtual tapes.","category":"Storage","url":"https://docs.aws.amazon.com/storagegateway/latest/userguide/StorageGatewayConcepts.html","exams":["SAA-C03"],"entryType":"collection","is_collection":true,"collection_items":[{"name":"File Gateway (NFS/SMB)","description":""},{"name":"Volume Gateway - Cached Mode","description":""},{"name":"Volume Gateway - Stored Mode","description":""},{"name":"Tape Gateway (VTL)","description":""}],"sources":["aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Storage Optimized Instances","description":"EC2 instance types (I, D, and H families) designed for workloads requiring high sequential read/write access to large data sets. Suitable for data warehousing, Hadoop/MapReduce, and high-performance database workloads.","category":"Compute","url":"https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/storage-optimized-instances.html","exams":["SAA-C03"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"Storage Tiering Strategy","description":"The practice of moving data between different storage classes based on access patterns to optimize cost while maintaining performance. AWS S3 offers intelligent tiering: S3 Standard (frequent access), S3 Intelligent-Tiering (automatically moves between frequent and infrequent), S3 Standard-IA (infrequent, lower cost), S3 One Zone-IA (lower availability, lower cost), S3 Glacier (archive), and S3 Glacier Deep Archive (long-term archive). Lifecycle policies automate transitions based on age. EFS offers similar tiering with Infrequent Access.","category":"Architectural Concepts","url":"https://aws.amazon.com/s3/storage-classes/","exams":["SAA-C03"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Structured vs. Unstructured Data","description":"Structured data fits a defined schema such as rows and columns; unstructured data includes text, images, audio, and video. AI systems often need different tools and preparation steps depending on which kind of data they consume.","category":"AI/ML Fundamentals","url":"https://aws.amazon.com/what-is/structured-data/","exams":["AIF-C01"],"entryType":"concept","domains":["Fundamentals of AI and ML"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Supervised Learning","description":"A machine learning approach where a model learns from labeled examples that already contain the correct answer. Common exam use cases include classification and regression tasks where you have historical input-output pairs. | A machine learning approach where the model is trained on labeled data — input data paired with the correct output (the 'supervision'). The model learns to map inputs to outputs by finding patterns in the training examples. Common tasks include classification (predicting categories like spam/not spam) and regression (predicting continuous values like house prices). Examples on AWS: Amazon Comprehend (text classification), Amazon Personalize (recommendations).","category":"Machine Learning Concepts","url":"https://aws.amazon.com/what-is/supervised-learning/","exams":["AIF-C01"],"entryType":"concept","domains":["Fundamentals of AI and ML"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Sustainability in AI","description":"Environmental considerations in AI development and deployment, including energy consumption for training and inference, carbon footprint of large models, and strategies for efficient AI infrastructure. AWS provides tools to track and optimize the environmental impact of AI workloads.","category":"Generative AI Concepts","url":"https://aws.amazon.com/sustainability/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"System and Organization Controls (SOC)","description":"An assurance reporting framework used to evaluate controls related to security, availability, processing integrity, confidentiality, and privacy. The exam expects you to recognize SOC as part of the compliance landscape around AI solutions.","category":"GenAI Security","url":"https://aws.amazon.com/compliance/soc-faqs/","exams":["AIF-C01"],"entryType":"concept","domains":["Security, Compliance, and Governance for AI Solutions"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"System Prompt","description":"A special type of prompt that sets the context, behavior, and constraints for an AI assistant across an entire conversation. Unlike user prompts that ask specific questions, system prompts define the assistant's persona, capabilities, and rules. For example: 'You are a helpful customer service assistant for Acme Corp. Only answer questions about our products. Be concise and professional.' System prompts help ensure consistent, appropriate behavior from the model.","category":"Generative AI Concepts","url":"https://docs.aws.amazon.com/bedrock/latest/userguide/prompt-engineering-guidelines.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Tabular Data","description":"Data organized in rows and columns, similar to a spreadsheet or database table. This structured format is commonly used in traditional machine learning for tasks like regression, classification, and forecasting. Examples include customer records, financial transactions, and inventory data.","category":"AI/ML Fundamentals","url":"https://docs.aws.amazon.com/machine-learning/latest/dg/data-types.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"Temperature (AI Parameter)","description":"A setting that controls the randomness and creativity of an AI model's output. A low temperature (close to 0) makes the model deterministic and predictable — great for factual Q&A. A high temperature (close to 1) makes it more creative and varied — good for brainstorming or creative writing. Think of it like adjusting from a strict rule-follower to a freewheeling creative.","category":"Generative AI Concepts","url":"https://docs.aws.amazon.com/bedrock/latest/userguide/inference-parameters.html","exams":["AIF-C01"],"entryType":"concept","domains":["Fundamentals of Generative AI","Applications of Foundation Models"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Test/Validation Data","description":"Datasets held separate from training data to evaluate model performance. Validation data is used during training to tune hyperparameters and detect overfitting. Test data is used only once at the very end to get an unbiased estimate of final model performance. A common split is 70% training, 15% validation, 15% test. Never train on test data — doing so gives unrealistically high performance metrics and fails to detect overfitting. Amazon SageMaker automatically handles train/validation splits.","category":"Machine Learning Concepts","url":"https://docs.aws.amazon.com/sagemaker/latest/dg/model-monitor-data-capture.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Time-Series Data","description":"A sequence of data points collected or recorded at successive points in time, typically at uniform intervals. Used for forecasting, anomaly detection, and trend analysis. Examples include stock prices, sensor readings, website traffic, and weather measurements.","category":"AI/ML Fundamentals","url":"https://docs.aws.amazon.com/forecast/latest/dg/how-it-works.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"Token Limit","description":"The maximum number of tokens a language model can process in a single request, including both input (prompt) and output (completion). Different models have different token limits — for example, some models support 4K tokens, while others support 100K+ tokens. If your input exceeds the limit, you must truncate, summarize, or split it. Token limits constrain what you can do in a single request and affect RAG architecture decisions (how much context to include).","category":"Machine Learning Concepts","url":"https://docs.aws.amazon.com/bedrock/latest/userguide/model-parameters.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Tokens & Tokenization","description":"Tokenization is how an LLM breaks text into small units called tokens before processing it. A token is roughly 3-4 characters (about 0.75 words in English). For example, 'CloudFormation' might be split into ['Cloud', 'Form', 'ation']. Token counts matter because LLMs have a maximum context window size and because AWS pricing for Bedrock models is based on input/output tokens consumed.","category":"Generative AI Concepts","url":"https://aws.amazon.com/what-is/tokenization/","exams":["AIF-C01"],"entryType":"concept","domains":["Fundamentals of Generative AI","Applications of Foundation Models"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Top-k Sampling","description":"A text generation technique that restricts the model to only consider the k most likely next tokens when generating text. This helps balance between diversity and quality by preventing the model from selecting very low-probability tokens that could lead to nonsensical outputs.","category":"Generative AI Concepts","url":"https://docs.aws.amazon.com/bedrock/latest/userguide/model-parameters.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"Top-p (Nucleus Sampling)","description":"An inference parameter that controls text generation by sampling from the smallest set of tokens whose cumulative probability exceeds a threshold p (typically 0.9). Unlike temperature which affects randomness globally, Top-p dynamically adjusts the candidate pool based on the model's confidence. At p=0.1, only the most likely tokens are considered (deterministic). At p=1.0, all tokens are considered (very random). Often used together with temperature for fine-grained control over creativity.","category":"Generative AI Concepts","url":"https://docs.aws.amazon.com/bedrock/latest/userguide/inference-parameters.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Top-p Sampling (Nucleus Sampling)","description":"A text generation technique that samples from the smallest set of tokens whose cumulative probability exceeds a threshold p (typically 0.9). This provides dynamic filtering of token choices based on probability distribution, offering more flexibility than fixed top-k sampling.","category":"Generative AI Concepts","url":"https://docs.aws.amazon.com/bedrock/latest/userguide/model-parameters.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"Toxicity","description":"Harmful, offensive, or inappropriate content that AI systems may generate, including hate speech, explicit content, harassment, or encouragement of dangerous activities. Guardrails and content filters are used to detect and prevent toxic outputs.","category":"GenAI Security","url":"https://docs.aws.amazon.com/bedrock/latest/userguide/guardrails.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"Training Data","description":"The dataset used to teach a machine learning model. The model learns patterns, relationships, and parameters from this data. Quality training data should be representative of the real-world scenarios the model will encounter, sufficiently large, accurately labeled (for supervised learning), and free from harmful biases. The saying 'garbage in, garbage out' applies — poor training data leads to poor model performance. AWS offers services like Amazon SageMaker Ground Truth for data labeling.","category":"Machine Learning Concepts","url":"https://aws.amazon.com/sagemaker/groundtruth/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Training vs. Inference","description":"Training is the phase where a model learns from data; inference is the phase where the trained model generates predictions or responses. The exam loves this distinction because training is usually heavier and less frequent, while inference powers production usage.","category":"AI/ML Fundamentals","url":"https://aws.amazon.com/compare/the-difference-between-machine-learning-and-predictive-analytics/","exams":["AIF-C01"],"entryType":"concept","domains":["Fundamentals of AI and ML"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Training-Serving Skew","description":"A problem that occurs when the data preprocessing or feature engineering pipeline used during training differs from the one used during inference. This causes the model to see different input distributions in production than it was trained on, leading to degraded performance. Solutions include using the same transformation code for both training and inference, using a Feature Store for consistent features, and monitoring for data drift in production.","category":"Machine Learning Concepts","url":"https://aws.amazon.com/sagemaker/feature-store/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Transfer Learning","description":"A machine learning technique where a model trained on one task is repurposed for a related task. In the context of foundation models, this enables leveraging pre-trained knowledge for specific applications with less training data and compute resources. | A machine learning technique where a model developed for one task is reused as the starting point for a model on a different task. In deep learning, this typically means using a pre-trained model (like ResNet for images or BERT for text) and fine-tuning it on your specific dataset. Transfer learning dramatically reduces training time and data requirements because the pre-trained model has already learned general features. Amazon SageMaker JumpStart provides pre-trained models for transfer learning.","category":"Machine Learning Concepts","url":"https://docs.aws.amazon.com/sagemaker/latest/dg/transfer-learning.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Transformer Architecture","description":"The foundational neural network architecture behind modern LLMs like GPT, Claude, and Amazon Titan. Introduced in the 'Attention Is All You Need' paper (2017), Transformers use 'self-attention' mechanisms to process entire sequences of text in parallel (not word-by-word like older RNNs). This allows them to understand long-range dependencies in text and train much faster on massive datasets. The 'T' in GPT stands for Transformer.","category":"Generative AI Concepts","url":"https://aws.amazon.com/what-is/transformers-in-artificial-intelligence/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Transformer Model","description":"The neural-network architecture that underpins most modern large language models. Self-attention is the big idea: the model learns which input tokens matter most relative to one another.","category":"Generative AI Concepts","url":"https://aws.amazon.com/what-is/transformers-in-artificial-intelligence/","exams":["AIF-C01"],"entryType":"concept","domains":["Fundamentals of Generative AI","Applications of Foundation Models"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Transit Gateway vs. VPC Peering","description":"VPC peering works well for simpler one-to-one connectivity, but Transit Gateway is the scalable hub-and-spoke choice for many VPCs, accounts, or hybrid links. The magic phrase is non-transitive peering versus centralized routing.","category":"Networking & Content Delivery","url":"https://aws.amazon.com/transit-gateway/","exams":["SAA-C03"],"entryType":"concept","domains":["Design Resilient Architectures","Design High-Performing Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Transparency","description":"The principle of making AI systems understandable to users and stakeholders. Includes disclosing when AI is being used, explaining how decisions are made, and providing information about data sources, limitations, and potential biases.","category":"Generative AI Concepts","url":"https://aws.amazon.com/ai/responsible-ai/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"Types of Bias in AI/ML","description":"Bias in AI refers to systematic errors in machine learning models that can lead to unfair or discriminatory outcomes. Understanding and mitigating bias is crucial for developing ethical AI systems. AWS SageMaker Clarify provides tools to detect and measure bias in datasets and models. Key bias types include: 1) Data Bias - occurs when training data doesn't accurately represent the population or contains historical biases. 2) Algorithm Bias - stems from the design and implementation of ML algorithms. 3) Interaction Bias - arises from how users interact with AI systems, potentially reinforcing existing biases. 4) Pre-training Bias - exists in the data before model training begins. 5) Post-training Bias - emerges after model deployment due to changing data distributions. Mitigation strategies include using diverse datasets, regular audits, fairness-aware algorithms, and tools like SageMaker Clarify for bias detection and explainability.","category":"Responsible AI Concepts","url":"https://docs.aws.amazon.com/sagemaker/latest/dg/clarify-fairness-bias.html","exams":["AIF-C01"],"entryType":"collection","is_collection":true,"collection_items":[{"name":"Data Bias","description":"Occurs when training data doesn't accurately represent the population or contains historical biases. Mitigation: Use diverse and representative datasets that cover a wide range of demographics and scenarios."},{"name":"Algorithm Bias","description":"Stems from the design and implementation of machine learning algorithms. Mitigation: Use fairness-aware algorithms and regularly audit model outputs for disparate impact."},{"name":"Interaction Bias","description":"Arises from the way users interact with AI systems, potentially reinforcing existing biases. Mitigation: Monitor user interactions and implement feedback loops to detect and correct biased behavior."},{"name":"Pre-training Bias","description":"Exists in the data before model training begins, such as class imbalance or label imbalance. Mitigation: Use SageMaker Clarify pre-training bias metrics like CI, DPL, KL, JS, LP, TVD, KS, and CDD."},{"name":"Post-training Bias","description":"Emerges after model deployment due to changing data distributions or model drift. Mitigation: Use SageMaker Clarify post-training metrics like DPPL, DI, DCAcc, DCR, and implement continuous monitoring."}],"sources":["aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Types of Machine Learning","description":"Machine learning algorithms can be categorized into three main types based on how they learn from data: 1) Supervised Learning - algorithms learn from labeled training data to make predictions. Includes regression (predicting continuous values) and classification (predicting discrete categories). 2) Unsupervised Learning - algorithms find patterns in unlabeled data without predefined outputs. Includes clustering (grouping similar data points) and dimensionality reduction. 3) Reinforcement Learning - algorithms learn through trial and error by interacting with an environment and receiving rewards or penalties. AWS SageMaker provides built-in algorithms for each type: Linear Learner for regression/classification, XGBoost for both classification and regression, K-Means for clustering, DeepAR for time-series forecasting, and BlazingText for text classification.","category":"Machine Learning Concepts","url":"https://docs.aws.amazon.com/sagemaker/latest/dg/algorithms-choose.html","exams":["AIF-C01"],"entryType":"collection","is_collection":true,"collection_items":[{"name":"Regression","description":"Supervised learning technique that predicts continuous numerical values. Used for forecasting, price prediction, and trend analysis. AWS SageMaker Linear Learner and XGBoost support regression tasks."},{"name":"Classification","description":"Supervised learning technique that assigns data to predefined categories or classes. Used for spam detection, image recognition, and sentiment analysis. AWS SageMaker provides Linear Learner, XGBoost, and BlazingText for classification."},{"name":"Clustering","description":"Unsupervised learning technique that groups data points based on similarity without predefined labels. Used for customer segmentation, anomaly detection, and pattern discovery. AWS SageMaker K-Means and Random Cut Forest support clustering."}],"sources":["aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Underfitting","description":"A machine learning problem where a model is too simple to capture the underlying patterns in the training data, resulting in poor performance on both training and test data. An underfit model fails to learn the relationships in the data, like using a straight line to fit data that follows a curve. Signs include low accuracy on both training and validation data. Solutions include using a more complex model, adding more relevant features, or reducing regularization.","category":"Machine Learning Concepts","url":"https://docs.aws.amazon.com/sagemaker/latest/dg/train-debugger.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Unsupervised Learning","description":"A machine learning approach that finds patterns or structure in unlabeled data. Clustering and dimensionality reduction are classic examples, and the key exam clue is that no target label is provided. | A machine learning approach where the model finds patterns in data without any labeled examples or predetermined outputs. The algorithm explores the data structure on its own. Common tasks include clustering (grouping similar items together), anomaly detection (finding outliers), and dimensionality reduction. Examples: customer segmentation, fraud detection, topic modeling. On AWS: Amazon Lookout for Metrics (anomaly detection) uses unsupervised learning.","category":"Machine Learning Concepts","url":"https://aws.amazon.com/what-is/unsupervised-learning/","exams":["AIF-C01"],"entryType":"concept","domains":["Fundamentals of AI and ML"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Vector Database","description":"A specialized database optimized for storing and querying vector embeddings. Instead of exact keyword matching, a vector database finds semantically similar items using 'nearest-neighbor' search. This is essential for RAG pipelines — you store your document embeddings here and retrieve the most relevant chunks when a user asks a question. AWS services include Amazon OpenSearch Service (with vector search) and Amazon Aurora pgvector.","category":"Generative AI Concepts","url":"https://aws.amazon.com/what-is/vector-databases/","exams":["AIF-C01"],"entryType":"concept","domains":["Fundamentals of Generative AI","Applications of Foundation Models"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Vectors","description":"Numerical representations of data in a multi-dimensional space where each dimension represents a feature. In NLP and generative AI, vectors (embeddings) represent words, sentences, or documents in a way that captures semantic meaning, enabling similarity comparisons and mathematical operations on text.","category":"Generative AI Concepts","url":"https://docs.aws.amazon.com/bedrock/latest/userguide/embeddings.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"Veracity","description":"The accuracy and truthfulness of AI system outputs. Ensuring veracity involves grounding responses in factual information, avoiding hallucinations, and providing accurate citations or sources where appropriate.","category":"Generative AI Concepts","url":"https://aws.amazon.com/ai/responsible-ai/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"Vertical Scaling","description":"A scaling approach that increases the capacity (CPU, memory, storage) of existing instances. Also known as scaling up, this approach has limits based on maximum instance sizes and requires downtime for changes, but may be simpler for applications not designed for distributed processing.","category":"Architecture Patterns","url":"https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/ec2-instance-resize.html","exams":["SAA-C03"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"VMware Cloud on AWS","description":"An integrated cloud offering jointly developed by AWS and VMware delivering a highly scalable, secure and innovative service that allows organizations to seamlessly migrate and extend their on-premises VMware vSphere-based environments to the AWS Cloud. | An integrated cloud offering jointly developed by AWS and VMware that delivers a scalable, secure, and innovative service allowing organizations to seamlessly migrate and extend their on-premises VMware vSphere-based environments to the AWS Cloud. Run VMware SDDC (Software-Defined Data Center) software — vSphere, vSAN, and NSX — on bare-metal AWS infrastructure. Enables hybrid cloud with consistent operations, tools, and processes across on-premises and AWS.","category":"Compute","url":"https://aws.amazon.com/vmware/","exams":["CLF-C02","SAA-C03"],"entryType":"service","domains":["Design Resilient Architectures","Design High-Performing Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"VPC Architecture","description":"The design and structure of Virtual Private Clouds, including subnets, route tables, gateways, and connectivity options. Good VPC architecture balances security, performance, and scalability while supporting high availability across Availability Zones.","category":"Networking & Content Delivery","url":"https://docs.aws.amazon.com/vpc/latest/userguide/what-is-amazon-vpc.html","exams":["SAA-C03"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"VPC Components","description":"Amazon VPC enables you to launch AWS resources into a virtual network that you've defined. Key components include: (1) Subnets - segments of a VPC's IP address range where you can place groups of isolated resources; public subnets have routes to Internet Gateway, private subnets do not. (2) Route Tables - contain rules (routes) that determine where network traffic is directed; each subnet must be associated with a route table. (3) Internet Gateway (IGW) - horizontally scaled, redundant VPC component that allows communication between VPC and internet; provides target for route table to enable internet access. (4) NAT Gateway - managed service that allows private subnet instances to connect to internet or AWS services while preventing internet from initiating connections; requires Elastic IP. (5) Security Groups - stateful virtual firewalls at instance level, control inbound and outbound traffic, allow rules only (implicit deny), evaluate all rules before deciding. (6) Network ACLs (NACLs) - stateless firewalls at subnet level, control traffic entering and leaving subnets, support both allow and deny rules, process rules in number order. (7) VPC Peering - networking connection between two VPCs enabling routing using private IP addresses; not transitive (peering is only between two VPCs). (8) Transit Gateway - network transit hub that interconnects VPCs, on-premises networks, and VPN connections; supports transitive routing, simplifies network architecture. (9) VPC Endpoints - enable private connectivity to AWS services without internet gateway, NAT device, or VPN; Gateway Endpoints for S3/DynamoDB, Interface Endpoints (PrivateLink) for most services.","category":"Networking","url":"https://docs.aws.amazon.com/vpc/latest/userguide/what-is-amazon-vpc.html","exams":["SAA-C03"],"entryType":"collection","is_collection":true,"collection_items":[{"name":"Subnets (Public/Private)","description":""},{"name":"Route Tables","description":""},{"name":"Internet Gateway (IGW)","description":"A horizontally scaled, redundant, and highly available VPC component that allows communication between your VPC and the public internet. An Internet Gateway performs two functions: it provides a target in your VPC route table for internet-routable traffic, and it performs network address translat..."},{"name":"NAT Gateway","description":"A fully managed AWS service that allows EC2 instances in a private subnet to initiate outbound connections to the internet (e.g., to download software patches) without allowing unsolicited inbound connections from the internet. It sits in a public subnet and translates the private IP addresses of..."},{"name":"Security Groups","description":"A virtual firewall for EC2 instances that controls inbound and outbound traffic at the instance level. Security groups are stateful, meaning return traffic is automatically allowed, and they support only allow rules (no deny rules)."},{"name":"Network ACLs (NACLs)","description":"An optional layer of security for VPCs that acts as a firewall for controlling traffic at the subnet level. Network ACLs are stateless and support both allow and deny rules, processed in order from lowest to highest rule number."},{"name":"VPC Peering","description":"A networking connection between two VPCs (in the same or different AWS accounts/regions) that lets them route traffic using private IP addresses, as if they are on the same network. Key limitation: VPC Peering is non-transitive — if VPC A is peered with B, and B is peered with C, traffic from A c..."},{"name":"Transit Gateway","description":""},{"name":"VPC Endpoints","description":""}],"sources":["aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"VPC Endpoint","description":"A private connection that lets resources in a VPC reach supported AWS services without traversing the public internet. The exam often uses VPC endpoints to improve security and sometimes reduce data-transfer costs.","category":"Networking & Content Delivery","url":"https://docs.aws.amazon.com/vpc/latest/privatelink/concepts.html","exams":["SAA-C03"],"entryType":"concept","domains":["Design Secure Architectures","Design High-Performing Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"VPC Networking Components","description":"The building blocks of Amazon VPC networking: Subnets (IP address ranges within VPC, public with IGW route or private without), Route Tables (define traffic routing rules), Internet Gateway (IGW — enables public internet access), NAT Gateway (allows private subnets outbound internet access), VPC Peering (connect two VPCs), Transit Gateway (hub-and-spoke connectivity), VPC Endpoints (private connection to AWS services), and Security Groups (stateful instance-level firewalls) / Network ACLs (stateless subnet-level firewalls).","category":"Architectural Concepts","url":"https://docs.aws.amazon.com/vpc/latest/userguide/how-it-works.html","exams":["SAA-C03"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"VPC Peering","description":"A networking connection between two VPCs (in the same or different AWS accounts/regions) that lets them route traffic using private IP addresses, as if they are on the same network. Key limitation: VPC Peering is non-transitive — if VPC A is peered with B, and B is peered with C, traffic from A cannot reach C through B. For complex, many-to-many VPC connectivity, AWS Transit Gateway is the preferred solution.","category":"Networking & Content Delivery","url":"https://docs.aws.amazon.com/vpc/latest/peering/what-is-vpc-peering.html","exams":["SAA-C03"],"entryType":"service","domains":["Design Resilient Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Warm Standby","description":"A disaster recovery pattern where a scaled-down but functional copy of the production environment runs in the recovery region. It costs more than pilot light but generally recovers faster.","category":"Architecture Patterns","url":"https://docs.aws.amazon.com/whitepapers/latest/disaster-recovery-workloads-on-aws/disaster-recovery-options-in-the-cloud.html","exams":["SAA-C03"],"entryType":"concept","domains":["Design Resilient Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Word Embeddings","description":"Numerical vector representations of words that capture semantic meaning — words with similar meanings have similar vectors. Popular word embedding techniques include Word2Vec, GloVe, and FastText. Word embeddings enable machines to understand that 'king' and 'queen' are related similarly to 'man' and 'woman.' Modern LLMs use contextual embeddings where a word's representation depends on its surrounding context. Amazon Titan Embeddings provides word and sentence embeddings.","category":"Machine Learning Concepts","url":"https://aws.amazon.com/what-is/embeddings-in-machine-learning/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Word Filters","description":"A feature in Amazon Bedrock Guardrails that allows you to define specific words, phrases, or patterns that should be blocked in AI inputs or outputs. You can configure custom profanity filters, block specific terminology, or prevent the disclosure of internal code names. Word filters work alongside content filtering and denied topics to give you fine-grained control over what your AI application can say or hear.","category":"Responsible AI Concepts","url":"https://aws.amazon.com/bedrock/guardrails/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Workflow Orchestration","description":"The coordination and management of multi-step processes, typically involving multiple services and components. AWS Step Functions provides visual workflow orchestration for serverless applications, enabling reliable execution of complex business processes.","category":"Application Integration","url":"https://docs.aws.amazon.com/step-functions/latest/dg/welcome.html","exams":["SAA-C03"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"Zero-Shot Prompting","description":"A prompting style where the model is asked to perform a task without any worked examples in the prompt. It is fast and simple, but may be less reliable than few-shot approaches for tricky tasks. | A prompting technique where the AI model is asked to perform a task without any examples. The model must rely entirely on its pre-trained knowledge to understand and complete the task. For example: 'Summarize this article' with no example summaries provided. Zero-shot works well for straightforward tasks the model was broadly trained on, but may be less accurate than few-shot for specialized tasks.","category":"Generative AI Concepts","url":"https://docs.aws.amazon.com/bedrock/latest/userguide/prompt-engineering-guidelines.html","exams":["AIF-C01"],"entryType":"concept","domains":["Fundamentals of Generative AI","Applications of Foundation Models"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]}];

// ══════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════
let filtered = [];
let rendered = 0;
const BATCH = 40;
let sortCoreName = true;
let observer = null;

// ══════════════════════════════════════════════════════
// DOM
// ══════════════════════════════════════════════════════
const $grid      = document.getElementById('grid');
const $noRes     = document.getElementById('noResults');
const $loading   = document.getElementById('loadingIndicator');
const $sentinel  = document.getElementById('sentinel');
const $count     = document.getElementById('countLabel');
const $fExam     = document.getElementById('fExam');
const $fCat      = document.getElementById('fCat');
const $fType     = document.getElementById('fType');
const $fSearch   = document.getElementById('fSearch');
const $searchClr = document.getElementById('searchClear');
const $sortBtn   = document.getElementById('sortBtn');
const $statsBar  = document.getElementById('statsBar');
const $bttBtn    = document.getElementById('bttBtn');

// ══════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════
(function init() {
    populateCategories();
    buildStats();
    applyFilters();
    setupIO();
    setupListeners();
})();

function populateCategories() {
    const cats = [...new Set(GLOSSARY.map(e => e.category))].sort();
    $fCat.innerHTML = '<option value="all">All Categories (' + cats.length + ')</option>';
    cats.forEach(c => {
        const o = document.createElement('option');
        o.value = c; o.textContent = c;
        $fCat.appendChild(o);
    });
}

function buildStats() {
    const total = GLOSSARY.length;
    const colls = GLOSSARY.filter(e => e.is_collection).length;
    const exams = {};
    GLOSSARY.forEach(e => (e.exams||[]).forEach(x => { exams[x] = (exams[x]||0) + 1; }));
    let html = `<span class="chip">${total} total terms</span>`;
    Object.keys(exams).sort().forEach(x => { html += `<span class="chip">${x}: ${exams[x]}</span>`; });
    html += `<span class="chip">${colls} collections</span>`;
    $statsBar.innerHTML = html;
}

// ══════════════════════════════════════════════════════
// FILTERING & SORTING
// ══════════════════════════════════════════════════════
function sortKey(name) {
    const n = name.trim();
    if (n.startsWith('Amazon ')) return n.substring(7);
    if (n.startsWith('AWS '))    return n.substring(4);
    return n;
}

function applyFilters() {
    const exam   = $fExam.value;
    const cat    = $fCat.value;
    const etype  = $fType.value;
    const search = $fSearch.value.toLowerCase().trim();

    $searchClr.classList.toggle('show', search.length > 0);

    let list = GLOSSARY;
    if (exam !== 'all')  list = list.filter(e => (e.exams||[]).includes(exam));
    if (cat  !== 'all')  list = list.filter(e => e.category === cat);
    if (etype !== 'all') {
        if (etype === 'collection') list = list.filter(e => e.is_collection);
        else list = list.filter(e => e.entryType === etype && !e.is_collection);
    }
    if (search) {
        const terms = search.split(/\s+/);
        list = list.filter(e => {
            const hay = (e.name + ' ' + e.description + ' ' + e.category + ' ' + (e.domains||[]).join(' ')).toLowerCase();
            return terms.every(t => hay.includes(t));
        });
    }

    if (sortCoreName) {
        list = [...list].sort((a, b) => sortKey(a.name).localeCompare(sortKey(b.name)));
    } else {
        list = [...list].sort((a, b) => a.name.localeCompare(b.name));
    }

    filtered = list;
    rendered = 0;
    $grid.innerHTML = '';
    $noRes.style.display = list.length === 0 ? '' : 'none';
    $count.textContent = list.length + ' terms';
    renderBatch();
}

// ══════════════════════════════════════════════════════
// RENDERING (lazy batches)
// ══════════════════════════════════════════════════════
function avatarClass(ch) {
    const c = ch.toLowerCase();
    if (c >= 'a' && c <= 'z') return 'av-' + c;
    return 'av-other';
}

function examClass(exams) {
    if (!exams || exams.length === 0) return '';
    if (exams.length > 1) return 'exam-multi';
    if (exams[0] === 'AIF-C01') return 'exam-aif';
    if (exams[0] === 'SAA-C03') return 'exam-saa';
    return 'exam-clf';
}

function examBadges(exams) {
    return (exams||[]).map(x => {
        const cls = x === 'AIF-C01' ? 'tag-aif' : x === 'SAA-C03' ? 'tag-saa' : 'tag-clf';
        return '<span class="tag ' + cls + '">' + x + '</span>';
    }).join('');
}

function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatDesc(raw) {
    // Split on " | " separator and rejoin with visual separator
    const parts = raw.split(' | ');
    if (parts.length <= 1) return escHtml(raw);
    return parts.map(p => escHtml(p.trim())).join(' <span class="desc-sep">⦁</span> ');
}

function renderCard(entry, idx) {
    const initial = entry.name.charAt(0).toUpperCase();
    const eClass  = examClass(entry.exams);
    const collCls = entry.is_collection ? ' is-collection' : '';
    const typeBadge = entry.entryType
        ? '<span class="tag tag-type ' + entry.entryType + '">' + entry.entryType + '</span>' : '';

    let collHtml = '';
    if (entry.is_collection && entry.collection_items && entry.collection_items.length) {
        const items = entry.collection_items;
        collHtml = '<div class="coll-items" id="coll-' + idx + '">';
        items.forEach(it => {
            collHtml += '<div class="coll-item"><div class="coll-item-name">' + escHtml(it.name) + '</div>';
            if (it.description) collHtml += '<div class="coll-item-desc">' + escHtml(it.description) + '</div>';
            collHtml += '</div>';
        });
        collHtml += '</div>';
        collHtml += '<button class="coll-toggle" data-coll="coll-' + idx + '">▸ Show ' + items.length + ' collection items</button>';
    }

    let domainsHtml = '';
    if (entry.domains && entry.domains.length) {
        domainsHtml = '<div class="domains">' + entry.domains.map(d => '<span class="domain-chip">' + escHtml(d) + '</span>').join('') + '</div>';
    }

    const sourcesCount = (entry.sources||[]).length;
    const sourcesHtml = sourcesCount ? '<div class="sources-line">' + sourcesCount + ' source' + (sourcesCount > 1 ? 's' : '') + '</div>' : '';

    const div = document.createElement('div');
    div.className = 'card ' + eClass + collCls;
    div.innerHTML =
        '<div class="card-head">' +
            '<div class="avatar ' + avatarClass(initial) + '">' + initial + '</div>' +
            '<div style="flex:1;min-width:0">' +
                '<div class="card-title">' + escHtml(entry.name) + '</div>' +
                '<div class="card-tags">' +
                    '<span class="tag-cat">' + escHtml(entry.category) + '</span> ' +
                    examBadges(entry.exams) + ' ' + typeBadge +
                '</div>' +
            '</div>' +
        '</div>' +
        '<div class="card-desc" id="desc-' + idx + '">' + formatDesc(entry.description) + '</div>' +
        domainsHtml +
        '<div class="card-footer">' +
            (entry.url ? '<a class="card-link" href="' + escHtml(entry.url) + '" target="_blank" rel="noopener noreferrer">Learn More →</a>' : '<span></span>') +
            '<button class="expand-btn" data-desc="desc-' + idx + '">more ▾</button>' +
        '</div>' +
        collHtml +
        sourcesHtml;

    return div;
}

function renderBatch() {
    if (rendered >= filtered.length) {
        $loading.style.display = 'none';
        return;
    }
    const end = Math.min(rendered + BATCH, filtered.length);
    const frag = document.createDocumentFragment();
    for (let i = rendered; i < end; i++) {
        frag.appendChild(renderCard(filtered[i], i));
    }
    $grid.appendChild(frag);
    rendered = end;
    $loading.style.display = rendered < filtered.length ? '' : 'none';
}

// ══════════════════════════════════════════════════════
// INTERSECTION OBSERVER (infinite scroll)
// ══════════════════════════════════════════════════════
function setupIO() {
    observer = new IntersectionObserver(entries => {
        if (entries[0].isIntersecting && rendered < filtered.length) {
            renderBatch();
        }
    }, { rootMargin: '400px' });
    observer.observe($sentinel);
}

// ══════════════════════════════════════════════════════
// EVENT LISTENERS
// ══════════════════════════════════════════════════════
function setupListeners() {
    $fExam.addEventListener('change', applyFilters);
    $fCat.addEventListener('change', applyFilters);
    $fType.addEventListener('change', applyFilters);

    let debounce;
    $fSearch.addEventListener('input', () => {
        clearTimeout(debounce);
        debounce = setTimeout(applyFilters, 200);
    });
    $searchClr.addEventListener('click', () => {
        $fSearch.value = '';
        applyFilters();
        $fSearch.focus();
    });

    $sortBtn.addEventListener('click', () => {
        sortCoreName = !sortCoreName;
        $sortBtn.textContent = sortCoreName ? 'Core Name ▲' : 'Full Name ▲';
        $sortBtn.classList.toggle('active', sortCoreName);
        applyFilters();
    });

    // Delegated click: expand description & toggle collections
    $grid.addEventListener('click', e => {
        const expBtn = e.target.closest('.expand-btn');
        if (expBtn) {
            const descEl = document.getElementById(expBtn.dataset.desc);
            if (descEl) {
                const isExpanded = descEl.classList.toggle('expanded');
                expBtn.textContent = isExpanded ? 'less ▴' : 'more ▾';
            }
            return;
        }
        const collBtn = e.target.closest('.coll-toggle');
        if (collBtn) {
            const collEl = document.getElementById(collBtn.dataset.coll);
            if (collEl) {
                const isOpen = collEl.classList.toggle('open');
                const count = collEl.children.length;
                collBtn.textContent = isOpen ? '▾ Hide collection items' : '▸ Show ' + count + ' collection items';
            }
            return;
        }
    });

    // Back to top
    window.addEventListener('scroll', () => {
        $bttBtn.classList.toggle('show', window.scrollY > 600);
    }, { passive: true });
    $bttBtn.addEventListener('click', () => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    // Keyboard: Escape clears search
    document.addEventListener('keydown', e => {
        if (e.key === 'Escape' && document.activeElement === $fSearch) {
            $fSearch.value = '';
            applyFilters();
        }
    });
}
</script>
</body>
</html>
