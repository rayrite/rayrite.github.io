or respond to hidden triggers embedded by attackers.","category":"GenAI Security","url":"https://aws.amazon.com/ai/responsible-ai/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"Data Preprocessing","description":"The set of steps used to clean, normalize, encode, filter, and otherwise prepare raw data before model training or inference. In exam questions, preprocessing sits between data collection and model training in the lifecycle.","category":"AI/ML Fundamentals","url":"https://docs.aws.amazon.com/prescriptive-guidance/latest/ml-operations-planning/data-preparation.html","exams":["AIF-C01"],"entryType":"concept","domains":["Fundamentals of AI and ML"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Data Privacy in AI","description":"Protecting personal and sensitive information throughout the AI lifecycle, from data collection through model training and deployment. Includes implementing data minimization, anonymization, and access controls to ensure compliance with privacy regulations.","category":"GenAI Security","url":"https://docs.aws.amazon.com/bedrock/latest/userguide/data-protection.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"Data Quality","description":"The overall fitness of data for an AI use case, including completeness, accuracy, consistency, timeliness, and representativeness. Poor data quality poisons models fast, which is why it also shows up in governance and responsible-AI discussions.","category":"AI/ML Fundamentals","url":"https://docs.aws.amazon.com/prescriptive-guidance/latest/ml-operations-planning/data-quality.html","exams":["AIF-C01"],"entryType":"concept","domains":["Fundamentals of AI and ML","Security, Compliance, and Governance for AI Solutions"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Data Retention in AI Systems","description":"Policies and practices for managing how long data used in AI systems is stored, including training data, inference logs, and model artifacts. Proper retention policies balance operational needs, compliance requirements, and privacy considerations.","category":"GenAI Security","url":"https://docs.aws.amazon.com/bedrock/latest/userguide/data-protection.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"Data Streaming","description":"A pattern where records are ingested and processed continuously rather than in large periodic batches. In SAA-C03, think Kinesis, MSK, EMR, Lambda, and downstream analytics or alerting workflows.","category":"Analytics","url":"https://aws.amazon.com/streaming-data/","exams":["SAA-C03"],"entryType":"concept","domains":["Design Resilient Architectures","Design High-Performing Architectures"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Database Selection Criteria","description":"Guidelines for choosing the right AWS database service based on workload requirements. Relational (RDS/Aurora): structured data, complex queries, ACID transactions, strong consistency. NoSQL (DynamoDB): key-value/document, massive scale, single-digit ms latency, flexible schema. In-Memory (ElastiCache/MemoryDB): caching, real-time leaderboards, session stores. Graph (Neptune): highly connected data, relationships, fraud detection. Time-Series (Timestream): IoT, metrics, events. Document (DocumentDB): JSON-like documents, content management.","category":"Architectural Concepts","url":"https://aws.amazon.com/products/databases/","exams":["SAA-C03"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"DDoS Protection","description":"Measures to protect applications from Distributed Denial of Service attacks that attempt to overwhelm services with traffic. AWS provides AWS Shield Standard (automatic) and AWS Shield Advanced (enhanced protection) for DDoS mitigation.","category":"Security, Identity, & Compliance","url":"https://docs.aws.amazon.com/waf/latest/developerguide/shield-chapter.html","exams":["SAA-C03"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"Dead Letter Queue (DLQ)","description":"A queue that receives messages that could not be processed successfully by a consumer. DLQs help isolate problematic messages for analysis and prevent them from blocking the processing of other messages in the main queue.","category":"Application Integration","url":"https://docs.aws.amazon.com/AWSSimpleQueueService/latest/SQSDeveloperGuide/sqs-dead-letter-queues.html","exams":["SAA-C03"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"Deep Learning","description":"A subset of machine learning that uses multi-layer neural networks to learn complex patterns from data such as images, text, and audio. Deep learning is what powers many modern computer vision and generative AI systems. | A subset of machine learning that uses neural networks with multiple layers (hence 'deep') to model complex patterns in data. Deep learning excels at tasks like image recognition, natural language processing, and speech recognition. It requires large amounts of data and significant compute power (GPUs or specialized chips like AWS Trainium). Deep learning powers services like Amazon Rekognition (image analysis) and Amazon Transcribe (speech-to-text).","category":"Machine Learning Concepts","url":"https://aws.amazon.com/what-is/deep-learning/","exams":["AIF-C01"],"entryType":"concept","domains":["Fundamentals of AI and ML"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Denied Topics","description":"A feature in Amazon Bedrock Guardrails that allows you to define topics that the AI should refuse to discuss. You configure a list of denied topics (e.g., 'competitor products,' 'legal advice,' 'medical diagnosis') with example phrases, and the guardrail will block any conversation that attempts to engage the model on those topics. This helps ensure AI applications stay within their intended scope and don't provide inappropriate responses.","category":"Responsible AI Concepts","url":"https://aws.amazon.com/bedrock/guardrails/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Differential Privacy","description":"A mathematical framework for sharing information about datasets while withholding information about individuals in the dataset. It adds carefully calibrated noise to data or query results to ensure that the presence or absence of any single individual cannot be determined. Differential privacy enables training AI models on sensitive data while providing strong privacy guarantees. AWS supports differential privacy in services like AWS Clean Rooms for privacy-preserving data analysis.","category":"Responsible AI Concepts","url":"https://aws.amazon.com/clean-rooms/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Diffusion Model","description":"A generative model family commonly used for image generation. It learns to create outputs by reversing a noise-adding process, which is why diffusion is frequently associated with modern text-to-image systems.","category":"Generative AI Concepts","url":"https://aws.amazon.com/what-is/diffusion-models/","exams":["AIF-C01"],"entryType":"concept","domains":["Fundamentals of Generative AI","Applications of Foundation Models"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Diffusion Models","description":"A class of generative AI models that learn to generate data by gradually removing noise from random samples. These models have achieved state-of-the-art results in image generation and are used in tools like Stable Diffusion and DALL-E for creating high-quality images from text descriptions. | A class of generative AI models that create data (typically images) by reversing a gradual noise-adding process. The model learns to denoise random noise step-by-step until a coherent image emerges. Stable Diffusion and Amazon Titan Image Generator use this approach. Diffusion models are particularly good at generating high-quality, diverse images and allow fine-grained control through text prompts. They differ from GANs (Generative Adversarial Networks) in their training approach and output characteristics.","category":"Generative AI Concepts","url":"https://docs.aws.amazon.com/bedrock/latest/userguide/model-parameters-stability-diffusion.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Dimensionality Reduction","description":"Techniques for reducing the number of features (dimensions) in a dataset while preserving important information. Common methods include Principal Component Analysis (PCA), t-SNE, and UMAP. Dimensionality reduction helps visualize high-dimensional data, reduce computational requirements, and remove noise. It's often used as a preprocessing step before training models on datasets with many features. SageMaker provides built-in algorithms for dimensionality reduction.","category":"Machine Learning Concepts","url":"https://docs.aws.amazon.com/sagemaker/latest/dg/pca.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Direct Connect vs. VPN","description":"Direct Connect provides a dedicated private network connection with more consistent bandwidth and latency, while VPN is faster to set up and usually cheaper because it runs over the public internet. The exam often frames this as performance/consistency versus convenience/cost.","category":"Networking & Content Delivery","url":"https://aws.amazon.com/directconnect/","exams":["SAA-C03"],"entryType":"concept","domains":["Design Secure Architectures","Design High-Performing Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Disaster Recovery Strategies","description":"A spectrum of approaches for recovering from disasters, ranging from lowest cost/longest recovery to highest cost/shortest recovery. Four main strategies: (1) Backup and Restore — lowest cost, highest RTO/RPO (hours/days); (2) Pilot Light — core systems always running, data replicated, other resources started when needed (RTO: 10s of minutes); (3) Warm Standby — scaled-down but fully functional copy always running (RTO: minutes); (4) Multi-Site Active-Active — full production capacity distributed across sites (RTO: near zero).","category":"Architectural Concepts","url":"https://aws.amazon.com/blogs/architecture/disaster-recovery-dr-architecture-on-aws-part-1-strategies-for-recovery-in-the-cloud/","exams":["SAA-C03"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"DynamoDB Accelerator (DAX)","description":"A fully managed, in-memory caching service that is purpose-built for Amazon DynamoDB. It delivers microsecond read latency (vs. DynamoDB's single-digit millisecond). DAX is API-compatible with DynamoDB, so your application code changes are minimal. It is write-through, meaning data is written to both the cache and DynamoDB simultaneously. The go-to answer for DynamoDB read performance problems.","category":"Database","url":"https://aws.amazon.com/dynamodb/dax/","exams":["SAA-C03"],"entryType":"service","domains":["Design High-Performing Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"DynamoDB Features","description":"Amazon DynamoDB is a fully managed NoSQL database service providing fast and predictable performance. Key features include: (1) Key-Value and Document Store - flexible data model supporting key-value and document data structures, schema-less design allows evolving data models. (2) On-Demand Capacity - pay-per-request pricing for unpredictable workloads, no capacity planning required, automatically scales to handle any traffic. (3) Provisioned Capacity - specify read/write capacity units for predictable workloads, auto-scaling adjusts capacity based on traffic patterns, reserved capacity offers discounts for long-term commitments. (4) DynamoDB Accelerator (DAX) - fully managed in-memory caching service, microsecond latency for read-heavy workloads, compatible with existing DynamoDB API calls. (5) Global Tables - multi-region, multi-active database for globally distributed applications, automatic conflict resolution, replication across AWS regions for low-latency access. (6) DynamoDB Streams - captures item-level changes in real-time, enables event-driven architectures, integrates with Lambda for serverless processing, supports cross-region replication. (7) Time to Live (TTL) - automatically expires items after a specified timestamp, deletes stale data without consuming write capacity, useful for session data, temporary data, and data retention policies. (8) Transactions - ACID transactions across multiple items and tables, support for atomicity, consistency, isolation, and durability.","category":"Database","url":"https://docs.aws.amazon.com/amazondynamodb/latest/developerguide/Introduction.html","exams":["SAA-C03"],"entryType":"collection","is_collection":true,"collection_items":[{"name":"Key-Value and Document Store","description":""},{"name":"On-Demand Capacity Mode","description":""},{"name":"Provisioned Capacity Mode","description":""},{"name":"DynamoDB Accelerator (DAX)","description":"A fully managed, in-memory caching service that is purpose-built for Amazon DynamoDB. It delivers microsecond read latency (vs. DynamoDB's single-digit millisecond). DAX is API-compatible with DynamoDB, so your application code changes are minimal. It is write-through, meaning data is written to ..."},{"name":"Global Tables","description":""},{"name":"DynamoDB Streams","description":"An optional feature of Amazon DynamoDB that captures a time-ordered log of all item-level changes (inserts, updates, deletes) in a table. Each event is retained for 24 hours. A common pattern is to trigger an AWS Lambda function from a DynamoDB Stream, creating event-driven architectures. Use cas..."},{"name":"Time to Live (TTL)","description":""},{"name":"Transactions","description":""}],"sources":["aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"DynamoDB Global Tables","description":"A fully managed, multi-region, multi-active (active-active) database replication feature for Amazon DynamoDB. Your table is replicated across multiple AWS Regions, and you can read AND write to any replica — there is no single 'primary' region. DynamoDB handles conflict resolution automatically using 'last writer wins.' This is the solution for globally distributed applications that need low-latency reads and writes worldwide.","category":"Database","url":"https://aws.amazon.com/dynamodb/global-tables/","exams":["SAA-C03"],"entryType":"service","domains":["Design High-Performing Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"DynamoDB Streams","description":"An optional feature of Amazon DynamoDB that captures a time-ordered log of all item-level changes (inserts, updates, deletes) in a table. Each event is retained for 24 hours. A common pattern is to trigger an AWS Lambda function from a DynamoDB Stream, creating event-driven architectures. Use cases include: replicating data to other systems, sending notifications on data changes, and building audit trails.","category":"Database","url":"https://docs.aws.amazon.com/amazondynamodb/latest/developerguide/Streams.html","exams":["SAA-C03"],"entryType":"service","domains":["Design High-Performing Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"EBS Volume Types","description":"Different types of Elastic Block Store volumes optimized for specific workloads: gp3 (general purpose SSD), io2 Block Express (highest performance), st1 (throughput-optimized HDD), and sc1 (cold HDD). Choice depends on performance requirements and cost considerations. | Amazon EBS provides persistent block storage volumes for EC2 instances. (1) gp3 (General Purpose SSD) - latest generation, baseline 3,000 IOPS and 125 MB/s throughput included at no additional cost, can scale up to 16,000 IOPS and 1,000 MB/s independently, most cost-effective option for most workloads; use cases include boot volumes, development/test environments, and general-purpose applications. (2) gp2 (General Purpose SSD) - previous generation, performance tied to volume size (3 IOPS per GB), burst capability up to 3,000 IOPS for volumes under 1 TB; legacy use only, migrate to gp3. (3) io2 (Provisioned IOPS SSD) - designed for I/O-intensive workloads, supports up to 64,000 IOPS and 1,000 MB/s per volume, 99.999% durability, supports Multi-Attach; use cases include production databases and latency-sensitive applications. (4) io2 Block Express - highest performance SSD, up to 256,000 IOPS and 4,000 MB/s, sub-millisecond latency; use cases for most demanding database workloads. (5) io1 (Provisioned IOPS SSD) - legacy provisioned IOPS, supports up to 64,000 IOPS; migrate to io2 for better durability and performance. (6) st1 (Throughput Optimized HDD) - low-cost HDD designed for frequently accessed, throughput-intensive workloads, up to 500 IOPS and 500 MB/s; use cases include big data, data warehouses, log processing, and streaming workloads. (7) sc1 (Cold HDD) - lowest cost HDD designed for less frequently accessed workloads, up to 250 IOPS and 250 MB/s; use cases include archival data, infrequently accessed file shares, and backup storage.","category":"Storage","url":"https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/ebs-volume-types.html","exams":["SAA-C03"],"entryType":"collection","is_collection":true,"collection_items":[{"name":"gp3 (General Purpose SSD)","description":""},{"name":"gp2 (General Purpose SSD) - legacy","description":""},{"name":"io2 (Provisioned IOPS SSD)","description":""},{"name":"io2 Block Express","description":""},{"name":"io1 (Provisioned IOPS SSD) - legacy","description":""},{"name":"st1 (Throughput Optimized HDD)","description":""},{"name":"sc1 (Cold HDD)","description":""}],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"EC2 Auto Scaling Lifecycle Hooks","description":"A feature of EC2 Auto Scaling that lets you pause an instance during scale-out (launching) or scale-in (terminating) events to perform custom actions before the instance enters or leaves service. On scale-out, you might use a hook to install software, run health checks, or register the instance with a service discovery system. On scale-in, you might drain active user sessions or copy logs before termination. Instances remain paused until you signal completion or a timeout occurs.","category":"Compute","url":"https://docs.aws.amazon.com/autoscaling/ec2/userguide/lifecycle-hooks.html","exams":["SAA-C03"],"entryType":"concept","domains":["Design High-Performing Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"EC2 Instance Categories","description":"Amazon EC2 provides a wide selection of instance types optimized to fit different use cases. Instance types comprise varying combinations of CPU, memory, storage, and networking capacity. (1) General Purpose (M, T series) - provide a balance of compute, memory, and networking resources; use cases include web servers, code repositories, small/medium databases, development environments, and business applications. (2) Compute Optimized (C series) - ideal for compute-bound applications that benefit from high-performance processors; use cases include batch processing, gaming servers, high-performance computing (HPC), scientific modeling, and machine learning inference. (3) Memory Optimized (R, X, Z series) - designed to deliver fast performance for workloads that process large datasets in memory; use cases include high-performance databases (SQL/NoSQL), big data analytics (Spark, Hadoop), real-time data processing, in-memory caches (Redis, Memcached), and enterprise applications. (4) Storage Optimized (I, D, H series) - designed for workloads that require high, sequential read and write access to large datasets on local storage; use cases include data warehousing, big data workloads, distributed file systems, log processing, and online transaction processing. (5) Accelerated Computing (P, G, F, Inf series) - use hardware accelerators (GPUs, FPGAs) to perform functions like floating-point number calculations, graphics processing, and data pattern matching more efficiently; use cases include machine learning training/inference, graphics rendering, video transcoding, and scientific simulations.","category":"Compute","url":"https://docs.aws.amazon.com/ec2/latest/instancetypes/instance-types.html","exams":["SAA-C03"],"entryType":"collection","is_collection":true,"collection_items":[{"name":"General Purpose (M, T series)","description":""},{"name":"Compute Optimized (C series)","description":""},{"name":"Memory Optimized (R, X, Z series)","description":""},{"name":"Storage Optimized (I, D, H series)","description":""},{"name":"Accelerated Computing (P, G, F series)","description":""}],"sources":["aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"EC2 Instance Families","description":"The broad EC2 optimization groupings such as general purpose, compute optimized, memory optimized, storage optimized, and accelerated computing. SAA-C03 often tests choosing the family before the exact size.","category":"Compute","url":"https://aws.amazon.com/ec2/instance-types/","exams":["SAA-C03"],"entryType":"concept","domains":["Design High-Performing Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"EC2 Instance Store","description":"Physically attached, ephemeral (temporary) block storage directly on the host server of an EC2 instance. It provides very high I/O throughput because there is no network hop — the disk is literally inside the same physical machine. The critical limitation: if the EC2 instance is stopped, terminated, or the underlying hardware fails, ALL data on the instance store is permanently lost. Best for temporary data: caches, buffers, scratch space.","category":"Storage","url":"https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/InstanceStorage.html","exams":["SAA-C03"],"entryType":"service","domains":["Design High-Performing Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"EC2 Instance Types","description":"Categories of EC2 instances optimized for different use cases: General Purpose, Compute Optimized, Memory Optimized, Storage Optimized, and Accelerated Computing. Each type provides different ratios of CPU, memory, storage, and networking capacity.","category":"Compute","url":"https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/instance-types.html","exams":["SAA-C03"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"EC2 Placement Groups","description":"A configuration that controls how EC2 instances are physically placed within AWS infrastructure. Three strategies: (1) Cluster — packs instances close together in a single AZ for ultra-low latency, high-bandwidth networking (HPC use case); (2) Spread — places instances across distinct physical hardware to maximize resilience (critical instances); (3) Partition — divides instances into logical partitions on separate racks, balancing performance and fault isolation (Hadoop, Cassandra).","category":"Compute","url":"https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/placement-groups.html","exams":["SAA-C03"],"entryType":"service","domains":["Design High-Performing Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"EC2 Reserved Instances","description":"A pricing commitment where you reserve EC2 capacity for 1 or 3 years in exchange for a significant discount (up to 72%) compared to On-Demand. Standard RIs offer the biggest discount but less flexibility. Convertible RIs offer a smaller discount but let you change the instance family, OS, or tenancy during the term. Best for steady-state, predictable workloads where you know your baseline compute needs. Not a physical reservation — it's a billing discount.","category":"Compute","url":"https://aws.amazon.com/ec2/pricing/reserved-instances/","exams":["SAA-C03"],"entryType":"service","domains":["Design High-Performing Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"EC2 Spot Instances","description":"Unused EC2 capacity available at discounts of up to 90% compared to On-Demand pricing. The trade-off: AWS can reclaim (interrupt) Spot Instances with a 2-minute warning when it needs the capacity back. This makes them ideal for fault-tolerant, flexible, stateless workloads: batch processing, big data analytics, CI/CD test runners, and image rendering. Never use Spot for persistent databases or applications that cannot tolerate interruption.","category":"Compute","url":"https://aws.amazon.com/ec2/spot/","exams":["SAA-C03"],"entryType":"service","domains":["Design High-Performing Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Edge Locations","description":"AWS data centers positioned in major cities worldwide that cache content for CloudFront and provide endpoints for other edge services. Content is delivered from the nearest edge location to minimize latency for end users.","category":"Networking & Content Delivery","url":"https://docs.aws.amazon.com/AmazonCloudFront/latest/DeveloperGuide/Overview.html","exams":["SAA-C03"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"Elastic Load Balancer Types","description":"AWS Elastic Load Balancing (ELB) automatically distributes incoming application traffic across multiple targets. (1) Application Load Balancer (ALB) - operates at Layer 7 (application layer), supports HTTP/HTTPS protocols, provides advanced routing features including path-based routing, host-based routing, and support for containerized applications; best for web applications, microservices, and container-based architectures requiring content-based routing. (2) Network Load Balancer (NLB) - operates at Layer 4 (transport layer), supports TCP, UDP, and TLS protocols, provides ultra-low latency, handles millions of requests per second, preserves client IP address, and offers static IP per AZ with Elastic IP support; best for TCP/UDP traffic, gaming, IoT, and applications requiring extreme performance and static IP addresses. (3) Gateway Load Balancer (GWLB) - operates at Layer 3 (network layer), provides transparent network gateway for third-party virtual appliances (firewalls, intrusion detection systems), uses GENEVE protocol for encapsulation, and maintains flow stickiness to specific appliance instances; best for deploying, scaling, and managing third-party network security appliances. (4) Classic Load Balancer (CLB) - previous generation, operates at both Layer 4 and Layer 7, limited features compared to newer types; only recommended for existing EC2-Classic network deployments.","category":"Networking","url":"https://docs.aws.amazon.com/elasticloadbalancing/latest/userguide/what-is-load-balancing.html","exams":["SAA-C03"],"entryType":"collection","is_collection":true,"collection_items":[{"name":"Application Load Balancer (ALB)","description":"An Elastic Load Balancer that operates at Layer 7 (the Application layer) of the OSI model. Because it understands HTTP/HTTPS, it can make intelligent routing decisions based on URL path (e.g., /api/* → server A, /images/* → server B), hostname, query strings, and HTTP headers. It natively suppor..."},{"name":"Network Load Balancer (NLB)","description":"An Elastic Load Balancer that operates at Layer 4 (Transport layer), routing TCP, UDP, and TLS traffic. It is designed for extreme performance — handling millions of requests per second with ultra-low latency (single-digit milliseconds). A key feature is its ability to preserve the client's sourc..."},{"name":"Gateway Load Balancer (GWLB)","description":"A specialized load balancer used to deploy, scale, and manage fleets of third-party virtual network appliances — like firewalls, intrusion detection systems (IDS), and deep packet inspection tools. Traffic is transparently routed through these appliances before reaching your application, allowing..."},{"name":"Classic Load Balancer (CLB) - legacy","description":""}],"sources":["aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Elastic Load Balancing","description":"Automatically distributes incoming application traffic across multiple targets, such as Amazon EC2 instances, containers, IP addresses, and Lambda functions.","category":"Networking & Content Delivery","url":"https://aws.amazon.com/elasticloadbalancing/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Elastic Load Balancing (ELB)","description":"The umbrella load-balancing service family on AWS that includes Application Load Balancer, Network Load Balancer, and Gateway Load Balancer. SAA-C03 repeatedly tests choosing the right load balancer for HTTP, TCP/UDP/TLS, or appliance inspection traffic. | A service that automatically distributes incoming application traffic across multiple targets, such as EC2 instances, containers, and IP addresses, in one or more Availability Zones. Three types: Application Load Balancer (ALB — Layer 7, HTTP/HTTPS), Network Load Balancer (NLB — Layer 4, TCP/UDP/TLS), and Gateway Load Balancer (GWLB — Layer 3/4, inline virtual appliances). Monitors target health and routes only to healthy targets. Scales automatically.","category":"Networking & Content Delivery","url":"https://aws.amazon.com/elasticloadbalancing/","exams":["SAA-C03"],"entryType":"service","domains":["Design Secure Architectures","Design Resilient Architectures","Design High-Performing Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"ElastiCache for Memcached","description":"A managed Memcached-compatible in-memory caching service ideal for simple object caching scenarios. Provides multi-threaded performance for high-throughput workloads and easy horizontal scaling by adding nodes.","category":"Database","url":"https://docs.aws.amazon.com/AmazonElastiCache/latest/mem-ug/WhatIs.html","exams":["SAA-C03"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"ElastiCache for Redis","description":"A fully managed Redis-compatible in-memory caching service that provides sub-millisecond latency for data caching, session stores, and real-time analytics. Supports clustering, replication, and automatic failover for high availability.","category":"Database","url":"https://docs.aws.amazon.com/AmazonElastiCache/latest/red-ug/WhatIs.html","exams":["SAA-C03"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"Embedding Space","description":"The high-dimensional vector space where embeddings (numerical representations of data) exist. In this space, the distance between vectors represents semantic similarity — similar items are closer together, dissimilar items are farther apart. For example, in a word embedding space, 'king' - 'man' + 'woman' ≈ 'queen.' Understanding embedding space is key to working with vector databases, semantic search, and RAG systems. The dimensionality of embedding space varies by model (e.g., 384, 768, 1024, 1536 dimensions).","category":"Generative AI Concepts","url":"https://aws.amazon.com/what-is/embeddings-in-machine-learning/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Embeddings","description":"Numerical representations (vectors) of text, images, or other data that capture their semantic meaning. Words or phrases with similar meanings are placed close together in this mathematical 'embedding space.' They are the foundation of semantic search, recommendations, and RAG systems. AWS services like Amazon Titan Embeddings and Amazon Bedrock generate embeddings.","category":"Generative AI Concepts","url":"https://aws.amazon.com/what-is/embeddings-in-machine-learning/","exams":["AIF-C01"],"entryType":"concept","domains":["Fundamentals of Generative AI","Applications of Foundation Models"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Encryption at Rest","description":"The protection of data stored in databases, file systems, or other storage media by encrypting it when not being actively used. AWS provides encryption services like KMS to secure AI training data, model artifacts, and embeddings.","category":"GenAI Security","url":"https://docs.aws.amazon.com/kms/latest/developerguide/overview.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"Encryption in Transit","description":"The protection of data as it moves between systems, such as between applications and AI model endpoints. Implemented using protocols like TLS/SSL to prevent interception or tampering of sensitive data during transmission.","category":"GenAI Security","url":"https://docs.aws.amazon.com/bedrock/latest/userguide/data-protection.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"Ensemble Learning","description":"A machine learning technique that combines predictions from multiple models to improve overall performance. The idea is that a group of models working together can make better predictions than any single model alone. Common ensemble methods include bagging (training multiple models on random subsets of data), boosting (training models sequentially to correct previous errors), and stacking (using another model to combine predictions). Amazon SageMaker supports ensemble methods through built-in algorithms and custom implementations.","category":"Machine Learning Concepts","url":"https://docs.aws.amazon.com/sagemaker/latest/dg/algorithms-choose.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Environmental Impact of AI","description":"The carbon emissions and energy consumption associated with training and running AI models. Large foundation models require significant computational resources, making energy efficiency and sustainable infrastructure important considerations for responsible AI development.","category":"Generative AI Concepts","url":"https://sustainability.aboutamazon.com/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"Epoch","description":"One complete pass through the entire training dataset during model training. Training typically involves multiple epochs — the model sees each training example multiple times to learn patterns. Too few epochs lead to underfitting (the model hasn't learned enough), while too many can lead to overfitting (the model memorizes the training data). The optimal number of epochs depends on the dataset size, model complexity, and learning rate. Early stopping can automatically halt training when performance stops improving.","category":"Machine Learning Concepts","url":"https://docs.aws.amazon.com/sagemaker/latest/dg/deep-learning.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Euclidean Distance","description":"A metric that measures the straight-line distance between two points in space. In the context of embeddings, it measures how far apart two vectors are. Smaller distances indicate greater similarity. Euclidean distance is one of several metrics used in vector similarity search, along with cosine similarity and dot product. The choice of distance metric depends on the embedding model and the specific use case. Vector databases like OpenSearch support multiple distance metrics.","category":"Generative AI Concepts","url":"https://aws.amazon.com/what-is/vector-databases/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Event-Driven Architecture","description":"An architecture where services communicate through events rather than tight synchronous dependencies. Services such as EventBridge, SNS, SQS, Lambda, and DynamoDB Streams commonly appear in these designs.","category":"Architecture Patterns","url":"https://aws.amazon.com/event-driven-architecture/","exams":["SAA-C03"],"entryType":"concept","domains":["Design Resilient Architectures","Design High-Performing Architectures"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Explainability","description":"The ability to understand and articulate how an AI model reaches its decisions or outputs. Explainable AI (XAI) techniques help users interpret model behavior, debug issues, and build trust by making AI reasoning more transparent.","category":"Generative AI Concepts","url":"https://docs.aws.amazon.com/sagemaker/latest/dg/clarify-model-explainability.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"Exploratory Data Analysis (EDA)","description":"The early investigation of data to understand distributions, missing values, anomalies, and patterns before model training. It helps teams decide whether the data is usable and what preparation steps are needed.","category":"AI/ML Fundamentals","url":"https://docs.aws.amazon.com/prescriptive-guidance/latest/ml-operations-planning/data-analysis.html","exams":["AIF-C01"],"entryType":"concept","domains":["Fundamentals of AI and ML"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"F1 Score","description":"A harmonic mean of precision and recall that provides a single metric balancing both measures. Particularly useful when dealing with imbalanced datasets where accuracy alone can be misleading. Formula: F1 = 2 × (Precision × Recall) / (Precision + Recall). | The harmonic mean of precision and recall, providing a single metric that balances both. F1 = 2 × (Precision × Recall) / (Precision + Recall). F1 is useful when you need to balance false positives and false negatives, and when you have imbalanced classes. Unlike accuracy, F1 won't be misleadingly high on imbalanced datasets. An F1 of 1.0 is perfect, while 0 is the worst. It's commonly used in Amazon SageMaker Clarify for model evaluation.","category":"Machine Learning Concepts","url":"https://docs.aws.amazon.com/machine-learning/latest/dg/multiclass-classification-metrics.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Feature Engineering","description":"The process of transforming raw inputs into better model features, such as aggregates, encodings, or derived fields. It matters in the ML lifecycle even though deep technical implementation is out of scope for AIF-C01. | The process of selecting, transforming, and creating input variables (features) from raw data to improve machine learning model performance. Good features make patterns easier for the model to learn. Examples include converting timestamps to day-of-week, encoding categorical variables, scaling numerical values, and creating interaction terms. Feature engineering is often more impactful than algorithm choice. Amazon SageMaker Data Wrangler and SageMaker Feature Store help with feature engineering.","category":"Machine Learning Concepts","url":"https://docs.aws.amazon.com/prescriptive-guidance/latest/ml-operations-planning/feature-engineering.html","exams":["AIF-C01"],"entryType":"concept","domains":["Fundamentals of AI and ML"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Feature Selection","description":"The process of selecting a subset of relevant features (variables) for use in model training. Removing irrelevant or redundant features can improve model performance, reduce overfitting, and decrease training time. Techniques include filter methods (statistical tests), wrapper methods (testing feature subsets), and embedded methods (built into algorithms like Lasso). Feature selection is an important part of feature engineering and model optimization.","category":"Machine Learning Concepts","url":"https://docs.aws.amazon.com/sagemaker/latest/dg/data-wrangler-transform.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Feature Store","description":"A centralized repository for storing, sharing, and managing machine learning features — the processed variables used to train and run ML models. A Feature Store provides both an Online Store (for low-latency real-time inference) and an Offline Store (for batch training). It solves the problem of training-serving skew by ensuring the same feature transformations are used in both contexts. Amazon SageMaker Feature Store is a fully managed feature store service on AWS.","category":"Machine Learning Concepts","url":"https://aws.amazon.com/sagemaker/feature-store/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Few-Shot Prompting","description":"A prompting style where the prompt includes a small number of examples to steer the model toward the desired output pattern. It often improves consistency when task formatting or style matters. | A prompting technique where you provide the AI model with a few examples (typically 2-5) of the desired input-output pattern before asking it to perform the task on new input. For example, showing 3 examples of customer emails and their sentiment classifications before asking it to classify a new email. Few-shot prompting significantly improves accuracy for specialized or complex tasks by showing the model exactly what format and reasoning you expect.","category":"Generative AI Concepts","url":"https://docs.aws.amazon.com/bedrock/latest/userguide/prompt-engineering-guidelines.html","exams":["AIF-C01"],"entryType":"concept","domains":["Fundamentals of Generative AI","Applications of Foundation Models"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Fine-Tuning","description":"The process of further training a pre-existing Foundation Model on a smaller, task-specific dataset to specialize its behavior. Think of it like a general doctor (the base FM) completing a medical residency to become a specialist (the fine-tuned model). Fine-tuning is more expensive and data-intensive than prompt engineering, but produces more consistent, specialized results. Amazon Bedrock supports fine-tuning.","category":"Generative AI Concepts","url":"https://aws.amazon.com/what-is/fine-tuning/","exams":["AIF-C01"],"entryType":"concept","domains":["Fundamentals of Generative AI","Applications of Foundation Models"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Foundation Model (FM)","description":"A large machine learning model trained on massive, broad datasets using self-supervised learning. Foundation Models are the 'engines' behind generative AI — they can be adapted (via prompting or fine-tuning) to perform a wide variety of tasks like writing, summarizing, translating, and coding without being retrained from scratch.","category":"Generative AI Concepts","url":"https://aws.amazon.com/what-is/foundation-models/","exams":["AIF-C01"],"entryType":"concept","domains":["Fundamentals of Generative AI","Applications of Foundation Models"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Foundation Models","description":"Large AI models trained on vast amounts of unlabeled data that can be adapted to a wide range of tasks. These models serve as the base for many AI applications and include large language models (LLMs), image generation models, and multi-modal models. Examples include GPT, Claude, and Amazon Titan.","category":"Generative AI Concepts","url":"https://aws.amazon.com/bedrock/foundation-models/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"FreeRTOS","description":"An operating system for microcontrollers that makes small, low-power edge devices easy to program, deploy, secure, connect, and manage.","category":"IoT","url":"https://aws.amazon.com/freertos/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Gateway Load Balancer (GWLB)","description":"A specialized load balancer used to deploy, scale, and manage fleets of third-party virtual network appliances — like firewalls, intrusion detection systems (IDS), and deep packet inspection tools. Traffic is transparently routed through these appliances before reaching your application, allowing you to inspect all inbound/outbound traffic at scale without changing your network architecture.","category":"Networking & Content Delivery","url":"https://aws.amazon.com/elasticloadbalancing/gateway-load-balancer/","exams":["SAA-C03"],"entryType":"service","domains":["Design Resilient Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"GDPR Compliance for AI","description":"Ensuring AI systems comply with the European Union's General Data Protection Regulation, which governs the processing of personal data. Key requirements include lawful basis for processing, data subject rights, purpose limitation, and appropriate security measures.","category":"GenAI Security","url":"https://aws.amazon.com/compliance/gdpr-center/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"General Purpose SSD (gp3)","description":"The latest generation of general purpose EBS volumes, offering a balance of price and performance for a wide range of workloads. Provides up to 16,000 IOPS and 1,000 MB/s throughput at a lower cost per GB than previous generations.","category":"Storage","url":"https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/ebs-volume-types.html#EBSVolumeTypes_gp3","exams":["SAA-C03"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"Generative Adversarial Network (GAN)","description":"A type of generative AI architecture consisting of two neural networks competing against each other: a Generator that creates synthetic data (like images), and a Discriminator that tries to distinguish real data from generated data. Through this adversarial training, the Generator learns to create increasingly realistic outputs. GANs are used for image generation, style transfer, and data augmentation. Diffusion models have become more popular for image generation in recent years.","category":"Machine Learning Concepts","url":"https://aws.amazon.com/what-is/gan/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Generative AI Security Scoping Matrix","description":"An AWS governance framework for thinking clearly about which layers of a generative AI solution you manage versus which layers AWS manages. It helps teams reason about controls, responsibilities, and risk boundaries.","category":"GenAI Security","url":"https://docs.aws.amazon.com/whitepapers/latest/generative-ai-security-scoping-matrix-on-aws/generative-ai-security-scoping-matrix-on-aws.html","exams":["AIF-C01"],"entryType":"concept","domains":["Security, Compliance, and Governance for AI Solutions"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Gradient Descent","description":"The optimization algorithm used to train most machine learning models. It works by iteratively adjusting model parameters (weights) in the direction that reduces the loss function — like walking downhill to find the lowest point. Variants include batch gradient descent (using all data), stochastic gradient descent (using one sample at a time), and mini-batch gradient descent (using small batches). The learning rate controls the size of each step. Understanding gradient descent helps in tuning training hyperparameters.","category":"Machine Learning Concepts","url":"https://docs.aws.amazon.com/sagemaker/latest/dg/deep-learning.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Greedy Decoding","description":"A simple text generation strategy where the model always selects the token with the highest probability at each step. While fast and straightforward, greedy decoding can produce suboptimal sequences because early choices constrain later options. It tends to produce generic, repetitive text. More advanced methods like beam search and sampling (temperature, top-p) generally produce better, more diverse outputs. Greedy decoding is sometimes used when deterministic outputs are required.","category":"Machine Learning Concepts","url":"https://docs.aws.amazon.com/bedrock/latest/userguide/inference-parameters.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Grounding","description":"The practice of connecting AI model outputs to verifiable, factual information sources to reduce hallucinations and improve accuracy. In RAG systems, grounding means retrieving relevant documents from a knowledge base and providing them as context to the LLM, so its response is based on actual data rather than just its training. Amazon Bedrock Knowledge Bases provides automatic grounding. Grounding checks in Bedrock Guardrails verify that responses are factually based on the provided context.","category":"Generative AI Concepts","url":"https://aws.amazon.com/bedrock/knowledge-bases/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Hallucination (AI)","description":"When an AI model generates output that sounds confident and coherent but is factually incorrect or completely made up. This happens because LLMs predict statistically likely word sequences — they don't 'know' facts the way humans do. Mitigation strategies include Retrieval-Augmented Generation (RAG), Amazon Bedrock Guardrails, and grounding responses in verified data sources.","category":"Generative AI Concepts","url":"https://aws.amazon.com/what-is/ai-hallucinations/","exams":["AIF-C01"],"entryType":"concept","domains":["Fundamentals of Generative AI","Applications of Foundation Models","Guidelines for Responsible AI"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Hallucinations","description":"A phenomenon where generative AI models produce confident but factually incorrect, fabricated, or nonsensical outputs. This occurs when models generate plausible-sounding content that isn't grounded in their training data or provided context, posing risks for applications requiring factual accuracy.","category":"Generative AI Concepts","url":"https://docs.aws.amazon.com/bedrock/latest/userguide/guardrails.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"High Availability Patterns","description":"Architectural patterns designed to ensure systems remain operational and accessible with minimal downtime. Key patterns: Multi-AZ Deployment (resources spread across Availability Zones for fault isolation), Auto Scaling (automatic capacity adjustment), Load Balancing (distribute traffic across healthy instances), Health Checks (automatically detect and replace failed components), and Graceful Degradation (continue operating with reduced functionality during partial failures). AWS services like ELB, Auto Scaling, and Multi-AZ RDS implement these patterns.","category":"Architectural Concepts","url":"https://docs.aws.amazon.com/wellarchitected/latest/high-availability-pillar/welcome.html","exams":["SAA-C03"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"HIPAA Compliance for AI","description":"Ensuring AI systems handling healthcare data comply with the Health Insurance Portability and Accountability Act. Requires implementing safeguards for Protected Health Information (PHI), including encryption, access controls, and audit trails.","category":"GenAI Security","url":"https://aws.amazon.com/compliance/hipaa-compliance/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"Horizontal Scaling","description":"A scaling approach that adds more instances (nodes) to handle increased load, rather than increasing the capacity of existing instances. Also known as scaling out, this approach provides better fault tolerance and can be automated with Auto Scaling groups.","category":"Architecture Patterns","url":"https://docs.aws.amazon.com/autoscaling/ec2/userguide/auto-scaling-groups.html","exams":["SAA-C03"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"Human Evaluation","description":"The process of having human reviewers assess the quality, accuracy, and appropriateness of AI model outputs. Essential for evaluating subjective qualities like helpfulness, tone, and safety that automated metrics cannot fully capture.","category":"AI/ML Fundamentals","url":"https://docs.aws.amazon.com/bedrock/latest/userguide/model-evaluation.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"Human-in-the-Loop","description":"A machine learning workflow that incorporates human judgment at key stages, particularly for reviewing low-confidence predictions, handling edge cases, and continuously improving models. When an AI model is uncertain about a prediction, it can route that case to human reviewers. Their decisions are then used to retrain and improve the model. Amazon Augmented AI (A2I) provides built-in human review workflows for Amazon Textract, Amazon Rekognition, and custom models.","category":"Machine Learning Concepts","url":"https://aws.amazon.com/augmented-ai/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Hybrid Cloud Connectivity","description":"Patterns for connecting on-premises data centers to AWS: AWS Site-to-Site VPN (encrypted IPsec tunnel over internet, quick setup, lower cost), AWS Direct Connect (dedicated private connection, consistent performance, higher bandwidth), AWS Transit Gateway (central hub for multiple VPCs and on-premises connections), and AWS Storage Gateway (hybrid cloud storage). For high availability, use multiple VPN tunnels or Direct Connect with VPN backup. Consider data transfer costs and latency requirements.","category":"Architectural Concepts","url":"https://docs.aws.amazon.com/whitepapers/latest/aws-vpc-connectivity-options/welcome.html","exams":["SAA-C03"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Hyperparameter Tuning","description":"The process of finding the optimal set of hyperparameters for a machine learning model to maximize its performance. Hyperparameters are configuration settings that control the learning process, such as learning rate, batch size, and number of hidden layers. AWS SageMaker provides automatic model tuning capabilities.","category":"AI/ML Fundamentals","url":"https://docs.aws.amazon.com/sagemaker/latest/dg/automatic-model-tuning.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"Hyperparameters","description":"Configuration settings for a machine learning model that are set before training begins, as opposed to parameters which are learned during training. Examples include learning rate, batch size, number of layers, and number of epochs. Hyperparameter tuning (also called hyperparameter optimization) is the process of finding the best combination of these settings. Amazon SageMaker Automatic Model Tuning can automatically search for optimal hyperparameters.","category":"Machine Learning Concepts","url":"https://aws.amazon.com/sagemaker/automatic-model-tuning/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"IAM Permission Boundaries","description":"An advanced IAM feature that sets the maximum permissions an IAM entity (user or role) can have, regardless of what their identity-based policies allow. Think of it as a ceiling on permissions. If a boundary allows S3 and EC2, and an identity policy allows S3, EC2, and RDS, the effective permissions are only S3 and EC2. Permission Boundaries are used to delegate permission management to developers while preventing them from granting themselves or others more access than allowed.","category":"Security, Identity, & Compliance","url":"https://docs.aws.amazon.com/IAM/latest/UserGuide/access_policies_boundaries.html","exams":["SAA-C03"],"entryType":"service","domains":["Design Secure Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Imbalanced Dataset","description":"A dataset where the classes are not represented equally — for example, a fraud detection dataset where only 1% of transactions are fraudulent. Imbalanced datasets cause models to be biased toward the majority class. Mitigation techniques include oversampling the minority class (SMOTE), undersampling the majority class, using class weights, and choosing appropriate evaluation metrics (precision, recall, F1) instead of accuracy. Imbalanced data is common in anomaly detection and fraud detection.","category":"Machine Learning Concepts","url":"https://docs.aws.amazon.com/sagemaker/latest/dg/sagemaker-clarify-processing-component-config.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Immutable Infrastructure","description":"An operational pattern where servers or images are replaced rather than modified in place. It improves consistency, reduces configuration drift, and supports resilient rollout and rollback strategies.","category":"Architecture Patterns","url":"https://docs.aws.amazon.com/wellarchitected/latest/framework/rel_adapt_change_immutable_infrastructure.html","exams":["SAA-C03"],"entryType":"concept","domains":["Design Resilient Architectures"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"In-context Learning","description":"The ability of large language models to learn and adapt to new tasks from examples provided within the prompt itself, without requiring parameter updates or fine-tuning. This includes zero-shot, few-shot, and many-shot learning approaches. | The ability of large language models to learn new tasks or adapt their behavior based on information provided directly in the prompt, without any weight updates or fine-tuning. When you give an LLM examples in your prompt and it improves its performance, that's in-context learning. This is the mechanism behind few-shot prompting. It's different from traditional machine learning because no model retraining occurs — the learning happens entirely within the context window during inference.","category":"Generative AI Concepts","url":"https://docs.aws.amazon.com/bedrock/latest/userguide/prompt-engineering-guidelines.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Inclusivity","description":"A principle of responsible AI ensuring that AI systems are designed to serve diverse populations and do not exclude or disadvantage particular groups. This includes considering accessibility, language support, and cultural sensitivity in AI applications.","category":"Generative AI Concepts","url":"https://aws.amazon.com/ai/responsible-ai/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"Inference","description":"The process of using a trained machine learning model to make predictions or generate outputs on new, unseen data. In generative AI, inference is when you send a prompt to an LLM and it generates a response. Inference is distinct from training — training creates the model, inference uses it. AWS offers Inferentia chips specifically optimized for fast, cost-effective inference. Amazon Bedrock charges are based on inference (input/output tokens), not training.","category":"Generative AI Concepts","url":"https://aws.amazon.com/machine-learning/inferentia/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Instruction Tuning","description":"A fine-tuning approach where a model is trained on a dataset of instructions and desired outputs to improve its ability to follow human instructions accurately. This helps models better understand and execute specific tasks as directed by users. | A training technique where language models are fine-tuned on datasets of instruction-following examples to improve their ability to understand and execute user instructions. Models trained with instruction tuning are better at following complex directions, maintaining context, and producing helpful responses. Most modern instruction-tuned models (like InstructGPT, Claude, and instruction-tuned Titan) are significantly better at practical tasks than base pre-trained models.","category":"Generative AI Concepts","url":"https://docs.aws.amazon.com/bedrock/latest/userguide/custom-models.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Integrated Private Wireless on AWS","description":"A program that provides enterprises with managed private wireless offerings from leading Communications Service Providers (CSPs), making it simple to deploy and scale a private cellular network.","category":"Networking & Content Delivery","url":"https://aws.amazon.com/private-wireless/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Intellectual Property (IP) in AI","description":"Legal considerations surrounding AI-generated content and its ownership. Includes questions about copyright of AI outputs, training data licensing, and the potential for AI systems to infringe on existing IP rights through reproduction or imitation.","category":"GenAI Security","url":"https://aws.amazon.com/ai/responsible-ai/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"International Organization for Standardization (ISO)","description":"A family of internationally recognized standards that organizations often use as part of governance and compliance programs. In AIF-C01, ISO is part of the vocabulary around regulatory and assurance expectations for AI systems.","category":"GenAI Security","url":"https://aws.amazon.com/compliance/programs/","exams":["AIF-C01"],"entryType":"concept","domains":["Security, Compliance, and Governance for AI Solutions"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Internet Gateway (IGW)","description":"A horizontally scaled, redundant, and highly available VPC component that allows communication between your VPC and the public internet. An Internet Gateway performs two functions: it provides a target in your VPC route table for internet-routable traffic, and it performs network address translation (NAT) for instances with public IPv4 addresses. A subnet with a route to an IGW is called a 'public subnet.'","category":"Networking & Content Delivery","url":"https://docs.aws.amazon.com/vpc/latest/userguide/VPC_Internet_Gateway.html","exams":["SAA-C03"],"entryType":"service","domains":["Design Secure Architectures","Design Resilient Architectures","Design High-Performing Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Jailbreaking","description":"A type of prompt injection attack where users attempt to bypass safety guardrails and content filters in AI systems. Attackers craft prompts designed to make models ignore their constraints and produce restricted or harmful content.","category":"GenAI Security","url":"https://docs.aws.amazon.com/bedrock/latest/userguide/guardrails.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"Knowledge Base","description":"A centralized repository of information that can be queried to provide context for AI applications. In the context of RAG, a knowledge base stores documents and their embeddings, enabling retrieval of relevant information to ground model responses in factual data.","category":"Generative AI Concepts","url":"https://docs.aws.amazon.com/bedrock/latest/userguide/knowledge-base.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"Labeled vs. Unlabeled Data","description":"Labeled data includes the correct answer or target field, while unlabeled data does not. This distinction is central to deciding whether a supervised or unsupervised learning approach fits the use case.","category":"AI/ML Fundamentals","url":"https://aws.amazon.com/what-is/data-labeling/","exams":["AIF-C01"],"entryType":"concept","domains":["Fundamentals of AI and ML"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Labeling","description":"The process of adding annotations or tags to raw data to create labeled datasets for supervised learning. For image classification, this means tagging images with their contents ('cat,' 'dog'). For sentiment analysis, it means marking text as 'positive,' 'negative,' or 'neutral.' Labeling is often the most time-consuming and expensive part of ML projects. Amazon SageMaker Ground Truth provides managed data labeling services with options for human labelers and automated labeling using active learning.","category":"Machine Learning Concepts","url":"https://aws.amazon.com/sagemaker/groundtruth/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Large Language Model (LLM)","description":"A type of Foundation Model specifically trained on enormous amounts of text data. LLMs understand and generate human-like text. Examples include Amazon Titan Text, Anthropic Claude, and Meta Llama. They are the backbone of chatbots, code generators, and document summarizers. 'Large' refers to the billions of parameters they contain.","category":"Generative AI Concepts","url":"https://aws.amazon.com/what-is/large-language-model/","exams":["AIF-C01"],"entryType":"concept","domains":["Fundamentals of Generative AI","Applications of Foundation Models"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Learning Rate","description":"A hyperparameter that controls how much the model weights are updated during each training iteration. A high learning rate causes large weight updates, which can speed up training but may overshoot optimal values. A low learning rate causes small updates, which can find better solutions but takes longer to converge. Learning rate scheduling (gradually decreasing the rate during training) is a common practice. Finding the right learning rate is crucial for successful model training.","category":"Machine Learning Concepts","url":"https://docs.aws.amazon.com/sagemaker/latest/dg/automatic-model-tuning.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Least Privilege","description":"The security principle of granting only the permissions required to perform a task and nothing more. This is one of the most common SAA-C03 best-practice anchors in IAM design questions.","category":"Security, Identity, & Compliance","url":"https://docs.aws.amazon.com/IAM/latest/UserGuide/best-practices.html","exams":["SAA-C03"],"entryType":"concept","domains":["Design Secure Architectures"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Load Balancer Types","description":"AWS offers three types of Elastic Load Balancers: Application Load Balancer (ALB — Layer 7, HTTP/HTTPS, content-based routing, WebSocket support, authentication), Network Load Balancer (NLB — Layer 4, TCP/UDP/TLS, ultra-low latency, millions of RPS, static IP), and Gateway Load Balancer (GWLB — Layer 3/4, inline virtual appliances like firewalls). Choose ALB for web apps, NLB for TCP/performance, GWLB for security appliances. All distribute traffic across healthy targets in multiple AZs.","category":"Architectural Concepts","url":"https://aws.amazon.com/elasticloadbalancing/types/","exams":["SAA-C03"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Loss Function","description":"A mathematical function that measures how well a machine learning model's predictions match the actual target values. The goal of training is to minimize the loss function. Common loss functions include Mean Squared Error (MSE) for regression, Cross-Entropy Loss for classification, and Categorical Cross-Entropy for multi-class classification. The choice of loss function depends on the type of problem and has a significant impact on model training and performance.","category":"Machine Learning Concepts","url":"https://docs.aws.amazon.com/sagemaker/latest/dg/deep-learning.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Max Tokens","description":"The maximum number of tokens (words or subwords) that a model can generate in a single response. This parameter helps control response length and manage computational costs. Token limits vary by model, with some supporting context windows of 100,000+ tokens. | An inference parameter that limits the maximum number of tokens the model will generate in its response. Setting max tokens prevents unexpectedly long (and expensive) outputs and ensures responses fit within application constraints. For example, if you set max_tokens=100, the model will stop generating after 100 tokens even if it hasn't completed its thought. Max tokens works with stop sequences to control output length and content.","category":"Generative AI Concepts","url":"https://docs.aws.amazon.com/bedrock/latest/userguide/inference-parameters.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Memory Optimized Instances","description":"EC2 instance types (R, X, and z families) designed for memory-intensive workloads. Ideal for in-memory databases, big data processing, real-time analytics, and applications requiring large amounts of RAM relative to CPU.","category":"Compute","url":"https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/memory-optimized-instances.html","exams":["SAA-C03"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"Meta Llama Models","description":"Open-source large language models developed by Meta, available through Amazon Bedrock. Llama models (Llama 2, Llama 3) provide strong performance for text generation, coding, and reasoning tasks, and are available for commercial use with appropriate licensing.","category":"Machine Learning","url":"https://docs.aws.amazon.com/bedrock/latest/userguide/model-parameters-llama.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"Microservices Architecture","description":"An architectural style that splits an application into smaller independently deployable services. On the exam, microservices usually pair with loose coupling, event-driven patterns, independent scaling, and managed integration services.","category":"Architecture Patterns","url":"https://aws.amazon.com/microservices/","exams":["SAA-C03"],"entryType":"concept","domains":["Design Resilient Architectures","Design High-Performing Architectures"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collection
