ed to manually identify and provision individual AWS resources.","category":"Management & Governance","url":"https://aws.amazon.com/launch-wizard/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS License Manager","description":"Makes it easier to manage licenses in AWS and on-premises servers from software vendors such as Microsoft, SAP, Oracle, and IBM.","category":"Management & Governance","url":"https://aws.amazon.com/license-manager/","exams":["CLF-C02","SAA-C03"],"entryType":"service","domains":["Design Secure Architectures","Design Resilient Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Mainframe Modernization Service","description":"A set of managed tools providing infrastructure and software for migrating, modernizing, and running mainframe applications.","category":"Migration & Transfer","url":"https://aws.amazon.com/mainframe-modernization/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Managed Services","description":"Provides ongoing management of your AWS infrastructure so you can focus on your applications. By implementing best practices to maintain your infrastructure, it helps to reduce your operational overhead and risk.","category":"Customer Enablement","url":"https://aws.amazon.com/managed-services/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Management Console","description":"The primary web-based interface for managing AWS services. It is not a design pattern by itself, but it is in scope as a core management interface and frequently appears alongside operational workflows and resource administration.","category":"Management & Governance","url":"https://aws.amazon.com/console/","exams":["SAA-C03"],"entryType":"service","domains":["Design Secure Architectures","Design Resilient Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Migration Hub","description":"Provides a single location to track the progress of application migrations across multiple AWS and partner solutions, giving visibility into the status of migrations across your portfolio. | A single place to discover your existing servers, plan migrations, and track the status of each application migration. Migration Hub provides visibility into your entire migration portfolio across multiple AWS and partner solutions (Application Migration Service, DMS, CloudEndure). Aggregates migration status from multiple tools and regions into a single dashboard. Helps you accelerate your migration to AWS with better planning and tracking.","category":"Migration & Transfer","url":"https://aws.amazon.com/migration-hub/","exams":["CLF-C02","SAA-C03"],"entryType":"service","domains":["Design Secure Architectures","Design Resilient Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Network Firewall","description":"A managed service that makes it easy to deploy essential network protections for all of your Amazon Virtual Private Clouds (VPCs). Network Firewall provides fine-grained control over network traffic with stateful inspection, intrusion prevention and detection (IPS/IDS), and web filtering. Deployed across Availability Zones for high availability. Supports thousands of rules and integrates with Firewall Manager for centralized management across accounts.","category":"Security, Identity, & Compliance","url":"https://aws.amazon.com/network-firewall/","exams":["CLF-C02","SAA-C03"],"entryType":"service","domains":["Design Secure Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Neuron SDK","description":"A software development kit for optimizing machine learning models to run on AWS Inferentia and Trainium chips. It includes a compiler, runtime, and profiling tools. The Neuron compiler converts models from TensorFlow, PyTorch, and MXNet into optimized binaries for Inferentia/Trainium. Using Neuron can reduce inference costs by up to 70% compared to GPU-based instances while maintaining performance. Required for running ML workloads on Inf1, Inf2, Trn1, and Trn2 instances.","category":"Machine Learning","url":"https://aws.amazon.com/machine-learning/neuron/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"AWS Organizations","description":"Helps you centrally govern your environment as you grow and scale your workloads on AWS. You can programmatically create new AWS accounts and allocate resources, group accounts to organize your workflows, apply policies to accounts or groups for governance. | An account management service that enables you to consolidate multiple AWS accounts into an organization that you create and centrally manage. Key features: Consolidated Billing (single bill for all accounts), Service Control Policies (SCPs — guardrails limiting what accounts can do), Organizational Units (hierarchical grouping), and AWS Accounts (member accounts). Essential for enterprises managing multiple AWS accounts with centralized governance.","category":"Management & Governance","url":"https://aws.amazon.com/organizations/","exams":["CLF-C02","SAA-C03"],"entryType":"service","domains":["Design Secure Architectures","Design Resilient Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Outposts","description":"Bring native AWS services, infrastructure, and operating models to virtually any data center, co-location space, or on-premises facility for a truly consistent hybrid experience. | A fully managed service that extends AWS infrastructure, services, APIs, and tools to virtually any on-premises datacenter, co-location space, or edge location. Outposts delivers a truly consistent hybrid experience — the same hardware AWS uses in its regions, managed and monitored by AWS, running locally for low-latency workloads. Available in various configurations with different EC2 instance types and EBS storage options. Ideal for workloads requiring local data processing or low latency.","category":"Compute","url":"https://aws.amazon.com/outposts/","exams":["CLF-C02","SAA-C03"],"entryType":"service","domains":["Design Resilient Architectures","Design High-Performing Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Panorama","description":"A machine learning appliance and software development kit (SDK) that allows organizations to bring computer vision to on-premises cameras to make predictions locally with high accuracy and low latency.","category":"Machine Learning","url":"https://aws.amazon.com/panorama/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Partner Device Catalog","description":"Helps you find devices and hardware to help you explore, build, and go to market with your IoT solutions. Search for and find hardware that works with AWS.","category":"IoT","url":"https://devices.aws.amazon.com/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Private 5G","description":"Offers an easy way to use cellular technology to augment your current network. This can help you increase reliability, extend coverage, or allow a new class of workloads.","category":"Networking & Content Delivery","url":"https://aws.amazon.com/private5g/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS PrivateLink","description":"Simplifies the security of data shared with cloud-based applications by eliminating the exposure of data to the public Internet. It provides private connectivity between VPCs, AWS services, and on-premises applications. | A service that provides private connectivity between VPCs, AWS services, and your on-premises networks without exposing traffic to the public internet. PrivateLink uses interface VPC endpoints to privately connect to supported services. Unlike VPC endpoints (which are within your VPC), PrivateLink allows you to privately connect to services hosted by other AWS accounts or AWS Marketplace partners. Traffic never leaves the AWS network.","category":"Networking & Content Delivery","url":"https://aws.amazon.com/privatelink/","exams":["CLF-C02","SAA-C03"],"entryType":"service","domains":["Design Secure Architectures","Design Resilient Architectures","Design High-Performing Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS PrivateLink for ML Services","description":"AWS PrivateLink provides private connectivity between your VPC and AWS ML services like SageMaker, Bedrock, and Comprehend without exposing traffic to the public internet. Traffic stays within the AWS network, improving security and compliance. PrivateLink endpoints can be accessed from on-premises networks via AWS Direct Connect or VPN, enabling hybrid ML architectures where sensitive data never traverses the public internet.","category":"Networking & Content Delivery","url":"https://aws.amazon.com/privatelink/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"AWS Proton","description":"The first fully managed delivery service for container and serverless applications. Platform engineering teams can use it to connect and coordinate all the different tools needed for infrastructure provisioning and code deployments.","category":"Management & Governance","url":"https://aws.amazon.com/proton/","exams":["CLF-C02","SAA-C03"],"entryType":"service","domains":["Design Secure Architectures","Design Resilient Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS RAM (Resource Access Manager)","description":"A service that enables you to easily and securely share AWS resources with any AWS account or within your AWS Organization. You can share resources that you own with other accounts, allowing them to perform specific actions on those resources. Commonly shared resources include: Transit Gateways, Subnets, License Manager configurations, and Route 53 Resolver rules. Reduces operational overhead by eliminating the need to duplicate resources in each account.","category":"Security, Identity, & Compliance","url":"https://aws.amazon.com/ram/","exams":["SAA-C03"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"AWS re:Post Private","description":"A private version of AWS re:Post for enterprises with Enterprise Support or Enterprise On-Ramp Support plans. It provides access to knowledge and experts to accelerate cloud adoption.","category":"Customer Enablement","url":"https://aws.amazon.com/repost/private/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Resource Access Manager","description":"Helps you securely share your resources across AWS accounts, within your organization or organizational units (OUs), and with IAM roles and IAM users for supported resource types.","category":"Security, Identity, & Compliance","url":"https://aws.amazon.com/ram/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Resource Access Manager (AWS RAM)","description":"Helps you securely share your resources across AWS accounts, within your organization or organizational units (OUs), and with IAM roles and IAM users for supported resource types.","category":"Security, Identity, & Compliance","url":"https://aws.amazon.com/ram/","exams":["SAA-C03"],"entryType":"service","domains":["Design Secure Architectures"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS RoboMaker","description":"A service that makes it easy to develop, test, and deploy intelligent robotics applications at scale. It extends the most widely used open-source robotics software framework, Robot Operating System (ROS).","category":"Robotics","url":"https://aws.amazon.com/robomaker/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Schema Conversion Tool (SCT)","description":"A free desktop application used during database migrations to automatically convert your source database schema (tables, views, stored procedures) and most of the application code to a format compatible with the target database engine. For example, converting an Oracle schema to Amazon Aurora PostgreSQL. Used alongside AWS DMS (which handles the data movement). SCT handles the structural/schema conversion; DMS handles the data migration.","category":"Migration & Transfer","url":"https://aws.amazon.com/dms/schema-conversion-tool/","exams":["SAA-C03"],"entryType":"service","domains":["Design Resilient Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Secrets Manager","description":"A service that helps you protect secrets needed to access your applications, services, and IT resources. The service enables you to easily rotate, manage, and retrieve database credentials, API keys, and other secrets throughout their lifecycle. Secrets are encrypted with KMS. Can automatically rotate secrets on a schedule you define using Lambda functions. Unlike Parameter Store, Secrets Manager is purpose-built for secrets with built-in rotation.","category":"Security, Identity, & Compliance","url":"https://aws.amazon.com/secrets-manager/","exams":["AIF-C01","CLF-C02","SAA-C03"],"entryType":"service","domains":["Security, Compliance, and Governance for AI Solutions","Design Secure Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Secrets Manager for ML Credentials","description":"AWS Secrets Manager securely stores and manages credentials, API keys, and other secrets used in machine learning workflows. It can store database passwords for training data sources, API keys for third-party ML services, and authentication tokens for model repositories. Secrets can be automatically rotated and accessed securely from SageMaker training jobs and inference endpoints without hardcoding credentials in code.","category":"Security, Identity, & Compliance","url":"https://aws.amazon.com/secrets-manager/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"AWS Security Hub","description":"A cloud security posture management service that performs automated, continuous security best practice checks against your AWS resources and aggregates your security alerts. | A cloud security posture management service that performs automated, continuous security best practice checks against your AWS resources and aggregates your security alerts (findings) from multiple AWS services (GuardDuty, Inspector, Macie, etc.) and AWS Partner solutions. Provides a comprehensive view of your security posture with a security score and automated compliance checks against standards like CIS AWS Foundations and PCI DSS.","category":"Security, Identity, & Compliance","url":"https://aws.amazon.com/security-hub/","exams":["CLF-C02","SAA-C03"],"entryType":"service","domains":["Design Secure Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Serverless Application Repository","description":"Enables you to quickly deploy code samples, components, and complete applications for common use cases such as web and mobile backends, event and data processing, and more. | A managed repository for serverless applications that enables you to quickly deploy code samples, components, and complete applications for common use cases such as web and mobile backends, event and data processing, logging, and more. Each application is packaged with an AWS Serverless Application Model (SAM) template that defines the AWS resources used. You can also publish your own applications to share privately within your organization or publicly with the community.","category":"Compute","url":"https://aws.amazon.com/serverless/serverlessrepo/","exams":["CLF-C02","SAA-C03"],"entryType":"service","domains":["Design Resilient Architectures","Design High-Performing Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Service Catalog","description":"A service that allows organizations to create and manage catalogs of IT services that are approved for use on AWS. These IT services can include everything from virtual machine images, servers, software, and databases to complete multi-tier application architectures. End users can quickly deploy only the approved IT services they need, following organizational constraints. Integrates with IAM for access control and CloudFormation for provisioning.","category":"Management & Governance","url":"https://aws.amazon.com/servicecatalog/","exams":["CLF-C02","SAA-C03"],"entryType":"service","domains":["Design Secure Architectures","Design Resilient Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Shield","description":"A managed Distributed Denial of Service (DDoS) protection service that safeguards applications running on AWS. It provides always-on detection and automatic inline mitigations. | A managed Distributed Denial of Service (DDoS) protection service that safeguards applications running on AWS. Shield Standard is automatically included at no extra cost — protects against most common network and transport layer DDoS attacks. Shield Advanced is a paid service that provides additional protection against larger and more sophisticated attacks, 24/7 DDoS Response Team (DRT) access, cost protection, and enhanced detection for application layer attacks. Integrated with CloudFront, Route 53, and Global Accelerator.","category":"Security, Identity, & Compliance","url":"https://aws.amazon.com/shield/","exams":["CLF-C02","SAA-C03"],"entryType":"service","domains":["Design Secure Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Site-to-Site VPN","description":"A managed IPsec VPN service for securely connecting an on-premises network or branch office to AWS over the public internet. For the exam, compare it against Direct Connect for bandwidth, consistency, and cost tradeoffs. | A fully managed service that creates a secure connection between your on-premises network and your Amazon VPC over the internet using IPsec tunnels. Each VPN connection includes two tunnels for high availability. Supports: static routing (you specify routes) or dynamic routing (BGP). Compared to Direct Connect: VPN is faster to set up, cheaper for low bandwidth, but has higher latency and lower consistency than Direct Connect. Often used as a backup for Direct Connect.","category":"Networking & Content Delivery","url":"https://aws.amazon.com/vpn/site-to-site-vpn/","exams":["SAA-C03"],"entryType":"service","domains":["Design Secure Architectures","Design Resilient Architectures","Design High-Performing Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Snow Family","description":"A family of physical devices that help migrate large amounts of data into and out of AWS, and to run edge computing workloads in harsh or disconnected environments. | A collection of physical devices for edge computing and data transfer that help migrate large amounts of data into and out of AWS, and run edge computing workloads in harsh or disconnected environments. Devices include: Snowcone (small, 8TB, edge computing), Snowball Edge (50-80TB, compute + storage), and Snowmobile (100PB, exabyte-scale data transfer in a shipping container). All devices are tamper-resistant and use AES-256 encryption with keys managed by AWS KMS.","category":"Migration & Transfer","url":"https://aws.amazon.com/snow/","exams":["CLF-C02","SAA-C03"],"entryType":"service","domains":["Design Secure Architectures","Design Resilient Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Step Functions","description":"A fully managed service that makes it easy to coordinate the components of distributed applications and microservices using visual workflows. | A fully managed service for orchestrating multiple AWS services into serverless workflows. Define workflows visually or using Amazon States Language (JSON-based). Supports two workflow types: Standard (exactly-once execution, up to 1 year runtime) and Express (at-least-once, up to 5 minutes). Integrates with Lambda, ECS, Fargate, DynamoDB, SNS, SQS, SageMaker, and more. Use for order processing, data pipelines, ML model training workflows, and IT automation.","category":"Application Integration","url":"https://aws.amazon.com/step-functions/","exams":["CLF-C02","SAA-C03"],"entryType":"service","domains":["Design Resilient Architectures","Design High-Performing Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Storage Gateway","description":"A hybrid cloud storage service that gives you on-premises access to virtually unlimited cloud storage. Customers use it to simplify storage management and reduce costs for key hybrid cloud storage use cases. | A hybrid cloud storage service that gives you on-premises access to virtually unlimited cloud storage. Three gateway types: File Gateway (NFS/SMB to S3), Volume Gateway (iSCSI block storage with cache or stored volumes), and Tape Gateway (virtual tape library to S3/Glacier). Provides seamless integration between on-premises IT environments and AWS storage for backup, archiving, disaster recovery, and tiering. Deployed as a VM or hardware appliance.","category":"Storage","url":"https://aws.amazon.com/storagegateway/","exams":["CLF-C02","SAA-C03"],"entryType":"service","domains":["Design Resilient Architectures","Design High-Performing Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS STS (Security Token Service)","description":"A service that enables creation of temporary, limited-privilege credentials for AWS resources. STS is commonly used for cross-account access, federated identity, and providing temporary access to applications running on EC2 instances.","category":"Security, Identity, & Compliance","url":"https://docs.aws.amazon.com/STS/latest/APIReference/welcome.html","exams":["SAA-C03"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"AWS Systems Manager","description":"Gives you visibility and control of your infrastructure on AWS. It provides a unified user interface so you can view operational data from multiple AWS services and automate operational tasks. | A management service that helps you automatically collect software inventory, apply OS patches, create system images, and configure Windows and Linux operating systems. Key capabilities: Session Manager (secure shell access without SSH keys), Patch Manager (automated patching), Parameter Store (secure configuration data), Run Command (execute commands at scale), and Automation (common maintenance tasks). Centralized operational management for hybrid cloud environments.","category":"Management & Governance","url":"https://aws.amazon.com/systems-manager/","exams":["CLF-C02","SAA-C03"],"entryType":"service","domains":["Design Secure Architectures","Design Resilient Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Transfer Family","description":"Provides fully managed support for the transfer of files into and out of Amazon S3 or Amazon EFS using the Secure File Transfer Protocol (SFTP), File Transfer Protocol over SSL (FTPS), and File Transfer Protocol (FTP). | A fully managed service that enables you to transfer files into and out of Amazon S3 or Amazon EFS using standard file transfer protocols: SFTP (SSH File Transfer Protocol), FTPS (FTP over SSL/TLS), and FTP (File Transfer Protocol). Transfer Family maintains your existing authentication systems (Active Directory, LDAP, custom) and provides static IP endpoints. Ideal for migrating legacy file transfer workflows to AWS without changing client applications or managing servers.","category":"Migration & Transfer","url":"https://aws.amazon.com/aws-transfer-family/","exams":["CLF-C02","SAA-C03"],"entryType":"service","domains":["Design Secure Architectures","Design Resilient Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Transit Gateway","description":"A network transit hub that you can use to interconnect your virtual private clouds (VPCs) and on-premises networks. It simplifies your network and puts an end to complex peering relationships. | A network transit hub that you can use to interconnect your virtual private clouds (VPCs) and on-premises networks. Transit Gateway acts as a cloud router — each new connection is only made once, simplifying network architecture as you grow. Supports transitive routing: VPC A can communicate with VPC B through Transit Gateway even without direct peering. Supports VPN and Direct Connect attachments for hybrid connectivity. Reduces complexity of managing multiple VPC peering connections.","category":"Networking & Content Delivery","url":"https://aws.amazon.com/transit-gateway/","exams":["CLF-C02","SAA-C03"],"entryType":"service","domains":["Design Secure Architectures","Design Resilient Architectures","Design High-Performing Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Trusted Advisor","description":"An online resource to help you reduce cost, increase performance, and improve security by optimizing your AWS environment, providing real-time guidance following AWS best practices. | An online tool that provides real-time guidance to help you provision your resources following AWS best practices. Trusted Advisor checks optimize your AWS infrastructure, improve security and performance, reduce costs, and monitor service quotas. Categories: Cost Optimization, Performance, Security, Fault Tolerance, Service Limits, and Operational Excellence. Business and Enterprise support plans get access to all checks; Basic gets 7 core checks.","category":"Management & Governance","url":"https://aws.amazon.com/trustedadvisor/","exams":["AIF-C01","CLF-C02","SAA-C03"],"entryType":"service","domains":["Security, Compliance, and Governance for AI Solutions","Design Secure Architectures","Design Resilient Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS User Notifications","description":"Provides a central location for managing your AWS notifications. You can receive notifications from AWS services, such as AWS Health events or Amazon CloudWatch alarms, in a consistent format.","category":"Management & Governance","url":"https://aws.amazon.com/user-notifications/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Verified Access","description":"A service that provides secure access to your corporate applications without a VPN. It helps you implement a zero-trust security posture.","category":"Networking & Content Delivery","url":"https://aws.amazon.com/verified-access/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS VPN","description":"Provides a secure and private connection between your network or device and the AWS global network. It is comprised of two services: AWS Site-to-Site VPN and AWS Client VPN.","category":"Networking & Content Delivery","url":"https://aws.amazon.com/vpn/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS WAF","description":"A web application firewall that helps protect your web applications or APIs against common web exploits and bots that may affect availability, compromise security, or consume excessive resources.","category":"Security, Identity, & Compliance","url":"https://aws.amazon.com/waf/","exams":["CLF-C02","SAA-C03"],"entryType":"service","domains":["Design Secure Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS WAF (Web Application Firewall)","description":"A web application firewall that helps protect your web applications or APIs against common web exploits and bots that may affect availability, compromise security, or consume excessive resources. WAF lets you create rules to filter traffic based on: IP addresses, HTTP headers, HTTP body, URI strings, SQL injection, and cross-site scripting (XSS). Can be deployed on CloudFront, ALB, API Gateway, and AppSync. Supports rate limiting and managed rule groups from AWS Marketplace.","category":"Security, Identity, & Compliance","url":"https://aws.amazon.com/waf/","exams":["SAA-C03"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"AWS WAF Captcha","description":"A feature of AWS WAF that requires users to successfully complete challenges before their web request is allowed to reach protected resources.","category":"Security, Identity, & Compliance","url":"https://aws.amazon.com/waf/features/captcha/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Wavelength","description":"An AWS Infrastructure offering optimized for mobile edge computing applications. Wavelength Zones are AWS infrastructure deployments that embed AWS compute and storage services within communications service providers' datacenters at the edge of the 5G network. | An AWS infrastructure offering that embeds AWS compute and storage services within 5G networks, providing mobile edge computing infrastructure for developing, deploying, and scaling ultra-low-latency applications. Wavelength Zones are AWS infrastructure deployments within telecommunications providers' datacenters at the edge of the 5G network. Ideal for applications requiring single-digit millisecond latency: AR/VR, smart factories, autonomous vehicles, and real-time gaming.","category":"Compute","url":"https://aws.amazon.com/wavelength/","exams":["CLF-C02","SAA-C03"],"entryType":"service","domains":["Design Resilient Architectures","Design High-Performing Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Well-Architected Framework - 6 Pillars","description":"The AWS Well-Architected Framework is a set of best practices for designing cloud architectures that are secure, high-performing, resilient, and efficient. The framework consists of six pillars: 1) Operational Excellence - focuses on running and monitoring systems to deliver business value and continually improving processes and procedures. Design principles include: organize teams around business outcomes, implement observability for actionable insights, safely automate where possible, make frequent small reversible changes, refine operations procedures frequently, anticipate failure, learn from all operational events, and use managed services. 2) Security - protects information and systems through confidentiality, integrity, and availability. Design principles include: implement a strong identity foundation, enable traceability, apply security at all layers, automate security best practices, protect data in transit and at rest, keep people away from data, and prepare for security events. 3) Reliability - ensures a workload performs its intended function correctly and consistently. Design principles include: automatically recover from failure, test recovery procedures, scale horizontally to increase availability, stop guessing capacity, and manage change via automation. 4) Performance Efficiency - uses computing resources efficiently to meet system requirements. Design principles include: democratize advanced technologies, go global in minutes, use serverless architectures, experiment more often, and mechanical sympathy. 5) Cost Optimization - runs systems to deliver business value at the lowest price point. Design principles include: implement Cloud Financial Management, adopt a consumption model, measure overall efficiency, stop spending money on undifferentiated heavy lifting, and analyze and attribute expenditure. 6) Sustainability - minimizes the environmental impacts of running cloud workloads. Design principles include: understand your impact, establish sustainability goals, maximize utilization, use efficient hardware, use managed services, and reduce downstream impact.","category":"Cloud Architecture Concepts","url":"https://docs.aws.amazon.com/wellarchitected/latest/framework/welcome.html","exams":["AIF-C01, SAA-C03"],"entryType":"collection","is_collection":true,"collection_items":[{"name":"Operational Excellence","description":"Focuses on running and monitoring systems to deliver business value and continually improving processes and procedures. Key AWS services: CloudFormation, CloudWatch, Config, Systems Manager."},{"name":"Security","description":"Protects information and systems through confidentiality, integrity, and availability. Key AWS services: IAM, KMS, CloudTrail, GuardDuty, WAF."},{"name":"Reliability","description":"Ensures a workload performs its intended function correctly and consistently. Key AWS services: Route 53, Auto Scaling, Elastic Load Balancing, AWS Backup."},{"name":"Performance Efficiency","description":"Uses computing resources efficiently to meet system requirements. Key AWS services: Lambda, CloudFront, Auto Scaling, EC2."},{"name":"Cost Optimization","description":"Runs systems to deliver business value at the lowest price point. Key AWS services: Cost Explorer, Trusted Advisor, Budgets, Savings Plans."},{"name":"Sustainability","description":"Minimizes the environmental impacts of running cloud workloads. Key AWS services: Graviton, S3 Intelligent-Tiering, Instance Scheduler."}],"sources":["aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"AWS Well-Architected Tool","description":"Helps you review the state of your workloads and compares them to the latest AWS architectural best practices. The tool is based on the AWS Well-Architected Framework. | A service that helps you review the state of your workloads and compares them to the latest AWS architectural best practices. The tool is based on the AWS Well-Architected Framework, which consists of six pillars: Operational Excellence, Security, Reliability, Performance Efficiency, Cost Optimization, and Sustainability. You answer questions about your workload, and the tool provides improvement plans with prioritized recommendations.","category":"Management & Governance","url":"https://aws.amazon.com/well-architected-tool/","exams":["AIF-C01","CLF-C02","SAA-C03"],"entryType":"service","domains":["Security, Compliance, and Governance for AI Solutions","Design Secure Architectures","Design Resilient Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS X-Ray","description":"A service that helps developers analyze and debug distributed applications in production or under development, such as those built using a microservices architecture. X-Ray provides an end-to-end view of requests as they travel through your application, showing a map of your application's underlying components and a trace of requests with latency and error data. Integrates with Lambda, ECS, EC2, Elastic Beanstalk, and API Gateway. Essential for troubleshooting performance bottlenecks in serverless applications.","category":"Developer Tools","url":"https://aws.amazon.com/xray/","exams":["CLF-C02","SAA-C03"],"entryType":"service","domains":["Design Resilient Architectures","Design High-Performing Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Backpropagation","description":"The algorithm used to train neural networks by calculating how much each weight contributed to the error and adjusting weights accordingly. It works by propagating the error backward from the output layer through each hidden layer to the input layer, computing gradients (partial derivatives) at each step. These gradients tell us which direction to adjust each weight to reduce the error. Backpropagation combined with gradient descent is how neural networks learn.","category":"Machine Learning Concepts","url":"https://docs.aws.amazon.com/sagemaker/latest/dg/deep-learning.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Backup and Restore","description":"The lowest-cost disaster recovery strategy in which data is backed up and infrastructure is recreated after an outage. It usually has the highest RTO and RPO among the common DR patterns.","category":"Architecture Patterns","url":"https://docs.aws.amazon.com/whitepapers/latest/disaster-recovery-workloads-on-aws/disaster-recovery-options-in-the-cloud.html","exams":["SAA-C03"],"entryType":"concept","domains":["Design Resilient Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Batch Inference","description":"A prediction pattern where you process many records together on a schedule or as a job instead of responding immediately per request. It is a better fit for offline scoring, nightly processing, and cost-efficient bulk workloads. | A method of running machine learning predictions on a large set of data all at once, rather than one-by-one in real-time. Also called batch transformation or offline inference. You submit a dataset (e.g., CSV file in S3), and the model processes all records and returns results. More cost-effective than real-time inference for large volumes where immediate results aren't needed. Amazon SageMaker Batch Transform and Amazon Bedrock batch inference support this pattern.","category":"Machine Learning Concepts","url":"https://docs.aws.amazon.com/sagemaker/latest/dg/batch-transform.html","exams":["AIF-C01"],"entryType":"concept","domains":["Fundamentals of AI and ML"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Batch Inferencing","description":"The process of running predictions on a large dataset all at once, rather than in real-time. Suitable for scenarios where immediate responses are not required, such as generating nightly reports, processing monthly forecasts, or analyzing archived data.","category":"AI/ML Fundamentals","url":"https://docs.aws.amazon.com/sagemaker/latest/dg/batch-transform.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"Batch Size","description":"The number of training examples used in one iteration of model training before updating the weights. Small batch sizes (e.g., 32-128) provide more frequent weight updates and can help escape local minima but are slower. Large batch sizes train faster but may converge to poorer solutions and require more memory. The choice of batch size affects training speed, memory usage, and model quality. GPU memory constraints often limit maximum batch size.","category":"Machine Learning Concepts","url":"https://docs.aws.amazon.com/sagemaker/latest/dg/deep-learning.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Beam Search","description":"A search algorithm used during text generation to find the most likely sequence of tokens. Instead of greedily choosing the most likely token at each step (which can lead to suboptimal overall sequences), beam search keeps track of the top 'k' (beam width) most likely partial sequences at each step and expands them. It produces higher quality outputs than greedy decoding but is more computationally expensive. Used in machine translation and text summarization.","category":"Machine Learning Concepts","url":"https://docs.aws.amazon.com/translate/latest/dg/customizing-translations.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Benchmark Datasets","description":"Standardized datasets used to evaluate and compare the performance of AI models on specific tasks. Examples include GLUE and SuperGLUE for language understanding, ImageNet for image classification, and MMLU for measuring knowledge across domains.","category":"AI/ML Fundamentals","url":"https://docs.aws.amazon.com/bedrock/latest/userguide/model-evaluation.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"BERTScore","description":"A semantic evaluation metric that uses contextual embeddings to compare generated text with a reference more meaningfully than simple word overlap. It is part of the exam’s model-evaluation vocabulary. | An evaluation metric for text generation that uses contextual embeddings from BERT (a pre-trained language model) to compare generated text with reference text. Instead of exact word matching like BLEU or ROUGE, BERTScore computes semantic similarity using embeddings, allowing it to recognize paraphrases and synonyms. For example, 'car' and 'automobile' would have high BERTScore even though they're different words. It provides precision, recall, and F1 scores.","category":"Generative AI Concepts","url":"https://docs.aws.amazon.com/sagemaker/latest/dg/clarify-foundation-model-evaluate-metrics.html","exams":["AIF-C01"],"entryType":"metric","domains":["Applications of Foundation Models"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"BLEU","description":"A machine translation and text-generation metric that measures n-gram overlap between generated output and a reference answer. It is useful, but like ROUGE, it should not be mistaken for perfect semantic understanding.","category":"GenAI Metrics","url":"https://docs.aws.amazon.com/sagemaker/latest/dg/clarify-foundation-model-evaluate-metrics.html","exams":["AIF-C01"],"entryType":"metric","domains":["Applications of Foundation Models"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"BLEU Score","description":"Bilingual Evaluation Understudy (BLEU) is a metric for evaluating the quality of text generated by AI, particularly in machine translation and text summarization. It measures the overlap between the generated text and one or more reference texts written by humans, counting matching n-grams (sequences of words). BLEU scores range from 0 to 1 (or 0-100%), with higher scores indicating closer matches to human references. It's commonly used in Amazon Bedrock Model Evaluation.","category":"Generative AI Concepts","url":"https://docs.aws.amazon.com/bedrock/latest/userguide/model-evaluation.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Blue/Green Deployment for ML","description":"A deployment strategy where you maintain two identical production environments (blue and green). The current model runs on blue while the new model is deployed to green. After testing green, you switch traffic from blue to green. If issues arise, you can quickly roll back to blue. This minimizes downtime and risk when deploying new models. SageMaker endpoints support blue/green deployment through traffic shifting and endpoint variants.","category":"Machine Learning Concepts","url":"https://docs.aws.amazon.com/sagemaker/latest/dg/model-registry-deployment.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Caching Strategies","description":"Techniques for improving application performance by storing frequently accessed data closer to the application. AWS caching options: ElastiCache (Redis/Memcached for in-memory caching of database queries, sessions, leaderboards), CloudFront (edge caching for static and dynamic content), DAX (DynamoDB Accelerator for microsecond DynamoDB reads), and S3 Transfer Acceleration (edge caching for uploads). Strategies: cache-aside (lazy loading), write-through (synchronous update), and TTL-based expiration.","category":"Architectural Concepts","url":"https://docs.aws.amazon.com/whitepapers/latest/performance-at-scale/caching.html","exams":["SAA-C03"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Canary Deployment for ML","description":"A deployment strategy where you gradually roll out a new model to a small percentage of users first, monitor for issues, and then progressively increase traffic. This limits the blast radius if the new model has problems. For example, you might start with 5% of traffic, then 25%, then 50%, and finally 100%. SageMaker supports canary deployments through traffic shifting configurations on endpoints, allowing controlled rollouts with automatic rollback if error thresholds are exceeded.","category":"Machine Learning Concepts","url":"https://docs.aws.amazon.com/sagemaker/latest/dg/model-registry-deployment.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Chain-of-Thought Prompting","description":"A prompting pattern that encourages a model to reason through intermediate steps before reaching a final answer. It can improve complex-task performance, but should not be treated as a magic fix for accuracy. | A prompting technique that encourages the AI model to show its reasoning step-by-step before giving a final answer. You add phrases like 'Let's think through this step by step' or provide examples that include the reasoning process. This dramatically improves performance on complex reasoning tasks like math problems, logic puzzles, and multi-step analysis. The model's output becomes more interpretable because you can see how it arrived at its conclusion.","category":"Generative AI Concepts","url":"https://docs.aws.amazon.com/bedrock/latest/userguide/prompt-engineering-guidelines.html","exams":["AIF-C01"],"entryType":"concept","domains":["Fundamentals of Generative AI","Applications of Foundation Models"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Chunking","description":"The practice of splitting source content into smaller pieces before embedding or retrieval. In RAG systems, chunking strongly affects what context gets retrieved and how useful the final answer is. | The process of breaking large documents into smaller pieces (chunks) for processing by language models or storage in vector databases. Chunking is essential for RAG systems because LLMs have context limits and vector databases store embeddings of text segments. Common chunking strategies include fixed-size chunks, sentence-based chunks, and semantic chunks. The chunk size affects retrieval quality — too small loses context, too large reduces precision.","category":"Generative AI Concepts","url":"https://aws.amazon.com/blogs/machine-learning/chunking-techniques-for-rag/","exams":["AIF-C01"],"entryType":"concept","domains":["Fundamentals of Generative AI","Applications of Foundation Models"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Class Imbalance","description":"A situation in classification problems where the distribution of classes in the training data is uneven. For example, in medical diagnosis, most patients may be healthy with only a small percentage having a disease. Class imbalance causes models to achieve high accuracy by simply predicting the majority class while performing poorly on the minority class. Solutions include resampling techniques, cost-sensitive learning, and using appropriate evaluation metrics like F1 score and AUC-ROC.","category":"Machine Learning Concepts","url":"https://docs.aws.amazon.com/sagemaker/latest/dg/sagemaker-clarify-processing-component-config.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Classification","description":"A supervised learning technique used to predict a discrete label or category, such as spam/not spam or approve/deny. If the answer belongs to a bucket or class, classification is usually the right framing.","category":"AI/ML Fundamentals","url":"https://aws.amazon.com/what-is/classification-in-machine-learning/","exams":["AIF-C01"],"entryType":"concept","domains":["Fundamentals of AI and ML"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"CloudFront Origin Access Control (OAC)","description":"A security feature that restricts direct access to an S3 bucket origin, allowing content to only be served through your CloudFront distribution. Without OAC, anyone who discovers your S3 bucket URL can bypass CloudFront and access files directly (bypassing your WAF rules, caching, and cost optimization). OAC is the modern, recommended replacement for the older Origin Access Identity (OAI). It also supports SSE-KMS encrypted S3 buckets.","category":"Networking & Content Delivery","url":"https://docs.aws.amazon.com/AmazonCloudFront/latest/DeveloperGuide/private-content-restricting-access-to-s3.html","exams":["SAA-C03"],"entryType":"concept","domains":["Design High-Performing Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Clustering","description":"An unsupervised learning technique that groups similar records together without preexisting labels. The exam often uses clustering to contrast with classification when no target classes are known in advance.","category":"AI/ML Fundamentals","url":"https://aws.amazon.com/what-is/clustering-in-machine-learning/","exams":["AIF-C01"],"entryType":"concept","domains":["Fundamentals of AI and ML"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Cognito User Pools vs. Identity Pools","description":"Two distinct components of Amazon Cognito with very different purposes. User Pools are a user directory — they handle authentication (sign-up, sign-in, MFA, password reset) and issue JWT tokens (ID token, access token). Identity Pools (Federated Identities) grant authenticated or even anonymous users temporary, scoped AWS credentials (via STS) to directly access AWS services like S3 or DynamoDB. They are often used together: User Pool authenticates the user, Identity Pool grants them AWS access.","category":"Security, Identity, & Compliance","url":"https://docs.aws.amazon.com/cognito/latest/developerguide/what-is-amazon-cognito.html","exams":["SAA-C03"],"entryType":"concept","domains":["Design Secure Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Cohere Models","description":"A family of large language models available through Amazon Bedrock, specializing in enterprise applications. Cohere offers models for text generation, embedding, and reranking, with particular strength in RAG (Retrieval-Augmented Generation) workflows and multilingual capabilities.","category":"Machine Learning","url":"https://docs.aws.amazon.com/bedrock/latest/userguide/model-parameters-cohere.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"Cold Start Problem","description":"A challenge in recommendation systems where the system has insufficient data to make good recommendations for new users or new items. For new users, there's no history to base recommendations on. For new items, there's no interaction data to determine similarity. Solutions include using content-based recommendations (based on item attributes), asking users for preferences during onboarding, and using popularity-based recommendations as a fallback. Amazon Personalize handles cold start through item metadata and exploration strategies.","category":"Machine Learning Concepts","url":"https://aws.amazon.com/personalize/features/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Compute Optimized Instances","description":"EC2 instance types (C family) ideal for compute-intensive workloads requiring high-performance processors. Suitable for gaming servers, high-performance computing (HPC), scientific modeling, and batch processing workloads.","category":"Compute","url":"https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/compute-optimized-instances.html","exams":["SAA-C03"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"Compute Optimizer Recommendations","description":"Recommendations produced by AWS Compute Optimizer after analyzing historical utilization to help right-size resources. In cost questions, this is a clue toward reducing overprovisioning without guessing blindly.","category":"Management & Governance","url":"https://aws.amazon.com/compute-optimizer/","exams":["SAA-C03"],"entryType":"concept","domains":["Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Computer Vision","description":"The AI field focused on extracting meaning from images and video, such as object detection, OCR, and facial analysis. In AWS-land, Amazon Rekognition and Amazon Textract are the classic service anchors for this concept.","category":"AI/ML Fundamentals","url":"https://aws.amazon.com/what-is/computer-vision/","exams":["AIF-C01"],"entryType":"concept","domains":["Fundamentals of AI and ML"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Confusion Matrix","description":"A table that visualizes the performance of a classification model by showing the counts of True Positives, True Negatives, False Positives, and False Negatives. It provides a complete picture of what types of errors the model makes. From the confusion matrix, you can calculate accuracy, precision, recall, and F1 score. It's essential for understanding model behavior beyond a single accuracy number, especially for imbalanced datasets.","category":"Machine Learning Concepts","url":"https://docs.aws.amazon.com/sagemaker/latest/dg/clarify-model-monitor-metrics.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Content Delivery Network (CDN)","description":"A distributed network of servers that delivers content to users based on geographic proximity. Amazon CloudFront is AWS's CDN service, caching content at edge locations worldwide to reduce latency and improve user experience.","category":"Networking & Content Delivery","url":"https://docs.aws.amazon.com/AmazonCloudFront/latest/DeveloperGuide/Introduction.html","exams":["SAA-C03"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"Content Filtering","description":"The practice of automatically detecting and blocking harmful, inappropriate, or unwanted content generated by or input to AI systems. This includes filtering for hate speech, violence, sexual content, harassment, and dangerous instructions. Amazon Bedrock Guardrails provides configurable content filters that can block harmful content in both user inputs and model outputs. Content filtering is essential for deploying AI safely in production environments.","category":"Responsible AI Concepts","url":"https://aws.amazon.com/bedrock/guardrails/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Context Window","description":"The maximum amount of text (measured in tokens) that an LLM can 'see' and process in a single interaction — including both the input (your prompt, conversation history, retrieved documents) and the output. A larger context window lets the model consider more information at once. When your input exceeds the context window, older parts of the conversation are dropped.","category":"Generative AI Concepts","url":"https://aws.amazon.com/bedrock/","exams":["AIF-C01"],"entryType":"concept","domains":["Fundamentals of Generative AI","Applications of Foundation Models"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Continuous Pre-training","description":"The process of further training a pre-trained foundation model on domain-specific or organization-specific data to adapt its knowledge to particular use cases. This extends the model's capabilities without starting from scratch.","category":"AI/ML Fundamentals","url":"https://docs.aws.amazon.com/bedrock/latest/userguide/custom-models.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"Convolutional Neural Network (CNN)","description":"A type of neural network particularly effective for image processing and computer vision tasks. CNNs use convolutional layers that apply filters to detect features like edges, textures, and shapes at different locations in the image. Pooling layers reduce spatial dimensions, making the network more efficient. CNNs have fewer parameters than fully connected networks because they share weights across spatial locations. Amazon Rekognition uses CNNs for image analysis.","category":"Machine Learning Concepts","url":"https://aws.amazon.com/what-is/convolutional-neural-network/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Cosine Similarity","description":"A metric used to measure the similarity between two vectors by calculating the cosine of the angle between them. It ranges from -1 (opposite directions) to 1 (same direction), with 0 indicating orthogonality (no similarity). Cosine similarity is commonly used in semantic search and recommendation systems to find items with similar embeddings. Unlike Euclidean distance, cosine similarity is not affected by vector magnitude — it measures orientation rather than absolute position.","category":"Generative AI Concepts","url":"https://aws.amazon.com/what-is/vector-databases/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Cost Allocation Tags","description":"Labels assigned to AWS resources for cost tracking and categorization. Tags enable organizations to organize and track costs by department, project, environment, or other dimensions, providing visibility into spending patterns.","category":"Cloud Financial Management","url":"https://docs.aws.amazon.com/aws-cost-management/latest/userguide/cost-alloc-tags.html","exams":["SAA-C03"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"Cost Optimization Strategies","description":"Approaches to minimize AWS costs without sacrificing performance: Right-Sizing (match instance types to workload requirements), Reserved Capacity (RIs and Savings Plans for predictable workloads), Spot Instances (up to 90% savings for fault-tolerant workloads), Auto Scaling (match capacity to demand), Storage Optimization (right storage class for data access patterns), Data Transfer Optimization (minimize cross-region/AZ traffic), and Tagging (cost allocation and visibility). Use Cost Explorer, Budgets, and Trusted Advisor for monitoring.","category":"Architectural Concepts","url":"https://docs.aws.amazon.com/wellarchitected/latest/cost-optimization-pillar/welcome.html","exams":["SAA-C03"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Cross-Account Access","description":"A design pattern where users or workloads in one AWS account assume roles or otherwise access resources in another account. It is central to multi-account security architecture and usually relies on IAM roles and AWS STS.","category":"Security, Identity, & Compliance","url":"https://docs.aws.amazon.com/IAM/latest/UserGuide/tutorial_cross-account-with-roles.html","exams":["SAA-C03"],"entryType":"concept","domains":["Design Secure Architectures"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Cross-Validation","description":"A technique for evaluating machine learning models by training and testing on different subsets of the data multiple times. In k-fold cross-validation, the data is divided into k subsets, and the model is trained k times — each time using a different subset as the test set and the remaining as training. The results are averaged to get a more robust estimate of model performance. Cross-validation helps detect overfitting and provides a better estimate of how the model will perform on unseen data.","category":"Machine Learning Concepts","url":"https://docs.aws.amazon.com/sagemaker/latest/dg/automatic-model-tuning-how-it-works.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Custom Model","description":"A model that has been adapted for a specific domain or task, often through fine-tuning or other customization techniques. In AWS generative AI contexts, custom models usually imply more control and specialization but also more cost and governance overhead.","category":"Generative AI Concepts","url":"https://docs.aws.amazon.com/bedrock/latest/userguide/custom-models.html","exams":["AIF-C01"],"entryType":"concept","domains":["Fundamentals of Generative AI","Applications of Foundation Models","Security, Compliance, and Governance for AI Solutions"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Data Analytics Services","description":"AWS offers a comprehensive suite of data analytics services for different use cases. (1) Amazon Athena - serverless interactive query service using standard SQL to analyze data directly in S3, pay-per-query pricing, integrates with Glue Data Catalog; use for ad-hoc querying, log analysis, and data exploration without ETL. (2) AWS Glue - serverless ETL service for data preparation and transformation, Glue Data Catalog for metadata management, Glue Crawlers for automatic schema discovery, supports Python and Scala; use for building data lakes, ETL pipelines, and data integration. (3) Amazon QuickSight - fully managed BI service for creating dashboards and visualizations, SPICE in-memory engine for fast queries, ML-powered insights, natural language queries (QuickSight Q); use for business intelligence, reporting, and data visualization. (4) Amazon EMR - managed Hadoop framework for big data processing, supports Spark, Hive, Presto, Flink, runs on EC2 or EMR Serverless; use for large-scale data processing, machine learning, and ETL at petabyte scale. (5) Amazon Redshift - fully managed data warehouse, columnar storage, MPP architecture, integrates with S3 via Redshift Spectrum; use for data warehousing, complex SQL analytics, and business intelligence workloads. (6) Amazon Kinesis - real-time data streaming services including Data Streams (custom consumers), Data Firehose (load to destinations), Data Analytics (SQL/Flink processing), and Video Streams; use for real-time analytics, IoT data ingestion, and log processing. (7) AWS Lake Formation - build and govern data lakes, central permissions management, data catalog integration; use for organizing and securing data lakes.","category":"Analytics","url":"https://docs.aws.amazon.com/whitepapers/latest/aws-overview/analytics-services.html","exams":["SAA-C03"],"entryType":"collection","is_collection":true,"collection_items":[{"name":"Amazon Athena","description":"An interactive query service that makes it easy to analyze data in Amazon S3 using standard SQL. Athena is serverless, so there is no infrastructure to manage, and you pay only for the queries that you run."},{"name":"AWS Glue","description":"A fully managed extract, transform, and load (ETL) service that makes it easy for customers to prepare and load their data for analytics. You can create and run an ETL job with a few clicks."},{"name":"Amazon QuickSight","description":"A fast, cloud-powered business intelligence (BI) service that makes it easy for you to deliver insights to everyone in your organization through interactive dashboards."},{"name":"Amazon EMR","description":"The industry-leading cloud big data platform for processing vast amounts of data using open source tools such as Apache Spark, Apache Hive, Apache HBase, Apache Flink, Apache Hudi, and Presto."},{"name":"Amazon Redshift","description":"The most widely used cloud data warehouse. It makes it fast, simple and cost-effective to analyze all your data using standard SQL and your existing Business Intelligence (BI) tools."},{"name":"Amazon Kinesis","description":"Makes it easy to collect, process, and analyze real-time, streaming data so you can get timely insights and react quickly to new information. It offers key capabilities to cost-effectively process streaming data at any scale."},{"name":"AWS Lake Formation","description":"A service that makes it easy to set up a secure data lake in days. A data lake is a centralized, curated, and secured repository that stores all your data, both in its original form and prepared for analysis."}],"sources":["aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Data Augmentation","description":"Techniques for artificially expanding training datasets by creating modified versions of existing data. For images, this includes rotation, flipping, cropping, and color adjustments. For text, this includes synonym replacement, back-translation, and paraphrasing. Data augmentation helps prevent overfitting, improves model generalization, and reduces the need for collecting large amounts of training data. It's a standard practice in computer vision and increasingly used in NLP.","category":"Machine Learning Concepts","url":"https://docs.aws.amazon.com/sagemaker/latest/dg/data-augmentation.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Data Lake","description":"A centralized repository that stores large volumes of raw and curated data in many formats for analytics, ML, and reporting. In AWS architecture questions, S3 plus Glue plus Lake Formation plus analytics tools is the standard mental model.","category":"Analytics","url":"https://aws.amazon.com/what-is/data-lake/","exams":["SAA-C03"],"entryType":"concept","domains":["Design High-Performing Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Data Lineage","description":"The ability to trace where data came from, how it moved, and how it changed over time. In AI governance, lineage supports auditability, source documentation, and trust.","category":"GenAI Security","url":"https://docs.aws.amazon.com/whitepapers/latest/modern-data-architecture-rationales-on-aws/data-lineage.html","exams":["AIF-C01"],"entryType":"concept","domains":["Security, Compliance, and Governance for AI Solutions"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Data Poisoning","description":"An adversarial attack where malicious data is injected into a model's training dataset to corrupt its behavior. Poisoned models may produce incorrect outputs, exhibit bias,
