s[gpt5].json"]},{"name":"Missing Data Imputation","description":"Techniques for handling missing values in datasets. Options include removing rows with missing values, filling with mean/median/mode, using forward/backward fill for time series, or using ML models to predict missing values based on other features. The choice depends on why data is missing and how much is missing. Poor imputation can introduce bias. SageMaker Data Wrangler provides multiple imputation options for handling missing data in ML workflows.","category":"Machine Learning Concepts","url":"https://docs.aws.amazon.com/sagemaker/latest/dg/data-wrangler-transform.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Mistral AI Models","description":"Large language models developed by Mistral AI, available through Amazon Bedrock. Known for efficiency and strong performance-to-size ratio, Mistral models excel in text generation, code completion, and reasoning tasks while maintaining smaller parameter counts.","category":"Machine Learning","url":"https://docs.aws.amazon.com/bedrock/latest/userguide/model-parameters-mistral.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"MLOps (Machine Learning Operations)","description":"A set of practices that combine Machine Learning, DevOps, and Data Engineering to deploy and maintain ML models in production reliably and efficiently. Just as DevOps bridges development and operations for software, MLOps bridges data science and IT operations for ML. Key capabilities include automated pipelines (SageMaker Pipelines), model monitoring (SageMaker Model Monitor), and model registries.","category":"Generative AI Concepts","url":"https://aws.amazon.com/sagemaker/mlops/","exams":["AIF-C01"],"entryType":"concept","domains":["Fundamentals of AI and ML"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"MLOps Lifecycle Components","description":"MLOps (Machine Learning Operations) is the practice of applying DevOps principles to machine learning workflows to enable continuous integration, delivery, and deployment of ML models. Amazon SageMaker provides comprehensive MLOps capabilities. The ML lifecycle consists of: 1) Problem Definition - document problem statements, establish goals, identify risks, and establish teams. 2) Data Preparation - identify and obtain data, engineer features, check for bias, and develop data pipelines using SageMaker Data Wrangler and Feature Store. 3) Model Development - explore algorithms, build and train models via experiments, test and validate, check for biases, and establish explainability using SageMaker Experiments and Clarify. 4) Model Deployment - validate code quality, use CI/CD pipelines, deploy with strategies like blue/green or canary using SageMaker Endpoints and Model Registry. 5) Model Monitoring - set up monitoring for data drift, model drift, bias drift, and performance using SageMaker Model Monitor. Key MLOps practices include: Everything as Code, lineage tracking, CI/CD pipelines, and continuous monitoring.","category":"Machine Learning Concepts","url":"https://docs.aws.amazon.com/sagemaker/latest/dg/mlops.html","exams":["AIF-C01"],"entryType":"collection","is_collection":true,"collection_items":[{"name":"Problem Definition","description":"Document problem statements, establish goals and ROI, identify risks, and assemble cross-functional teams (product owner, data scientist, MLOps engineer)."},{"name":"Data Preparation","description":"Identify and obtain data, engineer features using SageMaker Data Wrangler, store features in SageMaker Feature Store, check for bias, and develop data pipelines."},{"name":"Model Development","description":"Explore algorithms, build and train models using SageMaker Experiments, test and validate, check for biases with SageMaker Clarify, and establish model explainability."},{"name":"Model Deployment","description":"Validate code quality, use CI/CD pipelines with SageMaker Pipelines, deploy using strategies like blue/green, canary, or rolling deployments via SageMaker Endpoints."},{"name":"Model Monitoring","description":"Monitor for data drift, model drift, bias drift, and performance using SageMaker Model Monitor. Set up alerts and demonstrate ROI."},{"name":"MLOps Key Practices","description":"Everything as Code (IaC), lineage tracking with SageMaker ML Lineage Tracking, CI/CD with SageMaker Pipelines, and continuous monitoring with Model Monitor."}],"sources":["aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Model Cards","description":"Documentation artifacts that provide standardized information about machine learning models, including their intended use, performance characteristics, limitations, training data, and ethical considerations. Model cards promote transparency and help users understand when and how to appropriately use a model. Amazon SageMaker Model Cards provide a structured way to document and share this information across teams and stakeholders.","category":"Responsible AI Concepts","url":"https://aws.amazon.com/sagemaker/model-cards/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Model Deployment","description":"The process of making a trained machine learning model available for use in production environments. This involves packaging the model, creating endpoints or APIs for inference, and setting up the necessary infrastructure to serve predictions to applications or users.","category":"AI/ML Fundamentals","url":"https://docs.aws.amazon.com/sagemaker/latest/dg/deploy-model.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"Model Drift","description":"The degradation of a machine learning model's performance over time as the real-world data it encounters diverges from the training data. Types include: Data Drift (input data distribution changes), Concept Drift (the relationship between inputs and outputs changes), and Prediction Drift (model output distribution changes). For example, a fraud detection model trained before a new type of fraud emerges will experience drift. Amazon SageMaker Model Monitor automatically detects model drift in production.","category":"Machine Learning Concepts","url":"https://aws.amazon.com/sagemaker/model-monitor/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Model Monitoring","description":"The ongoing process of tracking a deployed machine learning model's performance and behavior in production. Includes detecting data drift (changes in input data distribution), concept drift (changes in the relationship between inputs and outputs), and model degradation over time.","category":"AI/ML Fundamentals","url":"https://docs.aws.amazon.com/sagemaker/latest/dg/model-monitor.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"Model Parameters","description":"The internal variables (weights and biases) that a neural network learns during training and uses to make predictions. 'Large' Language Models are called 'large' because they have billions or even trillions of parameters. For example, GPT-4 has an estimated 1.76 trillion parameters, while Amazon Titan models range from hundreds of millions to hundreds of billions. More parameters generally mean greater capacity to learn complex patterns, but also require more compute for training and inference.","category":"Generative AI Concepts","url":"https://aws.amazon.com/what-is/large-language-model/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Model Versioning","description":"The practice of tracking and managing different versions of machine learning models throughout their lifecycle. Each version represents a specific set of model artifacts, code, and dependencies. Versioning enables reproducibility, rollbacks, and comparison between models. Amazon SageMaker Model Registry provides built-in model versioning with approval workflows, lineage tracking, and metadata storage. Proper versioning is essential for production MLOps and compliance.","category":"Machine Learning Concepts","url":"https://aws.amazon.com/sagemaker/model-registry/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Multi-Factor Authentication (MFA)","description":"A security mechanism requiring users to provide two or more verification factors to access AWS resources. MFA adds an extra layer of protection beyond passwords, significantly reducing the risk of unauthorized access from compromised credentials.","category":"Security, Identity, & Compliance","url":"https://docs.aws.amazon.com/IAM/latest/UserGuide/id_credentials_mfa.html","exams":["SAA-C03"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"Multi-modal AI","description":"AI models that can understand and generate multiple types of data — text, images, audio, and video — within a single model. For example, you can give a multi-modal model an image and ask a text question about it, and it will respond with text. Amazon Titan and Anthropic Claude on Amazon Bedrock support multi-modal inputs.","category":"Generative AI Concepts","url":"https://aws.amazon.com/bedrock/","exams":["AIF-C01"],"entryType":"concept","domains":["Fundamentals of Generative AI","Applications of Foundation Models"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Multi-modal Models","description":"AI models capable of processing and generating multiple types of data modalities, such as text, images, audio, and video. These models can understand relationships between different data types, enabling tasks like image captioning, visual question answering, and text-to-image generation.","category":"Generative AI Concepts","url":"https://docs.aws.amazon.com/bedrock/latest/userguide/models-supported.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"Multi-Region Architecture","description":"A design pattern that spans multiple AWS geographic regions to achieve higher availability and disaster recovery capabilities. Multi-region architectures can provide active-active or active-passive failover configurations for business-critical applications.","category":"Architecture Patterns","url":"https://docs.aws.amazon.com/wellarchitected/latest/reliability-pillar/rel-planning-for-recovery.html","exams":["SAA-C03"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"Multi-Tier Architecture","description":"An architecture that separates presentation, application, and data layers so each tier can scale, secure, and fail independently. This is one of the most common baseline design patterns in SAA scenarios.","category":"Architecture Patterns","url":"https://aws.amazon.com/traditional-three-tier-architecture/","exams":["SAA-C03"],"entryType":"concept","domains":["Design Secure Architectures","Design Resilient Architectures","Design High-Performing Architectures"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"NAT Gateway","description":"A fully managed AWS service that allows EC2 instances in a private subnet to initiate outbound connections to the internet (e.g., to download software patches) without allowing unsolicited inbound connections from the internet. It sits in a public subnet and translates the private IP addresses of outbound traffic to its own public Elastic IP. Contrast with an Internet Gateway, which allows both inbound and outbound traffic to public subnets.","category":"Networking & Content Delivery","url":"https://docs.aws.amazon.com/vpc/latest/userguide/vpc-nat-gateway.html","exams":["SAA-C03"],"entryType":"service","domains":["Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Natural Language Processing (NLP)","description":"The branch of AI focused on understanding and generating human language. Typical exam examples include sentiment analysis, translation, summarization, and chatbots.","category":"AI/ML Fundamentals","url":"https://aws.amazon.com/what-is/nlp/","exams":["AIF-C01"],"entryType":"concept","domains":["Fundamentals of AI and ML"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Negative Prompting","description":"An instruction style commonly used in image and multimodal generation to tell the model what should not appear in the output. It is useful when you need tighter control over undesired artifacts or styles.","category":"Generative AI Concepts","url":"https://docs.aws.amazon.com/bedrock/latest/userguide/model-parameters-titan-image.html","exams":["AIF-C01"],"entryType":"concept","domains":["Fundamentals of Generative AI","Applications of Foundation Models"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Negative Prompts","description":"Instructions in a prompt that specify what the model should NOT include in its output. Used to filter unwanted content, styles, or behaviors. For example, specifying 'no technical jargon' or 'do not include references' helps guide the model away from undesired outputs.","category":"Generative AI Concepts","url":"https://docs.aws.amazon.com/bedrock/latest/userguide/prompt-engineering-guidelines.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"Network ACLs (NACLs)","description":"An optional layer of security for VPCs that acts as a firewall for controlling traffic at the subnet level. Network ACLs are stateless and support both allow and deny rules, processed in order from lowest to highest rule number.","category":"Security, Identity, & Compliance","url":"https://docs.aws.amazon.com/vpc/latest/userguide/vpc-network-acls.html","exams":["SAA-C03"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"Network Load Balancer (NLB)","description":"An Elastic Load Balancer that operates at Layer 4 (Transport layer), routing TCP, UDP, and TLS traffic. It is designed for extreme performance — handling millions of requests per second with ultra-low latency (single-digit milliseconds). A key feature is its ability to preserve the client's source IP address, which ALBs cannot do natively. Also provides a static IP address per Availability Zone. Best for non-HTTP workloads like gaming or financial trading.","category":"Networking & Content Delivery","url":"https://aws.amazon.com/elasticloadbalancing/network-load-balancer/","exams":["SAA-C03"],"entryType":"service","domains":["Design Resilient Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Neural Network","description":"A model architecture inspired by interconnected neurons, built from layers of mathematical units that learn patterns in data. Neural networks are foundational to deep learning, large language models, and many vision systems. | A computational model inspired by the human brain, consisting of interconnected nodes (neurons) organized in layers. Data flows from an input layer through one or more hidden layers to an output layer. Each connection has a weight that the network learns during training. Neural networks are the foundation of deep learning and power everything from image classification to language translation. Modern LLMs use transformer-based neural networks with billions of parameters.","category":"Machine Learning Concepts","url":"https://aws.amazon.com/what-is/neural-network/","exams":["AIF-C01"],"entryType":"concept","domains":["Fundamentals of AI and ML"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Normalization","description":"A data preprocessing technique that scales numerical features to a standard range, typically 0-1 or with mean 0 and standard deviation 1. Normalization ensures that features with different scales (e.g., age in years vs. income in dollars) contribute equally to model training. Without normalization, features with larger scales can dominate the learning process. Common methods include min-max scaling and z-score standardization. Most ML algorithms benefit from normalized input data.","category":"Machine Learning Concepts","url":"https://docs.aws.amazon.com/sagemaker/latest/dg/data-wrangler-transform.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"One-Hot Encoding","description":"A technique for converting categorical variables into a numerical format that machine learning algorithms can process. Each category becomes a binary column (0 or 1), with a 1 indicating the presence of that category. For example, a 'color' column with values [red, green, blue] becomes three columns: color_red, color_green, color_blue. One-hot encoding is necessary because most ML algorithms require numerical input and cannot directly process text categories.","category":"Machine Learning Concepts","url":"https://docs.aws.amazon.com/sagemaker/latest/dg/data-wrangler-transform.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"OpsWorks","description":"A configuration management service that provides managed instances of Chef and Puppet. These are automation platforms that allow you to use code to automate the configurations of your servers.","category":"Management & Governance","url":"https://aws.amazon.com/opsworks/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Outlier Detection","description":"Techniques for identifying data points that are significantly different from the majority of the data. Outliers can be errors that should be removed, or they can be important anomalies worth investigating. Methods include statistical approaches (Z-score, IQR), clustering-based methods, and isolation forests. In ML, outliers can skew training and reduce model performance. Amazon Lookout for Metrics provides managed outlier detection for business metrics.","category":"Machine Learning Concepts","url":"https://aws.amazon.com/lookout-for-metrics/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Overfitting","description":"A common machine learning problem where a model learns the training data too well — including its noise and outliers — resulting in poor performance on new, unseen data. An overfit model is like a student who memorizes answers instead of learning concepts. Signs include high accuracy on training data but low accuracy on test data. Mitigation techniques include using more training data, simplifying the model, dropout, and regularization. Amazon SageMaker Debugger helps detect overfitting.","category":"Machine Learning Concepts","url":"https://docs.aws.amazon.com/sagemaker/latest/dg/train-debugger.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Overfitting vs. Underfitting","description":"Overfitting happens when a model memorizes training data and generalizes poorly; underfitting happens when the model is too simple to capture useful patterns. This concept is closely tied to bias, variance, and model quality.","category":"AI/ML Fundamentals","url":"https://docs.aws.amazon.com/wellarchitected/latest/machine-learning-lens/bias-variance-tradeoff.html","exams":["AIF-C01"],"entryType":"concept","domains":["Fundamentals of AI and ML","Guidelines for Responsible AI"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Overlap in Chunking","description":"A technique where consecutive chunks share some content at their boundaries. For example, with a chunk size of 500 tokens and overlap of 50 tokens, each chunk shares 50 tokens with the previous chunk. Overlap helps preserve context that might otherwise be split across chunk boundaries, improving retrieval quality in RAG systems. Amazon Bedrock Knowledge Bases automatically handles chunking with configurable overlap when processing documents.","category":"Generative AI Concepts","url":"https://aws.amazon.com/bedrock/knowledge-bases/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"PartyRock, an Amazon Bedrock Playground","description":"A no-code generative AI playground built on Amazon Bedrock for quickly experimenting with prompts and lightweight GenAI apps. It is explicitly named in the exam guide as an AWS technology for building GenAI applications.","category":"Machine Learning","url":"https://partyrock.aws/","exams":["AIF-C01"],"entryType":"service","domains":["Fundamentals of Generative AI","Applications of Foundation Models"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"PII Detection and Masking","description":"Techniques for identifying and protecting Personally Identifiable Information (PII) in AI systems — including names, addresses, phone numbers, credit card numbers, and social security numbers. PII detection uses pattern matching and ML to find sensitive data, while masking replaces it with tokens or redacted text. Amazon Bedrock Guardrails can automatically detect and mask PII in both inputs and outputs, helping meet privacy regulations like GDPR and HIPAA.","category":"Responsible AI Concepts","url":"https://aws.amazon.com/bedrock/guardrails/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Pilot Light","description":"A disaster recovery strategy where only the core minimal environment is kept running in the recovery region and the rest is scaled up after a failure. It balances lower steady-state cost against slower recovery than warm standby or active-active.","category":"Architecture Patterns","url":"https://docs.aws.amazon.com/whitepapers/latest/disaster-recovery-workloads-on-aws/disaster-recovery-options-in-the-cloud.html","exams":["SAA-C03"],"entryType":"concept","domains":["Design Resilient Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Positional Encoding","description":"A technique used in Transformer models to give the model information about the position of tokens in a sequence. Unlike RNNs which process tokens sequentially, Transformers process all tokens in parallel and have no inherent sense of order. Positional encoding adds position-dependent values to the input embeddings, allowing the model to understand word order. This is essential for language understanding — 'dog bites man' means something different from 'man bites dog.'","category":"Machine Learning Concepts","url":"https://aws.amazon.com/what-is/transformers-in-artificial-intelligence/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Pre-training","description":"The initial phase of training a foundation model on large amounts of unlabeled data to learn general patterns, language structures, and world knowledge. This creates a base model that can be fine-tuned for specific tasks or domains. | The initial training phase where a Foundation Model learns general knowledge and capabilities from massive, diverse datasets. Pre-training typically uses self-supervised learning on unlabeled text (predicting the next word). This phase requires enormous compute resources and datasets. The result is a base model that understands language, world knowledge, and reasoning patterns but hasn't been specialized for specific tasks. Pre-training is done once by model providers like Amazon, Anthropic, and Meta.","category":"Generative AI Concepts","url":"https://docs.aws.amazon.com/bedrock/latest/userguide/custom-models.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Precision","description":"A classification metric measuring the proportion of positive predictions that are actually correct. Precision = True Positives / (True Positives + False Positives). High precision means when the model predicts positive, it's usually right. Important when false positives are costly — for example, in spam detection, high precision means legitimate emails rarely get marked as spam. Precision answers: 'Of all items predicted positive, how many actually are?'","category":"Machine Learning Concepts","url":"https://docs.aws.amazon.com/sagemaker/latest/dg/clarify-model-monitor-metrics.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"PrivateLink vs. VPC Peering","description":"AWS PrivateLink exposes a specific service privately without broad network transitivity, while VPC peering creates private network connectivity between entire VPCs. If you want tightly scoped service access, PrivateLink is usually the sharper tool.","category":"Networking & Content Delivery","url":"https://docs.aws.amazon.com/vpc/latest/privatelink/concepts.html","exams":["SAA-C03"],"entryType":"concept","domains":["Design Secure Architectures","Design High-Performing Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Prompt Engineering","description":"The practice of carefully crafting the instructions (prompts) you give to an AI model to get the most accurate and useful output. Think of it like learning how to ask a very smart assistant the right questions. Techniques include zero-shot prompting (no examples), few-shot prompting (a few examples), and chain-of-thought prompting (asking the model to reason step-by-step).","category":"Generative AI Concepts","url":"https://aws.amazon.com/what-is/prompt-engineering/","exams":["AIF-C01"],"entryType":"concept","domains":["Fundamentals of Generative AI","Applications of Foundation Models"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Prompt Engineering Techniques","description":"Prompt engineering is the practice of optimizing textual input to a Large Language Model (LLM) to obtain desired responses. The quality of prompts dramatically impacts the quality of model responses. Key techniques include: 1) Zero-Shot Prompting - providing instructions without examples, useful when the model has sufficient knowledge. 2) Few-Shot Prompting - including examples in the prompt to guide the model's response pattern, effective for teaching specific formats or styles. 3) Chain-of-Thought (CoT) Prompting - guiding the model to break down complex reasoning into intermediate steps, improving accuracy for multi-step problems. 4) Role-Playing - instructing the AI to adopt a specific persona for domain-specific expertise. Temperature settings matter: 0.0-0.2 for few-shot, 0.2-0.4 for CoT, 0.5-0.8 for role-playing. AWS Bedrock supports all these techniques across its foundation models.","category":"Generative AI Concepts","url":"https://docs.aws.amazon.com/bedrock/latest/userguide/prompt-engineering-guidelines.html","exams":["AIF-C01"],"entryType":"collection","is_collection":true,"collection_items":[{"name":"Zero-Shot Prompting","description":"Providing instructions to the model without any examples. Best for: Simple tasks where the model has sufficient pre-trained knowledge. Temperature: 0.3-0.5. Example: 'Summarize this article in three bullet points.'"},{"name":"Few-Shot Prompting","description":"Including examples in the prompt to teach the model the desired output format or pattern. Best for: Teaching specific styles, formats, or classification patterns. Temperature: 0.0-0.2. Example: Include 2-3 input-output pairs before the actual query."},{"name":"Chain-of-Thought (CoT) Prompting","description":"Guiding the model to show its reasoning step-by-step before providing the final answer. Best for: Complex reasoning, math problems, multi-step analysis. Temperature: 0.2-0.4. Example: 'Solve this step by step: Step 1... Step 2...'"},{"name":"Role-Playing","description":"Instructing the AI to adopt a specific persona or role to influence tone and expertise. Best for: Domain-specific expertise, controlling formality. Temperature: 0.5-0.8. Example: 'You are a senior software architect...'"}],"sources":["aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Prompt Hijacking","description":"An attack where malicious input is designed to override or manipulate a model's intended behavior by injecting instructions into prompts. This can lead to unauthorized actions, data leakage, or generation of inappropriate content.","category":"GenAI Security","url":"https://docs.aws.amazon.com/bedrock/latest/userguide/guardrails.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"Prompt Injection","description":"A security risk where untrusted input manipulates a model or agent into ignoring instructions, leaking data, or taking unintended actions. It is one of the key AI-specific threats called out in the official exam objectives.","category":"GenAI Security","url":"https://docs.aws.amazon.com/bedrock/latest/userguide/guardrails.html","exams":["AIF-C01"],"entryType":"concept","domains":["Security, Compliance, and Governance for AI Solutions"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Prompt Template","description":"A reusable prompt structure that standardizes instructions, placeholders, and context so model interactions stay more consistent. It is a practical way to reduce randomness and improve repeatability in generative AI apps.","category":"Generative AI Concepts","url":"https://docs.aws.amazon.com/bedrock/latest/userguide/prompt-engineering-guidelines.html","exams":["AIF-C01"],"entryType":"concept","domains":["Fundamentals of Generative AI","Applications of Foundation Models"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Provisioned IOPS","description":"A storage performance option for EBS and some database services that allocates predictable high I/O throughput and low latency. It is the answer when random I/O performance is critical and standard volumes are not enough.","category":"Storage","url":"https://aws.amazon.com/ebs/provisioned-iops/","exams":["SAA-C03"],"entryType":"concept","domains":["Design High-Performing Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Provisioned IOPS (io1/io2)","description":"EBS volume types designed for I/O-intensive workloads requiring sustained high performance. Provisioned IOPS SSD volumes deliver predictable performance with up to 256,000 IOPS and 4,000 MB/s throughput per volume.","category":"Storage","url":"https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/ebs-volume-types.html#EBSVolumeTypes_piops","exams":["SAA-C03"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"Provisioned Throughput","description":"A purchasing option for Amazon Bedrock that reserves model inference capacity for more predictable performance and higher sustained throughput than on-demand usage. Exam questions may contrast it with token-based on-demand cost tradeoffs.","category":"Generative AI Concepts","url":"https://docs.aws.amazon.com/bedrock/latest/userguide/prov-throughput.html","exams":["AIF-C01"],"entryType":"concept","domains":["Fundamentals of Generative AI","Applications of Foundation Models"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Public Subnet vs. Private Subnet","description":"A public subnet has a route to an internet gateway; a private subnet does not. This distinction is foundational to VPC segmentation, secure workload placement, and NAT gateway design.","category":"Networking & Content Delivery","url":"https://docs.aws.amazon.com/vpc/latest/userguide/VPC_Scenario2.html","exams":["SAA-C03"],"entryType":"concept","domains":["Design Secure Architectures","Design Resilient Architectures","Design High-Performing Architectures"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"QuickSight","description":"A fast, cloud-powered business intelligence (BI) service that makes it easy for you to deliver insights to everyone in your organization through interactive dashboards.","category":"Analytics","url":"https://aws.amazon.com/quicksight/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"RAG (Retrieval-Augmented Generation) Components","description":"RAG is a technique that uses information from data sources to improve the relevancy and accuracy of generated responses from foundation models. Amazon Bedrock Knowledge Bases provides a managed RAG solution. The RAG workflow consists of: 1) Indexing - documents are chunked, converted to embeddings using models like Amazon Titan Embeddings, and stored in a vector database. 2) Retrieval - when a query is received, it's converted to an embedding and similar documents are retrieved using vector search. 3) Generation - the retrieved context is combined with the user query in a prompt to generate a grounded response. Vector store options include: Amazon OpenSearch Serverless (fully managed), Amazon Aurora PostgreSQL with pgvector (cost-effective), Pinecone (performance-focused), Redis Enterprise Cloud (excellent speed), and Amazon Kendra (intelligent search). Key considerations include chunking strategy (fixed-size, semantic, sliding window), embedding model selection, and contextual grounding to prevent hallucinations.","category":"Generative AI Concepts","url":"https://docs.aws.amazon.com/bedrock/latest/userguide/knowledge-base.html","exams":["AIF-C01"],"entryType":"collection","is_collection":true,"collection_items":[{"name":"Indexing","description":"Process of converting documents into vector embeddings and storing them. Involves chunking documents, generating embeddings with models like Amazon Titan Embeddings, and storing in a vector database."},{"name":"Retrieval","description":"Process of searching the vector database for documents semantically similar to the user query. Uses vector similarity search to find top-k relevant chunks."},{"name":"Generation","description":"Process of combining retrieved context with the user query to generate a response. The context is injected into the prompt to ground the model's answer in factual information."},{"name":"Vector Store Options","description":"Amazon OpenSearch Serverless (managed), Aurora PostgreSQL with pgvector (cost-effective), Pinecone (performance), Redis Enterprise Cloud (speed), Amazon Kendra (intelligent search), and S3 Vectors (preview)."},{"name":"Chunking Strategies","description":"Fixed-size chunks (simple, may break semantics), Semantic chunks (preserve meaning, complex), Sliding window (overlapping segments maintain context)."},{"name":"Contextual Grounding","description":"Technique to ensure model responses are factually accurate and based on retrieved sources. Amazon Bedrock Guardrails provides contextual grounding checks to detect hallucinations."}],"sources":["aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"RDS Database Engines","description":"Amazon RDS supports multiple database engines to fit your existing database environment. (1) Amazon Aurora - MySQL and PostgreSQL-compatible relational database built for the cloud, up to 5x faster than standard MySQL and 3x faster than PostgreSQL, automatic storage scaling up to 128TB, up to 15 read replicas, continuous backup to S3, self-healing storage, serverless option available; best for high-performance, scalable applications. (2) MySQL - widely used open-source relational database, supports versions 5.7 and 8.0, easy to migrate existing MySQL applications; best for web applications, content management systems, and e-commerce platforms. (3) MariaDB - community-developed fork of MySQL, compatible with MySQL, additional storage engines and features; best for applications requiring MySQL compatibility with enhanced features. (4) PostgreSQL - powerful open-source object-relational database, advanced features like JSON support, full-text search, and geospatial capabilities; best for complex queries, geospatial applications, and applications requiring advanced database features. (5) Oracle - commercial database with enterprise features, bring-your-own-license (BYOL) or License Included options; best for enterprise applications requiring Oracle-specific features. (6) SQL Server - Microsoft relational database, supports multiple versions, Windows Authentication integration; best for .NET applications and Microsoft-centric environments. (7) Db2 - IBM's enterprise database, supports Db2 LUW; best for enterprise applications requiring Db2 compatibility.","category":"Database","url":"https://docs.aws.amazon.com/AmazonRDS/latest/UserGuide/CHAP_GettingStarted.CreatingConnecting.Connecting.html","exams":["SAA-C03"],"entryType":"collection","is_collection":true,"collection_items":[{"name":"Amazon Aurora (MySQL/PostgreSQL compatible)","description":""},{"name":"MySQL","description":""},{"name":"MariaDB","description":""},{"name":"PostgreSQL","description":""},{"name":"Oracle","description":""},{"name":"SQL Server","description":""},{"name":"Db2","description":""}],"sources":["aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"RDS Multi-AZ Deployment","description":"A high-availability feature for Amazon RDS where AWS automatically provisions and maintains a synchronous standby replica in a different Availability Zone. If the primary DB instance fails (hardware failure, AZ outage), RDS automatically fails over to the standby — no data loss (RPO ≈ 0) and typically less than 2 minutes of downtime. Note: the standby is NOT used for read traffic; it exists purely for automatic failover.","category":"Database","url":"https://aws.amazon.com/rds/features/multi-az/","exams":["SAA-C03"],"entryType":"service","domains":["Design Resilient Architectures","Design High-Performing Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"RDS Proxy","description":"A managed database proxy for Amazon RDS and Aurora that pools and manages database connections, helping applications scale more efficiently and recover more gracefully during failover. It is a classic fix for Lambda-to-RDS connection storms.","category":"Database","url":"https://aws.amazon.com/rds/proxy/","exams":["SAA-C03"],"entryType":"concept","domains":["Design Resilient Architectures","Design High-Performing Architectures"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"RDS Read Replica","description":"An asynchronously replicated copy of an RDS database instance used to offload read traffic from the primary database, improving performance for read-heavy workloads. Unlike Multi-AZ (which is for HA), Read Replicas are for scalability and can also serve as a reporting database. You can have up to 15 Read Replicas, in the same region, different regions, or even promote one to a standalone database.","category":"Database","url":"https://aws.amazon.com/rds/features/read-replicas/","exams":["SAA-C03"],"entryType":"service","domains":["Design Resilient Architectures","Design High-Performing Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Read Replicas","description":"Copies of a database instance that can serve read-only traffic, improving performance and availability. Read replicas can be promoted to standalone databases for disaster recovery and can span multiple Availability Zones or Regions.","category":"Database","url":"https://docs.aws.amazon.com/AmazonRDS/latest/UserGuide/USER_ReadRepl.html","exams":["SAA-C03"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"Real-Time Inference","description":"A prediction pattern where the model returns results quickly for each request, usually through an online endpoint or API. This is the right fit for low-latency user-facing applications such as chat, fraud checks, or recommendations. | A method of running machine learning predictions on-demand, with low latency, as requests arrive. The model is deployed to an endpoint that accepts individual requests and returns immediate responses. Required for interactive applications like chatbots, fraud detection at checkout, or real-time recommendations. More expensive than batch inference due to always-on infrastructure. Amazon SageMaker Endpoints and Amazon Bedrock provide real-time inference capabilities.","category":"Machine Learning Concepts","url":"https://docs.aws.amazon.com/sagemaker/latest/dg/realtime-endpoints.html","exams":["AIF-C01"],"entryType":"concept","domains":["Fundamentals of AI and ML"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Recall","description":"A classification metric measuring the proportion of actual positives that were correctly identified. Recall = True Positives / (True Positives + False Negatives). High recall means the model finds most of the positive cases. Important when false negatives are costly — for example, in fraud detection, high recall means most fraudulent transactions are caught. Recall answers: 'Of all actual positives, how many did we find?' Also called Sensitivity.","category":"Machine Learning Concepts","url":"https://docs.aws.amazon.com/sagemaker/latest/dg/clarify-model-monitor-metrics.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Recovery Point Objective (RPO)","description":"The maximum acceptable amount of data loss measured in time. RPO defines how far back in time a recovery can go, determining the frequency of backups needed. For example, an RPO of 1 hour means backups must occur at least hourly.","category":"Architecture Patterns","url":"https://docs.aws.amazon.com/wellarchitected/latest/reliability-pillar/disaster-recovery-dr-strategies.html","exams":["SAA-C03"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"Recovery Time Objective (RTO)","description":"The maximum acceptable time to restore a system after a disaster or disruption. RTO defines the target time for recovering business operations and influences the choice of disaster recovery strategy and infrastructure design.","category":"Architecture Patterns","url":"https://docs.aws.amazon.com/wellarchitected/latest/reliability-pillar/disaster-recovery-dr-strategies.html","exams":["SAA-C03"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"Recurrent Neural Network (RNN)","description":"A type of neural network designed for sequential data like text, speech, and time series. RNNs have 'memory' — they maintain a hidden state that captures information about previous inputs in the sequence. This makes them suitable for tasks like language modeling, machine translation, and sentiment analysis. Variants like LSTM (Long Short-Term Memory) and GRU address the vanishing gradient problem in standard RNNs. Transformers have largely replaced RNNs for NLP tasks.","category":"Machine Learning Concepts","url":"https://aws.amazon.com/what-is/recurrent-neural-network/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Red Hat OpenShift Service on AWS","description":"Provides an integrated experience to use OpenShift. It allows you to accelerate your application development process by leveraging familiar OpenShift APIs and tools for deployments on AWS.","category":"Containers","url":"https://aws.amazon.com/rosa/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Regression","description":"A supervised learning technique used to predict a continuous numeric value, such as revenue, temperature, or demand. If the answer is a number on a spectrum, regression is the usual clue.","category":"AI/ML Fundamentals","url":"https://aws.amazon.com/what-is/regression-in-machine-learning/","exams":["AIF-C01"],"entryType":"concept","domains":["Fundamentals of AI and ML"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Regularization","description":"Techniques used to prevent overfitting by adding a penalty to the loss function that discourages complex models. Common types include L1 regularization (Lasso) which adds the absolute value of weights, L2 regularization (Ridge) which adds the squared value of weights, and dropout which randomly disables neurons during training. Regularization helps the model generalize better to new data by preventing it from memorizing the training set. Most SageMaker algorithms include regularization parameters.","category":"Machine Learning Concepts","url":"https://docs.aws.amazon.com/sagemaker/latest/dg/linear-learner.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Reinforcement Learning","description":"A learning approach in which an agent improves by taking actions, receiving rewards or penalties, and optimizing long-term outcomes. The exam usually tests the high-level idea rather than implementation details. | A machine learning approach where an agent learns to make decisions by taking actions in an environment to maximize cumulative rewards. The agent learns through trial and error — receiving positive rewards for good actions and negative rewards (penalties) for bad ones. Used in game playing (AlphaGo), robotics, recommendation systems, and autonomous systems. AWS DeepRacer uses reinforcement learning to train self-driving race cars.","category":"Machine Learning Concepts","url":"https://aws.amazon.com/what-is/reinforcement-learning/","exams":["AIF-C01"],"entryType":"concept","domains":["Fundamentals of AI and ML"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Requester Pays","description":"An S3 bucket setting where the requester, not the bucket owner, pays request and data-transfer charges. It appears in cost-optimization scenarios where data consumers should bear access costs.","category":"Storage","url":"https://docs.aws.amazon.com/AmazonS3/latest/userguide/RequesterPaysBuckets.html","exams":["SAA-C03"],"entryType":"concept","domains":["Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Reserved Instance (RI) reporting","description":"AWS provides a number of RI-specific cost management solutions out-of-the-box to help you better understand and manage your Reserved Instances, available in AWS Cost Explorer.","category":"Cloud Financial Management","url":"https://aws.amazon.com/aws-cost-management/reserved-instance-reporting/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Resource Policy","description":"A policy attached directly to a resource, such as an S3 bucket or KMS key, that controls who can access it and under what conditions. The exam often contrasts resource policies with identity-based IAM policies.","category":"Security, Identity, & Compliance","url":"https://docs.aws.amazon.com/IAM/latest/UserGuide/access_policies_identity-vs-resource.html","exams":["SAA-C03"],"entryType":"concept","domains":["Design Secure Architectures"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Responsible AI","description":"A framework of principles and practices for developing and using AI in ways that are safe, transparent, fair, accountable, and beneficial to society. AWS Responsible AI pillars include: Fairness, Explainability, Privacy & Security, Robustness, Governance, and Transparency. Amazon Bedrock Guardrails is the key AWS tool for enforcing Responsible AI in production.","category":"Generative AI Concepts","url":"https://aws.amazon.com/machine-learning/responsible-machine-learning/","exams":["AIF-C01"],"entryType":"concept","domains":["Guidelines for Responsible AI"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Retrieval-Augmented Generation (RAG)","description":"A technique that enhances an AI model's answers by first retrieving relevant information from an external knowledge source (like a company's internal documents or a database), then feeding that retrieved context to the LLM alongside the user's question. RAG prevents hallucination and keeps responses grounded in current, factual data without retraining the model. Amazon Bedrock Knowledge Bases implements RAG.","category":"Generative AI Concepts","url":"https://aws.amazon.com/what-is/retrieval-augmented-generation/","exams":["AIF-C01"],"entryType":"concept","domains":["Fundamentals of Generative AI","Applications of Foundation Models"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Right-sizing","description":"The process of matching instance types and sizes to workload requirements to optimize costs. AWS provides recommendations through Trusted Advisor and Compute Optimizer to identify underutilized resources that could be downsized.","category":"Cloud Financial Management","url":"https://docs.aws.amazon.com/wellarchitected/latest/cost-optimization-pillar/right-sizing.html","exams":["SAA-C03"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"RLHF (Reinforcement Learning from Human Feedback)","description":"A training technique used to align AI model outputs with human preferences. Human raters compare model outputs and rate them, and that feedback is used to further train the model (via a reward model) to produce outputs that humans prefer. RLHF is a key reason modern LLMs are helpful, harmless, and honest. It is used to train models like Anthropic Claude, available on Amazon Bedrock.","category":"Generative AI Concepts","url":"https://aws.amazon.com/what-is/reinforcement-learning-from-human-feedback/","exams":["AIF-C01"],"entryType":"concept","domains":["Fundamentals of AI and ML"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Robustness","description":"The ability of an AI system to perform reliably under varying conditions, including unexpected inputs, adversarial attacks, and distribution shifts. Robust AI systems maintain performance and safety even when faced with edge cases or malicious attempts to manipulate outputs.","category":"Generative AI Concepts","url":"https://aws.amazon.com/ai/responsible-ai/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"ROI (Return on Investment)","description":"A business metric that measures the profitability of an investment relative to its cost. In AI/ML projects, ROI helps justify the costs of development, infrastructure, and maintenance against the business value generated, such as increased revenue, reduced costs, or improved efficiency.","category":"AI/ML Fundamentals","url":"https://aws.amazon.com/machine-learning/roi/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"Role Prompting","description":"A prompting technique where you assign a specific role or persona to the AI model to guide its responses. For example: 'Act as an experienced Python developer' or 'You are a medical expert explaining diagnoses to patients.' Role prompting helps the model adopt the appropriate tone, vocabulary, and perspective for the task. It's a simple but effective way to improve response quality without providing examples.","category":"Generative AI Concepts","url":"https://aws.amazon.com/what-is/prompt-engineering/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Role Switching","description":"The ability to assume an IAM role in another AWS account to perform cross-account operations. Users switch roles to access resources in different accounts without needing separate credentials, maintaining security while enabling collaboration.","category":"Security, Identity, & Compliance","url":"https://docs.aws.amazon.com/IAM/latest/UserGuide/id_roles_use_switch-role-console.html","exams":["SAA-C03"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"ROUGE","description":"A family of metrics commonly used to evaluate text generation quality by comparing overlap between generated text and reference text. It often appears in summarization evaluation discussions.","category":"GenAI Metrics","url":"https://docs.aws.amazon.com/sagemaker/latest/dg/clarify-foundation-model-evaluate-metrics.html","exams":["AIF-C01"],"entryType":"metric","domains":["Applications of Foundation Models"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"ROUGE Score","description":"Recall-Oriented Understudy for Gisting Evaluation (ROUGE) is a set of metrics for evaluating automatic summarization and text generation. Unlike BLEU which focuses on precision, ROUGE focuses on recall — measuring how many words from the reference summaries appear in the generated summary. Common variants include ROUGE-N (n-gram overlap), ROUGE-L (longest common subsequence), and ROUGE-W (weighted LCS). It's widely used for evaluating summarization quality.","category":"Generative AI Concepts","url":"https://docs.aws.amazon.com/bedrock/latest/userguide/model-evaluation.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Route 53 Routing Policies","description":"The routing logic options in Amazon Route 53, including simple, weighted, latency-based, failover, geolocation, geoproximity, and multivalue answer. SAA-C03 questions often hinge on matching the right policy to the business requirement. | Amazon Route 53 routing policies determine how DNS queries are answered. (1) Simple Routing - default policy, maps domain to single resource or returns multiple values in random order; use for single resource or when client chooses from multiple resources. (2) Weighted Routing - assigns weights to resources to control traffic distribution percentages; use for A/B testing, gradual migration, or load balancing across regions. (3) Latency-based Routing - routes users to AWS region with lowest latency; use for improving performance for globally distributed users by directing them to nearest healthy endpoint. (4) Failover Routing - routes traffic to primary resource when healthy, otherwise to secondary resource; use for active-passive disaster recovery and high availability configurations. (5) Geolocation Routing - routes traffic based on user's geographic location (continent, country, or US state); use for content localization, compliance requirements, or restricting content by location. (6) Geoproximity Routing - routes traffic based on geographic proximity with ability to shift traffic using bias values; use for fine-grained control over traffic distribution between regions while considering user location. (7) Multivalue Answer Routing - returns multiple healthy IP addresses to client; use for basic load balancing without ELB, improving availability by letting client try alternative IPs. (8) IP-based Routing - routes traffic based on client's IP address or CIDR block; use for specific routing requirements based on known client IP ranges.","category":"Networking & Content Delivery","url":"https://docs.aws.amazon.com/Route53/latest/DeveloperGuide/routing-policy.html","exams":["SAA-C03"],"entryType":"collection","domains":["Design Resilient Architectures","Design High-Performing Architectures"],"is_collection":true,"collection_items":[{"name":"Simple Routing","description":""},{"name":"Weighted Routing","description":""},{"name":"Latency-based Routing","description":""},{"name":"Failover Routing","description":""},{"name":"Geolocation Routing","description":""},{"name":"Geoproximity Routing","description":""},{"name":"Multivalue Answer Routing","description":""},{"name":"IP-based Routing","description":""}],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"RPO & RTO (Disaster Recovery)","description":"Two critical metrics for measuring disaster recovery capability. Recovery Point Objective (RPO) is the maximum acceptable amount of data loss measured in time — 'How old can my most recent backup be?' A 1-hour RPO means you can afford to lose up to 1 hour of data. Recovery Time Objective (RTO) is the maximum acceptable downtime — 'How long can I be down?' Lower RPO and RTO = better but more expensive DR solutions (e.g., Multi-Site Active-Active vs. Backup & Restore).","category":"Management & Governance","url":"https://aws.amazon.com/blogs/architecture/disaster-recovery-dr-architecture-on-aws-part-1-strategies-for-recovery-in-the-cloud/","exams":["SAA-C03"],"entryType":"service","domains":["Design Resilient Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"S3 Cross-Region Replication (CRR)","description":"An Amazon S3 feature that automatically asynchronously replicates objects in one S3 bucket (source) to a bucket in a different AWS Region (destination). Used for: compliance (data sovereignty in specific regions), disaster recovery (a copy of data in another region), and latency reduction (serving data from a geographically closer region). Requires S3 Versioning enabled on both source and destination buckets.","category":"Storage","url":"https://docs.aws.amazon.com/AmazonS3/latest/userguide/replication.html","exams":["SAA-C03"],"entryType":"service","domains":["Design High-Performing Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"S3 Glacier Deep Archive","description":"The lowest-cost S3 storage class, designed for long-term data archival with retrieval times of 12-48 hours. Ideal for data that must be retained for years but is rarely accessed, such as regulatory archives and historical records.","category":"Storage","url":"https://docs.aws.amazon.com/AmazonS3/latest/userguide/storage-class-intro.html#sc-glacier","exams":["SAA-C03"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"S3 Intelligent-Tiering","description":"An S3 storage class that automatically moves objects between access tiers based on access patterns, optimizing storage costs without performance impact or operational overhead. Ideal for data with changing or unknown access patterns.","category":"Storage","url":"https://docs.aws.amazon.com/AmazonS3/latest/userguide/storage-class-intro.html#sc-intelligent-tiering","exams":["SAA-C03"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"S3 Lifecycle Policies","description":"Rules that automate the transition of objects between storage classes and expiration of objects. Lifecycle policies help optimize storage costs by automatically moving data to cheaper storage tiers as it ages or becomes less frequently accessed.","category":"Storage","url":"https://docs.aws.amazon.com/AmazonS3/latest/userguide/object-lifecycle-mgmt.html","exams":["SAA-C03"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"S3 Lifecycle Policy","description":"A rule set that automatically transitions objects between S3 storage classes or expires them after a period of time. Lifecycle policies are one of the cleanest SAA-C03 answers for storage cost optimization.","category":"Storage","url":"https://docs.aws.amazon.com/AmazonS3/latest/userguide/object-lifecycle-mgmt.html","exams":["SAA-C03"],"entryType":"concept","domains":["Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"S3 Object Lock (WORM)","description":"An Amazon S3 feature that stores objects using a Write Once, Read Many (WORM) model, preventing objects from being deleted or overwritten for a fixed period or indefinitely. This is critical for regulatory compliance (SEC, FINRA, HIPAA) that requires immutable records. Two modes: Compliance Mode (even the root user cannot delete) and Governance Mode (users with specific IAM permissions can override the lock).","category":"Storage","url":"https://docs.aws.amazon.com/AmazonS3/latest/userguide/object-lock.html","exams":["SAA-C03"],"entryType":"service","domains":["Design High-Performing Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"S3 Requester Pays","description":"A configuration where the requester (not the bucket owner) pays for S3 request and data transfer costs. Useful for sharing large datasets where the data provider shouldn't bear access costs, such as public data repositories.","category":"Storage","url":"https://docs.aws.amazon.com/AmazonS3/latest/userguide/RequesterPaysBuckets.html","exams":["SAA-C03"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"S3 Storage Classes","description":"Different storage tiers in Amazon S3 optimized for specific use cases: S3 Standard for frequently accessed data, S3 Intelligent-Tiering for automatic cost optimization, S3 Standard-IA for infrequently accessed data, S3 One Zone-IA for rarely accessed data, and S3 Glacier for archival storage. | Amazon S3 offers a range of storage classes designed for different use cases. (1) S3 Standard - designed for frequently accessed data, 99.999999999% (11 nines) durability, 99.99% availability, stored across minimum 3 AZs, no minimum storage duration, no retrieval fees; use cases include frequently accessed data, cloud-native applications, dynamic websites, and content distribution. (2) S3 Intelligent-Tiering - automatically moves data between access tiers based on changing access patterns, no retrieval fees, 99.9% durability, includes Frequent Access, Infrequent Access, Archive Instant Access, Archive Access, and Deep Archive Access tiers; use cases for data with unknown or changing access patterns. (3) S3 Standard-IA (Infrequent Access) - for data accessed less frequently but requiring rapid access when needed, 11 nines durability, 99.9% availability, stored across 3+ AZs, 30-day minimum storage duration, per GB retrieval fee; use cases include backups, disaster recovery, and long-term storage. (4) S3 One Zone-IA - lower cost option for infrequently accessed data stored in a single AZ, 11 nines durability within that AZ, 99.5% availability, 30-day minimum storage duration; use cases include secondary backups and easily reproducible data. (5) S3 Glacier Instant Retrieval - archive storage with milliseconds retrieval, 11 nines durability, 99.9% availability, 90-day minimum storage duration, lowest cost for archive with instant retrieval; use cases for archived data requiring immediate access. (6) S3 Glacier Flexible Retrieval - low-cost archive storage, retrieval options from minutes to hours (expedited: 1-5 min, standard: 3-5 hours, bulk: 5-12 hours), 11 nines durability, 90-day minimum storage duration; use cases for backup archives and media archives with flexible retrieval needs. (7) S3 Glacier Deep Archive - lowest cost storage class, retrieval within 12 hours, 11 nines durability, 180-day minimum storage duration; use cases for long-term retention and regulatory compliance.","category":"Storage","url":"https://docs.aws.amazon.com/AmazonS3/latest/userguide/storage-class-intro.html","exams":["SAA-C03"],"entryType":"collection","is_collection":true,"collection_items":[{"name":"S3 Standard","description":""},{"name":"S3 Intelligent-Tiering","description":"An S3 storage class that automatically moves objects between access tiers based on access patterns, optimizing storage costs without performance impact or operational overhead. Ideal for data with changing or unknown access patterns."},{"name":"S3 Standard-IA","description":""},{"name":"S3 One Zone-IA","description":""},{"name":"S3 Glacier Instant Retrieval","description":""},{"name":"S3 Glacier Flexible Retrieval","description":""},{"name":"S3 Glacier Deep Archive","description":"The lowest-cost S3 storage class, designed for long-term data archival with retrieval times of 12-48 hours. Ideal for data that must be retained for years but is rarely accessed, such as regulatory archives and historical records."}],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"S3 Transfer Acceleration","description":"An Amazon S3 feature that speeds up long-distance uploads to S3 by routing data through AWS CloudFront's globally distributed Edge Locations using an optimized network path (instead of the public internet). When you upload to an S3 Transfer Acceleration endpoint, the data travels over AWS's backbone network — which is faster and more reliable than the open internet for transcontinental transfers.","category":"Storage","url":"https://aws.amazon.com/s3/transfer-acceleration/","exams":["SAA-C03"],"entryType":"service","domains":["Design High-Performing Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"SAA Collection: Amazon EBS Volume Types","description":"Amazon EBS volume types are a classic performance-versus-cost comparison area on SAA-C03. This collection groups the current and legacy types so you can match IOPS-heavy, throughput-heavy, and low-cost workloads without second-guessing yourself.","category":"Exam Collections","url":"https://docs.aws.amazon.com/ebs/latest/userguide/ebs-volume-types.html","exams":["SAA-C03"],"entryType":"collection","domains":["Design High-Performing Architectures","Design Cost-Optimized Architectures"],"is_collection":true,"collection_items":[{"name":"gp3","description":""},{"name":"gp2","description":""},{"name":"io2 Block Express","description":""},{"name":"io1","description":""},{"name":"st1","description":""},{"name":"sc1","description":""},{"name":"Magnetic (standard)","description":""}],"specialTags":["exam_collection","official_aws_docs"],"sources":["aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"SAA Collection: Amazon EC2 Purchasing Options","description":"Official EC2 documentation groups the main purchasing models you should compare for architecture and cost questions. This collection is exam gold because AWS loves asking for the cheapest option that still meets interruption, tenancy, or capacity constraints.","category":"Exam Collections","url":"https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/instance-purchasing-options.html","exams":["SAA-C03"],"entryType":"collection","domains":["Design Cost-Optimized Architectures","Design Resilient Architectures"],"is_collection":true,"collection_items":[{"name":"On-Demand Instances","description":""},{"name":"Savings Plans","description":"A flexible pricing model offering lower prices compared to On-Demand pricing, in exchange for a specific usage commitment (measured in $/hour) for a one or three-year period."},{"name":"Reserved Instances","description":""},{"name":"Spot Instances","description":""},{"name":"Dedicated Hosts","description":""},{"name":"Dedicated Instances","description":""},{"name":"Capacity Reservations","description":""}],"specialTags":["exam_collection","official_aws_docs"],"sources":["aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"SAA Collection: Amazon S3 Storage Classes","description":"Amazon S3 offers multiple storage classes tuned for different access and durability tradeoffs. SAA-C03 loves these because the right answer usually depends on access frequency, latency, availability zone requirements, and archive retrieval expectations.","category":"Exam Collections","url":"https://docs.aws.amazon.com/AmazonS3/latest/userguide/storage-class-intro.html","exams":["SAA-C03"],"entryType":"collection","domains":["Design High-Performing Architectures","Design Cost-Optimized Architectures","Design Resilient Architectures"],"is_collection":true,"collection_items":[{"name":"S3 Standard","description":""},{"name":"S3 Express One Zone","description":""},{"name":"S3 Intelligent-Tiering","description":"An S3 storage class that automatically moves objects between access tiers based on access patterns, optimizing storage costs without performance impact or operational overhead. Ideal for data with changing or unknown access patterns."},{"name":"S3 Standard-IA","description":""},{"name":"S3 One Zone-IA","description":""},{"name":"S3 Glacier Instant Retrieval","description":""},{"name":"S3 Glacier Flexible Retrieval","description":""},{"name":"S3 Glacier Deep Archive","description":"The lowest-cost S3 storage class, designed for long-term data archival with retrieval times of 12-48 hours. Ideal for data that must be retained for years but is rarely accessed, such as regulatory archives and historical records."},{"name":"S3 on Outposts","description":""}],"specialTags":["exam_collection","official_aws_docs"],"sources":["aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"SAA Collection: AWS Well-Architected Framework Pillars","description":"The SAA-C03 exam is explicitly based on the AWS Well-Architected Framework, so the six pillars are not trivia - they are the backbone of the certification. This collection groups them in one place for quick recall during architecture tradeoff questions.","category":"Exam Collections","url":"https://docs.aws.amazon.com/wellarchitected/latest/framework/definitions.html","exams":["SAA-C03"],"entryType":"collection","domains":["Design Secure Architectures","Design Resilient Architectures","Design High-Performing Architectures","Design Cost-Optimized Architectures"],"is_collection":true,"collection_items":[{"name":"Operational Excellence","description":""},{"name":"Security","description":""},{"name":"Reliability","description":""},{"name":"Performance Efficiency","description":""},{"name":"Cost Optimization","description":""},{"name":"Sustainability","description":""}],"specialTags":["exam_collection","official_aws_docs"],"sources":["aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"SAA Collection: Disaster Recovery Strategies","description":"Official SAA-C03 Domain 2 objectives explicitly name the core AWS disaster recovery patterns you need to compare. These are classic exam favorites because they map directly to RTO/RPO and budget tradeoffs.","category":"Exam Collections","url":"https://docs.aws.amazon.com/aws-certification/latest/solutions-architect-associate-03/solutions-architect-associate-03-domain2.html","exams":["SAA-C03"],"entryType":"collection","domains":["Design Resilient Architectures"],"is_collection":true,"collection_items":[{"name":"Backup and Restore","description":"The lowest-cost disaster recovery strategy in which data is backed up and infrastructure is recreated after an outage. It usually has the highest RTO and RPO among the common DR patterns."},{"name":"Pilot Light","description":"A disaster recovery strategy where only the core minimal environment is kept running in the recovery region and the rest is scaled up after a failure. It balances lower steady-state cost against slower recovery than warm standby or active-active."},{"name":"Warm Standby","description":"A disaster recovery pattern where a scaled-down but functional copy of the production environment runs in the recovery region. It costs more than pilot light but generally recovers faster."},{"name":"Active-Active Failover","description":"A high-availability and DR strategy in which multiple environments actively serve traffic, often across regions. It offers the best resilience and lowest recovery times, but it also tends to be the most expensive and operationally complex."},{"name":"Recovery Point Objective (RPO)","description":"The maximum acceptable amount of data loss measured in time. RPO defines how far back in time a recovery can go, determining the frequency of backups needed. For example, an RPO of 1 hour means backups must occur at least hourly."},{"name":"Recovery Time Objective (RTO)","description":"The maximum acceptable time to restore a system after a disaster or disruption. RTO defines the target time for recovering business operations and influences the choice of disaster recovery strategy and infrastructure design."}],"specialTags":["exam_collection","official_aws_docs"],"sources":["aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"SAA Collection: Elastic Load Balancer Types","description":"Elastic Load Balancing is a
