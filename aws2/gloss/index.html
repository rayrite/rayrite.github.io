glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Comprehend Custom Classification","description":"A feature of Amazon Comprehend that allows you to train custom text classification models to organize documents into categories specific to your business. For example, automatically categorizing customer support tickets by product type, routing legal documents by case type, or organizing news articles by topic. You provide labeled examples, and Comprehend trains a model that understands your specific classification scheme.","category":"Machine Learning","url":"https://aws.amazon.com/comprehend/features/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon Comprehend Custom Entity Recognition","description":"A feature of Amazon Comprehend that allows you to train custom models to extract entity types specific to your domain. While Comprehend's pre-trained models recognize generic entities (person, organization, location), custom entity recognition can identify domain-specific terms like product codes, medical procedures, or financial instruments. You provide training data with labeled entities, and Comprehend learns to recognize them in new documents.","category":"Machine Learning","url":"https://aws.amazon.com/comprehend/features/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon Comprehend Medical","description":"A HIPAA-eligible natural language processing (NLP) service that uses machine learning to understand and extract health data from medical text, such as prescriptions, procedures, or diagnoses.","category":"Machine Learning","url":"https://aws.amazon.com/comprehend/medical/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Connect","description":"A self-service, omnichannel cloud contact center service that makes it easy for any business to deliver better customer service at lower cost.","category":"Business Applications","url":"https://aws.amazon.com/connect/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Corretto","description":"A no-cost, multiplatform, production-ready distribution of the Open Java Development Kit (OpenJDK). Corretto comes with long-term support that includes performance enhancements and security fixes.","category":"Developer Tools","url":"https://aws.amazon.com/corretto/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Data Firehose","description":"The easiest way to reliably load streaming data into data stores and analytics tools. It can capture, transform, and load streaming data into services like Amazon S3, Amazon Redshift, and Amazon OpenSearch Service.","category":"Analytics","url":"https://aws.amazon.com/kinesis/data-firehose/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon DataZone","description":"A data management service that you can use to catalog, discover, share, and govern data at scale across organizational boundaries.","category":"Analytics","url":"https://aws.amazon.com/datazone/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Detective","description":"Makes it easy to analyze, investigate, and quickly identify the root cause of potential security issues or suspicious activities by automatically collecting log data from your AWS resources. | A service that makes it easy to analyze, investigate, and quickly identify the root cause of potential security issues or suspicious activities. Detective automatically collects log data from your AWS resources and uses machine learning, statistical analysis, and graph theory to build a linked set of data that enables you to easily conduct faster and more efficient security investigations. Analyzes CloudTrail, VPC Flow Logs, and GuardDuty findings.","category":"Security, Identity, & Compliance","url":"https://aws.amazon.com/detective/","exams":["CLF-C02","SAA-C03"],"entryType":"service","domains":["Design Secure Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon DevOps Guru","description":"An ML-powered service that makes it easy to improve an application's operational performance and availability by detecting behaviors that deviate from normal operating patterns. | An ML-powered service that improves application operational performance and availability by detecting anomalous behavior and providing intelligent recommendations. It automatically ingests operational data from CloudWatch, CloudTrail, and X-Ray, identifies deviations from normal patterns, and surfaces issues before they impact customers. Provides specific remediation guidance based on AWS best practices.","category":"Machine Learning","url":"https://aws.amazon.com/devops-guru/","exams":["AIF-C01","CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon DocumentDB","description":"A fast, scalable, highly available, and fully managed document database service that supports MongoDB workloads. DocumentDB implements the Apache 2.0 open source MongoDB 3.6 and 4.0 APIs, allowing you to use your existing MongoDB drivers and tools. Storage automatically scales up to 64TB per cluster. Replicates data six ways across three Availability Zones. Supports MongoDB change streams and ACID transactions. Ideal for content management, catalogs, and user profiles.","category":"Database","url":"https://aws.amazon.com/documentdb/","exams":["SAA-C03"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon DocumentDB (with MongoDB compatibility)","description":"A fast, scalable, highly available, and fully managed document database service that supports MongoDB workloads, designed for operating mission-critical MongoDB workloads at scale.","category":"Database","url":"https://aws.amazon.com/documentdb/","exams":["AIF-C01","CLF-C02","SAA-C03"],"entryType":"service","domains":["Fundamentals of AI and ML","Applications of Foundation Models","Security, Compliance, and Governance for AI Solutions","Design Resilient Architectures","Design High-Performing Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon DynamoDB","description":"A key-value and document database that delivers single-digit millisecond performance at any scale. It's a fully managed, multi-Region, durable database with built-in security, backup and restore, and in-memory caching. | A fully managed NoSQL database service that provides fast and predictable performance with seamless scalability. DynamoDB offers single-digit millisecond latency at any scale, with virtually unlimited throughput and storage. Key features: automatic partitioning, on-demand and provisioned capacity modes, DAX for microsecond caching, Global Tables for multi-region replication, Streams for change data capture, and TTL for automatic item expiration. Supports key-value and document data models.","category":"Database","url":"https://aws.amazon.com/dynamodb/","exams":["AIF-C01","CLF-C02","SAA-C03"],"entryType":"service","domains":["Fundamentals of AI and ML","Applications of Foundation Models","Security, Compliance, and Governance for AI Solutions","Design Resilient Architectures","Design High-Performing Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon EBS (Elastic Block Store)","description":"A high-performance block storage service designed for use with Amazon EC2 for both throughput and transaction-intensive workloads. EBS volumes are network-attached and persist independently from the life of an instance. Volume types: gp3/gp2 (general purpose SSD), io2/io1 (provisioned IOPS SSD for databases), st1 (throughput-optimized HDD), and sc1 (cold HDD). Features: snapshots (point-in-time backups to S3), encryption (KMS), and Elastic Volumes (modify size/type without downtime).","category":"Storage","url":"https://aws.amazon.com/ebs/","exams":["SAA-C03"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon EC2","description":"A web service that provides secure, resizable compute capacity in the cloud. It is designed to make web-scale cloud computing easier for developers.","category":"Compute","url":"https://aws.amazon.com/ec2/","exams":["AIF-C01","CLF-C02","SAA-C03"],"entryType":"service","domains":["Fundamentals of Generative AI","Applications of Foundation Models","Security, Compliance, and Governance for AI Solutions","Design Resilient Architectures","Design High-Performing Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon EC2 (Elastic Compute Cloud)","description":"A web service that provides resizable compute capacity in the cloud. EC2 offers complete control over virtual servers (instances) with choice of operating system, instance type, networking configuration, and security settings. Key concepts: Instance Types (optimized for compute, memory, storage, or GPU), AMIs (templates for launching instances), Security Groups (virtual firewalls), Key Pairs (SSH access), and Instance Store vs EBS (storage options). The foundation of AWS compute.","category":"Compute","url":"https://aws.amazon.com/ec2/","exams":["SAA-C03"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon EC2 Auto Scaling","description":"Helps you maintain application availability and allows you to automatically add or remove EC2 instances according to conditions you define to meet changes in demand. | A service that automatically adjusts the number of EC2 instances in your Auto Scaling group to maintain application availability and meet changing demand. Scaling policies include: Target Tracking (maintain metric like CPU at target), Step Scaling (add/remove based on CloudWatch alarms), and Scheduled Scaling (predictable changes). Works with Application Load Balancers to distribute traffic. Key benefit: right-sized capacity — never over-provisioned or under-provisioned.","category":"Compute","url":"https://aws.amazon.com/ec2/autoscaling/","exams":["CLF-C02","SAA-C03"],"entryType":"service","domains":["Design Resilient Architectures","Design High-Performing Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon EC2 for ML Training","description":"Amazon EC2 provides a wide range of instance types optimized for machine learning workloads. P4d, P4de, and P5 instances feature NVIDIA GPUs for deep learning training. Trn1 and Trn2 instances feature AWS Trainium chips for cost-effective training. Inf2 instances with AWS Inferentia chips are optimized for inference. GPU instances provide the parallel processing power needed for training large neural networks. You can use EC2 directly or through SageMaker for managed training.","category":"Compute","url":"https://aws.amazon.com/ec2/instance-types/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon EC2 GPU Instances","description":"EC2 instances with NVIDIA GPUs (P3, P4, G4dn, G5, G6) designed for machine learning, graphics processing, and high-performance computing. P-series instances (P3, P4d, P5) are optimized for ML training with high-performance NVIDIA A100 and H100 GPUs. G-series instances (G4dn, G5, G6) are optimized for ML inference and graphics workloads at lower cost. GPU instances provide thousands of CUDA cores for parallel matrix operations essential for deep learning.","category":"Compute","url":"https://aws.amazon.com/ec2/instance-types/gpu/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon EC2 Image Builder","description":"Simplifies the building, testing, and deployment of Virtual Machine and container images for use on AWS or on-premises, reducing the effort of keeping images up-to-date and secure.","category":"Compute","url":"https://aws.amazon.com/image-builder/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon ECR (Elastic Container Registry)","description":"A fully managed Docker container registry that makes it easy for developers to store, manage, and deploy Docker container images. ECR is integrated with ECS, EKS, and Lambda, simplifying your development to production workflow. Supports image vulnerability scanning with Amazon Inspector, lifecycle policies for automated cleanup, and cross-region replication. Images are stored in S3 with encryption at rest (KMS) and in transit (HTTPS).","category":"Containers","url":"https://aws.amazon.com/ecr/","exams":["SAA-C03"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon ECS (Elastic Container Service)","description":"A fully managed container orchestration service that makes it easy to deploy, manage, and scale containerized applications using Docker containers. ECS supports two launch types: EC2 (you manage the underlying cluster) and Fargate (serverless, AWS manages infrastructure). Deeply integrated with AWS services: ALB/NLB for load balancing, CloudWatch for monitoring, IAM for security, and ECR for image storage. Uses task definitions (JSON) to define containers, resources, and networking.","category":"Containers","url":"https://aws.amazon.com/ecs/","exams":["SAA-C03"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon ECS Anywhere","description":"An extension of Amazon ECS that lets you run and manage containerized workloads on your own infrastructure, such as on-premises servers or edge environments, using the ECS control plane.","category":"Containers","url":"https://aws.amazon.com/ecs/anywhere/","exams":["SAA-C03"],"entryType":"service","domains":["Design Resilient Architectures","Design High-Performing Architectures"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon ECS for ML Inference","description":"Amazon Elastic Container Service can be used to deploy machine learning models as containerized inference endpoints. You package your trained model and inference code in a Docker container, and ECS manages deployment, scaling, and availability. ECS integrates with Application Load Balancers for traffic distribution and supports GPU instances for GPU-accelerated inference. It's a flexible option for custom ML serving infrastructure.","category":"Containers","url":"https://aws.amazon.com/ecs/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon EFS (Elastic File System)","description":"A fully managed, serverless elastic NFS (Network File System) service for use with AWS Cloud services and on-premises resources. EFS automatically grows and shrinks as you add and remove files, so you only pay for what you use. Supports thousands of concurrent connections from multiple EC2 instances and containers simultaneously. Storage classes: Standard (frequently accessed) and Infrequent Access (lower cost for less accessed files). Supports lifecycle management to automatically move files between classes.","category":"Storage","url":"https://aws.amazon.com/efs/","exams":["SAA-C03"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon EFS for ML Workloads","description":"Amazon Elastic File System provides shared, scalable file storage for machine learning workloads. Multiple training instances can simultaneously access the same dataset stored on EFS, enabling distributed training without data duplication. EFS automatically scales as your dataset grows and provides consistent low-latency access. It's ideal for shared training data, model checkpoints, and collaborative ML development environments where multiple data scientists need access to the same files.","category":"Storage","url":"https://aws.amazon.com/efs/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon EKS (Elastic Kubernetes Service)","description":"A fully managed service for running Kubernetes on AWS without needing to install, operate, and maintain your own Kubernetes control plane. EKS runs the Kubernetes management infrastructure across multiple Availability Zones, automatically detects and replaces unhealthy control plane nodes, and provides on-demand upgrades and patching. Supports EC2 (you manage worker nodes), Fargate (serverless pods), and Outposts (on-premises). Compatible with standard Kubernetes tooling and plugins.","category":"Containers","url":"https://aws.amazon.com/eks/","exams":["SAA-C03"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon EKS Anywhere","description":"A deployment option for running Amazon EKS-compatible Kubernetes clusters on your own infrastructure. It is relevant when hybrid or on-premises Kubernetes management appears in architecture scenarios.","category":"Containers","url":"https://aws.amazon.com/eks/anywhere/","exams":["SAA-C03"],"entryType":"service","domains":["Design Resilient Architectures","Design High-Performing Architectures"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon EKS Distro","description":"The same Kubernetes distribution used by Amazon EKS, released as open source for self-managed environments. It matters in hybrid and portability conversations more than in day-to-day managed-EKS design.","category":"Containers","url":"https://aws.amazon.com/eks/eks-distro/","exams":["SAA-C03"],"entryType":"service","domains":["Design Resilient Architectures","Design High-Performing Architectures"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon EKS for ML Workloads","description":"Amazon Elastic Kubernetes Service is commonly used for deploying and managing machine learning workloads at scale. ML platforms like Kubeflow run on EKS to provide end-to-end ML workflows. EKS supports GPU instances for training and inference, and integrates with SageMaker for hybrid deployments. It's ideal for organizations that want to use Kubernetes-native tools for ML operations and need portability across cloud and on-premises environments.","category":"Containers","url":"https://aws.amazon.com/eks/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon Elastic Block Store","description":"Provides persistent block storage volumes for use with Amazon EC2 instances in the AWS Cloud. Each EBS volume is automatically replicated within its Availability Zone to protect you from component failure.","category":"Storage","url":"https://aws.amazon.com/ebs/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Elastic Block Store (Amazon EBS)","description":"Provides persistent block storage volumes for use with Amazon EC2 instances in the AWS Cloud. Each EBS volume is automatically replicated within its Availability Zone to protect you from component failure.","category":"Storage","url":"https://aws.amazon.com/ebs/","exams":["SAA-C03"],"entryType":"service","domains":["Design Resilient Architectures","Design High-Performing Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Elastic Container Registry","description":"A fully managed Docker container registry that makes it easy for developers to store, manage, and deploy Docker container images.","category":"Containers","url":"https://aws.amazon.com/ecr/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Elastic Container Registry (Amazon ECR)","description":"A fully managed Docker container registry that makes it easy for developers to store, manage, and deploy Docker container images.","category":"Containers","url":"https://aws.amazon.com/ecr/","exams":["SAA-C03"],"entryType":"service","domains":["Design Resilient Architectures","Design High-Performing Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Elastic Container Service","description":"A highly scalable, high-performance container orchestration service that supports Docker containers and allows you to easily run and scale containerized applications on AWS.","category":"Containers","url":"https://aws.amazon.com/ecs/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Elastic Container Service (Amazon ECS)","description":"A highly scalable, high-performance container orchestration service that supports Docker containers and allows you to easily run and scale containerized applications on AWS.","category":"Containers","url":"https://aws.amazon.com/ecs/","exams":["AIF-C01","SAA-C03"],"entryType":"service","domains":["Fundamentals of Generative AI","Applications of Foundation Models","Security, Compliance, and Governance for AI Solutions","Design Resilient Architectures","Design High-Performing Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Elastic File System","description":"Provides a simple, scalable, fully managed elastic NFS file system for use with AWS Cloud services and on-premises resources. It is built to scale on demand to petabytes without disrupting applications.","category":"Storage","url":"https://aws.amazon.com/efs/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Elastic File System (Amazon EFS)","description":"Provides a simple, scalable, fully managed elastic NFS file system for use with AWS Cloud services and on-premises resources. It is built to scale on demand to petabytes without disrupting applications.","category":"Storage","url":"https://aws.amazon.com/efs/","exams":["SAA-C03"],"entryType":"service","domains":["Design Resilient Architectures","Design High-Performing Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Elastic Kubernetes Service","description":"Makes it easy to deploy, manage, and scale containerized applications using Kubernetes on AWS. It runs the Kubernetes management infrastructure for you across multiple AWS Availability Zones.","category":"Containers","url":"https://aws.amazon.com/eks/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Elastic Kubernetes Service (Amazon EKS)","description":"Makes it easy to deploy, manage, and scale containerized applications using Kubernetes on AWS. It runs the Kubernetes management infrastructure for you across multiple AWS Availability Zones.","category":"Containers","url":"https://aws.amazon.com/eks/","exams":["AIF-C01","SAA-C03"],"entryType":"service","domains":["Fundamentals of Generative AI","Applications of Foundation Models","Security, Compliance, and Governance for AI Solutions","Design Resilient Architectures","Design High-Performing Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Elastic Transcoder","description":"Media transcoding in the cloud. It is designed to be a highly scalable, easy-to-use, and cost-effective way for developers and businesses to convert media files into versions that will play back on various devices.","category":"Media Services","url":"https://aws.amazon.com/elastictranscoder/","exams":["CLF-C02","SAA-C03"],"entryType":"service","domains":["Design Resilient Architectures","Design High-Performing Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon ElastiCache","description":"A web service that makes it easy to deploy, operate, and scale an in-memory cache in the cloud. It supports two open-source in-memory caching engines: Redis and Memcached. | A fully managed in-memory caching service that supports two open-source engines: Redis and Memcached. ElastiCache makes it easy to deploy, operate, and scale cache clusters, improving application performance by retrieving data from fast, managed in-memory caches instead of slower disk-based databases. Redis features: persistence, replication, clustering, and pub/sub. Memcached features: multithreaded, simple key-value. Common use cases: session stores, database query caching, and real-time leaderboards.","category":"Database","url":"https://aws.amazon.com/elasticache/","exams":["AIF-C01","CLF-C02","SAA-C03"],"entryType":"service","domains":["Fundamentals of AI and ML","Applications of Foundation Models","Security, Compliance, and Governance for AI Solutions","Design Resilient Architectures","Design High-Performing Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon EMR","description":"The industry-leading cloud big data platform for processing vast amounts of data using open source tools such as Apache Spark, Apache Hive, Apache HBase, Apache Flink, Apache Hudi, and Presto. | A cloud big data platform for processing vast amounts of data using open-source tools like Apache Spark, Hadoop, Hive, HBase, Flink, and Presto. EMR handles provisioning, configuration, and tuning of clusters, letting you focus on analytics. Supports both transient clusters (auto-terminate after jobs) and persistent clusters. Can run on EC2, EKS, or Serverless. Cost-effective for big data workloads compared to on-premises solutions.","category":"Analytics","url":"https://aws.amazon.com/emr/","exams":["AIF-C01","CLF-C02","SAA-C03"],"entryType":"service","domains":["Fundamentals of AI and ML","Security, Compliance, and Governance for AI Solutions","Design Resilient Architectures","Design High-Performing Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon EMR for Big Data ML","description":"Amazon EMR is a big data platform that can run machine learning frameworks like Apache Spark MLlib, TensorFlow, and PyTorch on large datasets. It's ideal for preprocessing massive training datasets, running distributed feature engineering, and training models that don't fit in memory. EMR integrates with SageMaker, allowing you to train models on EMR and deploy them to SageMaker endpoints, or preprocess data on EMR before training in SageMaker.","category":"Analytics","url":"https://aws.amazon.com/emr/features/machine-learning/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon EventBridge","description":"A serverless event bus that makes it easier to build event-driven applications at scale using events generated from your applications, integrated SaaS applications, and AWS services. | A serverless event bus that makes it easy to connect applications using events from your own applications, integrated SaaS applications (Zendesk, Datadog, etc.), and AWS services. Unlike SNS (which is primarily pub/sub), EventBridge provides advanced event routing with content-based filtering, event transformation, and schema registry. Supports scheduled events (cron-like) and event archiving/replay. The modern replacement for CloudWatch Events.","category":"Application Integration","url":"https://aws.amazon.com/eventbridge/","exams":["CLF-C02","SAA-C03"],"entryType":"service","domains":["Design Resilient Architectures","Design High-Performing Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon File Cache","description":"A fully managed, high-speed cache on AWS that makes it easier to process file data, regardless of where the data is stored. It provides a unified view and fast access to data stored in on-premises file systems and in Amazon S3.","category":"Storage","url":"https://aws.amazon.com/fsx/file-cache/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon FinSpace","description":"A data management and analytics service purpose-built for the financial services industry (FSI). It reduces the time you spend finding and preparing petabytes of financial data for analysis.","category":"Analytics","url":"https://aws.amazon.com/finspace/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Forecast","description":"A fully managed service that uses machine learning to deliver highly accurate forecasts, based on the same technology used at Amazon.com. | A fully managed service that uses machine learning to deliver highly accurate forecasts based on the same technology used at Amazon.com. Forecast automatically examines your data, identifies what is meaningful, and produces a forecasting model capable of making predictions. Supports time-series forecasting for: demand planning, resource planning, and financial planning. Unlike traditional forecasting methods, Forecast handles missing data and anomalies automatically.","category":"Machine Learning","url":"https://aws.amazon.com/forecast/","exams":["CLF-C02","SAA-C03"],"entryType":"service","domains":["Design Resilient Architectures","Design High-Performing Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Forecast Time Series Prediction","description":"A fully managed service that uses machine learning to deliver highly accurate time series forecasts. It automatically examines data, identifies meaningful patterns, and builds forecasting models. Use cases include predicting product demand, estimating resource needs, predicting website traffic, and financial planning. Supports multiple algorithms including ARIMA, ETS, DeepAR+, and Prophet, and automatically selects the best one for your data.","category":"Machine Learning","url":"https://aws.amazon.com/forecast/features/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon Fraud Detector","description":"A fully managed service that uses machine learning and more than 20 years of fraud detection expertise from Amazon to identify potentially fraudulent activity so customers can catch more online fraud faster. | A fully managed service that uses machine learning and more than 20 years of fraud detection expertise from Amazon to identify potentially fraudulent activity. You provide historical fraud data, and Fraud Detector automatically trains, tests, and deploys a custom fraud detection model. Supports real-time fraud predictions via API. Use cases: online payment fraud, new account fraud, guest checkout abuse, and loyalty program abuse.","category":"Machine Learning","url":"https://aws.amazon.com/fraud-detector/","exams":["AIF-C01","CLF-C02","SAA-C03"],"entryType":"service","domains":["Fundamentals of AI and ML","Applications of Foundation Models","Design Resilient Architectures","Design High-Performing Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Fraud Detector Online Fraud Insights","description":"A machine learning model type in Amazon Fraud Detector specifically designed to detect online fraud such as fake accounts, payment fraud, and loyalty program abuse. It analyzes user behavior, device information, and transaction patterns to generate fraud risk scores in real-time. Models are automatically trained on your historical fraud data and can be integrated into web and mobile applications.","category":"Machine Learning","url":"https://aws.amazon.com/fraud-detector/features/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon FSx","description":"The fully managed Amazon FSx family of high-performance file systems, including FSx for Windows File Server, Lustre, NetApp ONTAP, and OpenZFS. On SAA-C03, think of FSx when you need purpose-built managed file storage rather than generic block or object storage. | A fully managed service that makes it easy to launch, run, and scale feature-rich, high-performance file systems. Four options: FSx for Windows File Server (fully managed Windows native SMB), FSx for Lustre (high-performance computing), FSx for NetApp ONTAP (full NetApp ONTAP feature set), and FSx for OpenZFS (managed OpenZFS). Each is optimized for specific workloads and integrates with your existing applications and workflows.","category":"Storage","url":"https://aws.amazon.com/fsx/","exams":["SAA-C03"],"entryType":"service","domains":["Design Resilient Architectures","Design High-Performing Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon FSx for Lustre","description":"A fully managed file system that is optimized for compute-intensive workloads, such as high performance computing, machine learning, and media data processing workflows.","category":"Storage","url":"https://aws.amazon.com/fsx/lustre/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon FSx for Lustre for ML","description":"A fully managed Lustre file system optimized for compute-intensive machine learning workloads. Lustre provides sub-millisecond latencies and high-throughput access to datasets, making it ideal for training deep learning models that require rapid data loading. FSx for Lustre can be linked to S3 buckets, automatically importing training data and exporting results. It's commonly used for large-scale distributed training on GPU clusters.","category":"Storage","url":"https://aws.amazon.com/fsx/lustre/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon FSx for NetApp ONTAP","description":"A fully managed service that provides highly reliable, scalable, performant, and feature-rich file storage built on NetApp’s popular ONTAP file system.","category":"Storage","url":"https://aws.amazon.com/fsx/netapp-ontap/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon FSx for OpenZFS","description":"A fully managed file storage service that lets you launch, run, and scale fully managed file systems built on the open-source OpenZFS file system.","category":"Storage","url":"https://aws.amazon.com/fsx/openzfs/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon FSx for Windows File Server","description":"Provides a fully managed native Microsoft Windows file system so you can easily move your Windows-based applications that require file storage to AWS.","category":"Storage","url":"https://aws.amazon.com/fsx/windows/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon GameLift Servers","description":"A managed service for deploying, operating, and scaling dedicated game servers for session-based multiplayer games, making it easy to manage server infrastructure and scale capacity.","category":"Game Tech","url":"https://aws.amazon.com/gamelift/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon GuardDuty","description":"A threat detection service that continuously monitors for malicious activity and unauthorized behavior to protect your AWS accounts, workloads, and data stored in Amazon S3. GuardDuty uses machine learning, anomaly detection, and integrated threat intelligence to identify and prioritize potential threats. Analyzes CloudTrail logs, VPC Flow Logs, and DNS logs. Findings are delivered to CloudWatch Events for automated response. No software to deploy or manage.","category":"Security, Identity, & Compliance","url":"https://aws.amazon.com/guardduty/","exams":["CLF-C02","SAA-C03"],"entryType":"service","domains":["Design Secure Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon HealthLake NLP","description":"Amazon HealthLake includes natural language processing capabilities that automatically extract structured medical information from unstructured clinical text. It can identify medical conditions, medications, procedures, and protected health information from doctor's notes, discharge summaries, and clinical reports. The extracted data is stored in FHIR format for healthcare analytics and research.","category":"Machine Learning","url":"https://aws.amazon.com/healthlake/features/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon Inspector","description":"An automated vulnerability management service that continually scans AWS workloads for software vulnerabilities and unintended network exposure. Inspector automatically discovers and scans EC2 instances and container images in ECR for known vulnerabilities (CVEs) and network reachability issues. Findings are prioritized by severity and include remediation guidance. Integrates with Security Hub and EventBridge for automated remediation workflows.","category":"Security, Identity, & Compliance","url":"https://aws.amazon.com/inspector/","exams":["AIF-C01","CLF-C02","SAA-C03"],"entryType":"service","domains":["Security, Compliance, and Governance for AI Solutions","Design Secure Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Inspector for ML Security","description":"Amazon Inspector automatically scans EC2 instances and container images used in ML workloads for software vulnerabilities and unintended network exposure. It identifies security issues in the operating system and packages installed on training instances and inference endpoints. For ML workloads, Inspector helps ensure that the infrastructure running your models is secure and compliant with security standards.","category":"Security, Identity, & Compliance","url":"https://aws.amazon.com/inspector/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon Interactive Video Service","description":"A managed live streaming solution that is quick and easy to set up, and ideal for creating interactive video experiences. Send your live streams to Amazon IVS and the service does everything you need to make them available to any viewer around the world.","category":"Media Services","url":"https://aws.amazon.com/ivs/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Kendra","description":"An intelligent search service powered by machine learning. It reimagines enterprise search for your websites and applications so your employees and customers can easily find the content they are looking for. | An intelligent search service powered by machine learning. Kendra reimagines enterprise search for your websites and applications by using natural language understanding to understand context and return specific answers (not just links). Supports: natural language queries, FAQ matching, document ranking, and access control integration. Connectors available for popular data sources: S3, SharePoint, Confluence, Salesforce, and databases. Use cases: enterprise search, customer self-service, and internal knowledge bases.","category":"Machine Learning","url":"https://aws.amazon.com/kendra/","exams":["AIF-C01","CLF-C02","SAA-C03"],"entryType":"service","domains":["Fundamentals of AI and ML","Applications of Foundation Models","Design Resilient Architectures","Design High-Performing Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Kendra Intelligent Search","description":"Amazon Kendra uses natural language understanding to provide accurate answers to user questions based on unstructured data across multiple content repositories. Unlike keyword search, Kendra understands the intent behind questions and returns specific answers, not just document links. It supports connectors for S3, SharePoint, Confluence, Salesforce, and more. Kendra can be integrated with Amazon Bedrock to provide RAG capabilities with semantic search.","category":"Machine Learning","url":"https://aws.amazon.com/kendra/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon Keyspaces","description":"A scalable, highly available, and managed Apache Cassandra-compatible database service. With Amazon Keyspaces, you can run your Cassandra workloads on AWS using the same Cassandra application code and developer tools you use today. Serverless — automatically scales tables up and down based on application traffic. Supports both on-demand and provisioned capacity modes. Offers single-digit millisecond performance at any scale and replicates data three times across multiple Availability Zones.","category":"Database","url":"https://aws.amazon.com/keyspaces/","exams":["SAA-C03"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon Keyspaces (for Apache Cassandra)","description":"A scalable, highly available, and managed Apache Cassandra-compatible database service. You can run your Cassandra workloads on AWS using the same Cassandra application code and developer tools.","category":"Database","url":"https://aws.amazon.com/keyspaces/","exams":["CLF-C02","SAA-C03"],"entryType":"service","domains":["Design Resilient Architectures","Design High-Performing Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Kinesis","description":"Makes it easy to collect, process, and analyze real-time, streaming data so you can get timely insights and react quickly to new information. It offers key capabilities to cost-effectively process streaming data at any scale.","category":"Analytics","url":"https://aws.amazon.com/kinesis/","exams":["CLF-C02","SAA-C03"],"entryType":"service","domains":["Design Resilient Architectures","Design High-Performing Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Kinesis Data Firehose","description":"A fully managed service for automatically loading streaming data into data stores and analytics tools. Captures, transforms, and delivers streaming data to destinations like Amazon S3, Redshift, Elasticsearch/OpenSearch, and Splunk. Unlike Kinesis Data Streams (which requires you to build consumer applications), Firehose handles all the data delivery automatically with built-in batching, compression, and encryption. Near-real-time (60-second latency) delivery.","category":"Analytics","url":"https://aws.amazon.com/kinesis/data-firehose/","exams":["SAA-C03"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon Kinesis Data Streams","description":"A massively scalable and durable real-time data streaming service that can continuously capture gigabytes of data per second from hundreds of thousands of sources. Data is stored across multiple Availability Zones for high availability and can be retained for up to 365 days. Applications read from shards using the Kinesis Client Library (KCL) or SDK. Unlike SQS (message queue), Kinesis is designed for real-time streaming analytics and data pipelines where order matters.","category":"Analytics","url":"https://aws.amazon.com/kinesis/data-streams/","exams":["CLF-C02","SAA-C03"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Kinesis Video Streams","description":"Makes it easy to securely stream video from connected devices to AWS for analytics, machine learning, playback, and other processing. | A fully managed service for securely streaming video from connected devices to AWS for analytics, machine learning, playback, and other processing. Kinesis Video Streams automatically provisions and elastically scales all the infrastructure needed to ingest streaming video data from millions of devices. Durably stores, encrypts, and indexes video data. Integrates with Amazon Rekognition for video analysis and SageMaker for custom ML models. Use cases: home security, industrial automation, and computer vision.","category":"Analytics","url":"https://aws.amazon.com/kinesis/video-streams/","exams":["CLF-C02","SAA-C03"],"entryType":"service","domains":["Design Resilient Architectures","Design High-Performing Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Lex","description":"A fully managed artificial intelligence (AI) service to design, build, test, and deploy conversational interfaces into any application using voice and text. | A fully managed AI service for building conversational interfaces into any application using voice and text. Lex provides the advanced deep learning functionalities of automatic speech recognition (ASR) for converting speech to text, and natural language understanding (NLU) to recognize the intent of the text. Powers the same technology as Amazon Alexa. Integrates with Lambda for fulfillment, and supports deployment to chatbots, call center bots, and application bots.","category":"Machine Learning","url":"https://aws.amazon.com/lex/","exams":["AIF-C01","CLF-C02","SAA-C03"],"entryType":"service","domains":["Fundamentals of AI and ML","Applications of Foundation Models","Design Resilient Architectures","Design High-Performing Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Lex V2","description":"The latest version of Amazon Lex that provides an enhanced console and APIs for building conversational interfaces (chatbots and voice bots). It supports multiple languages, improved intent recognition, context management for multi-turn conversations, and seamless integration with AWS Lambda for business logic. Lex V2 powers the conversational capabilities of Amazon Q and can be integrated with contact centers, messaging platforms, and IoT devices.","category":"Machine Learning","url":"https://aws.amazon.com/lex/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon Lightsail","description":"Designed to be the easiest way to launch and manage a virtual private server with AWS. Plans include everything you need to jumpstart your project: a VM, SSD-based storage, data transfer, DNS management, and a static IP.","category":"Compute","url":"https://aws.amazon.com/lightsail/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Lightsail managed databases","description":"Separate from compute workloads, so you can build applications and websites on Lightsail instances without interruption. Supports MySQL and PostgreSQL databases.","category":"Database","url":"https://aws.amazon.com/lightsail/features/databases/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Linux 2023","description":"A new Linux-based operating system for AWS designed to provide a secure, stable, high-performance environment to develop and run your cloud applications.","category":"Compute","url":"https://aws.amazon.com/linux/amazon-linux-2023/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Location Service","description":"Makes it easy for developers to add location functionality to applications without compromising data security and user privacy, providing affordable data, tracking, and geofencing capabilities.","category":"Frontend Web & Mobile","url":"https://aws.amazon.com/location/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Lookout for Equipment","description":"Analyzes the data from the sensors on your equipment to automatically train a machine learning model based on your data to detect abnormal equipment behavior.","category":"Machine Learning","url":"https://aws.amazon.com/lookout-for-equipment/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Lookout for Metrics","description":"Uses machine learning to automatically detect and diagnose anomalies (outliers from the norm) in business and operational data, such as a sudden dip in sales revenue.","category":"Machine Learning","url":"https://aws.amazon.com/lookout-for-metrics/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Lookout for Vision","description":"An ML service that spots defects and anomalies in visual representations using computer vision (CV), allowing manufacturing companies to increase quality and reduce operational costs. | A machine learning service that spots defects and anomalies in visual representations using computer vision. It enables manufacturing companies to increase quality and reduce operational costs by automating visual inspection. You provide images of normal and defective products, and Lookout trains a model to detect defects in new images. Can be deployed to the cloud or edge devices for real-time quality control.","category":"Machine Learning","url":"https://aws.amazon.com/lookout-for-vision/","exams":["AIF-C01","CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Macie","description":"A fully managed data security and data privacy service that uses machine learning and pattern matching to discover and protect your sensitive data in AWS. Macie automatically discovers, classifies, and protects sensitive data in S3, including personally identifiable information (PII) such as names, credit card numbers, and passport numbers. Provides dashboards, alerts, and detailed reports about data access and movement. Integrates with Security Hub and supports automated remediation.","category":"Security, Identity, & Compliance","url":"https://aws.amazon.com/macie/","exams":["AIF-C01","CLF-C02","SAA-C03"],"entryType":"service","domains":["Security, Compliance, and Governance for AI Solutions","Design Secure Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Macie for AI Data","description":"Amazon Macie uses machine learning to automatically discover, classify, and protect sensitive data in S3 buckets, including training datasets for AI/ML. It can identify personally identifiable information (PII), intellectual property, and other sensitive content that shouldn't be exposed. For AI workloads, Macie helps ensure training data doesn't contain unauthorized sensitive information and that model outputs don't leak sensitive data. Integrates with Amazon Bedrock Guardrails for comprehensive data protection.","category":"Security, Identity, & Compliance","url":"https://aws.amazon.com/macie/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon Managed Blockchain","description":"A fully managed service that makes it easy to create and manage scalable blockchain networks using the popular open source frameworks Hyperledger Fabric and Ethereum.","category":"Blockchain","url":"https://aws.amazon.com/managed-blockchain/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Managed Grafana","description":"A fully managed service for open-source Grafana, a popular open-source analytics platform that enables you to query, visualize, alert on, and understand your metrics no matter where they are stored.","category":"Management & Governance","url":"https://aws.amazon.com/grafana/","exams":["CLF-C02","SAA-C03"],"entryType":"service","domains":["Design Secure Architectures","Design Resilient Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Managed Service for Apache Flink","description":"The easiest way to analyze streaming data, gain actionable insights, and respond to your business and customer needs in real time. It reduces the complexity of building, managing, and integrating streaming applications.","category":"Analytics","url":"https://aws.amazon.com/managed-service-apache-flink/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Managed Service for Prometheus","description":"A serverless, Prometheus-compatible monitoring service for container metrics that makes it easier to securely monitor container environments at scale.","category":"Management & Governance","url":"https://aws.amazon.com/prometheus/","exams":["CLF-C02","SAA-C03"],"entryType":"service","domains":["Design Secure Architectures","Design Resilient Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Managed Streaming for Apache Kafka (Amazon MSK)","description":"A fully managed service that makes it easy for you to build and run applications that use Apache Kafka to process streaming data.","category":"Analytics","url":"https://aws.amazon.com/msk/","exams":["CLF-C02","SAA-C03"],"entryType":"service","domains":["Design Resilient Architectures","Design High-Performing Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Managed Workflows for Apache Airflow (MWAA)","description":"A managed orchestration service for Apache Airflow that makes it easier to set up and operate end-to-end data pipelines in the cloud at scale.","category":"Application Integration","url":"https://aws.amazon.com/managed-workflows-for-apache-airflow/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon MemoryDB","description":"A Redis-compatible, durable, in-memory database service that delivers ultra-fast performance. It is purpose-built for modern applications with microservices architectures.","category":"Database","url":"https://aws.amazon.com/memorydb/","exams":["AIF-C01","CLF-C02"],"entryType":"service","domains":["Fundamentals of AI and ML","Applications of Foundation Models","Security, Compliance, and Governance for AI Solutions"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Monitron","description":"An end-to-end system that uses machine learning to detect abnormal behavior in industrial machinery, enabling you to implement predictive maintenance and reduce unplanned downtime.","category":"Machine Learning","url":"https://aws.amazon.com/monitron/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Monitron Predictive Maintenance","description":"An end-to-end system that uses machine learning to detect abnormal behavior in industrial machinery, enabling predictive maintenance. It includes wireless sensors that monitor temperature and vibration, a gateway that transmits data to AWS, and ML models that analyze patterns to predict equipment failures before they occur. Helps reduce unplanned downtime and maintenance costs in manufacturing and industrial settings.","category":"Machine Learning","url":"https://aws.amazon.com/monitron/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon MQ","description":"A managed message broker service for Apache ActiveMQ Classic and RabbitMQ that makes it easy to set up and operate message brokers in the cloud. | A managed message broker service for Apache ActiveMQ Classic and RabbitMQ. Unlike Amazon SQS/SNS (AWS-native), Amazon MQ supports industry-standard APIs and protocols (JMS, AMQP, MQTT, OpenWire, STOMP), making it ideal for migrating existing message broker workloads to AWS without rewriting application code. Supports both single-instance and active/standby high-availability deployments.","category":"Application Integration","url":"https://aws.amazon.com/amazon-mq/","exams":["CLF-C02","SAA-C03"],"entryType":"service","domains":["Design Resilient Architectures","Design High-Performing Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon MSK (Managed Streaming for Apache Kafka)","description":"A fully managed service that makes it easy to build and run applications using Apache Kafka to process streaming data. MSK handles the provisioning, configuration, and maintenance of Kafka clusters, including patching, upgrades, and monitoring. Supports both provisioned clusters (you choose instance types) and serverless mode (automatic scaling). Compatible with standard Kafka APIs and tools, making migration from self-managed Kafka straightforward.","category":"Analytics","url":"https://aws.amazon.com/msk/","exams":["SAA-C03"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon Neptune","description":"A fast, reliable, fully managed graph database service that makes it easy to build and run applications that work with highly connected datasets. Supports both property graph (Apache TinkerPop/Gremlin) and RDF graph (W3C SPARQL) models. Optimized for storing billions of relationships and querying the graph with millisecond latency. Use cases: recommendation engines, fraud detection, knowledge graphs, network security, and social networking.","category":"Database","url":"https://aws.amazon.com/neptune/","exams":["AIF-C01","CLF-C02","SAA-C03"],"entryType":"service","domains":["Fundamentals of AI and ML","Applications of Foundation Models","Security, Compliance, and Governance for AI Solutions","Design Resilient Architectures","Design High-Performing Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Nimble Studio","description":"Empowers creative studios to produce visual effects, animation, and interactive content entirely in the cloud, from storyboard sketch to final deliverable.","category":"Media Services","url":"https://aws.amazon.com/nimble-studio/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon OpenSearch Serverless","description":"A serverless option in Amazon OpenSearch Service. As a developer, you can use OpenSearch Serverless to run petabyte-scale workloads without configuring, managing, and scaling OpenSearch clusters.","category":"Analytics","url":"https://aws.amazon.com/opensearch-service/features/serverless/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon OpenSearch Service","description":"Makes it easy to deploy, secure, operate, and scale OpenSearch to search, analyze, and visualize data in real-time for use-cases such as log analytics, full-text search, and application monitoring. | A fully managed service that makes it easy to deploy, secure, and run OpenSearch (forked from Elasticsearch) for search, log analytics, and real-time application monitoring. Supports both provisioned clusters and serverless options. Key features include: full-text search, structured search, aggregations, Kibana/OpenSearch Dashboards for visualization, and integration with Logstash and Beats. Common use cases include application search, log analytics, and security event monitoring.","category":"Analytics","url":"https://aws.amazon.com/opensearch-service/","exams":["AIF-C01","CLF-C02","SAA-C03"],"entryType":"service","domains":["Fundamentals of AI and ML","Security, Compliance, and Governance for AI Solutions","Design Resilient Architectures","Design High-Performing Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon OpenSearch Service (Vector Search)","description":"A managed service that provides vector search capabilities for storing and querying embeddings. Supports k-nearest neighbor (k-NN) search for semantic similarity, making it suitable for RAG applications and semantic search use cases.","category":"Analytics","url":"https://docs.aws.amazon.com/opensearch-service/latest/developerguide/knn.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"Amazon OpenSearch Vector Search","description":"A feature of Amazon OpenSearch Service that enables storing and searching vector embeddings alongside traditional text documents. It uses k-NN (k-nearest neighbors) algorithms to find semantically similar vectors, enabling semantic search, recommendation engines, and RAG applications. Supports multiple search algorithms including HNSW (Hierarchical Navigable Small World) for efficient approximate nearest neighbor search at scale. Essential for building RAG-based generative AI applications.","category":"Analytics","url":"https://aws.amazon.com/opensearch-service/features/vector-database/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon PartyRock","description":"Makes learning generative AI easy with a hands-on, code-free app builder. Experiment with prompt engineering techniques and develop intuition for generative AI while creating and exploring fun apps.","category":"Machine Learning","url":"https://partyrock.aws/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Personalize","description":"An ML service that makes it easy for developers to create individualized recommendations for customers using their applications, using technology perfected from years of use on Amazon.com.","category":"Machine Learning","url":"https://aws.amazon.com/personalize/","exams":["AIF-C01","CLF-C02"],"entryType":"service","domains":["Fundamentals of AI and ML","Applications of Foundation Models"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Personalize Real-Time Recommendations","description":"A feature of Amazon Personalize that generates individualized recommendations in real-time based on a user's current behavior and historical interactions. Unlike batch recommendations, real-time recommendations respond immediately to user actions — for example, updating product suggestions as a user browses. Uses the same technology that powers Amazon.com's recommendation engine.","category":"Machine Learning","url":"https://aws.amazon.com/personalize/features/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon Pinpoint","description":"Makes it easy to send targeted messages to your customers through multiple engagement channels, such as emai
