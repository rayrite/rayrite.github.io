"A fully managed service that aggregates and normalizes security data across software as a service (SaaS) applications to increase observability, productivity, and security.","category":"Business Applications","url":"https://aws.amazon.com/appfabric/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Application Cost Profiler","description":"Provides you the ability to track the consumption of shared AWS resources used by software applications and report granular cost breakdown across tenant base.","category":"Cloud Financial Management","url":"https://aws.amazon.com/application-cost-profiler/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Application Discovery Service","description":"Helps enterprise customers plan migration projects by gathering information about their on-premises data centers to help better understand workloads. | A service that helps enterprise customers plan migration projects by gathering information about their on-premises data centers. Agentless Discovery uses VMware vCenter to collect configuration and performance data. Agent-based Discovery deploys an agent on each VM for more detailed information including network connections and process information. Data is stored in Migration Hub and can be exported for analysis in CSV format or viewed in Migration Hub.","category":"Migration & Transfer","url":"https://aws.amazon.com/application-discovery/","exams":["CLF-C02","SAA-C03"],"entryType":"service","domains":["Design Secure Architectures","Design Resilient Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Application Migration Service","description":"Allows you to quickly realize the benefits of migrating applications to the cloud without changes and with minimal downtime by automatically converting your source servers to run natively on AWS. | A highly automated lift-and-shift (rehost) solution that simplifies, expedites, and reduces the cost of migrating applications to AWS. It automatically converts your source servers from physical, virtual, or cloud infrastructure to run natively on AWS. Continuous block-level replication minimizes downtime and cuts over quickly when ready. Replaces AWS Server Migration Service (SMS). Ideal for large-scale server migrations.","category":"Migration & Transfer","url":"https://aws.amazon.com/application-migration-service/","exams":["CLF-C02","SAA-C03"],"entryType":"service","domains":["Design Secure Architectures","Design Resilient Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS AppSync","description":"A serverless back-end for mobile, web, and enterprise applications. It uses GraphQL to make it easy to build data-driven apps by handling securely all the application data management tasks. | A fully managed service for developing GraphQL APIs. AppSync handles the heavy lifting of securely connecting to data sources like DynamoDB, Lambda, RDS, HTTP APIs, and Elasticsearch. Features include: real-time subscriptions (WebSocket), offline data synchronization for mobile apps, and built-in authorization with Cognito, IAM, or API keys. Unlike REST APIs, GraphQL lets clients request exactly the data they need in a single request.","category":"Application Integration","url":"https://aws.amazon.com/appsync/","exams":["CLF-C02","SAA-C03"],"entryType":"service","domains":["Design Resilient Architectures","Design High-Performing Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Artifact","description":"Your go-to, central resource for compliance-related information that matters to you. It provides on-demand access to AWS security and compliance reports and select online agreements. | Your go-to, central resource for compliance-related information that matters to you. Artifact provides on-demand access to AWS security and compliance reports (such as SOC reports, PCI DSS reports, and ISO certifications) and select online agreements. No cost to use — simply download the reports you need for your auditors and regulators. Essential for demonstrating AWS compliance to your own compliance requirements.","category":"Security, Identity, & Compliance","url":"https://aws.amazon.com/artifact/","exams":["AIF-C01","CLF-C02","SAA-C03"],"entryType":"service","domains":["Security, Compliance, and Governance for AI Solutions","Design Secure Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Audit Manager","description":"A service that helps you continuously audit your AWS usage to simplify how you assess risk and compliance with regulations and industry standards. Audit Manager automatically collects and organizes evidence from AWS services, maps it to controls in compliance frameworks (like CIS, PCI DSS, SOC 2), and generates audit-ready reports. Reduces the time and effort needed to prepare for audits by automating evidence collection.","category":"Security, Identity, & Compliance","url":"https://aws.amazon.com/audit-manager/","exams":["AIF-C01","CLF-C02","SAA-C03"],"entryType":"service","domains":["Security, Compliance, and Governance for AI Solutions","Design Secure Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Auto Scaling","description":"A service that monitors your applications and automatically adjusts capacity to maintain steady, predictable performance at the lowest possible cost. Unlike EC2 Auto Scaling (which only scales EC2), AWS Auto Scaling lets you set scaling policies for multiple resources from a single interface: EC2 Auto Scaling groups, ECS tasks, DynamoDB tables and indexes, and Aurora Replicas. Uses scaling plans with target tracking or predictive scaling.","category":"Management & Governance","url":"https://aws.amazon.com/autoscaling/","exams":["CLF-C02","SAA-C03"],"entryType":"service","domains":["Design Secure Architectures","Design Resilient Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS B2B Data Interchange (B2Bi)","description":"Automates the transformation of Electronic Data Interchange (EDI) documents into JSON and XML formats to simplify your downstream data integrations.","category":"Application Integration","url":"https://aws.amazon.com/b2b-data-interchange/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Backup","description":"Enables you to centralize and automate data protection across AWS services. It offers a cost-effective, fully managed, policy-based service that further simplifies data protection at scale. | A fully managed backup service that makes it easy to centralize and automate data protection across AWS services, in the cloud, and on premises. Using Backup, you can configure backup policies and monitor activity for resources including: EC2 instances, EBS volumes, RDS databases, DynamoDB tables, EFS file systems, and Storage Gateway volumes. Features: backup plans (automated scheduling), lifecycle policies (transition to cold storage), cross-region backup, and cross-account backup.","category":"Storage","url":"https://aws.amazon.com/backup/","exams":["CLF-C02","SAA-C03"],"entryType":"service","domains":["Design Resilient Architectures","Design High-Performing Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Batch","description":"Enables developers, scientists, and engineers to easily and efficiently run hundreds of thousands of batch computing jobs on AWS. It dynamically provisions the optimal quantity and type of compute resources. | A fully managed batch processing service that dynamically provisions the optimal quantity and type of compute resources (EC2 or Spot Instances, Fargate) based on the volume and specific resource requirements of submitted batch jobs. Supports job dependencies, job queues with priority, and compute environments. Unlike Lambda (for short, event-driven functions), Batch is designed for long-running, compute-intensive workloads like video rendering, financial modeling, and scientific simulations.","category":"Compute","url":"https://aws.amazon.com/batch/","exams":["CLF-C02","SAA-C03"],"entryType":"service","domains":["Design Resilient Architectures","Design High-Performing Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Billing Conductor","description":"A fully managed service that can support the showback and chargeback workflows of AWS Solution Providers and Enterprise customers by customizing monthly billing data.","category":"Cloud Financial Management","url":"https://aws.amazon.com/billing/features/#AWS_Billing_Conductor","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Budgets","description":"Gives you the ability to set custom budgets that alert you when your costs or usage exceed (or are forecasted to exceed) your budgeted amount. | A service that lets you set custom budgets to track your costs and usage across AWS services, and receive alerts when you exceed or are forecasted to exceed your budgeted amount. Budget types include: Cost Budgets (track spending), Usage Budgets (track resource consumption), Reservation Budgets (track RI utilization), and Savings Plans Budgets. Alerts can trigger SNS notifications, Lambda functions, or email notifications.","category":"Cloud Financial Management","url":"https://aws.amazon.com/aws-cost-management/aws-budgets/","exams":["AIF-C01","CLF-C02","SAA-C03"],"entryType":"service","domains":["Fundamentals of Generative AI","Applications of Foundation Models","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Certificate Manager","description":"A service that lets you easily provision, manage, and deploy Secure Sockets Layer/Transport Layer Security (SSL/TLS) certificates for use with AWS services and your internal connected resources.","category":"Security, Identity, & Compliance","url":"https://aws.amazon.com/certificate-manager/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Certificate Manager (ACM)","description":"A service that lets you easily provision, manage, and deploy Secure Sockets Layer/Transport Layer Security (SSL/TLS) certificates for use with AWS services and your internal connected resources. | A service that lets you easily provision, manage, and deploy public and private SSL/TLS certificates for use with AWS services and your internal connected resources. ACM handles the complexity of creating, storing, and renewing certificates. Public certificates are free and automatically renew. Can be deployed to ALB, CloudFront, API Gateway, and Nitro Enclaves. Private certificates require a private Certificate Authority (CA) and are charged per certificate.","category":"Security, Identity, & Compliance","url":"https://aws.amazon.com/certificate-manager/","exams":["SAA-C03"],"entryType":"service","domains":["Design Secure Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Clean Rooms","description":"Helps companies and their partners more easily and securely analyze and collaborate on their collective datasets—without sharing or copying one another's underlying data.","category":"Analytics","url":"https://aws.amazon.com/clean-rooms/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Client VPN","description":"A managed, client-based VPN service that enables individual users (employees working remotely) to securely connect to AWS resources or on-premises networks from any location using an OpenVPN-based client. This is different from AWS Site-to-Site VPN, which connects entire networks. Client VPN is for individual device access (the 'road warrior' use case).","category":"Networking & Content Delivery","url":"https://aws.amazon.com/vpn/client-vpn/","exams":["SAA-C03"],"entryType":"service","domains":["Design Resilient Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Cloud Map","description":"A cloud resource discovery service. With Cloud Map, you can define custom names for your application resources, and it maintains the updated location of these dynamically changing resources.","category":"Networking & Content Delivery","url":"https://aws.amazon.com/cloud-map/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Cloud9","description":"A cloud-based integrated development environment (IDE) that lets you write, run, and debug your code with just a browser. It includes a code editor, debugger, and terminal.","category":"Developer Tools","url":"https://aws.amazon.com/cloud9/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS CloudFormation","description":"Provides a common language for you to model and provision all the infrastructure resources in your cloud environment in an automated and secure manner using a simple text file. | A service that gives developers and businesses an easy way to model a collection of related AWS and third-party resources, provision them quickly and consistently, and manage them throughout their lifecycles. You define resources in JSON or YAML templates, and CloudFormation handles provisioning and configuration. Features include: Stacks (collection of resources), Change Sets (preview changes), StackSets (deploy across multiple accounts/regions), and Drift Detection (identify manual changes). Infrastructure as Code (IaC) on AWS.","category":"Management & Governance","url":"https://aws.amazon.com/cloudformation/","exams":["CLF-C02","SAA-C03"],"entryType":"service","domains":["Design Secure Architectures","Design Resilient Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS CloudHSM","description":"A cloud-based hardware security module (HSM) that enables you to easily generate and use your own encryption keys on the AWS Cloud. It helps you meet corporate, contractual, and regulatory compliance requirements. | A cloud-based hardware security module (HSM) that enables you to easily generate and use your own encryption keys on the AWS Cloud. With CloudHSM, you manage your own keys — AWS has no access to your keys. CloudHSM is FIPS 140-2 Level 3 validated, meeting stringent compliance requirements for financial services and healthcare. Use cases: private key storage for certificate authorities, database encryption, and digital rights management.","category":"Security, Identity, & Compliance","url":"https://aws.amazon.com/cloudhsm/","exams":["CLF-C02","SAA-C03"],"entryType":"service","domains":["Design Secure Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].js nds-on focus, but it is in scope as an operational and automation tool.","category":"Management & Governance","url":"https://aws.amazon.com/cli/","exams":["SAA-C03"],"entryType":"service","domains":["Design Secure Architectures","Design Resilient Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Compute Optimizer","description":"Recommends optimal AWS resources for your workloads to reduce costs and improve performance by using machine learning to analyze historical utilization metrics. | A service that analyzes the configuration and utilization metrics of your AWS resources and reports whether they are optimal. It uses machine learning to identify patterns and generate recommendations for improving performance and reducing costs. Currently supports: EC2 instances, Auto Scaling groups, EBS volumes, Lambda functions, and Fargate on ECS. Recommendations include: rightsizing (different instance type), upgrading to newer generation, and removing idle resources.","category":"Management & Governance","url":"https://aws.amazon.com/compute-optimizer/","exams":["CLF-C02","SAA-C03"],"entryType":"service","domains":["Design Secure Architectures","Design Resilient Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Config","description":"A fully managed service that provides you with an AWS resource inventory, configuration history, and configuration change notifications to enable security and governance. | A service that enables you to assess, audit, and evaluate the configurations of your AWS resources. Config continuously monitors and records your resource configurations and allows you to automate the evaluation of recorded configurations against desired configurations. Features include: Configuration History (what changed, when), Configuration Snapshots (point-in-time view), Rules (compliance checks), and Conformance Packs (collections of rules). Essential for compliance and governance.","category":"Management & Governance","url":"https://aws.amazon.com/config/","exams":["AIF-C01","CLF-C02","SAA-C03"],"entryType":"service","domains":["Security, Compliance, and Governance for AI Solutions","Design Secure Architectures","Design Resilient Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Console Mobile Application","description":"Lets customers view and manage a select set of resources to support incident response while on-the-go. It allows monitoring resources through a dedicated dashboard.","category":"Management & Governance","url":"https://aws.amazon.com/console/mobile/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Control Tower","description":"The easiest way to set up and govern a new, secure, multi-account AWS environment. It establishes a landing zone that is based on best-practices blueprints. | A service that provides the easiest way to set up and govern a secure, multi-account AWS environment based on AWS best practices. Control Tower creates a landing zone with: pre-configured guardrails (preventive and detective controls), Account Factory (standardized account provisioning), and centralized logging. Built on top of Organizations, CloudFormation, and Config. Ideal for enterprises establishing a new AWS environment with governance from day one.","category":"Management & Governance","url":"https://aws.amazon.com/controltower/","exams":["CLF-C02","SAA-C03"],"entryType":"service","domains":["Design Secure Architectures","Design Resilient Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Cost and Usage Report","description":"A single location for accessing comprehensive information about your AWS costs and usage. It lists AWS usage for each service category used by an account. | The most comprehensive source of AWS cost and usage data, delivering detailed reports to S3 hourly or daily. Contains line-item details for every charge, including metadata like resource tags, pricing rates, and usage quantities. Essential for advanced cost analysis, chargeback/showback, and integration with third-party cost management tools. Can be integrated with Athena for SQL-based analysis or QuickSight for visualization.","category":"Cloud Financial Management","url":"https://aws.amazon.com/aws-cost-management/aws-cost-and-usage-report/","exams":["CLF-C02","SAA-C03"],"entryType":"service","domains":["Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Cost Explorer","description":"Has an easy-to-use interface that lets you visualize, understand, and manage your AWS costs and usage over time by creating custom reports. | A tool that enables you to visualize, understand, and manage your AWS costs and usage over time. Create custom reports that analyze cost and usage data at a high level (total costs across all accounts) or dive deep into specific resources. Supports filtering by service, linked account, tag, region, and more. Forecasting feature predicts future costs based on historical data. Essential for identifying cost optimization opportunities and tracking budget adherence.","category":"Cloud Financial Management","url":"https://aws.amazon.com/aws-cost-management/aws-cost-explorer/","exams":["AIF-C01","CLF-C02","SAA-C03"],"entryType":"service","domains":["Fundamentals of Generative AI","Applications of Foundation Models","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Cost Management Tools","description":"AWS provides a suite of tools for managing and optimizing cloud costs. (1) AWS Cost Explorer - visual tool for viewing and analyzing AWS costs and usage over time, interactive charts and graphs, filtering by service, region, tags, and accounts, forecasting future costs, Reserved Instance recommendations, cost anomaly detection integration; use for understanding spending patterns and identifying optimization opportunities. (2) AWS Cost and Usage Report (CUR) - comprehensive set of cost and usage data, delivered to S3 in CSV or Parquet format, hourly or daily granularity, includes line-item details for every usage event, supports tags and resource IDs; use for detailed cost analysis, chargeback/showback, and integration with BI tools. (3) AWS Budgets - set custom cost, usage, and reservation budgets, receive alerts when thresholds are exceeded or forecasted to be exceeded, supports cost budgets, usage budgets, RI utilization budgets, and Savings Plans budgets; use for cost control and preventing unexpected spending. (4) AWS Cost Anomaly Detection - machine learning-powered service that monitors spending patterns, automatically detects unusual spending, sends alerts via email or SNS, creates monitors for specific services, accounts, or tags; use for catching unexpected cost spikes early. (5) AWS Pricing Calculator - estimate total cost of ownership for AWS services, compare on-premises vs cloud costs, create and share cost estimates; use for planning and budgeting before deployment. (6) AWS Billing Conductor - custom billing rates and chargeback for organizations, proforma CUR for internal billing; use for enterprises with complex chargeback requirements.","category":"Management & Governance","url":"https://docs.aws.amazon.com/cost-management/latest/userguide/what-is-costmanagement.html","exams":["SAA-C03"],"entryType":"collection","is_collection":true,"collection_items":[{"name":"AWS Cost Explorer","description":"Has an easy-to-use interface that lets you visualize, understand, and manage your AWS costs and usage over time by creating custom reports."},{"name":"AWS Cost and Usage Report (CUR)","description":""},{"name":"AWS Budgets","description":"Gives you the ability to set custom budgets that alert you when your costs or usage exceed (or are forecasted to exceed) your budgeted amount."},{"name":"AWS Cost Anomaly Detection","description":""},{"name":"AWS Pricing Calculator","description":""},{"name":"AWS Billing Conductor","description":"A fully managed service that can support the showback and chargeback workflows of AWS Solution Providers and Enterprise customers by customizing monthly billing data."}],"sources":["aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"AWS Data Exchange","description":"Makes it easy to find, subscribe to, and use third-party data in the cloud from qualified data providers.","category":"Analytics","url":"https://aws.amazon.com/data-exchange/","exams":["AIF-C01","CLF-C02","SAA-C03"],"entryType":"service","domains":["Fundamentals of AI and ML","Security, Compliance, and Governance for AI Solutions","Design Resilient Architectures","Design High-Performing Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Data Pipeline","description":"A web service that helps you reliably process and move data between different AWS compute and storage services, as well as on-premises data sources, at specified intervals.","category":"Analytics","url":"https://aws.amazon.com/datapipeline/","exams":["CLF-C02","SAA-C03"],"entryType":"service","domains":["Design Resilient Architectures","Design High-Performing Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Database Migration Service","description":"Helps you migrate databases to AWS easily and securely. The source database remains fully operational during the migration, minimizing downtime to applications.","category":"Migration & Transfer","url":"https://aws.amazon.com/dms/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Database Migration Service (AWS DMS)","description":"Helps you migrate databases to AWS easily and securely. The source database remains fully operational during the migration, minimizing downtime to applications.","category":"Migration & Transfer","url":"https://aws.amazon.com/dms/","exams":["SAA-C03"],"entryType":"service","domains":["Design Secure Architectures","Design Resilient Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS DataSync","description":"A data transfer service that makes it easy for you to automate moving data between on-premises storage and Amazon S3 or Amazon Elastic File System (Amazon EFS). | A data transfer service that simplifies, automates, and accelerates moving data between on-premises storage and AWS storage services (S3, EFS, FSx). DataSync uses a purpose-built network protocol and parallel transfer to achieve speeds up to 10x faster than open-source tools. Supports: NFS, SMB, HDFS, and self-managed object storage as sources. Includes built-in encryption, data validation, and bandwidth throttling. Agent-based — you deploy a DataSync agent on-premises.","category":"Migration & Transfer","url":"https://aws.amazon.com/datasync/","exams":["CLF-C02","SAA-C03"],"entryType":"service","domains":["Design Secure Architectures","Design Resilient Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Deep Learning AMIs","description":"Amazon Machine Images (AMIs) pre-configured with popular deep learning frameworks including TensorFlow, PyTorch, MXNet, and Hugging Face Transformers. They include GPU drivers, CUDA, and cuDNN pre-installed, allowing you to start training deep learning models on EC2 GPU instances within minutes. Available for Amazon Linux and Ubuntu. Deep Learning AMIs save hours of setup time and ensure consistent, optimized environments for ML development.","category":"Machine Learning","url":"https://aws.amazon.com/machine-learning/amis/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"AWS Deep Learning Containers","description":"Docker images pre-installed with deep learning frameworks and libraries, optimized for use on Amazon EKS, ECS, and SageMaker. They provide consistent environments for training and inference across different platforms. AWS maintains and updates these containers with the latest framework versions and security patches. You can use them directly or as base images for your own custom containers. Available for TensorFlow, PyTorch, MXNet, and Hugging Face.","category":"Machine Learning","url":"https://aws.amazon.com/machine-learning/containers/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"AWS DeepComposer","description":"The world’s first musical keyboard powered by machine learning to enable developers of all skill levels to learn Generative AI while creating original music outputs.","category":"Machine Learning","url":"https://aws.amazon.com/deepcomposer/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS DeepRacer","description":"The fastest way to get rolling with machine learning, literally. Get hands-on with a fully autonomous 1/18th scale race car driven by reinforcement learning, 3D racing simulator, and global racing league.","category":"Machine Learning","url":"https://aws.amazon.com/deepracer/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Device Farm","description":"An app testing service that lets you test and interact with your Android, iOS, and web apps on many real devices at once, or reproduce issues on a device in real time. Device Farm provides a fleet of physical devices in the AWS cloud that you can remotely access. Supports automated testing with frameworks like Appium, Calabash, and Espresso, as well as manual testing. Generates logs, performance data, and screenshots to help identify and fix issues.","category":"Frontend Web & Mobile","url":"https://aws.amazon.com/device-farm/","exams":["CLF-C02","SAA-C03"],"entryType":"service","domains":["Design Resilient Architectures","Design High-Performing Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Direct Connect","description":"Makes it easy to establish a dedicated network connection from your premises to AWS, which in many cases can reduce your network costs, increase bandwidth throughput, and provide a more consistent network experience. | A cloud service solution that makes it easy to establish a dedicated network connection from your premises to AWS. Direct Connect bypasses the public internet, providing more consistent network performance, reduced bandwidth costs, and increased security. Supports: Dedicated Connections (1Gbps, 10Gbps, 100Gbps physical ports) and Hosted Connections (sub-1Gbps through partners). Can access all AWS services in any Region through a single connection.","category":"Networking & Content Delivery","url":"https://aws.amazon.com/directconnect/","exams":["CLF-C02","SAA-C03"],"entryType":"service","domains":["Design Secure Architectures","Design Resilient Architectures","Design High-Performing Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Directory Service","description":"Enables your directory-aware workloads and AWS resources to use managed Active Directory in the AWS Cloud. It is built on actual Microsoft Active Directory. | A managed service that enables your directory-aware workloads and AWS resources to use managed Active Directory in the AWS Cloud. Options include: AWS Managed Microsoft AD (actual Microsoft AD with trust relationships), AD Connector (proxy to on-premises AD), and Simple AD (Samba-based, standalone directory). Use cases: domain-joining EC2 instances, providing LDAP authentication, and supporting Microsoft workloads like SharePoint and SQL Server.","category":"Security, Identity, & Compliance","url":"https://aws.amazon.com/directoryservice/","exams":["CLF-C02","SAA-C03"],"entryType":"service","domains":["Design Secure Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS DMS (Database Migration Service)","description":"A cloud service that makes it easy to migrate relational databases, data warehouses, NoSQL databases, and other types of data stores to AWS. DMS supports both homogeneous migrations (Oracle to Oracle) and heterogeneous migrations (Oracle to PostgreSQL). During migration, your source database remains fully operational, minimizing downtime. Supports one-time migrations and continuous replication (CDC — Change Data Capture) for ongoing synchronization. Can also migrate to S3 in various formats.","category":"Migration & Transfer","url":"https://aws.amazon.com/dms/","exams":["SAA-C03"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"AWS Elastic Beanstalk","description":"An easy-to-use service for deploying and scaling web applications and services developed with Java, .NET, PHP, Node.js, Python, Ruby, Go, and Docker on familiar servers. | An easy-to-use service for deploying and scaling web applications and services developed with Java, .NET, PHP, Node.js, Python, Ruby, Go, and Docker. Simply upload your code, and Elastic Beanstalk automatically handles deployment, load balancing, auto-scaling, and health monitoring. Provides full control over AWS resources — you can access and modify the underlying EC2 instances, RDS databases, and load balancers. The PaaS (Platform as a Service) option on AWS.","category":"Compute","url":"https://aws.amazon.com/elasticbeanstalk/","exams":["CLF-C02","SAA-C03"],"entryType":"service","domains":["Design Resilient Architectures","Design High-Performing Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Elastic Disaster Recovery","description":"Minimizes downtime and data loss with fast, reliable recovery of on-premises and cloud-based applications using affordable storage, minimal compute, and point-in-time recovery.","category":"Storage","url":"https://aws.amazon.com/disaster-recovery/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Elastic Transcoder","description":"A cloud-based media transcoding service designed to be a highly scalable, easy-to-use, and cost-effective way for developers and businesses to convert media files from their source format into versions that will play back on devices like smartphones, tablets, and PCs. You simply create a transcoding job specifying the input file, transcoding preset (output format), and output location. Pay based on output duration and resolution. Being replaced by AWS Elemental MediaConvert for new implementations.","category":"Media Services","url":"https://aws.amazon.com/elastictranscoder/","exams":["SAA-C03"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"AWS Elemental Appliances and Software","description":"Bring advanced video processing and delivery technologies into your data center, co-location space, or on-premises facility, allowing you to encode, package, and deliver video assets on-premises.","category":"Media Services","url":"https://aws.amazon.com/elemental-appliances-software/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Elemental MediaConnect","description":"A high-quality transport service for live video. It allows you to build mission-critical live video workflows in a fraction of the time and cost of satellite or fiber services.","category":"Media Services","url":"https://aws.amazon.com/mediaconnect/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Elemental MediaConvert","description":"A file-based video transcoding service with broadcast-grade features. It allows you to easily create video-on-demand (VOD) content for broadcast and multiscreen delivery at scale.","category":"Media Services","url":"https://aws.amazon.com/mediaconvert/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Elemental MediaLive","description":"A broadcast-grade live video processing service. It lets you create high-quality video streams for delivery to broadcast televisions and internet-connected multiscreen devices.","category":"Media Services","url":"https://aws.amazon.com/medialive/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Elemental MediaPackage","description":"Reliably prepares and protects your video for delivery over the Internet. From a single video input, it creates video streams in multiple formats to play on connected TVs, mobile phones, computers, and tablets.","category":"Media Services","url":"https://aws.amazon.com/mediapackage/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Elemental MediaStore","description":"An AWS storage service optimized for media. It gives you the performance, consistency, and low latency required to deliver live and on-demand video content.","category":"Media Services","url":"https://aws.amazon.com/mediastore/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Elemental MediaTailor","description":"Lets video providers insert individually targeted advertising into their video streams without sacrificing broadcast-level quality-of-service.","category":"Media Services","url":"https://aws.amazon.com/mediatailor/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Entity Resolution","description":"A service that helps you match and link related records stored across multiple applications, channels, and data stores without building a custom solution.","category":"Analytics","url":"https://aws.amazon.com/entity-resolution/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Fargate","description":"A compute engine for Amazon ECS and EKS that allows you to run containers without having to manage servers or clusters. You no longer have to provision, configure, and scale clusters of VMs. | A serverless compute engine for containers that works with both Amazon ECS and EKS. With Fargate, you don't need to provision, configure, or scale clusters of VMs to run containers — simply package your application into containers, specify CPU and memory requirements, define networking and IAM policies, and Fargate handles the infrastructure. Pricing is per-second based on vCPU and memory resources allocated. Ideal for running containers without operational overhead.","category":"Serverless","url":"https://aws.amazon.com/fargate/","exams":["CLF-C02","SAA-C03"],"entryType":"service","domains":["Design Resilient Architectures","Design High-Performing Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Fault Injection Service","description":"A fully managed service for running fault injection experiments on AWS that makes it easier to improve an application's performance, observability, and resiliency through chaos engineering.","category":"Developer Tools","url":"https://aws.amazon.com/fis/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Firewall Manager","description":"A security management service which allows you to centrally configure and manage firewall rules across your accounts and applications in AWS Organizations. | A security management service that allows you to centrally configure and manage firewall rules across your accounts and applications in AWS Organizations. Firewall Manager applies rules and protections across all resources or specific subsets, ensuring consistent security policy enforcement. Supports AWS WAF rules, AWS Shield Advanced protections, Security Groups, and AWS Network Firewall policies. Automatically applies rules to new resources as they are created.","category":"Security, Identity, & Compliance","url":"https://aws.amazon.com/firewall-manager/","exams":["CLF-C02","SAA-C03"],"entryType":"service","domains":["Design Secure Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Global Accelerator","description":"A networking service that improves the availability and performance of your applications with local or global users by providing static IP addresses that act as a fixed entry point. | A networking service that improves the availability and performance of your applications with local or global users by providing static IP addresses that act as a fixed entry point to your application endpoints in one or more AWS Regions. Uses AWS's global network to route user traffic over optimized paths. Unlike CloudFront (which caches content), Global Accelerator is for non-cacheable content like TCP/UDP traffic, gaming, and financial applications requiring static IPs.","category":"Networking & Content Delivery","url":"https://aws.amazon.com/global-accelerator/","exams":["CLF-C02","SAA-C03"],"entryType":"service","domains":["Design Secure Architectures","Design Resilient Architectures","Design High-Performing Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Glue","description":"A fully managed extract, transform, and load (ETL) service that makes it easy for customers to prepare and load their data for analytics. You can create and run an ETL job with a few clicks. | A serverless data integration service that makes it easy to discover, prepare, and combine data for analytics, machine learning, and application development. Key components: Glue Data Catalog (central metadata repository), Glue Crawlers (automatic schema discovery), Glue ETL (serverless Spark/Python-based transformations), and Glue DataBrew (visual data preparation). The go-to service for building data lakes and ETL pipelines on AWS.","category":"Analytics","url":"https://aws.amazon.com/glue/","exams":["AIF-C01","CLF-C02","SAA-C03"],"entryType":"service","domains":["Fundamentals of AI and ML","Security, Compliance, and Governance for AI Solutions","Design Resilient Architectures","Design High-Performing Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Glue Data Catalog","description":"A centralized, persistent metadata repository for all your data assets across AWS. It automatically discovers and catalogs metadata about your data stores (S3, RDS, Redshift) using Glue Crawlers. Amazon Athena, Amazon EMR, and Amazon Redshift Spectrum all use the Glue Data Catalog to discover what data is available and understand its schema. Think of it as the 'yellow pages' or card catalog for all your data in AWS.","category":"Analytics","url":"https://docs.aws.amazon.com/glue/latest/dg/catalog-and-crawler.html","exams":["SAA-C03"],"entryType":"service","domains":["Design High-Performing Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Glue DataBrew","description":"A visual data preparation service that lets you clean and normalize data without writing code. For AIF-C01, it fits the data-preparation part of the ML lifecycle and helps turn messy raw data into analytics- and model-ready data. | A visual data preparation tool that makes it easy for data analysts and scientists to clean and normalize data without writing code. It provides over 250 pre-built transformations for handling missing values, removing duplicates, standardizing formats, and more. You can save transformation recipes and apply them to new datasets automatically. Integrates with AWS Glue and can output to S3, Redshift, and other data stores. Useful for preparing training data for ML models.","category":"Analytics","url":"https://aws.amazon.com/glue/databrew/","exams":["AIF-C01"],"entryType":"service","domains":["Fundamentals of AI and ML","Security, Compliance, and Governance for AI Solutions"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Glue for ML Data Preparation","description":"AWS Glue is a serverless data integration service that prepares data for machine learning. Glue crawlers discover and catalog data schemas, Glue ETL jobs transform and clean data at scale, and the Glue Data Catalog provides a central metadata repository. For ML workloads, Glue can extract data from multiple sources, apply transformations, and output training-ready datasets to S3. It integrates seamlessly with SageMaker and other ML services.","category":"Analytics","url":"https://aws.amazon.com/glue/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"AWS Ground Station","description":"A fully managed service that lets you control satellite communications, process data, and scale your operations without having to worry about building or managing your own ground station infrastructure.","category":"Satellite","url":"https://aws.amazon.com/ground-station/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Health","description":"Provides ongoing visibility into your resource performance and the availability of your AWS services and accounts. It provides relevant and timely information to help you manage events in progress.","category":"Management & Governance","url":"https://aws.amazon.com/health/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Health Dashboard","description":"A personalized view into the health of AWS services and your specific AWS resources or accounts. For architects, it matters when planning operations, incident response, and awareness of AWS-side events affecting workloads. | A personalized view of the health of AWS services and alerts when your resources are impacted by AWS events. The Service Health Dashboard shows the general status of AWS services. Your Account Health Dashboard provides personalized alerts about events affecting your specific resources: planned maintenance, service disruptions, and security notifications. Integrates with EventBridge for automated responses and SNS for notifications.","category":"Management & Governance","url":"https://aws.amazon.com/premiumsupport/technology/aws-health-dashboard/","exams":["SAA-C03"],"entryType":"service","domains":["Design Secure Architectures","Design Resilient Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS HealthLake","description":"A HIPAA-eligible service offering healthcare and life sciences companies a complete view of individual or patient population health data for query and analytics at scale.","category":"Machine Learning","url":"https://aws.amazon.com/healthlake/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS HealthScribe","description":"A HIPAA-eligible service that allows healthcare software vendors to automatically generate clinical notes by analyzing patient-clinician conversations.","category":"Machine Learning","url":"https://aws.amazon.com/healthscribe/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS IAM (Identity and Access Management)","description":"A web service that helps you securely control access to AWS resources. You use IAM to control who is authenticated (signed in) and authorized (has permissions) to use resources. Key concepts: Users (individual identities), Groups (collections of users), Roles (temporary credentials for AWS services or federated users), Policies (JSON documents defining permissions), and MFA (multi-factor authentication). IAM is global — users and roles are available across all regions.","category":"Security, Identity, & Compliance","url":"https://aws.amazon.com/iam/","exams":["SAA-C03"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"AWS IAM for ML Access Control","description":"AWS Identity and Access Management (IAM) controls who can access ML resources and what actions they can perform. You can create policies that grant specific permissions for SageMaker actions (like CreateTrainingJob or InvokeEndpoint), restrict access to specific model endpoints, and control who can access training data in S3. IAM roles for SageMaker allow instances to access other AWS services without embedding credentials. Proper IAM configuration is essential for securing ML workflows.","category":"Security, Identity, & Compliance","url":"https://aws.amazon.com/iam/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"AWS IAM Identity Center","description":"Makes it easy to centrally manage single sign-on (SSO) access to multiple AWS accounts and business applications. You can create and manage user identities or connect to your existing identity source. | The successor to AWS Single Sign-On (SSO). Provides a single place to centrally manage workforce access to multiple AWS accounts and cloud applications. Users sign in once to a central portal and get access to all assigned accounts and applications. Supports integration with existing identity sources: Microsoft Active Directory, Okta, Azure AD, and more. Enforces least privilege with permission sets that define what users can do in each AWS account.","category":"Security, Identity, & Compliance","url":"https://aws.amazon.com/iam/identity-center/","exams":["CLF-C02","SAA-C03"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS IAM Identity Center (AWS Single Sign-On)","description":"Makes it easy to centrally manage single sign-on (SSO) access to multiple AWS accounts and business applications. You can create and manage user identities or connect to your existing identity source.","category":"Security, Identity, & Compliance","url":"https://aws.amazon.com/iam/identity-center/","exams":["SAA-C03"],"entryType":"service","domains":["Design Secure Architectures"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Identity and Access Management","description":"Enables you to manage access to AWS services and resources securely. Using IAM, you can create and manage AWS users and groups, and use permissions to allow and deny their access to AWS resources.","category":"Security, Identity, & Compliance","url":"https://aws.amazon.com/iam/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Identity and Access Management (IAM)","description":"Enables you to manage access to AWS services and resources securely. Using IAM, you can create and manage AWS users and groups, and use permissions to allow and deny their access to AWS resources.","category":"Security, Identity, & Compliance","url":"https://aws.amazon.com/iam/","exams":["AIF-C01","SAA-C03"],"entryType":"service","domains":["Security, Compliance, and Governance for AI Solutions","Design Secure Architectures"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Inferentia & Trainium","description":"Custom silicon chips designed by AWS specifically for machine learning. AWS Trainium (trn1 EC2 instances) is optimized for training large ML models at lower cost than GPU-based instances. AWS Inferentia (inf2 EC2 instances) is optimized for running ML inference (making predictions with a trained model) at high speed and low cost. They are key to cost-effective, high-performance ML on AWS.","category":"Machine Learning","url":"https://aws.amazon.com/machine-learning/inferentia/","exams":["AIF-C01"],"entryType":"service","domains":["Fundamentals of AI and ML","Applications of Foundation Models"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Infrastructure Composer","description":"Helps you visually compose and configure serverless applications from AWS services backed by deployment-ready infrastructure as code (IaC).","category":"Developer Tools","url":"https://aws.amazon.com/infrastructure-composer/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS IoT Analytics","description":"A fully managed service that makes it easy to run and operationalize sophisticated analytics on massive volumes of IoT data without having to worry about the cost and complexity.","category":"IoT","url":"https://aws.amazon.com/iot-analytics/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS IoT Button","description":"A programmable button based on the Amazon Dash Button hardware. This simple Wi-Fi device is easy to configure and designed for developers to get started with AWS IoT services.","category":"IoT","url":"https://aws.amazon.com/iot/button/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS IoT Core","description":"A managed cloud service that lets connected devices easily and securely interact with cloud applications and other devices. It can support billions of devices and trillions of messages.","category":"IoT","url":"https://aws.amazon.com/iot-core/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS IoT Device Defender","description":"A fully managed service that helps you secure your fleet of IoT devices. It continuously audits your IoT configurations to make sure that they aren't deviating from security best practices.","category":"IoT","url":"https://aws.amazon.com/iot-device-defender/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS IoT Device Management","description":"Makes it easy to securely onboard, organize, monitor, and remotely manage IoT devices at scale. You can register your connected devices individually or in bulk.","category":"IoT","url":"https://aws.amazon.com/iot-device-management/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS IoT Events","description":"A fully managed IoT service that makes it easy to detect and respond to events from IoT sensors and applications, such as changes in equipment or motion detector signals.","category":"IoT","url":"https://aws.amazon.com/iot-events/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS IoT ExpressLink","description":"Powers a range of hardware modules developed by AWS Partners. It makes it faster and easier for you to securely connect devices to the cloud and seamlessly integrate with a range of AWS services.","category":"IoT","url":"https://aws.amazon.com/iot-expresslink/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS IoT FleetWise","description":"With AWS IoT FleetWise, you can collect and organize vehicle data and store that data in a standardized way for data analysis in the cloud.","category":"IoT","url":"https://aws.amazon.com/iot-fleetwise/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS IoT Greengrass","description":"Seamlessly extends AWS to devices so they can act locally on the data they generate, while still using the cloud for management, analytics, and durable storage.","category":"IoT","url":"https://aws.amazon.com/greengrass/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS IoT SiteWise","description":"A managed service that makes it easy to collect, store, organize and monitor data from industrial equipment at scale to help you make better, data-driven decisions.","category":"IoT","url":"https://aws.amazon.com/iot-sitewise/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS IoT TwinMaker","description":"Makes it easier for developers to create digital twins of real-world systems such as buildings, factories, industrial equipment, and production lines.","category":"IoT","url":"https://aws.amazon.com/iot-twinmaker/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Key Management Service","description":"Makes it easy for you to create and manage cryptographic keys and control their use across a wide range of AWS services and in your applications.","category":"Security, Identity, & Compliance","url":"https://aws.amazon.com/kms/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Key Management Service (AWS KMS)","description":"Makes it easy for you to create and manage cryptographic keys and control their use across a wide range of AWS services and in your applications.","category":"Security, Identity, & Compliance","url":"https://aws.amazon.com/kms/","exams":["AIF-C01","SAA-C03"],"entryType":"service","domains":["Security, Compliance, and Governance for AI Solutions","Design Secure Architectures"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS KMS (Key Management Service)","description":"A managed service that makes it easy for you to create and control the cryptographic keys used to encrypt your data. KMS is integrated with most AWS services to simplify encryption. Key types: Customer Managed Keys (CMKs — you have full control), AWS Managed Keys (managed by AWS), and AWS Owned Keys (shared across accounts). Supports symmetric (AES-256) and asymmetric keys. All KMS operations are logged to CloudTrail for audit purposes.","category":"Security, Identity, & Compliance","url":"https://aws.amazon.com/kms/","exams":["SAA-C03"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"AWS KMS for ML Model Encryption","description":"AWS Key Management Service (KMS) enables you to encrypt machine learning models, training data, and inference endpoints using keys you control. You can use AWS-managed keys or customer-managed keys (CMKs) for fine-grained access control. SageMaker, Bedrock, and other ML services integrate with KMS to encrypt data at rest. This is essential for protecting intellectual property in custom-trained models and meeting compliance requirements for sensitive AI workloads.","category":"Security, Identity, & Compliance","url":"https://aws.amazon.com/kms/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"AWS Lake Formation","description":"A service that makes it easy to set up a secure data lake in days. A data lake is a centralized, curated, and secured repository that stores all your data, both in its original form and prepared for analysis. | A service that makes it easy to set up, secure, and manage data lakes in days instead of months. Lake Formation builds on AWS Glue and provides a central place to define security policies (who can access what data) that are enforced across multiple analytics services (Athena, Redshift, EMR, QuickSight). Features include: data cataloging, data cleansing, access control at database/table/column/row level, and data sharing across accounts.","category":"Analytics","url":"https://aws.amazon.com/lake-formation/","exams":["AIF-C01","CLF-C02","SAA-C03"],"entryType":"service","domains":["Fundamentals of AI and ML","Security, Compliance, and Governance for AI Solutions","Design Resilient Architectures","Design High-Performing Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Lambda","description":"Lets you run code without provisioning or managing servers. You pay only for the compute time you consume—there is no charge when your code is not running. | A serverless compute service that runs your code in response to events without provisioning or managing servers. You upload code, Lambda handles everything required to run and scale it with high availability. Supports multiple runtimes (Node.js, Python, Java, Go, .NET, Ruby) and custom runtimes. Pricing: pay only for the compute time consumed (per 1ms) and number of requests. Key limits: 15-minute timeout, 10GB memory, 6MB payload (sync), 256KB (async).","category":"Serverless","url":"https://aws.amazon.com/lambda/","exams":["CLF-C02","SAA-C03"],"entryType":"service","domains":["Design Resilient Architectures","Design High-Performing Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Lambda Layers","description":"A distribution mechanism for libraries, custom runtimes, and other function dependencies that are shared across multiple Lambda functions. Instead of bundling the same large library (like pandas or NumPy) in every deployment package, you package it once as a Layer and attach it to all functions that need it. This reduces deployment package size, speeds up deployments, and promotes code reuse across your serverless applications.","category":"Compute","url":"https://docs.aws.amazon.com/lambda/latest/dg/configuration-layers.html","exams":["SAA-C03"],"entryType":"service","domains":["Design Resilient Architectures","Design High-Performing Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AWS Launch Wizard","description":"Offers a guided way of sizing, configuring, and deploying AWS resources for third party applications, such as Microsoft SQL Server Always On and HANA based SAP systems, without the ne
