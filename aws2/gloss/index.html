<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWS Multi-Exam Unified Glossary</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --clf:#3b82f6;--aif:#8b5cf6;--saa:#14b8a6;
  --bg:#f1f5f9;--card:#fff;--border:#e2e8f0;--text:#1e293b;--muted:#64748b;
  --accent:#4f46e5;--accent-hover:#4338ca;
}
html{font-size:14px}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:10px}
::-webkit-scrollbar-thumb:hover{background:#94a3b8}

/* ── Sticky header ── */
.header{position:sticky;top:0;z-index:30;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);box-shadow:0 1px 3px rgba(0,0,0,.06);padding:8px 12px}
.header-row{display:flex;flex-wrap:wrap;align-items:center;gap:8px}
.ctrl{display:flex;flex-wrap:wrap;align-items:center;gap:6px;flex:1 1 auto}

/* ── Controls ── */
select,input[type=text]{height:32px;padding:0 8px;border:1px solid var(--border);border-radius:6px;font-size:.8rem;font-family:inherit;background:#fff;color:var(--text);outline:none;transition:border .15s}
select:focus,input[type=text]:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(79,70,229,.15)}
input[type=text]{flex:1 1 120px;min-width:100px}
select{max-width:180px;cursor:pointer}
.search-wrap{position:relative;display:flex;flex:1 1 160px;min-width:120px}
.search-wrap input{width:100%;padding-right:28px}
.search-clear{position:absolute;right:6px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:1rem;line-height:1;display:none}
.search-clear.show{display:block}

.count{font-size:.7rem;color:var(--muted);white-space:nowrap}
.sort-btn{height:32px;padding:0 10px;border:1px solid var(--border);border-radius:6px;font-size:.72rem;font-family:inherit;cursor:pointer;background:#fff;color:var(--muted);transition:all .15s;white-space:nowrap}
.sort-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ── Stats bar ── */
.stats-bar{display:flex;flex-wrap:wrap;gap:6px;padding:6px 12px;font-size:.7rem;color:var(--muted)}
.stats-bar .chip{background:#e2e8f0;padding:2px 8px;border-radius:10px}

/* ── Grid ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:10px;padding:10px 12px}
@media(max-width:640px){.grid{grid-template-columns:1fr;padding:8px}}

/* ── Card ── */
.card{background:var(--card);border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.06);padding:12px;display:flex;flex-direction:column;border-left:4px solid var(--border);transition:box-shadow .2s,transform .15s;cursor:default;content-visibility:auto;contain-intrinsic-size:0 200px}
.card:hover{box-shadow:0 4px 12px rgba(0,0,0,.1);transform:translateY(-1px)}
.card.exam-aif{border-left-color:var(--aif);background:linear-gradient(90deg,rgba(139,92,246,.03) 0%,transparent 40%)}
.card.exam-saa{border-left-color:var(--saa);background:linear-gradient(90deg,rgba(20,184,166,.03) 0%,transparent 40%)}
.card.exam-clf{border-left-color:var(--clf);background:linear-gradient(90deg,rgba(59,130,246,.03) 0%,transparent 40%)}
.card.exam-multi{border-left-color:var(--accent);background:linear-gradient(90deg,rgba(79,70,229,.03) 0%,transparent 40%)}
.card.is-collection{border-left-width:5px;position:relative}
.card.is-collection::after{content:"📚";position:absolute;top:8px;right:8px;font-size:.85rem;opacity:.5}

.card-head{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px}
.avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:.8rem;flex-shrink:0}
.card-title{font-size:.85rem;font-weight:700;line-height:1.25;word-break:break-word}
.card-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:3px}

.tag{font-size:.6rem;font-weight:600;padding:1px 6px;border-radius:3px;white-space:nowrap}
.tag-clf{background:#dbeafe;color:#1e40af}
.tag-aif{background:#ede9fe;color:#6d28d9}
.tag-saa{background:#ccfbf1;color:#0f766e}
.tag-cat{font-size:.6rem;font-weight:500;padding:1px 6px;border-radius:10px;background:#f1f5f9;color:var(--muted)}
.tag-type{font-size:.58rem;font-weight:600;padding:1px 5px;border-radius:3px;text-transform:uppercase}
.tag-type.service{background:#dcfce7;color:#166534}
.tag-type.concept{background:#fef9c3;color:#854d0e}
.tag-type.collection{background:#fce7f3;color:#9d174d}

.card-desc{font-size:.78rem;color:#475569;line-height:1.5;flex:1;margin-bottom:6px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical}
.card-desc.expanded{-webkit-line-clamp:unset;display:block}

.card-footer{display:flex;justify-content:space-between;align-items:center;padding-top:6px;border-top:1px solid #f1f5f9}
.card-link{font-size:.72rem;font-weight:600;color:var(--accent);text-decoration:none}
.card-link:hover{color:var(--accent-hover);text-decoration:underline}
.expand-btn{font-size:.65rem;color:var(--muted);cursor:pointer;border:none;background:none;padding:2px 4px}
.expand-btn:hover{color:var(--accent)}

/* ── Collection items ── */
.coll-items{margin-top:8px;padding-top:8px;border-top:1px dashed #e2e8f0;display:none}
.coll-items.open{display:block}
.coll-item{padding:5px 0;border-bottom:1px solid #f8fafc}
.coll-item:last-child{border-bottom:none}
.coll-item-name{font-size:.75rem;font-weight:600;color:var(--text)}
.coll-item-desc{font-size:.7rem;color:var(--muted);line-height:1.4;margin-top:1px}
.coll-toggle{font-size:.65rem;color:var(--accent);cursor:pointer;border:none;background:none;padding:2px 4px;margin-top:4px}
.coll-toggle:hover{text-decoration:underline}

/* ── Domains chips ── */
.domains{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px}
.domain-chip{font-size:.58rem;padding:1px 5px;border-radius:8px;background:#f0fdf4;color:#166534;border:1px solid #bbf7d0}

/* ── Sources ── */
.sources-line{font-size:.58rem;color:#94a3b8;margin-top:4px;font-style:italic}

/* ── Scroll sentinel ── */
.sentinel{height:1px}

/* ── No results ── */
.no-results{text-align:center;padding:60px 20px;color:var(--muted)}
.no-results h2{font-size:1.2rem;font-weight:700;margin-bottom:4px}
.no-results p{font-size:.85rem}

/* ── Loading spinner ── */
.loading{text-align:center;padding:20px;color:var(--muted);font-size:.8rem}
.loading::before{content:"";display:inline-block;width:16px;height:16px;border:2px solid #e2e8f0;border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;margin-right:6px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Back to top ── */
.btt{position:fixed;bottom:20px;right:20px;width:40px;height:40px;border-radius:50%;background:var(--accent);color:#fff;border:none;cursor:pointer;font-size:1.1rem;box-shadow:0 2px 8px rgba(0,0,0,.2);opacity:0;transform:translateY(10px);transition:opacity .2s,transform .2s;z-index:20}
.btt.show{opacity:1;transform:translateY(0)}
.btt:hover{background:var(--accent-hover)}

/* Avatar colors */
.av-a{background:#ef4444}.av-b{background:#f97316}.av-c{background:#f59e0b}.av-d{background:#eab308}
.av-e{background:#84cc16}.av-f{background:#22c55e}.av-g{background:#10b981}.av-h{background:#14b8a6}
.av-i{background:#06b6d4}.av-j{background:#0ea5e9}.av-k{background:#3b82f6}.av-l{background:#6366f1}
.av-m{background:#8b5cf6}.av-n{background:#a855f7}.av-o{background:#d946ef}.av-p{background:#ec4899}
.av-q{background:#f43f5e}.av-r{background:#ef4444}.av-s{background:#fb923c}.av-t{background:#a3e635}
.av-u{background:#34d399}.av-v{background:#2dd4bf}.av-w{background:#22d3ee}.av-x{background:#60a5fa}
.av-y{background:#818cf8}.av-z{background:#c084fc}
.av-other{background:#94a3b8}

/* Multi-description separator */
.desc-sep{color:var(--accent);font-weight:600;margin:0 2px}
</style>
</head>
<body>

<!-- ── Header ── -->
<div class="header">
  <div class="header-row">
    <select id="fExam" aria-label="Filter by exam">
      <option value="all">All Exams</option>
      <option value="CLF-C02">CLF-C02</option>
      <option value="AIF-C01">AIF-C01</option>
      <option value="SAA-C03">SAA-C03</option>
    </select>
    <select id="fCat" aria-label="Filter by category"></select>
    <select id="fType" aria-label="Filter by entry type">
      <option value="all">All Types</option>
      <option value="service">Services</option>
      <option value="concept">Concepts</option>
      <option value="collection">Collections</option>
    </select>
    <div class="search-wrap">
      <input type="text" id="fSearch" placeholder="Search name, description, category…" aria-label="Search">
      <button class="search-clear" id="searchClear" title="Clear search">&times;</button>
    </div>
    <button class="sort-btn active" id="sortBtn" title="Toggle sort mode">Core Name ▲</button>
    <span class="count" id="countLabel">0 terms</span>
  </div>
</div>

<!-- ── Stats bar ── -->
<div class="stats-bar" id="statsBar"></div>

<!-- ── Grid ── -->
<div class="grid" id="grid"></div>
<div class="no-results" id="noResults" style="display:none">
  <h2>No matching terms</h2>
  <p>Try adjusting your filters or search query.</p>
</div>
<div class="loading" id="loadingIndicator" style="display:none">Loading more…</div>
<div class="sentinel" id="sentinel"></div>

<!-- Back-to-top -->
<button class="btt" id="bttBtn" title="Back to top">↑</button>

<script>
// ══════════════════════════════════════════════════════
// DATA (embedded at build time)
// ══════════════════════════════════════════════════════
const GLOSSARY = [{"name":"A/B Testing for ML Models","description":"A method for comparing two or more versions of a machine learning model by serving them to different user segments and measuring performance. A/B testing helps determine if a new model actually improves business metrics in production, not just validation metrics. Amazon SageMaker supports A/B testing through multi-variant endpoints that route traffic to different model versions. You can gradually shift traffic from the old model to the new one based on performance.","category":"Machine Learning Concepts","url":"https://docs.aws.amazon.com/sagemaker/latest/dg/model-ab-testing.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Accelerated Computing Instances","description":"EC2 instance types (P, G, F, and Inf families) that use hardware accelerators such as GPUs or FPGAs. Ideal for machine learning training, graphics rendering, video encoding, and computational finance workloads.","category":"Compute","url":"https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/accelerated-computing-instances.html","exams":["SAA-C03"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"Accuracy","description":"A model evaluation metric that measures the proportion of correct predictions out of all predictions made. Calculated as (True Positives + True Negatives) / Total Predictions. While intuitive, accuracy can be misleading for imbalanced datasets. | A common classification metric measuring the proportion of correct predictions out of all predictions made. Accuracy = (True Positives + True Negatives) / Total Predictions. While intuitive, accuracy can be misleading with imbalanced datasets (e.g., if 99% of emails are not spam, a model that always predicts 'not spam' has 99% accuracy but is useless). Use precision, recall, and F1 score alongside accuracy for a complete picture.","category":"Machine Learning Concepts","url":"https://docs.aws.amazon.com/machine-learning/latest/dg/binary-classification-metrics.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Activation Functions","description":"Mathematical functions in neural networks that determine whether a neuron should be activated (fired) based on its inputs. Common activation functions include ReLU (Rectified Linear Unit — outputs max(0, x)), Sigmoid (outputs values between 0 and 1), and Tanh (outputs values between -1 and 1). Activation functions introduce non-linearity, allowing neural networks to learn complex patterns. The choice of activation function affects training speed and model performance.","category":"Machine Learning Concepts","url":"https://docs.aws.amazon.com/sagemaker/latest/dg/deep-learning.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Active-Active Failover","description":"A high-availability and DR strategy in which multiple environments actively serve traffic, often across regions. It offers the best resilience and lowest recovery times, but it also tends to be the most expensive and operationally complex.","category":"Architecture Patterns","url":"https://docs.aws.amazon.com/whitepapers/latest/disaster-recovery-workloads-on-aws/disaster-recovery-options-in-the-cloud.html","exams":["SAA-C03"],"entryType":"concept","domains":["Design Resilient Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AI Bias & Fairness","description":"AI Bias occurs when a model systematically produces unfair or prejudiced outputs, often because it was trained on biased historical data (e.g., a hiring model trained on data from a non-diverse workforce). Fairness is the goal of ensuring model outputs don't discriminate against groups based on protected characteristics. Detecting and mitigating bias is a key pillar of AWS Responsible AI.","category":"Generative AI Concepts","url":"https://aws.amazon.com/machine-learning/responsible-machine-learning/","exams":["AIF-C01"],"entryType":"concept","domains":["Guidelines for Responsible AI"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AI Explainability","description":"The ability to understand and explain how an AI model makes its decisions or predictions. Explainability is crucial for building trust, meeting regulatory requirements, and debugging model behavior. Techniques include SHAP values (which show each feature's contribution to a prediction), LIME (Local Interpretable Model-agnostic Explanations), and attention visualization. Amazon SageMaker Clarify provides explainability features for models deployed on AWS.","category":"Responsible AI Concepts","url":"https://aws.amazon.com/machine-learning/responsible-machine-learning/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"AI Governance","description":"The framework of policies, processes, and controls that ensure AI systems are developed and deployed responsibly, ethically, and in compliance with regulations. Includes oversight mechanisms, accountability structures, and risk management practices. | The framework of policies, processes, and controls for managing AI systems throughout their lifecycle — from development to deployment to retirement. Good AI governance ensures models are developed responsibly, deployed safely, monitored continuously, and updated or retired when appropriate. It includes version control, access management, audit trails, and compliance monitoring. AWS provides governance tools through SageMaker Model Registry, Model Cards, and integration with AWS Config and CloudTrail.","category":"Responsible AI Concepts","url":"https://aws.amazon.com/machine-learning/responsible-machine-learning/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"AI Privacy","description":"Protecting sensitive information in AI systems, including ensuring training data doesn't expose personal information, model outputs don't leak private data, and model training processes preserve confidentiality. Techniques include differential privacy (adding mathematical noise to prevent identification of individuals), federated learning (training on decentralized data), and encryption. AWS provides privacy-preserving ML through SageMaker, KMS encryption, and VPC configurations.","category":"Responsible AI Concepts","url":"https://aws.amazon.com/machine-learning/responsible-machine-learning/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"AI Robustness","description":"The ability of an AI model to perform consistently and reliably across different conditions, including edge cases, adversarial inputs, and changing data distributions. A robust model maintains performance even when faced with inputs that differ from training data. Techniques for improving robustness include adversarial training, data augmentation, and comprehensive testing. Amazon Bedrock Guardrails and SageMaker Model Monitor help ensure model robustness in production.","category":"Responsible AI Concepts","url":"https://aws.amazon.com/machine-learning/responsible-machine-learning/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"AI Security Risks","description":"AI systems face unique security risks that traditional applications don't encounter. Understanding these risks is essential for building secure generative AI applications on AWS. Key risks include: 1) Prompt Injection - attackers manipulate user inputs to override system instructions or extract sensitive information. Can be direct (attacker inputs malicious prompt) or indirect (malicious instructions embedded in external data). 2) Jailbreak Attacks - sophisticated techniques that exploit model alignment weaknesses to bypass safety guardrails and content policies entirely. 3) Negative Prompts - attempts to make the model generate harmful content by explicitly asking what NOT to do, exploiting the model's literal interpretation. 4) Cross-Plugin Poisoning - in agentic AI systems, attackers inject commands that abuse trust relationships between components. Mitigation strategies include: using Amazon Bedrock Guardrails for content filtering and prompt attack detection, implementing input validation and sanitization, using the ApplyGuardrail API to evaluate prompts before model invocation, maintaining audit logs, implementing least privilege access, and regularly updating safety mechanisms.","category":"Responsible AI Concepts","url":"https://docs.aws.amazon.com/bedrock/latest/userguide/guardrails-content-filters.html","exams":["AIF-C01"],"entryType":"collection","is_collection":true,"collection_items":[{"name":"Prompt Injection","description":"Attackers manipulate inputs to override system instructions or extract data. Types: Direct (malicious user input) and Indirect (hidden instructions in external data). Mitigation: Use Bedrock Guardrails prompt attack detection, input validation."},{"name":"Jailbreak Attempts","description":"Sophisticated techniques to bypass safety guardrails and content policies entirely. Often uses role-playing, hypothetical scenarios, or encoded instructions. Mitigation: Content filters, denied topics, and prompt attack detection in Guardrails."},{"name":"Negative Prompts","description":"Attempts to generate harmful content by explicitly asking what NOT to do, exploiting literal interpretation. Example: 'Do NOT explain how to make explosives.' Mitigation: Content filters and word filters in Guardrails."},{"name":"Data Exfiltration","description":"Attempts to extract sensitive training data, system prompts, or proprietary information from the model. Mitigation: Sensitive information filters, output filtering, and least privilege access controls."},{"name":"Cross-Plugin Poisoning","description":"In agentic AI systems with multiple tools/plugins, attackers inject commands that abuse trust relationships between components. Mitigation: Strict plugin isolation, permission boundaries, and activity monitoring."},{"name":"Mitigation Best Practices","description":"Use Amazon Bedrock Guardrails for comprehensive protection, implement the ApplyGuardrail API, maintain audit logs with CloudTrail, use least privilege IAM policies, and regularly review and update safety configurations."}],"sources":["aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"AI Transparency","description":"The practice of making AI systems understandable and interpretable to stakeholders, including documenting how models work, what data they were trained on, their limitations, and their intended use cases. Transparency helps users understand when and how to appropriately rely on AI outputs. AWS promotes transparency through model cards, documentation, and tools like SageMaker Clarify that reveal model behavior. It's one of the key pillars of AWS Responsible AI.","category":"Responsible AI Concepts","url":"https://aws.amazon.com/machine-learning/responsible-machine-learning/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"AIF Collection: AI Data Categories","description":"Official AIF-C01 Domain 1 objectives call out the major data categories you should recognize when reasoning about ML use cases. The exam expects you to connect data shape and labeling status to the right modeling approach.","category":"Exam Collections","url":"https://docs.aws.amazon.com/aws-certification/latest/userguide/ai-practitioner-01-domain1.html","exams":["AIF-C01"],"entryType":"collection","domains":["Fundamentals of AI and ML"],"is_collection":true,"collection_items":[{"name":"Labeled Data","description":""},{"name":"Unlabeled Data","description":""},{"name":"Tabular Data","description":"Data organized in rows and columns, similar to a spreadsheet or database table. This structured format is commonly used in traditional machine learning for tasks like regression, classification, and forecasting. Examples include customer records, financial transactions, and inventory data."},{"name":"Time-Series Data","description":"A sequence of data points collected or recorded at successive points in time, typically at uniform intervals. Used for forecasting, anomaly detection, and trend analysis. Examples include stock prices, sensor readings, website traffic, and weather measurements."},{"name":"Image Data","description":""},{"name":"Text Data","description":""},{"name":"Structured Data","description":""},{"name":"Unstructured Data","description":""}],"specialTags":["exam_collection","official_aws_docs"],"sources":["aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AIF Collection: AI/ML Learning Paradigms","description":"Official AIF-C01 Domain 1 objectives explicitly call out the three major learning paradigms you should distinguish on the exam. This collection groups the high-yield learning styles and helps anchor when labels are present, absent, or replaced by reward signals.","category":"Exam Collections","url":"https://docs.aws.amazon.com/aws-certification/latest/userguide/ai-practitioner-01-domain1.html","exams":["AIF-C01"],"entryType":"collection","domains":["Fundamentals of AI and ML"],"is_collection":true,"collection_items":[{"name":"Supervised Learning","description":"A machine learning approach where a model learns from labeled examples that already contain the correct answer. Common exam use cases include classification and regression tasks where you have historical input-output pairs."},{"name":"Unsupervised Learning","description":"A machine learning approach that finds patterns or structure in unlabeled data. Clustering and dimensionality reduction are classic examples, and the key exam clue is that no target label is provided."},{"name":"Reinforcement Learning","description":"A learning approach in which an agent improves by taking actions, receiving rewards or penalties, and optimizing long-term outcomes. The exam usually tests the high-level idea rather than implementation details."}],"specialTags":["exam_collection","official_aws_docs"],"sources":["aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AIF Collection: AWS Responsible AI Dimensions","description":"AWS defines responsible AI through a core set of seven dimensions used across its official AI guidance. This collection complements the exam guide by grouping the broader AWS framing that often shows up in explanations and service documentation.","category":"Exam Collections","url":"https://docs.aws.amazon.com/wellarchitected/latest/generative-ai-lens/responsible-ai.html","exams":["AIF-C01"],"entryType":"collection","domains":["Guidelines for Responsible AI","Security, Compliance, and Governance for AI Solutions"],"is_collection":true,"collection_items":[{"name":"Fairness","description":""},{"name":"Explainability","description":"The ability to understand and articulate how an AI model reaches its decisions or outputs. Explainable AI (XAI) techniques help users interpret model behavior, debug issues, and build trust by making AI reasoning more transparent."},{"name":"Privacy and Security","description":""},{"name":"Safety","description":"A principle ensuring AI systems do not cause harm to humans, property, or the environment. Includes preventing harmful outputs, ensuring physical safety in AI-controlled systems, and maintaining appropriate safeguards against misuse."},{"name":"Controllability","description":""},{"name":"Veracity and Robustness","description":""},{"name":"Governance","description":""}],"specialTags":["exam_collection","official_aws_docs"],"sources":["aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AIF Collection: Bias Analysis Stages","description":"SageMaker Clarify documentation distinguishes bias checks done before training, after training, and later in production drift monitoring. This collection is useful because exam questions may ask where in the lifecycle a given fairness check belongs.","category":"Exam Collections","url":"https://docs.aws.amazon.com/sagemaker/latest/dg/clarify-configure-processing-jobs.html","exams":["AIF-C01"],"entryType":"collection","domains":["Guidelines for Responsible AI","Security, Compliance, and Governance for AI Solutions"],"is_collection":true,"collection_items":[{"name":"Pre-Training Bias Analysis","description":""},{"name":"Post-Training Bias Analysis","description":""},{"name":"Bias Drift Monitoring","description":""}],"specialTags":["exam_collection","official_aws_docs"],"sources":["aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AIF Collection: FM Customization Approaches","description":"Official AIF-C01 Domain 3 objectives explicitly call out the main customization approaches whose tradeoffs you should understand. This collection helps separate no-training options from heavier-weight adaptation strategies.","category":"Exam Collections","url":"https://docs.aws.amazon.com/aws-certification/latest/ai-practitioner-01/ai-practitioner-01-domain3.html","exams":["AIF-C01"],"entryType":"collection","domains":["Applications of Foundation Models"],"is_collection":true,"collection_items":[{"name":"Pre-Training","description":"The initial phase of training a foundation model on large amounts of unlabeled data to learn general patterns, language structures, and world knowledge. This creates a base model that can be fine-tuned for specific tasks or domains."},{"name":"Fine-Tuning","description":"The process of further training a pre-existing Foundation Model on a smaller, task-specific dataset to specialize its behavior. Think of it like a general doctor (the base FM) completing a medical residency to become a specialist (the fine-tuned model). Fine-tuning is more expensive and data-inte..."},{"name":"In-Context Learning","description":"The ability of large language models to learn and adapt to new tasks from examples provided within the prompt itself, without requiring parameter updates or fine-tuning. This includes zero-shot, few-shot, and many-shot learning approaches."},{"name":"Retrieval-Augmented Generation (RAG)","description":"A technique that enhances an AI model's answers by first retrieving relevant information from an external knowledge source (like a company's internal documents or a database), then feeding that retrieved context to the LLM alongside the user's question. RAG prevents hallucination and keeps respon..."}],"specialTags":["exam_collection","official_aws_docs"],"sources":["aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AIF Collection: FM Selection Criteria","description":"Official AIF-C01 Domain 3 objectives give a concrete list of factors for choosing a pre-trained model. This collection is handy because exam questions often disguise these as architecture tradeoffs rather than saying 'selection criteria' out loud.","category":"Exam Collections","url":"https://docs.aws.amazon.com/aws-certification/latest/ai-practitioner-01/ai-practitioner-01-domain3.html","exams":["AIF-C01"],"entryType":"collection","domains":["Applications of Foundation Models"],"is_collection":true,"collection_items":[{"name":"Cost","description":""},{"name":"Modality","description":""},{"name":"Latency","description":""},{"name":"Multi-lingual Support","description":""},{"name":"Model Size","description":""},{"name":"Model Complexity","description":""},{"name":"Customization","description":""},{"name":"Input/Output Length","description":""},{"name":"Prompt Caching","description":""}],"specialTags":["exam_collection","official_aws_docs"],"sources":["aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AIF Collection: Inference Modes","description":"Official AIF-C01 Domain 1 objectives explicitly mention different inferencing types, especially batch and real-time. This collection helps separate offline bulk scoring from low-latency online predictions.","category":"Exam Collections","url":"https://docs.aws.amazon.com/aws-certification/latest/userguide/ai-practitioner-01-domain1.html","exams":["AIF-C01"],"entryType":"collection","domains":["Fundamentals of AI and ML"],"is_collection":true,"collection_items":[{"name":"Batch Inference","description":"A prediction pattern where you process many records together on a schedule or as a job instead of responding immediately per request. It is a better fit for offline scoring, nightly processing, and cost-efficient bulk workloads."},{"name":"Real-Time Inference","description":"A prediction pattern where the model returns results quickly for each request, usually through an online endpoint or API. This is the right fit for low-latency user-facing applications such as chat, fraud checks, or recommendations."}],"specialTags":["exam_collection","official_aws_docs"],"sources":["aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AIF Collection: ML Lifecycle Phases","description":"AWS documentation describes the machine learning lifecycle as a cyclic process with six phases. This collection is useful because AIF-C01 repeatedly tests the big-picture flow of getting from business need to monitored production model.","category":"Exam Collections","url":"https://docs.aws.amazon.com/wellarchitected/latest/machine-learning-lens/machine-learning-lifecycle.html","exams":["AIF-C01"],"entryType":"collection","domains":["Fundamentals of AI and ML"],"is_collection":true,"collection_items":[{"name":"Business Goal Identification","description":""},{"name":"ML Problem Framing","description":""},{"name":"Data Processing","description":""},{"name":"Model Development","description":""},{"name":"Model Deployment","description":"The process of making a trained machine learning model available for use in production environments. This involves packaging the model, creating endpoints or APIs for inference, and setting up the necessary infrastructure to serve predictions to applications or users."},{"name":"Model Monitoring","description":"The ongoing process of tracking a deployed machine learning model's performance and behavior in production. Includes detecting data drift (changes in input data distribution), concept drift (changes in the relationship between inputs and outputs), and model degradation over time."}],"specialTags":["exam_collection","official_aws_docs"],"sources":["aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AIF Collection: ML Technique Families","description":"Official AIF-C01 Domain 1 objectives explicitly name regression, classification, and clustering as the core technique families to match to business problems. This collection is a fast way to review the canonical trio.","category":"Exam Collections","url":"https://docs.aws.amazon.com/aws-certification/latest/userguide/ai-practitioner-01-domain1.html","exams":["AIF-C01"],"entryType":"collection","domains":["Fundamentals of AI and ML"],"is_collection":true,"collection_items":[{"name":"Regression","description":"A supervised learning technique used to predict a continuous numeric value, such as revenue, temperature, or demand. If the answer is a number on a spectrum, regression is the usual clue."},{"name":"Classification","description":"A supervised learning technique used to predict a discrete label or category, such as spam/not spam or approve/deny. If the answer belongs to a bucket or class, classification is usually the right framing."},{"name":"Clustering","description":"An unsupervised learning technique that groups similar records together without preexisting labels. The exam often uses clustering to contrast with classification when no target classes are known in advance."}],"specialTags":["exam_collection","official_aws_docs"],"sources":["aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AIF Collection: Post-Training Bias Metrics","description":"SageMaker Clarify provides a larger post-training metric set for evaluating bias using model predictions and labels. This collection is especially useful for study mode because the metric acronyms are easy to mix up when learned one-by-one.","category":"Exam Collections","url":"https://docs.aws.amazon.com/sagemaker/latest/dg/clarify-measure-post-training-bias.html","exams":["AIF-C01"],"entryType":"collection","domains":["Guidelines for Responsible AI"],"is_collection":true,"collection_items":[{"name":"Difference in Positive Proportions in Predicted Labels (DPPL)","description":""},{"name":"Disparate Impact (DI)","description":""},{"name":"Difference in Conditional Acceptance (DCAcc)","description":""},{"name":"Difference in Conditional Rejection (DCR)","description":""},{"name":"Specificity Difference (SD)","description":""},{"name":"Recall Difference (RD)","description":""},{"name":"Difference in Acceptance Rates (DAR)","description":""},{"name":"Difference in Rejection Rates (DRR)","description":""},{"name":"Accuracy Difference (AD)","description":""},{"name":"Treatment Equality (TE)","description":""},{"name":"Conditional Demographic Disparity in Predicted Labels (CDDPL)","description":""},{"name":"Counterfactual Fliptest (FT)","description":""},{"name":"Generalized Entropy (GE)","description":""}],"specialTags":["exam_collection","official_aws_docs"],"sources":["aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AIF Collection: Pre-Training Bias Metrics","description":"SageMaker Clarify groups several metrics for quantifying bias in raw training data before model training. This collection is a strong glossary add because it keeps the acronyms together instead of making you memorize them as disconnected fragments.","category":"Exam Collections","url":"https://docs.aws.amazon.com/sagemaker/latest/dg/clarify-measure-data-bias.html","exams":["AIF-C01"],"entryType":"collection","domains":["Guidelines for Responsible AI"],"is_collection":true,"collection_items":[{"name":"Class Imbalance (CI)","description":""},{"name":"Difference in Proportions of Labels (DPL)","description":""},{"name":"Kullback-Leibler Divergence (KL)","description":""},{"name":"Jensen-Shannon Divergence (JS)","description":""},{"name":"Lp-norm (LP)","description":""},{"name":"Total Variation Distance (TVD)","description":""},{"name":"Kolmogorov-Smirnov (KS)","description":""},{"name":"Conditional Demographic Disparity (CDD)","description":""}],"specialTags":["exam_collection","official_aws_docs"],"sources":["aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AIF Collection: Prompt Attack Types","description":"Amazon Bedrock Guardrails documentation explicitly names the main prompt attack categories it can detect. This collection is high-yield for AIF-C01 security questions because it turns vague 'prompt attack' language into concrete threat types.","category":"Exam Collections","url":"https://docs.aws.amazon.com/bedrock/latest/userguide/guardrails-prompt-attack.html","exams":["AIF-C01"],"entryType":"collection","domains":["Security, Compliance, and Governance for AI Solutions"],"is_collection":true,"collection_items":[{"name":"Jailbreaks","description":""},{"name":"Prompt Injection","description":"A security risk where untrusted input manipulates a model or agent into ignoring instructions, leaking data, or taking unintended actions. It is one of the key AI-specific threats called out in the official exam objectives."},{"name":"Prompt Leakage","description":""}],"specialTags":["exam_collection","official_aws_docs"],"sources":["aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AIF Collection: Prompt Components","description":"Amazon Bedrock prompt engineering guidance breaks a prompt into several reusable components. This collection is helpful for AIF-C01 because the exam covers prompt-engineering constructs, not just vocabulary words in isolation.","category":"Exam Collections","url":"https://docs.aws.amazon.com/bedrock/latest/userguide/prompt-engineering-guidelines.html","exams":["AIF-C01"],"entryType":"collection","domains":["Applications of Foundation Models"],"is_collection":true,"collection_items":[{"name":"Task or Instruction","description":""},{"name":"Context","description":""},{"name":"Demonstration Examples","description":""},{"name":"Input Text","description":""}],"specialTags":["exam_collection","official_aws_docs"],"sources":["aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AIF Collection: Prompting Styles","description":"AWS Bedrock documentation explicitly contrasts zero-shot and few-shot prompting. This collection captures the most exam-friendly prompting styles you should be able to recognize and compare quickly.","category":"Exam Collections","url":"https://docs.aws.amazon.com/bedrock/latest/userguide/prompt-engineering-guidelines.html","exams":["AIF-C01"],"entryType":"collection","domains":["Applications of Foundation Models"],"is_collection":true,"collection_items":[{"name":"Zero-Shot Prompting","description":"A prompting style where the model is asked to perform a task without any worked examples in the prompt. It is fast and simple, but may be less reliable than few-shot approaches for tricky tasks."},{"name":"Few-Shot Prompting","description":"A prompting style where the prompt includes a small number of examples to steer the model toward the desired output pattern. It often improves consistency when task formatting or style matters."}],"specialTags":["exam_collection","official_aws_docs"],"sources":["aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AIF Collection: RAG Workflow Steps","description":"AWS Prescriptive Guidance describes RAG as a four-step process. This collection helps tie together embeddings, vector search, retrieval, and grounded generation into one exam-friendly mental model.","category":"Exam Collections","url":"https://docs.aws.amazon.com/prescriptive-guidance/latest/retrieval-augmented-generation-options/what-is-rag.html","exams":["AIF-C01"],"entryType":"collection","domains":["Applications of Foundation Models"],"is_collection":true,"collection_items":[{"name":"Create embeddings and ingest documents into a vector database","description":""},{"name":"Convert the user prompt into embeddings","description":""},{"name":"Search the vector database for the most relevant content","description":""},{"name":"Augment the prompt with retrieved context and generate a response","description":""}],"specialTags":["exam_collection","official_aws_docs"],"sources":["aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"AIF Collection: Responsible AI Features","description":"The official AIF-C01 Domain 4 objectives explicitly tell you to identify the major features of responsible AI. These are the exam-facing terms you should be able to recognize even if AWS uses a richer responsible-AI framework elsewhere.","category":"Exam Collections","url":"https://docs.aws.amazon.com/aws-certification/latest/userguide/ai-practitioner-01-domain4.html","exams":["AIF-C01"],"entryType":"collection","domains":["Guidelines for Responsible AI"],"is_collection":true,"collection_items":[{"name":"Bias","description":""},{"name":"Fairness","description":""},{"name":"Inclusivity","description":"A principle of responsible AI ensuring that AI systems are designed to serve diverse populations and do not exclude or disadvantage particular groups. This includes considering accessibility, language support, and cultural sensitivity in AI applications."},{"name":"Robustness","description":"The ability of an AI system to perform reliably under varying conditions, including unexpected inputs, adversarial attacks, and distribution shifts. Robust AI systems maintain performance and safety even when faced with edge cases or malicious attempts to manipulate outputs."},{"name":"Safety","description":"A principle ensuring AI systems do not cause harm to humans, property, or the environment. Includes preventing harmful outputs, ensuring physical safety in AI-controlled systems, and maintaining appropriate safeguards against misuse."},{"name":"Veracity","description":"The accuracy and truthfulness of AI system outputs. Ensuring veracity involves grounding responses in factual information, avoiding hallucinations, and providing accurate citations or sources where appropriate."}],"specialTags":["exam_collection","official_aws_docs"],"sources":["aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Alexa for Business","description":"A service that enables organizations and employees to use Alexa to get more work done. Employees can use Alexa as their intelligent assistant to be more productive in meeting rooms, at their desks, and even with the Alexa devices they already have at home.","category":"Business Applications","url":"https://aws.amazon.com/alexaforbusiness/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Algorithm","description":"A step-by-step set of instructions or rules that a computer follows to solve a problem or perform a computation. In machine learning, algorithms are used to identify patterns in data and make predictions or decisions without being explicitly programmed for each specific task.","category":"AI/ML Fundamentals","url":"https://docs.aws.amazon.com/machine-learning/latest/dg/ml-concepts.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"Algorithmic Fairness","description":"The principle that AI systems should treat individuals and groups equitably, without discrimination based on protected characteristics like race, gender, age, or religion. Measuring fairness involves checking whether model outcomes differ across demographic groups and whether those differences are justified. Amazon SageMaker Clarify provides fairness metrics and bias detection to help ensure your models treat all groups fairly.","category":"Responsible AI Concepts","url":"https://aws.amazon.com/machine-learning/responsible-machine-learning/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon API Gateway","description":"A fully managed service that makes it easy for developers to create, publish, maintain, monitor, and secure APIs at any scale. It acts as a 'front door' for applications to access data, business logic, or functionality from your back-end services. | A fully managed service that makes it easy for developers to create, publish, maintain, monitor, and secure APIs at any scale. Supports REST APIs, WebSocket APIs, and HTTP APIs. Features include: traffic management, authorization and access control (IAM, Cognito, Lambda authorizers), monitoring (CloudWatch), and API version management. Integrates with Lambda, EC2, ECS, and on-premises HTTP endpoints. Caching, throttling, and request/response transformation capabilities. Pay only for API calls and data transfer.","category":"Networking & Content Delivery","url":"https://aws.amazon.com/api-gateway/","exams":["CLF-C02","SAA-C03"],"entryType":"service","domains":["Design Resilient Architectures","Design High-Performing Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon AppFlow","description":"A fully managed integration service that enables you to securely transfer data between Software-as-a-Service (SaaS) applications like Salesforce, Zendesk, and Slack, and AWS services like Amazon S3 and Amazon Redshift. | A fully managed integration service that enables you to securely transfer data between SaaS applications (Salesforce, SAP, Zendesk, Slack, ServiceNow) and AWS services like S3 and Redshift. Supports scheduled, event-driven, or on-demand data transfers with built-in data transformation (filtering, mapping, validation). Data is encrypted in transit and at rest. No code required — configure flows through the console.","category":"Application Integration","url":"https://aws.amazon.com/appflow/","exams":["CLF-C02","SAA-C03"],"entryType":"service","domains":["Design Resilient Architectures","Design High-Performing Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon AppStream 2.0","description":"A fully managed application streaming service. You centrally manage your desktop applications on AppStream 2.0 and securely deliver them to any computer, allowing you to scale to any number of users globally.","category":"End User Computing","url":"https://aws.amazon.com/appstream2/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Athena","description":"An interactive query service that makes it easy to analyze data in Amazon S3 using standard SQL. Athena is serverless, so there is no infrastructure to manage, and you pay only for the queries that you run. | A serverless interactive query service that makes it easy to analyze data directly in Amazon S3 using standard SQL. Unlike traditional databases, Athena requires no infrastructure to set up or manage — you simply point it at your data in S3 and start querying. Pay only for the queries you run. Integrates with AWS Glue Data Catalog for automatic schema discovery. Ideal for ad-hoc analysis, log analysis, and querying data lakes without ETL.","category":"Analytics","url":"https://aws.amazon.com/athena/","exams":["CLF-C02","SAA-C03"],"entryType":"service","domains":["Design Resilient Architectures","Design High-Performing Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Athena for ML Data Exploration","description":"Amazon Athena is a serverless query service that makes it easy to analyze data in S3 using standard SQL. For ML workloads, data scientists use Athena to explore training datasets, understand data distributions, identify quality issues, and create feature aggregations before model training. Athena integrates with the Glue Data Catalog and can output query results directly to S3 for use in SageMaker training jobs.","category":"Analytics","url":"https://aws.amazon.com/athena/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon Augmented AI","description":"A machine learning service which makes it easy to build the workflows required for human review of ML predictions, removing the undifferentiated heavy lifting associated with building human review systems.","category":"Machine Learning","url":"https://aws.amazon.com/augmented-ai/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Augmented AI (Amazon A2I)","description":"A machine learning service which makes it easy to build the workflows required for human review of ML predictions, removing the undifferentiated heavy lifting associated with building human review systems.","category":"Machine Learning","url":"https://aws.amazon.com/augmented-ai/","exams":["AIF-C01"],"entryType":"service","domains":["Guidelines for Responsible AI","Security, Compliance, and Governance for AI Solutions"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Aurora","description":"A MySQL and PostgreSQL-compatible relational database built for the cloud, that combines the performance and availability of traditional enterprise databases with the simplicity and cost-effectiveness of open source databases. | A MySQL and PostgreSQL-compatible relational database built for the cloud that combines the performance and availability of commercial databases with the simplicity and cost-effectiveness of open-source databases. Aurora is up to 5x faster than standard MySQL and 3x faster than PostgreSQL. Features: storage auto-scaling up to 128TB, 6-way replication across 3 AZs (handles loss of up to 2 copies without affecting writes), continuous backup to S3, and Aurora Serverless option for on-demand scaling.","category":"Database","url":"https://aws.amazon.com/rds/aurora/","exams":["CLF-C02","SAA-C03"],"entryType":"service","domains":["Design Resilient Architectures","Design High-Performing Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Aurora PostgreSQL (pgvector)","description":"Amazon Aurora PostgreSQL with the pgvector extension enables storage and efficient search of vector embeddings directly in the database. This allows combining traditional SQL queries with vector similarity search for RAG applications.","category":"Database","url":"https://docs.aws.amazon.com/AmazonRDS/latest/AuroraUserGuide/AuroraPostgreSQL.VectorDB.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json"]},{"name":"Amazon Aurora PostgreSQL with pgvector","description":"Amazon Aurora PostgreSQL supports the pgvector extension, which adds vector similarity search capabilities to the database. You can store embeddings as vector data types and perform nearest-neighbor searches using L2 distance, inner product, or cosine similarity. This allows you to combine relational data queries with semantic vector search in a single database, simplifying RAG architectures by eliminating the need for a separate vector database.","category":"Database","url":"https://aws.amazon.com/rds/aurora/features/pgvector/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon Aurora Serverless","description":"An on-demand, auto-scaling deployment option for Amazon Aurora that adjusts database capacity based on load. On SAA-C03, it is a go-to choice for variable or unpredictable relational workloads where you want Aurora features with more elastic scaling.","category":"Database","url":"https://aws.amazon.com/rds/aurora/serverless/","exams":["SAA-C03"],"entryType":"service","domains":["Design Resilient Architectures","Design High-Performing Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Bedrock","description":"A fully managed service that makes foundational models (FMs) from Amazon and leading AI companies available through an API, allowing you to build and scale generative AI applications.","category":"Machine Learning","url":"https://aws.amazon.com/bedrock/","exams":["AIF-C01","CLF-C02"],"entryType":"service","domains":["Fundamentals of Generative AI","Applications of Foundation Models"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Bedrock Agents","description":"A feature of Amazon Bedrock that enables Foundation Models to perform multi-step, autonomous tasks by orchestrating calls to external APIs, AWS services, and Knowledge Bases. An Agent can 'think,' 'plan,' and take actions — like looking up a customer record, checking inventory, and drafting an email — all in a single conversation flow. Built on the ReAct (Reason + Act) pattern.","category":"Machine Learning","url":"https://aws.amazon.com/bedrock/agents/","exams":["AIF-C01"],"entryType":"service","domains":["Fundamentals of Generative AI","Applications of Foundation Models"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Bedrock Converse API","description":"A simplified API for building conversational applications with Foundation Models on Amazon Bedrock. It provides a consistent interface across different model providers, handling message formatting, conversation history management, and tool use (function calling). The Converse API makes it easier to build chatbots and assistants without dealing with provider-specific request/response formats. It supports multi-turn conversations and system prompts.","category":"Machine Learning","url":"https://docs.aws.amazon.com/bedrock/latest/userguide/conversation-inference.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon Bedrock Cross-Region Inference","description":"A feature that allows you to route inference requests to multiple AWS Regions automatically for improved availability and performance. If one region experiences high latency or is unavailable, requests are automatically routed to another region. This provides higher availability for production applications using Foundation Models. You can configure which regions to use and set routing priorities based on your requirements.","category":"Machine Learning","url":"https://aws.amazon.com/bedrock/features/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon Bedrock Custom Models","description":"A feature of Amazon Bedrock that allows you to fine-tune Foundation Models on your own proprietary data to create customized models specialized for your specific use case, industry, or company. Custom models maintain the base model's general capabilities while adding knowledge of your domain. You can also import custom models you've trained elsewhere. Custom models remain private to your AWS account and are not shared with AWS or the model provider.","category":"Machine Learning","url":"https://aws.amazon.com/bedrock/custom-models/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon Bedrock Guardrails","description":"A feature of Amazon Bedrock that lets you implement safeguards for generative AI applications. You can configure content filters to block harmful topics, add denied topics (e.g., 'never discuss competitor products'), mask sensitive PII (like credit card numbers), and add grounding checks to reduce hallucinations. It's the 'safety net' you wrap around your AI application.","category":"Machine Learning","url":"https://aws.amazon.com/bedrock/guardrails/","exams":["AIF-C01"],"entryType":"service","domains":["Guidelines for Responsible AI","Security, Compliance, and Governance for AI Solutions","Fundamentals of Generative AI","Applications of Foundation Models"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Bedrock Guardrails Features","description":"Amazon Bedrock Guardrails provides configurable safeguards to help build safe generative AI applications. Guardrails evaluate both input prompts and model responses, ensuring unsafe content is blocked before reaching users. Guardrails work across multiple foundation models and provide consistent safety controls. Key features include: 1) Content Filters - detect and filter harmful content (Hate, Insults, Sexual, Violence, Misconduct) and prompt attacks (jailbreak attempts). Configurable filter strengths for each category. 2) Denied Topics - define custom topics that are out of scope for your application (e.g., financial advice, medical advice). 3) Word Filters - block specific words, phrases, or profanity using exact match. 4) Sensitive Information Filters - detect and mask PII (SSN, addresses, dates of birth) using probabilistic detection or custom regex patterns. 5) Contextual Grounding - detect hallucinations by checking if responses are factually grounded in source documents and relevant to the query. 6) Automated Reasoning - validate model responses against logical rules to detect unstated assumptions and suggest corrections.","category":"Generative AI Concepts","url":"https://docs.aws.amazon.com/bedrock/latest/userguide/guardrails.html","exams":["AIF-C01"],"entryType":"collection","is_collection":true,"collection_items":[{"name":"Content Filters","description":"Detect and filter harmful content categories: Hate, Insults, Sexual, Violence, Misconduct. Also detects Prompt Attacks (jailbreak attempts). Configurable filter strengths (permissive to strict) for each category."},{"name":"Denied Topics","description":"Define custom topics that are out of scope for your application. If detected in user queries or model responses, the request can be blocked or replaced with a safe fallback message."},{"name":"Word Filters","description":"Block specific words or phrases using exact match. Useful for blocking profanity (built-in option), competitor names, or brand misuse."},{"name":"Sensitive Information Filters","description":"Detect and mask PII using probabilistic detection (SSN, DOB, addresses) or custom regex patterns. Can block or mask sensitive information in both prompts and responses."},{"name":"Contextual Grounding","description":"Detect hallucinations by checking if responses are factually grounded in source documents and relevant to the user query. Uses Grounding Threshold and Relevance Threshold settings."},{"name":"Automated Reasoning Checks","description":"Validate model responses against logical rules to detect hallucinations, suggest corrections, and highlight unstated assumptions. Uses formal verification techniques."}],"sources":["aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon Bedrock InvokeModel API","description":"The primary API for generating text, images, or embeddings using Foundation Models on Amazon Bedrock. You specify the model ID, provide your prompt or input, set inference parameters (temperature, max tokens), and receive the model's output. The API supports streaming responses for real-time applications and can be called from AWS SDKs, CLI, or HTTP. InvokeModel is the foundation for building generative AI applications on Bedrock.","category":"Machine Learning","url":"https://docs.aws.amazon.com/bedrock/latest/userguide/api-methods-run.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon Bedrock Knowledge Bases","description":"A fully managed RAG (Retrieval-Augmented Generation) feature within Amazon Bedrock. You connect it to your data sources (S3, Confluence, SharePoint), it automatically chunks the documents, creates embeddings, and stores them in a vector store. When a user asks a question, it retrieves the relevant chunks and passes them to the FM as context, grounding the response in your actual data.","category":"Machine Learning","url":"https://aws.amazon.com/bedrock/knowledge-bases/","exams":["AIF-C01"],"entryType":"service","domains":["Fundamentals of Generative AI","Applications of Foundation Models"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Bedrock Model Evaluation","description":"A feature of Amazon Bedrock that lets you evaluate and compare the performance of Foundation Models using your own datasets and tasks, before choosing which model to use in production. You can use automatic evaluation metrics (accuracy, robustness) or set up human evaluation workflows. This helps you make data-driven decisions about which FM best fits your use case and budget.","category":"Machine Learning","url":"https://aws.amazon.com/bedrock/model-evaluation/","exams":["AIF-C01"],"entryType":"service","domains":["Fundamentals of Generative AI","Applications of Foundation Models"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Bedrock Model IDs","description":"Unique identifiers used to specify which Foundation Model to use when making API calls to Amazon Bedrock. Each model provider (Amazon, Anthropic, Meta, etc.) has their own model IDs (e.g., 'amazon.titan-text-express-v1', 'anthropic.claude-3-sonnet-20240229-v1:0'). Model IDs include version information, allowing you to pin to specific versions for reproducibility or use aliases for automatic updates. You must have access to a model in your account before you can use its model ID.","category":"Machine Learning","url":"https://docs.aws.amazon.com/bedrock/latest/userguide/model-ids.html","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon Bedrock Playground","description":"An interactive console environment in Amazon Bedrock where you can experiment with different Foundation Models, test prompts, adjust inference parameters (temperature, Top-p), and compare model outputs side-by-side. It's a sandbox for prototyping and learning — you can try different models and prompt engineering techniques without writing code or deploying infrastructure. A great starting point for exploring generative AI capabilities.","category":"Machine Learning","url":"https://aws.amazon.com/bedrock/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon Bedrock Prompt Flows","description":"A visual builder in Amazon Bedrock that allows you to create and manage complex generative AI workflows by linking prompts, Foundation Models, Knowledge Bases, and AWS services together. You can design multi-step applications with conditional logic, error handling, and data transformations using a drag-and-drop interface. Prompt Flows makes it easier to build production-ready AI applications without writing extensive code.","category":"Machine Learning","url":"https://aws.amazon.com/bedrock/prompt-flows/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon Bedrock Provisioned Throughput","description":"A pricing option that provides guaranteed throughput (measured in tokens per minute) for Foundation Model inference. You commit to a specific throughput level and pay a predictable hourly rate regardless of actual usage. This is ideal for production workloads with consistent, predictable traffic where you need guaranteed performance and want to optimize costs compared to on-demand pricing. Available for select models on Amazon Bedrock.","category":"Machine Learning","url":"https://aws.amazon.com/bedrock/pricing/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon Bedrock Serverless","description":"Amazon Bedrock is a fully serverless service — you don't need to provision or manage any infrastructure. You simply choose a Foundation Model and start making API calls. AWS handles scaling, availability, and security. You pay only for the tokens processed (input and output), with no minimum fees or upfront commitments. This serverless model makes it easy to experiment with different FMs and scale production applications without infrastructure management.","category":"Machine Learning","url":"https://aws.amazon.com/bedrock/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon Braket","description":"A fully managed quantum computing service that helps researchers and developers get started with the technology to accelerate research and discovery. It provides an environment to explore, build, and test quantum algorithms.","category":"Quantum Technologies","url":"https://aws.amazon.com/braket/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Chime","description":"A communications service that transforms online meetings with a secure, easy-to-use application that you can trust for online meetings, video conferencing, calls, chat, and content sharing.","category":"Business Applications","url":"https://aws.amazon.com/chime/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Chime SDK","description":"Allows builders to easily add real-time voice, video, and messaging powered by machine learning into their own applications.","category":"Business Applications","url":"https://aws.amazon.com/chime/chime-sdk/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon CloudFront","description":"A fast content delivery network (CDN) service that securely delivers data, videos, applications, and APIs to customers globally with low latency and high transfer speeds. CloudFront integrates with AWS services: S3 (static content), EC2/ALB (dynamic content), and Lambda@Edge (compute at edge locations). Features include: edge caching, origin shield (reduce origin load), signed URLs/cookies (restrict access), field-level encryption, and AWS WAF integration for security.","category":"Networking & Content Delivery","url":"https://aws.amazon.com/cloudfront/","exams":["AIF-C01","CLF-C02","SAA-C03"],"entryType":"service","domains":["Fundamentals of Generative AI","Applications of Foundation Models","Security, Compliance, and Governance for AI Solutions","Design Secure Architectures","Design Resilient Architectures","Design High-Performing Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon CloudFront for ML Applications","description":"Amazon CloudFront can be used to distribute ML-powered applications globally with low latency. It caches static assets and API responses at edge locations, improving the user experience for AI applications. CloudFront integrates with AWS WAF to protect ML inference endpoints from DDoS attacks and malicious requests. It can also be used to cache ML model predictions for frequently requested content, reducing inference costs.","category":"Networking & Content Delivery","url":"https://aws.amazon.com/cloudfront/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon CloudSearch","description":"A managed service in the AWS Cloud that makes it simple and cost-effective to set up, manage, and scale a search solution for your website or application.","category":"Analytics","url":"https://aws.amazon.com/cloudsearch/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon CloudWatch","description":"A monitoring and observability service built for DevOps engineers, developers, site reliability engineers (SREs), and IT managers to collect and track metrics, collect and monitor log files, and set alarms. | A monitoring and observability service that provides data and actionable insights for AWS, hybrid, and on-premises applications and infrastructure resources. CloudWatch collects monitoring and operational data in the form of logs, metrics, and events. Key features: Metrics (CPU, memory, custom business metrics), Alarms (trigger notifications or auto-scaling), Logs (centralized log aggregation), Dashboards (visualization), and Insights (log analysis with query language). The foundation of AWS monitoring.","category":"Management & Governance","url":"https://aws.amazon.com/cloudwatch/","exams":["AIF-C01","CLF-C02","SAA-C03"],"entryType":"service","domains":["Security, Compliance, and Governance for AI Solutions","Design Secure Architectures","Design Resilient Architectures","Design Cost-Optimized Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon CloudWatch for ML Monitoring","description":"Amazon CloudWatch provides monitoring and observability for machine learning workloads on AWS. It collects metrics from SageMaker endpoints, training jobs, and Bedrock invocations. You can set alarms for model latency, error rates, and resource utilization. CloudWatch Logs captures inference logs for debugging and auditing. CloudWatch Dashboards provide visualization of ML application health and performance in production.","category":"Management & Governance","url":"https://aws.amazon.com/cloudwatch/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon CodeCatalyst","description":"An integrated service for software development teams adopting CI/CD practices. It provides tools to plan work, collaborate on code, and build, test, and deploy applications.","category":"Developer Tools","url":"https://aws.amazon.com/codecatalyst/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon CodeGuru","description":"A developer tool that provides intelligent recommendations to improve code quality and identify an application's most expensive lines of code, automating code reviews and monitoring application performance.","category":"Machine Learning","url":"https://aws.amazon.com/codeguru/","exams":["CLF-C02"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon CodeGuru Profiler","description":"An ML-powered service that helps find the most expensive lines of code in your applications and provides recommendations to fix performance issues. It continuously profiles application runtime behavior, identifies code paths that consume the most CPU or memory, and suggests optimizations. Helps reduce infrastructure costs by improving application efficiency.","category":"Machine Learning","url":"https://aws.amazon.com/codeguru/profiler/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon CodeGuru Reviewer","description":"An ML-powered service that provides automated code reviews to improve code quality and identify critical issues, security vulnerabilities, and performance bottlenecks. It analyzes code against AWS best practices and learns from millions of code reviews at Amazon. Integrates with GitHub, GitHub Enterprise, Bitbucket, and AWS CodeCommit to provide feedback directly in pull requests.","category":"Machine Learning","url":"https://aws.amazon.com/codeguru/","exams":["AIF-C01"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_with_collections[kimi-agsw].json"]},{"name":"Amazon Cognito","description":"Lets you add user sign-up, sign-in, and access control to your web and mobile apps quickly and easily, supporting sign-in with social identity providers and enterprise identity providers. | A service that lets you add user sign-up, sign-in, and access control to your web and mobile apps quickly and easily. Cognito scales to millions of users and supports sign-in with social identity providers (Google, Facebook, Amazon, Apple) and enterprise identity providers via SAML 2.0. Two main components: User Pools (user directory with sign-up/sign-in) and Identity Pools (temporary AWS credentials for accessing AWS services). Supports MFA and advanced security features.","category":"Security, Identity, & Compliance","url":"https://aws.amazon.com/cognito/","exams":["CLF-C02","SAA-C03"],"entryType":"service","domains":["Design Secure Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_glossary_enhanced_aif_saa[glm5-agent].json","aws_glossary_enhanced_with_collections[kimi-agsw].json","aws_glossary_full[sonnet46].json","aws_glossary_full_enhanced_aif_saa[gpt5].json","aws_glossary_full_enhanced_aif_saa_collections[gpt5].json"]},{"name":"Amazon Comprehend","description":"Uses machine learning and natural language processing (NLP) to help you uncover the insights and relationships in your unstructured data. It can identify key phrases, entities, sentiment, and more. | A natural language processing (NLP) service that uses machine learning to find insights and relationships in text. Comprehend can identify: entities (people, places, organizations), key phrases, language, sentiment (positive, negative, neutral, mixed), and syntax. Custom Comprehend allows training custom models for entity recognition and document classification. Use cases: customer support ticket analysis, social media monitoring, content recommendation, and document processing.","category":"Machine Learning","url":"https://aws.amazon.com/comprehend/","exams":["AIF-C01","CLF-C02","SAA-C03"],"entryType":"service","domains":["Fundamentals of AI and ML","Applications of Foundation Models","Design Resilient Architectures","Design High-Performing Architectures"],"sources":["aws_glossary_enhanced[kimi-agsw].json","aws_
