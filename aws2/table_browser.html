eded. It is more powerful than simple prompting but the examples are forgotten after each conversation.","Retrieval Augmented Generation (RAG)":"RAG connects the FM to an external knowledge base (documents, databases) at inference time. When a user asks a question, the system RETRIEVES relevant chunks of your private documents and AUGMENTS the prompt with that context before generating an answer. This is the standard solution for giving FMs access to private or up-to-date information.","Fine-Tuning":"Fine-tuning retrains the FM on your own dataset to adapt its behavior, style, or domain knowledge permanently. It is the most expensive and complex approach but produces a model that has internalized domain knowledge rather than just referencing it."},"rows":[{"feature":"How It Works","values":{"Prompt Engineering":"Write better instructions and structure for the FM","In-Context Learning (Few-Shot)":"Include examples in the prompt at inference time","Retrieval Augmented Generation (RAG)":"Retrieve relevant docs and inject into prompt at runtime","Fine-Tuning":"Retrain model weights on new training data"}},{"feature":"Model Weights Changed?","values":{"Prompt Engineering":"No","In-Context Learning (Few-Shot)":"No","Retrieval Augmented Generation (RAG)":"No","Fine-Tuning":"Yes — permanent change to model"}},{"feature":"Cost","values":{"Prompt Engineering":"Lowest — just API tokens","In-Context Learning (Few-Shot)":"Low — larger prompts = more tokens","Retrieval Augmented Generation (RAG)":"Medium — vector DB + embedding costs","Fine-Tuning":"Highest — GPU training costs"}},{"feature":"Complexity","values":{"Prompt Engineering":"Low — just text editing","In-Context Learning (Few-Shot)":"Low-Medium — curate good examples","Retrieval Augmented Generation (RAG)":"Medium — build knowledge base, embeddings, vector DB","Fine-Tuning":"High — data preparation, training, evaluation, deployment"}},{"feature":"Best For","values":{"Prompt Engineering":"Quick improvements, structured outputs, tone control","In-Context Learning (Few-Shot)":"Teaching a specific output format with examples","Retrieval Augmented Generation (RAG)":"Accessing private/up-to-date knowledge without retraining","Fine-Tuning":"Adapting model to a specific domain, style, or task permanently"}},{"feature":"Hallucination Risk","values":{"Prompt Engineering":"High — FM still guesses from training data","In-Context Learning (Few-Shot)":"Medium — examples help but FM can still hallucinate","Retrieval Augmented Generation (RAG)":"Low — answers grounded in retrieved real documents","Fine-Tuning":"Medium — model learns domain but can still hallucinate"}},{"feature":"AWS Implementation","values":{"Prompt Engineering":"Any Bedrock model via console or API","In-Context Learning (Few-Shot)":"Any Bedrock model — include examples in prompt","Retrieval Augmented Generation (RAG)":"Bedrock Knowledge Bases + OpenSearch/Aurora/Neptune as vector DB","Fine-Tuning":"Bedrock Custom Model Fine-Tuning or SageMaker JumpStart"}},{"feature":"Data Required","values":{"Prompt Engineering":"None — just good prompt text","In-Context Learning (Few-Shot)":"A few examples (3-10 typical)","Retrieval Augmented Generation (RAG)":"Your private documents/knowledge base","Fine-Tuning":"Hundreds to thousands of labeled training examples"}}],"sources":["aws_exam_comparison_tables[sonnet46].json"]},{"title":"RDS vs DynamoDB vs Aurora","title_variants":["Amazon RDS vs Amazon Aurora vs Amazon DynamoDB","RDS vs DynamoDB vs Aurora"],"description":"Comparison of managed database services for relational and NoSQL workloads","context":"When designing database architectures on AWS, choosing between RDS (traditional relational), DynamoDB (NoSQL), and Aurora (cloud-native relational) is a fundamental decision. This comparison focuses on the high-level characteristics that drive this choice including consistency requirements, scaling patterns, query flexibility, and operational overhead.","category":"DATABASE_SERVICES","columns":["Amazon RDS","Amazon DynamoDB","Amazon Aurora"],"column_summaries":{"Amazon RDS":"A cloud-native relational database compatible with MySQL and PostgreSQL, offering up to 5x the throughput of MySQL and enterprise-grade availability with auto-scaling storage."},"rows":[{"feature":"Database Category","values":{"Amazon RDS":"Traditional applications, lift-and-shift workloads, specific engine requirements","Amazon DynamoDB":"Internet-scale applications, serverless architectures, unpredictable workloads","Amazon Aurora":"Enterprise applications needing high performance and availability, microservices"}},{"feature":"Schema Flexibility","values":{"Amazon RDS":"Fixed schema with defined tables, columns, relationships","Amazon DynamoDB":"Flexible schema - items can have different attributes","Amazon Aurora":"Fixed schema with defined tables, columns, relationships"}},{"feature":"Query Pattern","values":{"Amazon RDS":"Flexible SQL queries, JOINs, complex aggregations","Amazon DynamoDB":"Key-based access, limited query flexibility","Amazon Aurora":"Flexible SQL queries, JOINs, complex aggregations"}},{"feature":"Scaling Model","values":{"Amazon RDS":"Vertical scaling (instance size) + Read Replicas (horizontal for reads)","Amazon DynamoDB":"Horizontal scaling (virtually unlimited); On-Demand or Provisioned capacity","Amazon Aurora":"Auto-scaling storage (up to 128 TB) + up to 15 Read Replicas"}},{"feature":"Consistency Options","values":{"Amazon RDS":"Strong consistency (ACID transactions)","Amazon DynamoDB":"Eventually or Strongly consistent (configurable)","Amazon Aurora":"Strong consistency (ACID transactions)"}},{"feature":"Transaction Support","values":{"Amazon RDS":"Full ACID support with JOINs and complex queries","Amazon DynamoDB":"Single-digit ms latency; On-Demand and Standard transaction modes","Amazon Aurora":"Full ACID support with JOINs and complex queries"}},{"feature":"Operational Overhead","values":{"Amazon RDS":"Low (managed patches, backups)","Amazon DynamoDB":"None (fully serverless)","Amazon Aurora":"Low (managed patches, backups)"}},{"feature":"Performance at Scale","values":{"Amazon RDS":"Good performance; limited by instance size and storage type","Amazon DynamoDB":"Single-digit millisecond latency at any scale","Amazon Aurora":"5x faster than MySQL, 3x faster than PostgreSQL (standard configurations)"}},{"feature":"Cost Model","values":{"Amazon RDS":"Instance + Storage + IOPS","Amazon DynamoDB":"On-demand (per request) or Provisioned (RCU/WCU)","Amazon Aurora":"Instance + Storage (I/O included)"}},{"feature":"Maximum Storage","values":{"Amazon RDS":"64 TB (16 TB for SQL Server)","Amazon DynamoDB":"Virtually unlimited","Amazon Aurora":"128 TB"}},{"feature":"Read Replicas","values":{"Amazon RDS":"Up to 5 replicas","Amazon DynamoDB":"Global Tables (multi-region), no read replicas","Amazon Aurora":"Up to 15 replicas"}},{"feature":"Choose When...","values":{"Amazon RDS":"You need specific DB engine, have existing SQL apps, need complex queries","Amazon DynamoDB":"You need massive scale, predictable performance, simple key-based access","Amazon Aurora":"You need high performance, many read replicas, MySQL/PostgreSQL compatibility"}},{"feature":"High Availability","values":{"Amazon RDS":"Multi-AZ deployments with automatic failover","Amazon Aurora":"6-way replication across 3 AZs, automatic failover, self-healing storage","Amazon DynamoDB":"Multi-AZ replication by default, automatic failover, built-in high availability"}},{"feature":"Serverless Option","values":{"Amazon RDS":"No native serverless (Aurora Serverless available)","Amazon Aurora":"Yes - Aurora Serverless v2 with auto-scaling","Amazon DynamoDB":"Yes - DynamoDB On-Demand and DynamoDB Accelerator (DAX)"}},{"feature":"Global Tables","values":{"Amazon RDS":"Cross-region read replicas (manual setup)","Amazon Aurora":"Aurora Global Database - up to 5 secondary regions","Amazon DynamoDB":"DynamoDB Global Tables - multi-region, multi-active"}},{"feature":"Pricing","values":{"Amazon RDS":"Instance hours + storage + backups + I/O","Amazon Aurora":"Similar to RDS but includes storage auto-scaling","Amazon DynamoDB":"Pay per request unit or provisioned capacity"}}],"mnemonics":["R.A.D - RDS for traditional, Aurora for advanced/high-performance, DynamoDB for NoSQL scale"],"exam_tips":["Aurora is 5x faster than MySQL and 3x faster than PostgreSQL - memorize these numbers","Aurora can have up to 15 Read Replicas vs RDS MySQL's 5","DynamoDB is serverless-first design with virtually unlimited scalability","For SAA-C03: Choose based on data model needs (relational vs NoSQL) and scaling requirements","RDS and Aurora support Multi-AZ for HA; single-AZ is for dev/test only"],"sources":["aws_exam_comparison_tables[kimi-agsw].json","aws_exam_comparison_tables[minimax].json"]},{"title":"Relational Databases Comparison","title_variants":["Relational Database Services Comparison","Relational Databases Comparison"],"description":"Comparing AWS managed relational database services","context":"AWS offers multiple relational database solutions ranging from traditional managed databases (RDS) to cloud-native Aurora variants. RDS supports popular open-source and commercial engines, while Aurora provides enhanced performance and scalability. Aurora Serverless offers automatic scaling for variable workloads. Understanding the differences between these services is critical for selecting the right database architecture for your application.","category":"Database Services","exam":"Both (SAA-C03 Primary)","columns":["RDS MySQL/PostgreSQL/MariaDB","RDS SQL Server/Oracle","Aurora MySQL","Aurora PostgreSQL","Aurora Serverless v1","Aurora Serverless v2","Amazon RDS"],"column_summaries":{"Amazon RDS":"A MySQL and PostgreSQL-compatible relational database with the speed and availability of high-end commercial databases, offering up to 5x throughput of standard MySQL and 3x of standard PostgreSQL."},"rows":[{"feature":"Engine Type","values":{"RDS MySQL/PostgreSQL/MariaDB":"Open-source engines","RDS SQL Server/Oracle":"Commercial licensed engines","Aurora MySQL":"MySQL-compatible (cloud-native)","Aurora PostgreSQL":"PostgreSQL-compatible (cloud-native)","Aurora Serverless v1":"MySQL/PostgreSQL-compatible","Aurora Serverless v2":"MySQL/PostgreSQL-compatible"}},{"feature":"Performance vs Open Source","values":{"RDS MySQL/PostgreSQL/MariaDB":"Standard (1x)","RDS SQL Server/Oracle":"Standard (1x)","Aurora MySQL":"Up to 5x faster than MySQL","Aurora PostgreSQL":"Up to 3x faster than PostgreSQL","Aurora Serverless v1":"Same as Aurora provisioned","Aurora Serverless v2":"Same as Aurora provisioned","Amazon RDS":"Columnar storage, massive parallelism"}},{"feature":"Storage Scaling","values":{"RDS MySQL/PostgreSQL/MariaDB":"Up to 64 TB, auto-scaling","RDS SQL Server/Oracle":"Up to 16 TB","Aurora MySQL":"Up to 128 TB, auto-scaling in 10GB increments","Aurora PostgreSQL":"Up to 128 TB, auto-scaling in 10GB increments","Aurora Serverless v1":"Up to 128 TB, auto-scaling","Aurora Serverless v2":"Up to 128 TB, auto-scaling","Amazon RDS":"Auto-scaling storage + up to 15 read replicas"}},{"feature":"Compute Scaling","values":{"RDS MySQL/PostgreSQL/MariaDB":"Manual instance scaling","RDS SQL Server/Oracle":"Manual instance scaling","Aurora MySQL":"Manual (up to 15 read replicas)","Aurora PostgreSQL":"Manual (up to 15 read replicas)","Aurora Serverless v1":"Automatic (2-256 ACUs)","Aurora Serverless v2":"Automatic (0.5-128 ACUs), instant scaling"}},{"feature":"Read Replicas","values":{"RDS MySQL/PostgreSQL/MariaDB":"Up to 5 replicas, async replication","RDS SQL Server/Oracle":"Up to 5 replicas (SQL Server), 0-5 (Oracle)","Aurora MySQL":"Up to 15 replicas, <10ms lag, shared storage","Aurora PostgreSQL":"Up to 15 replicas, <10ms lag, shared storage","Aurora Serverless v1":"Not supported","Aurora Serverless v2":"Supported (up to 15 replicas)","Amazon RDS":"Up to 5 (MySQL/MariaDB/PostgreSQL)"}},{"feature":"Multi-AZ Deployment","values":{"RDS MySQL/PostgreSQL/MariaDB":"Yes (synchronous standby)","RDS SQL Server/Oracle":"Yes (SQL Server Mirroring/Always On)","Aurora MySQL":"Yes (6 copies across 3 AZs)","Aurora PostgreSQL":"Yes (6 copies across 3 AZs)","Aurora Serverless v1":"Yes (high availability built-in)","Aurora Serverless v2":"Yes (high availability built-in)","Amazon RDS":"Single-AZ (use cluster for HA)"}},{"feature":"Failover Time","values":{"RDS MySQL/PostgreSQL/MariaDB":"60-120 seconds","RDS SQL Server/Oracle":"60-120 seconds","Aurora MySQL":"<30 seconds (typically <10s)","Aurora PostgreSQL":"<30 seconds (typically <10s)","Aurora Serverless v1":"Automatic, no downtime","Aurora Serverless v2":"Automatic, no downtime"}},{"feature":"Backup & Recovery","values":{"RDS MySQL/PostgreSQL/MariaDB":"Automated backups, point-in-time recovery (35 days)","RDS SQL Server/Oracle":"Automated backups, point-in-time recovery (35 days)","Aurora MySQL":"Continuous backup to S3, 35-day retention, instant restore","Aurora PostgreSQL":"Continuous backup to S3, 35-day retention, instant restore","Aurora Serverless v1":"Same as Aurora provisioned","Aurora Serverless v2":"Same as Aurora provisioned"}},{"feature":"Licensing Model","values":{"RDS MySQL/PostgreSQL/MariaDB":"Open-source (no license fees)","RDS SQL Server/Oracle":"License Included or BYOL","Aurora MySQL":"No license fees","Aurora PostgreSQL":"No license fees","Aurora Serverless v1":"No license fees","Aurora Serverless v2":"No license fees"}},{"feature":"Cost Model","values":{"RDS MySQL/PostgreSQL/MariaDB":"Instance + Storage + IOPS","RDS SQL Server/Oracle":"Instance + Storage + IOPS + License","Aurora MySQL":"Instance + Storage (I/O included)","Aurora PostgreSQL":"Instance + Storage (I/O included)","Aurora Serverless v1":"Per ACU-hour + Storage","Aurora Serverless v2":"Per ACU-second + Storage"}},{"feature":"Best Use Cases","values":{"RDS MySQL/PostgreSQL/MariaDB":"Lift-and-shift, existing apps, specific engine needs","RDS SQL Server/Oracle":"Enterprise apps requiring specific commercial DB features","Aurora MySQL":"High throughput, scalability needs, MySQL compatibility","Aurora PostgreSQL":"High throughput, scalability needs, PostgreSQL compatibility","Aurora Serverless v1":"Infrequent/intermittent workloads, dev/test","Aurora Serverless v2":"Variable workloads, microservices, multi-tenant apps"}},{"feature":"Database Type","values":{"Amazon RDS":"OLTP relational (6 engines)","Amazon Aurora":"OLTP relational (MySQL/PostgreSQL compatible)","Amazon Redshift":"OLAP data warehouse (analytics)"}},{"feature":"Primary Use","values":{"Amazon RDS":"Standard applications, ERP, CRM, e-commerce","Amazon Aurora":"High-throughput applications, enterprise workloads","Amazon Redshift":"Analytics, business intelligence, reporting"}},{"feature":"Serverless","values":{"Amazon RDS":"Aurora Serverless, RDS Proxy","Amazon Aurora":"Aurora Serverless v2 available","Amazon Redshift":"Serverless option available"}}],"mnemonics":["RRA = RDS for Regular apps, Aurora for high-performance, Redshift for Reports (analytics)"],"exam_tips":["Aurora is NOT just storage - it's a cluster with writer and readers across 3 AZs","Aurora automatically scales storage in 10GB increments up to 128TB","Use Aurora Global Database for cross-region disaster recovery","Redshift is for analytics/BI - NOT for transactional applications","Multi-AZ in RDS uses synchronous replication; Aurora uses quorum-based approach"],"sources":["aws_exam_comparison_tables[kimi-agsw].json","aws_exam_comparison_tables[minimax-dr].json"]},{"title":"Responsible AI Services Comparison","title_variants":["Responsible AI Services Comparison"],"description":"Comparing AWS services for responsible AI implementation and monitoring","category":"AI Responsible & Governance","exam":"AIF-C01","columns":["Amazon SageMaker Clarify","Guardrails for Amazon Bedrock","Amazon SageMaker Model Monitor"],"column_summaries":{"Amazon SageMaker Clarify":"A service that helps detect potential bias in data and models during the ML development process, supporting responsible AI practices and fairness in machine learning.","Guardrails for Amazon Bedrock":"A feature that helps implement safeguards for generative AI applications by filtering harmful content in both inputs and outputs of foundation models.","Amazon SageMaker Model Monitor":"A service that continuously monitors deployed models for quality and drift, ensuring model predictions remain accurate and reliable over time."},"rows":[{"feature":"Purpose","values":{"Amazon SageMaker Clarify":"Detect bias in ML models and data","Guardrails for Amazon Bedrock":"Filter harmful content in GenAI apps","Amazon SageMaker Model Monitor":"Monitor model quality post-deployment"}},{"feature":"When to Use","values":{"Amazon SageMaker Clarify":"During model development and training","Guardrails for Amazon Bedrock":"When deploying generative AI applications","Amazon SageMaker Model Monitor":"After model deployment"}},{"feature":"What It Detects","values":{"Amazon SageMaker Clarify":"Demographic bias, fairness metrics","Guardrails for Amazon Bedrock":"Hate speech, violence, sexual content","Amazon SageMaker Model Monitor":"Data drift, feature drift, prediction quality"}},{"feature":"Key Metrics","values":{"Amazon SageMaker Clarify":"Bias metrics, attribute importance","Guardrails for Amazon Bedrock":"Content filtered/not filtered","Amazon SageMaker Model Monitor":"KOPS, F1, accuracy drift"}},{"feature":"Integration","values":{"Amazon SageMaker Clarify":"SageMaker Data Wrangler, training jobs","Guardrails for Amazon Bedrock":"Bedrock API, agents, Knowledge Bases","Amazon SageMaker Model Monitor":"Deployed SageMaker endpoints"}}],"mnemonics":["CGM = Clarify for bias, Guardrails for GenAI safety, Monitor for model quality"],"exam_tips":["SageMaker Clarify is essential for detecting bias BEFORE model deployment","Guardrails work at inference time - blocking harmful inputs and outputs","Model Monitor detects when deployed models degrade - critical for production","Responsible AI includes: bias detection, fairness, transparency, safety","Use multiple responsible AI tools together for comprehensive coverage"],"sources":["aws_exam_comparison_tables[minimax-dr].json"]},{"title":"Responsible AI Tools — Clarify vs Guardrails vs Model Monitor vs A2I","title_variants":["Responsible AI Tools — Clarify vs Guardrails vs Model Monitor vs A2I"],"context":"Responsible AI on AWS is enforced through a suite of monitoring and safety tools. The exam expects you to match a responsible AI concern (bias, safety, drift, human review) to the correct AWS service. These tools collectively ensure AI systems are fair, safe, transparent, and human-supervised.","exam":"AIF-C01","domain":"Domain 4: Guidelines for Responsible AI","domain_weight":"14%","table_id":"AIF-009","columns":["Amazon SageMaker Clarify","Guardrails for Amazon Bedrock","SageMaker Model Monitor","Amazon Augmented AI (A2I)"],"column_summaries":{"Amazon SageMaker Clarify":"SageMaker Clarify detects BIAS in training datasets and ML models, and provides model EXPLAINABILITY reports — it tells you WHY the model made a prediction and flags if certain demographic groups are treated unfairly. Use it during model development and evaluation.","Guardrails for Amazon Bedrock":"Bedrock Guardrails is a safety filtering layer that sits in front of foundation models — it blocks harmful content, prevents prompt injection attacks, filters sensitive topics, and enforces content policies. Use it to make deployed Gen AI apps safe.","SageMaker Model Monitor":"Model Monitor continuously watches deployed models in production for PERFORMANCE DRIFT — it alerts you when the model's input data distribution or predictions change over time, signaling the model needs retraining. Use it post-deployment.","Amazon Augmented AI (A2I)":"Amazon A2I routes low-confidence model predictions to HUMAN REVIEWERS for manual inspection. It creates a 'human in the loop' workflow so that uncertain AI decisions get a human second opinion before action is taken."},"rows":[{"feature":"Primary Function","values":{"Amazon SageMaker Clarify":"Detect bias + explain model predictions","Guardrails for Amazon Bedrock":"Filter harmful/unsafe content from FM inputs and outputs","SageMaker Model Monitor":"Detect data drift and model quality degradation in production","Amazon Augmented AI (A2I)":"Route low-confidence predictions to human reviewers"}},{"feature":"When Used","values":{"Amazon SageMaker Clarify":"During training and evaluation (development phase)","Guardrails for Amazon Bedrock":"At inference time (every API call filtered)","SageMaker Model Monitor":"After deployment — continuous monitoring","Amazon Augmented AI (A2I)":"At inference time — when confidence is below threshold"}},{"feature":"Responsible AI Pillar","values":{"Amazon SageMaker Clarify":"Fairness, Explainability","Guardrails for Amazon Bedrock":"Safety, Robustness, Content Compliance","SageMaker Model Monitor":"Robustness, Reliability","Amazon Augmented AI (A2I)":"Human Oversight, Safety"}},{"feature":"Works With","values":{"Amazon SageMaker Clarify":"SageMaker training jobs and endpoints","Guardrails for Amazon Bedrock":"Any Amazon Bedrock FM","SageMaker Model Monitor":"SageMaker deployed endpoints","Amazon Augmented AI (A2I)":"Rekognition, Textract, or any custom ML model"}},{"feature":"Addresses Hallucinations?","values":{"Amazon SageMaker Clarify":"No — focuses on bias, not Gen AI hallucinations","Guardrails for Amazon Bedrock":"Partially — can block clearly wrong or harmful outputs","SageMaker Model Monitor":"No — detects drift, not individual hallucinations","Amazon Augmented AI (A2I)":"Yes — human can catch and correct AI errors"}}],"sources":["aws_exam_comparison_tables[sonnet46].json"]},{"title":"Responsible AI and Guardrails","title_variants":["Responsible AI and Guardrails"],"context":"Comparing responsible AI features and guardrails - critical for Domain 4 (Guidelines for Responsible AI)","table_id":"AIF-005","columns":["Guardrails for Amazon Bedrock","Amazon SageMaker Clarify","Amazon Augmented AI (A2I)","SageMaker Model Monitor"],"column_summaries":{"Guardrails for Amazon Bedrock":"A safety feature that implements customizable content filters and safeguards for foundation model outputs. Provides real-time protection against harmful content, prompt injection attacks, and jailbreak attempts while allowing organizations to define their own safety policies.","Amazon SageMaker Clarify":"A model explainability and bias detection service that provides insights into model predictions through SHAP values and feature importance. Helps identify and mitigate bias in ML models across demographic groups for responsible AI development.","Amazon Augmented AI (A2I)":"A human-in-the-loop service that enables human review of ML predictions, especially important for high-stakes decisions or when regulatory compliance requires human oversight. Creates workflows for human reviewers to validate or correct model predictions.","SageMaker Model Monitor":"A monitoring service that continuously tracks model performance in production, detecting data drift, concept drift, and prediction quality issues. Alerts teams when model behavior deviates from the baseline established during training."},"rows":[{"feature":"Primary Purpose","values":{"Guardrails for Amazon Bedrock":"Content filtering, safety guardrails","Amazon SageMaker Clarify":"Bias detection, explainability","Amazon Augmented AI (A2I)":"Human review workflow","SageMaker Model Monitor":"Model performance monitoring"}},{"feature":"Content Filtering","values":{"Guardrails for Amazon Bedrock":"Configurable filters for harmful content","Amazon SageMaker Clarify":"Not primary function","Amazon Augmented AI (A2I)":"Human-in-loop review","SageMaker Model Monitor":"Not primary function"}},{"feature":"Bias Detection","values":{"Guardrails for Amazon Bedrock":"Limited","Amazon SageMaker Clarify":"Comprehensive bias metrics","Amazon Augmented AI (A2I)":"Human bias review","SageMaker Model Monitor":"Drift detection only"}},{"feature":"Explainability","values":{"Guardrails for Amazon Bedrock":"Not available","Amazon SageMaker Clarify":"SHAP values, feature importance","Amazon Augmented AI (A2I)":"Human explanation review","SageMaker Model Monitor":"Not available"}},{"feature":"Real-time Protection","values":{"Guardrails for Amazon Bedrock":"Yes - inline guardrails","Amazon SageMaker Clarify":"Batch analysis","Amazon Augmented AI (A2I)":"Human review triggered","SageMaker Model Monitor":"Scheduled monitoring"}},{"feature":"Use Case","values":{"Guardrails for Amazon Bedrock":"Production FM safety","Amazon SageMaker Clarify":"ML model fairness analysis","Amazon Augmented AI (A2I)":"High-stakes predictions review","SageMaker Model Monitor":"Production model drift detection"}},{"feature":"Integration","values":{"Guardrails for Amazon Bedrock":"Bedrock API calls","Amazon SageMaker Clarify":"SageMaker pipelines","Amazon Augmented AI (A2I)":"Any ML service","SageMaker Model Monitor":"SageMaker endpoints"}},{"feature":"Alert Mechanism","values":{"Guardrails for Amazon Bedrock":"Block/filter responses","Amazon SageMaker Clarify":"Reports and dashboards","Amazon Augmented AI (A2I)":"Human review tasks","SageMaker Model Monitor":"CloudWatch alarms"}}],"mnemonics":["GUARD-CLARIFY-A2I-MONITOR: Guardrails block, Clarify explains, A2I adds humans, Monitor tracks","Need content filtering? Guardrails. Need bias detection? Clarify. Need human review? A2I. Need drift detection? Model Monitor."],"exam_tips":["Guardrails for Bedrock is the primary tool for FM content safety","SageMaker Clarify provides SHAP-based explainability for model predictions","A2I is essential when regulatory requirements demand human oversight","Model Monitor detects data drift and model degradation over time","Guardrails can filter: hate speech, violence, sexual content, insults","Prompt injection protection is built into Guardrails for Bedrock"],"sources":["aws_exam_comparison_tables[glm5-agent].json"]},{"title":"Responsible AI and Trust Controls","title_variants":["Responsible AI and Trust Controls"],"category":"Responsible AI","exam":"AIF-C01","domain":"Guidelines for Responsible AI","table_id":"aif_d4_responsible_ai_controls","columns":["Guardrails for Amazon Bedrock","SageMaker Clarify","SageMaker Model Monitor","Amazon Augmented AI (A2I)","SageMaker Model Cards"],"column_summaries":{"Guardrails for Amazon Bedrock":"Guardrails for Amazon Bedrock help shape and constrain model behavior in generative AI applications. On the exam, they are the safety and policy-control clue for Bedrock-based experiences.","SageMaker Clarify":"Clarify focuses on bias detection and explainability-style analysis. It is the exam answer when fairness, bias analysis, or interpretability checks are front and center.","SageMaker Model Monitor":"Model Monitor tracks behavior and quality in production over time. It is the answer when the risk is drift, changing data, or degradation after deployment.","Amazon Augmented AI (A2I)":"A2I adds human review steps so edge cases and low-confidence outputs can be checked by people. It is critical when responsible AI requires human oversight.","SageMaker Model Cards":"Model Cards document model characteristics, intended use, limitations, and governance details. They support transparency and documentation rather than runtime control."},"rows":[{"feature":"Primary role","values":{"Guardrails for Amazon Bedrock":"Safety controls on generative AI interactions","SageMaker Clarify":"Bias and explainability analysis","SageMaker Model Monitor":"Production monitoring","Amazon Augmented AI (A2I)":"Human review","SageMaker Model Cards":"Transparency documentation"}},{"feature":"Best exam clue","values":{"Guardrails for Amazon Bedrock":"Need runtime guardrails for gen AI app","SageMaker Clarify":"Assess bias/fairness","SageMaker Model Monitor":"Watch model quality after deployment","Amazon Augmented AI (A2I)":"Human-in-the-loop review","SageMaker Model Cards":"Document model facts and intended use"}},{"feature":"Lifecycle stage","values":{"Guardrails for Amazon Bedrock":"Application runtime","SageMaker Clarify":"Assessment / validation","SageMaker Model Monitor":"Post-deployment","Amazon Augmented AI (A2I)":"Operational oversight","SageMaker Model Cards":"Governance / documentation"}},{"feature":"Great for","values":{"Guardrails for Amazon Bedrock":"Safer user interactions","SageMaker Clarify":"Fairness and interpretability checks","SageMaker Model Monitor":"Detecting drift or degradation","Amazon Augmented AI (A2I)":"Escalating uncertain cases to humans","SageMaker Model Cards":"Transparency and audit readiness"}},{"feature":"Common trap","values":{"Guardrails for Amazon Bedrock":"Thinking they replace all governance work","SageMaker Clarify":"Using it as runtime prompt filtering","SageMaker Model Monitor":"Confusing monitoring with documentation","Amazon Augmented AI (A2I)":"Thinking it replaces model evaluation","SageMaker Model Cards":"Thinking documentation alone enforces safe behavior"}}],"why_this_table_matters":"AIF Domain 4 focuses on bias, fairness, safety, human oversight, transparency, and monitoring. This table helps separate preventative guardrails from bias analysis, monitoring, human review, and documentation.","sources":["aws_exam_comparison_tables[gpt5].json"]},{"title":"S3 Storage Classes Comparison","title_variants":["Amazon S3 Storage Classes Comparison","S3 Storage Classes Comparison"],"description":"Comparison of S3 storage classes for cost optimization based on access patterns","context":"Amazon S3 offers multiple storage classes designed for different use cases, access patterns, and cost requirements. Understanding the differences between these classes is critical for the SAA-C03 exam, as questions frequently test your ability to select the most cost-effective storage class based on data access frequency, retrieval time requirements, and durability needs. Each storage class offers the same 99.999999999% (11 nines) durability but differs in availability, retrieval times, minimum storage duration, and pricing.","category":"STORAGE_SERVICES","table_id":"s3_storage_classes_comparison","relevant_exams":["SAA-C03","AIF-C01"],"relevant_domains":{"SAA-C03":["Domain 4: Design Cost-Optimized Architectures"],"AIF-C01":["Domain 5: Security, Compliance, and Governance"]},"columns":["S3 Standard","S3 Intelligent-Tiering","S3 Standard-IA","S3 One Zone-IA","S3 Glacier Instant Retrieval","S3 Glacier Flexible Retrieval","S3 Glacier Deep Archive","S3 Express One Zone"],"column_summaries":{"S3 Standard":"Default storage class designed for frequently accessed data with high throughput, low latency, and high availability across multiple Availability Zones.","S3 Intelligent-Tiering":"Automatically optimizes storage costs by moving data between access tiers based on changing access patterns, with no retrieval fees or operational overhead.","S3 One Zone-IA":"Lower-cost option for infrequently accessed, non-critical data stored in a single Availability Zone, offering 20% lower cost than Standard-IA.","S3 Glacier Instant Retrieval":"Archive storage for rarely accessed data that requires millisecond retrieval, offering the lowest-cost storage with instant access for archive workloads.","S3 Glacier Flexible Retrieval":"Low-cost archive storage for data accessed 1-2 times per year with flexible retrieval options from minutes to hours, ideal for backup and media archives.","S3 Glacier Deep Archive":"Lowest-cost storage class for long-term retention of data accessed less than once per year, with retrieval times of 12-48 hours for regulatory compliance."},"rows":[{"feature":"Durability","values":{"S3 Standard":"99.999999999% (11 nines)","S3 Intelligent-Tiering":"99.999999999% (11 nines)","S3 Standard-IA":"99.999999999% (11 nines)","S3 One Zone-IA":"99.999999999% (11 nines)","S3 Glacier Instant Retrieval":"99.999999999% (11 nines)","S3 Glacier Flexible Retrieval":"99.999999999% (11 nines)","S3 Glacier Deep Archive":"99.999999999% (11 nines)","S3 Express One Zone":"99.999999999% (11 nines)"}},{"feature":"Availability Zones","values":{"S3 Standard":"99.99%","S3 Intelligent-Tiering":"99.9%","S3 Standard-IA":"99.9%","S3 One Zone-IA":"99.5%","S3 Glacier Instant Retrieval":"99.9%","S3 Glacier Flexible Retrieval":"99.99% (after retrieval)","S3 Glacier Deep Archive":"99.99% (after retrieval)","S3 Express One Zone":"99.95%"}},{"feature":"Retrieval Time","values":{"S3 Standard":"Milliseconds","S3 Intelligent-Tiering":"Milliseconds","S3 Standard-IA":"Milliseconds","S3 One Zone-IA":"Milliseconds","S3 Glacier Instant Retrieval":"Milliseconds (similar to Standard)","S3 Glacier Flexible Retrieval":"1-5 minutes (Expedited), 3-5 hours (Standard), 5-12 hours (Bulk)","S3 Glacier Deep Archive":"12 hours (Standard), 48 hours (Bulk)","S3 Express One Zone":"Single-digit milliseconds"}},{"feature":"Minimum Object Size","values":{"S3 Standard":"None","S3 Intelligent-Tiering":"None","S3 Standard-IA":"128 KB","S3 One Zone-IA":"128 KB","S3 Glacier Instant Retrieval":"128 KB","S3 Glacier Flexible Retrieval":"40 KB (after compression)","S3 Glacier Deep Archive":"40 KB (after compression)","S3 Express One Zone":"None"}},{"feature":"Minimum Storage Duration","values":{"S3 Standard":"30 days","S3 Intelligent-Tiering":"None","S3 Standard-IA":"30 days","S3 One Zone-IA":"30 days","S3 Glacier Instant Retrieval":"90 days","S3 Glacier Flexible Retrieval":"90 days","S3 Glacier Deep Archive":"180 days","S3 Express One Zone":"None"}},{"feature":"Retrieval Fee","values":{"S3 Standard":"Per GB retrieved","S3 Intelligent-Tiering":"None","S3 Standard-IA":"Per GB retrieved","S3 One Zone-IA":"Per GB retrieved","S3 Glacier Instant Retrieval":"Per GB retrieved (higher than Standard-IA)","S3 Glacier Flexible Retrieval":"Per GB retrieved; expedited costs more","S3 Glacier Deep Archive":"Per GB retrieved","S3 Express One Zone":"Per GB retrieved"}},{"feature":"Storage Cost (Relative)","values":{"S3 Standard":"Highest ($$$$)","S3 Intelligent-Tiering":"$$ (automatic optimization)","S3 Standard-IA":"$ (lower than Standard)","S3 One Zone-IA":"$ (20% less than Standard-IA)","S3 Glacier Instant Retrieval":"¢ (lowest for instant access)","S3 Glacier Flexible Retrieval":"¢¢ (lower cost, longer retrieval)","S3 Glacier Deep Archive":"¢¢¢ (lowest cost)","S3 Express One Zone":"High ($$$)"}},{"feature":"AZ Redundancy","values":{"S3 Standard":"3+ AZs","S3 Intelligent-Tiering":"3+ AZs","S3 Standard-IA":"3+ AZs","S3 One Zone-IA":"1 AZ only","S3 Glacier Instant Retrieval":"3+ AZs","S3 Glacier Flexible Retrieval":"3+ AZs","S3 Glacier Deep Archive":"3+ AZs","S3 Express One Zone":"1 AZ only"}},{"feature":"Primary Use Case","values":{"S3 Standard":"Frequently accessed data, dynamic websites, content distribution","S3 Intelligent-Tiering":"Unknown/variable access patterns, data lakes, analytics","S3 Standard-IA":"Long-lived, infrequently accessed backups, disaster recovery","S3 One Zone-IA":"Secondary backups, easily re-creatable data, on-premises copies","S3 Glacier Instant Retrieval":"Long-term storage, quarterly access, archive repositories","S3 Glacier Flexible Retrieval":"Backups, media archives, compliance data with flexible retrieval","S3 Glacier Deep Archive":"Long-term retention, compliance archives, tape replacement","S3 Express One Zone":"High-performance, single-AZ applications, latency-sensitive workloads"}},{"feature":"Monitoring/Automation","values":{"S3 Standard":"None","S3 Intelligent-Tiering":"Auto-tiering (frequent/infrequent/archive access tiers)","S3 Standard-IA":"Lifecycle policies","S3 One Zone-IA":"Lifecycle policies","S3 Glacier Instant Retrieval":"Lifecycle policies","S3 Glacier Flexible Retrieval":"Lifecycle policies","S3 Glacier Deep Archive":"Lifecycle policies","S3 Express One Zone":"None"}},{"feature":"Designed For","values":{"S3 Standard":"Frequently accessed data","S3 Intelligent-Tiering":"Unknown or changing access patterns","S3 Standard-IA":"Infrequently accessed, immediate access needed","S3 One Zone-IA":"Infrequent access, reproducible data","S3 Glacier Instant Retrieval":"Rarely accessed, instant retrieval needed","S3 Glacier Flexible Retrieval":"Archives, 1-2 accesses per year","S3 Glacier Deep Archive":"Long-term retention, compliance"}},{"feature":"Cost Ranking","values":{"S3 Standard":"60% lower than Standard","S3 Glacier Instant Retrieval":"68% lower than Standard-IA","S3 Glacier Flexible Retrieval":"Lowest for infrequent access"}},{"feature":"S3 Intelligent-Tiering","values":{"S3 Standard":"N/A (it's a tier within Intelligent-Tiering)","S3 Glacier Instant Retrieval":"N/A (it's a tier within Intelligent-Tiering)","S3 Glacier Flexible Retrieval":"N/A (it's a tier within Intelligent-Tiering)"}}],"mnemonics":["S.S.I.G.F - Standard for Speed, Standard-IA for Infrequent, Glacier for archive, Flexible for backup options"],"exam_tips":["Use S3 Intelligent-Tiering when access patterns are unpredictable - AWS auto-tiers objects","Minimum storage durations mean deleting early incurs penalties (pro-rated charge)","Glacier Instant Retrieval offers Standard-like access speeds at much lower cost","Glacier Flexible Retrieval has expedited (1-5 min), standard (3-12 hr), and bulk (5-12 hr) options","S3 Lifecycle policies automate transitions between storage classes","For SAA-C03, know when to recommend Standard vs IA vs Glacier based on access frequency"],"sources":["aws_exam_comparison_tables[kimi-agsw].json","aws_exam_comparison_tables[kimicode-v1].json","aws_exam_comparison_tables[kimicode-v2].json","aws_exam_comparison_tables[minimax].json"]},{"title":"S3 Storage Classes — Cost-Optimized Storage","title_variants":["S3 Storage Classes — Cost-Optimized Storage"],"context":"S3 offers multiple storage classes with very different price points based on access frequency and retrieval times. The exam presents a scenario describing how OFTEN data is accessed and asks you to pick the most cost-effective storage class. The core rule: the less frequently you access data, the cheaper the storage but the more expensive (or slower) the retrieval.","exam":"SAA-C03","domain":"Domain 4: Design Cost-Optimized Architectures","domain_weight":"20%","table_id":"SAA-012","columns":["S3 Standard","S3 Standard-IA","S3 One Zone-IA","S3 Glacier Instant Retrieval","S3 Glacier Deep Archive"],"column_summaries":{"S3 Standard":"S3 Standard is the default general-purpose storage for frequently accessed data — high durability (11 nines), high availability (99.99%), and no retrieval fees. It is the most expensive per GB but has no hidden retrieval costs, making it ideal for active data accessed multiple times per month.","S3 Standard-IA":"Standard-IA (Infrequent Access) stores data in 3+ AZs (same durability as Standard) but at a lower storage cost. There IS a retrieval fee per GB, making it cost-effective only for data accessed less than once a month — like backups and DR copies.","S3 One Zone-IA":"One Zone-IA is like Standard-IA but stores data in only ONE Availability Zone — reducing cost by ~20% more but introducing the risk of data loss if that AZ fails. Only use for data you can regenerate (thumbnails, transcoded files) or that already has a copy elsewhere.","S3 Glacier Instant Retrieval":"Glacier Instant Retrieval offers archival pricing (much cheaper storage) but with the access pattern of IA — millisecond retrieval. Use for archive data accessed quarterly (e.g., medical images, news media archives) where instant access is occasionally needed.","S3 Glacier Deep Archive":"Deep Archive is the CHEAPEST storage in all of AWS — designed for data retained for 7-10 years to meet regulatory requirements. Retrieval takes 12-48 hours. Think: compliance archives, long-term backups, tape replacement."},"rows":[{"feature":"Storage Cost (relative)","values":{"S3 Standard":"Highest","S3 Standard-IA":"Lower (~50% less than Standard)","S3 One Zone-IA":"Lower (~20% less than Standard-IA)","S3 Glacier Instant Retrieval":"Much Lower (~68% less than Standard)","S3 Glacier Deep Archive":"LOWEST — up to 95% less than Standard"}},{"feature":"Retrieval Time","values":{"S3 Standard":"Milliseconds — instant","S3 Standard-IA":"Milliseconds — instant","S3 One Zone-IA":"Milliseconds — instant","S3 Glacier Instant Retrieval":"Milliseconds — instant","S3 Glacier Deep Archive":"12-48 hours"}},{"feature":"Availability Zones","values":{"S3 Standard":"3+ AZs","S3 Standard-IA":"3+ AZs","S3 One Zone-IA":"1 AZ ONLY","S3 Glacier Instant Retrieval":"3+ AZs","S3 Glacier Deep Archive":"3+ AZs"}},{"feature":"Retrieval Fee","values":{"S3 Standard":"NONE","S3 Standard-IA":"Yes — per GB retrieved","S3 One Zone-IA":"Yes — per GB retrieved","S3 Glacier Instant Retrieval":"Yes — higher retrieval fee","S3 Glacier Deep Archive":"Yes — but retrieval is very infrequent"}},{"feature":"Minimum Storage Duration","values":{"S3 Standard":"None","S3 Standard-IA":"30 days","S3 One Zone-IA":"30 days","S3 Glacier Instant Retrieval":"90 days","S3 Glacier Deep Archive":"180 days"}},{"feature":"Best For","values":{"S3 Standard":"Websites, ML training data, frequently accessed files","S3 Standard-IA":"Backups, DR copies, data accessed monthly","S3 One Zone-IA":"Easily reproducible backups, secondary redundant data","S3 Glacier Instant Retrieval":"Medical image archives, media archives — quarterly access","S3 Glacier Deep Archive":"7-10 year regulatory archives, compliance backups"}}],"sources":["aws_exam_comparison_tables[sonnet46].json"]},{"title":"S3 Storage Tiering Choices","title_variants":["S3 Storage Tiering Choices"],"category":"Cost Optimization / Storage","exam":"SAA-C03","domain":"Design Cost-Optimized Architectures","table_id":"saa_d4_s3_cost_tiering","columns":["S3 Standard","S3 Standard-IA","S3 One Zone-IA","S3 Glacier Flexible Retrieval","S3 Glacier Deep Archive"],"column_summaries":{"S3 Standard":"S3 Standard is the hot tier for frequently accessed objects where low-latency retrieval matters. It is the default when access is regular and you do not want retrieval friction.","S3 Standard-IA":"S3 Standard-IA is for infrequently accessed data that still needs rapid retrieval when requested. It is the exam middle ground between hot storage and archive.","S3 One Zone-IA":"S3 One Zone-IA is like infrequent access with a lower resilience pattern than multi-AZ class choices. It fits reproducible or secondary data where lower cost outweighs stronger placement resilience.","S3 Glacier Flexible Retrieval":"Glacier Flexible Retrieval is archival storage when retrieval is needed sometimes but not instantly like hot storage. It is the common archive answer when Deep Archive is too cold.","S3 Glacier Deep Archive":"Glacier Deep Archive is the coldest low-cost archival option for data that is very rarely retrieved. It is the 'cheapest but slowest practical archive' exam clue."},"rows":[{"feature":"Access pattern","values":{"S3 Standard":"Frequent","S3 Standard-IA":"Infrequent","S3 One Zone-IA":"Infrequent, lower-cost secondary","S3 Glacier Flexible Retrieval":"Archive","S3 Glacier Deep Archive":"Deep archive"}},{"feature":"Retrieval expectation","values":{"S3 Standard":"Immediate and common","S3 Standard-IA":"Immediate but rare","S3 One Zone-IA":"Immediate but rare","S3 Glacier Flexible Retrieval":"Occasional archive retrieval","S3 Glacier Deep Archive":"Very rare retrieval"}},{"feature":"Best exam clue","values":{"S3 Standard":"Hot objects","S3 Standard-IA":"Rarely accessed but quickly needed","S3 One Zone-IA":"Re-creatable infrequent data","S3 Glacier Flexible Retrieval":"Archive with periodic retrieval needs","S3 Glacier Deep Archive":"Compliance or long-retention cold storage"}},{"feature":"Cost tendency","values":{"S3 Standard":"Highest storage cost of this set","S3 Standard-IA":"Lower than hot tier","S3 One Zone-IA":"Lower with more tradeoff","S3 Glacier Flexible Retrieval":"Low for archive","S3 Glacier Deep Archive":"Lowest for very cold data"}},{"feature":"Typical lifecycle role","values":{"S3 Standard":"Start here for active objects","S3 Standard-IA":"Warm-to-cold transition","S3 One Zone-IA":"Secondary cost-optimized transition","S3 Glacier Flexible Retrieval":"Cold archive stage","S3 Glacier Deep Archive":"Final deepest archive"}},{"feature":"Common trap","values":{"S3 Standard":"Keeping cold data here forever","S3 Standard-IA":"Using it for constantly accessed data","S3 One Zone-IA":"Using it for irreplaceable primary data without thinking hard","S3 Glacier Flexible Retrieval":"Expecting hot-storage access pattern","S3 Glacier Deep Archive":"Choosing it when retrieval urgency is nontrivial"}}],"why_this_table_matters":"SAA Domain 4 expects you to align storage class with access frequency, retrieval urgency, and durability needs. This table keeps hot, infrequent, and archival choices cleanly separated.","sources":["aws_exam_comparison_tables[gpt5].json"]},{"title":"SNS vs SQS vs EventBridge vs Amazon Kinesis","title_variants":["Amazon SQS vs Amazon SNS vs EventBridge","SNS vs SQS vs EventBridge vs Amazon Kinesis"],"description":"Comparison of AWS messaging services for building decoupled architectures","context":"Decoupling architecture components with messaging services is a core SAA-C03 skill. These four services all handle asynchronous communication but have very different patterns. Getting confused between them is one of the most common exam mistakes. The differentiators are: push vs pull, one-to-one vs one-to-many, and batch vs streaming.","category":"MESSAGING_SERVICES","exam":"SAA-C03","domain":"Domain 2: Design Resilient Architectures","domain_weight":"26%","table_id":"SAA-005","columns":["Amazon SQS","Amazon SNS","Amazon EventBridge","Amazon Kinesis"],"column_summaries":{"Amazon SQS":"SQS (Simple Queue Service) is a message queue — messages are stored until a consumer pulls them out for processing. It is perfect for decoupling producers and consumers and handling traffic spikes by buffering work, ensuring no messages are lost even if the consumer is down.","Amazon SNS":"SNS (Simple Notification Service) is a pub/sub messaging service that pushes a message to MULTIPLE subscribers simultaneously — email, Lambda, SQS, HTTP endpoints. One publisher sends, many subscribers receive. It is push-based with no message persistence.","Amazon EventBridge":"EventBridge is a serverless event bus that routes events from AWS services, SaaS applications, and your own apps to targets (Lambda, SQS, Step Functions). It supports content-based routing with sophisticated filtering rules — the most powerful event router in AWS.","Amazon Kinesis":"Kinesis is a real-time DATA STREAMING service for ingesting, processing, and analyzing high-volume streaming data (logs, clickstreams, IoT telemetry) at scale. Unlike SQS/SNS, messages can be replayed and multiple consumers can read the same stream independently."},"rows":[{"feature":"Communication Pattern","values":{"Amazon SQS":"Queue — point-to-point (one producer, one consumer group)","Amazon SNS":"Publish-subscribe (fan-out) - multiple subscribers per message","Amazon EventBridge":"Event-driven (event bus) - rules route events to targets","Amazon Kinesis":"Data Stream — ordered, real-time streaming with replay"}},{"feature":"Message Persistence","values":{"Amazon SQS":"Yes — messages stored up to 14 days","Amazon SNS":"No — push-and-forget (no storage)","Amazon EventBridge":"Limited — 24-hour replay via archive","Amazon Kinesis":"Yes — up to 365 days (configurable retention)"}},{"feature":"Message Retention","values":{"Amazon SQS":"Messages stored until consumed (1 min to 14 days)","Amazon SNS":"No ordering guarantee (except with FIFO topics)","Amazon EventBridge":"No ordering guarantee (events are independent)","Amazon Kinesis":"YES — multiple consumers can re-read the same stream"}},{"feature":"Real-Time Processing","values":{"Amazon SQS":"Near real-time with polling","Amazon SNS":"Real-time push","Amazon EventBridge":"Near real-time","Amazon Kinesis":"Real-time — millisecond latency streaming"}},{"feature":"Typical Use Cases","values":{"Amazon SQS":"Decouple microservices, buffer tasks, retry failed jobs","Amazon SNS":"Mobile push, SMS, email notifications, fan-out to multiple systems","Amazon EventBridge":"Event-driven architecture, SaaS integration, rule-based routing","Amazon Kinesis":"Real-time log analytics, IoT telemetry, clickstream analysis"}},{"feature":"Consumer Model","values":{"Amazon SQS":"Pull-based - consumers poll the queue","Amazon SNS":"Push-based - SNS pushes to subscribers","Amazon EventBridge":"Event-driven - rules trigger target services","Amazon Kinesis":"PULL — consumers read from shards (or push via Lambda trigger)"}},{"feature":"Delivery Guarantees","values":{"Amazon SQS":"Standard: no guarantee. FIFO: strict order, exactly-once","Amazon SNS":"At-least-once (retries with exponential backoff)","Amazon EventBridge":"At-least-once with retry and dead-letter queue","Amazon Kinesis":"Ordered within each shard"}},{"feature":"Filtering","values":{"Amazon SQS":"No - consumers receive all messages","Amazon SNS":"Message filtering - subscribers can filter by attributes","Amazon EventBridge":"Content filtering in rules with event patterns"}},{"feature":"Schema Registry","values":{"Amazon SQS":"No","Amazon SNS":"No","Amazon EventBridge":"Yes - Schema Registry for event validation"}},{"feature":"SaaS Integration","values":{"Amazon SQS":"No","Amazon SNS":"No","Amazon EventBridge":"Yes - 200+ SaaS partner event sources"}},{"feature":"Cross-Account","values":{"Amazon SQS":"Via resource-based policies","Amazon SNS":"Via topic policies","Amazon EventBridge":"Yes - native cross-account event routing"}}],"mnemonics":["S.S.E - SQS queues for sequential, SNS notifies multiple, EventBridge routes events"],"exam_tips":["Use SQS for decoupling - producers and consumers work independently","Use SNS for broadcasting - one message to many subscribers","EventBridge is ideal for event-driven architectures with AWS SaaS integration","SQS FIFO ensures ordered processing - important for financial transactions","EventBridge rules can filter events before routing - reduce unnecessary processing"],"sources":["aws_exam_comparison_tables[sonnet46].json","aws_exam_comparison_tables[minimax].json"]},{"title":"SageMaker Components Comparison","title_variants":["SageMaker Components Comparison"],"context":"Amazon SageMaker is a fully managed machine learning service that provides every developer and data scientist with the ability to build, train, and deploy ML models quickly. SageMaker removes the heavy lifting from each step of the machine learning process to make it easier to develop high-quality models. The following components work together to provide a complete ML lifecycle management platform, from data preparation to model deployment and monitoring.","columns":["SageMaker Studio","SageMaker Training","SageMaker Hosting/Endpoints","SageMaker Ground Truth","SageMaker Model Monitor","SageMaker Clarify","SageMaker Data Wrangler","SageMaker Feature Store","SageMaker Pipelines","SageMaker JumpStart"],"rows":[{"feature":"Primary Purpose","values":{"SageMaker Studio":"Integrated development environment (IDE) for ML","SageMaker Training":"Managed infrastructure for model training","SageMaker Hosting/Endpoints":"Deploy models for real-time inference","SageMaker Ground Truth":"Data labeling and annotation service","SageMaker Model Monitor":"Monitor model quality in production","SageMaker Clarify":"Detect bias and explain predictions","SageMaker Data Wrangler":"Visual data preparation tool","SageMaker Feature Store":"Centralized storage for ML features","SageMaker Pipelines":"Orchestrate ML workflows","SageMaker JumpStart":"Pre-built models and solutions library"}},{"feature":"Target User","values":{"SageMaker Studio":"Data scientists and ML engineers","SageMaker Training":"ML engineers and researchers","SageMaker Hosting/Endpoints":"DevOps and ML engineers","SageMaker Ground Truth":"Data labeling teams","SageMaker Model Monitor":"ML operations teams","SageMaker Clarify":"Data scientists and compliance teams","SageMaker Data Wrangler":"Data engineers and scientists","SageMaker Feature Store":"ML engineers and data scientists","SageMaker Pipelines":"ML engineers and MLOps teams","SageMaker JumpStart":"All ML practitioners"}},{"feature":"Key Capabilities","values":{"SageMaker Studio":"Notebooks, debugging, experiment tracking","SageMaker Training":"Distributed training, spot instances, debugging","SageMaker Hosting/Endpoints":"Auto-scaling, A/B testing, multi-model endpoints","SageMaker Ground Truth":"Automated labeling, workforce management","SageMaker Model Monitor":"Data drift detection, quality metrics","SageMaker Clarify":"Bias detection, SHAP values, model explainability","SageMaker Data Wrangler":"300+ transformations, data visualization","SageMaker Feature Store":"Online/Offline stores, feature discovery","SageMaker Pipelines":"CI/CD for ML, step caching, conditional execution","SageMaker JumpStart":"Foundation models, solution templates, fine-tuning"}},{"feature":"Customization Level","values":{"SageMaker Studio":"High - Full code control","SageMaker Training":"High - Any ML framework","SageMaker Hosting/Endpoints":"High - Custom inference code","SageMaker Ground Truth":"Medium - Custom labeling workflows","SageMaker Model Monitor":"Medium - Custom metrics and baselines","SageMaker Clarify":"Medium - Configurable analysis","SageMaker Data Wrangler":"Medium - Visual + code export","SageMaker Feature Store":"High - Custom feature engineering","SageMaker Pipelines":"High - Python SDK definition","SageMaker JumpStart":"Low to High - Pre-built to customizable"}},{"feature":"Integration Points","values":{"SageMaker Studio":"All SageMaker components, S3, ECR","SageMaker Training":"S3, ECR, CloudWatch, Spot Instances","SageMaker Hosting/Endpoints":"API Gateway, Lambda, Application Auto Scaling","SageMaker Ground Truth":"S3, Mechanical Turk, Private workforce","SageMaker Model Monitor":"CloudWatch, SNS, S3","SageMaker Clarify":"SageMaker Studio, Model Monitor","SageMaker Data Wrangler":"S3, Redshift, Athena, Snowflake","SageMaker Feature Store":"SageMaker Training, Processing, Streaming","SageMaker Pipelines":"Step Functions, EventBridge, CodePipeline","SageMaker JumpStart":"SageMaker Studio, Bedrock"}},{"feature":"Pricing Model","values":{"SageMaker Studio":"Free IDE, pay for compute instances","SageMaker Training":"Per-second compute charges","SageMaker Hosting/Endpoints":"Per-second instance charges","SageMaker Ground Truth":"Per-label pricing + workforce costs","SageMaker Model Monitor":"Processing job charges","SageMaker Clarify":"Processing job charges","SageMaker Data Wrangler":"ml.m5.4xlarge minimum, hourly","SageMaker Feature Store":"Storage + read/write operations","SageMaker Pipelines":"Step execution charges","SageMaker JumpStart":"Model deployment charges"}},{"feature":"Best Use Case","values":{"SageMaker Studio":"End-to-end ML development workflow","SageMaker Training":"Large-scale distributed model training","SageMaker Hosting/Endpoints":"Production model serving at scale","SageMaker Ground Truth":"Creating high-quality training datasets","SageMaker Model Monitor":"Maintaining model quality over time","SageMaker Clarify":"Regulatory compliance and fairness","SageMaker Data Wrangler":"Rapid data exploration and preparation","SageMaker Feature Store":"Feature reuse across teams/models","SageMaker Pipelines":"Automated ML CI/CD workflows","SageMaker JumpStart":"Quick start with proven solutions"}},{"feature":"Exam Relevance","values":{"SageMaker Studio":"High - Know as primary IDE","SageMaker Training":"High - Spot instances, distributed training","SageMaker Hosting/Endpoints":"High - Multi-model endpoints, auto-scaling","SageMaker Ground Truth":"Medium - Data labeling scenarios","SageMaker Model Monitor":"High - Production monitoring","SageMaker Clarify":"Medium - Bias detection questions","SageMaker Data Wrangler":"Medium - Data preparation without code","SageMaker Feature Store":"High - Feature management patterns","SageMaker Pipelines":"High - MLOps automation","SageMaker JumpStart":"Medium - Quick deployment scenarios"}}],"sources":["aws_exam_comparison_tables[kimi-agsw].json"]},{"title":"Security Groups vs NACLs vs WAF vs AWS Shield","title_variants":["Security Groups vs NACLs vs WAF vs AWS Shield"],"context":"AWS has layered network security — think of it like concentric walls around your infrastructure. Security Groups protect individual resources, NACLs protect subnets, WAF protects web applications at Layer 7, and Shield protects against DDoS attacks. Each layer solves a different type of threat. The exam loves scenario questions requiring you to pick the right security layer.","exam":"SAA-C03","domain":"Domain 1: Design Secure Architectures","domain_weight":"30%","table_id":"SAA-002","columns":["Security Groups","Network ACLs (NACLs)","AWS WAF","AWS Shield"],"column_summaries":{"Security Groups":"Security Groups are stateful virtual firewalls that control inbound and outbound traffic at the INSTANCE level (EC2, RDS, Lambda). Because they are stateful, a return response to allowed inbound traffic is automatically permitted — you only need to define rules in one direction.","Network ACLs (NACLs)":"NACLs are stateless packet filters that operate at the SUBNET level — all traffic entering or leaving a subnet is evaluated. Because they are stateless, you must explicitly define rules for BOTH directions (inbound and outbound). They process rules in number order and stop at the first match.","AWS WAF":"WAF (Web Application Firewall) operates at Layer 7 (HTTP/HTTPS) and protects web applications from common exploits like SQL injection, cross-site scripting (XSS), and bot attacks. It attaches to CloudFront, ALB, or API Gateway.","AWS Shield":"Shield is AWS's managed DDoS protection service. Shield Standard is free and automatic for all AWS customers. Shield Advanced provides enhanced protection, 24/7 DDoS response team, and financial protection for Route 53, CloudFront, and Elastic Load Balancers."},"rows":[{"feature":"Level of Operation","values":{"Security Groups":"Instance level (EC2, RDS, Lambda ENI)","Network ACLs (NACLs)":"Subnet level","AWS WAF":"Application layer — Layer 7 (HTTP/HTTPS)","AWS Shield":"Network layer — Layer 3/4 (DDoS protection)"}},{"feature":"Stateful vs Stateless","values":{"Security Groups":"STATEFUL — return traffic automatically allowed","Network ACLs (NACLs)":"STATELESS — must define rules for both directions","AWS WAF":"Stateless — inspects each request independently","AWS Shield":"N/A — rate-based and signature detection"}},{"feature":"Default Behavior","values":{"Security Groups":"Deny all inbound, allow all outbound (by default)","Network ACLs (NACLs)":"Default NACL: ALLOW all. Custom NACL: DENY all","AWS WAF":"Allow all unless rules say block","AWS Shield":"Standard: automatic for all. Advanced: opt-in"}},{"feature":"Rule Processing","values":{"Security Groups":"All rules evaluated — most permissive wins","Network ACLs (NACLs)":"Rules evaluated in number order — first match wins","AWS WAF":"Web ACL rules evaluated in priority order","AWS Shield":"Automatic — no rule configuration needed for Standard"}},{"feature":"Protects Against","values":{"Security Groups":"Unauthorized instance access (port/protocol control)","Network ACLs (NACLs)":"Subnet-level unauthorized traffic","AWS WAF":"SQL injection, XSS, bot traffic, bad IP addresses","AWS Shield":"DDoS attacks (volumetric, state-exhaustion, application layer)"}},{"feature":"Attaches To","values":{"Security Groups":"EC2, RDS, Lambda, ELB network interfaces","Network ACLs (NACLs)":"VPC Subnets","AWS WAF":"CloudFront, Application Load Balancer, API Gateway","AWS Shield":"Route 53, CloudFront, ELB, EC2 Elastic IPs"}}],"sources":["aws_exam_comparison_tables[sonnet46].json"]},{"title":"Security Monitoring Services Comparison","title_variants":["Security Monitoring Services Comparison","Security Monitoring and Governance Services Comparison"],"description":"Comparing AWS services for security monitoring, logging, and compliance","context":"AWS offers a comprehensive suite of security monitoring services that use machine learning and anomaly detection to identify threats and vulnerabilities. GuardDuty provides intelligent threat detection for accounts and workloads, Macie discovers and protects sensitive data in S3, Inspector assesses application vulnerabilities and network exposure, Security Hub provides a centralized security posture view across accounts, and Detective enables security incident investigation. Understanding the specific threats each service detects, their data sources, and integration patterns is crucial for the exam. These services work together to provide defense in depth for security monitoring.","category":"Security & Identity Services","exam":"Both (SAA-C03 Primary, AIF-C01 Reference)","columns":["GuardDuty","Macie","Inspector","Security Hub","Detective","Amazon CloudWatch","AWS CloudTrail","AWS Config"],"column_summaries":{"Amazon CloudWatch":"A monitoring and observability service providing data and actionable insights for AWS, hybrid, and on-premises applications through logs, metrics, and events.","AWS CloudTrail":"A service that logs API calls and user activity across your AWS infrastructure, providing audit trails for security analysis and compliance.","AWS Config":"A service that tracks resource inventory and changes, enabling compliance auditing and security analysis of AWS resource configurations.","Amazon GuardDuty":"A threat detection service that continuously monitors for malicious activity and unauthorized behavior to protect AWS accounts and workloads."},"rows":[{"feature":"Primary Purpose","values":{"GuardDuty":"Continuous threat detection for AWS accounts, workloads, and data using ML","Macie":"Discover, classify, and protect sensitive data (PII) in Amazon S3","Inspector":"Automated vulnerability assessment for EC2 and container workloads","Security Hub":"Centralized security posture management and compliance checking across accounts","Detective":"Security investigation and root cause analysis using visualizations"}},{"feature":"What It Detects","values":{"GuardDuty":"Account compromise, instance compromise, malicious reconnaissance, cryptocurrency mining","Macie":"Unencrypted or publicly accessible S3 buckets, PII/PHI/sensitive data exposure","Inspector":"Software vulnerabilities (CVEs), network reachability issues, unintended network accessibility","Security Hub":"Security findings aggregation, compliance checks against standards (CIS, PCI DSS)","Detective":"Relationships between entities during security events, anomalous API activity patterns","Amazon CloudWatch":"Custom metrics, application logs, events","AWS CloudTrail":"All AWS API calls (who, what, when)","AWS Config":"Resource configurations over time"}},{"feature":"Data Sources","values":{"GuardDuty":"CloudTrail logs, VPC Flow Logs, DNS logs, EKS audit logs, S3 data events","Macie":"S3 bucket content and metadata, S3 CloudTrail events","Inspector":"EC2 instance software inventory, network configuration, container images in ECR","Security Hub":"Findings from GuardDuty, Macie, Inspector, third-party products, Config rules","Detective":"CloudTrail logs, VPC Flow Logs, EKS audit logs, GuardDuty findings"}},{"feature":"Pricing Model","values":{"GuardDuty":"CloudTrail analysis: free; VPC Flow Logs: $0.50-2.50/GB; DNS logs: free; EKS: $0.20-0.40/vCPU","Macie":"$0.10/GB for data classified; $0.0024 per S3 object assessed for public accessibility","Inspector":"$0.09 per EC2 instance per assessment; $0.002 per container image scan","Security Hub":"$0.0010 per security check; $0.10 per finding ingested from third-party products","Detective":"$2.00-8.00 per terabyte of data processed (based on total volume)"}},{"feature":"Automation & Response","values":{"GuardDuty":"EventBridge integration for automated response; Lambda for remediation","Macie":"EventBridge for alerts; can trigger Lambda for automatic remediation","Inspector":"EventBridge integration; findings sent to Security Hub automatically","Security Hub":"Automated response via EventBridge; custom actions for remediation","Detective":"Manual investigation tool; integrates with Security Hub for finding context"}},{"feature":"Deployment Model","values":{"GuardDuty":"Single-click enable per region; auto-scans all accounts in organization","Macie":"Enable per region; auto-scans all S3 buckets; supports organization-wide enablement","Inspector":"Enable per region; continuous scanning or on-demand assessments","Security Hub":"Enable per region; master-member model for organizations; cross-region aggregation","Detective":"Enable per region; auto-analyzes data from enabled accounts"}},{"feature":"Key Integrations","values":{"GuardDuty":"Security Hub, Detective, EventBridge, Lambda, SNS, S3 (for findings export)","Macie":"Security Hub, EventBridge, Lambda, S3, IAM Access Analyzer","Inspector":"Security Hub, EventBridge, EC2 Systems Manager, ECR","Security Hub":"GuardDuty, Macie, Inspector, Config, Firewall Manager, 50+ third-party integrations","Detective":"GuardDuty, Security Hub, CloudTrail, VPC Flow Logs"}},{"feature":"Compliance Standards","values":{"GuardDuty":"PCI DSS, SOC, ISO, FedRAMP (supports compliance but not certified)","Macie":"GDPR, HIPAA, PCI DSS (helps with compliance through data discovery)","Inspector":"PCI DSS, CIS Benchmarks (provides compliance-related findings)","Security Hub":"CIS AWS Foundations, PCI DSS, AWS Foundational Security Best Practices, NIST","Detective":"Supports investigation for compliance incidents (not a compliance tool)"}},{"feature":"Unique Value Proposition","values":{"GuardDuty":"ML-powered threat detection without deploying agents or managing infrastructure","Macie":"Only service that automatically discovers and classifies sensitive data at scale","Inspector":"Agentless vulnerability scanning for EC2 and automated container image scanning","Security Hub":"Single pane of glass for security findings across all AWS accounts and services","Detective":"Visual investigation tool that reconstructs security events with entity relationships"}},{"feature":"Primary Function","values":{"Amazon CloudWatch":"Monitor metrics, logs, set alarms","AWS CloudTrail":"Log API calls and user activity","AWS Config":"Track resource configuration changes","Amazon GuardDuty":"Detect threats and anomalies"}},{"feature":"Retention","values":{"Amazon CloudWatch":"Customizable (days to years)","AWS CloudTrail":"90 days (365 days in cloudtrail-docs bucket)","AWS Config":"Customizable (up to rules setting)","Amazon GuardDuty":"Continuous (findings stored)"}},{"feature":"Use Case","values":{"Amazon CloudWatch":"Operational health, performance tuning","AWS CloudTrail":"Security auditing, incident investigation","AWS Config":"Compliance checking, drift detection","Amazon GuardDuty":"Malicious activity detection"}},{"feature":"Proactive/Reactive","values":{"Amazon CloudWatch":"Both (metrics + alarms)","AWS CloudTrail":"Reactive (after-the-fact logging)","AWS Config":"Proactive (configuration compliance)","Amazon GuardDuty":"Reactive (threat detection)"}}],"mnemonics":["CWCCAG = CloudWatch for health, CloudTrail for audit, Config for compliance, GuardDuty for threats"],"exam_tips":["CloudTrail logs WHO did WHAT in AWS - essential for security auditing","CloudWatch monitors HOW systems are PERFORMING","Enable CloudTrail in ALL regions for complete audit coverage","GuardDuty uses machine learning to detect threats without rules","Config rules can automatically remediate non-compliant resources"],"sources":["aws_exam_comparison_tables[kimi-agsw].json","aws_exam_comparison_tables[minimax-dr].json"]},{"title":"Serverless Compute Comparison","title_variants":["Serverless Compute Comparison"],"context":"AWS offers multiple serverless compute options that eliminate infrastructure management. Understanding when to use Lambda, Fargate, or App Runner helps design efficient serverless architectures.","columns":["AWS Lambda","AWS Fargate","AWS App Runner"],"rows":[{"feature":"Compute Model","values":{"AWS Lambda":"Function-as-a-Service (FaaS)","AWS Fargate":"Container-as-a-Service (CaaS)","AWS App Runner":"Application deployment service"}},{"feature":"Unit of Deployment","values":{"AWS Lambda":"Function (code package)","AWS Fargate":"Container image (Docker/OCI)","AWS App Runner":"Source code or container image"}},{"feature":"Runtime Support","values":{"AWS Lambda":"Multiple languages + custom runtime","AWS Fargate":"Any containerized application","AWS App Runner":"Python, Node.js, Java, .NET, Go, Ruby, PHP"}},{"feature":"Maximum Execution Time","values":{"AWS Lambda":"15 minutes (900 seconds)","AWS Fargate":"No limit (continuous running)","AWS App Runner":"No limit (continuous running)"}},{"feature":"Cold Start Latency","values":{"AWS Lambda":"100ms - 1s (can use Provisioned Concurrency)","AWS Fargate":"30-60 seconds (new task startup)","AWS App Runner":"Seconds to minutes (initial deployment)"}},{"feature":"Scaling Behavior","values":{"AWS Lambda":"Automatic, near-instant (1000 concurrent default)","AWS Fargate":"Service Auto Scaling (slower than Lambda)","AWS App Runner":"Automatic scaling with configurable limits"}},{"feature":"Pricing Model","values":{"AWS Lambda":"Per request + duration (GB-seconds)","AWS Fargate":"Per vCPU + memory per second","AWS App Runner":"Per vCPU + memory per hour + per request"}},{"feature":"VPC Networking","values":{"AWS Lambda":"Optional (adds cold start latency)","AWS Fargate":"Native VPC integration","AWS App Runner":"VPC Connector for private resources"}},{"feature":"Best Use Cases","values":{"AWS Lambda":"Event-driven, short tasks, APIs, data processing","AWS Fargate":"Long-running containers, microservices, batch jobs","AWS App Runner":"Web apps, APIs, rapid deployment from source"}},{"feature":"Infrastructure Control","values":{"AWS Lambda":"None (fully abstracted)","AWS Fargate":"Minimal (task definitions)","AWS App Runner":"None (fully managed)"}},{"feature":"Deployment Complexity","values":{"AWS Lambda":"Low (zip file or container image)","AWS Fargate":"Medium (requires ECS/EKS setup)","AWS App Runner":"Lowest (connect to GitHub or push container)"}}],"sources":["aws_exam_comparison_tables[kimi-agsw].json"]},{"title":"Specialty Databases Comparison","title_variants":["Specialty Databases Comparison"],"context":"AWS offers purpose-built databases for specialized workloads including graph data (Neptune), time-series data (Timestream), immutable ledgers (QLDB), and data warehousing (Redshift). Each service is optimized for specific data models and query patterns. Understanding their unique features, scaling models, and ideal use cases is essential for the Solutions Architect exam.","columns":["Neptune","Timestream","QLDB","Redshift"],"rows":[{"feature":"Database Type","values":{"Neptune":"Graph database","Timestream":"Time-series database","QLDB":"Ledger database","Redshift":"Data warehouse (columnar)"}},{"feature":"Data Model","values":{"Neptune":"Property graph and RDF (triples)","Timestream":"Time-series (timestamp, measure, dimensions)","QLDB":"Document (Amazon Ion format)","Redshift":"Relational (columnar storage)"}},{"feature":"Query Languages","values":{"Neptune":"Gremlin, SPARQL, openCypher","Timestream":"SQL with time-series extensions","QLDB":"PartiQL (SQL-compatible)","Redshift":"Standard SQL (PostgreSQL-compatible)"}},{"feature":"Consistency Model","values":{"Neptune":"Read-after-write consistency","Timestream":"Eventual consistency","QLDB":"Strong consistency (immutable history)","Redshift":"Strong consistency within cluster"}},{"feature":"Scaling Model","values":{"Neptune":"Instance-based (up to 15 read replicas)","Timestream":"Serverless (auto-scaling)","QLDB":"Serverless (auto-scaling)","Redshift":"Cluster-based (ra3 nodes), Concurrency Scaling, Serverless"}},{"feature":"Storage","values":{"Neptune":"Up to 64 TB per cluster, auto-scaling","Timestream":"Unlimited, magnetic store (S3-backed)","QLDB":"Unlimited, journal-backed","Redshift":"Managed storage (RA3 nodes up to 64 TB per node)"}},{"feature":"Data Immutability","values":{"Neptune":"No (mutable graph)","Timestream":"No (mutable with updates)","QLDB":"Yes (append-only, cryptographically verifiable)","Redshift":"No (standard CRUD operations)"}},{"feature":"Encryption","values":{"Neptune":"KMS encryption at rest, TLS in transit","Timestream":"KMS encryption at rest, TLS in transit","QLDB":"KMS encryption at rest, TLS in transit","Redshift":"KMS/AES-256 encryption at rest, SSL/TLS in transit"}},{"feature":"Availability","values":{"Neptune":"Multi-AZ (1 primary + replicas)","Timestream":"Multi-AZ built-in","QLDB":"Multi-AZ built-in (3 AZs)","Redshift":"Multi-AZ (RA3), Single-AZ (other node types)"}},{"feature":"Integration","values":{"Neptune":"S3, Lambda, OpenSearch, SageMaker","Timestream":"Grafana, Telegraf, Kinesis, IoT Core, SageMaker","QLDB":"Kinesis, Lambda, S3 (export)","Redshift":"S3, DynamoDB, RDS, Kinesis, EMR, QuickSight, SageMaker"}},{"feature":"Best Use Cases","values":{"Neptune":"Social networks, fraud detection, recommendation engines, knowledge graphs","Timestream":"IoT sensor data, application monitoring, operational metrics, DevOps telemetry","QLDB":"Financial transactions, supply chain, healthcare records (audit trails, compliance)","Redshift":"Data warehousing, BI/analytics, complex queries on large datasets"}}],"sources":["aws_exam_comparison_tables[kimi-agsw].json"]},{"title":"Storage Services: Object vs Block vs File","title_variants":["AWS Block, File, and Object Storage Comparison","Object vs Block vs File Storage","Storage Services: Object vs Block vs File"],"description":"Comparison of S3, EBS, EFS, and FSx storage types and their use cases","context":"Understanding the fundamental differences between AWS storage types is essential for the SAA-C03 exam. This comparison covers the three primary storage paradigms: Object (S3), Block (EBS/Instance Store), and File (EFS/FSx). Each serves different use cases, access patterns, and architectural requirements. Questions often test your ability to select the appropriate storage type based on data structure, access method, and integration needs.","category":"Storage / Performance","exam":"SAA-C03","domain":"Design High-Performing Architectures","table_id":"saa_d3_storage_types","columns":["Amazon S3","Amazon EBS","Amazon EFS","Amazon FSx","Instance Store (Block)"],"column_summaries":{"Amazon S3":"Amazon S3 is scalable object storage and is the default answer for durable object storage, static assets, backups, and data lakes. It is not mounted as block storage for a single instance like EBS.","Amazon EBS":"Amazon EBS is block storage for EC2 and is a strong fit for boot volumes and low-latency attached storage. Think single-instance attachment pattern first, not shared file system.","Amazon EFS":"Amazon EFS is a managed elastic file system that can be shared across many Linux-based compute resources. It fits when many instances or containers need shared file storage.","Amazon FSx":"Amazon FSx is a family of managed file systems optimized for specific workloads such as Windows or high-performance file use cases. In exam questions, it appears when generic EFS is not the best semantic fit."},"rows":[{"feature":"Max Storage Size","values":{"Amazon S3":"Object storage - files stored with metadata and unique ID","Amazon EBS":"Block storage - raw storage volumes with file systems","Amazon EFS":"File storage (NFS) - shared file system accessed via network","Amazon FSx":"File storage - multiple file system options (Windows, Lustre, etc.)","Instance Store (Block)":"Up to ~60 TiB (instance dependent)"}},{"feature":"Typical attachment model","values":{"Amazon S3":"Access via API","Amazon EBS":"Attach to EC2","Amazon EFS":"Mount shared filesystem","Amazon FSx":"Mount specialized managed filesystem"}},{"feature":"Best exam clue","values":{"Amazon S3":"Static content, backups, lakes, archives","Amazon EBS":"Boot volume, database volume, low-latency attached disk","Amazon EFS":"Shared POSIX-like file storage","Amazon FSx":"Need managed Windows or specialized file system behavior"}},{"feature":"Multi-instance sharing","values":{"Amazon S3":"No (single instance, io1/io2 Multi-Attach exception)","Amazon EBS":"Single EC2 instance only (except io2 Block Express)","Amazon EFS":"Multiple EC2 instances simultaneously","Amazon FSx":"Multiple compute instances simultaneously","Instance Store (Block)":"No (single instance only)"}},{"feature":"Elasticity style","values":{"Amazon S3":"Massively scalable objects","Amazon EBS":"Volume-centric","Amazon EFS":"Elastic shared file storage","Amazon FSx":"Managed capacity/performance tuned by workload"}},{"feature":"Common mistake","values":{"Amazon S3":"Treating it like a block disk","Amazon EBS":"Using it when many instances need shared files","Amazon EFS":"Using it where block storage latency pattern is needed","Amazon FSx":"Ignoring it when Windows file semantics are required"}},{"feature":"Access Method","values":{"Amazon S3 (Object)":"Mount targets via SMB (Windows) or NFS (Lustre) protocols","Amazon EBS (Block)":"Attached to single EC2 instance via network","Amazon EFS (File)":"NFS protocol (mountable by multiple instances)","Instance Store (Block)":"Directly attached to EC2 instance"}},{"feature":"Geographic Scope","values":{"Amazon S3 (Object)":"Regional (replicates across AZs)","Amazon EBS (Block)":"Single AZ only","Amazon EFS (File)":"Regional (across AZs)","Instance Store (Block)":"Single AZ only"}},{"feature":"Durability","values":{"Amazon S3 (Object)":"99.999999999% (11 nines)","Amazon EBS (Block)":"99.8% - 99.999% (volume type dependent)","Amazon EFS (File)":"99.999999999% (11 nines)","Instance Store (Block)":"Ephemeral (data lost on stop/terminate)"}},{"feature":"Latency","values":{"Amazon S3 (Object)":"Milliseconds (single-digit for Standard)","Amazon EBS (Block)":"Single-digit milliseconds (sub-ms for io2 BE)","Amazon EFS (File)":"Low (single-digit milliseconds)","Instance Store (Block)":"Microseconds (lowest)"}},{"feature":"Throughput","values":{"Amazon S3 (Object)":"Virtually unlimited","Amazon EBS (Block)":"Up to 4,000 MiB/s (io2 Block Express)","Amazon EFS (File)":"Up to 10+ GB/s (Provisioned mode)","Instance Store (Block)":"Up to 10+ GB/s (highest)"}},{"feature":"Pricing Model","values":{"Amazon S3 (Object)":"Per GB provisioned + provisioned IOPS (for IOPS tiers)","Amazon EBS (Block)":"Per GB provisioned (monthly)","Amazon EFS (File)":"Per GB used (Standard/IA tiers)","Instance Store (Block)":"Included in EC2 instance cost"}},{"feature":"Data Structure","values":{"Amazon S3 (Object)":"Flat namespace (buckets + keys)","Amazon EBS (Block)":"Raw blocks (requires file system)","Amazon EFS (File)":"Hierarchical (directories, files, permissions)","Instance Store (Block)":"Raw blocks (requires file system)"}},{"feature":"Backup/Snapshot","values":{"Amazon S3 (Object)":"Versioning, Cross-Region Replication","Amazon EBS (Block)":"EBS Snapshots to S3","Amazon EFS (File)":"EFS Backup, AWS Backup","Instance Store (Block)":"Must backup to persistent storage"}},{"feature":"Best Use Cases","values":{"Amazon S3 (Object)":"Data lake, backups, static websites, app data, ML training data","Amazon EBS (Block)":"Databases, boot volumes, applications needing file systems","Amazon EFS (File)":"Shared storage, content management, container persistence","Instance Store (Block)":"Temporary cache, buffers, high-IOPS scratch space"}},{"feature":"Scaling","values":{"Amazon S3":"Virtually unlimited (PETABYTES+ supported)","Amazon EBS":"Single volume up to 64 TiB (io2 Block Express)","Amazon EFS":"Elastic - grows and shrinks automatically (PETABYTES)","Amazon FSx":"Fixed capacity with manual scaling (100s of TiB)"}},{"f
