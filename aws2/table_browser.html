eature":"Persistence","values":{"Amazon S3":"Data persists until explicitly deleted","Amazon EBS":"Data persists independently of EC2 instance lifecycle","Amazon EFS":"Data persists; independent of EC2 lifecycle","Amazon FSx":"Data persists; independent of compute lifecycle"}},{"feature":"Typical Exam Scenario","values":{"Amazon S3":"Static website hosting, S3 Glacier archiving, data lake with Athena","Amazon EBS":"Root volume for EC2, RDS storage, high-performance databases","Amazon EFS":"Shared file storage for containers, ML training data sharing","Amazon FSx":"High-performance ML training (FSx for Lustre), Windows file shares"}}],"mnemonics":["S.E.E.F - S3 is Simple (object), EBS is Essential (block), EFS is Excellent (file sharing), FSx is Fabulous (specialized file systems)"],"exam_tips":["S3 is NOT a file system - you cannot mount it as a drive; use EFS or FSx for that","EBS volumes are AZ-specific; use Snapshot + another AZ or use EFS/FSx for multi-AZ access","EFS is more expensive than S3 but provides lower latency for shared file access","FSx for Lustre integrates with S3 and provides high-throughput for ML training workloads","Storage Gateway is for hybrid scenarios connecting on-premises to S3-backed storage"],"why_this_table_matters":"SAA Domain 3 and Domain 4 expect strong intuition about object, block, and file storage. This table maps the classic exam question: which storage service matches the access pattern.","sources":["aws_exam_comparison_tables[gpt5].json","aws_exam_comparison_tables[kimi-agsw].json","aws_exam_comparison_tables[minimax].json"]},{"title":"Streaming Services Comparison","title_variants":["Streaming Data Services Comparison","Streaming Services Comparison"],"description":"Comparing AWS services for real-time data streaming and processing","context":"AWS offers multiple services for real-time data streaming and processing. Kinesis Data Streams provides low-latency data ingestion, Firehose handles data delivery to destinations, Data Analytics enables real-time SQL/Flink processing, Video Streams is for video ingestion, and MSK offers managed Kafka. Understanding latency, scalability, and use cases is critical for the exam.","category":"Analytics & Integration Services","exam":"Both (SAA-C03 Primary, AIF-C01 Reference)","columns":["Kinesis Data Streams","Kinesis Data Firehose","Kinesis Data Analytics","Kinesis Video Streams","MSK (Managed Kafka)","Amazon MSK"],"column_summaries":{"Amazon Kinesis Data Streams":"A massively scalable and durable real-time data streaming service that can continuously capture gigabytes of data per second from hundreds of thousands of sources."},"rows":[{"feature":"Primary Purpose","values":{"Kinesis Data Streams":"Real-time data ingestion","Kinesis Data Firehose":"Data delivery to destinations","Kinesis Data Analytics":"Real-time stream processing","Kinesis Video Streams":"Video stream ingestion","MSK (Managed Kafka)":"Managed Apache Kafka service"}},{"feature":"Latency","values":{"Kinesis Data Streams":"~200ms (real-time)","Kinesis Data Firehose":"60 seconds minimum (near real-time)","Kinesis Data Analytics":"Sub-second processing","Kinesis Video Streams":"Low latency for video","MSK (Managed Kafka)":"Millisecond to seconds"}},{"feature":"Data Retention","values":{"Kinesis Data Streams":"No retention (immediate delivery)","Kinesis Data Firehose":"None (transient buffer)","Kinesis Data Analytics":"None (processing only)","Kinesis Video Streams":"1 hour to 10 years","MSK (Managed Kafka)":"Configurable (Kafka retention)","Amazon MSK":"Configurable (hours to unlimited)"}},{"feature":"Scaling Model","values":{"Kinesis Data Streams":"Manual shard splitting/merging","Kinesis Data Firehose":"Automatic scaling","Kinesis Data Analytics":"KPU (Kinesis Processing Units)","Kinesis Video Streams":"Automatic scaling","MSK (Managed Kafka)":"Broker nodes (manual)","Amazon MSK":"Automatic broker scaling (via partitions)"}},{"feature":"Destinations","values":{"Kinesis Data Streams":"Consumer applications (Lambda, EC2, etc.)","Kinesis Data Firehose":"S3, Redshift, OpenSearch, Splunk, HTTP","Kinesis Data Analytics":"Kinesis Streams, Firehose, Lambda","Kinesis Video Streams":"S3, SageMaker, Rekognition","MSK (Managed Kafka)":"Any Kafka consumer"}},{"feature":"Processing Capability","values":{"Kinesis Data Streams":"No custom processing (Lambda transforms)","Kinesis Data Firehose":"Lightweight (Lambda transform)","Kinesis Data Analytics":"Full SQL and Apache Flink","Kinesis Video Streams":"None (ingestion only)","MSK (Managed Kafka)":"Via Kafka Streams, Flink, etc.","Amazon MSK":"Use Kafka ecosystem tools"}},{"feature":"Pricing Model","values":{"Kinesis Data Streams":"Per shard-hour + PUT payload units","Kinesis Data Firehose":"Per GB ingested + format conversion","Kinesis Data Analytics":"Per KPU-hour used","Kinesis Video Streams":"Per GB ingested + storage","MSK (Managed Kafka)":"Per broker-hour + storage + data transfer"}},{"feature":"Best Use Case","values":{"Kinesis Data Streams":"Load data to S3, Redshift, Elasticsearch","Kinesis Data Firehose":"Load streaming data to data stores","Kinesis Data Analytics":"Real-time analytics, aggregations","Kinesis Video Streams":"Video analytics, live streaming","MSK (Managed Kafka)":"Kafka-compatible workloads","Amazon MSK":"Kafka-based streaming applications"}},{"feature":"Management Level","values":{"Amazon Kinesis Data Streams":"Managed streaming (you manage shards)","Amazon Kinesis Data Firehose":"Fully managed delivery (no shards)","Amazon MSK":"Managed Kafka (you manage topics)"}}],"mnemonics":["KFD = Kinesis for custom, Firehose for loading, MSK for Kafka lovers"],"exam_tips":["Kinesis Data Streams requires managing shards - more control but more complexity","Firehose is simpler - it automatically delivers to destinations (S3, Redshift, ES)","MSK is for teams already familiar with Apache Kafka","Kinesis Data Analytics can process streaming data with SQL","Kinesis is NOT for message queuing - use SQS for that"],"sources":["aws_exam_comparison_tables[kimi-agsw].json","aws_exam_comparison_tables[minimax-dr].json"]},{"title":"Supervised vs Unsupervised vs Reinforcement Learning","title_variants":["Supervised vs Unsupervised vs Reinforcement Learning"],"context":"These three learning paradigms describe HOW a model learns from data. The exam will present a business scenario and ask you to identify which type of ML is appropriate. The key differentiator is the data: does it have labels? If yes — supervised. If no labels — unsupervised. If the system learns by trial and reward — reinforcement.","exam":"AIF-C01","domain":"Domain 1: Fundamentals of AI and ML","domain_weight":"20%","table_id":"AIF-002","columns":["Supervised Learning","Unsupervised Learning","Reinforcement Learning"],"column_summaries":{"Supervised Learning":"The model is trained on labeled data — inputs paired with correct outputs. Think of it as learning with a teacher who corrects you: you see a dog photo labeled 'dog,' and over thousands of examples, the model learns to recognize dogs.","Unsupervised Learning":"The model finds patterns in unlabeled data on its own — no correct answers are provided. It discovers hidden structure, like grouping customers by purchasing behavior without being told what the groups should be.","Reinforcement Learning":"The model learns by taking actions in an environment and receiving rewards or penalties, like training a dog with treats. It maximizes long-term rewards through trial and error — used in robotics, games, and recommendation systems."},"rows":[{"feature":"Data Type","values":{"Supervised Learning":"Labeled data (input + correct output)","Unsupervised Learning":"Unlabeled data (inputs only)","Reinforcement Learning":"No dataset — agent interacts with environment"}},{"feature":"Goal","values":{"Supervised Learning":"Learn to map inputs to known outputs","Unsupervised Learning":"Discover hidden patterns or groupings","Reinforcement Learning":"Maximize cumulative reward over time"}},{"feature":"Techniques","values":{"Supervised Learning":"Regression, Classification","Unsupervised Learning":"Clustering, Dimensionality Reduction, Anomaly Detection","Reinforcement Learning":"Q-learning, Policy Gradient, RLHF"}},{"feature":"AWS Example Use Case","values":{"Supervised Learning":"Amazon Fraud Detector (fraud/not fraud), Amazon Rekognition (face identification)","Unsupervised Learning":"Amazon Personalize (recommendation groupings), customer segmentation","Reinforcement Learning":"RLHF in Amazon Bedrock fine-tuning, robotics optimization"}},{"feature":"Business Example","values":{"Supervised Learning":"Email spam detection (spam/not spam labels provided)","Unsupervised Learning":"Customer segmentation for marketing","Reinforcement Learning":"Self-driving car learns driving by reward signals"}},{"feature":"Feedback","values":{"Supervised Learning":"Immediate — correct label known at training time","Unsupervised Learning":"None — model self-organizes","Reinforcement Learning":"Delayed reward signal from environment"}}],"sources":["aws_exam_comparison_tables[sonnet46].json"]},{"title":"Threat Detection and Application Protection","title_variants":["Threat Detection and Application Protection"],"category":"Security / Protection","exam":"SAA-C03","domain":"Design Secure Architectures","table_id":"saa_d1_security_services","columns":["Amazon GuardDuty","Amazon Macie","AWS WAF","AWS Shield"],"column_summaries":{"Amazon GuardDuty":"GuardDuty is a threat detection service that analyzes signals like logs and activity patterns to flag suspicious behavior. For the exam, think compromised credentials, unusual API activity, or potentially malicious network behavior.","Amazon Macie":"Macie focuses on discovering and helping protect sensitive data in Amazon S3, especially PII and data classification use cases. When the question smells like 'find sensitive data in buckets,' Macie is the answer.","AWS WAF":"AWS WAF filters web requests at the application layer and is commonly used against things like SQL injection and bad HTTP patterns. It is your exam-friendly Layer 7 web filter.","AWS Shield":"AWS Shield is about DDoS protection, especially for internet-facing resources. When the attack is volumetric or availability-focused, Shield enters the scene."},"rows":[{"feature":"Protects against / detects","values":{"Amazon GuardDuty":"Suspicious account and workload activity","Amazon Macie":"Sensitive data exposure in S3","AWS WAF":"Malicious web requests and Layer 7 patterns","AWS Shield":"DDoS attacks"}},{"feature":"Best fit","values":{"Amazon GuardDuty":"Threat detection across accounts and workloads","Amazon Macie":"Data discovery and classification","AWS WAF":"Protecting web apps and APIs","AWS Shield":"Hardening public endpoints against flooding attacks"}},{"feature":"Typical exam clue","values":{"Amazon GuardDuty":"Compromised credentials, anomalous behavior","Amazon Macie":"PII in S3, data governance","AWS WAF":"Block SQL injection, bot-like or abusive HTTP requests","AWS Shield":"Need DDoS mitigation"}},{"feature":"Traffic path dependency","values":{"Amazon GuardDuty":"No web proxy role","Amazon Macie":"No request filtering role","AWS WAF":"Evaluates web requests","AWS Shield":"Protects internet-facing availability"}},{"feature":"Data awareness","values":{"Amazon GuardDuty":"Behavior-focused","Amazon Macie":"Content-focused","AWS WAF":"Request-pattern-focused","AWS Shield":"Attack-volume-focused"}},{"feature":"Common mix-up","values":{"Amazon GuardDuty":"Not a firewall","Amazon Macie":"Not a threat detector for APIs","AWS WAF":"Not a data classification tool","AWS Shield":"Not a replacement for WAF"}}],"why_this_table_matters":"SAA Domain 1 calls out security services for workloads and applications. This table helps you quickly map whether the threat is about malicious traffic, DDoS, sensitive data discovery, or threat detection.","sources":["aws_exam_comparison_tables[gpt5].json"]},{"title":"VPC Components Comparison","title_variants":["VPC Components Comparison"],"context":"VPC components enable private connectivity, internet access, and network segmentation within AWS. Understanding the differences between VPC endpoints, NAT options, and VPC connectivity methods is essential for designing secure and cost-effective network architectures.","columns":["VPC Gateway Endpoint","VPC Interface Endpoint","NAT Gateway","NAT Instance","VPC Peering","Transit Gateway","VPC Sharing"],"rows":[{"feature":"Purpose","values":{"VPC Gateway Endpoint":"Private access to S3 and DynamoDB","VPC Interface Endpoint":"Private access to most AWS services + third-party","NAT Gateway":"Outbound internet access from private subnets","NAT Instance":"Outbound internet access from private subnets (legacy)","VPC Peering":"Direct VPC-to-VPC connectivity","Transit Gateway":"Hub-and-spoke VPC and network connectivity","VPC Sharing":"Share VPC across multiple AWS accounts"}},{"feature":"OSI Layer","values":{"VPC Gateway Endpoint":"Layer 3 (uses route table)","VPC Interface Endpoint":"Layer 3/4 (uses ENI with private IP)","NAT Gateway":"Layer 3/4","NAT Instance":"Layer 3/4","VPC Peering":"Layer 3","Transit Gateway":"Layer 3","VPC Sharing":"N/A (resource sharing)"}},{"feature":"Availability Zones","values":{"VPC Gateway Endpoint":"Highly available across all AZs automatically","VPC Interface Endpoint":"One ENI per AZ you specify","NAT Gateway":"One per AZ (not highly available across AZs)","NAT Instance":"One per AZ (requires HA setup)","VPC Peering":"N/A (connection-level)","Transit Gateway":"Highly available across all AZs","VPC Sharing":"N/A (resource sharing)"}},{"feature":"Bandwidth","values":{"VPC Gateway Endpoint":"No bandwidth limit (scales automatically)","VPC Interface Endpoint":"Up to 10 Gbps per AZ (burstable)","NAT Gateway":"Up to 45 Gbps (burstable)","NAT Instance":"Depends on EC2 instance size","VPC Peering":"No bandwidth limit","Transit Gateway":"Up to 50 Gbps per attachment","VPC Sharing":"N/A"}},{"feature":"Pricing Model","values":{"VPC Gateway Endpoint":"Free (no hourly charge, data transfer only)","VPC Interface Endpoint":"Hourly per ENI + data processed","NAT Gateway":"Hourly per NAT GW + data processing charge","NAT Instance":"EC2 instance cost only","VPC Peering":"Data transfer charge only (no hourly fee)","Transit Gateway":"Hourly per attachment + data processed","VPC Sharing":"No additional charge"}},{"feature":"Highly Available","values":{"VPC Gateway Endpoint":"Yes (automatic)","VPC Interface Endpoint":"Yes (with multiple AZs)","NAT Gateway":"No (per AZ, need multiple for HA)","NAT Instance":"No (requires manual HA setup)","VPC Peering":"Yes (uses AWS backbone)","Transit Gateway":"Yes (multi-AZ by default)","VPC Sharing":"N/A"}},{"feature":"Setup Complexity","values":{"VPC Gateway Endpoint":"Simple (add route to route table)","VPC Interface Endpoint":"Moderate (ENI per AZ + security groups)","NAT Gateway":"Simple (replace route in route table)","NAT Instance":"Complex (EC2 setup, scripts for HA)","VPC Peering":"Simple (accept connection, update routes)","Transit Gateway":"Moderate (create attachments, update routes)","VPC Sharing":"Moderate (RAM setup, IAM permissions)"}},{"feature":"Cross-Region Support","values":{"VPC Gateway Endpoint":"No (single region only)","VPC Interface Endpoint":"No (single region only)","NAT Gateway":"No (single region only)","NAT Instance":"No (single region only)","VPC Peering":"Yes (inter-region peering available)","Transit Gateway":"Yes (inter-region peering)","VPC Sharing":"No (same region only)"}},{"feature":"Transitive Routing","values":{"VPC Gateway Endpoint":"N/A","VPC Interface Endpoint":"N/A","NAT Gateway":"N/A","NAT Instance":"N/A","VPC Peering":"No (not transitive)","Transit Gateway":"Yes (fully transitive)","VPC Sharing":"N/A"}},{"feature":"Security Groups Supported","values":{"VPC Gateway Endpoint":"No (uses endpoint policies only)","VPC Interface Endpoint":"Yes (security groups on ENIs)","NAT Gateway":"N/A","NAT Instance":"Yes (security groups on EC2)","VPC Peering":"N/A (separate SGs per VPC)","Transit Gateway":"N/A (separate SGs per VPC)","VPC Sharing":"N/A"}},{"feature":"Overlapping CIDRs","values":{"VPC Gateway Endpoint":"N/A","VPC Interface Endpoint":"N/A","NAT Gateway":"N/A","NAT Instance":"N/A","VPC Peering":"No (CIDRs must not overlap)","Transit Gateway":"No (CIDRs must not overlap)","VPC Sharing":"N/A"}},{"feature":"Services Supported","values":{"VPC Gateway Endpoint":"S3 and DynamoDB only","VPC Interface Endpoint":"Most AWS services + AWS Marketplace services","NAT Gateway":"All internet services (outbound only)","NAT Instance":"All internet services (outbound only)","VPC Peering":"All services in peered VPCs","Transit Gateway":"All services in attached VPCs","VPC Sharing":"All services in shared VPC"}},{"feature":"AWS Recommendation","values":{"VPC Gateway Endpoint":"Recommended for S3/DynamoDB (free)","VPC Interface Endpoint":"Recommended for other services","NAT Gateway":"Recommended over NAT Instances","NAT Instance":"Not recommended (use NAT Gateway)","VPC Peering":"Use for simple 2-VPC connections","Transit Gateway":"Recommended for 3+ VPCs","VPC Sharing":"Use for centralized network management"}}],"sources":["aws_exam_comparison_tables[kimi-agsw].json"]},{"title":"VPC Endpoints Comparison","title_variants":["VPC Endpoints Comparison"],"description":"Comparison of VPC Gateway Endpoints vs Interface Endpoints for private access to AWS services","category":"NETWORKING_SERVICES","columns":["Gateway Endpoint","Interface Endpoint"],"column_summaries":{"Gateway Endpoint":"A VPC endpoint that routes traffic to S3 or DynamoDB through AWS's internal network without traversing the internet, using route table entries.","Interface Endpoint":"An VPC endpoint powered by AWS PrivateLink that creates an elastic network interface with a private IP address for accessing AWS services."},"rows":[{"feature":"Services Supported","values":{"Gateway Endpoint":"S3 and DynamoDB only","Interface Endpoint":"70+ AWS services including S3, DynamoDB, Kinesis, SNS, SQS, and many others"}},{"feature":"Connection Method","values":{"Gateway Endpoint":"Route table entries - no network interface created","Interface Endpoint":"Elastic Network Interface (ENI) with private IP in subnet"}},{"feature":"Traffic Routing","values":{"Gateway Endpoint":"Via gateway prefix list in route table","Interface Endpoint":"Via ENI with private IP address"}},{"feature":"Access Control","values":{"Gateway Endpoint":"IAM policies + bucket/volume policies","Interface Endpoint":"Security groups attached to ENI + IAM policies"}},{"feature":"Pricing","values":{"Gateway Endpoint":"No additional charge","Interface Endpoint":"Per hour + per GB data processed"}},{"feature":"Availability","values":{"Gateway Endpoint":"Regional - access from any AZ without additional cost","Interface Endpoint":"AZ-specific (one per AZ recommended for HA) + cross-AZ charges"}},{"feature":"DNS Configuration","values":{"Gateway Endpoint":"Uses public DNS with endpoint URL","Interface Endpoint":"Can use private DNS to override public endpoints"}},{"feature":"Use Case","values":{"Gateway Endpoint":"Simple, cost-effective private access to S3 or DynamoDB","Interface Endpoint":"Private access to services requiring ENI, or when gateway endpoint unavailable"}},{"feature":"VPC Endpoint Services","values":{"Gateway Endpoint":"Uses prefix lists (target for routes)","Interface Endpoint":"Powered by AWS PrivateLink; enables custom endpoint services"}}],"mnemonics":["G.I - Gateway for Internal (S3/DynamoDB) free, Interface for more services"],"exam_tips":["Gateway endpoints are FREE - always prefer them for S3 and DynamoDB when possible","Interface endpoints are required for services other than S3 and DynamoDB","Both endpoints keep traffic within AWS network, avoiding internet traversal","Interface endpoints support private DNS which can override public service endpoints","For high availability with interface endpoints, create one per AZ","Gateway endpoints use prefix lists in route tables - not security groups"],"sources":["aws_exam_comparison_tables[minimax].json"]},{"title":"Vector Databases for RAG Comparison","title_variants":["Vector Databases for RAG Comparison"],"context":"Retrieval Augmented Generation (RAG) architectures require vector databases to store and search embeddings. AWS offers multiple database services that support vector storage and similarity search. Amazon OpenSearch Service provides full-text search with vector capabilities. Amazon Aurora with pgvector adds vector support to PostgreSQL. Amazon Neptune is a graph database with vector search. Amazon DocumentDB supports vector search for document databases. Understanding the differences helps architects choose the right service for their RAG implementation.","columns":["OpenSearch Service","Aurora with pgvector","Amazon Neptune","Amazon DocumentDB"],"rows":[{"feature":"Primary Database Type","values":{"OpenSearch Service":"Search and analytics engine","Aurora with pgvector":"Relational database (PostgreSQL)","Amazon Neptune":"Graph database","Amazon DocumentDB":"Document database (MongoDB-compatible)"}},{"feature":"Vector Storage Method","values":{"OpenSearch Service":"k-NN plugin for vector fields","Aurora with pgvector":"pgvector extension for vector columns","Amazon Neptune":"Vector search with graph embeddings","Amazon DocumentDB":"Vector search for document embeddings"}},{"feature":"Similarity Metrics","values":{"OpenSearch Service":"Cosine, Euclidean, Dot Product, L1, L-inf","Aurora with pgvector":"Cosine, Euclidean, Inner Product, L1","Amazon Neptune":"Cosine, Euclidean, Dot Product","Amazon DocumentDB":"Cosine, Euclidean"}},{"feature":"Index Types for Vectors","values":{"OpenSearch Service":"HNSW, IVF, Lucene k-NN","Aurora with pgvector":"HNSW, IVFFlat indexing","Amazon Neptune":"In-memory vector indexing","Amazon DocumentDB":"Vector indexes (IVF, HNSW)"}},{"feature":"Max Vector Dimensions","values":{"OpenSearch Service":"Up to 16,000 dimensions","Aurora with pgvector":"Up to 16,000 dimensions","Amazon Neptune":"Up to 65,535 dimensions","Amazon DocumentDB":"Up to 2,000 dimensions"}},{"feature":"Hybrid Search (Text + Vector)","values":{"OpenSearch Service":"Excellent - native text search + k-NN","Aurora with pgvector":"Good - Full-text search + vector","Amazon Neptune":"Good - Graph traversals + vector","Amazon DocumentDB":"Limited - Basic text + vector"}},{"feature":"Use with Bedrock","values":{"OpenSearch Service":"Native integration via Knowledge Bases","Aurora with pgvector":"Supported via Knowledge Bases","Amazon Neptune":"Supported via Knowledge Bases","Amazon DocumentDB":"Supported via Knowledge Bases"}},{"feature":"Best Use Case","values":{"OpenSearch Service":"Full-text search with semantic capabilities, log analytics with RAG","Aurora with pgvector":"Existing PostgreSQL apps adding RAG, transactional + vector workloads","Amazon Neptune":"Knowledge graphs with semantic search, relationship-aware RAG","Amazon DocumentDB":"Document-centric RAG, JSON data with embeddings"}},{"feature":"Scaling Options","values":{"OpenSearch Service":"Horizontal (nodes) + Vertical (instance types)","Aurora with pgvector":"Aurora Serverless v2 auto-scaling","Amazon Neptune":"Read replicas, cluster scaling","Amazon DocumentDB":"Horizontal scaling with replicas"}},{"feature":"Pricing Model","values":{"OpenSearch Service":"Instance-based + storage","Aurora with pgvector":"Aurora pricing (ACU-based for Serverless)","Amazon Neptune":"Instance-based + I/O charges","Amazon DocumentDB":"Instance-based + storage + I/O"}},{"feature":"Exam Relevance","values":{"OpenSearch Service":"High - Most common for RAG","Aurora with pgvector":"High - PostgreSQL familiarity","Amazon Neptune":"Medium - Graph-specific scenarios","Amazon DocumentDB":"Low-Medium - Document use cases"}}],"sources":["aws_exam_comparison_tables[kimi-agsw].json"]},{"title":"Vector Store Options Mentioned by the Exam Guide","title_variants":["Vector Store Options Mentioned by the Exam Guide"],"category":"Foundation Models / Retrieval","exam":"AIF-C01","domain":"Applications of Foundation Models","table_id":"aif_d3_vector_store_options","columns":["Amazon OpenSearch Service","Amazon Aurora / RDS for PostgreSQL","Amazon Neptune","Amazon DocumentDB"],"column_summaries":{"Amazon OpenSearch Service":"OpenSearch Service is a strong search-oriented option for embeddings and retrieval experiences. On the exam, it is the natural pick when search and relevance are first-class concerns.","Amazon Aurora / RDS for PostgreSQL":"Aurora or RDS for PostgreSQL can support vector-style retrieval while staying inside relational patterns. They fit when the app already leans relational and wants to extend that architecture.","Amazon Neptune":"Neptune is graph-oriented and can be attractive when relationships between entities matter deeply. It is less about being the default vector answer and more about relationship-rich knowledge structures.","Amazon DocumentDB":"DocumentDB fits document-oriented application patterns and can be part of retrieval-oriented designs when document data models already dominate. It is not the default answer for every vector problem, but it can align well with document-centric apps."},"rows":[{"feature":"Architectural bias","values":{"Amazon OpenSearch Service":"Search-first","Amazon Aurora / RDS for PostgreSQL":"Relational-first","Amazon Neptune":"Graph-first","Amazon DocumentDB":"Document-first"}},{"feature":"Best exam clue","values":{"Amazon OpenSearch Service":"Semantic search / retrieval experience","Amazon Aurora / RDS for PostgreSQL":"Stay in relational architecture while adding embeddings","Amazon Neptune":"Knowledge graph or relationship-heavy reasoning","Amazon DocumentDB":"Document-centric application context"}},{"feature":"Strength lens","values":{"Amazon OpenSearch Service":"Search relevance","Amazon Aurora / RDS for PostgreSQL":"SQL and app continuity","Amazon Neptune":"Connected-entity modeling","Amazon DocumentDB":"Flexible document data model"}},{"feature":"Great for","values":{"Amazon OpenSearch Service":"Search-heavy RAG","Amazon Aurora / RDS for PostgreSQL":"Apps already built around relational data","Amazon Neptune":"Graph-rich knowledge representation","Amazon DocumentDB":"Document-centric retrieval patterns"}},{"feature":"Common trap","values":{"Amazon OpenSearch Service":"Assuming every vector use case must use search engine first","Amazon Aurora / RDS for PostgreSQL":"Forgetting vector retrieval can live in relational workflows","Amazon Neptune":"Choosing graph when relationships are not core","Amazon DocumentDB":"Choosing document DB when search relevance is the primary requirement"}}],"why_this_table_matters":"AIF Domain 3 explicitly mentions several AWS-backed storage options for embeddings in retrieval workflows. This table helps compare search-first, relational, graph, and document-oriented choices.","sources":["aws_exam_comparison_tables[gpt5].json"]},{"title":"Vision AI Services Comparison","title_variants":["Vision AI Services Comparison"],"context":"AWS offers multiple services for computer vision and document processing tasks. Amazon Rekognition provides image and video analysis for object detection, facial recognition, and content moderation. Amazon Textract extracts text and data from documents including forms and tables. Amazon HealthLake Imaging provides medical imaging storage and analysis. Each service is optimized for specific vision-related use cases and has different capabilities for customization and integration.","columns":["Amazon Rekognition","Amazon Textract","Amazon HealthLake Imaging"],"rows":[{"feature":"Primary Purpose","values":{"Amazon Rekognition":"Analyze images and videos for content","Amazon Textract":"Extract text and data from documents","Amazon HealthLake Imaging":"Store and analyze medical DICOM images"}},{"feature":"Input Types","values":{"Amazon Rekognition":"Images (JPG, PNG) and Videos (MOV, MP4)","Amazon Textract":"Documents (PDF, TIFF, JPG, PNG)","Amazon HealthLake Imaging":"DICOM format medical images"}},{"feature":"Key Capabilities","values":{"Amazon Rekognition":"Object detection, facial analysis, text detection, content moderation, celebrity recognition","Amazon Textract":"OCR, form extraction, table extraction, handwriting recognition, query-based extraction","Amazon HealthLake Imaging":"DICOM import, image transformation, metadata indexing, HIPAA-compliant storage"}},{"feature":"Customization Options","values":{"Amazon Rekognition":"Custom Labels for custom object detection","Amazon Textract":"Custom queries, adapter-based customization","Amazon HealthLake Imaging":"Limited - primarily storage and retrieval"}},{"feature":"API Type","values":{"Amazon Rekognition":"Synchronous and Asynchronous APIs","Amazon Textract":"Synchronous (single page) and Asynchronous (multi-page)","Amazon HealthLake Imaging":"RESTful APIs for imaging operations"}},{"feature":"Data Privacy/Compliance","values":{"Amazon Rekognition":"Supports VPC, encryption at rest/transit","Amazon Textract":"HIPAA eligible, SOC compliant","Amazon HealthLake Imaging":"HIPAA compliant, designed for PHI"}},{"feature":"Integration Points","values":{"Amazon Rekognition":"S3, Kinesis Video Streams, SNS","Amazon Textract":"S3, SNS, Amazon A2I (human review)","Amazon HealthLake Imaging":"HealthLake, S3, IAM"}},{"feature":"Pricing Model","values":{"Amazon Rekognition":"Per-image or per-minute video pricing","Amazon Textract":"Per-page pricing by feature type","Amazon HealthLake Imaging":"Storage + API request charges"}},{"feature":"Best Use Case","values":{"Amazon Rekognition":"Content moderation, facial recognition, scene detection","Amazon Textract":"Invoice processing, form digitization, document analysis","Amazon HealthLake Imaging":"Medical imaging archives, radiology workflows"}},{"feature":"Exam Relevance","values":{"Amazon Rekognition":"High - Know Custom Labels vs built-in","Amazon Textract":"High - OCR alternative, form extraction","Amazon HealthLake Imaging":"Medium - Healthcare-specific scenarios"}}],"sources":["aws_exam_comparison_tables[kimi-agsw].json"]},{"title":"Workflow Orchestration Comparison: Step Functions (Standard vs Express) vs SWF","title_variants":["Workflow Orchestration Comparison: Step Functions (Standard vs Express) vs SWF"],"context":"AWS Step Functions provides workflow orchestration for distributed applications and microservices. It offers two workflow types optimized for different use cases. Amazon SWF is a legacy service that may appear on exams for migration scenarios. Understanding the differences in execution model, duration limits, and pricing helps select the appropriate service for business processes.","columns":["Step Functions Standard","Step Functions Express","Amazon SWF (Legacy)"],"rows":[{"feature":"Max Execution Duration","values":{"Step Functions Standard":"Up to 1 year","Step Functions Express":"Up to 5 minutes","Amazon SWF (Legacy)":"Up to 1 year"}},{"feature":"Execution Model","values":{"Step Functions Standard":"Durable, exactly-once execution","Step Functions Express":"At-least-once execution (idempotent design needed)","Amazon SWF (Legacy)":"Durable execution with decision tasks"}},{"feature":"State Transitions","values":{"Step Functions Standard":"Unlimited within duration","Step Functions Express":"Unlimited within duration","Amazon SWF (Legacy)":"Unlimited within duration"}},{"feature":"Pricing Model","values":{"Step Functions Standard":"Per state transition ($0.025 per 1,000 transitions)","Step Functions Express":"Per execution + duration ($1.00 per million + GB-seconds)","Amazon SWF (Legacy)":"Per workflow execution + decision tasks"}},{"feature":"Execution Rate","values":{"Step Functions Standard":"Up to 2,000 executions/second","Step Functions Express":"Up to 100,000 executions/second","Amazon SWF (Legacy)":"Lower throughput limits"}},{"feature":"Execution History","values":{"Step Functions Standard":"Full history retained (90 days)","Step Functions Express":"CloudWatch Logs only (configurable)","Amazon SWF (Legacy)":"Full history available"}},{"feature":"Error Handling","values":{"Step Functions Standard":"Retry logic, catchers, Dead Letter Queues","Step Functions Express":"Retry logic, catchers, CloudWatch Logs","Amazon SWF (Legacy)":"Manual error handling in deciders"}},{"feature":"Wait States","values":{"Step Functions Standard":"Free (no charge during wait)","Step Functions Express":"Billed for duration (including wait time)","Amazon SWF (Legacy)":"Billed for active workflows"}},{"feature":"Service Integration","values":{"Step Functions Standard":"AWS SDK integration (200+ services), Lambda, nested workflows","Step Functions Express":"AWS SDK integration, Lambda, nested workflows","Amazon SWF (Legacy)":"Activity workers and deciders (manual integration)"}},{"feature":"Visual Workflow","values":{"Step Functions Standard":"Built-in visual editor and execution graph","Step Functions Express":"Built-in visual editor and execution graph","Amazon SWF (Legacy)":"No native visual workflow"}},{"feature":"Use Cases","values":{"Step Functions Standard":"Order processing, data pipelines, human approval workflows","Step Functions Express":"IoT data ingestion, streaming processing, microservice orchestration","Amazon SWF (Legacy)":"Legacy applications (migrate to Step Functions)"}},{"feature":"Exam Relevance","values":{"Step Functions Standard":"Primary choice for durable workflows","Step Functions Express":"High-volume, short-duration processing","Amazon SWF (Legacy)":"Know it exists for migration questions only"}}],"sources":["aws_exam_comparison_tables[kimi-agsw].json"]},{"title":"Zero-Shot vs One-Shot vs Few-Shot Prompting","title_variants":["Zero-Shot vs One-Shot vs Few-Shot Prompting"],"context":"These three prompt engineering techniques differ only in HOW MANY EXAMPLES you include in the prompt. The exam will describe a prompting scenario and ask you to name the technique. Zero = no examples, One = one example, Few = multiple examples. More examples generally yield better results but use more tokens.","exam":"AIF-C01","domain":"Domain 3: Applications of Foundation Models","domain_weight":"28%","table_id":"AIF-007","columns":["Zero-Shot Prompting","One-Shot Prompting","Few-Shot Prompting"],"column_summaries":{"Zero-Shot Prompting":"You give the model ONLY the instruction and input with no examples — you rely entirely on the model's pre-trained knowledge to figure out what you want. It works well for simple tasks or highly capable models but may fail for specialized formats.","One-Shot Prompting":"You provide exactly ONE example of the desired input-output pattern before your actual request. This single example dramatically improves the model's understanding of what format or style you expect, at the cost of additional tokens.","Few-Shot Prompting":"You provide MULTIPLE examples (typically 3 to 10) of input-output pairs before your request. This is the most reliable technique for teaching the model a specific pattern, format, or task, and is widely used in production systems."},"rows":[{"feature":"Examples Provided","values":{"Zero-Shot Prompting":"0 examples","One-Shot Prompting":"1 example","Few-Shot Prompting":"3-10 examples (sometimes more)"}},{"feature":"Token Cost","values":{"Zero-Shot Prompting":"Lowest — shortest prompt","One-Shot Prompting":"Medium — one example adds tokens","Few-Shot Prompting":"Highest — multiple examples"}},{"feature":"Output Reliability","values":{"Zero-Shot Prompting":"Lowest — model guesses format","One-Shot Prompting":"Better — model has one reference","Few-Shot Prompting":"Best — model learns pattern clearly"}},{"feature":"Best For","values":{"Zero-Shot Prompting":"Simple, general tasks where format is obvious","One-Shot Prompting":"When you want to show a single example of a format","Few-Shot Prompting":"Complex tasks requiring a specific style or out /* ═══════════════════════════════════════════════
   STATE
   ═══════════════════════════════════════════════ */
let state = {
  view: localStorage.getItem('aws_tb_view') || 'card',
  bookmarks: JSON.parse(localStorage.getItem('aws_table_bookmarks') || '[]'),
  showBookmarked: false,
  search: '',
  exam: '',
  category: '',
  domain: '',
  sort: 'title-asc',
  filtered: [],
  rendered: 0,
  BATCH: 20
};

/* ═══════════════════════════════════════════════
   UTILITIES
   ═══════════════════════════════════════════════ */
function getExamClass(t) {
  const e = (t.exam || '').toLowerCase() + ' ' + (t.relevant_exams || []).join(' ').toLowerCase();
  const hasAIF = e.includes('aif');
  const hasSAA = e.includes('saa');
  if (hasAIF && hasSAA) return 'exam-multi';
  if (e.includes('both')) return 'exam-multi';
  if (hasAIF) return 'exam-aif';
  if (hasSAA) return 'exam-saa';
  return 'exam-multi';
}

function getExamLabels(t) {
  const labels = [];
  const e = (t.exam || '') + ' ' + (t.relevant_exams || []).join(' ');
  if (/aif/i.test(e)) labels.push('AIF-C01');
  if (/saa/i.test(e)) labels.push('SAA-C03');
  if (!labels.length) labels.push('Multi-Exam');
  return labels;
}

function catHash(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = ((h << 5) - h + s.charCodeAt(i)) | 0;
  return Math.abs(h) % 10;
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function debounce(fn, ms) {
  let t;
  return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); };
}

function isBookmarked(t) {
  const id = t.table_id || t.title;
  return state.bookmarks.includes(id);
}

function toggleBookmark(t) {
  const id = t.table_id || t.title;
  const i = state.bookmarks.indexOf(id);
  if (i >= 0) state.bookmarks.splice(i, 1);
  else state.bookmarks.push(id);
  localStorage.setItem('aws_table_bookmarks', JSON.stringify(state.bookmarks));
}

/* ═══════════════════════════════════════════════
   SEARCH INDEXING
   ═══════════════════════════════════════════════ */
const searchIndex = TABLES.map(t => {
  const parts = [
    t.title,
    (t.title_variants || []).join(' '),
    t.description || '',
    t.context || '',
    (t.columns || []).join(' '),
    Object.values(t.column_summaries || {}).join(' '),
    (t.rows || []).map(r => r.feature + ' ' + Object.values(r.values || {}).join(' ')).join(' '),
    (t.mnemonics || []).join(' '),
    (t.exam_tips || []).join(' '),
    t.why_this_table_matters || '',
    t.table_id || ''
  ].join(' ').toLowerCase();
  return parts;
});

/* ═══════════════════════════════════════════════
   FILTERING & SORTING
   ═══════════════════════════════════════════════ */
function filterTables() {
  const s = state.search.toLowerCase().trim();
  const words = s ? s.split(/\s+/) : [];

  let results = TABLES.map((t, i) => ({ t, i }));

  // Text search
  if (words.length) {
    results = results.filter(({ i }) => words.every(w => searchIndex[i].includes(w)));
  }

  // Exam filter
  if (state.exam) {
    results = results.filter(({ t }) => {
      const e = ((t.exam || '') + ' ' + (t.relevant_exams || []).join(' ')).toLowerCase();
      if (state.exam === 'both') return e.includes('both') || (e.includes('aif') && e.includes('saa'));
      return e.includes(state.exam.toLowerCase());
    });
  }

  // Category filter
  if (state.category) {
    results = results.filter(({ t }) => (t.category || '').toLowerCase() === state.category.toLowerCase());
  }

  // Domain filter
  if (state.domain) {
    results = results.filter(({ t }) => {
      const d = (t.domain || '').toLowerCase();
      const rd = Object.values(t.relevant_domains || {}).flat().join(' ').toLowerCase();
      return d.includes(state.domain.toLowerCase()) || rd.includes(state.domain.toLowerCase());
    });
  }

  // Bookmarks filter
  if (state.showBookmarked) {
    results = results.filter(({ t }) => isBookmarked(t));
  }

  // Sort
  const [key, dir] = state.sort.split('-');
  results.sort((a, b) => {
    let va, vb;
    if (key === 'title') { va = a.t.title.toLowerCase(); vb = b.t.title.toLowerCase(); }
    else if (key === 'cols') { va = (a.t.columns || []).length; vb = (b.t.columns || []).length; }
    else if (key === 'rows') { va = (a.t.rows || []).length; vb = (b.t.rows || []).length; }
    if (va < vb) return dir === 'asc' ? -1 : 1;
    if (va > vb) return dir === 'asc' ? 1 : -1;
    return 0;
  });

  state.filtered = results.map(r => r.t);
  state.rendered = 0;
}

/* ═══════════════════════════════════════════════
   RENDERING — COMPARISON TABLE
   ═══════════════════════════════════════════════ */
function renderComparisonTable(t) {
  if (!t.columns || !t.columns.length || !t.rows || !t.rows.length) {
    return '<div style="font-size:.76rem;color:var(--muted);padding:8px;font-style:italic">No comparison data available for this table.</div>';
  }
  const ec = getExamClass(t);
  let html = '<div class="table-wrap"><table class="cmp-table"><thead><tr>';
  html += '<th class="' + ec + '-th">Feature</th>';
  t.columns.forEach(c => { html += '<th class="' + ec + '-th">' + esc(c) + '</th>'; });
  html += '</tr></thead><tbody>';
  t.rows.forEach(r => {
    html += '<tr><td>' + esc(r.feature) + '</td>';
    t.columns.forEach(c => {
      html += '<td>' + esc((r.values || {})[c] || '—') + '</td>';
    });
    html += '</tr>';
  });
  html += '</tbody></table></div>';
  return html;
}

/* ═══════════════════════════════════════════════
   RENDERING — COLUMN SUMMARIES
   ═══════════════════════════════════════════════ */
function renderColSummaries(t) {
  const cs = t.column_summaries;
  if (!cs || !Object.keys(cs).length) return '';
  let html = '<div class="col-summaries">';
  html += '<button class="col-toggle" onclick="this.classList.toggle(\'open\');this.nextElementSibling.classList.toggle(\'open\')"><span class="arrow">▸</span> Column Summaries (' + Object.keys(cs).length + ')</button>';
  html += '<div class="col-list">';
  for (const [name, desc] of Object.entries(cs)) {
    html += '<div class="col-item"><div class="col-item-name">' + esc(name) + '</div><div class="col-item-desc">' + esc(desc) + '</div></div>';
  }
  html += '</div></div>';
  return html;
}

/* ═══════════════════════════════════════════════
   RENDERING — CALLOUTS
   ═══════════════════════════════════════════════ */
function renderCallouts(t) {
  let html = '';
  if (t.mnemonics && t.mnemonics.length) {
    html += '<div class="callout callout-mnemonic"><div class="callout-title">💡 Mnemonics</div>';
    t.mnemonics.forEach(m => { html += '<p>' + esc(m) + '</p>'; });
    html += '</div>';
  }
  if (t.exam_tips && t.exam_tips.length) {
    html += '<div class="callout callout-tips"><div class="callout-title">📝 Exam Tips</div><ul>';
    t.exam_tips.forEach(tip => { html += '<li>' + esc(tip) + '</li>'; });
    html += '</ul></div>';
  }
  if (t.why_this_table_matters) {
    html += '<div class="callout callout-tips" style="border-color:var(--accent)"><div class="callout-title" style="color:var(--accent)">🎯 Why This Matters</div><p>' + esc(t.why_this_table_matters) + '</p></div>';
  }
  return html;
}

/* ═══════════════════════════════════════════════
   RENDERING — BADGES
   ═══════════════════════════════════════════════ */
function renderBadges(t) {
  let html = '<div class="card-badges">';
  getExamLabels(t).forEach(l => {
    const cls = l.includes('AIF') ? 'badge-exam-aif' : l.includes('SAA') ? 'badge-exam-saa' : 'badge-exam-both';
    html += '<span class="badge badge-exam ' + cls + '">' + esc(l) + '</span>';
  });
  if (t.category) {
    const ci = catHash(t.category);
    html += '<span class="badge badge-cat" style="background:var(--cat' + ci + ');color:var(--cat' + ci + 't)">' + esc(t.category) + '</span>';
  }
  if (t.domain) {
    html += '<span class="badge badge-domain">' + esc(t.domain.length > 50 ? t.domain.substring(0, 50) + '…' : t.domain) + '</span>';
  }
  const nc = (t.columns || []).length;
  const nr = (t.rows || []).length;
  if (nc) html += '<span class="badge badge-cols">' + nc + ' cols</span>';
  if (nr) html += '<span class="badge badge-rows">' + nr + ' rows</span>';
  if (t.mnemonics && t.mnemonics.length) html += '<span class="badge badge-mnemonic">💡 ' + t.mnemonics.length + '</span>';
  if (t.exam_tips && t.exam_tips.length) html += '<span class="badge badge-tips">📝 ' + t.exam_tips.length + '</span>';
  html += '</div>';
  return html;
}

/* ═══════════════════════════════════════════════
   RENDERING — CARD
   ═══════════════════════════════════════════════ */
function renderCard(t, idx) {
  const ec = getExamClass(t);
  const bm = isBookmarked(t);
  const tid = esc(t.table_id || '');
  const desc = t.context || t.description || '';
  const src = (t.sources || t.source_files || []).length;

  let html = '<div class="card ' + ec + (bm ? ' bookmarked' : '') + '" data-idx="' + idx + '">';
  html += '<div class="card-header">';
  html += '<div class="card-title-area"><div class="card-title">' + esc(t.title) + '</div>';
  if (tid) html += '<span class="card-id">' + tid + '</span>';
  html += '</div>';
  html += '<button class="bookmark-btn' + (bm ? ' active' : '') + '" data-action="bookmark" title="Bookmark">' + (bm ? '★' : '☆') + '</button>';
  html += '</div>';

  html += '<div class="card-body">';
  if (desc) html += '<div class="card-desc">' + esc(desc) + '</div>';
  html += renderBadges(t);
  html += '</div>';

  html += '<div class="card-footer">';
  html += '<button class="expand-btn" data-action="expand">View Table <span class="arrow">▼</span></button>';
  if (src) html += '<span class="card-sources">' + src + ' source' + (src > 1 ? 's' : '') + '</span>';
  html += '</div>';

  html += '<div class="card-expand"><div class="card-expand-inner">';
  if (t.context && t.description && t.context !== t.description) {
    html += '<div class="context-block">' + esc(t.context) + '</div>';
  }
  html += renderComparisonTable(t);
  html += renderColSummaries(t);
  html += renderCallouts(t);
  html += '</div></div>';

  html += '</div>';
  return html;
}

/* ═══════════════════════════════════════════════
   RENDERING — TABLE SECTION (list view)
   ═══════════════════════════════════════════════ */
function renderTableSection(t, idx) {
  const ec = getExamClass(t);
  const bm = isBookmarked(t);
  const tid = esc(t.table_id || '');

  let html = '<div class="table-section ' + ec + (bm ? ' bookmarked' : '') + '" data-idx="' + idx + '">';
  html += '<div class="section-header">';
  html += '<div class="card-title-area"><div class="section-title">' + esc(t.title) + '</div>';

  html += '<button class="bookmark-btn' + (bm ? ' active' : '') + '" data-action="bookmark" title="Bookmark">' + (bm ? '★' : '☆') + '</button>';

/* ═══════════════════════════════════════════════
   RENDERING — BATCH RENDER WITH LAZY LOADING
   ═══════════════════════════════════════════════ */
const mainEl = document.getElementById('mainContent');
let sentinel = null;
let observer = null;

function renderBatch() {
  const start = state.rendered;
  const end = Math.min(start + state.BATCH, state.filtered.length);
  if (start >= state.filtered.length) return;

  const container = mainEl.querySelector('.card-grid, .table-list');
  if (!container) return;

  // Remove sentinel temporarily
  if (sentinel && sentinel.parentNode) sentinel.remove();

  let fragment = '';
  for (let i = start; i < end; i++) {
    const t = state.filtered[i];
    if (state.view === 'card') fragment += renderCard(t, i);
    else fragment += renderTableSection(t, i);
  }
  container.insertAdjacentHTML('beforeend', fragment);
  state.rendered = end;

  // Check table wraps for overflow (scroll hint)
  container.querySelectorAll('.table-wrap').forEach(tw => {
    if (tw.scrollWidth > tw.clientWidth + 2) tw.classList.add('has-scroll');
  });

  // Re-add sentinel
  if (state.rendered < state.filtered.length) {
    if (!sentinel) {
      sentinel = document.createElement('div');
      sentinel.style.height = '1px';
    }
    container.appendChild(sentinel);
    observeSentinel();
  }
}

function observeSentinel() {
  if (observer) observer.disconnect();
  if (!sentinel) return;
  observer = new IntersectionObserver(entries => {
    if (entries[0].isIntersecting) renderBatch();
  }, { rootMargin: '600px' });
  observer.observe(sentinel);
}

function renderAll() {
  filterTables();
  updateStats();
  updateCount();

  if (!state.filtered.length) {
    mainEl.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><div class="empty-title">No tables match your filters</div><div class="empty-desc">Try adjusting your search or clearing filters</div></div>';
    return;
  }

  const cls = state.view === 'card' ? 'card-grid' : 'table-list';
  mainEl.innerHTML = '<div class="' + cls + '"></div>';
  sentinel = null;
  renderBatch();

  // Hash navigation
  const hash = location.hash.replace('#table-', '');
  if (hash) {
    setTimeout(() => {
      const target = mainEl.querySelector('[data-idx]');
      // Find matching table
      const idx = state.filtered.findIndex(t => (t.table_id || '') === hash);
      if (idx >= 0) {
        // Ensure rendered
        while (state.rendered <= idx) renderBatch();
        const el = mainEl.querySelectorAll('[data-idx]')[idx];
        if (el) {
          el.scrollIntoView({ behavior: 'smooth', block: 'start' });
          const eb = el.querySelector('.expand-btn');
          if (eb && state.view === 'card') eb.click();
        }
      }
    }, 100);
  }
}

/* ═══════════════════════════════════════════════
   EVENT DELEGATION
   ═══════════════════════════════════════════════ */
mainEl.addEventListener('click', e => {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const action = btn.dataset.action;
  const card = btn.closest('.card, .table-section');
  if (!card) return;
  const idx = parseInt(card.dataset.idx);
  const t = state.filtered[idx];
  if (!t) return;

  if (action === 'bookmark') {
    toggleBookmark(t);
    btn.classList.toggle('active');
    btn.textContent = isBookmarked(t) ? '★' : '☆';
    card.classList.toggle('bookmarked');
    updateStats();
  }

  if (action === 'expand') {
    btn.classList.toggle('open');
    const expandEl = card.querySelector('.card-expand');
    if (expandEl) {
      const opening = !expandEl.classList.contains('open');
      expandEl.classList.toggle('open');
      card.classList.toggle('expanded', opening);
      // Check table overflow after expand
      if (opening) {
        expandEl.querySelectorAll('.table-wrap').forEach(tw => {
          if (tw.scrollWidth > tw.clientWidth + 2) tw.classList.add('has-scroll');
        });
      }
    }
  }
});

/* ═══════════════════════════════════════════════
   POPULATE FILTERS
   ═══════════════════════════════════════════════ */
function populateFilters() {
  // Exams
  const examSet = new Set();
  TABLES.forEach(t => {
    const e = (t.exam || '') + ' ' + (t.relevant_exams || []).join(' ');
    if (/aif/i.test(e)) examSet.add('AIF-C01');
    if (/saa/i.test(e)) examSet.add('SAA-C03');
  });
  const examSel = document.getElementById('examFilter');
  [...examSet].sort().forEach(v => {
    const o = document.createElement('option');
    o.value = v.toLowerCase();
    o.textContent = v;
    examSel.appendChild(o);
  });
  const bothOpt = document.createElement('option');
  bothOpt.value = 'both';
  bothOpt.textContent = 'Both Exams';
  examSel.appendChild(bothOpt);

  // Categories
  const catSet = new Set();
  TABLES.forEach(t => { if (t.category) catSet.add(t.category); });
  const catSel = document.getElementById('catFilter');
  [...catSet].sort().forEach(v => {
    const o = document.createElement('option');
    o.value = v;
    o.textContent = v.length > 35 ? v.substring(0, 35) + '…' : v;
    catSel.appendChild(o);
  });

  // Domains
  populateDomains();
}

function populateDomains() {
  const domainSet = new Set();
  TABLES.forEach(t => {
    if (t.domain) domainSet.add(t.domain);
    Object.values(t.relevant_domains || {}).flat().forEach(d => { if (d) domainSet.add(d); });
  });
  const domSel = document.getElementById('domainFilter');
  // Keep first option, remove rest
  while (domSel.options.length > 1) domSel.remove(1);
  [...domainSet].sort().forEach(v => {
    const o = document.createElement('option');
    o.value = v;
    o.textContent = v.length > 45 ? v.substring(0, 45) + '…' : v;
    domSel.appendChild(o);
  });
}

/* ═══════════════════════════════════════════════
   STATS
   ═══════════════════════════════════════════════ */
function updateStats() {
  const total = TABLES.length;
  let aif = 0, saa = 0, both = 0;
  TABLES.forEach(t => {
    const e = ((t.exam || '') + ' ' + (t.relevant_exams || []).join(' ')).toLowerCase();
    const ha = /aif/.test(e), hs = /saa/.test(e);
    if (ha && hs || /both/.test(e)) both++;
    else if (ha) aif++;
    else if (hs) saa++;
    else both++;
  });
  const bm = state.bookmarks.length;
  const bar = document.getElementById('statsBar');
  bar.innerHTML =
    '<span class="chip chip-default"><span class="num">' + total + '</span> tables</span>' +
    '<span class="chip chip-aif">AIF-C01: <span class="num">' + aif + '</span></span>' +
    '<span class="chip chip-saa">SAA-C03: <span class="num">' + saa + '</span></span>' +
    '<span class="chip chip-both">Both: <span class="num">' + both + '</span></span>' +
    (bm ? '<span class="chip chip-bm" id="bmChip" title="Click to toggle bookmark filter">★ <span class="num">' + bm + '</span> bookmarked</span>' : '');
}

function updateCount() {
  document.getElementById('countLabel').textContent = state.filtered.length + ' of ' + TABLES.length + ' tables';
}

/* ═══════════════════════════════════════════════
   VIEW TOGGLE
   ═══════════════════════════════════════════════ */
function updateViewIcon() {
  const icon = document.getElementById('viewIcon');
  if (state.view === 'card') {
    icon.setAttribute('d', 'M3 3h7v7H3zm11 0h7v7h-7zM3 14h7v7H3zm11 0h7v7h-7z');
    document.getElementById('viewToggle').title = 'Switch to Table View';
  } else {
    icon.setAttribute('d', 'M3 4h18v2H3zm0 5h18v2H3zm0 5h18v2H3z');
    document.getElementById('viewToggle').title = 'Switch to Card View';
  }
}

/* ═══════════════════════════════════════════════
   DARK MODE
   ═══════════════════════════════════════════════ */
function applyTheme() {
  const theme = localStorage.getItem('aws_table_theme') || 'light';
  document.documentElement.setAttribute('data-theme', theme);
  const icon = document.getElementById('themeIcon');
  icon.setAttribute('d', theme === 'dark'
    ? 'M12 3v1m0 16v1m8.66-13.66l-.71.71M4.05 19.95l-.71.71M21 12h1M2 12H1m16.66 7.66l-.71-.71M4.05 4.05l-.71-.71M16 12a4 4 0 11-8 0 4 4 0 018 0z'
    : 'M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z');
}

/* ═══════════════════════════════════════════════
   BACK TO TOP
   ═══════════════════════════════════════════════ */
const btt = document.getElementById('btt');
window.addEventListener('scroll', () => {
  btt.classList.toggle('show', window.scrollY > 600);
}, { passive: true });
btt.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

/* ═══════════════════════════════════════════════
   EVENT WIRING
   ═══════════════════════════════════════════════ */
const searchInput = document.getElementById('searchInput');
const searchClear = document.getElementById('searchClear');
const examFilter  = document.getElementById('examFilter');
const catFilter   = document.getElementById('catFilter');
const domainFilter = document.getElementById('domainFilter');
const sortSelect  = document.getElementById('sortSelect');

const debouncedRender = debounce(() => {
  state.search = searchInput.value;
  searchClear.classList.toggle('show', !!state.search);
  renderAll();
}, 200);

searchInput.addEventListener('input', debouncedRender);
searchClear.addEventListener('click', () => { searchInput.value = ''; state.search = ''; searchClear.classList.remove('show'); renderAll(); searchInput.focus(); });
examFilter.addEventListener('change', () => { state.exam = examFilter.value; renderAll(); });
catFilter.addEventListener('change', () => { state.category = catFilter.value; renderAll(); });
domainFilter.addEventListener('change', () => { state.domain = domainFilter.value; renderAll(); });
sortSelect.addEventListener('change', () => { state.sort = sortSelect.value; renderAll(); });

document.getElementById('viewToggle').addEventListener('click', () => {
  state.view = state.view === 'card' ? 'table' : 'card';
  localStorage.setItem('aws_tb_view', state.view);
  updateViewIcon();
  renderAll();
});

document.getElementById('themeToggle').addEventListener('click', () => {
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur === 'dark' ? 'light' : 'dark';
  localStorage.setItem('aws_table_theme', next);
  applyTheme();
});

// Bookmark chip click (toggle filter)
document.getElementById('statsBar').addEventListener('click', e => {
  if (e.target.closest('#bmChip')) {
    state.showBookmarked = !state.showBookmarked;
    const chip = e.target.closest('#bmChip');
    chip.style.outline = state.showBookmarked ? '2px solid #f59e0b' : 'none';
    renderAll();
  }
});

// Font size
const fontSlider = document.getElementById('fontSlider');
const savedFont = localStorage.getItem('aws_table_fontsize');
if (savedFont) { fontSlider.value = savedFont; document.documentElement.style.setProperty('--font-size', savedFont + 'px'); }
fontSlider.addEventListener('input', () => {
  const v = fontSlider.value;
  document.documentElement.style.setProperty('--font-size', v + 'px');
  localStorage.setItem('aws_table_fontsize', v);
});

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === '/' && document.activeElement !== searchInput) { e.preventDefault(); searchInput.focus(); }
  if (e.key === 'Escape') { searchInput.blur(); searchInput.value = ''; state.search = ''; searchClear.classList.remove('show'); renderAll(); }
});

/* ═══════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════ */
populateFilters();
applyTheme();
updateViewIcon();
renderAll();
</script>
</body>
</html>
