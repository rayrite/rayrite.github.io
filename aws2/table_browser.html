lly unlimited","Amazon EBS":"Up to 16 TiB per volume","Amazon EFS":"Elastic, unlimited","Amazon FSx":"Scalable per file system"}},{"feature":"Durability","values":{"Amazon S3":"99.999999999% (11 9's)","Amazon EBS":"99.999% within single AZ","Amazon EFS":"99.999999999% (multi-AZ)","Amazon FSx":"99.999% (varies by type)"}},{"feature":"Latency","values":{"Amazon S3":"Low (milliseconds)","Amazon EBS":"Lowest (consistent)","Amazon EFS":"Low (consistent)","Amazon FSx":"Low to very low (optimized)"}},{"feature":"Cost per GB","values":{"Amazon S3":"Lowest for object storage","Amazon EBS":"Medium (provisioned IOPS is higher)","Amazon EFS":"Medium-High","Amazon FSx":"Higher (performance optimized)"}},{"feature":"Data from Outside VPC","values":{"Amazon S3":"Yes (with proper auth)","Amazon EBS":"No","Amazon EFS":"Via VPN or Direct Connect","Amazon FSx":"Via VPN or Direct Connect"}},{"feature":"Use for Databases","values":{"Amazon S3":"No (use backup tier)","Amazon EBS":"Yes (primary storage)","Amazon EFS":"No (file storage not suitable)","Amazon FSx":"Yes for FSx for ONTAP/NetApp"}}],"mnemonics":["SE3F = S3 is for Everything (object), EBS for EC2 boot, EFS for File sharing, FSx for Fancy specialized file systems"],"exam_tips":["S3 is the default choice for object storage - it's the most versatile","If question mentions 'multiple EC2 instances accessing shared storage' → EFS","If question mentions 'Windows file shares' → FSx for Windows","If question mentions 'high-performance computing or ML training' → FSx for Lustre","EBS does NOT replicate across AZs - use snapshots to S3 for cross-AZ backup"],"sources":["aws_exam_comparison_tables[minimax-dr].json"]},{"title":"Compliance and Audit Services Comparison","title_variants":["Compliance and Audit Services Comparison"],"context":"AWS provides comprehensive services for compliance monitoring, audit logging, and regulatory evidence collection. CloudTrail records API activity across your AWS infrastructure for security analysis and compliance auditing, Config tracks resource configurations and evaluates them against desired rules, Audit Manager automates evidence collection for compliance frameworks, and Artifact provides on-demand access to AWS compliance reports. Understanding when to use each service, their data retention policies, and integration patterns is essential for the exam. These services help organizations meet regulatory requirements, maintain security posture, and demonstrate compliance to auditors.","columns":["CloudTrail","Config","Audit Manager","Artifact"],"rows":[{"feature":"Primary Purpose","values":{"CloudTrail":"Record and store AWS API call history for security analysis and compliance auditing","Config":"Track resource configurations, evaluate compliance against rules, and monitor changes","Audit Manager":"Automate evidence collection for compliance audits against industry frameworks","Artifact":"Provide on-demand access to AWS compliance reports and agreements"}},{"feature":"What It Records","values":{"CloudTrail":"API calls (management events), data events (S3, Lambda), network activity events","Config":"Resource configuration snapshots, configuration changes, compliance evaluations","Audit Manager":"Evidence from AWS services mapped to compliance framework controls","Artifact":"AWS SOC, PCI DSS, ISO, FedRAMP reports and Business Associate Agreements (BAA)"}},{"feature":"Data Retention","values":{"CloudTrail":"Event history: 90 days (free); Trails: indefinite in S3 (configurable lifecycle)","Config":"Configuration history: 7 years; Snapshots: retained based on delivery frequency","Audit Manager":"Evidence retained based on assessment settings; typically 1+ years","Artifact":"Reports updated regularly; historical versions available"}},{"feature":"Pricing Model","values":{"CloudTrail":"Management events: first trail free per region; Data events: $0.10 per 100,000 events","Config":"$0.003 per configuration item recorded; $0.001 per rule evaluation","Audit Manager":"$0.25 per evidence collected; varies by number of controls assessed","Artifact":"Free - included with AWS account"}},{"feature":"Compliance Frameworks","values":{"CloudTrail":"Supports compliance by providing audit trail; not framework-specific","Config":"Managed rules for CIS, PCI DSS, HIPAA, NIST; custom rule support","Audit Manager":"Pre-built frameworks: CIS, PCI DSS, HIPAA, FedRAMP, NIST, SOC 2, GDPR, custom","Artifact":"SOC 1/2/3, PCI DSS, ISO 27001/27017/27018, FedRAMP, HIPAA, GDPR reports"}},{"feature":"Key Features","values":{"CloudTrail":"Event history, multi-region trails, organization trails, Insights (anomaly detection)","Config":"Configuration snapshots, change notifications, remediation actions, conformance packs","Audit Manager":"Automated evidence collection, framework mapping, delegate admin, report generation","Artifact":"NDA acceptance, report downloads, agreement management, multi-account access"}},{"feature":"Integration Points","values":{"CloudTrail":"S3 (storage), CloudWatch Logs (monitoring), EventBridge (automation), SNS (notifications)","Config":"SNS (notifications), Lambda (remediation), Security Hub (findings), CloudTrail (change tracking)","Audit Manager":"CloudTrail, Config, Security Hub, manual evidence upload, S3 (evidence storage)","Artifact":"IAM (access control), Organizations (multi-account access)"}},{"feature":"Automation Capabilities","values":{"CloudTrail":"EventBridge rules for automated response; CloudWatch Alarms for anomalies","Config":"Auto-remediation via Lambda; conformance packs for rule deployment","Audit Manager":"Scheduled assessments; automatic evidence collection; automated report generation","Artifact":"No automation - manual report download and NDA acceptance"}},{"feature":"Use Cases","values":{"CloudTrail":"Security incident investigation, compliance auditing, operational troubleshooting","Config":"Configuration drift detection, compliance monitoring, change management","Audit Manager":"Preparing for external audits, continuous compliance monitoring, evidence collection","Artifact":"Obtaining AWS compliance documentation for customer audits, BAA for HIPAA"}}],"sources":["aws_exam_comparison_tables[kimi-agsw].json"]},{"title":"Compute Decision Matrix","title_variants":["AI/ML Service Decision Matrix","Compute Decision Matrix"],"context":"When building AI/ML solutions on AWS, architects must choose between three main approaches: Amazon SageMaker for custom ML model development, Amazon Bedrock for foundation model-based generative AI applications, and Pre-built AI Services (like Rekognition, Comprehend, Transcribe) for specific use cases. Understanding when to use each approach is critical for exam success and real-world architecture decisions.","columns":["Amazon EC2","AWS Lambda","Amazon ECS","Amazon EKS","Pre-built AI Services"],"rows":[{"feature":"Customization Level","values":{"Amazon EC2":"Medium-High - Fine-tuning, RAG, prompt engineering","AWS Lambda":"Function (Code execution)","Amazon ECS":"Container (Docker workloads)","Amazon EKS":"Container (Kubernetes workloads)","Pre-built AI Services":"Low-Medium - Limited to service capabilities"}},{"feature":"Management Overhead","values":{"Amazon EC2":"High (OS patching, scaling, monitoring)","AWS Lambda":"None (fully managed)","Amazon ECS":"Low to Medium (depends on launch type)","Amazon EKS":"Medium to High (Kubernetes complexity)"}},{"feature":"Scaling Speed","values":{"Amazon EC2":"Minutes (ASG scaling)","AWS Lambda":"Milliseconds to seconds","Amazon ECS":"Seconds to minutes (Fargate faster)","Amazon EKS":"Minutes (node provisioning)"}},{"feature":"Maximum Runtime","values":{"Amazon EC2":"Unlimited (persistent)","AWS Lambda":"15 minutes","Amazon ECS":"Unlimited (with Fargate or EC2)","Amazon EKS":"Unlimited (with Fargate or EC2)"}},{"feature":"Cost Model","values":{"Amazon EC2":"Per hour/second (always running)","AWS Lambda":"Per request + duration (GB-seconds)","Amazon ECS":"EC2 costs OR Fargate per-use pricing","Amazon EKS":"$0.10/hour + EC2/Fargate costs"}},{"feature":"State Persistence","values":{"Amazon EC2":"Full persistence (EBS, instance store)","AWS Lambda":"Ephemeral (use external storage)","Amazon ECS":"Configurable (volumes, EFS)","Amazon EKS":"Full persistence options (PV/PVC)"}},{"feature":"Multi-Cloud Portability","values":{"Amazon EC2":"Manual configuration required","AWS Lambda":"Low (AWS-specific)","Amazon ECS":"Low (AWS-specific)","Amazon EKS":"High (standard Kubernetes)","Pre-built AI Services":"Fully managed auto-scaling"}},{"feature":"Learning Curve","values":{"Amazon EC2":"Medium (Linux/Windows admin)","AWS Lambda":"Low (simple function model)","Amazon ECS":"Low to Medium (Docker basics)","Amazon EKS":"High (Kubernetes expertise)"}},{"feature":"Best For","values":{"Amazon EC2":"Lift-and-shift, legacy apps, full control","AWS Lambda":"Event-driven, APIs, automation, short tasks","Amazon ECS":"Containerized microservices, simple orchestration","Amazon EKS":"Complex container apps, K8s ecosystem, portability"}},{"feature":"When to Choose","values":{"Amazon EC2":"Generative AI needs, natural language tasks, creative applications","AWS Lambda":"Event triggers, <15 min runtime, cost optimization","Amazon ECS":"Simple containers, AWS-native, quick to market","Amazon EKS":"K8s required, complex scheduling, multi-cloud","Pre-built AI Services":"Standard AI tasks, quick deployment, cost predictability"}},{"feature":"Not Suitable For","values":{"Amazon EC2":"Rapid scaling needs, minimal management","AWS Lambda":"Long-running tasks, persistent connections, ML training","Amazon ECS":"Non-container workloads, complex K8s features","Amazon EKS":"Simple apps, teams without K8s expertise"}},{"feature":"Primary Use Case","values":{"Amazon SageMaker":"Build custom ML models from scratch","Amazon Bedrock":"Build generative AI applications with foundation models","Pre-built AI Services":"Solve specific AI tasks without model building"}},{"feature":"ML Expertise Required","values":{"Amazon SageMaker":"High - Data science and ML engineering skills","Amazon Bedrock":"Medium - API integration, prompt engineering","Pre-built AI Services":"Low - Simple API calls"}},{"feature":"Development Time","values":{"Amazon SageMaker":"Weeks to months","Amazon Bedrock":"Days to weeks","Pre-built AI Services":"Hours to days"}},{"feature":"Time to Production","values":{"Amazon SageMaker":"Longer - Model training, tuning, deployment","Amazon Bedrock":"Fast - Pre-trained models ready to use","Pre-built AI Services":"Immediate - API ready"}},{"feature":"Cost Structure","values":{"Amazon SageMaker":"Compute instances (training + inference)","Amazon Bedrock":"Per-token usage pricing","Pre-built AI Services":"Per-request or per-unit pricing"}},{"feature":"Data Requirements","values":{"Amazon SageMaker":"Large labeled datasets for training","Amazon Bedrock":"Small datasets for fine-tuning/RAG optional","Pre-built AI Services":"No training data needed"}},{"feature":"Model Ownership","values":{"Amazon SageMaker":"Full ownership of trained models","Amazon Bedrock":"Use foundation models, fine-tuned versions","Pre-built AI Services":"No model ownership - managed service"}},{"feature":"Examples","values":{"Amazon SageMaker":"Custom fraud detection, proprietary algorithms, research","Amazon Bedrock":"Chatbots, content generation, code assistants, RAG applications","Pre-built AI Services":"Image recognition (Rekognition), Text analysis (Comprehend), Speech-to-text (Transcribe)"}},{"feature":"Exam Decision Tips","values":{"Amazon SageMaker":"Choose when question mentions 'custom model', 'train own model', 'specific algorithm'","Amazon Bedrock":"Choose when question mentions 'generative AI', 'LLM', 'foundation model', 'chatbot'","Pre-built AI Services":"Choose when question mentions specific task like 'extract text', 'analyze images'"}}],"sources":["aws_exam_comparison_tables[kimi-agsw].json"]},{"title":"Computer Vision & Document AI Services Comparison","title_variants":["Computer Vision & Document AI Services Comparison"],"description":"Comparing AWS services for image/video analysis and document processing","category":"AI & Machine Learning Services","exam":"AIF-C01","columns":["Amazon Rekognition","Amazon Textract","Amazon Transcribe"],"column_summaries":{"Amazon Rekognition":"A computer vision service that makes it easy to add image and video analysis to applications using proven, highly scalable deep learning technology.","Amazon Textract":"A machine learning service that automatically extracts text, handwriting, and data from scanned documents, forms, and tables using OCR technology.","Amazon Transcribe":"An automatic speech recognition (ASR) service that makes it easy to add speech-to-text capabilities to applications with powerful neural network models."},"rows":[{"feature":"Input Type","values":{"Amazon Rekognition":"Images and videos","Amazon Textract":"Scanned documents, PDFs, forms","Amazon Transcribe":"Audio files (speech)"}},{"feature":"Output Type","values":{"Amazon Rekognition":"Labels, faces, celebrities, unsafe content","Amazon Textract":"Text, forms (key-value pairs), tables","Amazon Transcribe":"Text transcripts"}},{"feature":"Use Case","values":{"Amazon Rekognition":"Image/video analysis, facial recognition","Amazon Textract":"Document data extraction, OCR","Amazon Transcribe":"Speech-to-text transcription"}},{"feature":"Customization","values":{"Amazon Rekognition":"Custom labels, PPE detection","Amazon Textract":"Async queries, IDP for processing pipelines","Amazon Transcribe":"Custom vocabulary, channel identification"}},{"feature":"Real-Time Support","values":{"Amazon Rekognition":"Yes, with Video API","Amazon Textract":"Async primarily","Amazon Transcribe":"Streaming (real-time) and batch"}}],"mnemonics":["Rekognize images, Textract text, Transcribe speech - RTT for visual/audio content"],"exam_tips":["Rekognition is for visual content - images and videos","Textract is for extracting data from documents - it goes beyond basic OCR","Transcribe is for audio - converts speech to text","For invoices and forms, think Textract for extraction","Rekognition can detect faces, labels, and inappropriate content"],"sources":["aws_exam_comparison_tables[minimax-dr].json"]},{"title":"Container Orchestration Services Comparison","title_variants":["Container Orchestration Services Comparison"],"description":"Comparing AWS container orchestration and management services","category":"Compute Services","exam":"Both (SAA-C03 Primary, AIF-C01 Reference)","columns":["Amazon ECS","Amazon EKS","Amazon ECR"],"column_summaries":{"Amazon ECS":"A fully managed container orchestration service supporting Docker containers, tightly integrated with AWS services and offering both EC2 and Fargate launch types.","Amazon EKS":"A fully managed Kubernetes service that makes it easy to deploy, manage, and scale containerized applications using Kubernetes on AWS.","Amazon ECR":"A fully managed Docker container registry that makes it easy for developers to store, manage, and deploy container images."},"rows":[{"feature":"Orchestration","values":{"Amazon ECS":"AWS-native container platform","Amazon EKS":"Kubernetes-native platform","Amazon ECR":"Image registry (not orchestration)"}},{"feature":"API/Interface","values":{"Amazon ECS":"ECS API, CLI, AWS SDKs","Amazon EKS":"Kubernetes API, kubectl compatible","Amazon ECR":"Docker CLI, API"}},{"feature":"Portability","values":{"Amazon ECS":"AWS-specific","Amazon EKS":"Portable (standard Kubernetes)","Amazon ECR":"Any container runtime"}},{"feature":"Use Case","values":{"Amazon ECS":"AWS-centric workloads, AWS integration","Amazon EKS":"Multi-cloud, Kubernetes expertise","Amazon ECR":"Store and manage container images"}},{"feature":"Compute Options","values":{"Amazon ECS":"EC2 launch type, Fargate","Amazon EKS":"EC2 nodes, Fargate, EKS Distro","Amazon ECR":"N/A (storage only)"}},{"feature":"Integration","values":{"Amazon ECS":"Deep AWS integration (ELB, IAM, VPC)","Amazon EKS":"AWS integration via cloud provider plugin","Amazon ECR":"Integrated with ECS and EKS"}}],"mnemonics":["ECS = Easy Container Service, EKS = Enterprise Kubernetes Service, ECR = Container Registry"],"exam_tips":["ECS is AWS-native - better integration with AWS services","EKS is for organizations using Kubernetes or planning multi-cloud deployments","ECR holds container images; ECS/EKS pull images from ECR","Both ECS and EKS support Fargate for serverless containers","EKS Anywhere runs Kubernetes on-premises for hybrid deployments"],"sources":["aws_exam_comparison_tables[minimax-dr].json"]},{"title":"Container Services Comparison","title_variants":["Container Services Comparison"],"context":"AWS provides multiple container orchestration services. Understanding the differences between ECS, EKS, and ECR, along with their launch types (EC2 vs Fargate), is essential for designing containerized architectures on AWS.","columns":["ECS with EC2","ECS with Fargate","EKS with EC2","EKS with Fargate","ECR"],"rows":[{"feature":"Orchestration Type","values":{"ECS with EC2":"AWS-native (Docker-based)","ECS with Fargate":"AWS-native (Docker-based)","EKS with EC2":"Kubernetes (open-source)","EKS with Fargate":"Kubernetes (open-source)","ECR":"Container registry (storage)"}},{"feature":"Infrastructure Management","values":{"ECS with EC2":"Customer manages EC2 instances","ECS with Fargate":"AWS manages infrastructure (serverless)","EKS with EC2":"Customer manages EC2 worker nodes","EKS with Fargate":"AWS manages pods (serverless)","ECR":"Fully managed registry"}},{"feature":"Serverless Option","values":{"ECS with EC2":"No - requires EC2 instances","ECS with Fargate":"Yes - fully serverless","EKS with EC2":"No - requires worker nodes","EKS with Fargate":"Yes - serverless pods","ECR":"N/A - storage service"}},{"feature":"Pricing Model","values":{"ECS with EC2":"EC2 costs + no ECS fees","ECS with Fargate":"Pay per vCPU/memory used","EKS with EC2":"$0.10/hour cluster + EC2 costs","EKS with Fargate":"$0.10/hour cluster + Fargate costs","ECR":"Storage + data transfer fees"}},{"feature":"Scaling Method","values":{"ECS with EC2":"Auto Scaling Groups for EC2 + Service Auto Scaling","ECS with Fargate":"Service Auto Scaling only","EKS with EC2":"Cluster Autoscaler + HPA/VPA","EKS with Fargate":"HPA only (no node scaling)","ECR":"Automatic scaling"}},{"feature":"Kubernetes Compatibility","values":{"ECS with EC2":"No - AWS proprietary","ECS with Fargate":"No - AWS proprietary","EKS with EC2":"Yes - native Kubernetes","EKS with Fargate":"Yes - native Kubernetes","ECR":"Compatible with any container runtime"}},{"feature":"Control Plane","values":{"ECS with EC2":"AWS-managed (no charge)","ECS with Fargate":"AWS-managed (no charge)","EKS with EC2":"AWS-managed ($0.10/hour)","EKS with Fargate":"AWS-managed ($0.10/hour)","ECR":"N/A"}},{"feature":"Best Use Cases","values":{"ECS with EC2":"Cost optimization, GPU workloads, existing EC2 expertise","ECS with Fargate":"Simple container workloads, no infrastructure management","EKS with EC2":"Kubernetes expertise, multi-cloud portability, complex workloads","EKS with Fargate":"Kubernetes without node management, variable workloads","ECR":"Storing, sharing, deploying container images"}},{"feature":"Learning Curve","values":{"ECS with EC2":"Low (AWS-native concepts)","ECS with Fargate":"Lowest (simplest option)","EKS with EC2":"High (Kubernetes complexity)","EKS with Fargate":"High (Kubernetes knowledge required)","ECR":"Low (simple Docker registry)"}},{"feature":"IAM Integration","values":{"ECS with EC2":"Task roles + instance profiles","ECS with Fargate":"Task roles only (more secure)","EKS with EC2":"IAM roles for service accounts (IRSA)","EKS with Fargate":"IAM roles for service accounts (IRSA)","ECR":"IAM for repository access control"}}],"sources":["aws_exam_comparison_tables[kimi-agsw].json"]},{"title":"DNS and Routing Services Comparison","title_variants":["DNS and Routing Services Comparison"],"description":"Comparing AWS DNS and traffic routing services","category":"Networking Services","exam":"Both (SAA-C03 Primary)","columns":["Amazon Route 53","Amazon CloudFront","AWS Global Accelerator"],"column_summaries":{"Amazon Route 53":"A highly available and scalable cloud DNS web service providing reliable and cost-effective routing of traffic to applications using various routing policies.","Amazon CloudFront":"A content delivery network (CDN) that securely delivers data, videos, applications, and APIs to customers globally with low latency.","AWS Global Accelerator":"A networking service that improves application availability and performance by optimizing the path from users to application endpoints."},"rows":[{"feature":"Primary Function","values":{"Amazon Route 53":"DNS service - domain registration and resolution","Amazon CloudFront":"CDN - cache and deliver content globally","AWS Global Accelerator":"Anycast routing - optimize traffic path"}},{"feature":"Caching","values":{"Amazon Route 53":"No caching (DNS resolution only)","Amazon CloudFront":"Yes - edge locations cache content","AWS Global Accelerator":"No caching (direct routing)"}},{"feature":"Use Case","values":{"Amazon Route 53":"Domain registration, DNS routing, health checks","Amazon CloudFront":"Static content, APIs, media streaming","AWS Global Accelerator":"Global application availability, gaming, VoIP"}},{"feature":"Latency Benefit","values":{"Amazon Route 53":"Route to nearest region (latency routing)","Amazon CloudFront":"Deliver from nearest edge (cache hit)","AWS Global Accelerator":"Faster path through AWS network"}},{"feature":"Static IP","values":{"Amazon Route 53":"No (uses Route 53 name servers)","Amazon CloudFront":"Provides static IP via custom origins","AWS Global Accelerator":"Yes - two static anycast IPs"}},{"feature":"DDoS Protection","values":{"Amazon Route 53":"Basic DDoS protection","Amazon CloudFront":"AWS Shield Standard + WAF integration","AWS Global Accelerator":"AWS Shield Standard (always on)"}}],"mnemonics":["RCG = Route53 for DNS, CloudFront for CDN, Global Accelerator for performance"],"exam_tips":["Route 53 supports multiple routing policies: latency, geolocation, weighted, failover","CloudFront caches content at edge locations - great for static assets","Global Accelerator uses AWS global network for faster routing","Use Route 53 health checks for DNS failover to backup resources","CloudFront integrates with AWS Shield and WAF for DDoS protection"],"sources":["aws_exam_comparison_tables[minimax-dr].json"]},{"title":"Data Ingestion and Analytics Services","title_variants":["Data Analytics and Visualization Services Comparison","Data Ingestion and Analytics Services"],"description":"Comparing AWS services for data analytics and business intelligence","category":"Analytics / Data","exam":"SAA-C03","domain":"Design High-Performing Architectures","table_id":"saa_d3_data_ingestion_analytics","columns":["Amazon Kinesis","AWS Glue","Amazon Athena","Amazon EMR","Amazon QuickSight"],"column_summaries":{"Amazon Kinesis":"Amazon Kinesis is for streaming data ingestion and near-real-time pipelines. In exam terms, it is the answer when data arrives continuously and must be processed as a stream.","AWS Glue":"AWS Glue is the managed data integration and transformation layer, commonly used for ETL and cataloging. Think schema discovery, transformation, and data preparation.","Amazon Athena":"Athena is serverless SQL querying over data in Amazon S3. It is usually the fastest exam answer when you need ad hoc analysis without managing database servers.","Amazon EMR":"Amazon EMR is managed big data processing for larger-scale distributed analytics jobs. It is appropriate when the workload needs more customizable or heavier data processing frameworks.","Amazon QuickSight":"A fully managed business intelligence (BI) service that enables everyone in an organization to understand data through visual dashboards and insights."},"rows":[{"feature":"Pipeline role","values":{"Amazon Kinesis":"Stream ingest","AWS Glue":"Transform / catalog","Amazon Athena":"Query","Amazon EMR":"Heavy processing","Amazon QuickSight":"Visualize"}},{"feature":"Best exam clue","values":{"Amazon Kinesis":"Continuous event stream","AWS Glue":"ETL and schema work","Amazon Athena":"Run SQL on S3 data","Amazon EMR":"Managed big data clusters/jobs","Amazon QuickSight":"Dashboards and BI"}},{"feature":"Infrastructure overhead","values":{"Amazon Kinesis":"Managed stream service","AWS Glue":"Managed ETL","Amazon Athena":"Very low","Amazon EMR":"Higher than Athena/Glue","Amazon QuickSight":"Low, BI-focused"}},{"feature":"Great for","values":{"Amazon Kinesis":"Streaming architecture","AWS Glue":"Data transformation and prep","Amazon Athena":"Interactive ad hoc analytics","Amazon EMR":"Large-scale data processing","Amazon QuickSight":"Business reporting"}},{"feature":"Not primarily for","values":{"Amazon Kinesis":"Dashboards","AWS Glue":"End-user visualization","Amazon Athena":"Complex ETL orchestration","Amazon EMR":"Simple quick ad hoc SQL only","Amazon QuickSight":"Stream ingestion"}},{"feature":"Common trap","values":{"Amazon Kinesis":"Using it as a BI tool","AWS Glue":"Using it when you only need to query data","Amazon Athena":"Using it when you need deep ETL pipelines","Amazon EMR":"Choosing it when Athena is enough","Amazon QuickSight":"Thinking it stores or transforms data"}},{"feature":"Purpose","values":{"Amazon Athena":"Ad-hoc SQL queries on S3 data","Amazon QuickSight":"Business intelligence dashboards","Amazon OpenSearch Service":"Search and log analytics"}},{"feature":"Data Source","values":{"Amazon Athena":"Data in S3 (query-in-place)","Amazon QuickSight":"Various AWS and external sources","Amazon OpenSearch Service":"Any indexed data, including logs"}},{"feature":"Use Case","values":{"Amazon Athena":"One-time analysis, data exploration","Amazon QuickSight":"Executive dashboards, reports","Amazon OpenSearch Service":"Application search, observability"}},{"feature":"Interface","values":{"Amazon Athena":"SQL queries (Presto engine)","Amazon QuickSight":"Visual dashboards, Q (NL queries)","Amazon OpenSearch Service":"REST API, dashboards (OpenSearch Dashboards)"}},{"feature":"Cost Model","values":{"Amazon Athena":"Per query (data scanned)","Amazon QuickSight":"Per user per month","Amazon OpenSearch Service":"Per hour (instances + storage)"}},{"feature":"Scalability","values":{"Amazon Athena":"Serverless auto-scaling","Amazon QuickSight":"Enterprise SPICE capacity","Amazon OpenSearch Service":"Manual cluster scaling"}}],"mnemonics":["AQO = Athena for Queries, QuickSight for BI, OpenSearch for search"],"exam_tips":["Athena is serverless - just point to S3 and query with SQL","Use Athena with Glue Data Catalog for unified metadata access","QuickSight uses SPICE engine for fast in-memory calculations","OpenSearch is commonly used for CloudWatch Logs analysis","Athena pricing is based on data scanned - use columnar formats (Parquet) to reduce cost"],"why_this_table_matters":"SAA Domain 3 includes ingestion, transformation, querying, and visualization. This table keeps the data pipeline pieces from blurring together under exam pressure.","sources":["aws_exam_comparison_tables[gpt5].json","aws_exam_comparison_tables[minimax-dr].json"]},{"title":"Data Movement Comparison","title_variants":["Data Movement Comparison"],"context":"AWS provides multiple services for moving data between on-premises and cloud, or between cloud storage services. DataSync is for online data transfer, Storage Gateway provides hybrid cloud storage, Transfer Family offers managed file transfers, and Snow Family handles offline data migration for massive datasets or low-bandwidth scenarios.","columns":["DataSync","Storage Gateway","Transfer Family","Snowcone","Snowball Edge","Snowmobile"],"rows":[{"feature":"Transfer Method","values":{"DataSync":"Online (network-based)","Storage Gateway":"Online (hybrid cloud)","Transfer Family":"Online (managed SFTP/FTPS/FTP)","Snowcone":"Offline (physical device)","Snowball Edge":"Offline (physical device)","Snowmobile":"Offline (truck-mounted container)"}},{"feature":"Data Volume","values":{"DataSync":"Any size (network dependent)","Storage Gateway":"Any size (cached or stored)","Transfer Family":"Any size (protocol-based)","Snowcone":"Up to 8 TB","Snowball Edge":"Up to 80 TB (Storage) or 28 TB (Compute)","Snowmobile":"Up to 100 PB"}},{"feature":"Use Case","values":{"DataSync":"Migrate to S3, EFS, FSx","Storage Gateway":"Hybrid cloud, on-prem cache","Transfer Family":"Third-party file transfers","Snowcone":"Edge computing, small migrations","Snowball Edge":"Large migrations, edge computing","Snowmobile":"Exabyte-scale migration"}},{"feature":"Network Required","values":{"DataSync":"Yes (AWS Direct Connect supported)","Storage Gateway":"Yes (internet or DX)","Transfer Family":"Yes (internet accessible)","Snowcone":"No (offline transport)","Snowball Edge":"No (offline transport)","Snowmobile":"No (offline transport)"}},{"feature":"Encryption","values":{"DataSync":"TLS 1.2 in transit, AES-256 at rest","Storage Gateway":"AES-256 (all data encrypted)","Transfer Family":"TLS 1.2+ for transfers","Snowcone":"256-bit encryption, TPM","Snowball Edge":"256-bit encryption, TPM","Snowmobile":"256-bit encryption, dedicated security"}},{"feature":"Pricing Model","values":{"DataSync":"$0.0125 per GB transferred","Storage Gateway":"Per-hour gateway fee + storage","Transfer Family":"Per-hour endpoint fee + data","Snowcone":"Per-device fee + shipping","Snowball Edge":"Per-device fee + shipping","Snowmobile":"Custom pricing (contact AWS)"}},{"feature":"Bandwidth Consideration","values":{"DataSync":"Uses available bandwidth (throttle available)","Storage Gateway":"Ongoing bandwidth for sync","Transfer Family":"Depends on client connections","Snowcone":"None required","Snowball Edge":"None required","Snowmobile":"None required"}},{"feature":"Typical Migration Time","values":{"DataSync":"Hours to days (network dependent)","Storage Gateway":"Ongoing synchronization","Transfer Family":"Ongoing file transfers","Snowcone":"Days (shipping + transfer)","Snowball Edge":"1-2 weeks (shipping + transfer)","Snowmobile":"Weeks to months"}}],"sources":["aws_exam_comparison_tables[kimi-agsw].json"]},{"title":"Database Selection Decision Matrix","title_variants":["Database Selection Decision Matrix"],"description":"Guide for selecting the appropriate AWS database service based on requirements","category":"Database Services","exam":"Both (SAA-C03 Primary)","columns":["Traditional OLTP (Relational)","High-Performance OLTP (Aurora)","Internet-Scale NoSQL (DynamoDB)","Analytics/Data Warehouse (Redshift)"],"column_summaries":{"Traditional OLTP (Relational)":"Standard transactional database workloads requiring ACID compliance, complex joins, and SQL support.","High-Performance OLTP (Aurora)":"Enterprise-grade transactional workloads requiring high throughput, auto-scaling storage, and global distribution.","Internet-Scale NoSQL (DynamoDB)":"Massively scalable workloads with unpredictable traffic, requiring single-digit millisecond latency at any scale.","Analytics/Data Warehouse (Redshift)":"Petabyte-scale analytics workloads requiring complex queries, BI integration, and columnar storage."},"rows":[{"feature":"Workload Type","values":{"rds":"Standard transactional apps","aurora":"High-throughput enterprise apps","dynamodb":"Internet-scale, mobile, gaming","redshift":"Analytics, BI, reporting"}},{"feature":"Data Volume","values":{"rds":"Up to 64 TB","aurora":"Up to 128 TB auto-scaling","dynamodb":"Virtually unlimited","redshift":"Petabytes with RA3"}},{"feature":"Query Flexibility","values":{"rds":"Full SQL, complex joins","aurora":"Full SQL, complex joins","dynamodb":"Key-value, limited queries","redshift":"Complex analytics queries"}},{"feature":"Scaling Approach","values":{"rds":"Vertical + read replicas","aurora":"Auto-storage + read replicas","dynamodb":"Horizontal (partition aware)","redshift":"Concurrency scaling"}},{"feature":"Cost Model","values":{"rds":"Instance-based pricing","aurora":"Pay for what you use","dynamodb":"On-demand or provisioned","redshift":"RPU-based (Redshift Processing Units)"}},{"feature":"Serverless Option","values":{"rds":"Limited","aurora":"Aurora Serverless v2","dynamodb":"DynamoDB Standard and on-demand","redshift":"Redshift Serverless"}}],"mnemonics":["RRDRA: RDS and Aurora for traditional/enterprise, DynamoDB for scale, Redshift for analytics"],"exam_tips":["Can't decide? Consider: Transactional SQL → RDS; High performance → Aurora; Scale → DynamoDB; Analytics → Redshift","DynamoDB has no schema - perfect for evolving data models","Aurora auto-shrinks storage unlike RDS - you only pay for what you use","Redshift uses columnar storage optimized for analytical queries, not OLTP","For multi-model needs, consider Amazon Neptune for graphs or DocumentDB for JSON"],"sources":["aws_exam_comparison_tables[minimax-dr].json"]},{"title":"Database Service Comparison","title_variants":["AWS Database Services Comparison","Database Service Comparison"],"context":"This table compares the primary database services on AWS. RDS provides managed relational databases (MySQL, PostgreSQL, SQL Server, Oracle), Aurora is AWS's cloud-native relational database with enhanced performance, DynamoDB is a fully managed NoSQL database for applications requiring single-digit millisecond latency at any scale, DocumentDB offers MongoDB compatibility, and Neptune is a fully managed graph database.","category":"Database / Performance","exam":"SAA-C03","domain":"Design High-Performing Architectures","table_id":"saa_d3_database_choices","relevant_exams":["SAA-C03","AIF-C01"],"relevant_domains":{"SAA-C03":["Domain 2: Design Resilient Architectures","Domain 3: Design High-Performing Architectures"],"AIF-C01":["Domain 1: Fundamentals of AI and ML"]},"columns":["Amazon RDS","Amazon Aurora","Amazon DynamoDB"],"column_summaries":{"Amazon RDS":"A managed relational database service supporting multiple database engines (MySQL, PostgreSQL, Oracle, SQL Server, MariaDB). Automates administrative tasks like backups, patching, and replication, with Multi-AZ for high availability and read replicas for scaling read workloads.","Amazon Aurora":"A cloud-native relational database engine offering MySQL and PostgreSQL compatibility with superior performance (5x MySQL, 3x PostgreSQL). Features automatic six-copy replication across three AZs, up to 15 read replicas, and storage auto-scaling to 128TB.","Amazon DynamoDB":"A fully managed NoSQL database delivering single-digit millisecond latency at any scale. Offers serverless capacity mode, global tables for multi-region replication, and DynamoDB Accelerator (DAX) for microsecond latency caching."},"rows":[{"feature":"Pricing Model","values":{"Amazon RDS":"Instance-based + storage + I/O","Amazon Aurora":"Instance-based + I/O operations","Amazon DynamoDB":"On-demand (pay per request) or provisioned"}},{"feature":"Best exam clue","values":{"Amazon RDS":"Managed SQL for traditional apps","Amazon Aurora":"Higher-performance managed relational needs","Amazon DynamoDB":"Massive scale, low-latency NoSQL"}},{"feature":"Scaling style","values":{"Amazon RDS":"Vertical (scale up instance), Read Replicas","Amazon Aurora":"Auto-scaling storage (up to 128TB), up to 15 Read Replicas","Amazon DynamoDB":"Serverless, virtually unlimited, on-demand or provisioned"}},{"feature":"Query style","values":{"Amazon RDS":"SQL with joins and transactions","Amazon Aurora":"SQL with joins and transactions","Amazon DynamoDB":"Access-pattern-driven NoSQL queries"}},{"feature":"When it shines","values":{"Amazon RDS":"Conventional app migrations and SQL workloads","Amazon Aurora":"High-throughput relational workloads","Amazon DynamoDB":"Burst-heavy or internet-scale simple access workloads"}},{"feature":"Common mistake","values":{"Amazon RDS":"Choosing it when extreme NoSQL scale is needed","Amazon Aurora":"Treating it as identical to any generic RDS engine","Amazon DynamoDB":"Using it when relational joins are central"}},{"feature":"Database Type","values":{"Amazon RDS":"NoSQL (Document - MongoDB compatible)","Amazon Aurora":"Relational (Cloud-Native)","Amazon DynamoDB":"NoSQL (Key-Value/Document)","Amazon Redshift":"Data Warehouse (Columnar)"}},{"feature":"Engines Supported","values":{"Amazon RDS":"MySQL, PostgreSQL, Oracle, SQL Server, MariaDB","Amazon Aurora":"MySQL-compatible, PostgreSQL-compatible","Amazon DynamoDB":"Proprietary (AWS-managed)","Amazon Redshift":"Proprietary (PostgreSQL-based)"}},{"feature":"Performance","values":{"Amazon RDS":"High performance for document queries","Amazon Aurora":"5x faster than MySQL, 3x faster than PostgreSQL","Amazon DynamoDB":"Single-digit millisecond latency","Amazon Redshift":"Petabyte-scale analytics"}},{"feature":"Read Replicas","values":{"Amazon RDS":"Up to 15","Amazon Aurora":"Up to 15","Amazon DynamoDB":"Global Tables (multi-region)","Amazon Redshift":"Not applicable"}},{"feature":"Multi-AZ Support","values":{"Amazon RDS":"Yes (synchronous standby)","Amazon Aurora":"Yes (6 copies across 3 AZs)","Amazon DynamoDB":"Yes (Global Tables)","Amazon Redshift":"Yes (multi-AZ deployment)"}},{"feature":"Serverless Option","values":{"Amazon RDS":"No (Aurora Serverless is separate)","Amazon Aurora":"Aurora Serverless v2","Amazon DynamoDB":"Yes (on-demand mode)","Amazon Redshift":"Redshift Serverless"}},{"feature":"Best Use Case","values":{"Amazon RDS":"Social networks, fraud detection, recommendation engines","Amazon Aurora":"High-performance relational workloads, enterprise apps","Amazon DynamoDB":"Serverless apps, high throughput, unpredictable traffic","Amazon Redshift":"Analytics, BI, data warehousing"}},{"feature":"Availability","values":{"Amazon RDS":"Multi-AZ deployment for HA","Amazon Aurora":"6-way replication across 3 AZs, self-healing","Amazon DynamoDB":"Global Tables (multi-region, active-active)","Amazon DocumentDB":"Multi-AZ with 6 replicas across 3 AZs","Amazon Neptune":"Multi-AZ with read replicas"}}],"mnemonics":["RDS = Reliable Data SQL, Aurora = Accelerated Relational, DynamoDB = Dynamic NoSQL, Redshift = Reporting/Analytics","Need JOINs and SQL? RDS or Aurora. Need massive scale and simple queries? DynamoDB. Need analytics? Redshift. Need performance? Aurora."],"exam_tips":["Aurora offers the best performance for relational databases - 5x MySQL","DynamoDB is the only truly serverless database with unlimited scale","RDS Multi-AZ provides HA; Read Replicas improve read performance","Aurora replicates 6 copies across 3 AZs automatically","Global Tables make DynamoDB multi-region with active-active replication","Redshift is for OLAP; RDS/Aurora/DynamoDB for OLTP"],"why_this_table_matters":"SAA Domain 3 and 4 repeatedly test when to choose relational, cloud-native relational, or NoSQL. This table mirrors one of the most common exam comparison patterns.","sources":["aws_exam_comparison_tables[gpt5].json","aws_exam_comparison_tables[glm5-agent].json","aws_exam_comparison_tables[kimicode-v1].json","aws_exam_comparison_tables[kimicode-v2].json"]},{"title":"Decoupling and Orchestration Patterns","title_variants":["Decoupling and Orchestration Patterns"],"category":"Integration / Resilience","exam":"SAA-C03","domain":"Design Resilient Architectures","table_id":"saa_d2_decoupling_orchestration","columns":["Amazon SQS","Amazon SNS","Amazon API Gateway","AWS Step Functions"],"column_summaries":{"Amazon SQS":"Amazon SQS is a queue for decoupling producers and consumers so components can work asynchronously. On the exam, it is the clean answer for buffering, smoothing bursts, and preventing tight coupling.","Amazon SNS":"Amazon SNS is for pub/sub fan-out where one message needs to reach multiple subscribers. If the question says 'notify many targets' or fan-out events, SNS is the clue.","Amazon API Gateway":"API Gateway is the managed front door for APIs and is common for exposing REST or HTTP endpoints. It is not a queue, but it often fronts serverless and microservice patterns.","AWS Step Functions":"Step Functions orchestrates multi-step workflows with branching, retries, and state transitions. When business logic spans several services and needs explicit workflow control, this is your answer."},"rows":[{"feature":"Primary pattern","values":{"Amazon SQS":"Queue / buffering","Amazon SNS":"Publish / subscribe fan-out","Amazon API Gateway":"Managed API entry point","AWS Step Functions":"Workflow orchestration"}},{"feature":"Best when","values":{"Amazon SQS":"Consumers can process later","Amazon SNS":"One event must reach many destinations","Amazon API Gateway":"Clients need an API endpoint","AWS Step Functions":"Many coordinated steps need retries and state"}},{"feature":"Typical exam clue","values":{"Amazon SQS":"Decouple producer and consumer","Amazon SNS":"Fan-out notifications","Amazon API Gateway":"Expose serverless or microservice API","AWS Step Functions":"Coordinate Lambda or service workflow"}},{"feature":"Persistence of work","values":{"Amazon SQS":"Message waits for consumer","Amazon SNS":"Event broadcast, not queue-first","Amazon API Gateway":"Request handling, not durable queueing","AWS Step Functions":"Stateful execution tracking"}},{"feature":"Great for retry logic","values":{"Amazon SQS":"Yes, at queue-consumer level","Amazon SNS":"Not the main strength","Amazon API Gateway":"Not its main job","AWS Step Functions":"Yes, built into workflow design"}},{"feature":"Common mistake","values":{"Amazon SQS":"Using it for broadcast fan-out","Amazon SNS":"Using it as durable work queue","Amazon API Gateway":"Treating it as orchestration engine","AWS Step Functions":"Using it where a simple queue would do"}}],"why_this_table_matters":"SAA Domain 2 pushes loosely coupled and event-driven design. This table helps distinguish queueing, pub/sub fan-out, API front doors, and workflow orchestration.","sources":["aws_exam_comparison_tables[gpt5].json"]},{"title":"Disaster Recovery Strategies — Backup/Restore vs Pilot Light vs Warm Standby vs Active-Active","title_variants":["Disaster Recovery Strategies — Backup/Restore vs Pilot Light vs Warm Standby vs Active-Active"],"context":"The exam presents a business scenario with RPO (Recovery Point Objective) and RTO (Recovery Time Objective) requirements and asks you to identify the correct DR strategy. RPO = how much DATA you can afford to lose (time since last backup). RTO = how long the business can be DOWN. Shorter RTO/RPO = higher cost.","exam":"SAA-C03","domain":"Domain 2: Design Resilient Architectures","domain_weight":"26%","table_id":"SAA-006","columns":["Backup and Restore","Pilot Light","Warm Standby","Active-Active (Multi-Site)"],"column_summaries":{"Backup and Restore":"The simplest and cheapest strategy — your data is regularly backed up to S3 or another durable store, and in a disaster you restore from that backup. Recovery takes hours to days, so RPO and RTO are highest (worst). Good for non-critical systems.","Pilot Light":"A minimal version of your environment is always running in another region — typically just the database replication is live (the 'pilot light'). In a disaster, you scale up the dormant compute resources to handle traffic. Faster than Backup/Restore but still requires some manual scale-up.","Warm Standby":"A scaled-down but FULLY FUNCTIONAL version of your production environment runs continuously in another region. In a disaster, you simply scale it up to full production capacity. It is ready to serve limited traffic immediately and can go full-scale quickly.","Active-Active (Multi-Site)":"Your FULL production environment runs simultaneously in MULTIPLE regions, all serving live traffic. There is virtually no downtime or data loss because traffic is simply rerouted from the failed region. This is the most expensive but offers the lowest possible RTO and RPO."},"rows":[{"feature":"RPO (Data Loss Tolerance)","values":{"Backup and Restore":"Hours to days","Pilot Light":"Minutes","Warm Standby":"Seconds to minutes","Active-Active (Multi-Site)":"Near zero — real-time replication"}},{"feature":"RTO (Downtime Tolerance)","values":{"Backup and Restore":"Hours to days","Pilot Light":"10 minutes to 1 hour","Warm Standby":"Minutes","Active-Active (Multi-Site)":"Near zero — instant failover"}},{"feature":"Cost","values":{"Backup and Restore":"Lowest — only storage costs","Pilot Light":"Low — minimal running resources","Warm Standby":"Medium — scaled-down duplicate running 24/7","Active-Active (Multi-Site)":"Highest — full duplicate environment running 24/7"}},{"feature":"What Runs in Standby Region","values":{"Backup and Restore":"Nothing — just data backups in S3","Pilot Light":"Core data tier only (database replication active)","Warm Standby":"Scaled-down full stack (database + app servers at reduced capacity)","Active-Active (Multi-Site)":"Full production stack at full capacity"}},{"feature":"Recovery Action Required","values":{"Backup and Restore":"Restore backup, provision servers, reconfigure — high manual effort","Pilot Light":"Scale up app tier (pre-configured AMIs help speed this up)","Warm Standby":"Scale up capacity — mostly automated","Active-Active (Multi-Site)":"DNS/load balancer reroute — mostly automated"}},{"feature":"AWS Services Used","values":{"Backup and Restore":"AWS Backup, S3, S3 Glacier","Pilot Light":"RDS cross-region read replica, pre-baked AMIs","Warm Standby":"Auto Scaling, RDS Multi-AZ or replica, Route 53 health checks","Active-Active (Multi-Site)":"Route 53 latency/weighted routing, DynamoDB Global Tables, Aurora Global Database"}}],"sources":["aws_exam_comparison_tables[sonnet46].json"]},{"title":"Disaster Recovery Strategy Comparison","title_variants":["AWS Disaster Recovery Strategies","AWS Disaster Recovery Strategies Comparison","Disaster Recovery Strategy Comparison"],"context":"This table compares disaster recovery strategies on AWS based on Recovery Point Objective (RPO) and Recovery Time Objective (RTO). The strategies range from simple backup and restore to active-active multi-region deployments with varying cost and complexity trade-offs.","category":"Resilience / DR","exam":"SAA-C03","domain":"Design Resilient Architectures","table_id":"saa_d2_dr_strategies","relevant_exams":["SAA-C03"],"relevant_domains":{"SAA-C03":["Domain 2: Design Resilient Architectures"]},"columns":["Backup and Restore","Pilot Light","Warm Standby","Active-Active"],"column_summaries":{"Backup and Restore":"The simplest and most cost-effective DR strategy where data is regularly backed up and can be restored in a new environment when needed. Suitable for non-critical applications with tolerance for hours to days of downtime.","Pilot Light":"A DR strategy where core infrastructure components (typically the database) are always running in the DR region with replicated data, while other resources are provisioned only during failover. Provides faster recovery than backup/restore with moderate cost.","Warm Standby":"A DR approach where a scaled-down version of the full production environment runs continuously in the DR region. During failover, resources are scaled up to production capacity, enabling recovery in minutes rather than hours.","Active-Active":"The most robust DR strategy where full production environments run in multiple regions simultaneously, with traffic distributed across all sites. Provides zero or near-zero RPO and RTO but at the highest cost."},"rows":[{"feature":"Relative cost","values":{"Backup and Restore":"Lowest (storage costs only)","Pilot Light":"Low to Medium (minimal compute + storage)","Warm Standby":"Medium (reduced capacity always running)","Active-Active":"Highest (full capacity x regions)"}},{"feature":"Recovery speed","values":{"Backup and Restore":"Slowest","Pilot Light":"Faster","Warm Standby":"Fast","Active-Active":"Fastest"}},{"feature":"Data / environment readiness","values":{"Backup and Restore":"Backups only","Pilot Light":"Core systems ready","Warm Standby":"Scaled-down running stack","Active-Active":"Fully running in multiple locations"}},{"feature":"Best exam clue","values":{"Backup and Restore":"Non-critical workloads, development environments","Pilot Light":"Need better recovery without full duplicate stack","Warm Standby":"Need quick recovery but can keep smaller standby","Active-Active":"Mission-critical, zero-downtime requirements"}},{"feature":"Failover Complexity","values":{"Backup and Restore":"Restore from backup to new infrastructure","Pilot Light":"Scale up pilot light resources","Warm Standby":"Scale up standby or redirect traffic","Active-Active":"Route traffic away from failed region"}},{"feature":"Common trap","values":{"Backup and Restore":"Picking it for low RTO workloads","Pilot Light":"Assuming it is instantly full-scale","Warm Standby":"Forgetting ongoing standby cost","Active-Active":"Choosing it when business need does not justify complexity"}},{"feature":"RPO (Data Loss)","values":{"Backup & Restore":"Hours to days","Pilot Light":"Minutes to hours","Warm Standby":"Seconds to minutes","Multi-Site Active/Active":"Zero to seconds"}},{"feature":"RPO (Recovery Point Objective)","values":{"Backup & Restore":"Hours to 24+ hours","Pilot Light":"10s of minutes to hours","Warm Standby":"Seconds to minutes","Multi-Site Active/Active":"Seconds to minutes"}},{"feature":"Infrastructure","values":{"Backup & Restore":"Backup only, no running DR","Pilot Light":"Core infrastructure running","Warm Standby":"Scaled-down production","Multi-Site Active/Active":"Full duplicate environment"}},{"feature":"Data Replication","values":{"Backup & Restore":"Periodic snapshots/backups","Pilot Light":"Continuous replication (async/sync)","Warm Standby":"Continuous replication (typically async)","Multi-Site Active/Active":"Continuous sync/async, multi-master"}},{"feature":"Database State","values":{"Backup & Restore":"No active infrastructure","Pilot Light":"Core components running (database, critical services)","Warm Standby":"Scaled-down but functional environment","Multi-Site Active/Active":"Full production capacity in all regions"}},{"feature":"Example AWS Services","values":{"Backup & Restore":"S3, EBS snapshots, RDS snapshots, AWS Backup","Pilot Light":"RDS Read Replicas, S3 CRR, minimal EC2/ECS","Warm Standby":"Auto Scaling, ALB, RDS cross-region, Route 53","Multi-Site Active/Active":"Route 53, DynamoDB Global Tables, Aurora Global DB, multi-region ALB"}}],"mnemonics":["B&R = Backup & Restore (slowest), Pilot = Minimal core, Warm = Scaled-down standby, Active/Active = Full duplication","Low budget? Backup & Restore. Need DB ready? Pilot Light. Need faster recovery? Warm Standby. Need zero downtime? Multi-Site."],"exam_tips":["RPO = Recovery Point Objective (how much data you can lose)","RTO = Recovery Time Objective (how fast you need to recover)","Pilot Light keeps database replicated; other resources scaled down","Warm Standby runs a scaled-down version of production","Multi-Site is most expensive but provides instant failover","Aurora Global Database supports cross-region read replicas for DR"],"why_this_table_matters":"SAA Domain 2 heavily tests tradeoffs between recovery speed, recovery point, and cost. This table is pure exam gold because DR strategy questions are often about balancing RTO/RPO against spend.","sources":["aws_exam_comparison_tables[gpt5].json","aws_exam_comparison_tables[glm5-agent].json","aws_exam_comparison_tables[kimicode-v1].json","aws_exam_comparison_tables[kimicode-v2].json"]},{"title":"EC2 Instance Families Comparison","title_variants":["EC2 Instance Families Comparison"],"description":"Comparison of EC2 instance families for different workload optimization","category":"COMPUTE_SERVICES","exam":"Both (SAA-C03 Primary, AIF-C01 Reference)","columns":["General Purpose (T, M)","Compute Optimized (C)","Memory Optimized (R, X)","Storage Optimized (D, I, H)"],"column_summaries":{"General Purpose (T, M)":"Instances providing a balanced mix of compute, memory, and network resources, suitable for diverse workloads including web servers and development environments.","Compute Optimized (C)":"Instances designed for compute-intensive workloads requiring high CPU power, ideal for batch processing, scientific modeling, and gaming servers.","Memory Optimized (R, X)":"Large memory footprints designed for memory-intensive applications like in-memory caches, real-time big data analytics, and high-performance databases.","Storage Optimized (D, I, H)":"High disk throughput and IOPS for workloads requiring fast local storage including NoSQL databases, data warehousing, and log processing."},"rows":[{"feature":"Ratio (vCPU:RAM)","values":{"General Purpose (T, M)":"1:2 (T4g) to 1:4 (M6i) depending on instance size","Compute Optimized (C)":"1:2 (C7i, C6i) - more CPU per RAM","Memory Optimized (R, X)":"1:8 (R7g) to 1:16 (X2gd) - more RAM per CPU","Storage Optimized (D, I, H)":"1:2 (D3) to 1:8 (I4i) - balanced with local NVMe"}},{"feature":"Best For","values":{"General Purpose (T, M)":"Web servers, development environments, small databases","Compute Optimized (C)":"Batch processing, scientific modeling, ML inference, gaming","Memory Optimized (R, X)":"In-memory databases, big data (Spark, Hadoop), caching","Storage Optimized (D, I, H)":"Data warehousing, log processing, distributed file systems"}},{"feature":"Cost per vCPU","values":{"General Purpose (T, M)":"Baseline","Compute Optimized (C)":"Higher - optimized for CPU","Memory Optimized (R, X)":"Higher - optimized for RAM","Storage Optimized (D, I, H)":"Moderate - balanced with storage focus"}},{"feature":"Burstable Options","values":{"General Purpose (T, M)":"Yes - T instances have burst CPU capability","Compute Optimized (C)":"No - consistent performance","Memory Optimized (R, X)":"No - consistent performance","Storage Optimized (D, I, H)":"No - consistent performance"}},{"feature":"Local Storage","values":{"General Purpose (T, M)":"No (or minimal NVMe on some)","Compute Optimized (C)":"Optional NVMe (C7i, C6i)","Memory Optimized (R, X)":"No local (R7g) or NVMe (R6i)","Storage Optimized (D, I, H)":"Yes - multiple NVMe drives (D3, I4i, H3)"}},{"feature":"Use in ML","values":{"General Purpose (T, M)":"Light training, inference, development","Compute Optimized (C)":"ML training (especially with GPU instances like C5)","Memory Optimized (R, X)":"ML training with large datasets (R7g with more RAM)","Storage Optimized (D, I, H)":"ML training data staging, preprocessing"}},{"feature":"Resource Balance","values":{"General Purpose (T, M)":"Equal compute, memory, network","Compute Optimized (C)":"High CPU, moderate memory","Memory Optimized (R, X)":"Low CPU, very high memory","Storage Optimized (I, D)":"Moderate CPU, moderate memory, high IOPS"}},{"feature":"Example Use","values":{"General Purpose (T, M)":"t3.micro, m5.large","Compute Optimized (C)":"c5.large, c6i.large","Memory Optimized (R, X)":"r5.large, x2gd.large","Storage Optimized (I, D)":"i3.large, d3.large"}},{"feature":"Cost Efficiency","values":{"General Purpose (T, M)":"Good for most workloads","Compute Optimized (C)":"Best CPU cost per dollar","Memory Optimized (R, X)":"Best memory cost per dollar","Storage Optimized (I, D)":"Best storage cost per IOPS"}}],"mnemonics":["G.C.M.S - General for balanced, Compute for CPU tasks, Memory for RAM needs, Storage for disk-heavy work","GCMsT = General for Good balance, Compute for CPU-heavy, Memory for big data, Storage for IOPS"],"exam_tips":["T instances (T3, T4g) are burstable - CPU credits used for spikes; good for intermittent workloads","For ML training, consider GPU instances (P5, P4, G5) rather than CPU-optimized","Storage optimized instances (D3, I4i) have NVMe drives ideal for ML data loading","R7g instances use Graviton3 processors - cost-effective for memory-intensive workloads","Always check current generation (current is 7th gen for most families)","T instances are burstable - good for unpredictable workloads","C instances have highest CPU performance per core","R instances have highest memory-to-CPU ratio","I and D instances have NVMe SSD local storage (ephemeral)","Graviton instances (M7g, C7g, R7g) offer better price performance using AWS ARM chips"],"sources":["aws_exam_comparison_tables[minimax].json","aws_exam_comparison_tables[minimax-dr].json"]},{"title":"EC2 Instance Types Comparison","title_variants":["EC2 Instance Types Comparison"],"context":"Amazon EC2 offers a wide variety of instance types optimized for different workloads. Understanding the naming convention and characteristics of each family is crucial for the exam. The naming follows a pattern: [Family][Generation][Size] - for example, M6i.xlarge where M=General Purpose, 6=Generation, i=Intel processor, xlarge=size.","columns":["T3/T3a (Burstable)","M6i/M6g (General Purpose)","C6i/C6g (Compute Optimized)","R6i/R6g (Memory Optimized)","X2idn/X2iedn (Memory Optimized)","I4i (Storage Optimized)","D3/D3en (Storage Optimized)","P4d/P4de (Accelerated)","G5/G6 (Accelerated)","Inf2 (Accelerated)"],"rows":[{"feature":"vCPU to Memory Ratio","values":{"T3/T3a (Burstable)":"1:1 to 1:4 (varies by size)","M6i/M6g (General Purpose)":"1:4 (balanced)","C6i/C6g (Compute Optimized)":"1:2","R6i/R6g (Memory Optimized)":"1:8","X2idn/X2iedn (Memory Optimized)":"1:16 to 1:32","I4i (Storage Optimized)":"1:8","D3/D3en (Storage Optimized)":"1:4","P4d/P4de (Accelerated)":"1:8 to 1:16","G5/G6 (Accelerated)":"1:4","Inf2 (Accelerated)":"1:4 to 1:8"}},{"feature":"Baseline Performance","values":{"T3/T3a (Burstable)":"Baseline with CPU credits","M6i/M6g (General Purpose)":"Consistent performance","C6i/C6g (Compute Optimized)":"High compute performance","R6i/R6g (Memory Optimized)":"High memory bandwidth","X2idn/X2iedn (Memory Optimized)":"Extreme memory performance","I4i (Storage Optimized)":"High IOPS storage","D3/D3en (Storage Optimized)":"High throughput HDD","P4d/P4de (Accelerated)":"Highest GPU performance","G5/G6 (Accelerated)":"Balanced GPU/CPU","Inf2 (Accelerated)":"High ML inference"}},{"feature":"Specialized Hardware","values":{"T3/T3a (Burstable)":"None","M6i/M6g (General Purpose)":"None","C6i/C6g (Compute Optimized)":"None","R6i/R6g (Memory Optimized)":"None","X2idn/X2iedn (Memory Optimized)":"High memory bandwidth","I4i (Storage Optimized)":"NVMe SSD (up to 75K IOPS)","D3/D3en (Storage Optimized)":"HDD with high throughput","P4d/P4de (Accelerated)":"NVIDIA A100 GPUs, NVSwitch","G5/G6 (Accelerated)":"NVIDIA A10G/L4 GPUs","Inf2 (Accelerated)":"AWS Inferentia2 chips"}},{"feature":"Best Use Cases","values":{"T3/T3a (Burstable)":"Web servers, dev/test, microservices","M6i/M6g (General Purpose)":"Application servers, small-medium databases","C6i/C6g (Compute Optimized)":"Gaming servers, HPC, batch processing","R6i/R6g (Memory Optimized)":"In-memory caches, databases (MySQL, PostgreSQL)","X2idn/X2iedn (Memory Optimized)":"SAP HANA, large in-memory databases","I4i (Storage Optimized)":"NoSQL (Cassandra, MongoDB), data warehouses","D3/D3en (Storage Optimized)":"Hadoop, data lakes, log processing","P4d/P4de (Accelerated)":"Deep learning training, HPC simulations","G5/G6 (Accelerated)":"ML inference, graphics workstations, gaming","Inf2 (Accelerated)":"Cost-effective ML inference at scale"}},{"feature":"Network Performance","values":{"T3/T3a (Burstable)":"Up to 5 Gbps","M6i/M6g (General Purpose)":"Up to 50 Gbps","C6i/C6g (Compute Optimized)":"Up to 50 Gbps","R6i/R6g (Memory Optimized)":"Up to 50 Gbps","X2idn/X2iedn (Memory Optimized)":"Up to 100 Gbps","I4i (Storage Optimized)":"Up to 40 Gbps","D3/D3en (Storage Optimized)":"Up to 100 Gbps","P4d/P4de (Accelerated)":"400 Gbps (EFA supported)","G5/G6 (Accelerated)":"Up to 100 Gbps","Inf2 (Accelerated)":"Up to 100 Gbps"}},{"feature":"EBS Optimized","values":{"T3/T3a (Burstable)":"Yes (default)","M6i/M6g (General Purpose)":"Yes (default)","C6i/C6g (Compute Optimized)":"Yes (default)","R6i/R6g (Memory Optimized)":"Yes (default)","X2idn/X2iedn (Memory Optimized)":"Yes (default)","I4i (Storage Optimized)":"N/A (instance storage)","D3/D3en (Storage Optimized)":"N/A (instance storage)","P4d/P4de (Accelerated)":"Yes (default)","G5/G6 (Accelerated)":"Yes (default)","Inf2 (Accelerated)":"Yes (default)"}},{"feature":"Pricing Model","values":{"T3/T3a (Burstable)":"Lowest cost, pay per use with unlimited mode option","M6i/M6g (General Purpose)":"Moderate, balanced price/performance","C6i/C6g (Compute Optimized)":"Moderate, compute-focused pricing","R6i/R6g (Memory Optimized)":"Higher due to memory","X2idn/X2iedn (Memory Optimized)":"Premium for extreme memory","I4i (Storage Optimized)":"Premium for high IOPS storage","D3/D3en (Storage Optimized)":"Moderate for high capacity","P4d/P4de (Accelerated)":"Highest cost, GPU premium","G5/G6 (Accelerated)":"High, but lower than P-series","Inf2 (Accelerated)":"Lowest cost for ML inference"}},{"feature":"Processor Type","values":{"T3/T3a (Burstable)":"Intel Xeon / AMD EPYC","M6i/M6g (General Purpose)":"Intel Ice Lake / Graviton2/3","C6i/C6g (Compute Optimized)":"Intel Ice Lake / Graviton2/3","R6i/R6g (Memory Optimized)":"Intel Ice Lake / Graviton2/3","X2idn/X2iedn (Memory Optimized)":"Intel Ice Lake","I4i (Storage Optimized)":"Intel Ice Lake","D3/D3en (Storage Optimized)":"Intel Ice Lake","P4d/P4de (Accelerated)":"Intel Cascade Lake + A100 GPUs","G5/G6 (Accelerated)":"AMD EPYC + NVIDIA GPUs","Inf2 (Accelerated)":"AWS Inferentia2 + Intel Xeon"}}],"sources":["aws_exam_comparison_tables[kimi-agsw].json"]},{"title":"EC2 Pricing Models — On-Demand vs Reserved vs Spot vs Savings Plans","title_variants":["EC2 Pricing Models — On-Demand vs Reserved vs Spot vs Savings Plans"],"context":"Choosing the right EC2 pricing model is one of the easiest ways to cut AWS bills by up to 90%. The exam will describe a workload's predictability and tolerance for interruption, and ask you to identify the most cost-effective option. Understanding WHEN each model is appropriate is more important than knowing the exact discount percentages.","exam":"SAA-C03","domain":"Domain 4: Design Cost-Optimized Architectures","domain_weight":"20%","table_id":"SAA-011","columns":["On-Demand","Reserved Instances (RI)","Spot Instances","Savings Plans"],"column_summaries":{"On-Demand":"On-Demand is the default — you pay for compute by the second with no commitments. It is the most flexible but most expensive option, ideal for unpredictable workloads, development/testing, or new applications where you do not yet know your baseline usage.","Reserved Instances (RI)":"Reserved Instances provide a significant discount (up to 72%) in exchange for a 1 or 3-year commitment to a specific instance type in a specific region. They are best for steady-state, predictable workloads that run continuously — think 'production database servers.'","Spot Instances":"Spot Instances allow you to bid on unused EC2 capacity at discounts up to 90% — but AWS can reclaim them with 2 minutes notice when demand rises. They are ideal for fault-tolerant, interruption-tolerant workloads like batch processing, ML training jobs, and data analysis.","Savings Plans":"Savings Plans offer the same discounts as Reserved Instances but with MORE FLEXIBILITY — instead of committing to a specific instance type, you commit to a dollar amount of hourly spend. Compute Savings Plans apply across EC2, Lambda, and Fargate automatically."},"rows":[{"feature":"Discount vs On-Demand","values":{"On-Demand":"0% — baseline price","Reserved Instances (RI)":"Up to 72% (3-year, All Upfront)","Spot Instances":"Up to 90% — highest possible discount","Savings Plans":"Up to 66% — similar to RI but more flexible"}},{"feature":"Interruption Risk","values":{"On-Demand":"None — runs until you stop it","Reserved Instances (RI)":"None — guaranteed capacity","Spot Instances":"HIGH — can be terminated with 2-min warning","Savings Plans":"None — just a billing discount"}},{"feature":"Commitment","values":{"On-Demand":"None — pay as you go","Reserved Instances (RI)":"1 or 3 years (Standard) or flexible (Convertible)","Spot Instances":"None — but no reliability guarantee","Savings Plans":"1 or 3 years (hourly spend commitment)"}},{"feature":"Flexibility","values":{"On-Demand":"Maximum — change instance type anytime","Reserved Instances (RI)":"Low (Standard RI) to Medium (Convertible RI)","Spot Instances":"High — choose any available instance type","Savings Plans":"HIGH — applies across EC2 families, sizes, regions, Lambda, Fargate"}},{"feature":"Best For","values":{"On-Demand":"Short-term, unpredictable, dev/test workloads","Reserved Instances (RI)":"Steady-state production databases, always-on apps","Spot Instances":"Batch jobs, ML training, CI/CD pipelines, fault-tolerant apps","Savings Plans":"Flexible commitment — best of both RI savings and flexibility"}},{"feature":"Capacity Reservation","values":{"On-Demand":"No guarantee — but usually available","Reserved Instances (RI)":"Yes — Standard RI reserves capacity","Spot Instances":"No — availability depends on market","Savings Plans":"No — billing discount only, no capacity guarantee"}}],"sources":["aws_exam_comparison_tables[sonnet46].json"]},{"title":"EC2 Purchasing and Cost Models","title_variants":["AWS EC2 Pricing Models Comparison","EC2 Purchasing Options Comparison","EC2 Purchasing and Cost Models"],"context":"This table compares AWS EC2 pricing options. On-Demand provides flexibility with no commitment, Reserved Instances offer significant discounts for long-term commitments, Savings Plans provide flexible discount models, and Spot Instances offer the deepest discounts for fault-tolerant workloads.","category":"Cost Optimization / Compute","exam":"SAA-C03","domain":"Design Cost-Optimized Architectures","table_id":"saa_d4_compute_purchasing","relevant_exams":["SAA-C03"],"relevant_domains":{"SAA-C03":["Domain 4: Design Cost-Optimized Architectures"]},"columns":["On-Demand Instances","Reserved Instances","Savings Plans","Spot Instances","Dedicated Hosts"],"column_summaries":{"On-Demand Instances":"On-Demand is the no-commitment option with maximum flexibility and the least planning burden. It is the safe answer for uncertain or short-lived workloads.","Reserved Instances":"Reserved Instances exchange flexibility for pricing commitment on steady-state usage patterns. On the exam, they fit known long-running workloads where capacity characteristics are predictable.","Savings Plans":"Savings Plans are commitment-based discounts with broader flexibility than classic Reserved Instances. If the question values discount plus some agility, Savings Plans are often the sweeter answer.","Spot Instances":"Spot Instances are discounted spare capacity with interruption risk. They are perfect for fault-tolerant, flexible, or retryable workloads and a bad fit for interruption-sensitive production tiers."},"rows":[{"feature":"Commitment Period","values":{"On-Demand Instances":"None (pay per hour/second)","Reserved Instances":"1 year fixed commitment","Savings Plans":"High but more flexible","Spot Instances":"None (interruptible)","Dedicated Hosts":"On-Demand or 1/3 year"}},{"feature":"Best Use Cases","values":{"On-Demand Instances":"Short-term, unpredictable, spiky workloads","Reserved Instances":"Production databases, steady applications","Savings Plans":"Dynamic environments with consistent spend","Spot Instances":"Fault-tolerant, flexible, stateless workloads","Dedicated Hosts":"Software licensing (BYOL), compliance"}},{"feature":"Interruption risk","values":{"On-Demand Instances":"No special interruption model","Reserved Instances":"No special interruption model","Savings Plans":"No special interruption model","Spot Instances":"High - 2-min warning before termination","Dedicated Hosts":"None - dedicated physical server"}},{"feature":"Typical exam clue","values":{"On-Demand Instances":"Need flexibility now","Reserved Instances":"Known baseline demand","Savings Plans":"Want discount with broader usage flexibility","Spot Instances":"Batch, CI, analytics, stateless work"}},{"feature":"Cost priority ranking","values":{"On-Demand Instances":"Highest flexibility, less discount","Reserved Instances":"Better discount, less flexibility","Savings Plans":"Strong discount with flexibility","Spot Instances":"Deep discount with interruption tradeoff"}},{"feature":"Common trap","values":{"On-Demand Instances":"Using for steady always-on fleets indefinitely","Reserved Instances":"Choosing them when architecture may change a lot","Savings Plans":"Assuming every workload fits equally well","Spot Instances":"Using them for critical non-interruptible workloads"}},{"feature":"Discount vs On-Demand","values":{"On-Demand":"None (baseline pricing)","Reserved Instances (1-Year)":"Up to 40% discount","Reserved Instances (3-Year)":"Up to 60% discount","Savings Plans":"Up to 72% discount (Compute SP)","Spot Instances":"Up to 90% discount","Dedicated Hosts":"On-Demand or Reserved pricing","Dedicated Instances":"On-Demand pricing only"}},{"feature":"Payment Options","values":{"On-Demand":"Pay as you go (hourly/second)","Reserved Instances (1-Year)":"All upfront, Partial upfront, No upfront","Reserved Instances (3-Year)":"All Upfront, Partial, No Upfront","Savings Plans":"All upfront, Partial upfront, No upfront","Spot Instances":"Pay for capacity used until interrupted","Dedicated Hosts":"On-Demand hourly or Reserved","Dedicated Instances":"On-Demand hourly only"}},{"feature":"Instance Flexibility","values":{"On-Demand":"Full flexibility - any instance type","Reserved Instances (1-Year)":"Locked to instance family, region, AZ","Reserved Instances (3-Year)":"Locked to instance family, region, AZ","Savings Plans":"High flexibility - any instance, region","Spot Instances":"Full flexibility - any available capacity","Dedicated Hosts":"Specific physical server","Dedicated Instances":"Single-tenant hardware, any instance type"}},{"feature":"Capacity Guarantee","values":{"On-Demand":"Yes - within service limits","Reserved Instances (1-Year)":"Yes - reserved capacity in AZ","Reserved Instances (3-Year)":"Yes - reserved capacity in AZ","Savings Plans":"Yes - but no AZ capacity guarantee","Spot Instances":"No - capacity can be reclaimed","Dedicated Hosts":"Yes - dedicated physical capacity","Dedicated Instances":"Yes - dedicated single-tenant hardware"}},{"feature":"Marketplace Support","values":{"On-Demand":"N/A","Reserved Instances (1-Year)":"Can be sold if unused","Reserved Instances (3-Year)":"Can be sold if unused","Savings Plans":"Cannot be sold","Spot Instances":"N/A","Dedicated Hosts":"Can be released","Dedicated Instances":"N/A"}},{"feature":"Scope","values":{"On-Demand":"Any instance, any time","Reserved Instances (RI)":"Specific instance type, AZ, OS","Savings Plans":"Compute (any instance) or EC2 Instance plans","Spot Instances":"Any available spare capacity"}}],"why_this_table_matters":"SAA Domain 4 loves tradeoff questions around flexibility versus commitment. This table helps map purchasing choices to predictability, interruption tolerance, and planning horizon.","sources":["aws_exam_comparison_tables[gpt5].json","aws_exam_comparison_tables[kimi-agsw].json","aws_exam_comparison_tables[kimicode-v2].json"]},{"title":"EC2 vs Lambda vs Fargate vs ECS vs EKS","title_variants":["EC2 vs Lambda vs Fargate","EC2 vs Lambda vs Fargate vs ECS vs EKS"],"description":"Comparison of AWS compute options for different architectural needs","context":"AWS compute services span a spectrum from full control (EC2) to fully serverless (Lambda). The SAA-C03 exam heavily tests your ability to choose the RIGHT compute service based on workload characteristics like duration, traffic patterns, container needs, and operational overhead tolerance. Understanding this spectrum is fundamental.","category":"COMPUTE_SERVICES","exam":"SAA-C03","domain":"Domain 2: Design Resilient Architectures","domain_weight":"26%","table_id":"SAA-004","columns":["Amazon EC2","AWS Lambda","AWS Fargate","Amazon ECS","Amazon EKS"],"column_summaries":{"Amazon EC2":"EC2 (Elastic Compute Cloud) provides virtual machines in the cloud where you have full control of the OS, runtime, and configuration. You choose the instance type, manage patching and scaling, and pay for uptime. It is the most flexible but most operationally demanding option.","AWS Lambda":"Lambda is serverless compute for event-driven functions — you upload code and Lambda runs it in response to triggers (API calls, S3 events, DynamoDB streams) with no servers to manage. It scales instantly to zero and you pay only for execution time, making it ideal for unpredictable or infrequent workloads.","AWS Fargate":"Fargate is serverless container compute — you define your container and Fargate manages the underlying EC2 instances automatically. It bridges the gap between ECS/EKS (container orchestration) and Lambda (serverless) by eliminating server management while supporting long-running containers.","Amazon ECS":"ECS (Elastic Container Service) is AWS's native container orchestration platform — it manages the scheduling, deployment, and scaling of Docker containers. It runs on either EC2 instances (you manage servers) or Fargate (serverless). Simpler than Kubernetes and AWS-native.","Amazon EKS":"EKS (Elastic Kubernetes Service) is a fully managed Kubernetes service on AWS — it runs the standard Kubernetes control plane for you. It is more complex than ECS but preferred when the team already uses Kubernetes or needs Kubernetes-specific features and ecosystem tools."},"rows":[{"feature":"Server Management","values":{"Amazon EC2":"Full control - you manage OS, patches, scaling, capacity","AWS Lambda":"No servers to manage - AWS handles everything","AWS Fargate":"Containers without managing servers - you manage containers only","Amazon ECS":"Optional — EC2 mode (you manage) or Fargate mode (managed)","Amazon EKS":"Optional — EC2 mode (you manage) or Fargate mode (managed)"}},{"feature":"Unit of Deployment","values":{"Amazon EC2":"Virtual Machine (AMI + instance type)","AWS Lambda":"Function (code + handler + runtime)","AWS Fargate":"Container (Docker image + task definition)","Amazon ECS":"Container (task definition, service)","Amazon EKS":"Pod (Kubernetes pod spec)"}},{"feature":"Max Duration","values":{"Amazon EC2":"Unlimited — runs as long as instance is on","AWS Lambda":"15 minutes maximum per invocation","AWS Fargate":"Unlimited — long-running containers supported","Amazon ECS":"Unlimited","Amazon EKS":"Unlimited"}},{"feature":"Scaling","values":{"Amazon EC2":"Manual or Auto Scaling Groups; capacity planning required","AWS Lambda":"Automatic and instant — scales to 1000s of concurrent invocations","AWS Fargate":"ECS/EKS handles scheduling; Fargate scales tasks automatically","Amazon ECS":"Service Auto Scaling + Fargate auto-provision","Amazon EKS":"Horizontal Pod Autoscaler + Cluster Autoscaler"}},{"feature":"Pricing Model","values":{"Amazon EC2":"Per second/hour of instance time (minimum 60 seconds in some cases)","AWS Lambda":"Per invocation + per GB-second of execution time (first 400K GB-s free)","AWS Fargate":"Per vCPU-hour + per GB-hour of container runtime","Amazon ECS":"EC2 mode: instance cost. Fargate mode: task resource cost","Amazon EKS":"$0.10/hour for control plane + underlying compute"}},{"feature":"Best Use Case","values":{"Amazon EC2":"Long-running, stateful, licensed software, full OS control required","AWS Lambda":"Event-driven, short-lived tasks, microservices with unpredictable traffic","AWS Fargate":"Containerized microservices, batch jobs, long-running containers","Amazon ECS":"AWS-native container apps; simpler than Kubernetes","Amazon EKS":"Kubernetes workloads, hybrid environments, multi-cloud portability"}},{"feature":"Operational Complexity","values":{"Amazon EC2":"Highest — most control, most responsibility","AWS Lambda":"Lowest — zero infrastructure concerns","AWS Fargate":"Low — just define containers","Amazon ECS":"Medium — container orchestration but AWS-native","Amazon EKS":"Medium-High — Kubernetes expertise required"}},{"feature":"Execution Time","values":{"Amazon EC2":"No limit (hours, days, weeks)","AWS Lambda":"Max 15 minutes per execution","AWS Fargate":"No limit (up to task definition limits)"}},{"feature":"Cold Starts","values":{"Amazon EC2":"No cold starts - always ready","AWS Lambda":"Cold starts possible - can use provisioned concurrency","AWS Fargate":"Cold starts possible but typically faster than Lambda"}},{"feature":"Idempotency","values":{"Amazon EC2":"Must implement in application code","AWS Lambda":"SDK handles retries for transient failures","AWS Fargate":"Must implement in application/container code"}}],"mnemonics":["E.L.F - EC2 gives you Everything, Lambda is Function-only (serverless), Fargate is For containers without servers"],"exam_tips":["Lambda is ideal for event-driven architectures - S3 events, DynamoDB streams, etc.","Lambda has 15-minute timeout - use Step Functions for longer workflows","Fargate is preferred over Lambda for containerized workloads requiring >15 min execution","For cost optimization: Lambda for sporadic traffic, Fargate for steady traffic, EC2 for predictable high-volume","Lambda + API Gateway is a common pattern for serverless REST APIs"],"sources":["aws_exam_comparison_tables[sonnet46].json","aws_exam_comparison_tables[minimax].json"]},{"title":"ECS vs EKS vs Fargate Comprehensive Comparison","title_variants":["ECS vs EKS vs Fargate Comprehensive Comparison"],"context":"This table provides a comprehensive comparison of AWS container deployment options. ECS offers AWS-native orchestration, EKS provides managed Kubernetes, and Fargate delivers serverless containers without managing infrastructure.","table_id":"container_platforms_comparison","relevant_exams":["SAA-C03"],"relevant_domains":{"SAA-C03":["Domain 2: Design Resilient Architectures"]},"columns":["Amazon ECS","Amazon EKS","AWS Fargate"],"column_summaries":{"Amazon ECS":"Fully managed container orchestration service with AWS-native task definitions and deep service integration for simple to complex container deployments.","Amazon EKS":"Managed Kubernetes control plane supporting standard Kubernetes APIs and ecosystem tools for portable, complex container orchestration.","AWS Fargate":"Serverless compute engine for containers that eliminates infrastructure management, working with both ECS and EKS for truly serverless container deployments."},"rows":[{"feature":"Definition","values":{"Amazon ECS":"Fully managed container orchestration service","Amazon EKS":"Managed Kubernetes service","AWS Fargate":"Serverless compute engine for containers"}},{"feature":"Control Plane","values":{"Amazon ECS":"Managed by AWS","Amazon EKS":"Managed Kubernetes control plane","AWS Fargate":"Managed by AWS (when used with ECS/EKS)"}},{"feature":"Orchestration","values":{"Amazon ECS":"ECS Task Definitions","Amazon EKS":"Kubernetes (Pods, Deployments, Services)","AWS Fargate":"ECS or EKS orchestration"}},{"feature":"Compute Options","values":{"Amazon ECS":"EC2 instances or Fargate","Amazon EKS":"EC2 instances or Fargate","AWS Fargate":"Fargate only (no EC2 to manage)"}},{"feature":"Ease of Use","values":{"Amazon ECS":"Simpler, AWS-specific","Amazon EKS":"More complex, Kubernetes-standard","AWS Fargate":"Simplest, no infrastructure management"}},{"feature":"Scaling","values":{"Amazon ECS":"Managed scaling with ECS Service Auto Scaling","Amazon EKS":"Kubernetes-native scaling","AWS Fargate":"Automatic scaling by AWS"}},{"feature":"Cost","values":{"Amazon ECS":"Pay for EC2 or Fargate resources","Amazon EKS":"$0.10/hour cluster + EC2 or Fargate","AWS Fargate":"Pay per vCPU and memory used"}},{"feature":"Operational Overhead","values":{"Amazon ECS":"Lower than managing Kubernetes","Amazon EKS":"Requires Kubernetes expertise","AWS Fargate":"Minimal (abstracts infrastructure)"}},{"feature":"Use Cases","values":{"Amazon ECS":"AWS-native workloads, simpler setups","Amazon EKS":"Standardized Ku
