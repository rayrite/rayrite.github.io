rquet)","Glue crawlers automatically discover and catalog data"],"sources":["aws_exam_comparison_tables[glm5-agent].json"]},{"title":"AWS Generative AI Services Comparison","title_variants":["AWS Generative AI Services Comparison","Generative AI Services Comparison"],"context":"AWS provides multiple services for generative AI capabilities, each designed for different user personas and use cases. Amazon Bedrock provides foundation model access via API for developers building generative AI applications. Amazon Q is a generative AI-powered assistant for business users and developers. PartyRock is a learning playground for experimenting with generative AI without coding. Understanding when to use each service is critical for both the AIF-C01 and SAA-C03 exams.","table_id":"AIF-004","columns":["Amazon Bedrock","Amazon SageMaker JumpStart","Amazon Q","PartyRock"],"column_summaries":{"Amazon Bedrock":"A fully managed service that provides access to multiple foundation models (Claude, Titan, Llama, Mistral, Stable Diffusion) through a unified API. Offers fine-tuning, provisioned throughput, and agents for building production generative AI applications without managing infrastructure.","Amazon SageMaker JumpStart":"A feature within SageMaker providing pre-trained models and end-to-end solutions that can be deployed with a few clicks. Offers more customization options and control but requires managing SageMaker infrastructure.","Amazon Q":"A generative AI-powered assistant designed for business productivity. Integrates with enterprise data sources to provide contextual assistance for tasks like coding, document analysis, and business intelligence.","PartyRock":"A free Amazon Bedrock playground that allows users to experiment with foundation models without writing code. Ideal for learning prompt engineering, testing model capabilities, and prototyping ideas before production deployment."},"rows":[{"feature":"Service Type","values":{"Amazon Bedrock":"Managed FMs as a service","Amazon SageMaker JumpStart":"ML platform with pre-built models","Amazon Q":"Generative AI assistant","PartyRock":"Bedrock playground (free tier)"}},{"feature":"Model Access","values":{"Amazon Bedrock":"Multiple FMs (Claude, Titan, Llama, etc.)","Amazon SageMaker JumpStart":"Open source & AWS models","Amazon Q":"Bedrock-powered assistant","PartyRock":"Bedrock models (sandbox)"}},{"feature":"Customization Options","values":{"Amazon Bedrock":"Fine-tuning, continued pre-training, RAG, Agents","Amazon SageMaker JumpStart":"Full model customization","Amazon Q":"Custom data sources, application plugins","PartyRock":"Prompt engineering only"}},{"feature":"Infrastructure","values":{"Amazon Bedrock":"Fully serverless","Amazon SageMaker JumpStart":"Requires SageMaker instances","Amazon Q":"Fully managed","PartyRock":"Serverless (free tier)"}},{"feature":"Coding Required","values":{"Amazon Bedrock":"Yes - API/SDK integration","Amazon SageMaker JumpStart":"Moderate to high","Amazon Q":"No - Natural language interface","PartyRock":"No - Visual interface"}},{"feature":"Best Use Case","values":{"Amazon Bedrock":"Build production generative AI applications","Amazon SageMaker JumpStart":"Custom ML workflows","Amazon Q":"Accelerate development and business workflows","PartyRock":"Learn generative AI concepts hands-on"}},{"feature":"Data Privacy","values":{"Amazon Bedrock":"Data not used to train models, VPC support","Amazon SageMaker JumpStart":"Full control over data","Amazon Q":"Enterprise-grade security, IAM integration","PartyRock":"Public service, not for sensitive data"}},{"feature":"Pricing Model","values":{"Amazon Bedrock":"Per-token pricing (input/output)","Amazon SageMaker JumpStart":"Compute + storage costs","Amazon Q":"Per-user subscription pricing","PartyRock":"Free tier with credit-based usage"}},{"feature":"Agents Support","values":{"Amazon Bedrock":"Bedrock Agents available","Amazon SageMaker JumpStart":"Custom agent development","Amazon Q":"Built-in agent capabilities","PartyRock":"Not available"}},{"feature":"Primary Purpose","values":{"Amazon Bedrock":"Access foundation models via API for app development","Amazon Q":"AI assistant for business and development tasks","PartyRock":"Learn and experiment with generative AI"}},{"feature":"Target User","values":{"Amazon Bedrock":"Developers and ML engineers","Amazon Q":"Business users, developers, IT professionals","PartyRock":"Students, hobbyists, AI learners"}},{"feature":"Foundation Models Available","values":{"Amazon Bedrock":"Claude, Llama, Titan, Jurassic, Stable Diffusion, Command","Amazon Q":"Proprietary AWS models (Titan-based)","PartyRock":"Curated selection (Claude, Titan, Stable Diffusion)"}},{"feature":"Key Capabilities","values":{"Amazon Bedrock":"Text generation, embeddings, image generation, agents","Amazon Q":"Code generation, document analysis, AWS expertise, business insights","PartyRock":"Prompt engineering, app building, model comparison"}},{"feature":"Integration Points","values":{"Amazon Bedrock":"Lambda, API Gateway, Kendra, OpenSearch, S3","Amazon Q":"AWS Console, IDEs (VS Code), business applications","PartyRock":"Standalone web interface"}},{"feature":"Exam Relevance","values":{"Amazon Bedrock":"Very High - Core generative AI service","Amazon Q":"High - Know the assistant use cases","PartyRock":"Low - Learning tool, not production"}}],"mnemonics":["BED-SM-Q-PARTY: BEDrock for foundation, SageMaker for Mastery, Q for Quick assistance, PartyRock for Practice","Need production FMs? Bedrock. Building custom models? SageMaker. Want a business assistant? Amazon Q. Learning/testing? PartyRock."],"exam_tips":["Bedrock is the primary service for using foundation models without managing infrastructure","SageMaker JumpStart is for when you need more control over the model and training","Amazon Q is the 'copilot' style assistant for business productivity","PartyRock is the free playground for testing Bedrock models - great for learning","For fine-tuning: Bedrock for quick fine-tuning, SageMaker for full customization","Bedrock Agents can orchestrate multi-step tasks automatically"],"sources":["aws_exam_comparison_tables[glm5-agent].json","aws_exam_comparison_tables[kimi-agsw].json"]},{"title":"AWS Hybrid Storage Solutions","title_variants":["AWS Hybrid Storage Solutions"],"context":"Comparing hybrid and data transfer storage solutions - Domain 3 and 4","table_id":"SAA-010","columns":["AWS Storage Gateway","AWS DataSync","AWS Snow Family","AWS Transfer Family"],"column_summaries":{"AWS Storage Gateway":"A hybrid storage service that enables on-premises applications to use AWS cloud storage seamlessly. Offers File Gateway (NFS/SMB to S3), Volume Gateway (iSCSI block storage), and Tape Gateway (virtual tape library) for various hybrid scenarios.","AWS DataSync":"A data transfer service that simplifies and automates moving data between on-premises storage and AWS. Uses a lightweight agent to efficiently transfer data over the internet or Direct Connect, with scheduling, encryption, and integrity verification.","AWS Snow Family":"Physical data migration devices for offline data transfer when network transfer is impractical. Includes Snowcone (8TB, portable edge computing), Snowball Edge (80TB, compute capability), and Snowmobile (100PB, exabyte-scale migrations).","AWS Transfer Family":"A fully managed service for file transfers using SFTP, FTPS, and FTP protocols. Enables secure file exchange with third parties without managing infrastructure, with data stored directly in S3 or EFS."},"rows":[{"feature":"Primary Purpose","values":{"AWS Storage Gateway":"Hybrid cloud storage bridge","AWS DataSync":"Automated data transfer","AWS Snow Family":"Offline data migration","AWS Transfer Family":"Managed file transfer"}},{"feature":"Deployment Location","values":{"AWS Storage Gateway":"On-premises (VM/hardware)","AWS DataSync":"On-premises agent","AWS Snow Family":"Physical devices","AWS Transfer Family":"AWS managed service"}},{"feature":"Transfer Mode","values":{"AWS Storage Gateway":"Real-time sync","AWS DataSync":"Scheduled sync","AWS Snow Family":"Physical shipment","AWS Transfer Family":"SFTP/FTPS/FTP protocols"}},{"feature":"Data Volume","values":{"AWS Storage Gateway":"TB to PB","AWS DataSync":"TB to PB","AWS Snow Family":"TB to EB (Snowmobile)","AWS Transfer Family":"Any size"}},{"feature":"Gateway Types","values":{"AWS Storage Gateway":"File, Volume, Tape","AWS DataSync":"N/A (agent-based)","AWS Snow Family":"Snowcone, Snowball, Snowmobile","AWS Transfer Family":"N/A (protocol-based)"}},{"feature":"Connectivity","values":{"AWS Storage Gateway":"Internet or Direct Connect","AWS DataSync":"Internet or Direct Connect","AWS Snow Family":"Physical shipping","AWS Transfer Family":"Internet or VPC endpoint"}},{"feature":"Encryption","values":{"AWS Storage Gateway":"In transit and at rest","AWS DataSync":"In transit and at rest","AWS Snow Family":"Physical + encryption","AWS Transfer Family":"In transit (TLS)"}},{"feature":"Best For","values":{"AWS Storage Gateway":"Hybrid applications, backup","AWS DataSync":"Ongoing sync, migration","AWS Snow Family":"Large initial migration","AWS Transfer Family":"SFTP/FTPS file sharing"}},{"feature":"Cost Driver","values":{"AWS Storage Gateway":"Storage + data transfer","AWS DataSync":"Data transfer amount","AWS Snow Family":"Device rental + shipping","AWS Transfer Family":"Data transfer + storage"}}],"mnemonics":["Storage Gateway = Hybrid bridge, DataSync = Automated sync, Snow = Physical migration, Transfer Family = SFTP/FTPS","Need hybrid storage? Storage Gateway. Need automated transfer? DataSync. Need offline migration? Snow Family. Need SFTP access? Transfer Family."],"exam_tips":["Storage Gateway caches frequently accessed data on-premises","DataSync can schedule automated transfers (e.g., nightly sync)","Snowball Edge is for 10s of TB, Snowmobile for 100s of PB","Snowcone is the smallest - portable for edge computing","Transfer Family supports SFTP, FTPS, and FTP protocols","Storage Gateway File Gateway uses S3 as backend storage"],"sources":["aws_exam_comparison_tables[glm5-agent].json"]},{"title":"AWS IAM Security Components","title_variants":["AWS IAM Security Components","IAM Components Comparison"],"context":"AWS Identity and Access Management (IAM) is the foundation of AWS security, providing centralized control over authentication and authorization. Understanding the differences between IAM Users, Groups, Roles, and Policies is critical for the exam. Users represent individual identities with long-term credentials, Groups are collections of users for easier permission management, Roles provide temporary credentials for cross-account access and service delegation, while Policies (both identity-based and resource-based) define the actual permissions. The exam frequently tests scenarios where you must choose the appropriate IAM component based on use case, security best practices, and operational requirements.","table_id":"SAA-013","columns":["IAM Users","IAM Groups","IAM Roles","IAM Policies"],"column_summaries":{"IAM Users":"An identity within AWS that represents a person or application that interacts with AWS services. Users can have passwords for console access and access keys for programmatic access. Best practice is to use AWS IAM Identity Center for human users instead.","IAM Groups":"A collection of IAM users that share common permissions. Groups simplify permission management by allowing you to attach policies to the group rather than individual users. Users inherit all permissions from all groups they belong to.","IAM Roles":"An identity with specific permissions that can be assumed by trusted principals (users, applications, or AWS services). Roles provide temporary security credentials via AWS STS, making them ideal for cross-account access and AWS service permissions.","IAM Policies":"JSON documents that define permissions for AWS identities and resources. Specify what actions are allowed or denied on which resources under what conditions. Can be managed (standalone) or inline (embedded in identity)."},"rows":[{"feature":"Identity Type","values":{"IAM Users":"Individual identity","IAM Groups":"Collection of users","IAM Roles":"Assumable identity","IAM Policies":"Permission document"}},{"feature":"Access Keys","values":{"IAM Users":"Yes (for programmatic access)","IAM Groups":"N/A - assigned to users","IAM Roles":"Temporary credentials via STS","IAM Policies":"N/A - attached to identities"}},{"feature":"Password","values":{"IAM Users":"Yes (for console access)","IAM Groups":"N/A - assigned to users","IAM Roles":"N/A - assumed by principals","IAM Policies":"N/A"}},{"feature":"Use Cases","values":{"IAM Users":"Individual developers, service accounts needing programmatic access, legacy applications","IAM Groups":"Organize users by job function (Developers, Admins, ReadOnly)","IAM Roles":"Cross-account access, EC2/ Lambda service roles, SAML/OIDC federation, third-party access","IAM Policies":"Cross-account access to single resource (S3, SNS, SQS), service-specific permissions"}},{"feature":"Best Practice","values":{"IAM Users":"Avoid for human access; use IAM Identity Center or federation instead","IAM Groups":"Use for organizing users by function; cannot be referenced in resource policies","IAM Roles":"Preferred over users for applications; rotate credentials automatically via STS","IAM Policies":"Use managed policies for reusability; inline for specific exceptions"}},{"feature":"MFA Support","values":{"IAM Users":"Yes (recommended)","IAM Groups":"N/A - configured on users","IAM Roles":"Yes (when assumed)","IAM Policies":"N/A"}},{"feature":"Maximum Attachments","values":{"IAM Users":"10 managed policies + inline policies","IAM Groups":"10 managed policies + inline policies","IAM Roles":"10 managed policies + inline policies, 1 trust policy","IAM Policies":"N/A - attached to identities"}},{"feature":"Credential Rotation","values":{"IAM Users":"Long-term credentials (password, access keys, MFA devices)","IAM Groups":"No credentials - purely organizational construct","IAM Roles":"Temporary credentials (STS tokens) with configurable expiration (15 min - 12 hours)","IAM Policies":"No credentials - policy document only"}},{"feature":"Cross-Account Access","values":{"IAM Users":"Not possible","IAM Groups":"Not possible","IAM Roles":"Yes (via trust policy)","IAM Policies":"Cross-account resource policies"}},{"feature":"Primary Purpose","values":{"IAM Users":"Represent individual human identities or applications needing long-term AWS access","IAM Groups":"Collection of IAM users to simplify permission management at scale","IAM Roles":"Provide temporary credentials for cross-account access, service delegation, or federated users","Identity-Based Policies":"Attach to IAM identities (users, groups, roles) to define what actions they can perform","Resource-Based Policies":"Attach directly to AWS resources to define who can access them"}},{"feature":"Trust Relationship","values":{"IAM Users":"N/A","IAM Groups":"N/A","IAM Roles":"Requires trust policy specifying who can assume the role","Identity-Based Policies":"N/A","Resource-Based Policies":"N/A"}},{"feature":"Permission Boundaries","values":{"IAM Users":"Can have permission boundaries set","IAM Groups":"Members inherit boundaries from user settings","IAM Roles":"Can have permission boundaries set","Identity-Based Policies":"Can BE used as permission boundaries","Resource-Based Policies":"Cannot be used as permission boundaries"}},{"feature":"Policy Evaluation","values":{"IAM Users":"Explicit DENY > Explicit ALLOW > Implicit DENY","IAM Groups":"Permissions aggregated from all group memberships","IAM Roles":"Session policies can further restrict permissions during assume role","Identity-Based Policies":"Combined with resource policies; both must allow access","Resource-Based Policies":"For same-account: OR with identity policy; Cross-account: AND required"}},{"feature":"Service Integration","values":{"IAM Users":"Console login, CLI, SDK access","IAM Groups":"Cannot be used in resource policies or as principals","IAM Roles":"EC2 instance profiles, Lambda execution roles, ECS task roles, CodeBuild/CodePipeline","Identity-Based Policies":"Attached via console, CLI, CloudFormation, Terraform","Resource-Based Policies":"S3 bucket policies, SNS topic policies, SQS queue policies, KMS key policies"}}],"mnemonics":["Users = Individual identities, Groups = User collections, Roles = Temporary assumable identity, Policies = Permission rules","Need individual access? User. Need team permissions? Group. Need service access? Role. Need to define permissions? Policy."],"exam_tips":["Always use IAM Roles for EC2 instances, Lambda, and other AWS services","Groups simplify permission management for teams","Roles provide temporary credentials via STS (more secure)","Policies follow least privilege - deny > allow evaluation","Cross-account access requires roles with trust policies","Enable MFA for all IAM users, especially root account"],"sources":["aws_exam_comparison_tables[glm5-agent].json","aws_exam_comparison_tables[kimi-agsw].json"]},{"title":"AWS Identity and Access Management Services Comparison","title_variants":["AWS Identity and Access Management Services Comparison","Identity and Access Management Services Comparison"],"description":"Comparing AWS identity and access management services","context":"This table compares AWS identity and access management services. IAM provides core identity and access management, IAM Identity Center enables SSO across AWS accounts and applications, Cognito adds user authentication for web/mobile apps, and Directory Service provides managed Active Directory.","category":"Security & Identity Services","exam":"Both (SAA-C03 Primary, AIF-C01 Reference)","table_id":"iam_services_comparison","relevant_exams":["SAA-C03","AIF-C01"],"relevant_domains":{"SAA-C03":["Domain 1: Design Secure Architectures"],"AIF-C01":["Domain 5: Security, Compliance, and Governance for AI Solutions"]},"columns":["AWS IAM","IAM Identity Center","Amazon Cognito","AWS Directory Service"],"column_summaries":{"AWS IAM":"Foundational service for securely controlling access to AWS services and resources through users, groups, roles, and policies with fine-grained permissions.","IAM Identity Center":"Cloud-based single sign-on service that centrally manages access to multiple AWS accounts and business applications with SAML 2.0 integration.","Amazon Cognito":"Authentication and authorization service for web and mobile applications that provides user sign-up, sign-in, and access control with social and enterprise identity federation.","AWS Directory Service":"Managed service for connecting AWS resources with an existing on-premises Microsoft Active Directory or setting up a new directory in the AWS Cloud."},"rows":[{"feature":"Primary Purpose","values":{"AWS IAM":"Access control for AWS resources","IAM Identity Center":"Single Sign-On (SSO) for AWS and applications","Amazon Cognito":"User authentication for web/mobile apps","AWS Directory Service":"Directory integration (Active Directory)"}},{"feature":"User Types","values":{"AWS IAM":"IAM users, roles for services/people","IAM Identity Center":"Workforce users, SSO users","Amazon Cognito":"Application end users (customers)","AWS Directory Service":"Directory users (AD)"}},{"feature":"Federation Support","values":{"AWS IAM":"SAML 2.0, OIDC, Web Identity","IAM Identity Center":"SAML 2.0, automatic AWS account federation","Amazon Cognito":"Social (Google, Facebook), SAML, OIDC","AWS Directory Service":"AD trust relationships"}},{"feature":"Multi-Account Support","values":{"AWS IAM":"Cross-account roles","IAM Identity Center":"Native multi-account access management","Amazon Cognito":"Not applicable (app-level)","AWS Directory Service":"Can be shared across accounts"}},{"feature":"Authentication Methods","values":{"AWS IAM":"Access keys, passwords, MFA","IAM Identity Center":"SSO portal, MFA support","Amazon Cognito":"Username/password, social login, MFA","AWS Directory Service":"Kerberos, LDAP, NTLM"}},{"feature":"Token Type","values":{"AWS IAM":"AWS credentials (temporary or long-term)","IAM Identity Center":"AWS credentials via SSO","Amazon Cognito":"JWT tokens (ID, access, refresh)","AWS Directory Service":"Kerberos tickets"}},{"feature":"Integration Points","values":{"AWS IAM":"All AWS services","IAM Identity Center":"AWS accounts, SAML applications","Amazon Cognito":"API Gateway, ALB, mobile SDKs","AWS Directory Service":"EC2, RDS, WorkSpaces, WorkDocs"}},{"feature":"Key Features","values":{"AWS IAM":"Policies, roles, permission boundaries","IAM Identity Center":"Permission sets, account assignments","Amazon Cognito":"User pools (auth), identity pools (AWS access)","AWS Directory Service":"Managed AD, AD Connector, Simple AD"}},{"feature":"Users Managed","values":{"AWS IAM":"IAM users within AWS account","AWS IAM Identity Center":"Corporate directory users (SSO)","Amazon Cognito":"Application end users (sign-up/in)"}},{"feature":"Use Case","values":{"AWS IAM":"AWS API access, cross-account access","AWS IAM Identity Center":"Enterprise SSO, multiple AWS accounts","Amazon Cognito":"Mobile apps, web apps, user pools"}},{"feature":"Protocol","values":{"AWS IAM":"IAM roles, policies, STS tokens","AWS IAM Identity Center":"SAML 2.0, OIDC","Amazon Cognito":"OAuth 2.0, SAML 2.0, OpenID Connect"}},{"feature":"External Identity","values":{"AWS IAM":"Federation via STS","AWS IAM Identity Center":"Corporate IdP (AD, Okta, etc.)","Amazon Cognito":"Social (Google, Facebook, Apple), SAML"}}],"mnemonics":["IIC = IAM for Infrastructure, Identity Center for corporate access, Cognito for Customer apps"],"exam_tips":["IAM is for AWS service/programmatic access, NOT for end-user applications","Cognito is for mobile/web apps where end users sign up and sign in","IAM Identity Center (formerly SSO) is for enterprise single sign-on to AWS","Always follow principle of least privilege with IAM policies","Cognito supports both user pools (managed users) and identity pools (AWS credentials)"],"sources":["aws_exam_comparison_tables[kimicode-v1].json","aws_exam_comparison_tables[kimicode-v2].json","aws_exam_comparison_tables[minimax-dr].json"]},{"title":"AWS Load Balancer Types Comparison","title_variants":["AWS Elastic Load Balancer Types Comparison","AWS Load Balancer Types Comparison","Load Balancer Types Comparison","Load Balancers Comparison","Load Balancing Services Comparison"],"description":"Comparison of Application Load Balancer, Network Load Balancer, and Gateway Load Balancer","context":"This table compares the three types of AWS Elastic Load Balancers. Application Load Balancer (ALB) operates at Layer 7 for HTTP/HTTPS traffic with advanced routing capabilities, Network Load Balancer (NLB) operates at Layer 4 for extreme performance with TCP/UDP traffic, and Gateway Load Balancer (GWLB) is designed for deploying third-party virtual appliances like firewalls and intrusion detection systems.","category":"NETWORKING_SERVICES","exam":"Both (SAA-C03 Primary)","table_id":"SAA-004","relevant_exams":["SAA-C03"],"relevant_domains":{"SAA-C03":["Domain 2: Design Resilient Architectures","Domain 3: Design High-Performing Architectures"]},"columns":["Application Load Balancer (ALB)","Network Load Balancer (NLB)","Gateway Load Balancer (GWLB)","Classic Load Balancer (CLB)"],"column_summaries":{"Application Load Balancer (ALB)":"A Layer 7 load balancer optimized for HTTP and HTTPS traffic. Provides advanced routing capabilities including path-based, host-based, and query string routing, with support for Lambda targets, WebSockets, and gRPC protocols.","Network Load Balancer (NLB)":"A Layer 4 load balancer capable of handling millions of requests per second with ultra-low latency. Operates at the connection level for TCP and UDP traffic, ideal for high-performance workloads, gaming, and IoT applications.","Gateway Load Balancer (GWLB)":"A Layer 3 load balancer that deploys, scales, and manages third-party virtual appliances like firewalls, intrusion detection systems, and deep packet inspection systems. Provides transparent network gateway and load balancing in a single service.","Classic Load Balancer (CLB)":"A legacy load balancer providing basic Layer 4 and Layer 7 capabilities. Being deprecated in favor of ALB and NLB. Should only be used for legacy applications that cannot migrate to newer load balancer types."},"rows":[{"feature":"OSI Layer","values":{"Application Load Balancer (ALB)":"Layer 7 (Application) - HTTP/HTTPS","Network Load Balancer (NLB)":"Layer 4 (Transport) - TCP/UDP","Gateway Load Balancer (GWLB)":"Layer 3 (Network) + Layer 4","Classic Load Balancer (CLB)":"Layer 4 & Layer 7 (legacy)","glb":"Layer 3 (Network) - IP packets"}},{"feature":"Protocols Supported","values":{"Application Load Balancer (ALB)":"HTTP, HTTPS, WebSocket, gRPC","Network Load Balancer (NLB)":"TCP, UDP, TLS","Gateway Load Balancer (GWLB)":"IP Protocol (all traffic)","Classic Load Balancer (CLB)":"HTTP, HTTPS, TCP, SSL","glb":"IP (GENEVE protocol)"}},{"feature":"Routing Features","values":{"Application Load Balancer (ALB)":"Path-based, host-based, header routing","Network Load Balancer (NLB)":"IP-based routing, static IP","Gateway Load Balancer (GWLB)":"Flow-based, transparent","Classic Load Balancer (CLB)":"Basic routing only","glb":"Transparent gateway, traffic forwarding"}},{"feature":"Target Types","values":{"Application Load Balancer (ALB)":"EC2, ECS, Lambda, IP addresses","Network Load Balancer (NLB)":"EC2, IP addresses, ALB","Gateway Load Balancer (GWLB)":"Third-party virtual appliances (firewalls, IDS/IPS)","Classic Load Balancer (CLB)":"EC2 instances only"}},{"feature":"Performance / Latency","values":{"Application Load Balancer (ALB)":"Handles millions of requests per second","Network Load Balancer (NLB)":"Handles tens of millions of requests per second; ultra-low latency","Gateway Load Balancer (GWLB)":"High (through appliance fleet)","Classic Load Balancer (CLB)":"Higher latency (deprecated)","glb":"Transparent routing with GENEVE protocol"}},{"feature":"SSL/TLS Termination","values":{"Application Load Balancer (ALB)":"Yes - built-in certificate management and HTTPS listener","Network Load Balancer (NLB)":"Yes - can terminate TLS but less feature-rich than ALB","Gateway Load Balancer (GWLB)":"N/A (passes through to appliances)","Classic Load Balancer (CLB)":"Yes - single SSL cert only","glb":"No - passes through traffic transparently"}},{"feature":"WebSockets","values":{"Application Load Balancer (ALB)":"Supported","Network Load Balancer (NLB)":"Supported","Gateway Load Balancer (GWLB)":"N/A","Classic Load Balancer (CLB)":"Limited support"}},{"feature":"Best For","values":{"Application Load Balancer (ALB)":"Web applications, microservices","Network Load Balancer (NLB)":"High-performance TCP/UDP","Gateway Load Balancer (GWLB)":"Network appliances, security","Classic Load Balancer (CLB)":"Legacy applications (deprecated)"}},{"feature":"Health Check Granularity","values":{"Application Load Balancer (ALB)":"HTTP/HTTPS health checks with custom response codes","Network Load Balancer (NLB)":"TCP health checks, HTTP/HTTPS optional","Gateway Load Balancer (GWLB)":"Health checks to virtual appliances","Classic Load Balancer (CLB)":"Basic TCP/HTTP/HTTPS","glb":"Health checks for target appliances"}},{"feature":"Routing Capabilities","values":{"Application Load Balancer (ALB)":"Path-based, Host-based, Query string, HTTP headers","Network Load Balancer (NLB)":"Static IP per AZ, Port-based","Gateway Load Balancer (GWLB)":"Transparent traffic inspection","Classic Load Balancer (CLB)":"Basic request routing only"}},{"feature":"Static IP / Elastic IP","values":{"Application Load Balancer (ALB)":"No - uses DNS names; can use regional IP addresses","Network Load Balancer (NLB)":"Yes - can assign Elastic IPs (one per AZ)","Gateway Load Balancer (GWLB)":"No (uses Gateway Load Balancer endpoints)","Classic Load Balancer (CLB)":"No (DNS name only)","glb":"Yes (Gateway Load Balancer endpoint)"}},{"feature":"Throughput","values":{"Application Load Balancer (ALB)":"High throughput","Network Load Balancer (NLB)":"Millions of requests/sec, handles sudden spikes","Gateway Load Balancer (GWLB)":"High throughput for traffic inspection","Classic Load Balancer (CLB)":"Limited (not recommended)"}},{"feature":"Preserve Client IP","values":{"Application Load Balancer (ALB)":"No (X-Forwarded-For header)","Network Load Balancer (NLB)":"Yes (preserves source IP)","Gateway Load Balancer (GWLB)":"Yes (transparent)","Classic Load Balancer (CLB)":"No (X-Forwarded-For header)"}},{"feature":"Pricing Model","values":{"Application Load Balancer (ALB)":"LCU-based (more complex but often cheaper for HTTP traffic)","Network Load Balancer (NLB)":"Per hour + NLCU (Network Load Balancer Capacity Units)","Gateway Load Balancer (GWLB)":"Per hour + GLCU (Gateway Load Balancer Capacity Units)","Classic Load Balancer (CLB)":"Per hour + data processed","glb":"LCU-based similar to ALB"}},{"feature":"Primary Use Cases","values":{"Application Load Balancer (ALB)":"Web applications, microservices, containers, Lambda targets","Network Load Balancer (NLB)":"High-throughput, low-latency apps, SSL termination, static IPs, gaming","Gateway Load Balancer (GWLB)":"Traffic inspection, firewalls, intrusion detection","Classic Load Balancer (CLB)":"Legacy applications (being deprecated)","glb":"Firewall insertion, deep packet inspection, IDS/IPS, WAN optimization"}},{"feature":"Cross-Zone Load Balancing","values":{"Application Load Balancer (ALB)":"Always enabled (no charge)","Network Load Balancer (NLB)":"Disabled by default (charges apply if enabled)","Gateway Load Balancer (GWLB)":"N/A","Classic Load Balancer (CLB)":"Enabled by default"}},{"feature":"Connection Draining","values":{"Application Load Balancer (ALB)":"Deregistration delay (configurable)","Network Load Balancer (NLB)":"Connection termination on deregistration","Gateway Load Balancer (GWLB)":"Configurable deregistration delay","Classic Load Balancer (CLB)":"Connection draining (configurable)"}},{"feature":"Routing Based On","values":{"Application Load Balancer (ALB)":"URL path, host header, query string, HTTP headers, IP address","Network Load Balancer (NLB)":"IP address, port, protocol, source/destination ports","Gateway Load Balancer (GWLB)":"Transparent traffic forwarding","Classic Load Balancer (CLB)":"Basic request-level (HTTP) or connection-level (TCP)","glb":"Network packet routing to appliances"}},{"feature":"Static IP Support","values":{"Application Load Balancer (ALB)":"No (use NLB in front if needed)","Network Load Balancer (NLB)":"Yes (Elastic IP per AZ)","Gateway Load Balancer (GWLB)":"No (transparent insertion)","Classic Load Balancer (CLB)":"No"}},{"feature":"Source IP Preservation","values":{"Application Load Balancer (ALB)":"No (X-Forwarded-For header)","Network Load Balancer (NLB)":"Yes (client IP preserved)","Gateway Load Balancer (GWLB)":"Yes (transparent)","Classic Load Balancer (CLB)":"X-Forwarded-For (HTTP mode)"}},{"feature":"Container Support","values":{"alb":"Excellent - IP and instance targets, container instance registration","nlb":"Good - IP targets for ECS/EKS","glb":"For appliance routing, not direct container support"}},{"feature":"Lambda Target","values":{"alb":"Yes - can invoke Lambda functions as targets","nlb":"No - requires IP targets","glb":"No"}}],"mnemonics":["ALB = Application Layer 7, NLB = Network Layer 4, GWLB = Gateway for appliances, CLB = Classic (deprecated)","Routing web traffic? ALB. Need extreme performance? NLB. Need third-party appliances? GWLB. CLB is legacy - avoid for new designs.","A.N.G - ALB for Apps (Layer 7), NLB for Networks (Layer 4), GLB for Gateways (appliances)","ANG = ALB for web, NLB for Network/performance, GLB for Gateway/security appliances"],"exam_tips":["ALB is the default choice for HTTP/HTTPS traffic with routing needs","NLB can handle millions of requests per second with ultra-low latency","ALB supports Lambda as a target for serverless architectures","GWLB is for deploying third-party virtual appliances (firewalls, IDS/IPS)","CLB is being deprecated - migrate to ALB/NLB","ALB supports path-based routing: /api → one target group, /web → another","ALB is the most common choice for web applications and microservices","Use NLB when you need static IPs, UDP traffic, or ultra-low latency","ALB can route based on path (/api/* goes to service A, /web/* goes to service B)","For container workloads, ALB integrates with ECS/EKS service discovery","GLB is specifically for inserting third-party virtual appliances into traffic flow","ALB is best for web applications with URL-based routing","NLB is best for high-performance TCP/UDP applications","ALB can route based on path (/api/*, /images/*)","NLB preserves source IP - important for logging and geo-blocking","GLB is specifically for inserting third-party security appliances in the traffic path"],"sources":["aws_exam_comparison_tables[glm5-agent].json","aws_exam_comparison_tables[kimi-agsw].json","aws_exam_comparison_tables[kimicode-v1].json","aws_exam_comparison_tables[kimicode-v2].json","aws_exam_comparison_tables[minimax].json","aws_exam_comparison_tables[minimax-dr].json"]},{"title":"AWS ML Platform Services: SageMaker vs Bedrock Comparison","title_variants":["AWS ML Platform Services: SageMaker vs Bedrock Comparison"],"context":"This table compares AWS services for building and deploying machine learning and generative AI applications. SageMaker is a comprehensive ML platform for building, training, and deploying custom models, while Bedrock provides access to foundation models via API for generative AI applications.","table_id":"sagemaker_bedrock_comparison","relevant_exams":["AIF-C01","SAA-C03"],"relevant_domains":{"AIF-C01":["Domain 2: Fundamentals of Generative AI","Domain 3: Applications of Foundation Models"],"SAA-C03":["Domain 3: Design High-Performing Architectures"]},"columns":["Amazon SageMaker","Amazon Bedrock","Amazon SageMaker JumpStart","Amazon PartyRock"],"column_summaries":{"Amazon SageMaker":"Fully managed machine learning platform that provides infrastructure, tools, and workflows for building, training, and deploying custom ML models for any use case.","Amazon Bedrock":"Fully managed service that makes foundation models from Amazon and leading AI companies available through a single API for building and scaling generative AI applications.","Amazon SageMaker JumpStart":"Machine learning hub within SageMaker providing pre-built solutions, pre-trained models, and example notebooks to accelerate ML adoption with one-click deployment.","Amazon PartyRock":"Educational playground for learning generative AI through hands-on, code-free app building to experiment with prompt engineering and foundation model capabilities."},"rows":[{"feature":"Primary Use Case","values":{"Amazon SageMaker":"Build, train, and deploy custom ML models","Amazon Bedrock":"Access pre-trained foundation models via API","Amazon SageMaker JumpStart":"Quick-start with pre-built ML solutions","Amazon PartyRock":"Learn generative AI through experimentation"}},{"feature":"ML Expertise Required","values":{"Amazon SageMaker":"High (data science knowledge)","Amazon Bedrock":"Low to Medium (API integration)","Amazon SageMaker JumpStart":"Low to Medium","Amazon PartyRock":"None (code-free)"}},{"feature":"Model Types","values":{"Amazon SageMaker":"Any custom ML model (classification, regression, deep learning)","Amazon Bedrock":"Foundation Models (LLMs, text-to-image, embeddings)","Amazon SageMaker JumpStart":"Pre-trained models across domains","Amazon PartyRock":"Foundation Models only"}},{"feature":"Foundation Models Available","values":{"Amazon SageMaker":"Via JumpStart (Llama, Falcon, etc.)","Amazon Bedrock":"Titan, Claude, Llama, Stable Diffusion, Jurassic, Command","Amazon SageMaker JumpStart":"Open-source FMs (Llama, Falcon, etc.)","Amazon PartyRock":"Amazon Titan models"}},{"feature":"Customization Options","values":{"Amazon SageMaker":"Full control: train from scratch, fine-tune, deploy","Amazon Bedrock":"Fine-tuning available for select models, provisioned throughput","Amazon SageMaker JumpStart":"Pre-trained models can be fine-tuned","Amazon PartyRock":"Prompt engineering only"}},{"feature":"RAG Support","values":{"Amazon SageMaker":"Build custom RAG with vector databases","Amazon Bedrock":"Native Knowledge Bases for RAG","Amazon SageMaker JumpStart":"Some solutions include RAG patterns","Amazon PartyRock":"Not available"}},{"feature":"Agents/Autonomous Tasks","values":{"Amazon SageMaker":"Build custom agent workflows","Amazon Bedrock":"Native Agents for multi-step task execution","Amazon SageMaker JumpStart":"Pre-built solution templates","Amazon PartyRock":"Not available"}},{"feature":"Infrastructure Management","values":{"Amazon SageMaker":"Managed notebooks, training clusters, inference endpoints","Amazon Bedrock":"Serverless - no infrastructure to manage","Amazon SageMaker JumpStart":"Managed deployment on SageMaker","Amazon PartyRock":"Fully managed playground"}},{"feature":"Pricing Model","values":{"Amazon SageMaker":"Notebook instances + training compute + inference endpoints","Amazon Bedrock":"Per token (input/output) + model customization + provisioned throughput","Amazon SageMaker JumpStart":"Standard SageMaker pricing for deployed resources","Amazon PartyRock":"Free tier available, then per request"}}],"sources":["aws_exam_comparison_tables[kimicode-v1].json","aws_exam_comparison_tables[kimicode-v2].json"]},{"title":"AWS Managed AI Services Comparison","title_variants":["AWS Managed AI Services Comparison","Language AI Services Comparison"],"context":"AWS provides a comprehensive suite of natural language processing services. Amazon Comprehend offers text analysis and NLP. Amazon Translate provides neural machine translation. Amazon Transcribe converts speech to text. Amazon Polly converts text to speech. Amazon Lex builds conversational interfaces. Amazon Kendra provides intelligent enterprise search. Understanding the specific use cases and capabilities of each service is essential for exam success.","table_id":"AIF-009","columns":["Amazon Rekognition","Amazon Comprehend","Amazon Transcribe","Amazon Translate","Amazon Polly","Amazon Kendra"],"column_summaries":{"Amazon Rekognition":"A fully managed computer vision service that analyzes images and videos to detect objects, scenes, faces, text, and activities. Provides pre-trained models for common tasks plus custom labels capability, enabling content moderation and face recognition without ML expertise.","Amazon Comprehend":"A natural language processing service that extracts insights from text including entities, sentiment, key phrases, and PII. Offers pre-trained models for immediate use plus custom classification and entity recognition for domain-specific needs.","Amazon Transcribe":"A speech-to-text service that converts audio to text with automatic punctuation and speaker identification. Supports batch processing and real-time streaming, with custom vocabulary for domain-specific terminology like medical or legal terms.","Amazon Translate":"A neural machine translation service supporting 75+ languages with high-quality, natural-sounding translations. Supports custom terminology for consistent translation of brand names and domain-specific terms across languages."},"rows":[{"feature":"Key Capabilities","values":{"Amazon Rekognition":"Intent recognition, slot filling, multi-turn dialogs, fulfillment hooks","Amazon Comprehend":"Entity recognition, sentiment analysis, topic modeling, PII detection, document classification","Amazon Transcribe":"Speaker diarization, custom vocabularies, medical transcription, call analytics","Amazon Translate":"75+ language pairs, custom terminology, real-time translation","Amazon Polly":"Multiple voices, SSML support, lexicons, neural voices","Amazon Kendra":"Natural language queries, semantic search, relevance tuning, FAQs"}},{"feature":"Input Type","values":{"Amazon Rekognition":"Voice or text user inputs","Amazon Comprehend":"Text documents, social media, emails","Amazon Transcribe":"Audio files (MP3, WAV, FLAC, Ogg)","Amazon Translate":"Text content in source language","Amazon Polly":"Plain text or SSML","Amazon Kendra":"Documents from multiple data sources"}},{"feature":"Output Type","values":{"Amazon Rekognition":"Structured intent/slot responses","Amazon Comprehend":"Entities, sentiment, syntax, key phrases, PII","Amazon Transcribe":"Transcript text with timestamps, speaker labels","Amazon Translate":"Translated text in target language","Amazon Polly":"Audio stream (MP3, Ogg, PCM)","Amazon Kendra":"Relevant search results with excerpts"}},{"feature":"Pre-trained Models","values":{"Amazon Rekognition":"Yes - labels, faces, celebrities","Amazon Comprehend":"Yes - entities, sentiment, PII","Amazon Transcribe":"Yes - multiple languages","Amazon Translate":"Yes - 75+ languages"}},{"feature":"Custom Training","values":{"Amazon Rekognition":"Custom labels, face collections","Amazon Comprehend":"Custom entity recognition, classification","Amazon Transcribe":"Custom vocabulary","Amazon Translate":"Custom terminology"}},{"feature":"Real-time Support","values":{"Amazon Rekognition":"Yes - streaming video","Amazon Comprehend":"Yes - real-time analysis","Amazon Transcribe":"Yes - streaming audio","Amazon Translate":"Yes - real-time translation"}},{"feature":"Common Use Cases","values":{"Amazon Rekognition":"Customer service bots, application interfaces, voice assistants","Amazon Comprehend":"Social media monitoring, document analysis, PII redaction","Amazon Transcribe":"Call center analytics, meeting transcription, captioning","Amazon Translate":"Website localization, real-time communication translation","Amazon Polly":"IVR systems, audiobooks, accessibility features","Amazon Kendra":"Enterprise knowledge search, self-service portals"}},{"feature":"SageMaker Alternative","values":{"Amazon Rekognition":"Custom CV models","Amazon Comprehend":"Custom NLP models","Amazon Transcribe":"Custom speech models","Amazon Translate":"Custom translation models"}},{"feature":"Primary Purpose","values":{"Amazon Comprehend":"Natural language understanding and text analysis","Amazon Translate":"Neural machine translation between languages","Amazon Transcribe":"Convert speech/audio to text","Amazon Polly":"Convert text to lifelike speech","Amazon Lex":"Build conversational interfaces and chatbots","Amazon Kendra":"Intelligent enterprise search"}},{"feature":"Customization Options","values":{"Amazon Comprehend":"Custom entity recognition, custom classification, Flywheel","Amazon Translate":"Custom terminology, parallel data for customization","Amazon Transcribe":"Custom vocabularies, language models, content redaction","Amazon Polly":"Custom lexicons, voice cloning (Neural voices)","Amazon Lex":"Custom intents, slots, fulfillment Lambda functions","Amazon Kendra":"Custom data sources, relevance tuning, synonyms"}},{"feature":"Language Support","values":{"Amazon Comprehend":"Multiple languages for different features","Amazon Translate":"75+ languages supported","Amazon Transcribe":"100+ languages and variants","Amazon Polly":"30+ languages, various voices per language","Amazon Lex":"English (primary), multiple languages supported","Amazon Kendra":"English (primary), limited multi-language"}},{"feature":"Integration Points","values":{"Amazon Comprehend":"S3, Kinesis, Lambda, SNS","Amazon Translate":"S3, Lambda, real-time API","Amazon Transcribe":"S3, Kinesis, Lambda, Amazon Chime SDK","Amazon Polly":"Lambda, S3, real-time streaming","Amazon Lex":"Lambda, Connect, Chime SDK, messaging platforms","Amazon Kendra":"S3, SharePoint, Confluence, databases, custom sources"}},{"feature":"Pricing Model","values":{"Amazon Comprehend":"Per-unit text processed (characters/units)","Amazon Translate":"Per-million characters translated","Amazon Transcribe":"Per-second of audio processed","Amazon Polly":"Per-million characters converted to speech","Amazon Lex":"Per-speech/text request, $5/month per bot","Amazon Kendra":"Per-hour index usage + query charges"}},{"feature":"Exam Relevance","values":{"Amazon Comprehend":"High - NLP tasks, PII detection","Amazon Translate":"Medium - Multi-language scenarios","Amazon Transcribe":"High - Call analytics, transcription","Amazon Polly":"Medium - TTS requirements","Amazon Lex":"High - Chatbot building","Amazon Kendra":"High - Enterprise search vs Elasticsearch"}}],"mnemonics":["RECOGNIZE-COMPREHEND-TRANSCRIBE-TRANSLATE: Recognize sees, Comprehend understands, Transcribe listens, Translate converts","Working with images/video? Rekognition. Working with text analysis? Comprehend. Working with audio? Transcribe. Need language conversion? Translate."],"exam_tips":["Rekognition can detect faces, objects, text in images, and celebrities","Comprehend provides sentiment analysis without ML expertise","Transcribe supports automatic language identification","Translate supports custom terminology for domain-specific terms","All services have pre-trained models - no ML expertise required","Use these managed services instead of building custom models when possible"],"sources":["aws_exam_comparison_tables[glm5-agent].json","aws_exam_comparison_tables[kimi-agsw].json"]},{"title":"AWS Managed AI Services — The Pre-Built Tool Kit","title_variants":["AWS Managed AI Services — The Pre-Built Tool Kit"],"context":"AWS offers a suite of fully managed AI services that let you add AI capabilities to applications WITHOUT building or training models yourself. The exam tests whether you can match a business requirement to the correct pre-built service. These services are distinct from SageMaker (which lets you BUILD models) — they come ready-made.","exam":"AIF-C01","domain":"Domain 1: Fundamentals of AI and ML","domain_weight":"20%","table_id":"AIF-003","columns":["Amazon Transcribe","Amazon Polly","Amazon Translate","Amazon Comprehend","Amazon Lex","Amazon Rekognition","Amazon Textract"],"column_summaries":{"Amazon Transcribe":"Converts speech (audio/video) to text automatically — think of it as a robot stenographer. Used for call center transcripts, meeting notes, closed captions, and video subtitles.","Amazon Polly":"Converts text to lifelike speech — the exact opposite of Transcribe. Used for voice assistants, audio books, accessibility features, and any app that needs to 'speak' to users.","Amazon Translate":"Machine translation between languages — think Google Translate but as an AWS API. Used for multilingual websites, customer support in multiple languages, and content localization.","Amazon Comprehend":"Natural Language Processing (NLP) service that extracts meaning from text — it understands sentiment, key entities, topics, and language. Used for social media analysis, support ticket categorization, and document analysis.","Amazon Lex":"Builds conversational chatbots using the same AI technology that powers Alexa. Used for customer service bots, IVR (phone menu) systems, and any interactive text/voice chatbot.","Amazon Rekognition":"Computer vision service that analyzes images and videos — detects objects, faces, text, and unsafe content. Used for facial recognition, content moderation, and security cameras.","Amazon Textract":"Extracts text AND structured data (like tables and forms) from scanned documents — it goes beyond simple OCR to understand document structure. Used for processing invoices, tax forms, and medical records."},"rows":[{"feature":"Input","values":{"Amazon Transcribe":"Audio / Video","Amazon Polly":"Text","Amazon Translate":"Text","Amazon Comprehend":"Text","Amazon Lex":"Text / Voice","Amazon Rekognition":"Image / Video","Amazon Textract":"Scanned documents / PDFs"}},{"feature":"Output","values":{"Amazon Transcribe":"Text transcript","Amazon Polly":"Audio (speech)","Amazon Translate":"Translated text","Amazon Comprehend":"Sentiment, entities, topics, language","Amazon Lex":"Conversation response / intent","Amazon Rekognition":"Labels, faces, objects, unsafe content flags","Amazon Textract":"Extracted text, tables, and form key-value pairs"}},{"feature":"AI Category","values":{"Amazon Transcribe":"Speech Recognition","Amazon Polly":"Text-to-Speech (TTS)","Amazon Translate":"Machine Translation / NLP","Amazon Comprehend":"NLP / Text Analytics","Amazon Lex":"Conversational AI / NLP","Amazon Rekognition":"Computer Vision","Amazon Textract":"Computer Vision + OCR"}},{"feature":"Key Use Case","values":{"Amazon Transcribe":"Call center transcription, meeting notes, subtitles","Amazon Polly":"Voice assistants, audiobooks, accessibility","Amazon Translate":"Multilingual content, localization","Amazon Comprehend":"Sentiment analysis, topic modeling, PII detection","Amazon Lex":"Customer chatbots, Alexa Skills, IVR systems","Amazon Rekognition":"Facial ID, content moderation, video surveillance","Amazon Textract":"Invoice processing, form digitization, medical records"}},{"feature":"Requires Model Training?","values":{"Amazon Transcribe":"No — fully managed","Amazon Polly":"No — choose from pre-built voices","Amazon Translate":"No — fully managed","Amazon Comprehend":"No for standard; Custom Comprehend for custom classification","Amazon Lex":"No for standard intents; configure dialog flows","Amazon Rekognition":"No — pre-trained; Custom Labels for specific objects","Amazon Textract":"No — fully managed"}}],"sources":["aws_exam_comparison_tables[sonnet46].json"]},{"title":"AWS Messaging and Decoupling Services","title_variants":["AWS Messaging and Decoupling Services","AWS Messaging and Queueing Services Comparison"],"context":"This table compares AWS messaging services for decoupling and scaling distributed systems. SQS provides managed message queues for asynchronous communication, SNS enables pub/sub messaging with fan-out patterns, and EventBridge offers serverless event bus for connecting applications with event-driven architecture.","table_id":"SAA-005","relevant_exams":["SAA-C03"],"relevant_domains":{"SAA-C03":["Domain 2: Design Resilient Architectures"]},"columns":["Amazon SQS","Amazon SNS","Amazon Kinesis","Amazon MQ"],"column_summaries":{"Amazon SQS":"A fully managed message queuing service that enables decoupling of distributed software systems. Offers standard queues for maximum throughput and FIFO queues for exactly-once processing, with automatic scaling and dead-letter queue support.","Amazon SNS":"A fully managed publish/subscribe messaging service that enables message delivery to multiple subscribers. Supports multiple protocols (HTTP, email, Lambda, SQS) for fan-out scenarios where one message needs to reach multiple destinations.","Amazon Kinesis":"A platform for streaming data on AWS, making it easy to load and analyze streaming data. Kinesis Data Streams enables real-time processing of streaming data at massive scale with multiple consumers reading from the same stream.","Amazon MQ":"A managed message broker service for Apache ActiveMQ and RabbitMQ that makes it easy to migrate existing messaging applications to the cloud. Supports JMS, AMQP, and other standard protocols for enterprise messaging scenarios."},"rows":[{"feature":"Service Type","values":{"Amazon SQS":"Message queue","Amazon SNS":"Pub/sub notification","Amazon Kinesis":"Data streaming","Amazon MQ":"Message broker"}},{"feature":"Communication Pattern","values":{"Amazon SQS":"Event bus (rules-based routing)","Amazon SNS":"Publish-subscribe (fan-out)","Amazon Kinesis":"Stream processing (1:many)","Amazon MQ":"Message broker (JMS, AMQP)"}},{"feature":"Message Retention","values":{"Amazon SQS":"1-14 days","Amazon SNS":"No retention (push)","Amazon Kinesis":"1-365 days","Amazon MQ":"Configurable"}},{"feature":"Consumer Model","values":{"Amazon SQS":"Pull-based (polling)","Amazon SNS":"Push-based (subscriptions)","Amazon Kinesis":"Pull-based (shards)","Amazon MQ":"Pull-based (JMS/AMQP)"}},{"feature":"Ordering Guarantee","values":{"Amazon SQS":"Standard: best-effort; FIFO: guaranteed","Amazon SNS":"Standard: best-effort; FIFO: guaranteed","Amazon Kinesis":"Per-shard ordering","Amazon MQ":"Guaranteed (per queue/topic)"}},{"feature":"Throughput","values":{"Amazon SQS":"Unlimited (standard queue)","Amazon SNS":"Unlimited topics","Amazon Kinesis":"Limited by shard count","Amazon MQ":"Broker capacity"}},{"feature":"Message Persistence","values":{"Amazon SQS":"4 days default, up to 14 days","Amazon SNS":"No persistence (immediate delivery)","Amazon Kinesis":"Up to 1MB per record","Amazon MQ":"Configurable (broker persistence)"}},{"feature":"Best For","values":{"Amazon SQS":"Decoupling microservices","Amazon SNS":"Fan-out notifications","Amazon Kinesis":"Real-time analytics, streaming","Amazon MQ":"Migration from on-premises JMS"}},{"feature":"Dead Letter Queue","values":{"Amazon SQS":"Yes (configurable)","Amazon SNS":"Yes (DLQ for subscriptions)","Amazon Kinesis":"No (enhanced fan-out)","Amazon MQ":"Configurable"}},{"feature":"Delivery Model","values":{"Amazon SQS":"Pull-based (consumers poll)","Amazon SNS":"Push-based (pushes to subscribers)","Amazon EventBridge":"Push-based (rules match events)","Amazon MQ":"Pull-based (JMS/AMQP consumers)"}},{"feature":"Exactly-Once Processing","values":{"Amazon SQS":"FIFO queues only","Amazon SNS":"FIFO topics only","Amazon EventBridge":"At-least-once delivery","Amazon MQ":"Supported (configurable)"}},{"feature":"Subscribers/Targets","values":{"Amazon SQS":"Single consumer per message","Amazon SNS":"Multiple subscribers (SQS, Lambda, HTTP, email, SMS)","Amazon EventBridge":"Multiple targets (20+ AWS services)","Amazon MQ":"Multiple consumers per queue/topic"}},{"feature":"Event Filtering","values":{"Amazon SQS":"No (all messages in queue)","Amazon SNS":"Limited (attribute-based)","Amazon EventBridge":"Advanced (content-based filtering)","Amazon MQ":"No (application-level)"}},{"feature":"Schema Registry","values":{"Amazon SQS":"No","Amazon SNS":"No","Amazon EventBridge":"Yes (schema discovery, validation)","Amazon MQ":"No"}},{"feature":"SaaS Integration","values":{"Amazon SQS":"No","Amazon SNS":"Limited","Amazon EventBridge":"Yes (40+ SaaS partners)","Amazon MQ":"No"}},{"feature":"Use Cases","values":{"Amazon SQS":"Work queues, buffer requests, decouple components","Amazon SNS":"Fan-out, notifications, mobile push","Amazon EventBridge":"Event-driven architectures, SaaS integration","Amazon MQ":"Lift-and-shift existing messaging (ActiveMQ/RabbitMQ)"}}],"mnemonics":["SQS = Simple Queue Service, SNS = Simple Notification Service, Kinesis = Stream processing, MQ = Message Queue (enterprise)","Need point-to-point decoupling? SQS. Need fan-out to many? SNS. Need real-time streaming? Kinesis. Migrating from JMS? Amazon MQ."],"exam_tips":["SQS decouples components - producers and consumers don't need to know each other","SNS + SQS pattern provides fan-out with durability","SQS FIFO guarantees exactly-once processing and ordering","Kinesis is for streaming data - multiple consumers can read same data","Kinesis Data Streams vs SQS: Kinesis keeps data for replay; SQS deletes after read","Amazon MQ is for migrating existing JMS/AMQP applications"],"sources":["aws_exam_comparison_tables[glm5-agent].json","aws_exam_comparison_tables[kimicode-v1].json","aws_exam_comparison_tables[kimicode-v2].json"]},{"title":"AWS Object Storage Services Comparison","title_variants":["AWS Object Storage Services Comparison"],"description":"Comparing object storage services across AWS for different use cases","category":"Storage Services","exam":"Both (SAA-C03 Primary, AIF-C01 Reference)","columns":["Amazon S3","Amazon S3 Glacier"],"column_summaries":{"Amazon S3":"Object storage built to store and retrieve any amount of data from anywhere, offering 11 9's of durability with extensive versioning, lifecycle policies, and cross-region replication capabilities.","Amazon S3 Glacier":"Secure, durable, and extremely low-cost cloud storage service for data archiving and long-term backup, with retrieval options ranging from minutes to hours."},"rows":[{"feature":"Storage Type","values":{"Amazon S3":"Object storage - any type of data","Amazon S3 Glacier":"Archive object storage - cold data"}},{"feature":"Use Case","values":{"Amazon S3":"Hot/warm storage, websites, apps, backups","Amazon S3 Glacier":"Long-term archives, compliance, backups"}},{"feature":"Access Time","values":{"Amazon S3":"Milliseconds (real-time)","Amazon S3 Glacier":"Minutes to hours (varies by retrieval option)"}},{"feature":"Durability","values":{"Amazon S3":"99.999999999% (11 9's)","Amazon S3 Glacier":"99.999999999% (11 9's)"}},{"feature":"Cost","values":{"Amazon S3":"Higher storage cost, pay per request","Amazon S3 Glacier":"Very low storage cost, retrieval fees apply"}},{"feature":"Tiers","values":{"Amazon S3":"Standard, IA, One Zone-IA, Intelligent-Tiering","Amazon S3 Glacier":"Glacier Instant, Flexible, Deep Archive"}},{"feature":"Lifecycle","values":{"Amazon S3":"Auto-transition between tiers","Amazon S3 Glacier":"Auto-archive from S3"}}],"mnemonics":["S3 = Speed for hot data, Glacier = Great savings for cold data"],"exam_tips":["S3 Standard is most expensive but fastest access","Use S3 Intelligent-Tiering for unpredictable access patterns","Glacier Deep Archive has 12-hour minimum retrieval time","Data can automatically transition from S3 to Glacier via lifecycle policies","S3 Glacier Flexible Retrieval offers free Expedited retrievals under certain conditions"],"sources":["aws_exam_comparison_tables[minimax-dr].json"]},{"title":"AWS Reserved vs Savings Plans vs Spot","title_variants":["AWS Reserved vs Savings Plans vs Spot"],"context":"Comparing AWS purchasing options for cost optimization - Domain 4 (Cost-Optimized Architectures)","table_id":"SAA-008","columns":["On-Demand","Reserved Instances","Savings Plans","Spot Instances"],"column_summaries":{"On-Demand":"Pay for compute capacity by the hour or second with no long-term commitments or upfront payments. Ideal for applications with unpredictable workloads, development/testing, or when you need to try new instance types.","Reserved Instances":"A commitment to a specific instance type in a particular Availability Zone for a 1 or 3-year term in exchange for significant discounts. Best for steady-state workloads where you know your exact instance requirements.","Savings Plans":"A flexible pricing model offering savings in exchange for a commitment to a consistent amount of usage (measured in $/hour) for 1 or 3 years. Applies automatically across instance families, sizes, and regions, providing more flexibility than RIs.","Spot Instances":"Unused EC2 capacity available at up to 90% discount. Can be interrupted with a 2-minute warning when AWS needs the capacity back. Ideal for fault-tolerant, flexible, or stateless workloads like batch processing and testing."},"rows":[{"feature":"Commitment","values":{"On-Demand":"None","Reserved Instances":"1 or 3 years","Savings Plans":"1 or 3 years","Spot Instances":"None"}},{"feature":"Discount","values":{"On-Demand":"0% (base price)","Reserved Instances":"Up to 72% off","Savings Plans":"Up to 72% off","Spot Instances":"Up to 90% off"}},{"feature":"Flexibility","values":{"On-Demand":"Highest - pay per hour","Reserved Instances":"Limited - specific instance type","Savings Plans":"High - instance family flexibility","Spot Instances":"Low - can be interrupted"}},{"feature":"Use Case","values":{"On-Demand":"Variable workloads, testing","Reserved Instances":"Steady-state workloads","Savings Plans":"Flexible compute needs","Spot Instances":"Fault-tolerant, flexible workloads"}},{"feature":"Payment Options","values":{"On-Demand":"Per hour","Reserved Instances":"All upfront, partial, no upfront","Savings Plans":"Hourly commitment ($/hour)","Spot Instances":"Per hour (interruptible)"}},{"feature":"Instance Selection","values":{"On-Demand":"Any instance","Reserved Instances":"Specific instance type/size","Savings Plans":"Any instance in family/region","Spot Instances":"Available capacity pools"}},{"feature":"Cancellation","values":{"On-Demand":"Anytime","Reserved Instances":"Cannot cancel (can sell)","Savings Plans":"Cannot cancel","Spot Instances":"2-minute warning interruption"}},{"feature":"Best For","values":{"On-Demand":"Unpredictable workloads","Reserved Instances":"Long-term, predictable workloads","Savings Plans":"Multiple instance types needed","Spot Instances":"Batch jobs, testing, stateless"}},{"feature":"Coverage Scope","values":{"On-Demand":"EC2, Lambda, other services","Reserved Instances":"EC2, RDS, Redshift, ElastiCache","Savings Plans":"Compute, EC2, SageMaker","Spot Instances":"EC2 only"}}],"mnemonics":["OD = On-Demand (flexible), RI = Reserved Instances (specific), SP = Savings Plans (flexible commitment), Spot = Interruptible savings","No commitment needed? On-Demand. Know exact instance type? Reserved Instances. Flexible on instance type? Savings Plans. Can handle interruptions? Spot."],"exam_tips":["Savings Plans are more flexible than Reserved Instances","Spot Instances can be interrupted with 2-minute warning","Reserved Instances are not cancelled - they are a commitment","Compute Savings Plans apply to EC2, Lambda, and Fargate","Spot Blocks (previously defined duration) are deprecated","Use Spot for stateless, fault-tolerant, or flexible workloads"],"sources":["aws_exam_comparison_tables[glm5-agent].json"]},{"title":"AWS Route 53 Routing Policies","title_variants":["AWS Route 53 Routing Policies","Route 53 Routing Policies Comparison"],"description":"Comparison of Amazon Route 53 DNS routing policies for different use cases","context":"Route 53 offers multiple routing policies to control how DNS queries are answered. Each policy serves different use cases from simple single-resource routing to complex latency-based or geographic routing. Understanding when to use each policy is essential for both exams.","category":"NETWORKING_SERVICES","table_id":"SAA-009","columns":["Simple","Weighted","Latency-based","Failover","Geolocation","Geoproximity","Multivalue Answer"],"column_summaries":{"Simple Routing":"The default routing policy that routes traffic to a single resource. Best for single-server websites or when Route 53 responds to DNS queries using only the records you've created without any special routing logic.","Weighted Routing":"Routes traffic to multiple resources in proportions that you specify. Ideal for A/B testing, gradual migrations, or load balancing across resources in the same or different regions.","Latency-based Routing":"Routes traffic to the AWS region that provides the lowest latency for the user. Best for global applications where performance is critical and resources are deployed in multiple regions.","Failover Routing":"Routes traffic to a primary resource when it's healthy and to a secondary resource when the primary is unhealthy. Essential for active-passive disaster recovery configurations.","Geolocation Routing":"Routes traffic based on the geographic location of the user (continent, country, or US state). Ideal for compliance requirements, content localization, or restricting content distribution."},"rows":[{"feature":"Purpose","values":{"Simple":"Single resource routing","Weighted":"Traffic distribution by weight","Latency-based":"Route to lowest latency","Failover":"Active-passive failover","Geolocation":"Route by user location"}},{"feature":"Route Based On","values":{"Simple":"Single resource, no routing logic","Weighted":"Configured weight values (0-255)","Latency-based":"AWS region with lowest latency to user","Failover":"Health check status (primary vs secondary)","Geolocation":"Route based on user location (country/continent)","Geoproximity":"Route based on resource location + optional bias","Multivalue Answer":"Return multiple healthy records (basic load balancing)"}},{"feature":"Health Checks Required","values":{"Simple":"Optional - can associate health check but not required","Weighted":"Optional - traffic only sent to healthy endpoints","Latency-based":"Optional - only sends to healthy endpoints with lowest latency","Failover":"Required - triggers failover when primary becomes unhealthy","Geolocation":"Optional (excludes unhealthy only if enabled)","Geoproximity":"Optional (excludes unhealthy only if enabled)","Multivalue Answer":"Required for health-based responses"}},{"feature":"DNS Record Type","values":{"Simple":"Multiple A records in single record set","Weighted":"Separate record sets with weights","Latency-based":"Records tagged with AWS region","Failover":"Primary (with health check) + secondary record sets","Geolocation":"A, AAAA, CNAME, etc."}},{"feature":"Region Awareness","values":{"Simple":"No","Weighted":"No","Latency-based":"Yes (AWS regions)","Failover":"Yes (health check)","Geolocation":"Yes (continents/countries)"}},{"feature":"Multiple Endpoints","values":{"Simple":"Returns all IP addresses (client picks one randomly)","Weighted":"Multiple resources with different weights","Latency-based":"Multiple resources with latency evaluation","Failover":"One primary + one secondary (can have multiple secondaries)","Geolocation":"Yes (location-based)"}},{"feature":"Traffic Splitting","values":{"Simple":"No","Weighted":"Yes (percentage-based)","Latency-based":"No (automatic)","Failover":"No (all or nothing)","Geolocation":"No (location-based)"}},{"feature":"Best For","values":{"Simple":"Simple websites","Weighted":"Testing, canary deployments","Latency-based":"Multi-region apps","Failover":"HA, DR scenarios","Geolocation":"Regulatory compliance, CDN routing"}},{"feature":"Multiple Records Returned","values":{"Simple":"No (single record only)","Weighted":"No (one selected by weight)","Latency":"No (one selected by latency)","Failover":"No (primary or secondary)","Geolocation":"No (one based on location)","Geoproximity":"No (one based on proximity)","Multivalue Answer":"Yes (up to 8 healthy records)"}},{"feature":"Default Record Support","values":{"Simple":"N/A","Weighted":"No default needed","Latency":"Default record for unmatched regions","Failover":"N/A (primary/secondary model)","Geolocation":"Default record for unmatched locations","Geoproximity":"No default needed","Multivalue Answer":"No default needed"}},{"feature":"Traffic Flow Required","values":{"Simple":"No","Weighted":"No","Latency":"No","Failover":"No","Geolocation":"No","Geoproximity":"Yes (requires Traffic Flow)","Multivalue Answer":"No"}},{"feature":"Use with Alias Records","values":{"Simple":"Yes","Weighted":"Yes","Latency":"Yes","Failover":"Yes","Geolocation":"Yes","Geoproximity":"Yes","Multivalue Answer":"No (not supported)"}},{"feature":"Typical Scenario","values":{"Simple":"Development environment, single server answer","Weighted":"A/B testing, blue-green deployments, gradual migrations","Latency":"Users in Europe routed to EU region, users in Asia to Asia region","Failover":"Primary in us-east-1 fails over to us-west-2","Geolocation":"Content localization, compliance requirements","Geoproxyimity":"Shift traffic between regions, resource consolidation","Multivalue Answer":"Basic load balancing across multiple web servers"}},{"feature":"Record Set Configuration","values":{"Simple":"One record per name","Weighted":"Multiple records with assigned weights","Latency":"Multiple records with AWS region specified","Failover":"Primary + Secondary record pair","Geolocation":"Multiple records with location specified","Geoproximity":"Multiple records with coordinates/bias","Multivalue Answer":"Multiple records, all returned if healthy"}},{"feature":"Cost Consideration","values":{"Simple":"Standard query pricing","Weighted":"Standard query pricing","Latency":"Standard query pricing + latency measurement","Failover":"Standard query pricing + health check costs","Geolocation":"Standard query pricing","Geoproximity":"Requires Traffic Flow (additional cost)","Multivalue Answer":"Standard query pricing + health check costs"}},{"feature":"Primary Use","values":{"Simple Routing":"Single resource, testing new deployments","Weighted Routing":"Traffic splitting, A/B testing, blue-green deployments","Latency-Based Routing":"Performance optimization across global regions","Failover Routing":"Disaster recovery, high availability"}},{"feature":"Geographic Control","values":{"Simple Routing":"No - all DNS queries treated equally","Weighted Routing":"No - based on weight percentage","Latency-Based Routing":"Indirect - based on which region has lowest latency","Failover Routing":"No - purely health-based"}}],"mnemonics":["SIMPLE-W-LATENCY-FAILOVER-GEO: Simple = Single, Weighted = distribution, Latency = performance, Failover = backup, Geo = location","One endpoint? Simple. Need to split traffic? Weighted. Need lowest latency? Latency-based. Need DR? Failover. Need location routing? Geolocation.","S.W.L.F - Simple is straightforward, Weighted splits traffic, Latency optimizes speed, Failover handles disaster"],"exam_tips":["Simple routing doesn't support health checks (optional)","Weighted routing is for controlled traffic distribution (10%/90%)","Latency-based routes to the region with lowest network latency","Failover routing requires health checks for automatic switching","Geolocation routes based on user location, not latency","Geoproximity routing uses bias to shift traffic toward resources","Simple routing doesn't support health checks - use with caution for production","Weighted routing weights must sum to 100 for predictable distribution","Latency-based routing can improve performance but doesn't guarantee geographic routing","Failover routing requires health checks - understand Health Check configurations","For geo-restrictions, use Route 53 Geolocation routing (different from latency)"],"sources":["aws_exam_comparison_tables[glm5-agent].json","aws_exam_comparison_tables[kimi-agsw].json","aws_exam_comparison_tables[minimax].json"]},{"title":"AWS Security Services Comparison","title_variants":["AWS Security Services Comparison"],"context":"This table compares AWS security services for protecting infrastructure, data, and applications. GuardDuty provides intelligent threat detection, Macie discovers and protects sensitive data, WAF protects web applications, Shield provides DDoS protection, and KMS manages encryption keys.","table_id":"SAA-014","relevant_exams":["SAA-C03","AIF-C01"],"relevant_domains":{"SAA-C03":["Domain 1: Design Secure Architectures"],"AIF-C01":["Domain 5: Security, Compliance, and Governance for AI Solutions"]},"columns":["AWS Shield","AWS WAF","AWS GuardDuty","Amazon Inspector"],"column_summaries":{"AWS Shield":"A managed DDoS protection service that safeguards applications running on AWS. Shield Standard provides automatic protection at no extra cost, while Shield Advanced offers enhanced detection, mitigation, and 24/7 access to the AWS DDoS Response Team.","AWS WAF":"A web application firewall that helps protect web applications from common exploits like SQL injection and cross-site scripting (XSS). Provides rules to filter malicious web traffic before it reaches your application on CloudFront, ALB, or API Gateway.","AWS GuardDuty":"A threat detection service that continuously monitors for malicious activity and unauthorized behavior. Analyzes CloudTrail logs, VPC Flow Logs, and DNS logs using machine learning and threat intelligence to detect compromised credentials, cryptocurrency mining, and other threats.","Amazon Inspector":"An automated vulnerability management service that scans AWS workloads (EC2, Lambda, container images) for software vulnerabilities and unintended network exposure. Provides detailed findings with remediation recommendations integrated with Security Hub."},"rows":[{"feature":"Protection Target","values":{"AWS Shield":"Network availability (Layer 3/4)","AWS WAF":"Web applications (Layer 7)","AWS GuardDuty":"AWS accounts, workloads, data","Amazon Inspector":"Vulnerability assessment"}},{"feature":"Layer","values":{"AWS Shield":"Network (L3/L4) and Application","AWS WAF":"Application (L7)","AWS GuardDuty":"Account and workload","Amazon Inspector":"EC2, Lambda, containers"}},{"feature":"Attack Types Blocked","values":{"AWS Shield":"DDoS floods, SYN floods, amplification","AWS WAF":"SQL injection, XSS, bot attacks","AWS GuardDuty":"Unusual API calls, compromised credentials","Amazon Inspector":"Software vulnerabilities, CVEs"}},{"feature":"Deployment","values":{"AWS Shield":"Automatic (Standard), subscription (Advanced)","AWS WAF":"Web ACLs on CloudFront/ALB/API Gateway","AWS GuardDuty":"One-click enablement, no agents","Amazon Inspector":"Managed service, S3 integration"}},{"feature":"Real-time Protection","values":{"AWS Shield":"Yes - inline mitigation","AWS WAF":"Yes - request filtering","AWS GuardDuty":"Near real-time alerts","Amazon Inspector":"Scheduled scans"}},{"feature":"Pricing Tier","values":{"AWS Shield":"Free (Standard), subscription (Advanced)","AWS WAF":"Per rule + request count","AWS GuardDuty":"Per GB analyzed + findings","Amazon Inspector":"Per instance scan duration"}},{"feature":"Integration","values":{"AWS Shield":"Route 53, CloudFront, Global Accelerator","AWS WAF":"CloudFront, ALB, API Gateway, CloudWatch","AWS GuardDuty":"Security Hub, SNS, Lambda, EventBridge","Amazon Inspector":"Security Hub, Systems Manager"}},{"feature":"Best For","values":{"AWS Shield":"DDoS protection for web apps","AWS WAF":"OWASP Top 10 protection","AWS GuardDuty":"Account compromise detection","Amazon Inspector":"Pre-deployment security review"}},{"feature":"Security Function","values":{"Amazon GuardDuty":"Threat Detection","Amazon Macie":"Data Discovery & Classification","AWS WAF":"Application Firewall","AWS Shield":"DDoS Protection","AWS KMS":"Encryption Key Management"}},{"feature":"Technology","values":{"Amazon GuardDuty":"Machine learning, anomaly detection","Amazon Macie":"ML, pattern matching for PII/sensitive data","AWS WAF":"Rule-based filtering, rate limiting","AWS Shield":"DDoS mitigation, traffic engineering","AWS KMS":"Hardware Security Modules (HSMs)"}},{"feature":"Automation","values":{"Amazon GuardDuty":"Automated findings to EventBridge, Security Hub","Amazon Macie":"Automated discovery, alerts","AWS WAF":"Managed rules, rate-based rules","AWS Shield":"Automatic mitigation","AWS KMS":"Automatic key rotation"}},{"feature":"Compliance Relevance","values":{"Amazon GuardDuty":"PCI DSS, SOC, ISO","Amazon Macie":"GDPR, HIPAA, PCI DSS (data protection)","AWS WAF":"PCI DSS 6.6, OWASP Top 10","AWS Shield":"DDoS mitigation for compliance","AWS KMS":"FIPS 140-2 Level 2 validated"}},{"feature":"Key Features","values":{"Amazon GuardDuty":"Findings for compromised instances, crypto mining, reconnaissance","Amazon Macie":"PII detection, financial data, custom data identifiers","AWS WAF":"SQL injection, XSS protection, geo-blocking, bot control","AWS Shield":"Always-on detection, cost protection (Advanced)","AWS KMS":"Customer managed keys, automatic rotation, key policies"}}],"mnemonics":["Shield = DDoS Shield, WAF = Web Application Firewall, GuardDuty = Guard against threats, Inspector = Inspect vulnerabilities","Need DDoS protection? Shield. Need web app firewall? WAF. Need threat detection? GuardDuty. Need vulnerability scanning? Inspector."],"exam_tips":["Shield Standard is free and automatic for all AWS customers","Shield Advanced provides 24/7 DDoS response team (DRT) access","WAF protects against OWASP Top 10 (SQLi, XSS, etc.)","GuardDuty uses ML to detect anomalies in CloudTrail, VPC Flow Logs, DNS","Inspector scans EC2, Lambda, and container images for vulnerabilities","Use Shield + WAF together for comprehensive web app protection"],"sources":["aws_exam_comparison_tables[glm5-agent].json","aws_exam_comparison_tables[kimicode-v1].json","aws_exam_comparison_tables[kimicode-v2].json"]},{"title":"AWS Shared Responsibility Model","title_variants":["AWS Shared Responsibility Model"],"context":"The Shared Responsibility Model defines the security division between AWS and the customer. It is tested on ALL AWS certification exams. The core principle: AWS is responsible for security OF the cloud (hardware, facilities, hypervisor, managed services). YOU are responsible for security IN the cloud (your data, your configuration, your code, your access management).","exam":"BOTH","domain":"Shared — Security Foundation (CLF-C02, AIF-C01, SAA-C03)","domain_weight":"Foundational","table_id":"SHARED-001","columns":["AWS Responsibility ('Of the Cloud')","Customer Responsibility ('In the Cloud')","Shared Responsibilities"],"column_summaries":{"AWS Responsibility ('Of the Cloud')":"AWS secures everything that makes the cloud work — the physical data centers, the hardware servers, the network infrastructure, the hypervisor (virtualization layer), and the hardware/software of managed services like RDS, Lambda, and S3. Customers never see or touch any of this.","Customer Responsibility ('In the Cloud')":"Customers are responsible for what they put INTO the cloud and how they configure it — their data and its encryption, who they grant access to (IAM), how they configure security groups and network settings, their application code, and any OS or software running on EC2 instances.","Shared Responsibilities":"Some responsibilities are shared — both AWS and the customer contribute. Patch management is shared: AWS patches the RDS database engine, but you patch the OS on your EC2 instances. Configuration management and training are also shared — AWS provides the tools, you must use them correctly."},"rows":[{"feature":"Physical Security","values":{"AWS Responsibility ('Of the Cloud')":"AWS — data centers, physical access, environmental controls","Customer Responsibility ('In the Cloud')":"Customer — own on-premises hardware (if any)","Shared Responsibilities":"N/A"}},{"feature":"Hypervisor / Virtualization","values":{"AWS Responsibility ('Of the Cloud')":"AWS","Customer Responsibility ('In the Cloud')":"N/A","Shared Responsibilities":"N/A"}},{"feature":"Operating System (EC2)","values":{"AWS Responsibility ('Of the Cloud')":"N/A (hardware only)","Customer Responsibility ('In the Cloud')":"CUSTOMER — OS patching, updates, hardening","Shared Responsibilities":"N/A"}},{"feature":"Database Engine Patching (RDS)","values":{"AWS Responsibility ('Of the Cloud')":"AWS patches the database engine software","Customer Responsibility ('In the Cloud')":"Customer sets maintenance windows and approves updates","Shared Responsibilities":"Shared — both contribute to patching process"}},{"feature":"Data Encryption","values":{"AWS Responsibility ('Of the Cloud')":"AWS provides encryption tools (KMS)","Customer Responsibility ('In the Cloud')":"CUSTOMER must enable and configure encryption","Shared Responsibilities":"Shared — AWS provides tools, customer must use them"}},{"feature":"Network Traffic Encryption","values":{"AWS Responsibility ('Of the Cloud')":"AWS secures inter-facility network links","Customer Responsibility ('In the Cloud')":"CUSTOMER must encrypt application traffic (SSL/TLS)","Shared Responsibilities":"Shared"}},{"feature":"IAM Configuration","values":{"AWS Responsibility ('Of the Cloud')":"AWS provides IAM service and infrastructure","Customer Responsibility ('In the Cloud')":"CUSTOMER creates users, roles, policies, enforces MFA","Shared Responsibilities":"Shared"}}],"sources":["aws_exam_comparison_tables[sonnet46].json"]},{"title":"AWS Storage Services Comparison","title_variants":["AWS Storage Services Comparison"],"context":"This table compares the primary storage services on AWS. S3 provides object storage for virtually unlimited scalability, EBS offers block storage for EC2 instances with consistent performance, and EFS delivers managed file storage accessible from multiple instances simultaneously.","table_id":"SAA-002","relevant_exams":["SAA-C03","AIF-C01"],"relevant_domains":{"SAA-C03":["Domain
