bernetes, multi-cloud","AWS Fargate":"Serverless, event-driven, unpredictable workloads"}}],"sources":["aws_exam_comparison_tables[kimicode-v2].json"]},{"title":"ETL and Data Processing Comparison","title_variants":["Data Processing and ETL Services Comparison","ETL and Data Processing Comparison"],"description":"Comparing AWS services for data processing, ETL, and analytics","context":"AWS provides multiple services for ETL (Extract, Transform, Load) and data processing workloads. Glue offers serverless ETL with a data catalog, EMR provides managed big data frameworks like Spark and Hadoop, Lake Formation simplifies data lake security and governance, and Data Pipeline is a legacy service for data movement. Understanding the capabilities and trade-offs is essential for exam success.","category":"Analytics & Integration Services","exam":"Both (SAA-C03 Primary, AIF-C01 Reference)","columns":["Glue ETL","Glue DataBrew","Glue Data Catalog","EMR (Spark/Hadoop)","Lake Formation","Data Pipeline","AWS Glue","Amazon EMR","AWS Lambda"],"column_summaries":{"AWS Glue":"A serverless data integration service that makes it easy to discover, prepare, and combine data for analytics, ML, and application development.","Amazon EMR":"A managed Hadoop framework service for processing large-scale data using tools like Spark, Hive, and Presto in the cloud.","AWS Lambda":"A serverless compute service for processing data in real-time or in response to events, suitable for lightweight ETL transformations."},"rows":[{"feature":"Service Category","values":{"Glue ETL":"Serverless ETL service","Glue DataBrew":"Visual data preparation","Glue Data Catalog":"Central metadata repository","EMR (Spark/Hadoop)":"Managed big data platform","Lake Formation":"Data lake governance","Data Pipeline":"Legacy data movement service"}},{"feature":"Primary Use Case","values":{"Glue ETL":"ETL jobs, data transformation","Glue DataBrew":"No-code data cleaning","Glue Data Catalog":"Metadata management, schema registry","EMR (Spark/Hadoop)":"Big data processing, ML","Lake Formation":"Data lake security, access control","Data Pipeline":"Scheduled data workflows (deprecated)"}},{"feature":"Code Requirement","values":{"Glue ETL":"Python or Scala (Spark)","Glue DataBrew":"No code (visual interface)","Glue Data Catalog":"No code (automatic)","EMR (Spark/Hadoop)":"Spark, Hadoop, or other frameworks","Lake Formation":"Minimal code (configuration)","Data Pipeline":"JSON definition"}},{"feature":"Compute Model","values":{"Glue ETL":"Serverless (DPU-based)","Glue DataBrew":"Serverless","Glue Data Catalog":"Metadata only (no compute)","EMR (Spark/Hadoop)":"EC2 instances or EKS","Lake Formation":"Metadata layer (uses other services)","Data Pipeline":"EC2 or EMR resources","AWS Glue":"DPUs (Data Processing Units) per hour","Amazon EMR":"Per-instance-hour + storage","AWS Lambda":"Per invocation + duration + memory"}},{"feature":"Pricing","values":{"Glue ETL":"$0.44 per DPU-hour","Glue DataBrew":"$0.48 per session-hour","Glue Data Catalog":"$1 per 100K objects/month","EMR (Spark/Hadoop)":"EC2 costs + EMR markup","Lake Formation":"Free (pay for underlying services)","Data Pipeline":"Pipeline + resource costs"}},{"feature":"Data Sources","values":{"Glue ETL":"S3, RDS, JDBC, DynamoDB, Redshift","Glue DataBrew":"S3, RDS, Redshift, Glue Catalog","Glue Data Catalog":"All AWS data sources","EMR (Spark/Hadoop)":"Virtually any data source","Lake Formation":"S3 primary (with other services)","Data Pipeline":"S3, RDS, DynamoDB, Redshift"}},{"feature":"Transformation Complexity","values":{"Glue ETL":"High (full Spark capabilities)","Glue DataBrew":"Low-Medium (250+ built-in transforms)","Glue Data Catalog":"None (metadata only)","EMR (Spark/Hadoop)":"Very High (any Spark/Hadoop job)","Lake Formation":"None (governance layer)","Data Pipeline":"Medium (shell commands, EMR)"}},{"feature":"Integration with Athena","values":{"Glue ETL":"Writes to catalog for Athena","Glue DataBrew":"Outputs to catalog for Athena","Glue Data Catalog":"Required for Athena","EMR (Spark/Hadoop)":"Can write to Glue Catalog","Lake Formation":"Enforces access for Athena","Data Pipeline":"Indirect","AWS Glue":"Glue Data Catalog, Lake Formation","Amazon EMR":"S3, DynamoDB, Glacier, various stores","AWS Lambda":"Any AWS service via SDK"}},{"feature":"Type","values":{"AWS Glue":"Serverless ETL/integration","Amazon EMR":"Managed big data processing cluster","AWS Lambda":"Serverless function execution"}},{"feature":"Best For","values":{"AWS Glue":"Data cataloging, ETL pipelines, data prep","Amazon EMR":"Petabyte-scale batch processing, ML","AWS Lambda":"Small data transformations, real-time processing"}},{"feature":"Scale","values":{"AWS Glue":"Automatic scaling serverless","Amazon EMR":"Manually configured cluster scaling","AWS Lambda":"Automatic per-invocation scaling"}},{"feature":"Data Format Support","values":{"AWS Glue":"CSV, JSON, Parquet, ORC, JDBC","Amazon EMR":"Many formats including sequence files, custom","AWS Lambda":"Any format (you write the code)"}}],"mnemonics":["GEL = Glue for ETL/Integration, EMR for Massive data, Lambda for Light transformations"],"exam_tips":["Glue is fully serverless - no cluster management","EMR is for BIG data - Spark, Hive, HBase on large clusters","Glue Data Catalog provides unified metadata repository across AWS","Use Lambda for simple, short-duration transformations","Glue supports running Scala or Python code as jobs"],"sources":["aws_exam_comparison_tables[kimi-agsw].json","aws_exam_comparison_tables[minimax-dr].json"]},{"title":"Edge and Traffic Distribution Services","title_variants":["Edge and Traffic Distribution Services"],"category":"Networking / Performance","exam":"SAA-C03","domain":"Design High-Performing Architectures","table_id":"saa_d3_edge_networking","columns":["Amazon CloudFront","AWS Global Accelerator","Amazon Route 53","Application Load Balancer"],"column_summaries":{"Amazon CloudFront":"CloudFront is a CDN focused on caching and edge delivery for content and supported origin patterns. When latency is improved by serving cached content closer to users, CloudFront is the clue.","AWS Global Accelerator":"Global Accelerator improves pathing for non-cache-centric global applications by routing users over the AWS global network to healthy endpoints. Think traffic acceleration, not content caching.","Amazon Route 53":"Route 53 is DNS plus routing policies and health-aware traffic steering. It decides where users should go, but it is not itself a CDN or application-layer load balancer.","Application Load Balancer":"ALB distributes HTTP/HTTPS traffic across targets and understands Layer 7 constructs. It is the go-to exam answer for path-based or host-based routing inside an application stack."},"rows":[{"feature":"Core role","values":{"Amazon CloudFront":"Edge caching and content delivery","AWS Global Accelerator":"Global traffic acceleration","Amazon Route 53":"DNS and routing policies","Application Load Balancer":"Layer 7 load balancing"}},{"feature":"Best exam clue","values":{"Amazon CloudFront":"Static assets, CDN, cache at edge","AWS Global Accelerator":"Improve global app pathing to regional endpoints","Amazon Route 53":"DNS routing, health checks, failover policies","Application Load Balancer":"HTTP routing across app targets"}},{"feature":"Caches content","values":{"Amazon CloudFront":"Yes","AWS Global Accelerator":"No, not its core job","Amazon Route 53":"No","Application Load Balancer":"No"}},{"feature":"Works at","values":{"Amazon CloudFront":"Edge delivery layer","AWS Global Accelerator":"Global network entry layer","Amazon Route 53":"DNS control plane","Application Load Balancer":"Application request distribution"}},{"feature":"Typical use","values":{"Amazon CloudFront":"Website acceleration and edge delivery","AWS Global Accelerator":"Global applications needing better routing performance","Amazon Route 53":"Traffic steering and DNS failover","Application Load Balancer":"Distribute web requests to targets"}},{"feature":"Common trap","values":{"Amazon CloudFront":"Using it for all routing questions","AWS Global Accelerator":"Confusing it with CDN caching","Amazon Route 53":"Confusing DNS with request-level balancing","Application Load Balancer":"Using it when the issue is really global routing or CDN"}}],"why_this_table_matters":"SAA Domain 3 asks you to separate CDN caching, traffic acceleration, DNS routing, and load balancing. The exam loves mixing these together in one scenario to see whether you can isolate the real bottleneck.","sources":["aws_exam_comparison_tables[gpt5].json"]},{"title":"Elastic Compute and Container Choices","title_variants":["Elastic Compute and Container Choices"],"category":"Compute / Resilience","exam":"SAA-C03","domain":"Design Resilient Architectures","table_id":"saa_d2_compute_patterns","columns":["Amazon EC2 with Auto Scaling","AWS Lambda","Amazon ECS on Fargate","Amazon EKS"],"column_summaries":{"Amazon EC2 with Auto Scaling":"EC2 with Auto Scaling gives the most control over the compute environment while still allowing elastic scaling. Use it when the workload needs OS-level customization, special agents, or traditional server patterns.","AWS Lambda":"Lambda is event-driven serverless compute with minimal infrastructure management. Exam clues include short-lived execution, variable demand, and fast scaling without server administration.","Amazon ECS on Fargate":"ECS on Fargate lets you run containers without managing servers, landing in a sweet spot between control and low ops overhead. It fits microservices and containerized apps when you do not need Kubernetes complexity.","Amazon EKS":"EKS is managed Kubernetes for teams that need Kubernetes APIs, portability, or complex orchestration patterns. In exam questions, it wins when the requirement explicitly calls for Kubernetes."},"rows":[{"feature":"Ops burden","values":{"Amazon EC2 with Auto Scaling":"Highest of this group","AWS Lambda":"Lowest","Amazon ECS on Fargate":"Low","Amazon EKS":"Higher than ECS/Fargate"}},{"feature":"Best exam clue","values":{"Amazon EC2 with Auto Scaling":"Need instance-level control","AWS Lambda":"Event-driven and short execution","Amazon ECS on Fargate":"Containers without server management","Amazon EKS":"Kubernetes requirement"}},{"feature":"Scaling model","values":{"Amazon EC2 with Auto Scaling":"Scale instances","AWS Lambda":"Scale invocations","Amazon ECS on Fargate":"Scale tasks/services","Amazon EKS":"Scale pods/nodes"}},{"feature":"Packaging style","values":{"Amazon EC2 with Auto Scaling":"Machine images / instances","AWS Lambda":"Function packages","Amazon ECS on Fargate":"Containers","Amazon EKS":"Containers on Kubernetes"}},{"feature":"Great for unpredictable bursts","values":{"Amazon EC2 with Auto Scaling":"Good but slower than Lambda for some patterns","AWS Lambda":"Excellent","Amazon ECS on Fargate":"Good","Amazon EKS":"Good with more platform overhead"}},{"feature":"Common mistake","values":{"Amazon EC2 with Auto Scaling":"Using it when serverless would cut ops cost","AWS Lambda":"Using it for long-running or overly stateful workloads","Amazon ECS on Fargate":"Assuming it is Kubernetes","Amazon EKS":"Choosing it without a real Kubernetes need"}}],"why_this_table_matters":"SAA Domain 2 and Domain 3 both expect you to choose the right compute pattern for scale, resilience, and operations overhead. This table compares server-based, serverless, and container execution paths.","sources":["aws_exam_comparison_tables[gpt5].json"]},{"title":"Encryption Services Comparison","title_variants":["Encryption Services Comparison"],"context":"AWS provides multiple encryption services to protect data at rest and in transit. Understanding the differences between KMS key types (Customer Managed, AWS Managed, AWS Owned), CloudHSM for dedicated HSMs, Secrets Manager for credential storage, and Certificate Manager for TLS/SSL certificates is essential. The exam tests your ability to select the appropriate encryption solution based on compliance requirements, key control needs, automation requirements, and integration patterns. Key considerations include who manages the keys, FIPS 140-2 validation levels, automatic rotation capabilities, and service integrations.","columns":["KMS Customer Managed Keys (CMK)","KMS AWS Managed Keys","KMS AWS Owned Keys","CloudHSM","Secrets Manager","Certificate Manager (ACM)"],"rows":[{"feature":"Key Ownership & Control","values":{"KMS Customer Managed Keys (CMK)":"Customer owns and fully controls the key lifecycle","KMS AWS Managed Keys":"AWS owns and manages; customer has limited control","KMS AWS Owned Keys":"AWS owns and manages; no customer visibility","CloudHSM":"Customer owns keys in dedicated HSM; AWS has no access","Secrets Manager":"AWS manages encryption keys; customer manages secret values","Certificate Manager (ACM)":"AWS manages private keys for TLS certificates"}},{"feature":"FIPS 140-2 Level","values":{"KMS Customer Managed Keys (CMK)":"Level 2 (validated HSMs)","KMS AWS Managed Keys":"Level 2 (validated HSMs)","KMS AWS Owned Keys":"Level 2 (validated HSMs)","CloudHSM":"Level 3 (dedicated HSM hardware)","Secrets Manager":"Level 2 (uses KMS for encryption)","Certificate Manager (ACM)":"Level 2 (uses KMS for key storage)"}},{"feature":"Key Rotation","values":{"KMS Customer Managed Keys (CMK)":"Automatic yearly rotation (optional, enabled via API)","KMS AWS Managed Keys":"Automatic yearly rotation (AWS managed)","KMS AWS Owned Keys":"Automatic rotation (AWS managed, not visible)","CloudHSM":"Customer responsible for rotation","Secrets Manager":"Automatic rotation supported via Lambda (configurable interval)","Certificate Manager (ACM)":"Automatic renewal before expiration"}},{"feature":"Pricing Model","values":{"KMS Customer Managed Keys (CMK)":"$1/month per key + $0.03 per 10,000 API calls","KMS AWS Managed Keys":"Free (included in service cost)","KMS AWS Owned Keys":"Free (included in service cost)","CloudHSM":"$1.45/hour per HSM (~$1,053/month) + upfront provisioning","Secrets Manager":"$0.40/month per secret + $0.05 per 10,000 API calls","Certificate Manager (ACM)":"Free for ACM-issued public certificates"}},{"feature":"Primary Use Cases","values":{"KMS Customer Managed Keys (CMK)":"Compliance requirements, key deletion capability, granular access control","KMS AWS Managed Keys":"Default encryption when no specific key required","KMS AWS Owned Keys":"Automatic encryption (S3 SSE-S3, DynamoDB default)","CloudHSM":"Regulatory requirements for dedicated HSM, custom key storage","Secrets Manager":"Database credentials, API keys, OAuth tokens, automatic rotation","Certificate Manager (ACM)":"TLS/SSL certificates for CloudFront, ALB, API Gateway"}},{"feature":"Deletion Capability","values":{"KMS Customer Managed Keys (CMK)":"Customer can schedule deletion (7-30 day waiting period)","KMS AWS Managed Keys":"Cannot be deleted by customer","KMS AWS Owned Keys":"Cannot be deleted by customer","CloudHSM":"Customer can delete keys immediately","Secrets Manager":"Customer can delete secrets immediately","Certificate Manager (ACM)":"Customer can delete certificates"}},{"feature":"Regional Scope","values":{"KMS Customer Managed Keys (CMK)":"Region-specific; multi-Region keys available","KMS AWS Managed Keys":"Region-specific","KMS AWS Owned Keys":"May span multiple regions (AWS managed)","CloudHSM":"Region-specific; cluster can span AZs","Secrets Manager":"Region-specific; can replicate to other regions","Certificate Manager (ACM)":"Region-specific for ELB; global for CloudFront"}},{"feature":"Service Integrations","values":{"KMS Customer Managed Keys (CMK)":"S3, EBS, RDS, DynamoDB, SQS, SNS, Lambda, 100+ services","KMS AWS Managed Keys":"Same services as CMK (default encryption)","KMS AWS Owned Keys":"S3 SSE-S3, DynamoDB, EFS, Aurora","CloudHSM":"Custom applications via PKCS#11, JCE, OpenSSL, Windows CSP","Secrets Manager":"RDS, Redshift, DocumentDB, custom secrets via Lambda","Certificate Manager (ACM)":"CloudFront, ALB, NLB, API Gateway"}},{"feature":"Audit & Compliance","values":{"KMS Customer Managed Keys (CMK)":"Full CloudTrail logging of all API calls","KMS AWS Managed Keys":"CloudTrail logs key usage (not management)","KMS AWS Owned Keys":"No CloudTrail visibility","CloudHSM":"HSM audit logs to CloudWatch Logs","Secrets Manager":"CloudTrail logs all API calls","Certificate Manager (ACM)":"CloudTrail logs management operations"}}],"sources":["aws_exam_comparison_tables[kimi-agsw].json"]},{"title":"Encryption and Secrets Management Comparison","title_variants":["Encryption and Secrets Management Comparison"],"description":"Comparing AWS services for data encryption and secrets management","category":"Security & Identity Services","exam":"Both (SAA-C03 Primary, AIF-C01 Reference)","columns":["AWS KMS","AWS Secrets Manager","AWS Certificate Manager"],"column_summaries":{"AWS KMS":"Key Management Service providing secure, compliant key storage and management for data encryption, integrated with most AWS services for at-rest encryption.","AWS Secrets Manager":"A secrets management service that securely stores, encrypts, and rotates database credentials, API keys, and other secrets throughout their lifecycle.","AWS Certificate Manager":"A service that provisions, manages, and deploys SSL/TLS certificates for use with AWS services and internal resources, eliminating manual certificate management."},"rows":[{"feature":"What It Manages","values":{"AWS KMS":"Encryption keys (symmetric and asymmetric)","AWS Secrets Manager":"Application secrets (passwords, API keys)","acm":"SSL/TLS certificates"}},{"feature":"Use Case","values":{"AWS KMS":"Encrypt data at rest in AWS services","AWS Secrets Manager":"Store DB credentials, rotate passwords","acm":"Enable HTTPS for websites and APIs"}},{"feature":"Rotation","values":{"AWS KMS":"Manual or automatic (via Lambda)","AWS Secrets Manager":"Automatic rotation built-in","acm":"Automatic renewal before expiry"}},{"feature":"Integration","values":{"AWS KMS":"S3, EBS, RDS, Lambda, etc.","AWS Secrets Manager":"RDS, DocumentDB, Redshift, other services","acm":"ALB, CloudFront, API Gateway, etc."}},{"feature":"Cost","values":{"AWS KMS":"Free tier + per-key fees","AWS Secrets Manager":"Per-secret per-month + API calls","acm":"Free for public certificates (import fees)"}}],"mnemonics":["KSA = KMS for Keys, Secrets for secrets, ACM for Certificates"],"exam_tips":["KMS is for encryption keys; Secrets Manager is for application secrets","Use KMS customer managed keys (CMK) for production encryption","Secrets Manager can automatically rotate credentials for RDS","ACM certificates auto-renew; no need to manually update","Never store secrets in code, environment variables, or S3 buckets - use Secrets Manager"],"sources":["aws_exam_comparison_tables[minimax-dr].json"]},{"title":"FM Evaluation Metrics — ROUGE vs BLEU vs BERTScore","title_variants":["FM Evaluation Metrics — ROUGE vs BLEU vs BERTScore"],"context":"When you deploy a foundation model, how do you measure if it is performing well? These three metrics are the standard evaluation tools the exam tests. They each have different strengths: ROUGE is for summarization, BLEU is for translation, and BERTScore is for deeper semantic quality.","exam":"AIF-C01","domain":"Domain 3: Applications of Foundation Models","domain_weight":"28%","table_id":"AIF-008","columns":["ROUGE","BLEU","BERTScore"],"column_summaries":{"ROUGE":"ROUGE (Recall-Oriented Understudy for Gisting Evaluation) measures how much of the reference text appears in the model's output — it prioritizes RECALL. It is the standard metric for evaluating TEXT SUMMARIZATION tasks.","BLEU":"BLEU (Bilingual Evaluation Understudy) measures how closely the model's output matches a reference translation — it prioritizes PRECISION of n-gram matches. It is the standard metric for evaluating MACHINE TRANSLATION quality.","BERTScore":"BERTScore uses a BERT language model to measure the SEMANTIC SIMILARITY between generated text and reference text — it understands meaning, not just exact word matches. It is more sophisticated and better at catching paraphrasing as correct."},"rows":[{"feature":"Primary Use","values":{"ROUGE":"Text Summarization evaluation","BLEU":"Machine Translation evaluation","BERTScore":"General text quality / semantic similarity"}},{"feature":"Measures","values":{"ROUGE":"Overlap of n-grams between generated and reference text (recall-focused)","BLEU":"Precision of n-gram matches between generated and reference translation","BERTScore":"Semantic similarity using contextual embeddings from BERT"}},{"feature":"Understands Meaning?","values":{"ROUGE":"No — only word/phrase overlap","BLEU":"No — only exact n-gram matches","BERTScore":"Yes — captures paraphrases and semantic equivalence"}},{"feature":"Score Range","values":{"ROUGE":"0 to 1 (higher = better)","BLEU":"0 to 1 (higher = better)","BERTScore":"Usually 0.8-1.0 (higher = better semantic match)"}}],"sources":["aws_exam_comparison_tables[sonnet46].json"]},{"title":"File Storage Comparison","title_variants":["File Storage Comparison"],"context":"AWS file storage services provide managed, scalable file systems accessible via standard protocols (NFS, SMB). This comparison covers Amazon EFS for Linux workloads and Amazon FSx family for Windows, high-performance computing, and NetApp workloads. Understanding the differences between these services is crucial for selecting the right file storage solution based on protocol requirements, performance needs, and integration with existing infrastructure.","columns":["EFS Standard","EFS Infrequent Access (IA)","FSx for Windows File Server","FSx for Lustre","FSx for NetApp ONTAP"],"rows":[{"feature":"Protocol Support","values":{"EFS Standard":"NFS v4.0, v4.1, v4.2","EFS Infrequent Access (IA)":"NFS v4.0, v4.1, v4.2","FSx for Windows File Server":"SMB 2.0-3.1.1, NTFS, Active Directory","FSx for Lustre":"Lustre client, HDFS (via S3 integration)","FSx for NetApp ONTAP":"NFS v3/v4, SMB, iSCSI"}},{"feature":"Operating System","values":{"EFS Standard":"Linux-based","EFS Infrequent Access (IA)":"Linux-based","FSx for Windows File Server":"Windows","FSx for Lustre":"Linux (Lustre client required)","FSx for NetApp ONTAP":"Linux, Windows, mixed environments"}},{"feature":"Performance Mode","values":{"EFS Standard":"General Purpose, Max I/O","EFS Infrequent Access (IA)":"General Purpose, Max I/O","FSx for Windows File Server":"Standard, Multi-AZ","FSx for Lustre":"Scratch (temp), Persistent","FSx for NetApp ONTAP":"Single-AZ, Multi-AZ"}},{"feature":"Throughput Scaling","values":{"EFS Standard":"Bursting (default), Provisioned","EFS Infrequent Access (IA)":"Bursting (default), Provisioned","FSx for Windows File Server":"Up to 2+ GB/s","FSx for Lustre":"Up to 1,000+ GB/s","FSx for NetApp ONTAP":"Up to 4+ GB/s"}},{"feature":"Latency","values":{"EFS Standard":"Low (single-digit ms)","EFS Infrequent Access (IA)":"Low (single-digit ms, retrieval time)","FSx for Windows File Server":"Sub-millisecond (SSD)","FSx for Lustre":"Sub-millisecond to microseconds","FSx for NetApp ONTAP":"Sub-millisecond"}},{"feature":"Durability","values":{"EFS Standard":"99.999999999% (11 nines)","EFS Infrequent Access (IA)":"99.999999999% (11 nines)","FSx for Windows File Server":"99.9999% (Multi-AZ)","FSx for Lustre":"99.9% (Persistent), None (Scratch)","FSx for NetApp ONTAP":"99.999%"}},{"feature":"Availability","values":{"EFS Standard":"99.9% (Regional)","EFS Infrequent Access (IA)":"99.9% (Regional)","FSx for Windows File Server":"99.99% (Multi-AZ)","FSx for Lustre":"99.99% (Persistent)","FSx for NetApp ONTAP":"99.99% (Multi-AZ)"}},{"feature":"Multi-AZ Support","values":{"EFS Standard":"Yes (Regional service)","EFS Infrequent Access (IA)":"Yes (Regional service)","FSx for Windows File Server":"Yes (optional)","FSx for Lustre":"No (Single-AZ only)","FSx for NetApp ONTAP":"Yes (optional)"}},{"feature":"Storage Efficiency","values":{"EFS Standard":"Lifecycle management to IA","EFS Infrequent Access (IA)":"Automatic tiering","FSx for Windows File Server":"Deduplication, Compression","FSx for Lustre":"None","FSx for NetApp ONTAP":"Deduplication, Compression, Thin provisioning"}},{"feature":"Data Replication","values":{"EFS Standard":"Cross-Region Replication","EFS Infrequent Access (IA)":"Cross-Region Replication","FSx for Windows File Server":"Multi-AZ, Backups","FSx for Lustre":"S3 integration, Backups","FSx for NetApp ONTAP":"SnapMirror replication, Multi-AZ"}},{"feature":"Best Use Cases","values":{"EFS Standard":"Content management, web serving, container storage, home directories","EFS Infrequent Access (IA)":"Long-lived, infrequently accessed file data","FSx for Windows File Server":"Windows applications, SQL Server, .NET apps, AD integration","FSx for Lustre":"HPC, ML training, video rendering, financial modeling","FSx for NetApp ONTAP":"Lift-and-shift ONTAP workloads, hybrid cloud, mixed OS environments"}}],"sources":["aws_exam_comparison_tables[kimi-agsw].json"]},{"title":"Foundation Model Customization Approaches","title_variants":["Foundation Model Customization Approaches","Foundation Model Customization Methods"],"description":"Comparison of methods for customizing foundation models on AWS","context":"Comparing approaches to customize foundation models - Domain 3 (Applications of Foundation Models)","category":"Foundation Models","exam":"AIF-C01","domain":"Applications of Foundation Models","table_id":"aif_d3_customization_approaches","columns":["Prompt Engineering / In-Context Learning","RAG","Fine-Tuning","Pre-Training or Continuous Pre-Training"],"column_summaries":{"Prompt Engineering / In-Context Learning":"A no-training approach that enhances model responses by retrieving relevant context from a knowledge base at inference time. Most cost-effective for adding new knowledge, enabling real-time updates by simply updating the source documents without modifying the model.","RAG":"RAG adds external knowledge retrieval so the model can answer using fresher or domain-specific information without fully retraining the model. It is often the sweet spot for enterprise knowledge applications.","Fine-Tuning":"A supervised learning process that adapts a pre-trained model to specific tasks using labeled examples. Improves model behavior for particular use cases (style, format, domain tasks) but doesn't update the model's core knowledge base.","Pre-Training or Continuous Pre-Training":"The complete process of training a foundation model from scratch on massive datasets. Typically requires billions of tokens and significant compute resources. Most organizations should use pre-trained models rather than training from scratch."},"rows":[{"feature":"Relative effort","values":{"Prompt Engineering / In-Context Learning":"Lowest","RAG":"Low to moderate","Fine-Tuning":"Moderate to high","Pre-Training or Continuous Pre-Training":"Highest"}},{"feature":"Changes model weights?","values":{"Prompt Engineering / In-Context Learning":"No - purely input modification","RAG":"No - external knowledge accessed at inference","Fine-Tuning":"Yes - model weights updated for task","Pre-Training or Continuous Pre-Training":"Yes - weights updated with domain knowledge"}},{"feature":"Best exam clue","values":{"Prompt Engineering / In-Context Learning":"Improve output via better prompts/examples","RAG":"Need fresh or proprietary knowledge grounding","Fine-Tuning":"Need stronger domain/task adaptation","Pre-Training or Continuous Pre-Training":"Need major domain learning at large scale"}},{"feature":"Cost tendency","values":{"Prompt Engineering / In-Context Learning":"Lowest","RAG":"Usually lower than tuning-heavy options","Fine-Tuning":"Higher","Pre-Training or Continuous Pre-Training":"Highest"}},{"feature":"Great for","values":{"Prompt Engineering / In-Context Learning":"Dynamic knowledge, Q&A, RAG","RAG":"Knowledge assistants and grounded answers","Fine-Tuning":"Specialized behavior consistency","Pre-Training or Continuous Pre-Training":"Large-scale custom model capability building"}},{"feature":"Common trap","values":{"Prompt Engineering / In-Context Learning":"Expecting it to solve missing knowledge freshness by itself","RAG":"Confusing it with weight updates","Fine-Tuning":"Using it before trying simpler options","Pre-Training or Continuous Pre-Training":"Choosing it when business need does not justify the cost"}},{"feature":"Training Required","values":{"In-Context Learning (RAG)":"Documents for retrieval","Fine-Tuning":"Task-specific examples (hundreds)","Continued Pre-training":"Domain-specific data (thousands)","Full Pre-training":"Massive corpus (billions tokens)"}},{"feature":"Cost Level","values":{"In-Context Learning (RAG)":"Lowest","Fine-Tuning":"Moderate","Continued Pre-training":"High","Full Pre-training":"Very High"}},{"feature":"Time to Deploy","values":{"In-Context Learning (RAG)":"Hours","Fine-Tuning":"Days to weeks","Continued Pre-training":"Weeks to months","Full Pre-training":"Months"}},{"feature":"Knowledge Freshness","values":{"In-Context Learning (RAG)":"Easy - update knowledge base documents","Fine-Tuning":"Requires retraining for updates","Continued Pre-training":"Requires retraining for updates","Full Pre-training":"Frozen until re-trained","Prompt Engineering":"Limited by model training data"}},{"feature":"Customization Depth","values":{"In-Context Learning (RAG)":"Context window only","Fine-Tuning":"Task behavior","Continued Pre-training":"Domain knowledge","Full Pre-training":"Fundamental capabilities"}},{"feature":"AWS Service","values":{"In-Context Learning (RAG)":"Bedrock Knowledge Bases","Fine-Tuning":"Bedrock Fine-tuning, SageMaker","Continued Pre-training":"SageMaker training jobs","Full Pre-training":"SageMaker distributed training"}},{"feature":"Data Requirements","values":{"Prompt Engineering":"Task description and examples in prompt","rag":"Document corpus for retrieval (no labeling needed)","Fine-tuning":"Labeled dataset specific to target task","Continuous Pre-training":"Large unlabeled domain-specific corpus"}},{"feature":"Compute Cost","values":{"Prompt Engineering":"Minimal - only inference costs","rag":"Low - retrieval overhead + inference","Fine-tuning":"High - training compute required","Continuous Pre-training":"Very High - large-scale training"}},{"feature":"Latency","values":{"Prompt Engineering":"Baseline inference latency","rag":"Higher - retrieval adds overhead","Fine-tuning":"Baseline after training","Continuous Pre-training":"Baseline after training"}},{"feature":"Best Use Case","values":{"Prompt Engineering":"Quick testing, simple tasks, format control","rag":"Up-to-date information, company-specific knowledge","Fine-tuning":"Task-specific behavior, style, terminology","Continuous Pre-training":"Domain expertise, vocabulary, concepts"}},{"feature":"Hallucination Risk","values":{"Prompt Engineering":"Moderate - model may hallucinate","rag":"Lower - grounded in retrieved documents","Fine-tuning":"Can reduce with proper training data","Continuous Pre-training":"Can improve with better domain data"}}],"mnemonics":["RAG-FT-CPT-FPT: RAG for context, Fine-Tuning for tasks, Continued Pre-Training for domains, Full Pre-Training for new models","Need to add knowledge without training? RAG. Need better task performance? Fine-tune. Need domain expertise? Continued pre-training. Building from scratch? Full pre-training.","P.R.F.C - Prompt is quick, Retrieval grounds, Fine-tune fixes, Continuous covers domains"],"exam_tips":["RAG is most cost-effective for adding new knowledge to models","Fine-tuning changes model behavior, not knowledge","RAG allows real-time knowledge updates by updating documents","Fine-tuning requires hundreds to thousands of examples","Continued pre-training is for domain adaptation (legal, medical, etc.)","Full pre-training is rarely needed - use existing foundation models","Start with prompt engineering before more expensive methods","RAG is preferred for knowledge-intensive applications needing current information","Fine-tuning is for when you need consistent task-specific behavior","Cost increases significantly from prompt → RAG → fine-tuning → continuous pre-training","Hybrid approaches combining multiple methods are common in production"],"why_this_table_matters":"AIF Domain 3 compares cost and capability tradeoffs across prompting, retrieval, tuning, and pre-training approaches. This table gives the exam-style ladder from lightest to heaviest customization.","sources":["aws_exam_comparison_tables[gpt5].json","aws_exam_comparison_tables[glm5-agent].json","aws_exam_comparison_tables[minimax].json"]},{"title":"Foundation Model Inference Parameters Comparison","title_variants":["Foundation Model Inference Parameters Comparison"],"context":"This table compares key inference parameters for controlling foundation model outputs. Temperature controls randomness, Top P (nucleus sampling) limits vocabulary based on cumulative probability, and Top K restricts the number of token choices considered.","table_id":"inference_parameters_comparison","relevant_exams":["AIF-C01"],"relevant_domains":{"AIF-C01":["Domain 3: Applications of Foundation Models"]},"columns":["Temperature","Top P (Nucleus Sampling)","Top K"],"column_summaries":{"Temperature":"Controls the randomness and creativity of model outputs by adjusting the probability distribution - lower values produce more deterministic responses, higher values more creative ones.","Top P (Nucleus Sampling)":"Limits token selection to the smallest set of tokens whose cumulative probability exceeds the threshold P, providing dynamic vocabulary restriction based on context.","Top K":"Restricts the model to consider only the K most likely next tokens, providing a fixed-size candidate pool for the next word prediction."},"rows":[{"feature":"What It Controls","values":{"Temperature":"Overall randomness/creativity","Top P (Nucleus Sampling)":"Vocabulary breadth based on probability","Top K":"Number of token candidates"}},{"feature":"Range","values":{"Temperature":"0.0 to 1.0 (or 2.0)","Top P (Nucleus Sampling)":"0.0 to 1.0","Top K":"1 to 500+"}},{"feature":"Low Value Effect","values":{"Temperature":"More deterministic, focused outputs","Top P (Nucleus Sampling)":"Smaller vocabulary, more focused","Top K":"Fewer options, more predictable"}},{"feature":"High Value Effect","values":{"Temperature":"More creative, diverse outputs","Top P (Nucleus Sampling)":"Larger vocabulary, more variety","Top K":"More options, more creative"}},{"feature":"Best For","values":{"Temperature":"Factual Q&A (low), Creative writing (high)","Top P (Nucleus Sampling)":"Balanced creativity and coherence","Top K":"Controlling specific vocabulary diversity"}},{"feature":"How It Works","values":{"Temperature":"Scales logits before softmax","Top P (Nucleus Sampling)":"Dynamic cutoff based on cumulative probability","Top K":"Fixed cutoff at K tokens"}},{"feature":"Example","values":{"Temperature":"0.1 for code, 0.7 for chat, 1.0 for brainstorming","Top P (Nucleus Sampling)":"0.9 allows tokens summing to 90% probability","Top K":"Top K=40 considers only top 40 tokens"}}],"sources":["aws_exam_comparison_tables[kimicode-v2].json"]},{"title":"Foundation Model Selection Criteria Comparison","title_variants":["Foundation Model Selection Criteria Comparison"],"context":"This table compares popular foundation models available on Amazon Bedrock. Each model has different strengths, context windows, license types, and optimal use cases for building generative AI applications.","table_id":"fm_selection_comparison","relevant_exams":["AIF-C01"],"relevant_domains":{"AIF-C01":["Domain 3: Applications of Foundation Models"]},"columns":["Claude (Anthropic)","Llama (Meta)","Mistral AI","Amazon Nova"],"column_summaries":{"Claude (Anthropic)":"Advanced LLM known for safety, helpfulness, and honesty with strong reasoning capabilities, large context windows, and enterprise-grade reliability.","Llama (Meta)":"Open-source LLM family offering strong performance with permissive licensing, available in various sizes for different deployment needs.","Mistral AI":"European AI company providing efficient, high-performing models with strong multilingual capabilities and coding proficiency.","Amazon Nova":"Amazon's own foundation model family optimized for AWS integration, cost-effectiveness, and enterprise use cases with competitive performance."},"rows":[{"feature":"Max Context Window","values":{"Claude (Anthropic)":"Up to 200K tokens","Llama (Meta)":"Up to 128K tokens","Mistral AI":"Up to 128K tokens","Amazon Nova":"Up to 128K tokens"}},{"feature":"License Type","values":{"Claude (Anthropic)":"Proprietary (commercial license)","Llama (Meta)":"Open source (Llama 3.1: custom license)","Mistral AI":"Open source (Apache 2.0 for some models)","Amazon Nova":"Proprietary (AWS-owned)"}},{"feature":"Key Strengths","values":{"Claude (Anthropic)":"Reasoning, safety, long context, analysis","Llama (Meta)":"Open source, flexibility, various sizes","Mistral AI":"Efficiency, multilingual, coding","Amazon Nova":"AWS integration, cost-effective, latency"}},{"feature":"Best For","values":{"Claude (Anthropic)":"Complex reasoning, document analysis, safety-critical","Llama (Meta)":"Customization, fine-tuning, on-premise deployment","Mistral AI":"European deployment, multilingual apps, coding","Amazon Nova":"Cost-sensitive workloads, AWS-native apps"}},{"feature":"Modality","values":{"Claude (Anthropic)":"Text, Vision (some versions)","Llama (Meta)":"Text, Vision (some versions)","Mistral AI":"Text","Amazon Nova":"Text, Vision (Micro to Pro)"}},{"feature":"Model Sizes","values":{"Claude (Anthropic)":"Haiku, Sonnet, Opus","Llama (Meta)":"8B, 70B, 405B parameters","Mistral AI":"Various sizes including Large 2","Amazon Nova":"Micro, Lite, Pro, Canvas, Reel"}},{"feature":"RLHF Training","values":{"Claude (Anthropic)":"Yes (Constitutional AI)","Llama (Meta)":"Yes","Mistral AI":"Yes","Amazon Nova":"Yes"}}],"sources":["aws_exam_comparison_tables[kimicode-v2].json"]},{"title":"Generative AI Builder Tools on AWS","title_variants":["Generative AI Builder Tools on AWS"],"category":"Generative AI","exam":"AIF-C01","domain":"Fundamentals of Generative AI","table_id":"aif_d2_genai_builder_tools","columns":["Amazon Bedrock","SageMaker JumpStart","PartyRock","Amazon Q"],"column_summaries":{"Amazon Bedrock":"Amazon Bedrock is the managed service for building generative AI applications with foundation models on AWS. On the exam, it is the central answer for managed foundation model access and gen AI application building.","SageMaker JumpStart":"SageMaker JumpStart helps accelerate model discovery and getting started with foundation and ML models within the SageMaker ecosystem. It is the exam clue for starting quickly from model and solution templates.","PartyRock":"PartyRock is an Amazon Bedrock playground-style experience for experimenting with generative AI ideas quickly. It is about exploration and rapid prototyping, not the main enterprise production control plane.","Amazon Q":"Amazon Q is an AI assistant experience rather than a generic foundation model platform. When the scenario is about AI assistance in workflows or productivity contexts, Amazon Q becomes the likely fit."},"rows":[{"feature":"Primary role","values":{"Amazon Bedrock":"Build generative AI apps with managed FMs","SageMaker JumpStart":"Accelerate getting started with models and templates","PartyRock":"Playground / experiment quickly","Amazon Q":"AI assistant experience"}},{"feature":"Best exam clue","values":{"Amazon Bedrock":"Managed FM access, RAG, agents, gen AI apps","SageMaker JumpStart":"Quick-start model experimentation in SageMaker context","PartyRock":"No-code/low-friction exploration","Amazon Q":"Assistant for productivity or workflow help"}},{"feature":"Typical user mindset","values":{"Amazon Bedrock":"Application builder","SageMaker JumpStart":"ML builder getting started faster","PartyRock":"Experimenter or learner","Amazon Q":"Knowledge worker / builder using an assistant"}},{"feature":"Production readiness signal","values":{"Amazon Bedrock":"High relevance","SageMaker JumpStart":"High but model-start focused","PartyRock":"Prototype-oriented","Amazon Q":"Assistant-oriented"}},{"feature":"Common trap","values":{"Amazon Bedrock":"Treating it as just a playground","SageMaker JumpStart":"Confusing it with Bedrock itself","PartyRock":"Treating it as the core enterprise platform","Amazon Q":"Confusing assistant UX with model-hosting platform"}}],"why_this_table_matters":"AIF Domain 2 explicitly names the AWS services and experiences used to build or explore generative AI. This table helps separate the managed model platform from the playground and assistant experiences.","sources":["aws_exam_comparison_tables[gpt5].json"]},{"title":"Generative AI Components Comparison","title_variants":["Generative AI Components Comparison"],"description":"Comparing components used in building generative AI applications on AWS","category":"AI & Machine Learning Services","exam":"AIF-C01","columns":["RAG (Retrieval Augmented Generation)","Vector Databases","Foundation Models","Agents for Bedrock"],"column_summaries":{"RAG (Retrieval Augmented Generation)":"An architecture that combines retrieval systems with LLMs to generate responses based on retrieved knowledge, reducing hallucinations by grounding responses in actual data.","Vector Databases":"Databases optimized for storing and searching vector embeddings, enabling semantic search and similarity matching for AI applications.","Foundation Models":"Large pre-trained AI models that can be adapted for multiple tasks through fine-tuning or prompt engineering, the core of generative AI.","Agents for Bedrock":"AI agents that can break down complex multi-step tasks and execute actions across various systems using foundation models."},"rows":[{"feature":"Purpose","values":{"RAG (Retrieval Augmented Generation)":"Ground LLM responses in real data","Vector Databases":"Store and search embeddings","Foundation Models":"Generate content (text, images, code)","Agents for Bedrock":"Execute multi-step tasks autonomously"}},{"feature":"How It Works","values":{"RAG (Retrieval Augmented Generation)":"Retrieves relevant docs + LLM generates","Vector Databases":"Store vectors, similarity search","Foundation Models":"Pre-trained, respond to prompts","Agents for Bedrock":"Reasoning loop + tool execution"}},{"feature":"AWS Service","values":{"RAG (Retrieval Augmented Generation)":"Bedrock Knowledge Bases","Vector Databases":"OpenSearch, Aurora, DocumentDB, Kendra","Foundation Models":"Bedrock model access","Agents for Bedrock":"Agents for Amazon Bedrock"}},{"feature":"Key Benefit","values":{"RAG (Retrieval Augmented Generation)":"Reduces hallucinations, up-to-date info","Vector Databases":"Semantic search capability","Foundation Models":"Pre-trained, adaptable","Agents for Bedrock":"Automates complex workflows"}},{"feature":"Exam Focus","values":{"RAG (Retrieval Augmented Generation)":"When to use RAG vs fine-tuning","Vector Databases":"Supported services in Bedrock","Foundation Models":"Model selection criteria","Agents for Bedrock":"When agents are appropriate"}}],"mnemonics":["RIVFA = Retrieval augmented, Indexing vectors, Foundational models, Autonomous agents"],"exam_tips":["RAG uses vector databases to provide context to LLMs","Vector databases in AWS include OpenSearch, Aurora, DocumentDB, Neptune, RDS PG","Foundation models are the core of GenAI - choose based on cost, capability, and use case","Agents can use tools and take actions - good for multi-step workflows","RAG is generally preferred over fine-tuning for adding current/organizational knowledge"],"sources":["aws_exam_comparison_tables[minimax-dr].json"]},{"title":"Generative AI Concepts and Techniques Comparison","title_variants":["Generative AI Concepts and Techniques Comparison"],"context":"This table compares key generative AI concepts and techniques for the AIF-C01 exam, including prompt engineering approaches, RAG architecture, fine-tuning methods, and vector databases for AI applications.","table_id":"generative_ai_concepts_comparison","relevant_exams":["AIF-C01"],"relevant_domains":{"AIF-C01":["Domain 2: Fundamentals of Generative AI","Domain 3: Applications of Foundation Models"]},"columns":[],"rows":[{"feature":"Approach Type","values":{"Prompt Engineering":"In-context learning (no model changes)","RAG (Retrieval-Augmented Generation)":"Context augmentation (external data)","Fine-Tuning":"Model adaptation (weights updated)","Vector Database":"Infrastructure (retrieval system)"}},{"feature":"Implementation Complexity","values":{"Prompt Engineering":"Low","RAG (Retrieval-Augmented Generation)":"Medium","Fine-Tuning":"High","Vector Database":"Medium"}},{"feature":"Cost","values":{"Prompt Engineering":"Low (prompt tokens only)","RAG (Retrieval-Augmented Generation)":"Medium (retrieval + generation)","Fine-Tuning":"High (training compute + storage)","Vector Database":"Medium (infrastructure cost)"}},{"feature":"Time to Deploy","values":{"Prompt Engineering":"Immediate","RAG (Retrieval-Augmented Generation)":"Days to weeks","Fine-Tuning":"Weeks to months","Vector Database":"Days to weeks"}},{"feature":"Data Requirements","values":{"Prompt Engineering":"None (just good prompts)","RAG (Retrieval-Augmented Generation)":"Knowledge base documents","Fine-Tuning":"Labeled training dataset (hundreds to thousands)","Vector Database":"Documents to embed and index"}},{"feature":"Model Modification","values":{"Prompt Engineering":"None","RAG (Retrieval-Augmented Generation)":"None","Fine-Tuning":"Yes (model weights updated)","Vector Database":"N/A"}},{"feature":"Knowledge Freshness","values":{"Prompt Engineering":"Static (training cutoff)","RAG (Retrieval-Augmented Generation)":"Dynamic (updated knowledge base)","Fine-Tuning":"Static (requires retraining)","Vector Database":"Dynamic (reindex as needed)"}},{"feature":"Hallucination Reduction","values":{"Prompt Engineering":"Minimal","RAG (Retrieval-Augmented Generation)":"Significant (grounded in facts)","Fine-Tuning":"Moderate (domain alignment)","Vector Database":"Significant (when used with RAG)"}},{"feature":"AWS Services","values":{"Prompt Engineering":"Amazon Bedrock, PartyRock","RAG (Retrieval-Augmented Generation)":"Bedrock Knowledge Bases, Kendra","Fine-Tuning":"SageMaker, Bedrock (select models)","Vector Database":"OpenSearch, Aurora pgvector, Kendra"}}],"sources":["aws_exam_comparison_tables[kimicode-v1].json","aws_exam_comparison_tables[kimicode-v2].json"]},{"title":"Guardrails and Safety Mechanisms","title_variants":["Guardrails and Safety Mechanisms"],"description":"Comparison of AWS services and features for AI safety, security, and responsible AI","category":"AI_GENERATIVE_AI_CONCEPTS","columns":["Bedrock Guardrails","SageMaker Clarify","Amazon A2I"],"column_summaries":{"Bedrock Guardrails":"AWS-native safety features that filter harmful content, restrict topics, and control output based on configurable policies for foundation models.","SageMaker Clarify":"A tool for detecting and measuring bias in ML models and data throughout the ML lifecycle, with integration for responsible AI reporting.","Amazon A2I":"Augmented AI service that combines machine learning with human review for high-stakes decisions requiring human judgment."},"rows":[{"feature":"Primary Purpose","values":{"Bedrock Guardrails":"Content filtering and topic restrictions for generative AI outputs","SageMaker Clarify":"Bias detection and fairness metrics for ML models","Amazon A2I":"Human-in-the-loop review for ML predictions"}},{"feature":"Use Phase","values":{"Bedrock Guardrails":"Inference time - filters model outputs","SageMaker Clarify":"Training and post-deployment monitoring","Amazon A2I":"Runtime - routes low-confidence predictions to humans"}},{"feature":"Key Features","values":{"Bedrock Guardrails":"Content filters, denied topics, word filters, sensitive data filtering","SageMaker Clarify":"Bias detection, explainability, model cards, drift detection","Amazon A2I":"Human workflow integration, confidence thresholds, task definitions"}},{"feature":"Output","values":{"Bedrock Guardrails":"Blocked, filtered, or allowed model responses","SageMaker Clarify":"Bias reports, SHAP values, fairness metrics","Amazon A2I":"Human review tasks, aggregated decisions"}},{"feature":"Integration","values":{"Bedrock Guardrails":"Native to Bedrock, API configuration","SageMaker Clarify":"SageMaker pipeline integration, Model Monitor","Amazon A2I":"Lambda, SageMaker, Rekognition, Textract integrations"}},{"feature":"Exam Focus (AIF)","values":{"Bedrock Guardrails":"High - applies to GenAI applications","SageMaker Clarify":"High - Responsible AI domain coverage","Amazon A2I":"Medium - human oversight mechanisms"}}],"mnemonics":["B.S.A - Bedrock blocks bad content, SageMaker spots bias, A2I adds human oversight"],"exam_tips":["Guardrails for Bedrock are configured per-application, not per-model","Content filters in Bedrock can filter based on categories: hate speech, sexual content, violence, harassment","Topic restrictions can block responses about sensitive subjects","SageMaker Clarify should be used early in ML development for bias prevention","A2I is critical for healthcare, finance, and other regulated industries requiring human judgment"],"sources":["aws_exam_comparison_tables[minimax].json"]},{"title":"IAM vs Amazon Cognito vs AWS Organizations + SCP","title_variants":["IAM vs Amazon Cognito vs AWS Organizations + SCP"],"context":"AWS identity services handle authentication and authorization but serve very different audiences. IAM is for AWS resources and internal users. Cognito is for your APPLICATION's end users. Organizations/SCP is for multi-account governance. Mixing these up is one of the most common mistake points on the SAA-C03 exam.","exam":"SAA-C03","domain":"Domain 1: Design Secure Architectures","domain_weight":"30%","table_id":"SAA-001","columns":["AWS IAM","Amazon Cognito","AWS Organizations + SCP"],"column_summaries":{"AWS IAM":"IAM manages access for AWS users, roles, and services — it controls who (employees, apps, AWS services) can perform which actions on which AWS resources. It is the foundational access control layer for everything inside your AWS account.","Amazon Cognito":"Cognito handles authentication and authorization for YOUR application's end users (customers, app users) — it is essentially a user directory as a service. It supports social login (Google, Facebook), SAML federation, and provides JWT tokens your app can use.","AWS Organizations + SCP":"AWS Organizations lets you manage multiple AWS accounts centrally, and Service Control Policies (SCPs) set permission guardrails across ALL accounts in the organization. Even if an IAM policy grants access, an SCP can override and deny it."},"rows":[{"feature":"Who It Manages","values":{"AWS IAM":"AWS users, roles, services (internal — employees and AWS resources)","Amazon Cognito":"Application end users (customers, mobile app users, web app users)","AWS Organizations + SCP":"Multiple AWS accounts under a central management structure"}},{"feature":"Core Concept","values":{"AWS IAM":"Users, Groups, Roles, Policies","Amazon Cognito":"User Pools (authentication) + Identity Pools (AWS access via federation)","AWS Organizations + SCP":"Management account, member accounts, Organizational Units (OUs), SCPs"}},{"feature":"SCP Override IAM?","values":{"AWS IAM":"N/A — IAM permissions can be overridden by SCPs","Amazon Cognito":"N/A","AWS Organizations + SCP":"YES — SCP can DENY even if IAM policy ALLOWS. SCP sets the ceiling."}},{"feature":"Federation Support","values":{"AWS IAM":"SAML 2.0 (corporate SSO, Active Directory federation)","Amazon Cognito":"Social (Google, Facebook, Apple), SAML, OIDC","AWS Organizations + SCP":"N/A — account management, not identity"}},{"feature":"Exam Trigger Keywords","values":{"AWS IAM":"Employees, roles, least privilege, cross-account roles, resource policies","Amazon Cognito":"Mobile app users, web app users, social login, sign-up/sign-in, User Pool","AWS Organizations + SCP":"Multi-account, prevent all accounts from using a service, restrict region usage"}},{"feature":"MFA Support","values":{"AWS IAM":"Yes — for AWS console and API access","Amazon Cognito":"Yes — for application user login","AWS Organizations + SCP":"Applies at account level via IAM"}}],"sources":["aws_exam_comparison_tables[sonnet46].json"]},{"title":"Identity Federation Services Comparison","title_variants":["Identity Federation Services Comparison"],"context":"AWS offers multiple identity federation solutions to enable users to access AWS resources using their existing corporate credentials or social identities. IAM Identity Center (formerly SSO) provides centralized workforce access to multiple AWS accounts and cloud applications, Cognito offers authentication for web and mobile applications with User Pools (authentication) and Identity Pools (authorization), while SAML and OIDC are industry-standard protocols for federation. Understanding the differences between these services, their authentication flows, and appropriate use cases is critical for the exam. The choice depends on whether you're building customer-facing applications (Cognito) or managing workforce access (Identity Center), and which identity provider you're integrating with.","columns":["IAM Identity Center (SSO)","Cognito User Pools","Cognito Identity Pools","SAML 2.0","OIDC (OpenID Connect)"],"rows":[{"feature":"Primary Purpose","values":{"IAM Identity Center (SSO)":"Centralized workforce access to AWS accounts and cloud applications","Cognito User Pools":"User directory and authentication for web/mobile applications","Cognito Identity Pools":"Provide temporary AWS credentials to authenticated users","SAML 2.0":"Enterprise identity federation protocol for SSO","OIDC (OpenID Connect)":"Modern authentication protocol built on OAuth 2.0"}},{"feature":"Target Users","values":{"IAM Identity Center (SSO)":"Enterprise workforce employees","Cognito User Pools":"Application end-users (customers, partners)","Cognito Identity Pools":"Application end-users needing AWS resource access","SAML 2.0":"Enterprise users accessing AWS via corporate IdP","OIDC (OpenID Connect)":"Users accessing AWS via social IdPs or modern authentication"}},{"feature":"Identity Provider Support","values":{"IAM Identity Center (SSO)":"Built-in directory, Active Directory, external IdP (SAML 2.0)","Cognito User Pools":"Built-in directory, SAML, OIDC, social IdPs (Google, Facebook, Amazon)","Cognito Identity Pools":"Cognito User Pools, SAML, OIDC, social IdPs, anonymous identities","SAML 2.0":"Active Directory Federation Services, Okta, Azure AD, Ping, OneLogin","OIDC (OpenID Connect)":"Google, Amazon, Auth0, Okta, any OIDC-compliant IdP"}},{"feature":"Authentication Flow","values":{"IAM Identity Center (SSO)":"SP-initiated or IdP-initiated SSO with SAML 2.0","Cognito User Pools":"OAuth 2.0 flows (Authorization Code, Implicit, Client Credentials)","Cognito Identity Pools":"Exchange identity token for temporary AWS credentials via STS","SAML 2.0":"XML-based assertions exchanged between IdP and SP","OIDC (OpenID Connect)":"JWT tokens via OAuth 2.0 flows"}},{"feature":"AWS Access Method","values":{"IAM Identity Center (SSO)":"Temporary credentials via identity-aware sessions; AWS access portal","Cognito User Pools":"Provides JWT tokens; does NOT provide AWS credentials directly","Cognito Identity Pools":"Temporary AWS credentials via STS (IAM roles)","SAML 2.0":"Temporary credentials via STS AssumeRoleWithSAML API","OIDC (OpenID Connect)":"Temporary credentials via STS AssumeRoleWithWebIdentity API"}},{"feature":"User Management","values":{"IAM Identity Center (SSO)":"SCIM provisioning from external IdP; manual user creation","Cognito User Pools":"Self-registration, admin-created users, Lambda triggers for customization","Cognito Identity Pools":"No user management - only credential vending","SAML 2.0":"Managed by external IdP; no user storage in AWS","OIDC (OpenID Connect)":"Managed by external IdP; no user storage in AWS"}},{"feature":"Security Features","values":{"IAM Identity Center (SSO)":"MFA, conditional access, session management, access reviews","Cognito User Pools":"MFA, password policies, account recovery, device tracking, advanced security","Cognito Identity Pools":"IAM policy-based access control, unauthenticated role support","SAML 2.0":"Digital signatures, encryption, IdP-initiated SSO protection","OIDC (OpenID Connect)":"PKCE for mobile apps, state parameter, nonce for replay protection"}},{"feature":"Pricing Model","values":{"IAM Identity Center (SSO)":"Free - included with AWS Organizations","Cognito User Pools":"First 50,000 MAUs free; $0.0055 per MAU thereafter","Cognito Identity Pools":"Free - included with Cognito service","SAML 2.0":"Free - protocol implementation in IAM","OIDC (OpenID Connect)":"Free - protocol implementation in IAM"}},{"feature":"Best Use Cases","values":{"IAM Identity Center (SSO)":"Multi-account AWS access, workforce SSO, cloud application access","Cognito User Pools":"Customer-facing app authentication, mobile app sign-up/sign-in","Cognito Identity Pools":"Granting app users direct AWS resource access (S3, DynamoDB)","SAML 2.0":"Enterprise SSO with existing corporate identity infrastructure","OIDC (OpenID Connect)":"Modern app authentication, mobile apps, social login integration"}}],"sources":["aws_exam_comparison_tables[kimi-agsw].json"]},{"title":"Identity and Access Services","title_variants":["Identity and Access Services"],"category":"Security / Identity","exam":"SAA-C03","domain":"Design Secure Architectures","table_id":"saa_d1_identity_access","columns":["IAM","IAM Identity Center","STS","Amazon Cognito"],"column_summaries":{"IAM":"IAM is the foundational AWS permissions system for users, groups, roles, and policies inside AWS accounts. On the exam, think of it as the core authorization layer for AWS resources.","IAM Identity Center":"IAM Identity Center is for workforce access and centralized SSO across multiple AWS accounts and business apps. It shines when you need human user sign-in at scale without juggling long-lived IAM users everywhere.","STS":"AWS STS issues temporary credentials, which is the exam clue for role assumption, cross-account access, and short-lived sessions. It is the engine underneath many secure delegation patterns.","Amazon Cognito":"Amazon Cognito is mainly about customer and app user identity, not workforce admin access. On scenario questions, it usually appears when an application needs sign-up, sign-in, or token-based identity for end users."},"rows":[{"feature":"Primary purpose","values":{"IAM":"Define permissions for AWS resources","IAM Identity Center":"Centralize workforce sign-in and account access","STS":"Issue temporary credentials for assumed roles","Amazon Cognito":"Authenticate and manage application end users"}},{"feature":"Typical user","values":{"IAM":"Admins, services, workloads","IAM Identity Center":"Employees and internal users","STS":"Workloads or users needing delegated temporary access","Amazon Cognito":"Customers, mobile users, web app users"}},{"feature":"Best exam clue","values":{"IAM":"Least privilege, policies, users, roles","IAM Identity Center":"Multi-account SSO, workforce federation","STS":"AssumeRole, cross-account, temporary creds","Amazon Cognito":"User pools, identity pools, app authentication"}},{"feature":"Credential model","values":{"IAM":"Long-lived users or roles","IAM Identity Center":"Federated workforce sessions","STS":"Short-lived temporary credentials","Amazon Cognito":"App-facing identity tokens and federation"}},{"feature":"Multi-account fit","values":{"IAM":"Possible but harder to manage at scale","IAM Identity Center":"Excellent","STS":"Excellent when paired with roles","Amazon Cognito":"Not the main tool for AWS account administration"}},{"feature":"Common mistake to avoid","values":{"IAM":"Using many IAM users when federation is cleaner","IAM Identity Center":"Using it as a customer login product","STS":"Treating it as a full identity store","Amazon Cognito":"Using it for admin SSO across AWS accounts"}}],"why_this_table_matters":"SAA Domain 1 emphasizes designing secure access across accounts, using federated identity, roles, and least privilege. This table helps separate who authenticates users, who grants permissions, and who issues temporary credentials.","sources":["aws_exam_comparison_tables[gpt5].json"]},{"title":"In-Memory and Cache Comparison","title_variants":["In-Memory and Cache Comparison"],"context":"AWS offers multiple in-memory data store solutions for caching and real-time data processing. ElastiCache provides managed Redis and Memcached for caching use cases, while MemoryDB for Redis offers a durable, Redis-compatible database for primary data storage. Understanding their persistence models, data structures, and use cases is critical for exam success.","columns":["ElastiCache Redis","ElastiCache Memcached","MemoryDB for Redis"],"rows":[{"feature":"Service Type","values":{"ElastiCache Redis":"Managed in-memory cache/data store","ElastiCache Memcached":"Managed in-memory cache only","MemoryDB for Redis":"Managed in-memory database (durable)"}},{"feature":"Data Persistence","values":{"ElastiCache Redis":"Optional (RDB snapshots, AOF)","ElastiCache Memcached":"None (pure cache)","MemoryDB for Redis":"Yes (durability is primary feature)"}},{"feature":"Multi-AZ Support","values":{"ElastiCache Redis":"Yes (cluster mode disabled)","ElastiCache Memcached":"No","MemoryDB for Redis":"Yes (with automatic failover)"}},{"feature":"Data Structures","values":{"ElastiCache Redis":"Strings, Lists, Sets, Hashes, Sorted Sets, Streams, Geospatial","ElastiCache Memcached":"Simple key-value only","MemoryDB for Redis":"Same as Redis (full Redis compatibility)"}},{"feature":"Replication","values":{"ElastiCache Redis":"Async replication to read replicas","ElastiCache Memcached":"None (client-side sharding)","MemoryDB for Redis":"Multi-AZ with sync replication to replicas"}},{"feature":"Clustering","values":{"ElastiCache Redis":"Yes (cluster mode enabled)","ElastiCache Memcached":"Auto-discovery supported","MemoryDB for Redis":"Yes (sharding built-in)"}},{"feature":"Failover","values":{"ElastiCache Redis":"Automatic (cluster mode disabled)","ElastiCache Memcached":"Manual rebuild required","MemoryDB for Redis":"Automatic with Multi-AZ"}},{"feature":"Use as Primary Database","values":{"ElastiCache Redis":"Not recommended (cache use case)","ElastiCache Memcached":"Never (cache only)","MemoryDB for Redis":"Yes (designed for primary data)"}},{"feature":"Maximum Data Size","values":{"ElastiCache Redis":"Up to 500 GB per node (cluster mode)","ElastiCache Memcached":"Up to 128 GB per node","MemoryDB for Redis":"Up to 500 GB per cluster"}},{"feature":"Backup & Restore","values":{"ElastiCache Redis":"Manual/automated snapshots","ElastiCache Memcached":"None (data rebuilt from source)","MemoryDB for Redis":"Point-in-time recovery (up to 35 days)"}},{"feature":"Best Use Cases","values":{"ElastiCache Redis":"Caching, session store, real-time analytics, leaderboards, geospatial","ElastiCache Memcached":"Simple caching, object caching, database query result caching","MemoryDB for Redis":"Primary database for microservices, gaming leaderboards, session stores requiring durability"}}],"sources":["aws_exam_comparison_tables[kimi-agsw].json"]},{"title":"Interpretability vs Explainability in AI Comparison","title_variants":["Interpretability vs Explainability in AI Comparison"],"context":"This table compares two key concepts in responsible AI. Interpretability refers to the ability to understand how a model makes decisions inherently, while explainability involves techniques to explain model decisions post-hoc, especially for complex models.","table_id":"interpretability_explainability_comparison","relevant_exams":["AIF-C01"],"relevant_domains":{"AIF-C01":["Domain 4: Guidelines for Responsible AI"]},"columns":["Interpretability","Explainability"],"column_summaries":{"Interpretability":"The degree to which a human can understand the cause of a decision made by an AI model, focusing on transparent, inherently understandable model structures.","Explainability":"Techniques and methods used to explain or interpret the decisions of complex AI models after they have made predictions, often using external tools."},"rows":[{"feature":"Definition","values":{"Interpretability":"Inherent understandability of the model itself","Explainability":"Post-hoc explanations of model decisions"}},{"feature":"Approach","values":{"Interpretability":"Model is transparent by design","Explainability":"External methods explain black-box models"}},{"feature":"Model Types","values":{"Interpretability":"Decision trees, linear regression, rule-based systems","Explainability":"Deep learning, ensemble methods, complex models"}},{"feature":"When to Use","values":{"Interpretability":"Regulated industries, high-stakes decisions, auditing","Explainability":"Complex models where performance trumps simplicity"}},{"feature":"AWS Tools","values":{"Interpretability":"SageMaker Clarify (model insights)","Explainability":"SageMaker Clarify (SHAP, LIME), SHAP library"}},{"feature":"Techniques","values":{"Interpretability":"Feature importance, decision paths, rule extraction","Explainability":"SHAP, LIME, attention visualization, counterfactuals"}},{"feature":"Trade-off","values":{"Interpretability":"May sacrifice some predictive performance","Explainability":"Adds overhead to complex, high-performing models"}},{"feature":"Examples","values":{"Interpretability":"Loan approval rules, medical diagnosis trees","Explainability":"Explaining neural network image classifications"}}],"sources":["aws_exam_comparison_tables[kimicode-v2].json"]},{"title":"KMS vs CloudHSM vs Secrets Manager vs Parameter Store","title_variants":["KMS vs CloudHSM vs Secrets Manager vs Parameter Store"],"context":"AWS provides multiple services for managing encryption keys and sensitive configuration values. The exam will describe what you need to protect (keys, passwords, config) and the compliance requirements, then ask you to choose the right service. The key differentiators are: ownership of the key hardware (KMS vs CloudHSM) and storing secrets vs config values (Secrets Manager vs Parameter Store).","exam":"SAA-C03","domain":"Domain 1: Design Secure Architectures","domain_weight":"30%","table_id":"SAA-003","columns":["AWS KMS","AWS CloudHSM","AWS Secrets Manager","SSM Parameter Store"],"column_summaries":{"AWS KMS":"KMS (Key Management Service) is AWS's managed key management service — AWS manages the hardware but you control and own the keys. It integrates natively with almost every AWS service for encryption and is the standard choice for encrypting data in S3, EBS, RDS, and more.","AWS CloudHSM":"CloudHSM (Hardware Security Module) gives you a dedicated hardware device in the cloud where YOU fully own and control the keys — AWS cannot access them. It is required when regulations (FIPS 140-2 Level 3) mandate that no third party can ever access your keys.","AWS Secrets Manager":"Secrets Manager is purpose-built for storing, rotating, and retrieving SECRETS (database passwords, API keys, OAuth tokens). It automatically rotates credentials on a schedule, which is critical for security compliance.","SSM Parameter Store":"Parameter Store (part of AWS Systems Manager) stores configuration data and secrets as key-value pairs. It is simpler and free for standard parameters — often used for application configuration like environment variables, endpoint URLs, and non-sensitive settings."},"rows":[{"feature":"Primary Use","values":{"AWS KMS":"Create and manage encryption keys for AWS services","AWS CloudHSM":"Dedicated hardware for highest-compliance key storage","AWS Secrets Manager":"Store and automatically rotate secrets (passwords, API keys)","SSM Parameter Store":"Store configuration values and basic secrets"}},{"feature":"Key Ownership","values":{"AWS KMS":"AWS manages hardware; YOU own/control keys","AWS CloudHSM":"YOU own the hardware AND keys — AWS has NO access","AWS Secrets Manager":"N/A — stores secrets, uses KMS for encryption","SSM Parameter Store":"N/A — stores values, uses KMS for SecureString encryption"}},{"feature":"Automatic Rotation","values":{"AWS KMS":"Yes — annual key rotation (configurable)","AWS CloudHSM":"Manual — you manage the hardware","AWS Secrets Manager":"YES — built-in automatic rotation with Lambda","SSM Parameter Store":"No — manual rotation required"}},{"feature":"Cost","values":{"AWS KMS":"Per key + per API call","AWS CloudHSM":"High — dedicated hardware instance (~$1.60/hour)","AWS Secrets Manager":"Per secret per month + API calls","SSM Parameter Store":"Free for standard; $0.05/advanced parameter/month"}},{"feature":"Compliance Level","values":{"AWS KMS":"FIPS 140-2 Level 2","AWS CloudHSM":"FIPS 140-2 Level 3 (highest)","AWS Secrets Manager":"Uses KMS — inherits FIPS 140-2 Level 2","SSM Parameter Store":"Uses KMS for encrypted params"}},{"feature":"Exam Trigger Keywords","values":{"AWS KMS":"'Encrypt data at rest,' 'managed key,' 'S3 encryption,' 'EBS encryption'","AWS CloudHSM":"'FIPS Level 3,' 'dedicated hardware,' 'single-tenant HSM,' 'bring your own key (BYOK)'","AWS Secrets Manager":"'Rotate database password,' 'automatic rotation,' 'store API keys,' 'RDS password rotation'","SSM Parameter Store":"'Store config values,' 'free secret storage,' 'environment variables,' 'non-rotating secrets'"}}],"sources":["aws_exam_comparison_tables[sonnet46].json"]},{"title":"Keys, Secrets, and Certificates","title_variants":["Keys, Secrets, and Certificates"],"category":"Security / Encryption","exam":"SAA-C03","domain":"Design Secure Architectures","table_id":"saa_d1_keys_secrets_certs","columns":["AWS KMS","AWS Secrets Manager","AWS Certificate Manager"],"column_summaries":{"AWS KMS":"AWS KMS is the managed key service used to control encryption keys for data at rest across AWS services. In exam language, it is the default answer when the requirement says customer-managed encryption keys or key access policies.","AWS Secrets Manager":"Secrets Manager stores and rotates secrets such as database passwords, API keys, and credentials. It is not just storage; the key exam clue is secret lifecycle and rotation.","AWS Certificate Manager":"ACM provisions and manages TLS certificates for encryption in transit on supported AWS services. If the requirement is HTTPS, TLS, or certificate renewal, ACM is the favorite."},"rows":[{"feature":"Main job","values":{"AWS KMS":"Manage encryption keys","AWS Secrets Manager":"Store and rotate secrets","AWS Certificate Manager":"Provision and manage TLS certificates"}},{"feature":"Protects","values":{"AWS KMS":"Data at rest","AWS Secrets Manager":"Credentials and secrets","AWS Certificate Manager":"Data in transit"}},{"feature":"Typical exam clue","values":{"AWS KMS":"Envelope encryption, CMKs, key policies","AWS Secrets Manager":"Automatic credential rotation","AWS Certificate Manager":"HTTPS listeners, certificate renewal"}},{"feature":"Used by other services","values":{"AWS KMS":"Very often","AWS Secrets Manager":"Frequently","AWS Certificate Manager":"For supported endpoints and load balancers"}},{"feature":"Human-readable secret content","values":{"AWS KMS":"No, not its primary role","AWS Secrets Manager":"Yes","AWS Certificate Manager":"No, certificate lifecycle not app secrets"}},{"feature":"Common mistake to avoid","values":{"AWS KMS":"Using it as a secret vault","AWS Secrets Manager":"Thinking it replaces TLS certificates","AWS Certificate Manager":"Thinking it manages database passwords"}}],"why_this_table_matters":"SAA Domain 1 includes encryption at rest, encryption in transit, and secure secret handling. This is a classic exam tripwire because KMS, Secrets Manager, and ACM solve different problems.","sources":["aws_exam_comparison_tables[gpt5].json"]},{"title":"Learning Paradigms Comparison","title_variants":["Learning Paradigms Comparison"],"category":"AI / ML Fundamentals","exam":"AIF-C01","domain":"Fundamentals of AI and ML","table_id":"aif_d1_learning_paradigms","columns":["Supervised Learning","Unsupervised Learning","Reinforcement Learning"],"column_summaries":{"Supervised Learning":"Supervised learning uses labeled data, so the model learns from examples with known answers. Exam clues include classification, regression, and prediction based on historical labeled outcomes.","Unsupervised Learning":"Unsupervised learning works without labels and looks for hidden structure or grouping in data. Clustering and pattern discovery are the classic exam signals.","Reinforcement Learning":"Reinforcement learning improves through reward feedback from actions taken in an environment. It appears when the system learns strategies over time rather than from a static labeled dataset."},"rows":[{"feature":"Training signal","values":{"Supervised Learning":"Labeled examples","Unsupervised Learning":"No labels","Reinforcement Learning":"Rewards / penalties"}},{"feature":"Best exam clue","values":{"Supervised Learning":"Predict a known target","Unsupervised Learning":"Find groups or hidden patterns","Reinforcement Learning":"Learn actions by trial and reward"}},{"feature":"Typical tasks","values":{"Supervised Learning":"Classification, regression","Unsupervised Learning":"Clustering, segmentation","Reinforcement Learning":"Sequential decision making"}},{"feature":"Needs known answers?","values":{"Supervised Learning":"Yes","Unsupervised Learning":"No","Reinforcement Learning":"No fixed labels; needs reward framework"}},{"feature":"Business-style example","values":{"Supervised Learning":"Fraud classification or demand prediction","Unsupervised Learning":"Customer grouping or anomaly pattern discovery","Reinforcement Learning":"Adaptive strategy optimization"}},{"feature":"Common trap","values":{"Supervised Learning":"Confusing it with clustering","Unsupervised Learning":"Expecting direct labeled prediction","Reinforcement Learning":"Using the term for any model that improves over time"}}],"why_this_table_matters":"AIF Domain 1 explicitly tests supervised, unsupervised, and reinforcement learning. This table gives you the clean mental model behind the jargon so you can map use cases quickly.","sources":["aws_exam_comparison_tables[gpt5].json"]},{"title":"ML Algorithm Categories for AIF-C01","title_variants":["ML Algorithm Categories for AIF-C01"],"description":"Comparison of machine learning algorithm types and their AWS implementations","category":"ML_ALGORITHMS","columns":["Supervised Learning","Unsupervised Learning","Reinforcement Learning"],"column_summaries":{"Supervised Learning":"ML approach where models learn from labeled training data to predict outcomes, with both input features and desired outputs provided during training.","Unsupervised Learning":"ML approach where models identify patterns in data without labeled responses, discovering hidden structures and groupings in datasets.","Reinforcement Learning":"ML approach where agents learn optimal actions through trial and error, receiving rewards or penalties based on decisions in an environment."},"rows":[{"feature":"Training Data","values":{"Supervised Learning":"Labeled data (features + correct answers)","Unsupervised Learning":"Unlabeled data (features only)","Reinforcement Learning":"Environment with reward signals (no explicit labels)"}},{"feature":"Output Type","values":{"Supervised Learning":"Predictions (classification labels or continuous values)","Unsupervised Learning":"Discovered patterns (clusters, associations, dimensions)","Reinforcement Learning":"Actions (sequence of decisions maximizing rewards)"}},{"feature":"Example Algorithms","values":{"Supervised Learning":"Linear regression, decision trees, neural networks, SVM","Unsupervised Learning":"K-means clustering, hierarchical clustering, PCA, association rules","Reinforcement Learning":"Q-learning, deep Q-networks (DQN), policy gradients"}},{"feature":"AWS Services","values":{"Supervised Learning":"SageMaker built-in algorithms, Comprehend, Rekognition, custom training","Unsupervised Learning":"SageMaker (K-means, PCA), Personalize clustering","Reinforcement Learning":"SageMaker RL (supports TensorFlow, PyTorch, MXNet)"}},{"feature":"Use Cases","values":{"Supervised Learning":"Spam detection, image classification, demand forecasting, fraud detection","Unsupervised Learning":"Customer segmentation, anomaly detection, recommendation systems","Reinforcement Learning":"Game AI, robotics, autonomous vehicles, resource optimization"}},{"feature":"Common AWS Example","values":{"Supervised Learning":"Comprehend uses supervised learning for sentiment analysis","Unsupervised Learning":"Personalize uses clustering for user segmentation","Reinforcement Learning":"AWS DeepRacer uses RL for autonomous racing"}}],"mnemonics":["S.U.R - Supervised has Solutions (labeled), Unsupervised discovers, Reinforcement rewards"],"exam_tips":["For AIF-C01: Regression predicts continuous values; Classification predicts categories","Clustering groups similar data points without predefined labels","RAG is not an ML algorithm - it's a prompting technique using retrieval","Supervised ML requires labeled data; unlabeled data uses unsupervised methods","Reinforcement learning from Human Feedback (RLHF) is used to align LLMs with human preferences"],"sources":["aws_exam_comparison_tables[minimax].json"]},{"title":"ML Lifecycle and MLOps Support Tools","title_variants":["ML Lifecycle and MLOps Support Tools","ML Lifecycle and MLOps Tools on AWS"],"description":"Comparison of SageMaker features across the ML lifecycle","category":"Machine Learning / Lifecycle","exam":"AIF-C01","domain":"Fundamentals of AI and ML","table_id":"aif_d1_ml_lifecycle_tools","columns":["Amazon SageMaker","SageMaker Data Wrangler","SageMaker Feature Store","SageMaker Model Monitor","Amazon Augmented AI (A2I)","SageMaker Pipelines"],"column_summaries":{"Amazon SageMaker":"SageMaker is the core managed ML platform for building, training, and deploying ML solutions. On the exam, treat it as the umbrella service for ML workflows on AWS.","SageMaker Data Wrangler":"Data Wrangler focuses on data preparation and transformation for ML workflows. It is the exam clue when the pain point is data shaping rather than model deployment.","SageMaker Feature Store":"Feature Store centralizes and manages reusable ML features. It helps with consistency between training and inference data features.","SageMaker Model Monitor":"Model Monitor watches deployed model behavior and data quality over time. It is the right answer when performance drift or production monitoring is the issue.","Amazon Augmented AI (A2I)":"A2I adds human review into AI/ML workflows. It is useful when confidence thresholds or responsible review loops matter.","SageMaker Pipelines":"A CI/CD service for ML that automates the full ML workflow from data preparation to model deployment with reproducible pipelines."},"rows":[{"feature":"Lifecycle role","values":{"Amazon SageMaker":"Core ML platform","SageMaker Data Wrangler":"Data prep","SageMaker Feature Store":"Feature management","SageMaker Model Monitor":"Production monitoring","Amazon Augmented AI (A2I)":"Human review"}},{"feature":"Best exam clue","values":{"Amazon SageMaker":"Build/train/deploy ML","SageMaker Data Wrangler":"Prepare and transform data","SageMaker Feature Store":"Reuse and govern features","SageMaker Model Monitor":"Detect drift or monitor predictions","Amazon Augmented AI (A2I)":"Human in the loop"}},{"feature":"When it shines","values":{"Amazon SageMaker":"End-to-end ML workflows","SageMaker Data Wrangler":"Early pipeline preparation","SageMaker Feature Store":"
