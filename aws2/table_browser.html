Consistent features across teams","SageMaker Model Monitor":"Production oversight","Amazon Augmented AI (A2I)":"Escalation for uncertain outputs"}},{"feature":"Not primarily for","values":{"Amazon SageMaker":"Manual human review routing","SageMaker Data Wrangler":"Live model serving","SageMaker Feature Store":"End-user dashboards","SageMaker Model Monitor":"Training data transformation","Amazon Augmented AI (A2I)":"Standalone model training"}},{"feature":"Common trap","values":{"Amazon SageMaker":"Forgetting it is the umbrella platform","SageMaker Data Wrangler":"Confusing it with monitoring","SageMaker Feature Store":"Treating it as a raw data lake","SageMaker Model Monitor":"Using it when the issue is feature reuse","Amazon Augmented AI (A2I)":"Thinking it replaces model evaluation altogether"}},{"feature":"ML Phase","values":{"SageMaker Studio":"All phases - development environment","SageMaker Pipelines":"Automation - connects all phases","SageMaker Model Monitor":"Production - post-deployment monitoring"}},{"feature":"Key Function","values":{"SageMaker Studio":"Notebook development, experiment tracking, debugging","SageMaker Pipelines":"Workflow orchestration, repeatable training/deployment","SageMaker Model Monitor":"Data quality monitoring, feature attribution drift"}},{"feature":"Integration","values":{"SageMaker Studio":"Central hub for all SageMaker features","SageMaker Pipelines":"Uses SageMaker Processing, Training, Evaluation steps","SageMaker Model Monitor":"Integrates with Clarify for bias detection"}},{"feature":"Versioning","values":{"SageMaker Studio":"Experiment tracking with git integration","SageMaker Pipelines":"Pipeline versions for reproducibility","SageMaker Model Monitor":"Monitoring schedules and baseline comparisons"}},{"feature":"Automation","values":{"SageMaker Studio":"Manual development environment","SageMaker Pipelines":"Fully automated ML workflows","SageMaker Model Monitor":"Automated monitoring with scheduled jobs"}},{"feature":"DevOps Equivalent","values":{"SageMaker Studio":"IDE (like VS Code for ML)","SageMaker Pipelines":"CI/CD pipeline (like Jenkins, GitLab CI)","SageMaker Model Monitor":"Production monitoring (like Datadog)"}}],"mnemonics":["S.P.M - Studio develops, Pipelines automate, Model Monitor watches production"],"exam_tips":["For AIF-C01, understand MLOps as part of the ML lifecycle: experiment, train, deploy, monitor","SageMaker Pipelines provides repeatable ML workflows with model lineage tracking","Model Monitor detects data drift and automatically alerts when model quality degrades","Feature Store (SageMaker Feature Store) centralizes feature management for reuse across teams","MLOps on AWS combines CI/CD principles with ML-specific requirements like data validation"],"why_this_table_matters":"AIF Domain 1 includes the ML lifecycle and MLOps concepts. This table separates the core platform from the adjacent data prep, feature storage, monitoring, and human review helpers.","sources":["aws_exam_comparison_tables[gpt5].json","aws_exam_comparison_tables[minimax].json"]},{"title":"MLOps & Model Management Services Comparison","title_variants":["MLOps & Model Management Services Comparison"],"description":"Comparing AWS services for machine learning operations and model lifecycle management","category":"AI & Machine Learning Services","exam":"AIF-C01","columns":["SageMaker Model Monitor","SageMaker Clarify","SageMaker Model Cards","SageMaker Feature Store"],"column_summaries":{"SageMaker Model Monitor":"A capability that continuously monitors model quality over time, detecting data drift and model degradation to maintain prediction accuracy.","SageMaker Clarify":"A service that helps detect potential bias during data preparation and after model training, supporting responsible AI practices.","SageMaker Model Cards":"A feature that creates standardized documentation for ML models, capturing purpose, performance metrics, and relevant warnings for stakeholders.","SageMaker Feature Store":"A centralized repository for storing and serving machine learning features, enabling feature reuse and consistency across training and inference."},"rows":[{"feature":"Purpose","values":{"SageMaker Model Monitor":"Monitor deployed model quality","SageMaker Clarify":"Detect bias in data and models","SageMaker Model Cards":"Document models for stakeholders","SageMaker Feature Store":"Store and share ML features"}},{"feature":"When to Use","values":{"SageMaker Model Monitor":"After model deployment","SageMaker Clarify":"During development and after training","SageMaker Model Cards":"Throughout model lifecycle","SageMaker Feature Store":"During feature engineering"}},{"feature":"Key Metrics","values":{"SageMaker Model Monitor":"Data quality, feature attribution drift","SageMaker Clarify":"Bias metrics across demographics","SageMaker Model Cards":"Model info, performance, warnings","SageMaker Feature Store":"Feature values, serving latency"}},{"feature":"Integration","values":{"SageMaker Model Monitor":"With deployed SageMaker endpoints","SageMaker Clarify":"With SageMaker Data Wrangler","SageMaker Model Cards":"Part of SageMaker ecosystem","SageMaker Feature Store":"Training and inference pipelines"}}],"mnemonics":["MCMF = Monitor quality, Clarify bias, Model cards for docs, Features for reuse"],"exam_tips":["Model Monitor detects when model predictions degrade over time","Clarify is key for responsible AI - detects bias before deployment","Model Cards provide standardized documentation for compliance","Feature Store prevents feature inconsistency between training and inference","These services support Domain 4 (Responsible AI) and Domain 5 (Security/Governance)"],"sources":["aws_exam_comparison_tables[minimax-dr].json"]},{"title":"MLOps Pipeline Stages","title_variants":["MLOps Pipeline Stages"],"context":"Comparing MLOps pipeline stages and AWS services - Domain 1 (Fundamentals of AI and ML)","table_id":"AIF-007","columns":["Stage","Data Collection","Feature Engineering","Model Training","Model Deployment","Monitoring"],"column_summaries":{"Data Collection":"The foundational stage of the MLOps pipeline where raw data is gathered from various sources, labeled if needed, and stored in a data lake (S3) for subsequent processing. Key considerations include data quality, completeness, and governance.","Feature Engineering":"The process of transforming raw data into meaningful features that improve model performance. SageMaker Feature Store enables feature reuse across models and teams, while Data Wrangler provides visual tools for feature transformation.","Model Training":"The core ML development stage where algorithms learn patterns from prepared features. SageMaker provides managed training jobs with automatic scaling, distributed training, and hyperparameter optimization capabilities.","Model Deployment":"Making trained models available for inference through endpoints or batch processing. Options include real-time endpoints, serverless inference, and batch transform jobs, with traffic management for safe rollouts.","Monitoring":"Continuous observation of deployed model performance to detect data drift, concept drift, and accuracy degradation. CloudWatch and Model Monitor provide alerts when performance falls below thresholds, triggering potential retraining."},"rows":[{"feature":"Purpose","values":{"Stage":"Gather and store raw data","Data Collection":"Transform raw data into features","Feature Engineering":"Train ML model on features","Model Training":"Make model available for inference","Model Deployment":"Track model performance"}},{"feature":"Key Activities","values":{"Stage":"Data ingestion, labeling, storage","Data Collection":"Feature extraction, transformation, selection","Feature Engineering":"Algorithm selection, hyperparameter tuning","Model Training":"Endpoint creation, scaling, versioning","Model Deployment":"Drift detection, alerting, retraining"}},{"feature":"AWS Service","values":{"Stage":"S3, Kinesis, Glue","Data Collection":"SageMaker Data Wrangler, Feature Store","Feature Engineering":"SageMaker Training Jobs","Model Training":"SageMaker Endpoints, Bedrock","Model Deployment":"SageMaker Model Monitor"}},{"feature":"Data Flow","values":{"Stage":"Raw data → S3/Data Lakes","Data Collection":"Features → Feature Store","Feature Engineering":"Model artifacts → S3","Model Training":"Model → Endpoint","Model Deployment":"Metrics → CloudWatch"}},{"feature":"Automation Level","values":{"Stage":"Manual to automated pipelines","Data Collection":"Automated feature pipelines","Feature Engineering":"Automated training pipelines","Model Training":"CI/CD deployment","Model Deployment":"Continuous monitoring"}},{"feature":"Key Metrics","values":{"Stage":"Data quality, completeness","Data Collection":"Feature importance, correlation","Feature Engineering":"Loss, accuracy, F1 score","Model Training":"Latency, throughput, errors","Model Deployment":"Drift, accuracy degradation"}},{"feature":"Cost Driver","values":{"Stage":"Storage, data transfer","Data Collection":"Compute for transformation","Feature Engineering":"GPU/instance hours","Model Training":"Endpoint instance costs","Model Deployment":"Compute for monitoring"}}],"mnemonics":["C-F-T-D-M: Collect, Feature-engineer, Train, Deploy, Monitor","MLOps is cyclic: Collect data → Engineer features → Train model → Deploy → Monitor → Retrain (back to start when drift detected)"],"exam_tips":["Feature Store separates feature engineering from training for reusability","SageMaker Data Wrangler provides no-code feature engineering","Model Monitor detects drift and triggers retraining alerts","Multi-model endpoints reduce costs for models with low traffic","Canary deployments gradually shift traffic to new model versions","MLOps aims to make ML development repeatable and scalable"],"sources":["aws_exam_comparison_tables[glm5-agent].json"]},{"title":"Machine Learning Techniques Comparison","title_variants":["Machine Learning Techniques Comparison"],"context":"Comparing primary ML techniques for different problem types - critical for Domain 1 (Fundamentals of AI and ML)","table_id":"AIF-001","columns":["Regression","Classification","Clustering"],"column_summaries":{"Regression":"A supervised learning technique used to predict continuous numerical outcomes based on input features. It establishes relationships between dependent and independent variables to forecast future values like sales, prices, or quantities.","Classification":"A supervised learning method that categorizes data into predefined classes or labels. It learns from labeled training data to predict the category of new, unseen observations, commonly used for binary decisions (spam/not spam) or multi-class problems.","Clustering":"An unsupervised learning technique that groups similar data points together without predefined labels. It discovers inherent patterns or structures in data, useful for customer segmentation, anomaly detection, and exploratory data analysis."},"rows":[{"feature":"Learning Type","values":{"Regression":"Supervised","Classification":"Supervised","Clustering":"Unsupervised"}},{"feature":"Output Type","values":{"Regression":"Continuous numerical values","Classification":"Discrete categories/labels","Clustering":"No predefined labels (groups)"}},{"feature":"Use Case Examples","values":{"Regression":"Price prediction, sales forecasting, temperature prediction","Classification":"Spam detection, image recognition, fraud detection","Clustering":"Customer segmentation, anomaly detection, document grouping"}},{"feature":"Common Algorithms","values":{"Regression":"Linear Regression, Decision Trees, Random Forest, XGBoost","Classification":"Logistic Regression, SVM, Random Forest, Neural Networks","Clustering":"K-Means, DBSCAN, Hierarchical Clustering"}},{"feature":"Training Data Required","values":{"Regression":"Labeled continuous values","Classification":"Labeled categories","Clustering":"No labels needed"}},{"feature":"Evaluation Metrics","values":{"Regression":"MSE, RMSE, MAE, R² Score","Classification":"Accuracy, Precision, Recall, F1-Score, AUC-ROC","Clustering":"Silhouette Score, Davies-Bouldin Index, Inertia"}},{"feature":"AWS Services","values":{"Regression":"Amazon SageMaker, Amazon Forecast","Classification":"Amazon SageMaker, Amazon Rekognition, Amazon Comprehend","Clustering":"Amazon SageMaker, Amazon Personalize"}}],"mnemonics":["RCC - Regression = Real numbers, Classification = Categories, Clustering = Clusters (no labels)","Need to predict a NUMBER? Use Regression. Need to predict a CATEGORY? Use Classification. Don't have labels? Use Clustering."],"exam_tips":["Regression problems always have continuous output (e.g., predicting house prices)","Classification problems have discrete outputs (binary or multi-class)","Clustering is unsupervised - no historical labels required","If the question mentions 'predicting a value' - think regression","If the question mentions 'identifying type/category' - think classification","If the question mentions 'finding patterns/groups' without labels - think clustering"],"sources":["aws_exam_comparison_tables[glm5-agent].json"]},{"title":"Managed AI Services for Language and Speech","title_variants":["Managed AI Services for Language and Speech"],"category":"AI Services","exam":"AIF-C01","domain":"Fundamentals of AI and ML","table_id":"aif_d1_managed_ai_services_nlp_speech","columns":["Amazon Comprehend","Amazon Lex","Amazon Polly","Amazon Transcribe","Amazon Translate"],"column_summaries":{"Amazon Comprehend":"Comprehend extracts meaning from text, such as sentiment, entities, and key phrases. In exam language, it is the text understanding service.","Amazon Lex":"Lex is for conversational interfaces like chatbots and voice bots. If the prompt involves dialog flow or intent capture, Lex is the clue.","Amazon Polly":"Polly converts text into speech. It is the output voice service, not the speech-to-text one.","Amazon Transcribe":"Transcribe converts spoken audio into text. It is the speech-to-text service for transcripts and voice analysis pipelines.","Amazon Translate":"Translate converts text from one language to another. When the requirement is multilingual text translation, this is the managed answer."},"rows":[{"feature":"Input","values":{"Amazon Comprehend":"Text","Amazon Lex":"Text or voice conversation","Amazon Polly":"Text","Amazon Transcribe":"Audio","Amazon Translate":"Text"}},{"feature":"Output","values":{"Amazon Comprehend":"Insights about text","Amazon Lex":"Bot responses / intents","Amazon Polly":"Speech audio","Amazon Transcribe":"Transcript text","Amazon Translate":"Translated text"}},{"feature":"Best exam clue","values":{"Amazon Comprehend":"Sentiment, entity extraction, text analysis","Amazon Lex":"Chatbot or conversational assistant","Amazon Polly":"Read text aloud","Amazon Transcribe":"Generate transcript from speech","Amazon Translate":"Translate text across languages"}},{"feature":"Primary modality","values":{"Amazon Comprehend":"NLP understanding","Amazon Lex":"Conversation","Amazon Polly":"Speech synthesis","Amazon Transcribe":"Speech recognition","Amazon Translate":"Language translation"}},{"feature":"Great for","values":{"Amazon Comprehend":"Text analytics","Amazon Lex":"Bots","Amazon Polly":"Voice output","Amazon Transcribe":"Meeting/audio transcripts","Amazon Translate":"Multilingual messaging"}},{"feature":"Common trap","values":{"Amazon Comprehend":"Using it as translation","Amazon Lex":"Confusing it with text analytics","Amazon Polly":"Confusing it with transcription","Amazon Transcribe":"Confusing it with text-to-speech","Amazon Translate":"Confusing it with sentiment or chatbot logic"}}],"why_this_table_matters":"AIF Domain 1 asks you to recognize practical AI use cases and the capabilities of AWS managed AI/ML services. This table helps you map the service to the modality fast.","sources":["aws_exam_comparison_tables[gpt5].json"]},{"title":"Managed AI Services for Vision, Documents, Search, and Personalization","title_variants":["Managed AI Services for Vision, Documents, Search, and Personalization"],"category":"AI Services","exam":"AIF-C01","domain":"Fundamentals of AI and ML","table_id":"aif_d1_managed_ai_services_vision_docs_search","columns":["Amazon Rekognition","Amazon Textract","Amazon Kendra","Amazon Personalize","Amazon Fraud Detector"],"column_summaries":{"Amazon Rekognition":"Rekognition analyzes images and video for visual information. It is the exam clue for image understanding and video-based visual detection tasks.","Amazon Textract":"Textract extracts text and structure from documents. It is stronger than plain OCR-style thinking because it understands document content structure relevant to forms and documents.","Amazon Kendra":"Kendra is an intelligent search service for enterprise search experiences. If the requirement is search over content and finding relevant answers, Kendra is the signal.","Amazon Personalize":"Personalize is built for recommendation use cases. Think content suggestions, ranking, and individualized recommendations.","Amazon Fraud Detector":"Fraud Detector is focused on identifying potentially fraudulent activity patterns. When the business problem is fraud scoring or suspicious transaction detection, it is the purpose-built pick."},"rows":[{"feature":"Primary problem solved","values":{"Amazon Rekognition":"Visual analysis","Amazon Textract":"Document text and structure extraction","Amazon Kendra":"Enterprise search","Amazon Personalize":"Recommendations","Amazon Fraud Detector":"Fraud risk detection"}},{"feature":"Best exam clue","values":{"Amazon Rekognition":"Images or video","Amazon Textract":"Forms, PDFs, scanned documents","Amazon Kendra":"Search and relevance","Amazon Personalize":"Personalized suggestions","Amazon Fraud Detector":"Fraud pattern detection"}},{"feature":"Typical output","values":{"Amazon Rekognition":"Detected visual attributes or events","Amazon Textract":"Extracted text / document fields","Amazon Kendra":"Relevant search results / answers","Amazon Personalize":"Ranked recommendations","Amazon Fraud Detector":"Fraud likelihood signals"}},{"feature":"Great for","values":{"Amazon Rekognition":"Vision workloads","Amazon Textract":"Document automation","Amazon Kendra":"Knowledge search UX","Amazon Personalize":"Recommendation systems","Amazon Fraud Detector":"Risk decision support"}},{"feature":"Common trap","values":{"Amazon Rekognition":"Using it for document field extraction","Amazon Textract":"Using it as semantic enterprise search","Amazon Kendra":"Using it as a recommendation engine","Amazon Personalize":"Using it as general search","Amazon Fraud Detector":"Treating it as generic classification for any AI task"}}],"why_this_table_matters":"AIF Domain 1 also covers real-world use cases like vision, recommendation, search, and document extraction. This table prevents you from picking a general-purpose AI service when a purpose-built one is cleaner.","sources":["aws_exam_comparison_tables[gpt5].json"]},{"title":"Message Queue and Integration Services Comparison","title_variants":["Message Queue and Integration Services Comparison"],"description":"Comparing AWS messaging and event-driven integration services","category":"Analytics & Integration Services","exam":"Both (SAA-C03 Primary, AIF-C01 Reference)","columns":["Amazon SQS","Amazon SNS","Amazon EventBridge","AWS Step Functions"],"column_summaries":{"Amazon SQS":"A fully managed message queuing service that enables decoupling and scaling of microservices, distributed systems, and serverless applications.","Amazon SNS":"A fully managed pub/sub messaging and mobile notifications service enabling fanout messaging to multiple subscribers simultaneously.","Amazon EventBridge":"A serverless event bus service that connects application data from your own apps, SaaS apps, and AWS services to targets like Lambda.","AWS Step Functions":"A serverless workflow orchestration service that coordinates multiple AWS services into visual workflows for business processes."},"rows":[{"feature":"Pattern","values":{"Amazon SQS":"Point-to-point queue (one consumer)","Amazon SNS":"Pub-sub (multiple subscribers)","Amazon EventBridge":"Event routing (rules-based)","AWS Step Functions":"Workflow orchestration (state machines)"}},{"feature":"Message Delivery","values":{"Amazon SQS":"Pull-based (consumer polls)","Amazon SNS":"Push-based to subscribers","Amazon EventBridge":"Event-driven to targets","AWS Step Functions":"Orchestrated task execution"}},{"feature":"Use Case","values":{"Amazon SQS":"Decouple producers and consumers, task queues","Amazon SNS":"Fanout notifications, mobile push","Amazon EventBridge":"Event-driven architectures, SaaS integration","AWS Step Functions":"Multi-step workflows, business processes"}},{"feature":"Message Retention","values":{"Amazon SQS":"Up to 14 days","Amazon SNS":"No retention (immediate delivery)","Amazon EventBridge":"Up to 24 hours","AWS Step Functions":"Execution history up to 90 days"}},{"feature":"Dead Letter Queue","values":{"Amazon SQS":"Yes (built-in DLQ support)","Amazon SNS":"Yes (via subscription filter)","Amazon EventBridge":"Yes (archival to S3)","AWS Step Functions":"Yes (try-catch-error handling)"}},{"feature":"Pricing","values":{"Amazon SQS":"Per request (very low cost)","Amazon SNS":"Per notification","Amazon EventBridge":"Per event ingestion","AWS Step Functions":"Per state transition"}}],"mnemonics":["SNSE = SQS for Queue, SNS for Notifications, EventBridge for Events, Step for Steps/workflows"],"exam_tips":["SQS queues are for DECOUPLING - producer and consumer don't need to be running simultaneously","SNS pushes to MULTIPLE subscribers - good for fanout patterns","EventBridge can receive events from SaaS applications (not just AWS)","Step Functions coordinate workflows - don't write complex state machines in Lambda","Use FIFO queues when message ordering matters"],"sources":["aws_exam_comparison_tables[minimax-dr].json"]},{"title":"Messaging Patterns Comparison: SQS vs SNS vs EventBridge vs Kinesis","title_variants":["Messaging Patterns Comparison: SQS vs SNS vs EventBridge vs Kinesis"],"context":"AWS provides multiple messaging services optimized for different architectural patterns. Understanding when to use each service is essential for designing scalable, decoupled systems. This comparison focuses on the key differentiators that drive service selection in exam scenarios and real-world architectures.","columns":["SQS","SNS","EventBridge","Kinesis Data Streams"],"rows":[{"feature":"Pattern Type","values":{"SQS":"Point-to-point (queue)","SNS":"Pub/Sub (fan-out)","EventBridge":"Event bus with routing","Kinesis Data Streams":"Real-time streaming"}},{"feature":"Message Consumption","values":{"SQS":"Pull-based (consumers poll)","SNS":"Push-based (pushes to subscribers)","EventBridge":"Push-based (pushes to targets)","Kinesis Data Streams":"Pull-based (consumers read shards)"}},{"feature":"Ordering Guarantee","values":{"SQS":"FIFO only (Standard = best-effort)","SNS":"FIFO topics only","EventBridge":"Best-effort only","Kinesis Data Streams":"Within a shard (partition key)"}},{"feature":"Message Persistence","values":{"SQS":"1 min to 14 days","SNS":"No persistence (immediate delivery)","EventBridge":"No persistence (can archive)","Kinesis Data Streams":"1 to 365 days (default 24h)"}},{"feature":"Throughput","values":{"SQS":"Standard = unlimited, FIFO = 3K/sec","SNS":"Standard = unlimited, FIFO = 3K/sec","EventBridge":"10K events/sec (scalable)","Kinesis Data Streams":"1 MB/sec or 1K records/sec per shard"}},{"feature":"Fan-out Capability","values":{"SQS":"Single consumer (unless using multiple queues)","SNS":"Native fan-out to unlimited subscribers","EventBridge":"Multiple targets per rule","Kinesis Data Streams":"Multiple consumers per shard"}},{"feature":"Filtering","values":{"SQS":"None (consumer filters)","SNS":"Attribute-based filtering","EventBridge":"Content-based JSON filtering","Kinesis Data Streams":"None (consumer filters)"}},{"feature":"Replay Capability","values":{"SQS":"No","SNS":"No","EventBridge":"Yes (with archive enabled)","Kinesis Data Streams":"Yes (within retention period)"}},{"feature":"Real-time Processing","values":{"SQS":"Near real-time (polling delay)","SNS":"Real-time push","EventBridge":"Real-time push","Kinesis Data Streams":"Real-time streaming (sub-second)"}},{"feature":"Scale Out","values":{"SQS":"Add more consumers","SNS":"Automatic","EventBridge":"Automatic","Kinesis Data Streams":"Add more shards"}},{"feature":"Use Case","values":{"SQS":"Decoupling, work queues, job processing","SNS":"Alerts, notifications, simple fan-out","EventBridge":"Event routing, SaaS integration, scheduling","Kinesis Data Streams":"Real-time analytics, log processing, metrics"}},{"feature":"Pricing Model","values":{"SQS":"Per request + data transfer","SNS":"Per request + data transfer + delivery","EventBridge":"Per event published","Kinesis Data Streams":"Per shard-hour + PUT payload unit"}}],"sources":["aws_exam_comparison_tables[kimi-agsw].json"]},{"title":"Multi-AZ vs Read Replicas vs Multi-Region","title_variants":["Multi-AZ vs Read Replicas vs Multi-Region"],"context":"Database resilience in AWS comes in three flavors that serve different purposes: Multi-AZ for HA (high availability) and failover, Read Replicas for performance scaling, and Multi-Region for DR and global low-latency access. The exam frequently confuses candidates by presenting scenarios where these overlap — know the PRIMARY PURPOSE of each.","exam":"SAA-C03","domain":"Domain 2: Design Resilient Architectures","domain_weight":"26%","table_id":"SAA-007","columns":["Multi-AZ Deployment","Read Replicas","Multi-Region"],"column_summaries":{"Multi-AZ Deployment":"Multi-AZ creates a SYNCHRONOUS standby replica in a DIFFERENT Availability Zone within the same region. If the primary fails, AWS automatically failovers to the standby in 1-2 minutes with no data loss. It is purely for high availability and disaster recovery — the standby cannot serve read traffic.","Read Replicas":"Read Replicas are ASYNCHRONOUS copies of your database that can serve SELECT queries, relieving read pressure from the primary. They can be in the same AZ, different AZ, or even different regions. They do NOT provide failover — if the primary fails, you must manually promote a read replica.","Multi-Region":"Multi-Region deployments replicate your database across AWS regions for global low-latency access and disaster recovery at the regional level. Aurora Global Database and DynamoDB Global Tables are the key AWS services for this pattern."},"rows":[{"feature":"Primary Purpose","values":{"Multi-AZ Deployment":"HIGH AVAILABILITY — automatic failover on primary failure","Read Replicas":"PERFORMANCE — offload read traffic from primary","Multi-Region":"DR + GLOBAL PERFORMANCE — regional resilience and low-latency reads"}},{"feature":"Replication Type","values":{"Multi-AZ Deployment":"SYNCHRONOUS — zero data loss, always consistent","Read Replicas":"ASYNCHRONOUS — slight replication lag possible","Multi-Region":"ASYNCHRONOUS (Aurora Global: < 1 second)"}},{"feature":"Can Serve Reads?","values":{"Multi-AZ Deployment":"NO — standby is passive, no read traffic","Read Replicas":"YES — primary purpose is serving reads","Multi-Region":"YES — each region can serve local reads"}},{"feature":"Automatic Failover?","values":{"Multi-AZ Deployment":"YES — automatic in ~1-2 minutes","Read Replicas":"NO — manual promotion required","Multi-Region":"Varies — Aurora Global has automated failover"}},{"feature":"Max Replicas (RDS)","values":{"Multi-AZ Deployment":"1 standby (or 2 with Multi-AZ Cluster)","Read Replicas":"Up to 5 (RDS), Up to 15 (Aurora)","Multi-Region":"Up to 5 secondary regions (Aurora Global)"}},{"feature":"Cost","values":{"Multi-AZ Deployment":"~2x the primary cost (standby instance running 24/7)","Read Replicas":"Additional instance cost per replica","Multi-Region":"Highest — cross-region data transfer + multiple instances"}}],"sources":["aws_exam_comparison_tables[sonnet46].json"]},{"title":"Natural Language Processing (NLP) Services Comparison","title_variants":["Natural Language Processing (NLP) Services Comparison"],"description":"Comparing AWS services for text analysis, language processing, and conversational interfaces","category":"AI & Machine Learning Services","exam":"AIF-C01","columns":["Amazon Comprehend","Amazon Lex","Amazon Translate","Amazon Polly"],"column_summaries":{"Amazon Comprehend":"A natural language processing (NLP) service that uses machine learning to find insights and relationships in text, including sentiment analysis, entity extraction, and topic modeling.","Amazon Lex":"A service for building conversational interfaces using voice and text, powered by the same technology as Amazon Alexa, supporting sophisticated chatbots and voice assistants.","Amazon Translate":"A neural machine translation service that delivers fast, high-quality, and affordable language translation between supported languages.","Amazon Polly":"A text-to-speech (TTS) service that converts written text into lifelike speech using deep learning, supporting multiple languages and voices."},"rows":[{"feature":"Primary Function","values":{"Amazon Comprehend":"Analyze text and extract insights","Amazon Lex":"Build chatbots and conversational interfaces","Amazon Translate":"Translate text between languages","Amazon Polly":"Convert text to speech"}},{"feature":"Input Type","values":{"Amazon Comprehend":"Unstructured text","Amazon Lex":"Text or voice input","Amazon Translate":"Text in source language","Amazon Polly":"Text"}},{"feature":"Output Type","values":{"Amazon Comprehend":"Insights, entities, sentiment scores","Amazon Lex":"Conversational responses","Amazon Translate":"Translated text","Amazon Polly":"Audio stream (MP3/OGG)"}},{"feature":"Customization","values":{"Amazon Comprehend":"Custom entity recognition, classification","Amazon Lex":"Custom conversation flows, slot types","Amazon Translate":"Custom terminology","Amazon Polly":"Custom lexicons, speech marks"}},{"feature":"Language Support","values":{"Amazon Comprehend":"Multiple languages for key features","Amazon Lex":"Multiple languages","Amazon Translate":"75+ languages","Amazon Polly":"Multiple languages and voices"}},{"feature":"Real-Time Processing","values":{"Amazon Comprehend":"Async (batch) and sync APIs","Amazon Lex":"Real-time conversational","Amazon Translate":"Sync and async APIs","Amazon Polly":"Real-time synthesis"}}],"mnemonics":["CLaTP = Comprehend for language insights, Lex for conversation, Translate for languages, Polly for speech"],"exam_tips":["Use Comprehend for analyzing customer feedback and sentiment analysis","Use Lex for building chatbots - it's the engine behind Alexa","Polly + Lex together create voice/text chatbots with speech synthesis","Comprehend CANNOT translate languages - use Translate for that","Amazon Transcribe converts speech to text (opposite of Polly)"],"sources":["aws_exam_comparison_tables[minimax-dr].json"]},{"title":"Network Connectivity Services Comparison","title_variants":["Network Connectivity Services Comparison"],"description":"Comparing AWS services for network connectivity and VPN","category":"Networking Services","exam":"Both (SAA-C03 Primary)","columns":["AWS Direct Connect","AWS VPN","AWS PrivateLink"],"column_summaries":{"AWS Direct Connect":"A cloud service that establishes a dedicated network connection from your premises to AWS, providing consistent network performance and private connectivity.","AWS VPN":"A managed VPN service that creates an encrypted tunnel between your network or device and the AWS global network, including Site-to-Site and Client VPN options.","AWS PrivateLink":"A technology that enables private connectivity between VPCs and AWS services, keeping traffic within the AWS network without exposing it to the internet."},"rows":[{"feature":"Connection Type","values":{"AWS Direct Connect":"Dedicated physical connection (1 Gbps to 100 Gbps)","AWS VPN":"Encrypted VPN tunnel over internet","AWS PrivateLink":"Private connectivity to services via VPC endpoint"}},{"feature":"Bandwidth","values":{"AWS Direct Connect":"Up to 100 Gbps dedicated","AWS VPN":"Limited by internet bandwidth","AWS PrivateLink":"Full network speed within VPC"}},{"feature":"Latency","values":{"AWS Direct Connect":"Low, consistent","AWS VPN":"Variable (internet-dependent)","AWS PrivateLink":"Low (within AWS network)"}},{"feature":"Use Case","values":{"AWS Direct Connect":"Large data transfers, hybrid cloud","AWS VPN":"Remote access, site-to-site connectivity","AWS PrivateLink":"Access AWS services privately from VPC"}},{"feature":"Public/Private","values":{"AWS Direct Connect":"Both public and private VIFs","AWS VPN":"Encrypted tunnel (private)","AWS PrivateLink":"Private only (no internet)"}}],"mnemonics":["DVP = Direct Connect for Data transfers, VPN for remote access, PrivateLink for private service access"],"exam_tips":["Direct Connect provides consistent network performance for hybrid environments","VPN is quick to set up but performance varies with internet","PrivateLink is essential for securely accessing AWS services without internet","Use VPC endpoints (powered by PrivateLink) for S3, DynamoDB, and other AWS services","Direct Connect + VPN provides both performance and security"],"sources":["aws_exam_comparison_tables[minimax-dr].json"]},{"title":"Network Security Services Comparison","title_variants":["Network Security Services Comparison","Security Group vs Network ACL Comparison"],"context":"AWS provides multiple layers of network security to protect applications from various attack vectors. WAF (Web Application Firewall) protects against Layer 7 application attacks like SQL injection and XSS, Shield provides DDoS protection at Layer 3/4, Network Firewall offers stateful inspection and intrusion prevention for VPC traffic, and Security Groups/NACLs provide foundational network access control. Understanding the OSI layer each service operates at, their deployment models, and use case differentiation is critical for the exam. These services work together to provide defense in depth for network security.","table_id":"security_group_nacl_comparison","relevant_exams":["SAA-C03"],"relevant_domains":{"SAA-C03":["Domain 1: Design Secure Architectures"]},"columns":["WAF (Web Application Firewall)","Shield Standard","Shield Advanced","Network Firewall","Security Groups","NACLs (Network ACLs)"],"column_summaries":{"Security Group":"Virtual firewall that controls inbound and outbound traffic at the instance level, operating as a stateful filter that remembers connection state.","Network ACL (NACL)":"Virtual firewall that controls traffic at the subnet level, operating as a stateless filter that evaluates each request independently using numbered rules."},"rows":[{"feature":"OSI Layer","values":{"WAF (Web Application Firewall)":"Layer 7 (Application) - HTTP/HTTPS traffic only","Shield Standard":"Layer 3 (Network) and Layer 4 (Transport)","Shield Advanced":"Layer 3 (Network) and Layer 4 (Transport)","Network Firewall":"Layer 3-7 (Network through Application)","Security Groups":"Layer 4 (Transport) - TCP/UDP port level","NACLs (Network ACLs)":"Layer 4 (Transport) - TCP/UDP port level"}},{"feature":"Primary Protection","values":{"WAF (Web Application Firewall)":"OWASP Top 10, SQL injection, XSS, bot control, rate limiting","Shield Standard":"DDoS protection against common attacks (volumetric, state-exhaustion)","Shield Advanced":"Enhanced DDoS protection with 24/7 DRT, cost protection, detailed reporting","Network Firewall":"Stateful inspection, intrusion prevention, domain filtering, TLS inspection","Security Groups":"Instance-level firewall controlling inbound/outbound traffic","NACLs (Network ACLs)":"Subnet-level firewall controlling inbound/outbound traffic"}},{"feature":"Deployment Model","values":{"WAF (Web Application Firewall)":"Associated with CloudFront, ALB, API Gateway, AppSync","Shield Standard":"Automatically enabled for all AWS customers at no cost","Shield Advanced":"$3,000/month per organization + data transfer out fees","Network Firewall":"Deployed in VPC subnets as a managed service; traffic routed through firewall endpoints","Security Groups":"Attached to ENIs (EC2 instances, Lambda, RDS, etc.)","NACLs (Network ACLs)":"Associated with subnets; applies to all resources in subnet"}},{"feature":"Rule Evaluation","values":{"WAF (Web Application Firewall)":"Managed rule groups, custom rules, rate-based rules, regex patterns","Shield Standard":"Automatic - no rules to configure","Shield Advanced":"Custom protections via WAF rules; DRT assistance","Network Firewall":"Stateful rules (Suricata compatible), stateless rules, domain lists, IP lists","Security Groups":"Allow rules only (implicit deny); by protocol, port, source/destination","NACLs (Network ACLs)":"Allow and Deny rules; by protocol, port, source/destination CIDR"}},{"feature":"Scope of Protection","values":{"WAF (Web Application Firewall)":"Application-specific (web applications behind CloudFront/ALB)","Shield Standard":"All AWS resources globally (automatic)","Shield Advanced":"Resources you specify (EC2, ELB, CloudFront, Global Accelerator, Route 53)","Network Firewall":"VPC-level protection for all outbound/inbound traffic","Security Groups":"Individual resource level (EC2, RDS, Lambda, etc.)","NACLs (Network ACLs)":"Subnet level (all resources within subnet)"}},{"feature":"Statefulness","values":{"WAF (Web Application Firewall)":"Stateful - tracks request context","Shield Standard":"Stateful - tracks connection state","Shield Advanced":"Stateful - tracks connection state","Network Firewall":"Both stateful and stateless rules supported","Security Groups":"Stateful - return traffic automatically allowed","NACLs (Network ACLs)":"Stateless - both directions must be explicitly allowed"}},{"feature":"Default Behavior","values":{"WAF (Web Application Firewall)":"Allow all by default; rules define what to block","Shield Standard":"Always active; no configuration needed","Shield Advanced":"Must subscribe; then configure protected resources","Network Firewall":"Allow all by default until rules are configured","Security Groups":"Deny all inbound; allow all outbound by default","NACLs (Network ACLs)":"Allow all inbound and outbound by default"}},{"feature":"Logging & Monitoring","values":{"WAF (Web Application Firewall)":"Logs to CloudWatch, S3, Kinesis Data Firehose","Shield Standard":"CloudWatch metrics for DDoS events","Shield Advanced":"Detailed reports, DRT access, cost protection metrics","Network Firewall":"Flow logs to S3, CloudWatch, Kinesis; alert logs for rule matches","Security Groups":"VPC Flow Logs (must be enabled separately)","NACLs (Network ACLs)":"VPC Flow Logs (must be enabled separately)"}},{"feature":"Key Limitations","values":{"WAF (Web Application Firewall)":"Only protects HTTP/HTTPS; requires CloudFront/ALB/API Gateway","Shield Standard":"No advanced reporting or DRT access","Shield Advanced":"Expensive ($3,000/month); 1-year subscription commitment","Network Firewall":"Adds latency; requires proper routing configuration","Security Groups":"Cannot deny traffic explicitly; limited to 5 SGs per ENI","NACLs (Network ACLs)":"Processed after Security Groups; stateless requires bidirectional rules"}},{"feature":"Operating Level","values":{"Security Group":"Instance level (ENI)","Network ACL (NACL)":"Subnet level"}},{"feature":"Association","values":{"Security Group":"Attached to ENIs (instances)","Network ACL (NACL)":"Associated with subnets"}},{"feature":"Use Cases","values":{"Security Group":"Instance-specific access control","Network ACL (NACL)":"Subnet-wide traffic blocking, additional security layer"}}],"sources":["aws_exam_comparison_tables[kimi-agsw].json","aws_exam_comparison_tables[kimicode-v2].json"]},{"title":"NoSQL Databases Comparison","title_variants":["NoSQL Database Services Comparison","NoSQL Databases Comparison"],"description":"Comparing AWS managed NoSQL and document database services","context":"AWS provides multiple NoSQL database options optimized for different data models and access patterns. DynamoDB is the flagship key-value and document store with various deployment options. DocumentDB offers MongoDB compatibility, while Keyspaces provides managed Cassandra. Understanding these services' consistency models, scaling characteristics, and pricing is essential for the exam.","category":"Database Services","exam":"Both (SAA-C03 Primary)","columns":["DynamoDB Standard","DynamoDB DAX","DynamoDB Global Tables","DocumentDB","Keyspaces (Cassandra)","Amazon Neptune"],"column_summaries":{"Amazon DynamoDB":"A fully managed NoSQL database service providing single-digit millisecond latency at any scale, with built-in security, caching, and backup capabilities for document and key-value workloads.","Amazon DocumentDB":"A fully managed document database service that is MongoDB-compatible, enabling you to store, query, and index JSON data with the scalability and reliability of AWS.","Amazon Neptune":"A fully managed graph database service supporting both Property Graph and RDF standards, ideal for building applications that require highly connected data relationships."},"rows":[{"feature":"Data Model","values":{"DynamoDB Standard":"Key-value and Document","DynamoDB DAX":"Key-value and Document (cached)","DynamoDB Global Tables":"Key-value and Document (multi-region)","DocumentDB":"Document (JSON, MongoDB-compatible)","Keyspaces (Cassandra)":"Wide-column (Cassandra-compatible)","Amazon Neptune":"Nodes, edges, and properties"}},{"feature":"Consistency Model","values":{"DynamoDB Standard":"Eventually consistent (default) or Strongly consistent","DynamoDB DAX":"Eventually consistent (cache), Strongly consistent (bypass)","DynamoDB Global Tables":"Eventually consistent (multi-master)","DocumentDB":"Session, eventual, strong consistency","Keyspaces (Cassandra)":"Tunable consistency (ONE, QUORUM, ALL, etc.)","Amazon Neptune":"Read replicas with eventual consistency"}},{"feature":"Read Latency","values":{"DynamoDB Standard":"Single-digit milliseconds","DynamoDB DAX":"Microseconds (10x faster)","DynamoDB Global Tables":"Single-digit milliseconds (local region)","DocumentDB":"Milliseconds","Keyspaces (Cassandra)":"Milliseconds"}},{"feature":"Scaling Model","values":{"DynamoDB Standard":"On-demand or Provisioned (auto-scaling)","DynamoDB DAX":"On-demand or auto-scaling, virtually unlimited","DynamoDB Global Tables":"Same as Standard, multi-region","DocumentDB":"Instance-based (up to 15 replicas), storage auto-scales","Keyspaces (Cassandra)":"Serverless (auto-scales), or Provisioned","Amazon Neptune":"Read replicas up to 15"}},{"feature":"Replication","values":{"DynamoDB Standard":"Multi-AZ synchronous","DynamoDB DAX":"N/A (in-memory cache)","DynamoDB Global Tables":"Multi-region, multi-master (last-writer-wins)","DocumentDB":"Up to 15 read replicas, async","Keyspaces (Cassandra)":"Multi-AZ by default, tunable replication factor"}},{"feature":"Availability SLA","values":{"DynamoDB Standard":"99.999%","DynamoDB DAX":"99.9%","DynamoDB Global Tables":"99.999%","DocumentDB":"99.99%","Keyspaces (Cassandra)":"99.99%"}},{"feature":"Maximum Item Size","values":{"DynamoDB Standard":"400 KB","DynamoDB DAX":"Same as DynamoDB","DynamoDB Global Tables":"400 KB","DocumentDB":"16 MB","Keyspaces (Cassandra)":"1 MB per row"}},{"feature":"Query Language","values":{"DynamoDB Standard":"DynamoDB API (GetItem, Query, Scan)","DynamoDB DAX":"Same as DynamoDB","DynamoDB Global Tables":"Same as DynamoDB","DocumentDB":"MongoDB API (find, aggregate, etc.)","Keyspaces (Cassandra)":"CQL (Cassandra Query Language)"}},{"feature":"Pricing Model","values":{"DynamoDB Standard":"On-demand (per request) or Provisioned (RCU/WCU)","DynamoDB DAX":"Node instance hours (cache.r5, cache.t3)","DynamoDB Global Tables":"Replicated write units + storage per region","DocumentDB":"Instance hours + Storage + IOPS","Keyspaces (Cassandra)":"On-demand (per million CQL requests) or Provisioned"}},{"feature":"Best Use Cases","values":{"DynamoDB Standard":"High-scale apps, gaming, IoT, session management","DynamoDB DAX":"Read-heavy workloads requiring microsecond latency","DynamoDB Global Tables":"Global apps requiring low-latency writes in multiple regions","DocumentDB":"MongoDB workloads, content management, catalogs","Keyspaces (Cassandra)":"Cassandra migrations, time-series data, IoT"}},{"feature":"Database Type","values":{"Amazon DynamoDB":"Key-value and document NoSQL","Amazon DocumentDB":"Document database (MongoDB compatible)","Amazon Neptune":"Graph database (Property Graph/RDF)"}},{"feature":"Primary Use","values":{"Amazon DynamoDB":"Internet-scale apps, gaming, IoT","Amazon DocumentDB":"Content management, catalogs, profiles","Amazon Neptune":"Social networks, fraud detection, knowledge graphs"}},{"feature":"Query Pattern","values":{"Amazon DynamoDB":"Key-based access, scan with filters","Amazon DocumentDB":"MongoDB queries, aggregation pipeline","Amazon Neptune":"Graph traversal (Gremlin, SPARQL)"}},{"feature":"ACID Transactions","values":{"Amazon DynamoDB":"Yes (single-table transactions)","Amazon DocumentDB":"Yes (multi-document ACID transactions)","Amazon Neptune":"Yes (serializable isolation)"}}],"mnemonics":["DDN = DynamoDB for key-value, DocumentDB for Mongo-style, Neptune for Networks (graphs)"],"exam_tips":["DynamoDB is serverless by default with on-demand capacity mode","DynamoDB Accelerator (DAX) provides in-memory caching for microsecond latency","Use DocumentDB if migrating from MongoDB - it's MongoDB-compatible","Neptune is specifically for highly connected data - social, fraud, recommendation engines","DynamoDB Global Tables provide multi-region active-active replication"],"sources":["aws_exam_comparison_tables[kimi-agsw].json","aws_exam_comparison_tables[minimax-dr].json"]},{"title":"Personalization and Forecasting Comparison","title_variants":["Personalization and Forecasting Comparison"],"context":"AWS offers specialized services for creating personalized experiences and making predictions. Amazon Personalize creates real-time personalized recommendations similar to Amazon.com's recommendation engine. Amazon Forecast generates accurate time-series forecasts using ML. Amazon Fraud Detector identifies potentially fraudulent online activities. These services are fully managed and designed for specific business use cases without requiring ML expertise.","columns":["Amazon Personalize","Amazon Forecast","Amazon Fraud Detector"],"rows":[{"feature":"Primary Purpose","values":{"Amazon Personalize":"Create real-time personalized recommendations","Amazon Forecast":"Generate time-series forecasts using ML","Amazon Fraud Detector":"Detect fraudulent online activities"}},{"feature":"ML Problem Type","values":{"Amazon Personalize":"Recommendation systems, collaborative filtering","Amazon Forecast":"Time-series forecasting, demand planning","Amazon Fraud Detector":"Binary classification, anomaly detection"}},{"feature":"Input Data Requirements","values":{"Amazon Personalize":"User interactions, item metadata, user metadata","Amazon Forecast":"Historical time-series data, related time series","Amazon Fraud Detector":"Historical fraud labels, transaction data"}},{"feature":"Key Capabilities","values":{"Amazon Personalize":"Real-time recommendations, similar items, personalized rankings, user segmentation","Amazon Forecast":"Multiple algorithms, automatic model selection, what-if analysis","Amazon Fraud Detector":"Online fraud detection, account takeover detection, custom models"}},{"feature":"Real-time Capabilities","values":{"Amazon Personalize":"Yes - Real-time recommendations API","Amazon Forecast":"No - Batch forecasts only","Amazon Fraud Detector":"Yes - Real-time fraud predictions"}},{"feature":"Customization Level","values":{"Amazon Personalize":"High - Custom recipes, domain optimizers","Amazon Forecast":"Medium - Algorithm selection, hyperparameters","Amazon Fraud Detector":"High - Custom models, rules, thresholds"}},{"feature":"Integration Points","values":{"Amazon Personalize":"API Gateway, Lambda, Kinesis, S3","Amazon Forecast":"S3, Lambda, QuickSight","Amazon Fraud Detector":"API Gateway, Lambda, EventBridge"}},{"feature":"Pricing Model","values":{"Amazon Personalize":"Data ingestion + training + recommendations (TPS-hours)","Amazon Forecast":"Data storage + training hours + forecast generation","Amazon Fraud Detector":"Prediction charges + model training + data storage"}},{"feature":"Cold Start Handling","values":{"Amazon Personalize":"Item cold start with metadata, user cold start with popularity","Amazon Forecast":"Cold start not applicable - requires history","Amazon Fraud Detector":"New entity risk scoring with limited data"}},{"feature":"Best Use Case","values":{"Amazon Personalize":"E-commerce recommendations, content personalization","Amazon Forecast":"Demand forecasting, resource planning, financial planning","Amazon Fraud Detector":"Payment fraud, account takeover, fake account detection"}},{"feature":"Exam Relevance","values":{"Amazon Personalize":"High - Recommendation scenarios","Amazon Forecast":"Medium - Time-series prediction needs","Amazon Fraud Detector":"Medium - Fraud detection requirements"}}],"sources":["aws_exam_comparison_tables[kimi-agsw].json"]},{"title":"Private Connectivity Options","title_variants":["Connectivity Options Comparison","Private Connectivity Options"],"context":"AWS provides multiple options for connecting on-premises networks to AWS or connecting AWS VPCs privately. Understanding Site-to-Site VPN, Client VPN, Direct Connect, PrivateLink, and Transit Gateway is critical for designing secure, scalable hybrid cloud architectures.","category":"Networking / Security","exam":"SAA-C03","domain":"Design Secure Architectures","table_id":"saa_d1_private_connectivity","columns":["Site-to-Site VPN","AWS Direct Connect","AWS PrivateLink","Client VPN","Transit Gateway"],"column_summaries":{"Site-to-Site VPN":"Site-to-Site VPN is the quicker, internet-based way to securely connect on-premises networks to AWS. It is good when you need encryption fast and can tolerate internet-based variability.","AWS Direct Connect":"Direct Connect provides a dedicated private network connection into AWS for more consistent connectivity characteristics. On the exam, it is the premium answer for predictable private hybrid connectivity.","AWS PrivateLink":"PrivateLink exposes services privately between VPCs and accounts without opening broad network paths. It is the exam clue for private service consumption without full mesh peering or internet exposure."},"rows":[{"feature":"Connection style","values":{"Site-to-Site VPN":"Encrypted tunnel over public internet","AWS Direct Connect":"Shared physical connection via partner","AWS PrivateLink":"Private connectivity to AWS services or VPCs","Client VPN":"Encrypted tunnel for individual remote users","Transit Gateway":"VPC and on-premises network hub"}},{"feature":"Use Case: Site-to-AWS","values":{"Site-to-Site VPN":"Quick, encrypted connection over internet","AWS Direct Connect":"High-bandwidth without dedicated infrastructure","AWS PrivateLink":"Consume a specific service privately","Client VPN":"N/A (user access, not site)","Transit Gateway":"Hub for multiple VPCs and on-premises"}},{"feature":"Typical exam clue","values":{"Site-to-Site VPN":"Need secure connection quickly and cheaply","AWS Direct Connect":"Need consistent private hybrid connection","AWS PrivateLink":"Need private access to service endpoints"}},{"feature":"Scope","values":{"Site-to-Site VPN":"Network-to-network","AWS Direct Connect":"Network-to-network","AWS PrivateLink":"Service-to-consumer"}},{"feature":"Internet dependency","values":{"Site-to-Site VPN":"Yes, underlying path uses internet","AWS Direct Connect":"No, dedicated connection","AWS PrivateLink":"No public internet exposure for service access"}},{"feature":"Common trap","values":{"Site-to-Site VPN":"Assuming it behaves like a dedicated circuit","AWS Direct Connect":"Assuming it automatically encrypts like VPN","AWS PrivateLink":"Assuming it replaces all VPC-to-VPC networking"}},{"feature":"Encryption","values":{"Site-to-Site VPN":"IPsec encryption (AES-256)","Client VPN":"TLS 1.2+ encryption","Direct Connect (Dedicated)":"Not encrypted by default (use MACsec or VPN)","Direct Connect (Hosted)":"Not encrypted by default (use MACsec or VPN)","PrivateLink":"TLS encryption","Transit Gateway":"Not encrypted (private AWS backbone)"}},{"feature":"Bandwidth","values":{"Site-to-Site VPN":"Up to 1.25 Gbps per tunnel (2 tunnels = 2.5 Gbps)","Client VPN":"Up to 1 Gbps per client","Direct Connect (Dedicated)":"1 Gbps, 10 Gbps, or 100 Gbps","Direct Connect (Hosted)":"50 Mbps to 10 Gbps (via partner)","PrivateLink":"Up to 10 Gbps per AZ (auto-scales)","Transit Gateway":"Up to 50 Gbps per attachment"}},{"feature":"Latency","values":{"Site-to-Site VPN":"Variable (internet-dependent)","Client VPN":"Variable (internet-dependent)","Direct Connect (Dedicated)":"Consistent, low latency","Direct Connect (Hosted)":"Consistent, low latency","PrivateLink":"Low latency (AWS private network)","Transit Gateway":"Low latency (AWS backbone)"}},{"feature":"Setup Time","values":{"Site-to-Site VPN":"Minutes","Client VPN":"Hours","Direct Connect (Dedicated)":"Days to weeks (physical installation)","Direct Connect (Hosted)":"Days (faster than dedicated)","PrivateLink":"Hours","Transit Gateway":"Hours"}},{"feature":"Cost Model","values":{"Site-to-Site VPN":"Hourly per VPN connection + data transfer","Client VPN":"Hourly per VPN connection + association fee","Direct Connect (Dedicated)":"Port hour fee + data transfer out","Direct Connect (Hosted)":"Port hour fee to partner + AWS data transfer","PrivateLink":"Hourly per endpoint + data processing","Transit Gateway":"Hourly per attachment + data processing"}},{"feature":"High Availability","values":{"Site-to-Site VPN":"Two tunnels per connection (automatic)","Client VPN":"Multi-AZ redundancy","Direct Connect (Dedicated)":"Requires second connection for HA","Direct Connect (Hosted)":"Depends on partner setup","PrivateLink":"Multi-AZ by default","Transit Gateway":"Multi-AZ by default"}},{"feature":"Use Case: Remote Workers","values":{"Site-to-Site VPN":"N/A (site-to-site only)","Client VPN":"Purpose-built for remote user access","Direct Connect (Dedicated)":"N/A","Direct Connect (Hosted)":"N/A","PrivateLink":"N/A","Transit Gateway":"N/A (infrastructure, not user access)"}},{"feature":"Use Case: Access AWS Services","values":{"Site-to-Site VPN":"Through VPC","Client VPN":"Through VPC","Direct Connect (Dedicated)":"Direct Connect Gateway + VPC/private VIF","Direct Connect (Hosted)":"Direct Connect Gateway + VPC/private VIF","PrivateLink":"Direct private access to services without internet/VPN","Transit Gateway":"Through attached VPCs"}},{"feature":"Use Case: VPC-to-VPC","values":{"Site-to-Site VPN":"Possible but not recommended","Client VPN":"N/A","Direct Connect (Dedicated)":"Via Direct Connect Gateway","Direct Connect (Hosted)":"Via Direct Connect Gateway","PrivateLink":"VPC endpoint to endpoint service","Transit Gateway":"Preferred method - central hub"}},{"feature":"Requires Public IP","values":{"Site-to-Site VPN":"Yes (customer gateway needs public IP)","Client VPN":"No (uses endpoint in VPC)","Direct Connect (Dedicated)":"No","Direct Connect (Hosted)":"No","PrivateLink":"No","Transit Gateway":"No"}},{"feature":"Supports BGP","values":{"Site-to-Site VPN":"Optional (dynamic routing)","Client VPN":"No","Direct Connect (Dedicated)":"Yes (required for private VIF)","Direct Connect (Hosted)":"Yes","PrivateLink":"No","Transit Gateway":"Yes (with Direct Connect Gateway)"}},{"feature":"Cross-Region Support","values":{"Site-to-Site VPN":"Single region per connection","Client VPN":"Single region per endpoint","Direct Connect (Dedicated)":"Multi-region via Direct Connect Gateway","Direct Connect (Hosted)":"Multi-region via Direct Connect Gateway","PrivateLink":"Cross-region via VPC peering or Transit Gateway","Transit Gateway":"Cross-region peering available"}}],"why_this_table_matters":"SAA Domain 1 and Domain 3 both touch private and secure connectivity. This table separates encrypted internet tunnels, dedicated private circuits, and private service exposure without traversing the public internet.","sources":["aws_exam_comparison_tables[gpt5].json","aws_exam_comparison_tables[kimi-agsw].json"]},{"title":"Prompt Engineering Techniques","title_variants":["Prompt Engineering Techniques","Prompt Engineering Techniques Comparison"],"description":"Comparison of different prompt engineering techniques used in generative AI applications","context":"This table compares different prompting techniques for foundation models. Zero-shot uses no examples, few-shot provides examples, chain-of-thought enables reasoning, and system prompting sets the behavior context for the model.","category":"AI_GENERATIVE_AI_CONCEPTS","table_id":"AIF-003","relevant_exams":["AIF-C01"],"relevant_domains":{"AIF-C01":["Domain 3: Applications of Foundation Models"]},"columns":["Zero-Shot Prompting","Few-Shot Prompting","Chain-of-Thought (CoT)","Negative Prompting"],"column_summaries":{"Zero-Shot Prompting":"A prompting technique where the model is given a task without any example demonstrations. The model relies entirely on its pre-training to understand and complete the task, making it efficient for simple, well-defined problems where examples aren't necessary.","Few-Shot Prompting":"A technique that provides the model with a few example input-output pairs within the prompt to guide its behavior. This helps the model understand the desired format and pattern, improving accuracy for tasks where the model needs additional context about the expected output.","Chain-of-Thought (CoT)":"An advanced prompting technique that encourages the model to break down complex problems into intermediate reasoning steps. This significantly improves performance on mathematical, logical, and multi-step reasoning tasks by making the model 'show its work.'","Negative Prompting":"A technique that explicitly specifies what should NOT be included in the output, helping to prevent unwanted content, reduce hallucinations, and improve output quality by setting clear boundaries for the model's responses."},"rows":[{"feature":"Definition","values":{"Zero-Shot Prompting":"Task description + magic phrase (e.g., 'think step by step')","Few-Shot Prompting":"Few examples provided in prompt","Chain-of-Thought (CoT)":"Step-by-step reasoning in prompt","Negative Prompting":"Specify what NOT to include"}},{"feature":"Examples in Prompt","values":{"Zero-Shot Prompting":"dog → canine, cat → feline, bird → ?, horse → ?","Few-Shot Prompting":"English: Dog, French: Chien. English: Cat, French:?","Chain-of-Thought (CoT)":"Solve this step by step: 15 + 27","Negative Prompting":"Exclusion examples"}},{"feature":"Complexity","values":{"Zero-Shot Prompting":"Simplest approach","Few-Shot Prompting":"Moderate complexity","Chain-of-Thought (CoT)":"Higher complexity, better reasoning","Negative Prompting":"Moderate - additive technique"}},{"feature":"Best Use Case","values":{"Zero-Shot Prompting":"Complex tasks, specific output formats, domain-specific patterns","Few-Shot Prompting":"Format-specific tasks, classification","Chain-of-Thought (CoT)":"Math, logic, multi-step reasoning","Negative Prompting":"Safety, content filtering, precision"}},{"feature":"Token Usage","values":{"Zero-Shot Prompting":"Low - minimal overhead for reasoning trigger","Few-Shot Prompting":"Higher (examples add tokens)","Chain-of-Thought (CoT)":"Highest (reasoning adds tokens)","Negative Prompting":"Moderate increase"}},{"feature":"Model Performance","values":{"Zero-Shot Prompting":"Good for simple tasks","Few-Shot Prompting":"Better accuracy than zero-shot","Chain-of-Thought (CoT)":"Best for reasoning tasks","Negative Prompting":"Reduces unwanted outputs"}},{"feature":"AWS Bedrock Support","values":{"Zero-Shot Prompting":"All models support","Few-Shot Prompting":"All models support","Chain-of-Thought (CoT)":"Claude, Llama support well","Negative Prompting":"Supported via guardrails"}},{"feature":"Risk Level","values":{"Zero-Shot Prompting":"May lack context","Few-Shot Prompting":"Token cost tradeoff","Chain-of-Thought (CoT)":"Higher latency","Negative Prompting":"May over-filter if excessive"}},{"feature":"Description","values":{"Zero-Shot Prompting":"Direct instructions without examples","Few-Shot Prompting":"Instructions with example input-output pairs","Chain-of-Thought":"Step-by-step reasoning before answer","System Prompting":"Context and role setting for behavior"}},{"feature":"Effectiveness","values":{"Zero-Shot Prompting":"Good for simple tasks","Few-Shot Prompting":"Better for specific formats","Chain-of-Thought":"Best for complex reasoning","System Prompting":"Improves overall consistency"}},{"feature":"Accuracy","values":{"Zero-shot Prompting":"Good for common tasks, varies for complex reasoning","Few-shot Prompting":"Generally higher accuracy due to pattern matching","Zero-shot CoT":"Improved reasoning without example overhead"}},{"feature":"Hallucination Risk","values":{"Zero-shot Prompting":"Moderate - relies entirely on training data","Few-shot Prompting":"Lower - examples anchor the model","Zero-shot CoT":"Moderate - reasoning may include incorrect steps"}}],"mnemonics":["ZERO-FEW-COT-NEG: Zero examples, FEW examples, Chain Of Thoughts, NEGative constraints","No examples? Zero-shot. Have examples? Few-shot. Need reasoning? Chain-of-thought. Want to avoid something? Negative prompting.","Z.F.C.Z - Zero has No examples, Few has Few, Chain shows steps, Zero-CoT is magic"],"exam_tips":["Zero-shot is the default - always start here before adding complexity","Few-shot improves accuracy but increases token costs significantly","Chain-of-thought is essential for multi-step reasoning problems","Use negative prompts to prevent hallucinations or unwanted content","Temperature affects creativity: lower (0-0.3) for factual, higher (0.7-1) for creative","Prompt templates help standardize and reuse effective prompts","For AIF-C01, know when to use each technique based on task complexity","Few-shot is preferred for complex or domain-specific tasks","Chain-of-thought significantly improves math and reasoning tasks","Zero-shot + CoT is a cost-effective alternative to few-shot for reasoning","Negative prompts can exclude unwanted content but work differently than regular prompts"],"sources":["aws_exam_comparison_tables[glm5-agent].json","aws_exam_comparison_tables[kimicode-v2].json","aws_exam_comparison_tables[minimax].json"]},{"title":"Pub/Sub Services Comparison: SNS Standard, SNS FIFO, EventBridge","title_variants":["Pub/Sub Services Comparison: SNS Standard, SNS FIFO, EventBridge"],"context":"AWS offers multiple publish-subscribe messaging services for event-driven architectures. SNS provides simple topic-based pub/sub with both standard and FIFO variants, while EventBridge offers sophisticated event routing with content-based filtering and integration with SaaS applications. Understanding their capabilities helps select the right service for fan-out patterns, event routing, and application integration.","columns":["SNS Standard Topics","SNS FIFO Topics","EventBridge (Default Bus)","EventBridge (Custom Bus)"],"rows":[{"feature":"Message Ordering","values":{"SNS Standard Topics":"Best-effort (no ordering guarantee)","SNS FIFO Topics":"Strict ordering within message groups","EventBridge (Default Bus)":"Best-effort ordering","EventBridge (Custom Bus)":"Best-effort ordering"}},{"feature":"Delivery Guarantee","values":{"SNS Standard Topics":"At-least-once delivery","SNS FIFO Topics":"Exactly-once delivery","EventBridge (Default Bus)":"At-least-once delivery","EventBridge (Custom Bus)":"At-least-once delivery"}},{"feature":"Throughput","values":{"SNS Standard Topics":"Nearly unlimited","SNS FIFO Topics":"300 msg/sec (3,000 with batching)","EventBridge (Default Bus)":"10,000 events/second (can increase)","EventBridge (Custom Bus)":"10,000 events/second (can increase)"}},{"feature":"Message Filtering","values":{"SNS Standard Topics":"Message attributes filtering (basic)","SNS FIFO Topics":"Message attributes filtering (basic)","EventBridge (Default Bus)":"Content-based filtering with JSON patterns","EventBridge (Custom Bus)":"Content-based filtering with JSON patterns"}},{"feature":"Event Sources","values":{"SNS Standard Topics":"AWS services, SDK, direct publish","SNS FIFO Topics":"AWS services, SDK, direct publish","EventBridge (Default Bus)":"AWS services only (CloudWatch, CodePipeline, etc.)","EventBridge (Custom Bus)":"AWS services, SDK, SaaS integrations, scheduled events"}},{"feature":"SaaS Integration","values":{"SNS Standard Topics":"Not supported","SNS FIFO Topics":"Not supported","EventBridge (Default Bus)":"Not supported","EventBridge (Custom Bus)":"Native integration (Datadog, Zendesk, etc.)"}},{"feature":"Scheduled Events","values":{"SNS Standard Topics":"Not supported (use EventBridge)","SNS FIFO Topics":"Not supported","EventBridge (Default Bus)":"Not supported","EventBridge (Custom Bus)":"Cron expressions and rate expressions supported"}},{"feature":"Archive & Replay","values":{"SNS Standard Topics":"Not supported","SNS FIFO Topics":"Not supported","EventBridge (Default Bus)":"Not supported","EventBridge (Custom Bus)":"Event archive and replay capability"}},{"feature":"Schema Registry","values":{"SNS Standard Topics":"Not supported","SNS FIFO Topics":"Not supported","EventBridge (Default Bus)":"Supported","EventBridge (Custom Bus)":"Supported"}},{"feature":"Cross-Region","values":{"SNS Standard Topics":"Within region (cross-region via replication)","SNS FIFO Topics":"Within region","EventBridge (Default Bus)":"Within region","EventBridge (Custom Bus)":"Cross-region event bus targets supported"}},{"feature":"DLQ Support","values":{"SNS Standard Topics":"SQS DLQ for failed deliveries","SNS FIFO Topics":"SQS FIFO DLQ for failed deliveries","EventBridge (Default Bus)":"SQS DLQ for failed rule invocations","EventBridge (Custom Bus)":"SQS DLQ for failed rule invocations"}},{"feature":"Primary Use Case","values":{"SNS Standard Topics":"Simple fan-out, SMS/email alerts, mobile push","SNS FIFO Topics":"Ordered fan-out to multiple subscribers","EventBridge (Default Bus)":"Reacting to AWS service events","EventBridge (Custom Bus)":"Complex event routing, SaaS integration, scheduled tasks"}}],"sources":["aws_exam_comparison_tables[kimi-agsw].json"]},{"title":"Public Subnet vs Private Subnet Comparison","title_variants":["Public Subnet vs Private Subnet Comparison"],"context":"This table compares public and private subnets in AWS VPC. Public subnets have direct internet access via an Internet Gateway, making them suitable for web-facing resources. Private subnets do not have direct internet access, providing enhanced security for backend resources like databases and application servers.","table_id":"subnet_types_comparison","relevant_exams":["SAA-C03"],"relevant_domains":{"SAA-C03":["Domain 1: Design Secure Architectures"]},"columns":["Public Subnet","Private Subnet"],"column_summaries":{"Public Subnet":"Subnet with a route to an Internet Gateway allowing direct inbound and outbound internet connectivity for resources like web servers and load balancers.","Private Subnet":"Subnet without a route to an Internet Gateway, isolating resources from direct internet access while allowing outbound connectivity via NAT Gateway if needed."},"rows":[{"feature":"Route to Internet","values":{"Public Subnet":"Yes (via Internet Gateway)","Private Subnet":"No (no IGW route)"}},{"feature":"Instance Types","values":{"Public Subnet":"Web servers, load balancers, bastion hosts","Private Subnet":"Database servers, backend servers, application servers"}},{"feature":"Security Groups","values":{"Public Subnet":"More open to allow inbound internet traffic","Private Subnet":"More restrictive, limited inbound access"}},{"feature":"IP Addressing","values":{"Public Subnet":"Instances can have public IPs","Private Subnet":"Instances use private IPs only"}},{"feature":"Outbound Internet","values":{"Public Subnet":"Direct via IGW","Private Subnet":"Via NAT Gateway (optional)"}},{"feature":"Accessibility","values":{"Public Subnet":"Accessible from internet (with security group rules)","Private Subnet":"Not directly accessible from internet"}},{"feature":"Use Cases","values":{"Public Subnet":"Hosting websites, public APIs, bastion hosts","Private Subnet":"Secure databases, backend services, internal apps"}},{"feature":"Security Level","values":{"Public Subnet":"Lower (exposed to internet)","Private Subnet":"Higher (isolated from internet)"}}],"sources":["aws_exam_comparison_tables[kimicode-v2].json"]},{"title":"Query Services Comparison","title_variants":["Query Services Comparison"],"context":"AWS offers multiple query services for analyzing data at different scales and performance requirements. Athena provides serverless SQL queries on S3 data, Redshift offers high-performance data warehousing with various node types and serverless options, Redshift Spectrum extends Redshift queries to S3 without loading data, and OpenSearch Service provides full-text search and log analytics capabilities. Understanding when to use each service is critical for the exam.","columns":["Athena","Redshift (RA3)","Redshift Serverless","Redshift Spectrum","OpenSearch Service"],"rows":[{"feature":"Service Type","values":{"Athena":"Serverless SQL query service","Redshift (RA3)":"Managed data warehouse (provisioned)","Redshift Serverless":"Serverless data warehouse (auto-scaling)","Redshift Spectrum":"Query extension for external S3 data","OpenSearch Service":"Managed search and analytics engine"}},{"feature":"Data Location","values":{"Athena":"S3 only (external tables)","Redshift (RA3)":"Managed storage + S3 (RA3 nodes)","Redshift Serverless":"Managed storage + S3","Redshift Spectrum":"S3 data queried from Redshift","OpenSearch Service":"Managed cluster storage"}},{"feature":"Query Language","values":{"Athena":"ANSI SQL (Presto/Trino-based)","Redshift (RA3)":"PostgreSQL-compatible SQL","Redshift Serverless":"PostgreSQL-compatible SQL","Redshift Spectrum":"PostgreSQL-compatible SQL","OpenSearch Service":"OpenSearch DSL, SQL (limited)"}},{"feature":"Performance","values":{"Athena":"Good for ad-hoc queries (seconds to minutes)","Redshift (RA3)":"Excellent (sub-second to seconds)","Redshift Serverless":"Excellent with auto-scaling","Redshift Spectrum":"Good (adds latency for S3)","OpenSearch Service":"Millisecond response for search"}},{"feature":"Pricing Model","values":{"Athena":"$5 per TB scanned","Redshift (RA3)":"Per-hour per node + storage","Redshift Serverless":"RPU-hours (compute) + storage","Redshift Spectrum":"$5 per TB scanned (like Athena)","OpenSearch Service":"Per-hour per instance + storage"}},{"feature":"Data Formats","values":{"Athena":"CSV, JSON, Parquet, ORC, Avro, Ion","Redshift (RA3)":"Native columnar format","Redshift Serverless":"Native columnar format","Redshift Spectrum":"Same as Athena (external formats)","OpenSearch Service":"JSON documents"}},{"feature":"Best Use Case","values":{"Athena":"Ad-hoc analysis, log analysis on S3","Redshift (RA3)":"High-performance BI, complex analytics","Redshift Serverless":"Variable workloads, dev/test","Redshift Spectrum":"Query cold data without ETL","OpenSearch Service":"Full-text search, log analytics, monitoring"}},{"feature":"Scalability","values":{"Athena":"Automatic (serverless)","Redshift (RA3)":"Manual (resize cluster)","Redshift Serverless":"Automatic (serverless)","Redshift Spectrum":"Automatic (serverless queries)","OpenSearch Service":"Manual (add nodes) or auto-scaling"}},{"feature":"Concurrency","values":{"Athena":"20 concurrent queries (soft limit)","Redshift (RA3)":"Up to 50 concurrent queries","Redshift Serverless":"Higher concurrency limits","Redshift Spectrum":"Shares Redshift concurrency","OpenSearch Service":"Depends on cluster size"}}],"sources":["aws_exam_comparison_tables[kimi-agsw].json"]},{"title":"Queue Services Comparison: SQS Standard vs FIFO Queue","title_variants":["Queue Services Comparison: SQS Standard vs FIFO Queue"],"context":"Amazon SQS (Simple Queue Service) offers two queue types designed for different messaging requirements. Standard queues provide maximum throughput with at-least-once delivery, while FIFO queues guarantee message ordering and exactly-once processing. Understanding when to use each is critical for exam scenarios involving decoupling, load balancing, and message processing requirements.","columns":["SQS Standard Queue","SQS FIFO Queue"],"rows":[{"feature":"Ordering Guarantee","values":{"SQS Standard Queue":"Best-effort ordering (messages may arrive out of order)","SQS FIFO Queue":"Strict first-in-first-out ordering guaranteed"}},{"feature":"Delivery Guarantee","values":{"SQS Standard Queue":"At-least-once delivery (messages may be delivered multiple times)","SQS FIFO Queue":"Exactly-once processing (no duplicate delivery)"}},{"feature":"Throughput","values":{"SQS Standard Queue":"Nearly unlimited throughput","SQS FIFO Queue":"300 messages/second (without batching), 3,000 msg/sec (with batching)"}},{"feature":"Message Deduplication","values":{"SQS Standard Queue":"Not supported","SQS FIFO Queue":"5-minute deduplication window using MessageDeduplicationId"}},{"feature":"Message Grouping","values":{"SQS Standard Queue":"Not supported","SQS FIFO Queue":"MessageGroupId for parallel processing of different groups"}},{"feature":"Pricing","values":{"SQS Standard Queue":"Pay per API request","SQS FIFO Queue":"Higher cost per API request"}},{"feature":"Visibility Timeout","values":{"SQS Standard Queue":"30 sec default, up to 12 hours","SQS FIFO Queue":"30 sec default, up to 12 hours"}},{"feature":"Message Retention","values":{"SQS Standard Queue":"1 minute to 14 days (default 4 days)","SQS FIFO Queue":"1 minute to 14 days (default 4 days)"}},{"feature":"Maximum Message Size","values":{"SQS Standard Queue":"256 KB (use S3 for larger payloads)","SQS FIFO Queue":"256 KB (use S3 for larger payloads)"}},{"feature":"Long Polling","values":{"SQS Standard Queue":"Supported (1-20 seconds)","SQS FIFO Queue":"Supported (1-20 seconds)"}},{"feature":"Dead Letter Queue (DLQ)","values":{"SQS Standard Queue":"Supported","SQS FIFO Queue":"Supported (DLQ must also be FIFO)"}},{"feature":"Use Cases","values":{"SQS Standard Queue":"Decoupling, load balancing, background jobs, scalable processing","SQS FIFO Queue":"Bank transactions, order processing, stock trades, price updates"}}],"sources":["aws_exam_comparison_tables[kimi-agsw].json"]},{"title":"RAG Architecture Components Comparison","title_variants":["RAG Architecture Components Comparison"],"description":"Comparison of vector store options and RAG implementation components on AWS","category":"AI_GENERATIVE_AI_CONCEPTS","columns":["Amazon OpenSearch Service","Amazon Aurora","Amazon Neptune","Amazon DocumentDB"],"column_summaries":{"Amazon OpenSearch Service":"A managed search service that supports vector search capabilities, commonly used for RAG implementations requiring full-text search combined with semantic search.","Amazon Aurora":"A relational database compatible with MySQL and PostgreSQL that supports vector storage and search through pgvector extension for AI applications.","Amazon Neptune":"A managed graph database service that supports vector search for knowledge graphs and relationship-based AI applications.","Amazon DocumentDB":"A MongoDB-compatible document database that supports vector search for storing and querying embedded documents in AI applications."},"rows":[{"feature":"Database Type","values":{"Amazon OpenSearch Service":"Search engine with vector support (k-NN plugin)","Amazon Aurora":"Relational (PostgreSQL/MySQL compatible) with pgvector","Amazon Neptune":"Graph database (Property Graph and RDF)","Amazon DocumentDB":"Document database (MongoDB compatible)"}},{"feature":"Vector Search Method","values":{"Amazon OpenSearch Service":"k-NN search with HNSW or IVF algorithms","Amazon Aurora":"pgvector extension with HNSW and IVFFlat","Amazon Neptune":"ML-based graph queries with vector similarity","Amazon DocumentDB":"Vector search index using $vectorSearch"}},{"feature":"Primary Use Case","values":{"Amazon OpenSearch Service":"Full-text + semantic search, log analysis, RAG","Amazon Aurora":"Traditional apps needing vector search, hybrid queries","Amazon Neptune":"Knowledge graphs, recommendations, fraud detection","Amazon DocumentDB":"Flexible schema documents, content management with AI"}},{"feature":"Scaling","values":{"Amazon OpenSearch Service":"Auto scaling with proper instance sizing","Amazon Aurora":"Auto scaling storage, compute scaling manual","Amazon Neptune":"Serverless option available, scaling similar to Aurora","Amazon DocumentDB":"Auto scaling with instantaneous flexibility"}},{"feature":"Integration with Bedrock","values":{"Amazon OpenSearch Service":"Native support in Bedrock Knowledge Bases","Amazon Aurora":"Native support in Bedrock Knowledge Bases","Amazon Neptune":"Native support in Bedrock Knowledge Bases","Amazon DocumentDB":"Native support in Bedrock Knowledge Bases"}},{"feature":"Best For RAG When","values":{"Amazon OpenSearch Service":"Need combined keyword and semantic search","Amazon Aurora":"Already using PostgreSQL, need relational + vector","Amazon Neptune":"Data has complex relationships to traverse","Amazon DocumentDB":"Working with JSON-like document data"}},{"feature":"Cost Considerations","values":{"Amazon OpenSearch Service":"Cluster costs + storage; good for search-heavy workloads","Amazon Aurora":"Similar to RDS pricing + vector storage overhead","Amazon Neptune":"Higher cost for graph processing capability","Amazon DocumentDB":"Serverless option for cost optimization"}}],"mnemonics":["O.A.N.D - OpenSearch for comprehensive search, Aurora for relational, Neptune for network relationships, DocumentDB for documents"],"exam_tips":["All four services support Bedrock Knowledge Bases for RAG implementations","Choose based on existing data structure and query patterns","OpenSearch is preferred for pure RAG workloads with full-text requirements","Aurora pgvector is best when you need SQL queries + vector search","Neptune excels when relationships between data points matter for AI responses"],"sources":["aws_exam_comparison_tables[minimax].json"]},{"title":"RAG vs Fine-Tuning vs Prompt Engineering vs Pre-Training","title_variants":["RAG vs Fine-Tuning vs Prompt Engineering vs Pre-Training"],"context":"This is the MOST WEIGHTED domain and this table covers its core concept: how do you customize or improve a foundation model's output? There are four main strategies, each with different cost, complexity, and use-case profiles. The exam heavily tests your ability to choose the RIGHT approach for a given business scenario.","exam":"AIF-C01","domain":"Domain 3: Applications of Foundation Models","domain_weight":"28%","table_id":"AIF-006","columns":["Prompt Engineering","In-Context Learning (Few-Shot)","Retrieval Augmented Generation (RAG)","Fine-Tuning"],"column_summaries":{"Prompt Engineering":"Prompt engineering is the craft of writing better input instructions to get better outputs from an FM — no model changes required. Think of it as 'learning to ask better questions.' It is the fastest, cheapest, and simplest customization approach and should always be tried first.","In-Context Learning (Few-Shot)":"In-context learning provides examples directly inside the prompt (zero-shot, one-shot, or few-shot) so the model learns the pattern from the examples you give it at inference time — no training or retraining ne
