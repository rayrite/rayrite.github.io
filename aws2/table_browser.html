 1: Design Secure Architectures","Domain 3: Design High-Performing Architectures","Domain 4: Design Cost-Optimized Architectures"],"AIF-C01":["Domain 5: Security, Compliance, and Governance"]},"columns":["Amazon S3","Amazon EBS","Amazon EFS","Amazon S3 Glacier"],"column_summaries":{"Amazon S3":"An object storage service offering industry-leading scalability, data availability, security, and performance. Stores unlimited objects up to 5TB each, accessible via HTTP/HTTPS APIs, with multiple storage classes for different access patterns and lifecycle policies.","Amazon EBS":"A block storage service providing persistent storage volumes for EC2 instances. Offers high performance with up to 256,000 IOPS and 4,000 MB/s throughput, tied to a specific Availability Zone, ideal for boot volumes, databases, and applications requiring low-latency block access.","Amazon EFS":"A fully managed elastic file system that automatically grows and shrinks as files are added and removed. Supports Network File System (NFS) protocol for concurrent access from multiple EC2 instances across AZs, ideal for shared file workloads and lift-and-shift migrations.","Amazon S3 Glacier":"A secure, durable, and low-cost storage class for data archiving and long-term backup. Offers three retrieval options (Instant Retrieval, Flexible Retrieval, Deep Archive) to balance cost and access speed, with 99.999999999% durability and comprehensive compliance features."},"rows":[{"feature":"Storage Type","values":{"Amazon S3":"File Storage (Various Protocols)","Amazon EBS":"Block storage","Amazon EFS":"File storage (NFS)","Amazon S3 Glacier":"Object storage (archive)"}},{"feature":"Access Method","values":{"Amazon S3":"HTTP/HTTPS via API","Amazon EBS":"Attached to EC2 instances","Amazon EFS":"Mount to multiple instances","Amazon S3 Glacier":"HTTP/HTTPS (with retrieval delay)"}},{"feature":"Availability","values":{"Amazon S3":"Virtually unlimited","Amazon EBS":"Up to 64 TB per volume","Amazon EFS":"Automatic, petabyte-scale","Amazon S3 Glacier":"Virtually unlimited"}},{"feature":"Multi-AZ/AZ-specific","values":{"Amazon S3":"Multi-AZ by default","Amazon EBS":"AZ-specific","Amazon EFS":"Multi-AZ by default","Amazon S3 Glacier":"Multi-AZ by default"}},{"feature":"Performance","values":{"Amazon S3":"High throughput, variable latency","Amazon EBS":"Up to 256,000 IOPS, low latency","Amazon EFS":"Low latency, concurrent access","Amazon S3 Glacier":"Retrieval from minutes to hours"}},{"feature":"Use Cases","values":{"Amazon S3":"Backups, archives, static websites, big data, ML data lakes","Amazon EBS":"Databases, boot volumes, transactional workloads","Amazon EFS":"Content management, shared storage, DevOps, ML training data","Amazon S3 Glacier":"Long-term archival, compliance"}},{"feature":"Pricing Model","values":{"Amazon S3":"Per GB stored + requests + data transfer","Amazon EBS":"Per GB provisioned + IOPS (if provisioned)","Amazon EFS":"Per GB used (pay-as-you-grow)","Amazon S3 Glacier":"Instant, Flexible, Deep Archive"}},{"feature":"Durability","values":{"Amazon S3":"High (replicated within AZ/backup)","Amazon EBS":"99.8% - 99.9% (replicated within AZ)","Amazon EFS":"High (replicated across AZs)","Amazon S3 Glacier":"99.999999999% (11 9s)"}},{"feature":"Encryption","values":{"Amazon S3":"SSE-S3, SSE-KMS, SSE-C","Amazon EBS":"EBS encryption (KMS)","Amazon EFS":"Encryption at rest (KMS)","Amazon S3 Glacier":"Same as S3"}},{"feature":"Access Pattern","values":{"Amazon S3":"REST API, SDK, Console","Amazon EBS":"Attached to single EC2 instance","Amazon EFS":"Multiple EC2 instances simultaneously","Amazon FSx":"Native protocol access (SMB, NFS)"}},{"feature":"Latency","values":{"Amazon S3":"Milliseconds (object retrieval)","Amazon EBS":"Sub-millisecond to single-digit ms","Amazon EFS":"Low latency (file operations)","Amazon FSx":"Ultra-low (Lustre) to low"}}],"mnemonics":["S3 = Simple Storage Service, EBS = Elastic Block Store, EFS = Elastic File System, Glacier = Cold storage","Need object storage? S3. Need boot volume or block storage? EBS. Need shared file storage? EFS. Need long-term archive? Glacier."],"exam_tips":["S3 is object storage - accessed via API, not mounted","EBS is AZ-specific - cannot attach across AZs","EFS is the only service that allows concurrent access from multiple instances","Glacier retrieval times: Instant (milliseconds), Flexible (3-5 hours), Deep (12-48 hours)","S3 Standard-IA has retrieval costs - use for infrequent access","EFS is POSIX-compliant, works with Linux-based applications"],"sources":["aws_exam_comparison_tables[glm5-agent].json","aws_exam_comparison_tables[kimicode-v1].json","aws_exam_comparison_tables[kimicode-v2].json"]},{"title":"AWS VPC Networking Components","title_variants":["AWS VPC Networking Components","AWS VPC Networking Components Comparison"],"context":"This table compares key VPC networking components for connecting AWS resources to each other and to the internet or on-premises networks. Understanding these components is critical for designing secure and scalable network architectures.","table_id":"SAA-006","relevant_exams":["SAA-C03"],"relevant_domains":{"SAA-C03":["Domain 1: Design Secure Architectures","Domain 2: Design Resilient Architectures"]},"columns":["Security Groups","Network ACLs (NACLs)","Route Tables","NAT Gateway","VPC Peering","PrivateLink"],"column_summaries":{"Security Groups":"A virtual firewall at the instance level that controls inbound and outbound traffic. Stateful - return traffic is automatically allowed regardless of rules. Can only specify allow rules and can reference other security groups as sources/destinations.","Network ACLs (NACLs)":"An optional layer of security at the subnet level that acts as a firewall for controlling traffic in and out of subnets. Stateless - requires explicit allow rules for both directions. Processed in order from lowest to highest rule number.","Route Tables":"A set of rules (routes) that determine where network traffic from a subnet or gateway is directed. Each route specifies a destination CIDR and a target (gateway, instance, VPC peering connection, etc.). Uses longest prefix match for route selection.","NAT Gateway":"A managed Network Address Translation service that enables instances in private subnets to connect to the internet while preventing the internet from initiating connections with those instances. Highly available within an Availability Zone.","VPC Peering":"Networking connection between two VPCs that enables routing traffic using private IP addresses, but is non-transitive (no transitive routing through hub).","PrivateLink":"Technology that provides private connectivity between VPCs, AWS services, and on-premises networks without traversing the public internet."},"rows":[{"feature":"Layer","values":{"Security Groups":"Instance-level (Layer 4-7)","Network ACLs (NACLs)":"Subnet-level (Layer 3-4)","Route Tables":"Subnet-level routing","NAT Gateway":"Subnet-level NAT"}},{"feature":"State","values":{"Security Groups":"Stateful (return traffic auto-allowed)","Network ACLs (NACLs)":"Stateless (explicit allow)","Route Tables":"N/A - routing only","NAT Gateway":"N/A"}},{"feature":"Rule Evaluation","values":{"Security Groups":"All rules evaluated","Network ACLs (NACLs)":"Process in order (lowest to highest)","Route Tables":"Longest prefix match","NAT Gateway":"N/A"}},{"feature":"Allow/Deny","values":{"Security Groups":"Allow rules only","Network ACLs (NACLs)":"Allow and deny rules","Route Tables":"N/A - routing only","NAT Gateway":"N/A"}},{"feature":"Default Behavior","values":{"Security Groups":"Deny all inbound, allow all outbound","Network ACLs (NACLs)":"Allow all traffic (modifiable)","Route Tables":"Local + main route table","NAT Gateway":"N/A"}},{"feature":"Connectivity Scope","values":{"Security Groups":"ENI/instance","Network ACLs (NACLs)":"Subnet","Route Tables":"Subnet or VPC","NAT Gateway":"Multiple VPCs, VPN, Direct Connect","VPC Peering":"VPC to VPC (same or different account/region)","PrivateLink":"Private access to services across VPCs"}},{"feature":"Associations","values":{"Security Groups":"Multiple SGs per instance","Network ACLs (NACLs)":"One NACL per subnet","Route Tables":"One route table per subnet","NAT Gateway":"One NAT per AZ"}},{"feature":"Use Cases","values":{"Security Groups":"Instance-level firewall","Network ACLs (NACLs)":"Subnet-level firewall","Route Tables":"Traffic routing","NAT Gateway":"Private subnet instances needing internet access","VPC Peering":"Two VPCs needing direct connection","PrivateLink":"Private SaaS access, service exposure"}},{"feature":"Cost Model","values":{"Security Groups":"Free","Network ACLs (NACLs)":"Free","Route Tables":"Free","NAT Gateway":"Per-hour attachment + data processing","VPC Peering":"Data transfer charges only","PrivateLink":"Per-hour interface endpoint + data processing"}},{"feature":"Traffic Direction","values":{"Internet Gateway (IGW)":"Bidirectional (inbound and outbound)","NAT Gateway":"Outbound only (from private subnet)","VPC Peering":"Bidirectional (between peered VPCs)","Transit Gateway":"Bidirectional (hub-and-spoke)","PrivateLink":"Service provider to consumer (unidirectional)"}},{"feature":"Transitive Routing","values":{"Internet Gateway (IGW)":"N/A","NAT Gateway":"N/A","VPC Peering":"No (non-transitive)","Transit Gateway":"Yes (transitive)","PrivateLink":"N/A"}},{"feature":"IP Addressing","values":{"Internet Gateway (IGW)":"Public IP required for instances","NAT Gateway":"Uses Elastic IP; instances use private IPs","VPC Peering":"Private IP communication","Transit Gateway":"Private IP communication","PrivateLink":"Private IP within consumer VPC"}},{"feature":"Bandwidth","values":{"Internet Gateway (IGW)":"High (no bottleneck)","NAT Gateway":"Up to 100 Gbps","VPC Peering":"No bandwidth limit (AWS backbone)","Transit Gateway":"Up to 100 Gbps per attachment","PrivateLink":"High (AWS backbone)"}},{"feature":"High Availability","values":{"Internet Gateway (IGW)":"Built-in redundancy","NAT Gateway":"AZ-specific (deploy in multiple AZs for HA)","VPC Peering":"AWS backbone redundancy","Transit Gateway":"Built-in redundancy across AZs","PrivateLink":"Built-in redundancy"}}],"mnemonics":["SG = Stateful Guard (instance), NACL = Network Access Control List (subnet), RT = Route Table, NAT = Network Address Translation","Need instance-level security? Security Groups. Need subnet-level protection? NACLs. Need to route traffic? Route tables. Need internet from private subnet? NAT Gateway."],"exam_tips":["Security Groups are stateful - you only need to allow inbound, outbound is automatic","NACLs are stateless - you must explicitly allow both directions","Security Groups can only have ALLOW rules (no DENY)","NACLs have numbered rules processed in order","NAT Gateway is required for private subnet instances to access internet","Security Groups reference other security groups for inter-service communication"],"sources":["aws_exam_comparison_tables[glm5-agent].json","aws_exam_comparison_tables[kimicode-v1].json","aws_exam_comparison_tables[kimicode-v2].json"]},{"title":"AWS Vector Database Services for RAG Applications","title_variants":["AWS Vector Database Services for RAG Applications"],"context":"Comparing AWS vector database options for Retrieval Augmented Generation (RAG) - critical for Domain 3 (Applications of Foundation Models)","table_id":"AIF-002","columns":["Amazon OpenSearch Service","Amazon Aurora PostgreSQL","Amazon Neptune","Amazon DocumentDB"],"column_summaries":{"Amazon OpenSearch Service":"A fully managed service providing vector database capabilities through its k-NN plugin, ideal for RAG applications requiring both vector similarity search and traditional full-text search. Supports up to 16,000 dimensions with approximate nearest neighbor algorithms for fast retrieval.","Amazon Aurora PostgreSQL":"A PostgreSQL-compatible relational database with the pgvector extension for vector similarity search. Best for organizations with existing Aurora workloads that need to add vector capabilities without managing a separate vector database.","Amazon Neptune":"A fully managed graph database service with vector search capabilities, enabling hybrid queries that combine graph traversals with vector similarity. Ideal for knowledge graphs where entity relationships enhance retrieval context.","Amazon DocumentDB":"A MongoDB-compatible document database with vector search capabilities, suitable for applications already using document-based data models that need to add semantic search functionality."},"rows":[{"feature":"Primary Use Case","values":{"Amazon OpenSearch Service":"Vector search + full-text search + analytics","Amazon Aurora PostgreSQL":"Relational + vector similarity search","Amazon Neptune":"Graph database + vector search","Amazon DocumentDB":"Document database + vector search"}},{"feature":"Vector Engine","values":{"Amazon OpenSearch Service":"Native vector engine (k-NN plugin)","Amazon Aurora PostgreSQL":"pgvector extension","Amazon Neptune":"Vector search for graph data","Amazon DocumentDB":"Vector search extension"}},{"feature":"Scalability","values":{"Amazon OpenSearch Service":"Auto-scaling, serverless option","Amazon Aurora PostgreSQL":"Aurora Serverless v2, read replicas","Amazon Neptune":"Auto-scaling storage","Amazon DocumentDB":"Auto-scaling storage"}},{"feature":"Max Dimensions","values":{"Amazon OpenSearch Service":"16,000 dimensions","Amazon Aurora PostgreSQL":"2,000 dimensions (pgvector)","Amazon Neptune":"16,000 dimensions","Amazon DocumentDB":"2,048 dimensions"}},{"feature":"Query Performance","values":{"Amazon OpenSearch Service":"Sub-second, approximate k-NN","Amazon Aurora PostgreSQL":"Exact and approximate search","Amazon Neptune":"Graph + vector hybrid queries","Amazon DocumentDB":"Document + vector hybrid queries"}},{"feature":"Integration with Bedrock","values":{"Amazon OpenSearch Service":"Knowledge Bases native support","Amazon Aurora PostgreSQL":"Via RAG custom implementation","Amazon Neptune":"Graph-enhanced RAG","Amazon DocumentDB":"MongoDB-compatible RAG"}},{"feature":"Best For","values":{"Amazon OpenSearch Service":"General RAG with search requirements","Amazon Aurora PostgreSQL":"Existing Aurora workloads needing vectors","Amazon Neptune":"Knowledge graphs with vector search","Amazon DocumentDB":"Document workloads with vector needs"}},{"feature":"Pricing Model","values":{"Amazon OpenSearch Service":"Per hour + storage + requests","Amazon Aurora PostgreSQL":"Per hour + I/O + storage","Amazon Neptune":"Per hour + storage + requests","Amazon DocumentDB":"Per hour + I/O + storage"}}],"mnemonics":["OPEN-AUR-NEP-DOC: OpenSearch for Everything, Aurora for Relational, Neptune for Graphs, DocumentDB for Documents","Need full-text search with vectors? OpenSearch. Already using PostgreSQL? Aurora + pgvector. Building knowledge graphs? Neptune. MongoDB compatibility needed? DocumentDB."],"exam_tips":["OpenSearch Service is the most common choice for RAG with Knowledge Bases for Bedrock","pgvector is the extension name for vector support in PostgreSQL/Aurora","Neptune is ideal when you need to combine graph relationships with vector similarity","OpenSearch supports the highest dimension count (16,000)","Aurora Serverless v2 can auto-scale for variable RAG workloads","For RAG: Embedding model creates vectors → Vector DB stores them → Retrieved for LLM context"],"sources":["aws_exam_comparison_tables[glm5-agent].json"]},{"title":"Amazon Bedrock vs Amazon SageMaker","title_variants":["Amazon Bedrock vs Amazon SageMaker"],"description":"Comparison of AWS's primary AI/ML platforms for building generative AI and machine learning applications","category":"AI_ML_PLATFORM_SERVICES","columns":["Amazon Bedrock","Amazon SageMaker"],"column_summaries":{"Amazon Bedrock":"A fully managed service that provides access to foundation models from multiple AI providers through a unified API, enabling rapid development of generative AI applications without managing infrastructure.","Amazon SageMaker":"A comprehensive machine learning platform that provides everything needed to build, train, and deploy ML models at scale, from data preparation to model hosting."},"rows":[{"feature":"Primary Use Case","values":{"Amazon Bedrock":"Building generative AI applications using pre-trained foundation models (FMs) via API","Amazon SageMaker":"Building custom ML models from scratch, including training and deployment"}},{"feature":"Model Access","values":{"Amazon Bedrock":"Access to multiple third-party FMs (Anthropic, Meta, Cohere, AI21, Mistral) plus AWS Titan models","Amazon SageMaker":"Build custom models or use pre-built algorithms; bring your own model architecture"}},{"feature":"Customization Options","values":{"Amazon Bedrock":"Fine-tuning, RAG (Retrieval Augmented Generation), and agents for multi-step tasks","Amazon SageMaker":"Full customization including custom training jobs, hyperparameter tuning, and feature engineering"}},{"feature":"Infrastructure Management","values":{"Amazon Bedrock":"Fully serverless; AWS manages all underlying infrastructure","Amazon SageMaker":"Managed infrastructure but more control over compute resources, instance types, and training configurations"}},{"feature":"Ease of Use","values":{"Amazon Bedrock":"9/10 - Simple API access, playground environments, quick time to deployment","Amazon SageMaker":"6/10 - Steeper learning curve but comprehensive capabilities for advanced users"}},{"feature":"Knowledge Bases","values":{"Amazon Bedrock":"Built-in knowledge bases with vector store integration for RAG workloads","Amazon SageMaker":"SageMaker Canvas for no-code ML; JumpStart for pre-trained models"}},{"feature":"Guardrails & Safety","values":{"Amazon Bedrock":"Native guardrails for content filtering, topic constraints, and word filters","Amazon SageMaker":"Requires custom implementation of safety measures in model training/deployment"}},{"feature":"Cost Model","values":{"Amazon Bedrock":"Pay-per-token or per-invocation pricing; no upfront costs","Amazon SageMaker":"Pay for compute resources (instances) used during training and hosting"}},{"feature":"Typical Exam Scenario","values":{"Amazon Bedrock":"Questions about choosing FM access methods, RAG implementation, prompt engineering","Amazon SageMaker":"Questions about ML pipelines, model training, feature stores, model monitoring"}}],"mnemonics":["B.R.E.D - Bedrock is for Easy Deployment of generative AI; S.A.G.E - SageMaker is for Advanced GEnerative (and traditional) ML"],"exam_tips":["Use Bedrock when you need quick access to LLMs without managing infrastructure","Use SageMaker when you need to build custom ML models or have specific compliance requirements","Bedrock supports RAG out-of-the-box with its Knowledge Bases feature","SageMaker Clarify helps detect bias in ML models (relevant for Responsible AI domain)","For the AIF-C01 exam, Bedrock features (agents, knowledge bases, guardrails) are high-value topics"],"sources":["aws_exam_comparison_tables[minimax].json"]},{"title":"Amazon Bedrock vs SageMaker JumpStart vs Amazon Q","title_variants":["Amazon Bedrock vs SageMaker JumpStart vs Amazon Q"],"context":"This is the most heavily tested area for the AIF-C01. These three services are ALL related to Generative AI on AWS, but they serve very different audiences and purposes. The exam will describe a scenario and expect you to select the right service. Bedrock = managed Gen AI platform for building apps. JumpStart = ML model hub for training/deploying. Amazon Q = ready-to-use AI assistant.","exam":"AIF-C01","domain":"Domain 2: Fundamentals of Generative AI","domain_weight":"24%","table_id":"AIF-005","columns":["Amazon Bedrock","Amazon SageMaker JumpStart","Amazon Q"],"column_summaries":{"Amazon Bedrock":"Amazon Bedrock is a fully managed service that gives you access to a curated selection of foundation models (FMs) from AWS and third-party providers (Anthropic, AI21, Cohere, Meta, Stability AI) through a single API — no infrastructure to manage. It is the go-to platform for building custom Gen AI applications on AWS.","Amazon SageMaker JumpStart":"JumpStart is a model hub built into SageMaker that provides pre-trained open-source models (from Hugging Face, TensorFlow Hub, etc.) that you can deploy or fine-tune with a few clicks. It is more hands-on than Bedrock — aimed at ML practitioners who want to fine-tune or adapt models.","Amazon Q":"Amazon Q is a fully deployed, ready-to-use Gen AI assistant that requires NO development — it is plugged in to your data sources (S3, SharePoint, Confluence) and immediately answers questions about your business. Think of it as 'Gen AI with no code required' for business users."},"rows":[{"feature":"Primary User","values":{"Amazon Bedrock":"Developers building Gen AI apps","Amazon SageMaker JumpStart":"ML practitioners / data scientists","Amazon Q":"Business users / non-technical staff"}},{"feature":"Coding Required?","values":{"Amazon Bedrock":"Yes — API calls to build applications","Amazon SageMaker JumpStart":"Yes — SageMaker SDK and configuration","Amazon Q":"No — plug-and-play assistant"}},{"feature":"Model Source","values":{"Amazon Bedrock":"Curated FMs: Anthropic Claude, Meta Llama, Cohere, AI21, Mistral, Amazon Titan","Amazon SageMaker JumpStart":"Open-source models: Hugging Face, LLaMA, Falcon, etc.","Amazon Q":"AWS-managed models (internal, not user-selectable)"}},{"feature":"Key Capability","values":{"Amazon Bedrock":"RAG (Knowledge Bases), Agents, Guardrails, Fine-tuning","Amazon SageMaker JumpStart":"Fine-tune and deploy open-source models at scale","Amazon Q":"Answer questions from connected business data sources"}},{"feature":"Customization Level","values":{"Amazon Bedrock":"High — RAG, fine-tuning, agents, prompt engineering","Amazon SageMaker JumpStart":"Very High — full model training and customization","Amazon Q":"Low — configure data sources and permissions only"}},{"feature":"Infrastructure Management","values":{"Amazon Bedrock":"None — fully serverless","Amazon SageMaker JumpStart":"Some — instances deployed for endpoints","Amazon Q":"None — fully managed SaaS"}},{"feature":"Pricing Model","values":{"Amazon Bedrock":"Token-based (pay per input/output token) OR Provisioned Throughput","Amazon SageMaker JumpStart":"Instance hours for endpoints","Amazon Q":"Per-user subscription"}},{"feature":"RAG Support","values":{"Amazon Bedrock":"Yes — Bedrock Knowledge Bases (native RAG)","Amazon SageMaker JumpStart":"Must build manually","Amazon Q":"Yes — indexes business documents automatically"}}],"sources":["aws_exam_comparison_tables[sonnet46].json"]},{"title":"Amazon Comprehend vs Amazon Lex vs Amazon Polly vs Amazon Transcribe","title_variants":["Amazon Comprehend vs Amazon Lex vs Amazon Polly vs Amazon Transcribe"],"description":"Comparison of AWS natural language processing services for text analysis, chatbots, speech synthesis, and speech recognition","category":"AI_NLP_SERVICES","columns":["Amazon Comprehend","Amazon Lex","Amazon Polly","Amazon Transcribe"],"column_summaries":{"Amazon Comprehend":"A natural language processing (NLP) service that uses machine learning to extract insights from text, including sentiment analysis, entity recognition, and topic modeling.","Amazon Lex":"A service for building conversational interfaces (chatbots and voice bots) using the same conversational engine that powers Amazon Alexa.","Amazon Polly":"A text-to-speech service that converts text into natural-sounding speech using deep learning technologies.","Amazon Transcribe":"An automatic speech recognition (ASR) service that converts speech to text with support for multiple languages and specialized vocabularies."},"rows":[{"feature":"Function","values":{"Amazon Comprehend":"Text analysis - extracts insights, sentiment, entities from written text","Amazon Lex":"Conversational AI - builds chatbots and voice interfaces","Amazon Polly":"Text-to-Speech (TTS) - converts text to natural speech","Amazon Transcribe":"Speech-to-Text (STT) - converts speech to written text"}},{"feature":"Input Type","values":{"Amazon Comprehend":"Text documents, emails, social media posts","Amazon Lex":"User text or voice inputs in conversational format","Amazon Polly":"Plain text or Speech Synthesis Markup Language (SSML)","Amazon Transcribe":"Audio files (MP3, WAV) or streaming audio"}},{"feature":"Output Type","values":{"Amazon Comprehend":"Insights, sentiment scores, entity lists, key phrases","Amazon Lex":"Conversational responses, intent fulfillment","Amazon Polly":"Audio stream (MP3, OGG, PCM formats)","Amazon Transcribe":"Text transcripts with timestamps"}},{"feature":"Customization","values":{"Amazon Comprehend":"Custom entity recognition, custom classification models","Amazon Lex":"Custom intents, slot types, Lambda integrations","Amazon Polly":"Custom neural voices, pronunciation lexicons","Amazon Transcribe":"Custom vocabulary, channel identification, speaker diarization"}},{"feature":"Use Case Example","values":{"Amazon Comprehend":"Analyzing customer feedback for sentiment and key issues","Amazon Lex":"Building a customer service chatbot or IVR system","Amazon Polly":"Creating voice responses for accessibility applications","Amazon Transcribe":"Transcribing customer service calls for analysis"}},{"feature":"Serverless","values":{"Amazon Comprehend":"Yes - fully managed, pay-per-use","Amazon Lex":"Yes - pay-per-request pricing","Amazon Polly":"Yes - pay-per-character pricing","Amazon Transcribe":"Yes - pay-per-minute pricing"}},{"feature":"Real-time Support","values":{"Amazon Comprehend":"Async batch processing primarily; real-time via API","Amazon Lex":"Yes - designed for real-time conversations","Amazon Polly":"Yes - low-latency speech synthesis","Amazon Transcribe":"Both batch and streaming (real-time) modes available"}}],"mnemonics":["C.L.P.T - Comprehend reads text, Lex talks, Polly speaks, Transcribe listens"],"exam_tips":["Comprehend is for understanding text; Lex is for creating conversational bots","Polly and Transcribe work together for voice-enabled applications","For chatbots, Lex provides the conversation engine while Lambda handles business logic","Comprehend Medical is a specialized version for healthcare text analysis (out of scope for AIF but relevant for SAA healthcare scenarios)"],"sources":["aws_exam_comparison_tables[minimax].json"]},{"title":"Amazon ECS vs Amazon EKS Comparison","title_variants":["Amazon ECS vs Amazon EKS Comparison"],"context":"This table compares AWS container orchestration services. ECS is AWS-native and deeply integrated with AWS services, while EKS provides managed Kubernetes for portability and ecosystem compatibility.","table_id":"ecs_eks_comparison","relevant_exams":["SAA-C03"],"relevant_domains":{"SAA-C03":["Domain 2: Design Resilient Architectures"]},"columns":["Amazon ECS","Amazon EKS"],"column_summaries":{"Amazon ECS":"Fully managed container orchestration service native to AWS that simplifies running Docker containers with deep AWS integration and minimal configuration.","Amazon EKS":"Managed Kubernetes service that makes it easy to run Kubernetes on AWS without managing the control plane, offering full Kubernetes compatibility."},"rows":[{"feature":"Orchestration Platform","values":{"Amazon ECS":"AWS-native (proprietary)","Amazon EKS":"Kubernetes (open source)"}},{"feature":"Control Plane","values":{"Amazon ECS":"Fully managed by AWS","Amazon EKS":"Managed Kubernetes control plane"}},{"feature":"Learning Curve","values":{"Amazon ECS":"Lower (AWS-specific concepts)","Amazon EKS":"Steeper (Kubernetes knowledge required)"}},{"feature":"Portability","values":{"Amazon ECS":"AWS-only","Amazon EKS":"Multi-cloud (standard Kubernetes)"}},{"feature":"AWS Integration","values":{"Amazon ECS":"Deep integration (IAM, CloudWatch, ALB)","Amazon EKS":"Good integration via add-ons"}},{"feature":"Ecosystem","values":{"Amazon ECS":"AWS ecosystem","Amazon EKS":"Large Kubernetes ecosystem"}},{"feature":"Scaling","values":{"Amazon ECS":"ECS Service Auto Scaling","Amazon EKS":"Kubernetes-native scaling (HPA, VPA)"}},{"feature":"Use Cases","values":{"Amazon ECS":"AWS-native workloads, simpler container deployments","Amazon EKS":"Multi-cloud portability, complex Kubernetes apps"}}],"sources":["aws_exam_comparison_tables[kimicode-v2].json"]},{"title":"Amazon Q Business vs Amazon Q Developer Comparison","title_variants":["Amazon Q Business vs Amazon Q Developer Comparison"],"context":"This table compares the two Amazon Q services. Amazon Q Business is a generative AI assistant for enterprise use cases grounded in company data, while Amazon Q Developer assists software developers with coding, testing, and infrastructure optimization.","table_id":"amazon_q_comparison","relevant_exams":["AIF-C01"],"relevant_domains":{"AIF-C01":["Domain 3: Applications of Foundation Models"]},"columns":["Amazon Q Business","Amazon Q Developer"],"column_summaries":{"Amazon Q Business":"Generative AI-powered assistant designed for enterprise employees to get answers, summaries, and insights from company data sources while respecting existing access permissions.","Amazon Q Developer":"AI-powered assistant for software developers that helps with coding, debugging, testing, upgrading applications, and optimizing AWS resources."},"rows":[{"feature":"Target Audience","values":{"Amazon Q Business":"Business users, knowledge workers","Amazon Q Developer":"Software developers, DevOps engineers"}},{"feature":"Primary Use Case","values":{"Amazon Q Business":"Search company data, generate content, answer business questions","Amazon Q Developer":"Code generation, debugging, infrastructure optimization"}},{"feature":"Data Sources","values":{"Amazon Q Business":"S3, SharePoint, Confluence, Salesforce, databases","Amazon Q Developer":"IDE context, AWS documentation, code repositories"}},{"feature":"Integration Points","values":{"Amazon Q Business":"Web interface, Slack, Microsoft Teams","Amazon Q Developer":"VS Code, IntelliJ, AWS Console, command line"}},{"feature":"Security Model","values":{"Amazon Q Business":"Respects existing data access permissions","Amazon Q Developer":"User identity-based access"}},{"feature":"Key Features","values":{"Amazon Q Business":"RAG-based answers, document summaries, action execution","Amazon Q Developer":"Code completion, security scans, transformation, chat"}},{"feature":"Pricing Model","values":{"Amazon Q Business":"Per user subscription","Amazon Q Developer":"Free tier + Professional tier per user"}},{"feature":"Customization","values":{"Amazon Q Business":"Custom apps, plugins, guardrails","Amazon Q Developer":"Customizations for internal codebases"}}],"sources":["aws_exam_comparison_tables[kimicode-v2].json"]},{"title":"Amazon Q Family Comparison","title_variants":["Amazon Q Family Comparison"],"description":"Comparison of Amazon Q products for different user personas and use cases","category":"AI_AMAZON_Q","columns":["Amazon Q Business","Amazon Q Developer","Amazon Q in QuickSight"],"column_summaries":{"Amazon Q Business":"A generative AI-powered assistant for business users that answers questions, summarizes content, and generates insights from company data and documents.","Amazon Q Developer":"An AI coding assistant integrated into IDEs (VS Code, JetBrains), AWS console, and CLI that helps developers write, test, and debug code.","Amazon Q in QuickSight":"An AI assistant embedded in QuickSight dashboards that enables natural language querying and automated ML insights for business users."},"rows":[{"feature":"Primary Users","values":{"Amazon Q Business":"Business analysts, executives, dashboard viewers","Amazon Q Developer":"Software developers, DevOps engineers, data engineers"}},{"feature":"Access Point","values":{"Amazon Q Business":"QuickSight dashboards (embedded in dashboards)","Amazon Q Developer":"VS Code, JetBrains, AWS Console, AWS CLI"}},{"feature":"Core Capabilities","values":{"Amazon Q Business":"Natural language queries, ML insights, anomaly detection","Amazon Q Developer":"Code generation, explanation, debugging, refactoring, AWS guidance"}},{"feature":"Data Access","values":{"Amazon Q Business":"QuickSight datasets and dashboards","Amazon Q Developer":"Code repositories, documentation, AWS services"}},{"feature":"RAG Implementation","values":{"Amazon Q Business":"Uses SPICE and QuickSight datasets for answers","Amazon Q Developer":"Indexes code and documentation for context"}},{"feature":"Security","values":{"Amazon Q Business":"Inherits QuickSight user permissions","Amazon Q Developer":"Uses IAM permissions, no code stored or trained on"}},{"feature":"Pricing","values":{"Amazon Q Business":"Included in QuickSight Enterprise pricing","Amazon Q Developer":"Free tier + \\$19/month for Pro features"}},{"feature":"Use Case Example","values":{"Amazon Q Business":"Asking 'What were our top 3 products last quarter?' in plain English","Amazon Q Developer":"Explaining why an EC2 instance is failing with troubleshooting steps"}}],"mnemonics":["B.D.Q - Business asks questions, Developer codes, QuickSight queries dashboards"],"exam_tips":["Amazon Q Business uses RAG with connectors to enterprise data sources","Amazon Q Developer helps with AWS tasks like infrastructure provisioning and troubleshooting","Amazon Q in QuickSight is included with QuickSight - enables natural language dashboard queries","For AIF-C01: Amazon Q products demonstrate real-world GenAI implementations with responsible AI considerations","All Q products inherit AWS IAM permissions and support corporate identity integration"],"sources":["aws_exam_comparison_tables[minimax].json"]},{"title":"Amazon QuickSight vs AWS Glue","title_variants":["Amazon QuickSight vs AWS Glue"],"description":"Comparison of AWS services for data visualization and data integration","category":"DATA_ANALYTICS","columns":["Amazon QuickSight","AWS Glue"],"column_summaries":{"Amazon QuickSight":"A fully managed business intelligence (BI) service that enables interactive dashboards, natural language queries, and ML-powered insights from various data sources.","AWS Glue":"A fully managed ETL (extract, transform, load) service that prepares and transforms data for analytics by discovering, cataloging, and moving data between sources."},"rows":[{"feature":"Primary Function","values":{"Amazon QuickSight":"Visualization and reporting - dashboards, charts, ML insights","AWS Glue":"Data integration - ETL, data discovery, cataloging"}},{"feature":"Data Output","values":{"Amazon QuickSight":"Dashboards, visualizations, exported reports","AWS Glue":"Transformed data loaded to data warehouse, data lake, or database"}},{"feature":"Data Sources","values":{"Amazon QuickSight":"S3, RDS, Aurora, Redshift, Athena, third-party databases","AWS Glue":"50+ sources including S3, RDS, DynamoDB, JDBC, Kafka, etc."}},{"feature":"ML Capabilities","values":{"Amazon QuickSight":"ML insights, forecasting, anomaly detection in dashboards","AWS Glue":"ML Transforms (FindMatches, De-duplicate), Glue DataBrew for cleaning"}},{"feature":"Serverless","values":{"Amazon QuickSight":"Fully serverless - SPICE in-memory engine","AWS Glue":"Fully serverless - serverless ETL with pay-per-use"}},{"feature":"Data Catalog","values":{"Amazon QuickSight":"Uses Glue Data Catalog for cross-dataset analysis","AWS Glue":"Creates and manages the Glue Data Catalog"}},{"feature":"Use Case","values":{"Amazon QuickSight":"Business analyst dashboards, executive reporting, self-service BI","AWS Glue":"Data lake preparation, data warehouse ETL, data migration"}},{"feature":"Pricing","values":{"Amazon QuickSight":"Per reader per month (with SPICE capacity)","AWS Glue":"Per data processing unit-hour (DPU-hours) + crawler runtime"}},{"feature":"Integration with Lake Formation","values":{"Amazon QuickSight":"Can query data registered with Lake Formation","AWS Glue":"Manages tables in Lake Formation data lake"}}],"mnemonics":["Q.G - QuickSight for quick insights (visualization), Glue for data moving (integration)"],"exam_tips":["QuickSight and Glue work together: Glue prepares data, QuickSight visualizes it","QuickSight uses SPICE (Super-fast, Parallel, In-memory Calculation Engine) for fast queries","Glue Data Catalog is the central metadata repository for all data lakes","For data-heavy architectures, use Glue for ETL before loading to Redshift or querying with Athena","QuickSight ML insights automatically find anomalies and forecasts in your data"],"sources":["aws_exam_comparison_tables[minimax].json"]},{"title":"Amazon Rekognition vs Amazon Textract","title_variants":["Amazon Rekognition vs Amazon Textract"],"description":"Comparison of AWS computer vision services for image/video analysis and document processing","category":"AI_COMPUTER_VISION","columns":["Amazon Rekognition","Amazon Textract"],"column_summaries":{"Amazon Rekognition":"A computer vision service that can identify objects, people, text, scenes, and activities in images and videos, as well as detect inappropriate content.","Amazon Textract":"A service that automatically extracts text, handwriting, and data from scanned documents using machine learning, going beyond simple OCR to understand document structure."},"rows":[{"feature":"Primary Function","values":{"Amazon Rekognition":"Image and video analysis - detects objects, faces, celebrities, inappropriate content","Amazon Textract":"Document extraction - pulls text and data from PDFs and images"}},{"feature":"Input","values":{"Amazon Rekognition":"Images (JPEG, PNG) and videos (MP4, MOV)","Amazon Textract":"Scanned documents, PDFs, images containing text"}},{"feature":"Output","values":{"Amazon Rekognition":"Labels, bounding boxes, confidence scores, moderation flags","Amazon Textract":"Extracted text, table structures, form key-value pairs, query results"}},{"feature":"Key Capabilities","values":{"Amazon Rekognition":"Face detection/analysis, label detection, video clips, PPE detection, celebrity recognition","Amazon Textract":"OCR, table extraction, form data extraction, queries, signatures detection"}},{"feature":"Use Cases","values":{"Amazon Rekognition":"Content moderation, user verification, asset cataloging, safety monitoring","Amazon Textract":"Invoice processing, contract analysis, data entry automation, compliance document processing"}},{"feature":"Pricing","values":{"Amazon Rekognition":"Per image or per minute of video analyzed","Amazon Textract":"Per page processed (with cheaper async option)"}}],"mnemonics":["R.I.D.E - Rekognition identifies Images (and video); Textract Reads Everything"],"exam_tips":["Rekognition is for visual content analysis; Textract is for document data extraction","Textract can return structured data (tables, forms) unlike basic OCR services","Both services are serverless and can be invoked via API or integrated with Lambda","Rekognition automatically processes images for labels without custom ML models"],"sources":["aws_exam_comparison_tables[minimax].json"]},{"title":"Amazon S3 vs EBS vs EFS vs Instance Store","title_variants":["Amazon EBS vs Instance Store Comparison","Amazon S3 vs EBS vs EFS vs Instance Store"],"context":"AWS storage services each have a distinct purpose matching different I/O patterns and access needs. The exam will describe a workload's characteristics — persistence, sharing, performance, access pattern — and ask which storage is appropriate. The key dimensions are: object vs block vs file, and shared vs single-instance vs ephemeral.","exam":"SAA-C03","domain":"Domain 3: Design High-Performing Architectures","domain_weight":"24%","table_id":"SAA-008","relevant_exams":["SAA-C03"],"relevant_domains":{"SAA-C03":["Domain 3: Design High-Performing Architectures","Domain 4: Design Cost-Optimized Architectures"]},"columns":["Amazon S3","Amazon EBS","Amazon EFS","EC2 Instance Store"],"column_summaries":{"Amazon S3":"S3 (Simple Storage Service) is object storage — infinitely scalable, durable (11 nines), and accessible from anywhere over HTTP. It is ideal for storing files, backups, static website assets, data lakes, and any data accessed by multiple services or users globally.","Amazon EBS":"EBS (Elastic Block Store) is persistent block storage attached to a SINGLE EC2 instance at a time — like a hard drive for your virtual machine. It persists data after the instance stops, supports snapshots, and is ideal for databases, boot volumes, and transactional workloads requiring low-latency I/O.","Amazon EFS":"EFS (Elastic File System) is a managed NFS (Network File System) that can be mounted by MULTIPLE EC2 instances simultaneously — it is a shared file system that auto-scales. Ideal for applications that need shared file access across many servers, like web server farms or container workloads.","EC2 Instance Store":"Instance Store is ephemeral (temporary) block storage physically attached to the EC2 host. It offers extremely high IOPS and very low latency but ALL data is LOST when the instance stops or terminates. Use only for temporary data: caches, buffers, scratch space."},"rows":[{"feature":"Storage Type","values":{"Amazon S3":"Object Storage","Amazon EBS":"Block Storage","Amazon EFS":"File Storage (NFS)","EC2 Instance Store":"Block Storage (ephemeral)"}},{"feature":"Persistence","values":{"Amazon S3":"Permanent — independent of EC2","Amazon EBS":"Persistent (data survives instance stop/reboot/termination)","Amazon EFS":"Permanent — independent of EC2","EC2 Instance Store":"Ephemeral (data lost on stop/hibernate/termination)"}},{"feature":"Shared Access","values":{"Amazon S3":"Yes — accessible from anywhere globally","Amazon EBS":"No — single EC2 instance (unless Multi-Attach feature on io1/io2)","Amazon EFS":"Yes — multiple EC2 instances mount simultaneously","EC2 Instance Store":"No — only the local instance"}},{"feature":"Performance","values":{"Amazon S3":"High throughput, higher latency (HTTP-based)","Amazon EBS":"Low latency, consistent IOPS (gp3: 3,000 IOPS baseline; io2: up to 64,000 IOPS)","Amazon EFS":"Moderate — scales with throughput mode","EC2 Instance Store":"HIGHEST IOPS — millions of IOPS, lowest latency"}},{"feature":"Scalability","values":{"Amazon S3":"Virtually unlimited — exabytes of data","Amazon EBS":"Up to 64 TB per volume (gp3/io2)","Amazon EFS":"Auto-scales — petabyte scale","EC2 Instance Store":"Fixed — limited to physical host capacity"}},{"feature":"Typical Use Case","values":{"Amazon S3":"Backups, data lake, static assets, media storage, ML training data","Amazon EBS":"Databases, critical data, applications requiring persistent storage","Amazon EFS":"Shared file system for web server farms, CMS, container persistent storage","EC2 Instance Store":"Cache, buffer, temp files, Hadoop HDFS local storage"}},{"feature":"S3 Storage Classes (bonus)","values":{"Amazon S3":"Standard → Standard-IA → One Zone-IA → Glacier Instant → Glacier Flexible → Deep Archive","Amazon EBS":"gp3 (general), io2 (high IOPS), st1 (throughput), sc1 (cold HDD)","Amazon EFS":"Standard → Infrequent Access (EFS-IA) tiers","EC2 Instance Store":"N/A — no tiers"}},{"feature":"Data Retention","values":{"Amazon EBS":"Data remains after instance termination","Instance Store":"Data lost after instance stop/termination"}},{"feature":"Accessibility","values":{"Amazon EBS":"Accessible from any compatible EC2 instance","Instance Store":"Accessible only from attached instance"}},{"feature":"Snapshot Support","values":{"Amazon EBS":"Yes (point-in-time snapshots to S3)","Instance Store":"No (must backup manually)"}},{"feature":"Cost","values":{"Amazon EBS":"Pay per GB provisioned","Instance Store":"Included with instance cost"}}],"sources":["aws_exam_comparison_tables[sonnet46].json","aws_exam_comparison_tables[kimicode-v2].json"]},{"title":"Analytics Architecture Decision Matrix","title_variants":["Analytics Architecture Decision Matrix"],"context":"When designing analytics solutions, architects must choose between multiple AWS services based on data volume, query patterns, performance requirements, and team expertise. This decision matrix helps identify the best service for common analytics scenarios encountered in the exam.","columns":["Athena","Redshift","EMR","OpenSearch","QuickSight","S3 + Glue"],"rows":[{"feature":"Best For Data Size","values":{"Athena":"Any S3 data (scans on demand)","Redshift":"Up to petabytes (optimized storage)","EMR":"Any size (Spark/Hadoop distributed)","OpenSearch":"GBs to TBs (inverted index)","QuickSight":"SPICE capacity (GBs to TBs)","S3 + Glue":"Data lake (unlimited)"}},{"feature":"Query Complexity","values":{"Athena":"Medium (SQL, limited JOINs)","Redshift":"High (complex SQL, many JOINs)","EMR":"Very High (Spark, ML, custom code)","OpenSearch":"Low (search queries, aggregations)","QuickSight":"Low-Medium (dashboard queries)","S3 + Glue":"Depends on query service used"}},{"feature":"Query Latency","values":{"Athena":"Seconds to minutes","Redshift":"Sub-second to seconds","EMR":"Minutes to hours (batch)","OpenSearch":"Milliseconds","QuickSight":"Seconds (SPICE) or minutes","S3 + Glue":"Varies by service"}},{"feature":"Infrastructure Management","values":{"Athena":"None (serverless)","Redshift":"Low (managed, optional serverless)","EMR":"Medium (cluster management)","OpenSearch":"Low (managed, some tuning)","QuickSight":"None (fully managed)","S3 + Glue":"Low (serverless ETL)"}},{"feature":"Team Skill Required","values":{"Athena":"SQL knowledge","Redshift":"SQL + data warehousing","EMR":"Spark/Hadoop expertise","OpenSearch":"Search/Log analytics skills","QuickSight":"Business user friendly","S3 + Glue":"ETL and data engineering"}},{"feature":"Cost Model","values":{"Athena":"Pay per TB scanned","Redshift":"Provisioned or RPU-hours","EMR":"Per-second cluster pricing","OpenSearch":"Instance-based hourly","QuickSight":"Per-user monthly + SPICE","S3 + Glue":"Storage + DPU-hours"}},{"feature":"When to Choose","values":{"Athena":"Ad-hoc queries, log analysis, data exploration on S3","Redshift":"BI workloads, complex analytics, predictable queries","EMR":"Big data processing, ML, ETL at scale, custom frameworks","OpenSearch":"Search, log analytics, real-time monitoring, text search","QuickSight":"Dashboards, self-service BI, sharing visualizations","S3 + Glue":"Building data lakes, ETL pipelines, unified analytics"}},{"feature":"Integration Pattern","values":{"Athena":"Glue Catalog → Athena → Results","Redshift":"Redshift Spectrum can query S3 directly","EMR":"Can read/write to Glue Catalog, S3","OpenSearch":"Kinesis → OpenSearch for logs","QuickSight":"Connects to multiple sources including Athena","S3 + Glue":"S3 as lake, Glue for ETL and catalog"}}],"sources":["aws_exam_comparison_tables[kimi-agsw].json"]},{"title":"Application Integration Comparison: MQ, AppFlow, DataSync, Transfer Family","title_variants":["Application Integration Comparison: MQ, AppFlow, DataSync, Transfer Family"],"context":"AWS provides several services for integrating applications and transferring data between on-premises and cloud environments. Each service is optimized for specific integration patterns including message brokering, SaaS data transfer, large-scale data migration, and secure file transfers. Understanding their capabilities helps design appropriate integration architectures.","columns":["Amazon MQ","Amazon AppFlow","AWS DataSync","AWS Transfer Family"],"rows":[{"feature":"Service Type","values":{"Amazon MQ":"Managed message broker","Amazon AppFlow":"SaaS integration service","AWS DataSync":"Data transfer service","AWS Transfer Family":"Managed file transfer"}},{"feature":"Protocols Supported","values":{"Amazon MQ":"JMS, AMQP, MQTT, OpenWire, STOMP","Amazon AppFlow":"HTTPS/API (SaaS connectors)","AWS DataSync":"NFS, SMB, HDFS, S3 API","AWS Transfer Family":"SFTP, FTPS, FTP"}},{"feature":"Source/Origin","values":{"Amazon MQ":"Applications (on-premises or cloud)","Amazon AppFlow":"SaaS applications (Salesforce, SAP, etc.)","AWS DataSync":"On-premises storage (NFS/SMB)","AWS Transfer Family":"On-premises file transfer clients"}},{"feature":"Destination/Target","values":{"Amazon MQ":"Applications (consumers)","Amazon AppFlow":"AWS services (S3, Redshift, etc.)","AWS DataSync":"S3, EFS, FSx","AWS Transfer Family":"S3, EFS"}},{"feature":"Data Volume","values":{"Amazon MQ":"Message-based (individual messages)","Amazon AppFlow":"Up to 100 GB per flow run","AWS DataSync":"Up to 10 Gbps (high volume)","AWS Transfer Family":"Unlimited (file-based)"}},{"feature":"Transfer Speed","values":{"Amazon MQ":"Real-time messaging","Amazon AppFlow":"Scheduled or event-driven","AWS DataSync":"High-speed parallel transfer","AWS Transfer Family":"Line speed dependent"}},{"feature":"Encryption","values":{"Amazon MQ":"TLS in-transit, KMS at-rest","Amazon AppFlow":"TLS in-transit, KMS at-rest","AWS DataSync":"TLS in-transit, no at-rest (data in motion)","AWS Transfer Family":"SFTP/FTPS encryption in-transit"}},{"feature":"Network Requirements","values":{"Amazon MQ":"VPC, public or private endpoints","Amazon AppFlow":"Public internet (SaaS APIs)","AWS DataSync":"Agent on-premises, VPC endpoint optional","AWS Transfer Family":"Public endpoint or VPC"}},{"feature":"Pricing Model","values":{"Amazon MQ":"Per instance-hour + storage","Amazon AppFlow":"Per flow run + data volume","AWS DataSync":"Per GB transferred","AWS Transfer Family":"Per endpoint-hour + data transferred"}},{"feature":"Scheduling","values":{"Amazon MQ":"Real-time (no scheduling)","Amazon AppFlow":"Scheduled, event-driven, or on-demand","AWS DataSync":"Scheduled or on-demand","AWS Transfer Family":"Real-time (client-initiated)"}},{"feature":"Data Transformation","values":{"Amazon MQ":"None (message broker)","Amazon AppFlow":"Filtering, validation, basic mapping","AWS DataSync":"None (direct transfer)","AWS Transfer Family":"None (direct transfer)"}},{"feature":"Common Use Cases","values":{"Amazon MQ":"Migrate existing JMS/ActiveMQ apps to cloud","Amazon AppFlow":"Salesforce to S3, SAP integration, marketing data","AWS DataSync":"Migrate NFS to S3, backup to cloud, data lake ingestion","AWS Transfer Family":"Replace on-premises SFTP servers, partner file exchange"}},{"feature":"Exam Key Point","values":{"Amazon MQ":"Use when application already uses JMS/ActiveMQ","Amazon AppFlow":"Use for SaaS integrations without coding","AWS DataSync":"Use for large-scale data migration","AWS Transfer Family":"Use to eliminate on-premises SFTP servers"}}],"sources":["aws_exam_comparison_tables[kimi-agsw].json"]},{"title":"Application vs Network vs Gateway Load Balancer","title_variants":["Application vs Network vs Gateway Load Balancer"],"context":"AWS offers three types of load balancers under the Elastic Load Balancing (ELB) family. Each operates at a different network layer and solves a different problem. The exam will describe traffic characteristics and ask you to pick the right load balancer. Layer is the primary differentiator.","exam":"SAA-C03","domain":"Domain 3: Design High-Performing Architectures","domain_weight":"24%","table_id":"SAA-009","columns":["Application Load Balancer (ALB)","Network Load Balancer (NLB)","Gateway Load Balancer (GWLB)"],"column_summaries":{"Application Load Balancer (ALB)":"ALB operates at Layer 7 (HTTP/HTTPS) and makes intelligent routing decisions based on the content of requests — URL path, host header, HTTP method, query strings. It is the standard choice for web applications, microservices, and containerized apps requiring content-based routing.","Network Load Balancer (NLB)":"NLB operates at Layer 4 (TCP/UDP/TLS) and forwards traffic based purely on IP address and port — it does not inspect HTTP content. It handles millions of requests per second with ultra-low latency and is the right choice for non-HTTP traffic or applications requiring static IP addresses.","Gateway Load Balancer (GWLB)":"GWLB is specialized for deploying, scaling, and managing third-party virtual network appliances (firewalls, intrusion detection systems, deep packet inspection tools). Traffic flows THROUGH the appliance transparently — the appliance inspects it and sends it back. Used for advanced network security architectures."},"rows":[{"feature":"OSI Layer","values":{"Application Load Balancer (ALB)":"Layer 7 (HTTP/HTTPS)","Network Load Balancer (NLB)":"Layer 4 (TCP/UDP/TLS)","Gateway Load Balancer (GWLB)":"Layer 3 (IP) + Layer 4"}},{"feature":"Routing Intelligence","values":{"Application Load Balancer (ALB)":"Path-based, host-based, header-based, query string routing","Network Load Balancer (NLB)":"IP + Port only — no content inspection","Gateway Load Balancer (GWLB)":"Routes through virtual appliances transparently"}},{"feature":"Static IP?","values":{"Application Load Balancer (ALB)":"No — DNS name only","Network Load Balancer (NLB)":"YES — one static IP per AZ","Gateway Load Balancer (GWLB)":"No"}},{"feature":"Performance","values":{"Application Load Balancer (ALB)":"High — but slightly higher latency (HTTP processing)","Network Load Balancer (NLB)":"Extreme — millions of req/sec, sub-millisecond latency","Gateway Load Balancer (GWLB)":"Variable — depends on appliance throughput"}},{"feature":"Best Use Case","values":{"Application Load Balancer (ALB)":"Web apps, REST APIs, microservices, containers, WebSocket","Network Load Balancer (NLB)":"TCP/UDP traffic, gaming, VoIP, financial trading, static IP required","Gateway Load Balancer (GWLB)":"Inline network security appliances (firewall, IDS/IPS)"}},{"feature":"Protocol Support","values":{"Application Load Balancer (ALB)":"HTTP, HTTPS, WebSocket","Network Load Balancer (NLB)":"TCP, UDP, TLS","Gateway Load Balancer (GWLB)":"All IP protocols (GENEVE encapsulation)"}},{"feature":"Target Types","values":{"Application Load Balancer (ALB)":"EC2, ECS tasks, Lambda, IP addresses","Network Load Balancer (NLB)":"EC2, IP addresses, ALB","Gateway Load Balancer (GWLB)":"Virtual network appliance instances"}}],"sources":["aws_exam_comparison_tables[sonnet46].json"]},{"title":"Batch Inferencing vs Real-Time Inferencing","title_variants":["Batch Inferencing vs Real-Time Inferencing"],"context":"Inferencing is what happens AFTER a model is trained — you give it new data and it makes predictions. The two delivery modes — batch and real-time — differ in latency, cost, and use case. Choosing wrong costs money or delivers poor user experience, so the exam tests this frequently.","exam":"AIF-C01","domain":"Domain 1: Fundamentals of AI and ML","domain_weight":"20%","table_id":"AIF-004","columns":["Batch Inferencing","Real-Time Inferencing"],"column_summaries":{"Batch Inferencing":"Batch inferencing processes a large collection of inputs all at once on a schedule — like running nightly reports. It is cost-effective because compute resources are only used during the job, but results are not instant.","Real-Time Inferencing":"Real-time (online) inferencing processes each request as it arrives and returns results immediately — like a fraud check the moment a credit card is swiped. It requires always-on compute which costs more but delivers instant responses."},"rows":[{"feature":"Latency","values":{"Batch Inferencing":"High — results may take minutes to hours","Real-Time Inferencing":"Low — millisecond to second response"}},{"feature":"When Results Are Needed","values":{"Batch Inferencing":"NOT immediately — results can wait","Real-Time Inferencing":"Immediately — user/system waits for response"}},{"feature":"Cost","values":{"Batch Inferencing":"Lower — pay only during processing window","Real-Time Inferencing":"Higher — endpoint always running"}},{"feature":"Business Example","values":{"Batch Inferencing":"Nightly product recommendations email, weekly churn prediction reports","Real-Time Inferencing":"Fraud detection on card swipe, image moderation on upload, chatbot response"}},{"feature":"AWS SageMaker Feature","values":{"Batch Inferencing":"SageMaker Batch Transform","Real-Time Inferencing":"SageMaker Real-Time Endpoints"}}],"sources":["aws_exam_comparison_tables[sonnet46].json"]},{"title":"Batch Processing Comparison","title_variants":["Batch Processing Comparison"],"context":"AWS provides multiple services for batch processing and big data workloads. Understanding the differences between AWS Batch, EMR, and Glue helps select the right tool for data processing requirements.","columns":["AWS Batch","Amazon EMR","AWS Glue"],"rows":[{"feature":"Service Type","values":{"AWS Batch":"Batch job scheduling and orchestration","Amazon EMR":"Managed big data platform (Hadoop/Spark)","AWS Glue":"Serverless data integration (ETL)"}},{"feature":"Primary Use Case","values":{"AWS Batch":"General batch computing, HPC workloads","Amazon EMR":"Big data processing, analytics, ML","AWS Glue":"Data preparation, ETL, data cataloging"}},{"feature":"Infrastructure Model","values":{"AWS Batch":"Managed compute environments (EC2/Fargate)","Amazon EMR":"Managed clusters (EC2 instances)","AWS Glue":"Fully serverless (no cluster management)"}},{"feature":"Job Types Supported","values":{"AWS Batch":"Any containerized job or script","Amazon EMR":"Spark, Hadoop, Hive, Presto, Flink","AWS Glue":"PySpark, Scala ETL jobs, Python shell"}},{"feature":"Scaling","values":{"AWS Batch":"Dynamic scaling based on job queue","Amazon EMR":"Auto-scaling cluster nodes","AWS Glue":"Automatic (DPU-based scaling)"}},{"feature":"Pricing Model","values":{"AWS Batch":"No additional charge (pay for EC2/Fargate)","Amazon EMR":"Per-second cluster pricing + EC2 costs","AWS Glue":"Per DPU-hour (data processing unit)"}},{"feature":"Job Scheduling","values":{"AWS Batch":"Advanced scheduling with priorities, dependencies","Amazon EMR":"Step-based execution or external schedulers","AWS Glue":"Time-based triggers or event-driven"}},{"feature":"Data Catalog Integration","values":{"AWS Batch":"N/A (bring your own)","Amazon EMR":"Integrates with AWS Glue Data Catalog","AWS Glue":"Built-in AWS Glue Data Catalog"}},{"feature":"Development Interface","values":{"AWS Batch":"API, CLI, SDK - job definitions","Amazon EMR":"Notebooks (EMR Studio), SSH, APIs","AWS Glue":"Visual ETL designer, notebooks, scripts"}},{"feature":"Best For","values":{"AWS Batch":"HPC, rendering, financial modeling, genomics","Amazon EMR":"Petabyte-scale analytics, ML training","AWS Glue":"Data lakes, ETL pipelines, data discovery"}}],"sources":["aws_exam_comparison_tables[kimi-agsw].json"]},{"title":"Block Storage Comparison","title_variants":["AWS Block and File Storage Services Comparison","Block Storage Comparison"],"description":"Comparing block storage and file storage services for compute workloads","context":"AWS block storage provides raw storage volumes that can be formatted with a file system and used like physical hard drives. This comparison covers Amazon EBS volume types and EC2 Instance Store, which are essential for the SAA-C03 exam. Understanding performance characteristics, use cases, and durability differences is critical for designing high-performance and cost-effective storage architectures.","category":"Storage Services","exam":"Both (SAA-C03 Primary, AIF-C01 Reference)","columns":["EBS gp3 (General Purpose SSD)","EBS gp2 (General Purpose SSD)","EBS io2/io2 Block Express (Provisioned IOPS SSD)","EBS io1 (Provisioned IOPS SSD)","EBS st1 (Throughput Optimized HDD)","EBS sc1 (Cold HDD)","Instance Store","Amazon EBS"],"column_summaries":{"Amazon EBS":"Feature-rich file storage with support for Windows File Server, Lustre, NetApp ONTAP, OpenZFS, and other file systems, enabling migration of enterprise workloads to AWS."},"rows":[{"feature":"Volume Type","values":{"EBS gp3 (General Purpose SSD)":"SSD","EBS gp2 (General Purpose SSD)":"SSD","EBS io2/io2 Block Express (Provisioned IOPS SSD)":"SSD","EBS io1 (Provisioned IOPS SSD)":"SSD","EBS st1 (Throughput Optimized HDD)":"HDD","EBS sc1 (Cold HDD)":"HDD","Instance Store":"SSD/NVMe (physical)"}},{"feature":"Max Volume Size","values":{"EBS gp3 (General Purpose SSD)":"16 TiB","EBS gp2 (General Purpose SSD)":"16 TiB","EBS io2/io2 Block Express (Provisioned IOPS SSD)":"64 TiB (io2), 256 TiB (Block Express)","EBS io1 (Provisioned IOPS SSD)":"16 TiB","EBS st1 (Throughput Optimized HDD)":"16 TiB","EBS sc1 (Cold HDD)":"16 TiB","Instance Store":"Up to ~60 TiB (instance dependent)"}},{"feature":"Max IOPS","values":{"EBS gp3 (General Purpose SSD)":"16,000","EBS gp2 (General Purpose SSD)":"16,000","EBS io2/io2 Block Express (Provisioned IOPS SSD)":"256,000 (Block Express)","EBS io1 (Provisioned IOPS SSD)":"64,000","EBS st1 (Throughput Optimized HDD)":"500","EBS sc1 (Cold HDD)":"250","Instance Store":"Millions (NVMe)"}},{"feature":"Max Throughput","values":{"EBS gp3 (General Purpose SSD)":"1,000 MiB/s","EBS gp2 (General Purpose SSD)":"250 MiB/s (burst to 1,000)","EBS io2/io2 Block Express (Provisioned IOPS SSD)":"4,000 MiB/s (Block Express)","EBS io1 (Provisioned IOPS SSD)":"1,000 MiB/s","EBS st1 (Throughput Optimized HDD)":"500 MiB/s","EBS sc1 (Cold HDD)":"250 MiB/s","Instance Store":"Up to 10+ GB/s"}},{"feature":"Latency","values":{"EBS gp3 (General Purpose SSD)":"Single-digit milliseconds","EBS gp2 (General Purpose SSD)":"Single-digit milliseconds","EBS io2/io2 Block Express (Provisioned IOPS SSD)":"Sub-millisecond (Block Express)","EBS io1 (Provisioned IOPS SSD)":"Single-digit milliseconds","EBS st1 (Throughput Optimized HDD)":"Tens of milliseconds","EBS sc1 (Cold HDD)":"Tens of milliseconds","Instance Store":"Microseconds"}},{"feature":"Availability","values":{"EBS gp3 (General Purpose SSD)":"99.8% - 99.9%","EBS gp2 (General Purpose SSD)":"99.8% - 99.9%","EBS io2/io2 Block Express (Provisioned IOPS SSD)":"99.999% (io2)","EBS io1 (Provisioned IOPS SSD)":"99.8% - 99.9%","EBS st1 (Throughput Optimized HDD)":"99.8% - 99.9%","EBS sc1 (Cold HDD)":"99.8% - 99.9%","Instance Store":"Ephemeral (data lost on stop/terminate)","Amazon EBS":"Single AZ (99.999% within AZ)"}},{"feature":"Multi-Attach Support","values":{"EBS gp3 (General Purpose SSD)":"No","EBS gp2 (General Purpose SSD)":"No","EBS io2/io2 Block Express (Provisioned IOPS SSD)":"Yes (Nitro instances)","EBS io1 (Provisioned IOPS SSD)":"Yes","EBS st1 (Throughput Optimized HDD)":"No","EBS sc1 (Cold HDD)":"No","Instance Store":"N/A"}},{"feature":"Boot Volume Support","values":{"EBS gp3 (General Purpose SSD)":"Yes","EBS gp2 (General Purpose SSD)":"Yes","EBS io2/io2 Block Express (Provisioned IOPS SSD)":"Yes","EBS io1 (Provisioned IOPS SSD)":"Yes","EBS st1 (Throughput Optimized HDD)":"No","EBS sc1 (Cold HDD)":"No","Instance Store":"No"}},{"feature":"Pricing Model","values":{"EBS gp3 (General Purpose SSD)":"Provisioned size + IOPS + throughput","EBS gp2 (General Purpose SSD)":"Provisioned size only","EBS io2/io2 Block Express (Provisioned IOPS SSD)":"Provisioned size + IOPS","EBS io1 (Provisioned IOPS SSD)":"Provisioned size + IOPS","EBS st1 (Throughput Optimized HDD)":"Provisioned size only","EBS sc1 (Cold HDD)":"Provisioned size only","Instance Store":"Included in instance cost","Amazon EBS":"Pay per usage based on file system type"}},{"feature":"Best Use Cases","values":{"EBS gp3 (General Purpose SSD)":"Boot volumes, dev/test, low-latency apps, most workloads","EBS gp2 (General Purpose SSD)":"Legacy workloads (gp3 preferred for new)","EBS io2/io2 Block Express (Provisioned IOPS SSD)":"I/O-intensive databases, mission-critical apps","EBS io1 (Provisioned IOPS SSD)":"Legacy I/O-intensive workloads (io2 preferred)","EBS st1 (Throughput Optimized HDD)":"Big data, data warehouses, log processing","EBS sc1 (Cold HDD)":"Cold data, infrequent access, lowest cost HDD","Instance Store":"Temporary storage, caches, buffers, high-IOPS needs","Amazon EBS":"Web serving, content management, home directories"}},{"feature":"Storage Type","values":{"Amazon EBS":"Block storage (like virtual hard drives)","Amazon EFS":"File storage (NFS/SMB shared filesystem)","Amazon FSx":"File storage (Windows, Lustre, ONTAP, etc.)"}},{"feature":"Access Pattern","values":{"Amazon EBS":"Single EC2 instance (except Multi-Attach)","Amazon EFS":"Multiple EC2 instances, containers, Lambda","Amazon FSx":"Multiple EC2 instances based on file system type"}},{"feature":"Scaling","values":{"Amazon EBS":"Manual - attach/detach volumes","Amazon EFS":"Automatic - elastic scaling","Amazon FSx":"Automatic scaling (varies by type)"}},{"feature":"Performance","values":{"Amazon EBS":"Highest - consistent low latency IOPS","Amazon EFS":"High - scales with throughput","Amazon FSx":"High - optimized for specific workloads"}}],"mnemonics":["EBE = EBS for boot and databases (single), EFS for shared files (elastic), FSx for specialized file systems"],"exam_tips":["EBS volumes are tied to ONE availability zone - if AZ fails, EBS fails","EFS is accessible from MULTIPLE AZs - great for distributed workloads","Use FSx for Windows-based applications (requires SMB protocol)","FSx for Lustre is optimized for high-performance computing and ML training","EFS uses POSIX permissions; FSx for Windows uses NTFS permissions"],"sources":["aws_exam_comparison_tables[kimi-agsw].json","aws_exam_comparison_tables[minimax-dr].json"]},{"title":"Business Intelligence Comparison","title_variants":["Business Intelligence Comparison"],"context":"AWS QuickSight is the primary BI service, offering two editions with different capabilities. Understanding when to use QuickSight versus querying directly with Athena is important for exam scenarios involving dashboards, visualizations, and self-service analytics.","columns":["QuickSight Standard","QuickSight Enterprise","Athena (for comparison)","QuickSight Q"],"rows":[{"feature":"Target Users","values":{"QuickSight Standard":"Individual users, small teams","QuickSight Enterprise":"Organizations, enterprise BI","Athena (for comparison)":"Data analysts, developers","QuickSight Q":"Business users (natural language)"}},{"feature":"User Pricing","values":{"QuickSight Standard":"$9/user/month","QuickSight Enterprise":"$18/user/month","Athena (for comparison)":"$5/TB scanned (no user fee)","QuickSight Q":"$250/month for 500 queries (add-on)"}},{"feature":"Data Sources","values":{"QuickSight Standard":"AWS sources, files, databases","QuickSight Enterprise":"All Standard + additional connectors","Athena (for comparison)":"S3 via Glue Catalog only","QuickSight Q":"Works with Enterprise datasets"}},{"feature":"SPICE Capacity","values":{"QuickSight Standard":"10GB per user","QuickSight Enterprise":"25GB per user (scales higher)","Athena (for comparison)":"None (direct query)","QuickSight Q":"Uses Enterprise SPICE"}},{"feature":"Key Features","values":{"QuickSight Standard":"Dashboards, visualizations, sharing","QuickSight Enterprise":"ML Insights, encryption, VPC, Row-level security","Athena (for comparison)":"SQL queries, results to S3","QuickSight Q":"Natural language Q&A, auto-visualizations"}},{"feature":"Row-Level Security","values":{"QuickSight Standard":"Not available","QuickSight Enterprise":"Yes (user-based rules)","Athena (for comparison)":"Must implement in queries","QuickSight Q":"Inherits from Enterprise"}},{"feature":"ML Capabilities","values":{"QuickSight Standard":"Limited","QuickSight Enterprise":"ML Insights, anomaly detection, forecasting","Athena (for comparison)":"None (query only)","QuickSight Q":"Auto-suggests visualizations"}},{"feature":"Best For","values":{"QuickSight Standard":"Basic dashboards, ad-hoc analysis","QuickSight Enterprise":"Enterprise BI, embedded analytics","Athena (for comparison)":"Technical users, data exploration","QuickSight Q":"Self-service BI for non-technical users"}}],"sources":["aws_exam_comparison_tables[kimi-agsw].json"]},{"title":"Caching and In-Memory Database Services","title_variants":["Caching and In-Memory Database Services","In-Memory Database Services Comparison"],"description":"Comparison of ElastiCache, MemoryDB, and DynamoDB DAX for caching and performance optimization","category":"DATABASE_SERVICES","exam":"Both (SAA-C03 Primary)","columns":["Amazon ElastiCache","Amazon MemoryDB","DynamoDB Accelerator (DAX)"],"column_summaries":{"Amazon ElastiCache":"A fully managed in-memory caching service supporting Redis and Memcached, enabling real-time performance for applications requiring sub-millisecond latency responses.","Amazon MemoryDB":"A Redis-compatible in-memory database service that offers ultra-fast performance with durability, designed for modern application architectures requiring microsecond latency.","DynamoDB Accelerator (DAX)":"A fully managed, highly available in-memory cache for DynamoDB that enables dramatic performance improvement from milliseconds to microseconds for read-intensive workloads."},"rows":[{"feature":"Primary Purpose","values":{"Amazon ElastiCache":"Caching layer - stores session data, query results, computed values","Amazon MemoryDB":"Primary database - ultra-fast reads with durability guarantees","dax":"DynamoDB accelerator - caches DynamoDB reads for faster access"}},{"feature":"Data Persistence","values":{"Amazon ElastiCache":"Optional (RDB snapshots, AOF); data loss possible","Amazon MemoryDB":"Yes - multi-AZ transaction log with durable storage","dax":"No - cache only, DynamoDB is source of truth"}},{"feature":"Data Operations","values":{"Amazon ElastiCache":"Strings, hashes, lists, sets, sorted sets, streams (Redis); simple key-value (Memcached)","Amazon MemoryDB":"Redis-compatible data structures","dax":"DynamoDB items (transparent caching)"}},{"feature":"Integration","values":{"Amazon ElastiCache":"Works with any database; commonly used with RDS, Aurora","Amazon MemoryDB":"Can replace Redis + traditional DB for ultra-fast workloads","dax":"Specifically for DynamoDB; no code changes required"}},{"feature":"Use Case","values":{"Amazon ElastiCache":"Session management, leaderboards, real-time analytics, pub/sub","Amazon MemoryDB":"Real-time bidding, gaming, caching with persistence requirements","dax":"Read-heavy DynamoDB workloads requiring microsecond latency"}},{"feature":"Consistency","values":{"Amazon ElastiCache":"Eventually consistent by default; strong consistency optional","Amazon MemoryDB":"Strong consistency with eventual secondary reads","dax":"Eventually consistent reads; write-through option available"}},{"feature":"Cluster Support","values":{"Amazon ElastiCache":"Redis Cluster (sharding) and Redis Replication (HA)","Amazon MemoryDB":"Multi-AZ with automatic failover, up to 15 read replicas","dax":"Auto-discovery, multi-node clusters with read replicas"}},{"feature":"Type","values":{"Amazon ElastiCache":"In-memory cache (Redis/Memcached)","Amazon MemoryDB":"In-memory database with durability","DynamoDB DAX":"Read-through cache specifically for DynamoDB"}},{"feature":"Protocol","values":{"Amazon ElastiCache":"Redis or Memcached protocol","Amazon MemoryDB":"Redis protocol","DynamoDB DAX":" DynamoDB API compatible"}}],"mnemonics":["E.M.D - ElastiCache caches, MemoryDB stores in memory durably, DAX accelerates DynamoDB","EEM = ElastiCache for Caching, ElastiCache for Memory, DAX = DynamoDB Accelerator"],"exam_tips":["ElastiCache is the go-to for caching layer in front of RDS/Aurora","DAX provides up to 10x performance improvement for DynamoDB reads","For microservices needing both cache and primary store, consider MemoryDB","ElastiCache Redis supports more data structures than Memcached (which is simpler)","Global data stores with ElastiCache require custom replication; MemoryDB has built-in replication","ElastiCache is for caching ANY database - not just RDS","Use ElastiCache for sessions when scaling horizontally (stateless instances)","MemoryDB is a primary database; ElastiCache is typically a cache layer","DAX is specifically for DynamoDB - don't use for other databases","ElastiCache Memcached does NOT support persistence or replication"],"sources":["aws_exam_comparison_tables[minimax].json","aws_exam_comparison_tables[minimax-dr].json"]},{"title":"Cloud Service Models: IaaS vs PaaS vs SaaS","title_variants":["Cloud Service Models: IaaS vs PaaS vs SaaS"],"context":"This table compares the three primary cloud service models. Infrastructure as a Service (IaaS) provides fundamental computing resources, Platform as a Service (PaaS) offers managed development platforms, and Software as a Service (SaaS) delivers complete applications over the internet.","table_id":"cloud_service_models_comparison","relevant_exams":["SAA-C03","AIF-C01"],"relevant_domains":{"SAA-C03":["Domain 1: Design Secure Architectures"],"AIF-C01":["Domain 1: Fundamentals of AI and ML"]},"columns":["IaaS (Infrastructure as a Service)","PaaS (Platform as a Service)","SaaS (Software as a Service)"],"column_summaries":{"IaaS (Infrastructure as a Service)":"Provides virtualized computing resources including servers, storage, and networking over the internet, giving users full control over the infrastructure.","PaaS (Platform as a Service)":"Offers a managed development and deployment environment with built-in tools, databases, and middleware, allowing developers to focus on code.","SaaS (Software as a Service)":"Delivers complete software applications over the internet, fully managed by the vendor, requiring no installation or maintenance by users."},"rows":[{"feature":"User Manages","values":{"IaaS (Infrastructure as a Service)":"Applications, Data, Runtime, Middleware, OS","PaaS (Platform as a Service)":"Applications, Data","SaaS (Software as a Service)":"None (vendor manages everything)"}},{"feature":"Vendor Manages","values":{"IaaS (Infrastructure as a Service)":"Virtualization, Servers, Storage, Networking","PaaS (Platform as a Service)":"Runtime, Middleware, OS, Virtualization, Servers, Storage, Networking","SaaS (Software as a Service)":"Everything (Application, Data, Runtime, OS, Infrastructure)"}},{"feature":"AWS Examples","values":{"IaaS (Infrastructure as a Service)":"EC2, VPC, EBS, S3","PaaS (Platform as a Service)":"Elastic Beanstalk, Lambda, ECS, EKS","SaaS (Software as a Service)":"Amazon Chime, Amazon WorkDocs, QuickSight"}},{"feature":"Control Level","values":{"IaaS (Infrastructure as a Service)":"High (full infrastructure control)","PaaS (Platform as a Service)":"Medium (focus on application code)","SaaS (Software as a Service)":"Low (use as-is)"}},{"feature":"Customization","values":{"IaaS (Infrastructure as a Service)":"Maximum flexibility","PaaS (Platform as a Service)":"Limited to platform capabilities","SaaS (Software as a Service)":"Minimal (configuration only)"}},{"feature":"Use Cases","values":{"IaaS (Infrastructure as a Service)":"Lift-and-shift, custom infrastructure, maximum control","PaaS (Platform as a Service)":"Application development, microservices, rapid deployment","SaaS (Software as a Service)":"Email, CRM, productivity tools, out-of-box solutions"}},{"feature":"Technical Expertise","values":{"IaaS (Infrastructure as a Service)":"High (system administrators)","PaaS (Platform as a Service)":"Medium (developers)","SaaS (Software as a Service)":"Low (end users)"}},{"feature":"Deployment Speed","values":{"IaaS (Infrastructure as a Service)":"Slower (configure infrastructure first)","PaaS (Platform as a Service)":"Fast (deploy code directly)","SaaS (Software as a Service)":"Immediate (sign up and use)"}}],"sources":["aws_exam_comparison_tables[kimicode-v2].json"]},{"title":"CloudFront vs Global Accelerator vs Route 53","title_variants":["CloudFront vs Global Accelerator vs Route 53"],"context":"These three services all help users around the world access your application faster, but they work in completely different ways. CloudFront caches content at the edge. Global Accelerator routes TCP/UDP traffic over AWS's private network for speed. Route 53 is DNS with intelligent routing policies. The exam frequently tests CloudFront vs Global Accelerator — know the caching distinction.","exam":"SAA-C03","domain":"Domain 3: Design High-Performing Architectures","domain_weight":"24%","table_id":"SAA-010","columns":["Amazon CloudFront","AWS Global Accelerator","Amazon Route 53"],"column_summaries":{"Amazon CloudFront":"CloudFront is AWS's CDN (Content Delivery Network) — it CACHES content (images, videos, HTML, JavaScript) at edge locations close to users, so repeat requests are served locally without going back to the origin. It is the best choice for improving performance of cacheable, web-based content.","AWS Global Accelerator":"Global Accelerator routes your traffic through AWS's private global network from the nearest edge location to your backend, bypassing the public internet. Unlike CloudFront, it does NOT cache — it just makes the network path faster for TCP/UDP traffic. Ideal for non-HTTP use cases requiring consistent low latency.","Amazon Route 53":"Route 53 is AWS's highly available DNS service — it translates domain names to IP addresses and supports intelligent routing policies (latency-based, geolocation, weighted, failover). It is the entry point for global traffic distribution and disaster recovery failover."},"rows":[{"feature":"Core Technology","values":{"Amazon CloudFront":"CDN — content caching at edge locations","AWS Global Accelerator":"Anycast IP + AWS private backbone routing","Amazon Route 53":"DNS — domain-to-IP resolution with routing intelligence"}},{"feature":"Does It Cache?","values":{"Amazon CloudFront":"YES — caches content at 400+ edge locations worldwide","AWS Global Accelerator":"NO — purely network acceleration, no caching","Amazon Route 53":"No — DNS only, no content caching"}},{"feature":"Static IP?","values":{"Amazon CloudFront":"No — DNS name (d1234.cloudfront.net)","AWS Global Accelerator":"YES — 2 static Anycast IPs provided","Amazon Route 53":"No — DNS names"}},{"feature":"DDoS Protection","values":{"Amazon CloudFront":"Shield Standard included","AWS Global Accelerator":"Shield Standard included","Amazon Route 53":"Shield Standard included"}},{"feature":"Best For","values":{"Amazon CloudFront":"Static websites, video streaming, API caching, S3 content distribution","AWS Global Accelerator":"TCP/UDP applications, gaming, VoIP, fast regional failover","Amazon Route 53":"DNS management, health checks, latency/geo/weighted/failover routing"}},{"feature":"Failover Capability","values":{"Amazon CloudFront":"Via origin failover groups","AWS Global Accelerator":"FAST — reroutes in < 30 seconds using health checks","Amazon Route 53":"Via health checks + failover routing policies"}}],"sources":["aws_exam_comparison_tables[sonnet46].json"]},{"title":"Complete AWS Storage Comparison","title_variants":["Complete AWS Storage Comparison"],"description":"Comprehensive comparison of all major AWS storage services","category":"Storage Services","exam":"Both (SAA-C03 Primary, AIF-C01 Reference)","columns":["Amazon S3","Amazon EBS","Amazon EFS","Amazon FSx"],"column_summaries":{"Amazon S3":"Object storage accessible globally via HTTP/HTTPS API, designed for unlimited scalability and maximum durability with extensive management features.","Amazon EBS":"Block storage volumes for EC2 instances with persistent storage and high IOPS capabilities, limited to a single availability zone.","Amazon EFS":"Scalable file storage for EC2 instances using NFSv4 protocol, automatically managing capacity and accessible across multiple AZs.","Amazon FSx":"Fully managed third-party file systems optimized for specific enterprise workloads including Windows, Lustre, NetApp ONTAP, and OpenZFS."},"rows":[{"feature":"Protocol","values":{"Amazon S3":"REST API (HTTPS)","Amazon EBS":"Block device (iSCSI)","Amazon EFS":"NFSv4.1","Amazon FSx":"SMB, NFS depending on type"}},{"feature":"Data Access","values":{"Amazon S3":"Anywhere (web, apps, CLI)","Amazon EBS":"Single EC2 instance in same AZ","Amazon EFS":"Thousands of EC2 instances, multi-AZ","Amazon FSx":"Multiple instances based on type"}},{"feature":"Max Object/File Size","values":{"Amazon S3":"5 TB per object","Amazon EBS":"16 TiB per volume","Amazon EFS":"47.9 TiB per file","Amazon FSx":"Varies by file system"}},{"feature":"Storage Capacity","values":{"Amazon S3":"Virtua
