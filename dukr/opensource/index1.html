<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Browser - Video 101 Products</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 15px;
            color: #e4e4e7;
            font-size: 14px;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 15px;
            padding: 10px;
        }

        h1 {
            font-size: 2rem;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #a1a1aa;
            font-size: 1rem;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            backdrop-filter: blur(10px);
            align-items: center;
        }

        .search-box {
            flex: 1;
            min-width: 200px;
        }

        .search-box input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 14px;
        }

        .search-box input:focus {
            outline: none;
            border-color: #667eea;
        }

        .search-box input::placeholder {
            color: #71717a;
        }

        .json-selector {
            min-width: 180px;
        }

        .json-selector select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 14px;
            cursor: pointer;
        }

        .json-selector select:focus {
            outline: none;
            border-color: #667eea;
        }

        .json-selector select option {
            background: #1a1a2e;
            color: #fff;
        }

        .stats {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .stat-item {
            background: rgba(102, 126, 234, 0.2);
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
        }

        .stat-item strong {
            color: #667eea;
        }

        .table-wrapper {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            overflow: hidden;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        thead {
            background: rgba(0, 0, 0, 0.3);
            position: sticky;
            top: 0;
        }

        th {
            padding: 12px 10px;
            text-align: left;
            font-weight: 600;
            color: #a78bfa;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 0.5px;
            cursor: pointer;
            user-select: none;
            transition: background 0.2s;
            white-space: nowrap;
        }

        th:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        th .sort-indicator {
            margin-left: 4px;
            opacity: 0.5;
        }

        th.sort-asc .sort-indicator::after {
            content: ' ↑';
            opacity: 1;
        }

        th.sort-desc .sort-indicator::after {
            content: ' ↓';
            opacity: 1;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            vertical-align: top;
        }

        tbody tr {
            transition: background 0.2s;
        }

        tbody tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .product-number {
            font-family: 'Courier New', monospace;
            font-weight: bold;
            color: #667eea;
            font-size: 14px;
        }

        .product-name {
            font-weight: 600;
            color: #fff;
            font-size: 14px;
        }

        .product-summary {
            color: #c4c4c9;
            font-size: 13px;
            line-height: 1.5;
            max-width: 350px;
        }

        .feature-list {
            list-style: none;
            font-size: 12px;
            color: #a1a1aa;
        }

        .feature-list li {
            padding: 1px 0;
            padding-left: 10px;
            position: relative;
        }

        .feature-list li::before {
            content: '•';
            position: absolute;
            left: 0;
            color: #667eea;
        }

        .github-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #667eea;
            text-decoration: none;
            font-size: 13px;
            padding: 6px 10px;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 6px;
            transition: all 0.2s;
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .github-link:hover {
            background: rgba(102, 126, 234, 0.2);
        }

        .github-link svg {
            flex-shrink: 0;
            width: 14px;
            height: 14px;
        }

        .readme-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #10b981;
            text-decoration: none;
            font-size: 13px;
            padding: 6px 10px;
            background: rgba(16, 185, 129, 0.1);
            border-radius: 6px;
            transition: all 0.2s;
        }

        .readme-link svg {
            width: 14px;
            height: 14px;
        }

        .readme-link:hover {
            background: rgba(16, 185, 129, 0.2);
        }

        .readme-missing {
            color: #71717a;
            font-size: 13px;
            font-style: italic;
        }

        .no-results {
            text-align: center;
            padding: 40px 20px;
            color: #71717a;
        }

        .no-results-icon {
            font-size: 36px;
            margin-bottom: 12px;
            opacity: 0.5;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #71717a;
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid rgba(102, 126, 234, 0.3);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .feature-count {
            display: inline-block;
            background: rgba(167, 139, 250, 0.2);
            color: #a78bfa;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            margin-bottom: 6px;
        }

        @media (max-width: 1024px) {
            .table-wrapper {
                overflow-x: auto;
            }
            table {
                min-width: 900px;
            }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.5rem;
            }
            .controls {
                flex-direction: column;
                align-items: stretch;
            }
            .search-box, .json-selector {
                min-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📦 Product Browser</h1>
            <p class="subtitle">Browse products from Video 101</p>
        </header>

        <div class="controls">
            <div class="json-selector">
                <select id="jsonSelector">
                    <option value="video_101_products_updated.json">Original (100 products)</option>
                    <option value="products_replacements_manus16lite.json">Manus 1.6 Lite (50)</option>
                    <option value="products_replacements_GPT_AgentMode.json">GPT Agent Mode (50)</option>
                    <option value="products_replacements_Genspark_100pct.json">Genspark 100% (50)</option>
                    <option value="products_replacements_Claude.json">Claude (50)</option>
                    <option value="products_replacements_POe_o3dr.json">POe o3dr (50)</option>
                </select>
            </div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search by product name, summary, or features...">
            </div>
            <div class="stats">
                <div class="stat-item">Total: <strong id="totalCount">0</strong></div>
                <div class="stat-item">Showing: <strong id="showingCount">0</strong></div>
                <div class="stat-item">With README: <strong id="readmeCount">0</strong></div>
            </div>
        </div>

        <div class="table-wrapper">
            <div id="loadingState" class="loading">
                <div class="spinner"></div>
                <p>Loading products...</p>
            </div>
            <table id="productsTable" style="display: none;">
                <thead>
                    <tr>
                        <th data-sort="product_number"># <span class="sort-indicator">↕</span></th>
                        <th data-sort="product_name">Product <span class="sort-indicator">↕</span></th>
                        <th data-sort="product_summary">Summary <span class="sort-indicator">↕</span></th>
                        <th>Features</th>
                        <th>Links</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                </tbody>
            </table>
            <div id="noResults" class="no-results" style="display: none;">
                <div class="no-results-icon">🔍</div>
                <h3>No products found</h3>
                <p>Try adjusting your search terms</p>
            </div>
        </div>
    </div>

    <script>
        // Available JSON files
        const JSON_FILES = {
            'video_101_products_updated.json': {
                name: 'Original',
                readmeBasePath: '../../markdown/'
            },
            'products_replacements_manus16lite.json': {
                name: 'Manus 1.6 Lite',
                readmeBasePath: '../../markdown/'
            },
            'products_replacements_GPT_AgentMode.json': {
                name: 'GPT Agent Mode',
                readmeBasePath: '../../markdown/'
            },
            'products_replacements_Genspark_100pct.json': {
                name: 'Genspark 100%',
                readmeBasePath: '../../markdown/'
            },
            'products_replacements_Claude.json': {
                name: 'Claude',
                readmeBasePath: '../../markdown/'
            },
            'products_replacements_POe_o3dr.json': {
                name: 'POe o3dr',
                readmeBasePath: '../../markdown/'
            }
        };

        let allProducts = [];
        let filteredProducts = [];
        let currentSort = { column: 'product_number', direction: 'asc' };
        let currentJsonFile = 'video_101_products_updated.json';

        const githubIcon = `<svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>`;

        const fileIcon = `<svg viewBox="0 0 16 16" fill="currentColor"><path d="M3 0h10a2 2 0 012 2v12a2 2 0 01-2 2H3a2 2 0 01-2-2V2a2 2 0 012-2zm0 1a1 1 0 00-1 1v12a1 1 0 001 1h10a1 1 0 001-1V2a1 1 0 00-1-1H3zm1 3h8v1H4V4zm0 3h8v1H4V7zm0 3h5v1H4v-1z"/></svg>`;

        async function loadProducts(jsonFile) {
            currentJsonFile = jsonFile;
            document.getElementById('loadingState').style.display = 'block';
            document.getElementById('productsTable').style.display = 'none';
            document.getElementById('noResults').style.display = 'none';
            
            try {
                const response = await fetch(jsonFile);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                allProducts = await response.json();
                filteredProducts = [...allProducts];
                
                document.getElementById('loadingState').style.display = 'none';
                document.getElementById('productsTable').style.display = 'table';
                
                updateStats();
                renderTable();
                setupSorting();
            } catch (error) {
                console.error('Error loading products:', error);
                document.getElementById('loadingState').innerHTML = `
                    <p style="color: #ef4444;">Error loading ${jsonFile}</p>
                `;
            }
        }

        function updateStats() {
            document.getElementById('totalCount').textContent = allProducts.length;
            document.getElementById('showingCount').textContent = filteredProducts.length;
            
            const readmeCount = allProducts.filter(p => p.has_README === 'YES').length;
            document.getElementById('readmeCount').textContent = readmeCount;
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            const noResults = document.getElementById('noResults');
            
            if (filteredProducts.length === 0) {
                tbody.innerHTML = '';
                noResults.style.display = 'block';
                return;
            }
            
            noResults.style.display = 'none';
            
            tbody.innerHTML = filteredProducts.map(product => {
                const hasReadme = product.has_README === 'YES';
                const readmePath = `../../markdown/${product.product_number}_README.md`;
                
                const features = product.feature_list || [];
                const featuresHtml = features
                    .slice(0, 4)
                    .map(f => `<li>${escapeHtml(f)}</li>`)
                    .join('');
                
                const featureCount = features.length;
                const featureDisplay = featureCount > 0
                    ? (featureCount > 4 
                        ? `<div class="feature-count">${featureCount} features</div><ul class="feature-list">${featuresHtml}</ul>`
                        : `<ul class="feature-list">${featuresHtml}</ul>`)
                    : '';
                
                const githubUrl = product.github_url || '';
                const cleanUrl = githubUrl.replace('?ref=manuagi', '');
                
                return `
                    <tr>
                        <td><span class="product-number">${product.product_number || '-'}</span></td>
                        <td><span class="product-name">${escapeHtml(product.product_name || '')}</span></td>
                        <td><div class="product-summary">${escapeHtml(product.product_summary || '')}</div></td>
                        <td>${featureDisplay}</td>
                        <td>
                            ${cleanUrl ? `<a href="${cleanUrl}" target="_blank" rel="noopener" class="github-link" title="${cleanUrl}">${githubIcon} GitHub</a>` : ''}
                            ${hasReadme 
                                ? `<a href="main8-2.html?file=${readmePath}" target="_blank" class="readme-link">${fileIcon} README</a>`
                                : '<span class="readme-missing">—</span>'
                            }
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function setupSorting() {
            const headers = document.querySelectorAll('th[data-sort]');
            headers.forEach(th => {
                th.addEventListener('click', () => {
                    const column = th.dataset.sort;
                    
                    if (currentSort.column === column) {
                        currentSort.direction = currentSort.direction === 'asc' ? 'desc' : 'asc';
                    } else {
                        currentSort.column = column;
                        currentSort.direction = 'asc';
                    }
                    
                    headers.forEach(h => h.classList.remove('sort-asc', 'sort-desc'));
                    th.classList.add(currentSort.direction === 'asc' ? 'sort-asc' : 'sort-desc');
                    
                    sortProducts();
                    renderTable();
                });
            });
            
            headers.forEach(h => h.classList.remove('sort-asc', 'sort-desc'));
            const initialTh = document.querySelector(`th[data-sort="${currentSort.column}"]`);
            if (initialTh) {
                initialTh.classList.add('sort-asc');
            }
        }

        function sortProducts() {
            filteredProducts.sort((a, b) => {
                let valA = a[currentSort.column] || '';
                let valB = b[currentSort.column] || '';
                
                if (currentSort.column === 'product_number') {
                    valA = parseInt(valA, 10) || 0;
                    valB = parseInt(valB, 10) || 0;
                } else {
                    valA = String(valA).toLowerCase();
                    valB = String(valB).toLowerCase();
                }
                
                if (valA < valB) return currentSort.direction === 'asc' ? -1 : 1;
                if (valA > valB) return currentSort.direction === 'asc' ? 1 : -1;
                return 0;
            });
        }

        function filterProducts(query) {
            if (!query.trim()) {
                filteredProducts = [...allProducts];
            } else {
                const lowerQuery = query.toLowerCase();
                filteredProducts = allProducts.filter(product => {
                    const name = (product.product_name || '').toLowerCase();
                    const summary = (product.product_summary || '').toLowerCase();
                    const features = (product.feature_list || []).join(' ').toLowerCase();
                    return name.includes(lowerQuery) ||
                           summary.includes(lowerQuery) ||
                           features.includes(lowerQuery);
                });
            }
            
            sortProducts();
            updateStats();
            renderTable();
        }

        // Event listeners
        document.getElementById('jsonSelector').addEventListener('change', (e) => {
            loadProducts(e.target.value);
        });

        document.getElementById('searchInput').addEventListener('input', (e) => {
            filterProducts(e.target.value);
        });

        // Load initial data
        loadProducts('video_101_products_updated.json');
    </script>
</body>
</html>
