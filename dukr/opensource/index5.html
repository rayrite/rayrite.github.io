let allData=DATA;
function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''}
function filterData(){
const q=document.getElementById('search').value.toLowerCase();
const sf=document.getElementById('source-filter').value;
let filtered=allData.map(v=>{
const fp=(v.products||[]).filter(p=>{
if(sf){const ss=p.synopsis_sources||[];if(!ss.includes(sf))return false}
if(q){const s=[p.name,v.title,p.synopsis,p.transcript_text,p.url].join(' ').toLowerCase();return s.includes(q)}
return true});
return{...v,filteredProducts:fp}}).filter(v=>v.filteredProducts.length>0);
const tot=filtered.reduce((s,v)=>s+v.filteredProducts.length,0);
document.getElementById('filtered-products').textContent=tot;
if(!tot){document.getElementById('content').style.display='none';document.getElementById('no-results').style.display='block';return}
document.getElementById('content').style.display='block';document.getElementById('no-results').style.display='none';
render(filtered)}
function render(data){
const c=document.getElementById('content');c.innerHTML='';
data.forEach(v=>{
const sec=document.createElement('div');sec.className='video-section';
const pd=v.publish_date?new Date(v.publish_date).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'}):'Unknown';
sec.innerHTML=`<div class="video-header"><div><div class="video-title">${esc(v.title)}</div><div class="video-meta">📅 ${pd} | 👤 ${esc(v.channel_name)} | 🎬 <a href="${v.video_url}" target="_blank" class="video-link">Watch</a> | 📦 ${v.filteredProducts.length} products</div></div></div>`;
let tbl=`<div class="table-wrapper"><table><thead><tr><th class="col-number">#</th><th class="col-name">Product</th><th class="col-timestamp">Time</th><th class="col-links">Links</th><th class="col-synopsis">Synopsis</th><th class="col-transcript">Transcript</th></tr></thead><tbody>`;
v.filteredProducts.forEach((p,i)=>{
const url=p.url||'';
const link=url?`<a class="github-link" href="${url}" target="_blank">${GH} Repo</a>`:'';
const web=p.website?`<a class="github-link" href="${p.website}" target="_blank">Web</a>`:'';
const syn=esc(p.synopsis||'');
const txt=esc((p.transcript_text||'').substring(0,300));
tbl+=`<tr><td class="col-number">${i+1}</td><td class="col-name">${esc(p.name)}</td><td class="col-timestamp">${p.timestamp||''}</td><td class="col-links">${link}${web}</td><td><div class="text-content">${syn}</div></td><td><div class="text-content">${txt}</div></td></tr>`;
});
tbl+='</tbody></table></div>';
sec.innerHTML+=tbl;c.appendChild(sec)})}

filterData();
</script>
