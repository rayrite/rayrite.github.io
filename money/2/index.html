<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IoT & Physical AI Watchlist</title>
<style>
/* ── Reset & Base ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:        #0f1117;
  --bg-card:   #181a20;
  --bg-hover:  #1e2028;
  --border:    #2a2d35;
  --text:      #e4e6ea;
  --text-dim:  #8b8d93;
  --accent:    #6c8cff;
  --accent2:   #a78bfa;
  --green:     #34d399;
  --green-dim: #064e3b;
  --blue:      #60a5fa;
  --blue-dim:  #1e3a5f;
  --amber:     #fbbf24;
  --amber-dim: #78350f;
  --emerald:   #10b981;
  --emerald-dim:#064e3b;
  --red:       #f87171;
  --red-dim:   #7f1d1d;
  --radius:    6px;
  --font:      -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,Cantarell,sans-serif;
  --mono:      'SF Mono','Cascadia Code','Fira Code',Consolas,monospace;
}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);font-size:13px;line-height:1.4;overflow:hidden}

/* ── Shell Layout ── */
.shell{display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden}
.header{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:var(--bg-card);border-bottom:1px solid var(--border);flex-shrink:0;gap:12px}
.header h1{font-size:15px;font-weight:700;white-space:nowrap;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent}
.header .subtitle{font-size:11px;color:var(--text-dim);white-space:nowrap}
.header-right{display:flex;align-items:center;gap:10px}

/* Theme toggle */
.theme-btn{background:none;border:1px solid var(--border);color:var(--text-dim);padding:4px 10px;border-radius:var(--radius);cursor:pointer;font-size:12px;transition:.15s}
.theme-btn:hover{border-color:var(--accent);color:var(--text)}

/* ── Tabs ── */
.tab-bar{display:flex;background:var(--bg-card);border-bottom:1px solid var(--border);flex-shrink:0;padding:0 12px;gap:4px}
.tab-btn{padding:8px 18px;font-size:12px;font-weight:600;color:var(--text-dim);background:none;border:none;border-bottom:2px solid transparent;border-radius:6px 6px 0 0;cursor:pointer;transition:all .2s;white-space:nowrap;position:relative}
.tab-btn:hover{color:var(--text);background:rgba(255,255,255,.04)}
.tab-btn[data-tab="watchlist"]{--tab-color:#6c8cff;--tab-glow:rgba(108,140,255,.55);--tab-glow-strong:rgba(108,140,255,.8)}
.tab-btn[data-tab="links"]{--tab-color:#34d399;--tab-glow:rgba(52,211,153,.55);--tab-glow-strong:rgba(52,211,153,.8)}
.tab-btn.active{color:var(--tab-color);border-bottom:3px solid var(--tab-color);background:var(--tab-glow);animation:tabPulse 3s ease-in-out infinite}
@keyframes tabPulse{0%,100%{box-shadow:0 0 8px 2px var(--tab-glow),0 0 20px 4px var(--tab-glow)}50%{box-shadow:0 0 16px 6px var(--tab-glow-strong),0 0 36px 10px var(--tab-glow)}}
.tab-content{display:none;flex:1;overflow:auto;flex-direction:column;-webkit-overflow-scrolling:touch}
.tab-content.active{display:flex}

/* ── Tab 1: Watchlist ── */
.wl-toolbar{background:var(--bg-card);border-bottom:1px solid var(--border);flex-shrink:0}
.wl-toolbar-row{display:flex;align-items:center;gap:8px;padding:6px 12px}
.wl-toolbar label{font-size:11px;color:var(--text-dim);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.wl-search{flex:1 1 160px;min-width:100px;padding:5px 10px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:12px;outline:none;transition:.15s}
.wl-search:focus{border-color:var(--accent)}
.wl-select{padding:4px 8px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:12px;outline:none;cursor:pointer;min-width:100px}
.wl-count{font-size:11px;color:var(--text-dim);white-space:nowrap}
.wl-export{background:var(--bg);border:1px solid var(--border);color:var(--text-dim);padding:4px 10px;border-radius:var(--radius);cursor:pointer;font-size:11px;font-weight:600;transition:.15s}
.wl-export:hover{border-color:var(--accent);color:var(--text)}
.wl-filters{display:flex;flex-wrap:wrap;align-items:center;gap:8px;padding:4px 12px 6px}
.wl-hamburger{display:none;background:none;border:1px solid var(--border);color:var(--text-dim);width:32px;height:28px;border-radius:var(--radius);cursor:pointer;font-size:16px;line-height:1;transition:.15s;flex-shrink:0}
.wl-hamburger:hover{border-color:var(--accent);color:var(--text)}
.wl-hamburger.open{border-color:var(--accent);color:var(--accent)}

/* Table */
.table-wrap{flex:1;overflow:auto;position:relative;-webkit-overflow-scrolling:touch;padding-bottom:40px}
table.wl{width:100%;border-collapse:collapse;table-layout:fixed}
table.wl thead{position:sticky;top:0;z-index:2}
table.wl th{background:var(--bg-card);border-bottom:2px solid var(--border);padding:6px 8px;text-align:left;font-size:11px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:.4px;cursor:pointer;user-select:none;white-space:nowrap;position:relative}
table.wl th:hover{color:var(--text)}
table.wl th .sort-arrow{margin-left:3px;font-size:9px;opacity:.4}
table.wl th.sorted .sort-arrow{opacity:1;color:var(--accent)}
table.wl td{padding:5px 8px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:middle}
table.wl tbody tr:hover{background:var(--bg-hover)}
table.wl tbody tr:nth-child(even){background:rgba(255,255,255,.01)}
table.wl tbody tr:nth-child(even):hover{background:var(--bg-hover)}

/* Column widths */
.col-num{width:32px;text-align:center;color:var(--text-dim)}
.col-company{width:150px;font-weight:600}
.col-ticker{width:80px;font-family:var(--mono);font-size:11px}
.col-exchange{width:72px;font-size:11px}
.col-mcap{width:80px;text-align:right;font-family:var(--mono);font-size:11px}
.col-segment{width:160px}
.col-desc{min-width:180px}
.col-mentions{width:58px;text-align:center}
.col-sentiment{width:120px}
.col-yf{width:28px;text-align:center}
.col-tv{width:28px;text-align:center}

/* Sentiment badges */
.badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700;letter-spacing:.3px;white-space:nowrap}
.badge-extreme{background:var(--emerald-dim);color:var(--emerald)}
.badge-very{background:var(--green-dim);color:var(--green)}
.badge-positive{background:var(--blue-dim);color:var(--blue)}
.badge-cautious{background:var(--amber-dim);color:var(--amber)}
.badge-mixed{background:var(--red-dim);color:var(--red)}

/* Mention bar */
.mention-bar{display:inline-block;height:14px;border-radius:2px;background:var(--accent);opacity:.7;vertical-align:middle;min-width:4px}
.mention-num{font-family:var(--mono);font-size:11px;margin-left:4px}

/* Links */
.ext-link{color:var(--accent);text-decoration:none;transition:.15s}
.ext-link:hover{color:var(--accent2)}

/* Ticker links */
.ticker-wrap{display:inline-flex;align-items:center;gap:4px}
.ticker-link{color:var(--accent);text-decoration:none;opacity:.8;transition:.15s}
.ticker-link:hover{opacity:1;color:var(--accent2)}

/* Segment tags */
.seg-tag{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:600;border:1px solid var(--border);color:var(--text-dim)}

/* ── Tab 2: Research Links ── */
.links-panel{flex:1;overflow:auto;padding:16px 20px;padding-bottom:60px;-webkit-overflow-scrolling:touch}
.links-search-bar{padding:8px 12px;background:var(--bg-card);border-bottom:1px solid var(--border);flex-shrink:0}
.links-search{width:100%;max-width:400px;padding:5px 10px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:12px;outline:none}
.links-search:focus{border-color:var(--accent)}
.link-group{margin-bottom:20px}
.link-group-title{font-size:13px;font-weight:700;color:var(--accent);margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px}
.link-group-title .icon{font-size:14px}
.link-item{padding:5px 0 5px 16px;border-left:2px solid var(--border);margin-left:8px;margin-bottom:4px}
.link-item a{color:var(--accent);text-decoration:none;font-size:12px;word-break:break-all}
.link-item a:hover{text-decoration:underline;color:var(--accent2)}
.link-item .link-desc{color:var(--text);font-size:12px;margin-top:1px}
.link-item .link-src{color:var(--text-dim);font-size:10px;margin-top:2px}

/* ── Pagination ── */
.pagination{display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding:0 8px;flex-wrap:wrap;gap:8px;flex-shrink:0}
.page-info{color:var(--text-dim);font-size:11px}
.page-buttons{display:flex;gap:4px}
.page-btn{padding:5px 10px;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);cursor:pointer;font-size:11px;transition:.15s}
.page-btn:hover{border-color:var(--accent)}
.page-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.page-btn:disabled{opacity:.4;cursor:not-allowed}

/* ── Light theme ── */
body.light{--bg:#f5f6f8;--bg-card:#ffffff;--bg-hover:#eef0f4;--border:#dde0e6;--text:#1a1c21;--text-dim:#6b6e76;--accent:#4f6ef7;--accent2:#7c3aed;--green:#059669;--green-dim:#d1fae5;--blue:#2563eb;--blue-dim:#dbeafe;--amber:#d97706;--amber-dim:#fef3c7;--emerald:#059669;--emerald-dim:#d1fae5;--red:#dc2626;--red-dim:#fef2f2}
body.light .badge-extreme{background:#d1fae5;color:#059669}
body.light .badge-very{background:#d1fae5;color:#047857}
body.light .badge-positive{background:#dbeafe;color:#2563eb}
body.light .badge-cautious{background:#fef3c7;color:#d97706}
body.light .badge-mixed{background:#fef2f2;color:#dc2626}
body.light .tab-btn[data-tab="watchlist"]{--tab-color:#4f6ef7;--tab-glow:rgba(79,110,247,.3);--tab-glow-strong:rgba(79,110,247,.55)}
body.light .tab-btn[data-tab="links"]{--tab-color:#059669;--tab-glow:rgba(5,150,105,.3);--tab-glow-strong:rgba(5,150,105,.55)}
body.light .tab-btn:hover{background:rgba(0,0,0,.04)}

/* ── Responsive ── */
@media(max-width:900px){
  .col-desc{display:none}
  .wl-hamburger{display:flex;align-items:center;justify-content:center}
  .wl-filters{display:none;flex-direction:column;align-items:stretch;gap:6px;padding:6px 12px 8px;border-top:1px solid var(--border)}
  .wl-filters.open{display:flex}
  .wl-filters label{margin-top:2px}
}
@media(max-width:600px){
  .header h1{font-size:13px}
  .header .subtitle{display:none}
  .tab-btn{padding:6px 10px;font-size:11px}
  @keyframes tabPulse{0%,100%{box-shadow:0 0 6px 1px var(--tab-glow),0 0 14px 3px var(--tab-glow)}50%{box-shadow:0 0 12px 4px var(--tab-glow-strong),0 0 24px 6px var(--tab-glow)}}
  .col-exchange,.col-mcap,.col-segment{display:none}
  table.wl th,table.wl td{padding:4px 5px}
  .wl-toolbar-row{padding:5px 8px;gap:6px}
  .wl-search{font-size:13px;padding:6px 8px}
}
</style>
</head>

  <!-- Tab Bar -->
  <div class="tab-bar">

    <button class="tab-btn" data-tab="links">&#x1F517; Research Links</button>

          <th class="col-desc" data-col="desc">Description <span class="sort-arrow">&#x25B2;&#x25BC;</span></th>
          <th class="col-mentions" data-col="mentions">Mentions <span class="sort-arrow">&#x25B2;&#x25BC;</span></th>
          <th class="col-sentiment" data-col="sentimentRank">Sentiment <span class="sort-arrow">&#x25B2;&#x25BC;</span></th>
        </tr></thead>
        <tbody id="wlBody"></tbody>
      </table>
    </div>
    <div class="pagination" id="paginationContainer" style="display:none"></div>
    <div class="scroll-loader" id="scrollLoader" style="display:none;text-align:center;padding:16px;color:var(--text-dim)">Loading more...</div>
  </div>

  <!-- ═══════════════════ TAB 2: RESEARCH LINKS ═══════════════════ -->
  <div class="tab-content" id="tab-links">

      <input type="text" class="links-search" id="linksSearch" placeholder="Filter links...">
    </div>
    <div class="links-panel" id="linksPanel"></div>
  </div>
</div>

document.addEventListener("DOMContentLoaded", () => {
  populateFilters();
  filtered = COMPANIES.slice();
  setupInfiniteScroll();
  renderWatchlist(true);
  setupTabBar();
  document.getElementById("wlSearch").addEventListener("input", onSearch);
  document.getElementById("filterSegment").addEventListener("change", onFilter);
  document.getElementById("filterSentiment").addEventListener("change", onFilter);
  document.getElementById("filterExchange").addEventListener("change", onFilter);
  document.getElementById("linksSearch").addEventListener("input", onLinksSearch);
  document.querySelectorAll("table.wl th[data-col]").forEach(th => {
    th.addEventListener("click", () => setSort(th.dataset.col));
  });
});

function populateFilters() {
  const segments = [...new Set(COMPANIES.map(c => c.segment))].sort();
  const exchanges = [...new Set(COMPANIES.map(c => c.exchange))].sort();
  const sentiments = ["Extremely Positive","Very Positive","Positive","Cautiously Positive","Cautious","Mixed","Negative"];

  const segSel = document.getElementById("filterSegment");
  segments.forEach(s => { const o = document.createElement("option"); o.value = s; o.textContent = s; segSel.appendChild(o); });

  const sentSel = document.getElementById("filterSentiment");
  sentiments.forEach(s => { const o = document.createElement("option"); o.value = s; o.textContent = s; sentSel.appendChild(o); });

  const exSel = document.getElementById("filterExchange");
  exchanges.forEach(e => { const o = document.createElement("option"); o.value = e; o.textContent = e; exSel.appendChild(o); });
}

/* ════════════════════════════════════════════════════════════════
   TABS
   ════════════════════════════════════════════════════════════════ */
function setupTabBar() {
  document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
      document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
      btn.classList.add("active");
      const tab = document.getElementById("tab-" + btn.dataset.tab);
      if (tab) tab.classList.add("active");
      if (btn.dataset.tab === "links") renderResearch();
    });
  });
}

   ════════════════════════════════════════════════════════════════ */
function onSearch() { applyFilters(); renderWatchlist(true); }
function onFilter() { applyFilters(); renderWatchlist(true); }

function applyFilters() {
  const q = document.getElementById("wlSearch").value.toLowerCase();
  const seg = document.getElementById("filterSegment").value;
  const sent = document.getElementById("filterSentiment").value;
  const exc = document.getElementById("filterExchange").value;

  filtered = COMPANIES.filter(c => {
    if (q && !c.company.toLowerCase().includes(q) && !c.ticker.toLowerCase().includes(q) && !c.segment.toLowerCase().includes(q) && !c.desc.toLowerCase().includes(q)) return false;
    if (seg && c.segment !== seg) return false;
    if (sent && c.sentiment !== sent) return false;
    if (exc && c.exchange !== exc) return false;
    return true;
  });
}

function toggleFilters() {
  const f = document.getElementById("wlFilters");
  const h = document.getElementById("wlHamburger");
  f.classList.toggle("open");
  h.classList.toggle("open");
}

function setSort(col) {
  if (sortCol === col) sortAsc = !sortAsc;
  else { sortCol = col; sortAsc = false; }
  renderWatchlist(true);
}

function getBadge(sentiment) {
  const map = SENTIMENT_MAP[sentiment] || SENTIMENT_MAP["Positive"];
  return `<span class="badge ${map.cls}">${sentiment}</span>`;
}

function getMentionBar(n) {
  const maxM = Math.max(...COMPANIES.map(c => c.mentions));
  const w = Math.round((n / maxM) * 60) + 4;
  return `<span class="mention-bar" style="width:${w}px"></span><span class="mention-num">${n}</span>`;
}

function getTickerLink(company, ticker) {
  const name = encodeURIComponent(company + " stock");
  return `<a href="https://www.google.com/search?q=${name}" target="_blank" class="ticker-link" title="Google search for ${company}"><span class="ticker-wrap">${ticker} <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg></span></a>`;

function setupInfiniteScroll() {
  const tableWrap = document.querySelector('.table-wrap');
  tableWrap.addEventListener('scroll', () => {
    const { scrollTop, scrollHeight, clientHeight } = tableWrap;
    if (scrollHeight - scrollTop - clientHeight < 200 && !isLoading) {
      loadMore();
    }
  });
}

function renderWatchlist(reset = false) {
  if (reset) {
    displayedCount = 0;
    sorted = filtered.slice().sort((a, b) => {
      let av, bv;
      if (sortCol === "mcapSort") { av = a.mcapSort; bv = b.mcapSort; }
      else if (sortCol === "sentimentRank") { av = a.sentimentRank; bv = b.sentimentRank; }
      else if (sortCol === "mentions") { av = a.mentions; bv = b.mentions; }
      else { av = a[sortCol]; bv = b[sortCol]; }
      if (typeof av === "string") return sortAsc ? av.localeCompare(bv) : bv.localeCompare(av);
      return sortAsc ? av - bv : bv - av;
    });
    document.getElementById('wlBody').innerHTML = '';
  }
  document.getElementById('wlCount').textContent = filtered.length === COMPANIES.length ? `${filtered.length} companies` : `${filtered.length} / ${COMPANIES.length} total`;

  document.querySelectorAll("table.wl th[data-col]").forEach(th => {
    th.classList.toggle("sorted", th.dataset.col === sortCol);
  });

  if (displayedCount >= sorted.length) return;

  const loader = document.getElementById('scrollLoader');
  loader.style.display = 'block';
  isLoading = true;

  const batch = sorted.slice(displayedCount, displayedCount + batchSize);
  let html = '';
  batch.forEach((c, i) => {
    const rank = displayedCount + i + 1;
    html += `<tr>
      <td class="col-num">${rank}</td>
      <td class="col-company">${c.company}</td>
      <td class="col-ticker">${getTickerLink(c.company, c.ticker)}</td>
      <td class="col-exchange">${c.exchange}</td>
      <td class="col-yf">${getYFLink(c.ticker)}</td>
      <td class="col-tv">${getTVLink(c.ticker, c.exchange)}</td>
      <td class="col-mcap">${c.mcap}</td>
      <td class="col-segment"><span class="seg-tag">${c.segment}</span></td>
      <td class="col-desc">${c.desc}</td>
      <td class="col-mentions">${getMentionBar(c.mentions)}</td>
      <td class="col-sentiment">${getBadge(c.sentiment)}</td>
    </tr>`;
  });

  document.getElementById('wlBody').innerHTML += html;
  displayedCount += batch.length;
  isLoading = false;
  loader.style.display = displayedCount >= sorted.length ? 'none' : 'block';
  document.getElementById('wlCount').textContent = filtered.length === COMPANIES.length ? `${filtered.length} companies` : `${filtered.length} / ${COMPANIES.length} total`;
}

function loadMore() {
  if (displayedCount >= sorted.length) return;
  renderWatchlist(false);
}

function onLinksSearch() {
  renderResearch();
}

/* ════════════════════════════════════════════════════════════════
   RESEARCH LINKS
   ════════════════════════════════════════════════════════════════ */
function renderResearch() {
  const q = document.getElementById("linksSearch") ? document.getElementById("linksSearch").value.toLowerCase() : "";

  const bySegment = {};
  COMPANIES.forEach(c => {
    if (!bySegment[c.segment]) bySegment[c.segment] = [];
    bySegment[c.segment].push(c);
  });

  const segs = Object.keys(bySegment).sort();
  let html = "";

  segs.forEach(seg => {
    const cos = bySegment[seg].filter(c =>
      !q || c.company.toLowerCase().includes(q) || c.ticker.toLowerCase().includes(q)
    );
    if (!cos.length) return;

    html += `<div class="link-group">
      <div class="link-group-title"><span class="icon">&#x1F4C1;</span> ${seg}</div>`;

    cos.forEach(co => {
      const yfLink = getYFLink(co.ticker);
      const tvLink = getTVLink(co.ticker, co.exchange);
      const gLink = getGLink(co.company, co.ticker);
      html += `<div class="link-item">
        <a href="https://www.google.com/search?q=${encodeURIComponent(co.company + ' stock')}" target="_blank">${co.company} (${co.ticker})</a>
        ${yfLink} ${tvLink} ${gLink}
        <div class="link-desc">${co.desc}</div>
      </div>`;
    });
    html += `</div>`;
  });

  document.getElementById("linksPanel").innerHTML = html || "<p style='padding:20px;color:var(--text-dim)'>No results found.</p>";
}

function onLinksSearch() {
  renderResearch();
}

/* ════════════════════════════════════════════════════════════════
   CSV EXPORT
   ════════════════════════════════════════════════════════════════ */
function exportCSV() {
  const headers = ["Company","Ticker","Exchange","Market Cap","Segment","Description","Mentions","Sentiment"];
  const rows = COMPANIES.map(c => [c.company, c.ticker, c.exchange, c.mcap, c.segment, c.desc, c.mentions, c.sentiment]);
  const csv = [headers.join(","), ...rows.map(r => r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(","))].join("\n");
  const blob = new Blob([csv], { type: "text/csv" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "IoT_Physical_AI_Watchlist.csv";
  a.click();
}
